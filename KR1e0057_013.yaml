body:
  text: 春秋纂言卷六元吳澄撰文公名興僖公子母聲姜在位十八年夫人出姜元年乙未襄王二十六年晉霸襄二年蔡莊二十年曹共二十七年衛成九年鄭穆二年陳共六年杞桓十一年宋成十一年齊昭七年秦穆三十四年楚成四十六年弒春王正月公即位二月癸亥朔日有食之左榖無朔宇天王使叔服來㑹葬叔字服名天子之上士三命者夏四月丁巳葬我君僖公杜氏曰七月而葬緩天王使毛伯來錫公命榖梁傳曰禮有受命無來錫命劉氏曰錫命者命為諸侯也諸侯在喪稱子踰年即位喪畢以士服見於王王乃於廟命之古者五月而命至周喪畢則命矣喪未畢而命非禮也澄曰毛邑伯爵王朝六命之卿有采地而錫爵者也晉侯伐衛左傳曰晉文公之季年諸侯朝晉衛成公不朝使孔達侵鄭伐綿訾及匡晉襄公既祥使告於諸侯而伐衛先且居胥臣伐衛晉師圍戚取之獲孫昭子王氏箋義曰衛成公怨晉文公執歸京師故其季年不朝而且侵其鄰國示不從盟主也襄公嗣位欲修文公之業先以衛侯之罪告於諸侯乃命大夫伐衛取其戚田諸侯於是畏威復歸於晉昔年齊桓公卒五公子爭立霸業遂廢今襄公克纘父功繼為盟主首能威服諸侯叔孫得臣如京師左傳曰毛伯衛來錫公命叔孫得臣如周拜高郵孫氏曰魯公即位未嘗如周而周錫之命受命矣又不自行而使臣往不臣之甚也衛人伐晉衛以不事霸主受伐喪邑而又報伐焉見謀國者之非也秋公孫敖㑹晉侯于戚左傳曰晉侯疆戚田故公孫敖㑹之澄按卿不㑹公侯凡魯卿㑹外君直書不隱以見其非杜氏曰戚衛邑在頓丘衛縣西冬十月丁未楚世子商臣弒其君頵頵威倫切公穀作髠左傳曰楚子將以商臣為太子訪諸令尹子上子上曰君之齒未也而又多愛黜乃亂也楚國之舉恆在少者且是人也蜂目而豺聲忍人也不可立也弗聽既又欲立王子職而黜太子商臣商臣聞之而未察告其師潘崇曰若之何而察之潘崇曰享江芊而勿敬也從之江芊怒曰呼役夫宜君王之欲殺女而立職也告潘崇曰信矣潘崇曰能事諸乎曰不能能行乎曰不能能行大事乎曰能以宫甲圍成王王請食熊蹯而死弗聽王縊易曰臣弒其君子弒其父非一朝一夕之故其所由來者漸矣胡氏曰考於傳之所載可以見其所由致之漸嫡妾必正而楚子多愛立子必長而楚國之舉恆在少者養世子不可以不慎也而以潘崇為之師侍膳問安世子職也而多置宫甲降而不憾憾而能眕者鮮矣乃欲黜兄而立其弟謀及婦人宜其敗也而使江芊知其情其及宜矣楚頵僭王慿陵中國戰勝諸侯毒被天下然昧於君臣父子之道禍發蕭牆而不之覺也不善之積豈可掩哉春秋書世子弒其君者推本所由而著其首惡為萬世之大戒也唐世子𢎞受左氏春秋至此廢書嘆曰經籍聖人垂訓何書此耶郭瑜封曰春秋以善惡為勸戒故商臣千載而惡名不滅𢎞曰非唯口不可道故亦耳不忍聞願受他書瑜請讀禮世子從之嗚呼聖人大訓不明於後世皆腐儒學經不知其義者之罪夫亂臣賊子雖陷阱在前斧鉞加頸而不避顧謂身後惡名足以懲其為惡豈不謬哉持此曉人可謂茅塞其心矣若語之曰為人君父而不通於春秋之義者必䝉首惡之名為人臣子而不通於春秋之義者必陷篡弒誅死之罪聖人書此者使天下後世知所以為君臣父子之道而免於首惡之名誅死之罪也世子𢎞而聞此必將悚然畏懼知春秋之不可不學矣學于春秋必明臣子之義不至於奏請怫旨而見鴆矣公孫敖如齊左傳曰穆伯如齊始聘焉禮也凡君即位卿出並聘踐修舊好要結外援好事鄰國以衛社稷忠信卑讓之道也經書月四書日三大衍歷正月甲子大甲申冬至二月甲午小三月癸亥大日食經書二月朔食蓋長歷自隱元年至今三十四閏大衍三十六閏故也四月癸巳小丁巳二十五日五月壬戌大傳云辛酉朔差一日六月壬辰小七月辛酉大八月辛卯小九月庚申大十月庚寅小丁未十八日十一月己未大十二月己丑大戊午小雪閏月己未小長歷是年閏三月左氏曰於是閏三月非禮也諸歷是年皆置閏而不當在三月爾丁巳四月二十七丁未十月二十二年丙申襄王二十七年晉霸襄三蔡莊二十一曹共二十八衛成十鄭穆三陳共七杞桓十二宋成十二齊昭八秦穆三十五楚穆王商臣元年春王二月甲子晉侯及秦師戰于彭衙秦師敗績左傳曰殽之役晉人既歸秦帥秦大夫及左右皆言於秦伯曰是敗也孟明之罪也必殺之秦伯曰是孤之罪也復使為政秦孟明視帥師伐晉以報殽之役晉侯禦之先且居將中軍趙衰佐之王官無地御戎狐鞫居為右及秦師戰於彭衙秦師敗績杜氏曰彭衙秦地馮翊郃陽縣西北有彭衙城杜氏諤曰按左氏殽之役晉獲秦三帥舍之歸秦秦伯不替孟明而用之今帥師報役此秦不量力以勞民自取其敗丁丑作僖公主穀梁傳曰譏其後也范氏曰薨至此已十五月張氏曰事亡如事存故作主以象神而祭之禮既葬作主於墓不終日而虞祭不忍一日忘親也僖公元年四月葬今乃作主慢而違禮甚矣三月乙巳及晉處父盟左傳曰晉人以公不朝來討公如晉晉人使陽處父盟公以恥之陸氏曰義同髙傒凡大夫與公盟若非彼彊逼我而盟例但書人言非大夫之罪也今晉逼公令與大夫盟故特書其名以見其罪處父書字蓋未命也猶公子翬初不書氏後書公子也不書地在晉都澄按未命謂未三命也次年救江書陽處父豈今年再命明年乃三命歟或是處父上傳寫闕陽字杜氏諤曰處父來魯而就魯盟左氏穀梁又以公如晉言之是妄生經外之說夏六月公孫敖㑹宋公陳侯鄭伯晉士穀盟于垂隴隴公穀作斂左傳曰穆伯㑹諸侯及晉司空士穀盟於垂隴晉討衛故也陳侯為衛請成於晉執孔達以說澄按卿與君盟㑹例降稱人不沒其氏名者非之也魯以公孫敖抗三國之君晉以士穀主盟皆非禮也故書以譏之衛敢於伐盟主者孔達之罪也今陳侯為請而執孔達衛服其罪故免於晉之伐也襄陵許氏曰元年衛人伐晉至是諸侯㑹盟而明年衛人㑹晉伐沈則知衛服於垂隴之㑹矣晉襄方患秦楚遵養中國罪苟有所委斯受之矣杜氏曰垂隴鄭地滎陽縣東有隴城自十有二月不雨至于秋七月榖梁傳曰歷時而言不雨文不憂雨也不憂雨者無志乎民者也胡氏曰書不雨至于秋七月而不曰至于秋七月不雨者蓋後言不雨則是冀望欲雨之辭而非文公之意也夫書不雨至秋七月即八月嘗雨矣而不書八月雨見文公不以民事繫憂樂也其怠于政可知杜氏諤曰春秋僖公書不雨者三文公亦書不雨者三而榖梁解之特異且春秋編年必具四時一時無事則書首月以備之是以僖二年冬十月不雨三年春王正月不雨夏四月不雨春秋所以析而言之者蓋不可闕首月以備四時也今文公此年書十二月不雨至于秋七月者蓋冬夏自有異事以備四時也十年十三年正月不雨至于秋七月者其年之夏亦有異事故不復出首月不雨之文也榖梁以二公所書之異曲生外意謂僖公閔雨有志於民文公不憂雨無志乎民榖梁之意賢僖公而生此說也八月丁卯大事于太廟躋僖公公羊傳曰大事者大祫也毁廟之主未毁廟之主皆合食于太祖躋升也升僖公逆祀也先禰而後祖也左傳曰於是夏父弗忌為宗伯尊僖公曰躋聖賢明也君子以為失禮禮無不順子雖齊聖不先父食祀國之大事而逆之可謂禮乎澄曰凡四時之祭稱祭名而曰蒸曰嘗者五廟各祭也曰有事于太廟者四廟之主遷於太廟而合祭也是為祫曰大事於太廟者毁廟之主亦與祭自伯禽以下祖廟以上之主皆合祭於太廟也是為大祫諸侯有祫無大祫今魯亦大祫者成王賜魯重祭故魯得僭用天子之禮也文公欲尊其父故升僖公之神主設位於閔公之上也夫僖之於閔屬則弟兄分則君臣曽為君臣義同父子閔猶父也僖猶子也子雖齊聖不先父食今躋僖於閔之上是先子後父也故曰逆祀按僖公之喪此年十二月方再期而祥此八月大事於太廟是喪制未終而行吉祭也譏吉祭又譏逆祀也冬晉人宋人陳人鄭人伐秦左傳曰晉先且居宋公子成陳轅選鄭公子歸生伐秦取汪及彭衙而還程子曰秦以忿取敗晉可以已矣而復伐秦報復無已殘民結怨澄按先且居將中軍則三命之卿蓋遣其偏裨與三國之微者往伐故皆稱人公子遂如齊納幣僖公以十二月薨此二年十二月始大祥而行納幣禮是在喪而圖昏未祥而行嘉禮也非禮故書經書月五書日四大衍歷正月戊子大己丑冬至二月戊午小經八月甲子丁丑皆在此月三月丁亥大乙巳十九日四月丁巳小五月丙戌大六月丙辰小七月乙酉大八月乙卯小丁卯十三日九月甲申大十月甲寅小十一月癸未大十二月癸丑小長歷是年閏正月甲子正月九日丁丑二十二日乙巳三月二十日丁卯八月十五日三年丁酉襄王二十八年晉霸襄四蔡莊二十二曹共二十九衛成十一鄭穆四陳共八杞桓十三宋成十三齊昭九秦穆三十六楚穆二春王正月叔孫得臣㑹晉人宋人陳人衛人鄭人伐沈沈潰沈尸稔切左傳曰以其服於楚也杜氏曰汝南平輿縣北有沈亭張氏曰沈姬姓國漢志汝南治平輿故沈子國今屬蔡州胡氏曰五國皆稱人將非命卿也沈在汝南未嘗與中國㑹盟師入其境而人民逃散常山劉氏曰一被侵伐而人民散君之不能可知矣蔡潰沈潰許潰是也夏五月王子虎卒王子者王之子非氏也虎名也王子虎盟翟泉稱王人則是王朝一命之下士也今稱名者以王子之貴同於再命故稱名王臣無外交今以其嘗與魯同盟而來赴非禮也故書以譏秦人伐晉左傳曰秦伯伐晉濟河焚舟取王官及郊晉人不出遂自茅津濟封殽尸而還張氏曰秦穆公既歸自殽而作秦誓矣然彭衙及此役猶以報復為事豈非悔過之心不能勝其恥敗之心而至此乎秋楚人圍江自齊桓之霸江黃以近楚之國而從齊故楚憾之之深前既滅黃矣而未加兵於江者蓋江猶能自守其國也故至今年始有圍江之師雨螽于宋雨于付切陸氏曰自空而下又多有似雨也冬公如晉二年之春晉討公之不朝而有處父盟公之辱矣今年冬乃朝晉也十有二月己巳公及晉侯盟左傳曰晉人懼其無禮於公也請改盟澄按舊說謂上年公朝晉使處父盟公晉自悔其無禮故請公再朝晉侯自與公盟以釋前非也杜氏諤曰按經二年書及晉處父盟左傳以為公如晉而處父盟之經無其文此年書公及晉侯盟經自有公如晉之文也則是二年公未嘗如晉盟矣但晉人以公不朝使處父來討而處父輒與公盟也今公如晉朝而至己巳之日公及晉侯盟經文簡直易曉左氏以為晉懼無禮而請改盟謂公再如晉是飾辭過實亦近誣矣晉陽處父帥師伐楚以救江公穀無以字左傳曰門于方城遇息公子朱而還澄按江以從中國而受楚之伐中國霸主之所當救也陽處父畏楚兵之彊不敢徑趨江之城下乃揚言伐楚以救江門於方城一見息公子朱來即避之而還師既不能救江又不敢伐楚其為畏楚也明矣胡氏曰楚嘗伐鄭矣齊桓公逺結江黃合九國之師於召陵然後伐鄭之謀罷又嘗圍宋矣晉文公許復曹衛㑹四國之師於城濮然後圍宋之役解今江國小而弱非能與宋鄭比楚人圍之必不待徹四境屯戍守禦之衆與宿衛盡行也當是時楚有覆載不容之罪晉主夏盟宜合諸侯聲罪致討命秦甲出武關齊以東兵略陳蔡而南處父等軍於方城之外楚必震恐而江圍自解矣計不出此乃獨遣一軍逺攻强國豈能濟乎故書伐楚以救江言救江雖善而所以救之者非其道矣經書月三書日一大衍歷正月壬午大甲午冬至二月壬子小三月辛巳大四月辛亥小五月庚辰大六月庚戌大七月庚辰小八月己酉大九月己卯小十月戊申大十一月戊寅小十二月丁未大己巳二十三日長歷十二月二十四日四年戊戌襄王二十九年晉霸襄五蔡莊二十三曹共三十衛成十二鄭穆五陳共九杞桓十四宋成十四秦穆三十七齊昭十楚穆三春公至自晉孫氏曰自是公朝彊國皆至者惡其輕去宗廟逺朝彊國或執或辱危之也孫氏覺曰文之出六至之者四危之也不至者二安之也夏逆婦姜于齊榖梁傳曰其逆者誰也公也親迎而稱婦為其成禮於齊也趙氏曰公自逆常事不書以成禮于齊所以變文曰逆婦以譏之澄按婦人之歸夫家在途稱女既至稱婦逆而稱婦又曰于齊是成夫婦之禮于齊也故榖梁云何其連婦之也不稱夫人者夫人乃臣子稱其小君之辭非夫人之所得稱也公自逆故不稱夫人狄侵齊襄陵許氏曰狄自箕之敗至是始復侵齊間晉有秦楚之難也秋楚人滅江三年之秋楚人圍江晉人陽為救之之名而無救之之實江之受圍周一朞而其國竟滅晉霸不競而蠻荆得以肆其虐於小國可哀也夫晉侯伐秦左傳曰晉侯伐秦圍邢新城以報王官之役胡氏曰晉人三敗秦師秦取王官及郊未至結怨如晉師之甚也襄公又報之過矣衛侯使寧俞來聘按左氏所載晉文公之季年諸侯朝晉衛成公獨不朝又使孔達侵鄭伐綿訾及匡晉襄公既祥使告於諸侯而伐衛圍戚取之衛不服罪而孔達敢伐霸主其明年晉㑹諸侯于垂隴將伐衛幸得陳侯為之請成執孔達以說于晉而衛遂得免於伐自孔達遭報之後蓋寧俞代之為政至次年春衛從晉伐沈自此衛服霸主而無事矣又次年春晉遂歸孔達其夏衛侯朝晉至秋而來聘魯焉事大睦鄰以安社稷或者皆出寧俞之謀也夫子所稱其知之可及者蓋如此冬十有一月壬寅夫人風氏薨杜氏曰僖公母風姓也啖氏曰成風以後妾母皆僭用夫人禮程子曰妾母稱夫人嫡妾亂矣仲子始僭猶未敢同嫡也胡氏曰風氏僖公之母莊公妾也邦君之妻曰夫人蓋敵體之稱也若夫妾媵則非敵矣其生亦以夫人之名稱號之其死亦以夫人之禮卒葬之非所以正其分也以妾媵為夫人徒欲尊寵其所愛而不虞卑其身以妾母為夫人徒欲崇貴其所生而不虞賤其父卑其身則失位賤其父則無本越禮至是不亦悖乎夫禮庶子為君為其母無服不敢二尊者也春秋於成風記其卒葬各以實書謹禮之所由變也經書月一書日一大衍歷正月丁丑小己亥冬至二月丙午大三月丙子小四月乙巳大五月乙亥小六月甲辰大七月甲戌小八月癸卯大壬申大暑閏月癸酉大九月癸卯小癸卯處暑十月壬申大十一月壬寅小旦日壬寅十二月辛未大長歷是年閏三月壬寅十一月三日五年己亥襄王三十年晉霸襄六蔡莊二十四曹共三十一衛成十三鄭穆六陳共十杞桓十五宋成十五齊昭十一秦穆三十八楚穆四春王正月囗王使榮叔歸含且賵含户暗切賵芳歸切公羊傳曰含者口實也杜氏曰珠玉曰含車馬曰賵胡氏曰含且賵者厚禮妾母也程子曰天子成妾母為夫人亂倫之甚澄曰榮氏叔字王朝四命之大夫三月辛亥葬我小君成風陸氏曰自文公葬成風之後乃有二夫人祔廟非禮也蘇氏曰仲子非是惠公之嫡故特為之宫而不祔不書其葬蓋禮之正也自成風以來妾母皆葬蓋祔也魯禮之變自此始矣囗王使召伯來㑹葬召榖作毛胡氏曰歸含且賵施於妾母已稠疊矣又使卿來㑹葬恩數有加焉含賵而葬其事益隆亂人倫廢王法甚矣澄曰召邑伯爵王朝六命之卿夏公孫敖如晉三年之冬文公朝晉今五年之夏卿往聘焉魯之謹於事霸主也秦人入鄀鄀音若左傳曰鄀叛楚即秦又二於楚張氏曰今襄陽宜城縣地有鄀故城秋楚人滅六左傳曰楚成大心仲歸帥師滅六公子燮滅蓼臧文仲聞六與蓼滅曰臯陶庭堅不祀忽諸德之不建民之無援哀哉張氏曰六國皋陶之後杜氏曰今廬江六縣任公輔曰地譜夀州安豐縣有六國故城澄曰晉襄公之死期將及故其志氣不能如初年之盛紹霸之業浸以衰微故西戎之秦南蠻之楚敢於肆行中國吞噬小國而無所忌也冬十月甲申許男業卒許僖公也在位三十三年子錫我嗣是為昭公經書月三書日二大衍歷正月辛丑小乙亥冬至大二月庚午大三月庚子小辛亥十二日四月己巳五月己亥小六月戊辰大七月戊戌小八月丁卯大九月丁酉小十月丙寅大甲申十九日十一月丙申小十二月乙丑大長歷辛亥三月十三日甲申十月二十日六年庚子襄王三十一年晉霸襄七卒蔡莊二十五曹共三十二衛成十四鄭穆七陳共十一杞桓十六宋成十六齊昭十二秦穆三十九楚穆五春葬許僖公夏季孫行父如陳左傳曰臧文仲以陳衛之睦也欲求好於陳季文子聘於陳且娶焉澄按此亦行父欲迎婦於陳而請於君借聘禮以行而已魯陳前此未嘗有邦交也秋季孫行父如晉左傳曰季文子將聘於晉使求遭喪之禮以行其人曰將焉用之文子曰豫備不虞古之善教也求而無之實難過求何害澄按三年之冬公朝晉五年之夏而卿聘今六年之秋卿又聘而問疾焉魯事霸主之勤如此八月乙亥晉侯歡卒歡公作歡晉襄公也在位七年初欲立公子雍不果嫡子夷皋嗣是為靈公冬十月公子遂如晉杜氏曰卿共葬事葬晉襄公不書日闕晉殺其大夫陽處父左傳曰晉搜于夷舍二軍使狐射姑將中軍趙盾佐之陽處父至自溫改搜于董易中軍陽子成季之屬也故黨於趙氏且謂趙盾能曰使能國之利也是以上之宣子於是乎始為國政賈季怨陽子之易其班也而知其無援於晉使續鞫居殺陽處父榖梁傳曰晉將使狐夜姑為將軍趙盾佐之陽處父曰不可襄公曰諾謂夜姑曰吾使盾佐汝今汝佐盾矣襄公死處父主竟上之事夜姑使人殺之公羊傳曰晉殺其大夫陽處父射姑殺也射姑殺其稱國以殺何君漏言也胡氏曰凡書殺者在上則稱君在下則稱氏在衆則稱人在微則稱盜君與臣同殺則書國今殺處父者射姑耳君獨以漏言故亦預殺焉張氏曰按左氏則若晉國之事一聽於陽處父者及考榖梁氏所謂君漏言則是易中軍乃陽處父密言於襄公公不能謹而輕漏之以致狐射姑之殺處父春秋所以分其殺於君與大夫也澄按是時襄公已卒矣而書國殺者經意若曰處父今日之死由襄公漏言之故實襄公殺之也晉狐射姑出奔狄射音亦榖作夜左傳曰晉殺續簡伯賈季奔狄宣子使臾駢送其帑與其器用財賄至諸竟閏月不告朔猶朝于廟左傳曰閏以正時時以作事不告閏朔棄時政也李堯俞曰古歷十九年為一章章有七閏八章三年閏九月六年閏六月九年閏三月十一年閏十一月十四年閏八月十七年閏四月十九年閏十二月此擬元首初章若於後漸積餘分大率三十二月則置閏不必同初章凡為歷者閏前之月中氣在晦閏後之月中氣在朔若歷不置閏則弦望晦朔皆非其正故書云以閏月定四時成歲天子閏月則聽朔於明堂闔門左扉立於其中故於文王在門為閏天子有閏月聽朔之禮諸侯從可知也趙氏曰天子常以今年冬頒明堂正朔於諸侯諸侯受之每月奉月朔甲子以告于廟所謂稟正朔也文公以閏非正不行告朔之禮而以其朔日但身至廟拜謁而已故曰猶朝於廟杜氏諤曰子貢欲去告朔之餼羊子曰賜也爾愛其羊我愛其禮文公既不告朔而但至廟拜謁春秋志文公廢告朔而猶朝廟是幸其禮不盡廢聖人愛禮之深意也經書月三書日一大衍歷正月乙未大庚戌冬至二月乙丑小三月甲午大四月甲子小五月癸巳大六月癸亥小七月壬辰大八月壬戌小乙亥十四日九月辛卯大十月辛酉小十一月庚寅大十二月庚申小長歷是年閏十二月乙亥八月十五日程氏公說曰歷法是年未應閏經書閏月則周閏有所移也七年辛丑襄王三十二年晉霸靈公夷臯元年蔡莊二十六曹共三十三衛成十五鄭穆八陳共十二杞桓十七宋成十七卒齊昭十三秦康公罃元年楚穆六春公伐邾左傳曰公伐邾間晉難也杜氏曰公因霸國有難而侵小三月甲戌取須句遂城郚句其俱切郚音吾左傳曰置文公子焉澄按邾人嘗滅須句須句子奔魯僖公二十二年伐邾取須句而反其君其年秋邾人以須句故伐魯戰於升陘而魯敗邾人復取須句至今年十八年矣文公乃又伐邾而取須句邾文公之子前叛邾而在魯故公命之為守須句之大夫僖公前取須句之後邾人旋來伐魯今文公再取須句疑邾之又來伐而爭也故既使邾之叛臣守須句矣又城郚邑以備邾師之至也杜氏曰郚魯邑卞縣南有郚城張氏曰郚今屬襲慶府泗水縣夏四月宋公王臣卒宋成公也在位十七年其弟禦殺世子而自立國人殺禦而立其少子杵臼是為昭公宋人殺其大夫左傳曰於是公子成為右師公孫友為左師樂豫為司馬鱗矔為司徒公子蕩為司城華御事為司冦昭公將去羣公子樂豫曰不可公族公室之枝葉也若去之則本根無所庇蔭矣不聽穆襄之族率國人以攻公殺公孫固公孫鄭於公宫杜氏曰二子在公宫為亂兵所殺澄按穆襄之族率國人人衆非一人也故稱宋人死者不幸而遭亂兵非有可殺之罪故不稱名陸氏曰非君意而殺之者罪不可書名特加人字以别之胡氏曰國亂無政衆人擅殺之也戊子晉人及秦人戰于令狐左傳曰秦康公送公子雍于晉曰文公之入也無衛故有吕郤之難乃多與之徒衛穆嬴日抱太子以啼於朝曰先君何罪其嗣亦何罪舍嫡嗣不立而外求君將焉置此宣子諸大夫皆患穆嬴且畏逼乃背先蔑而立靈公以禦秦師及堇隂宣子曰我若受秦秦則賓也不受冦也既不受矣而復緩師秦將生心先人有奪人之心軍之善謀也逐冦如追逃軍之善政也訓卒利兵秣馬蓐食潛師夜起敗秦師於令狐張氏曰令狐晉地今河中府猗氏縣有令狐城澄按帥師者晉趙盾送公子雍者秦康公二國有君有卿在而各使裨將帥偏師以戰故言晉人秦人晉先蔑奔秦蔑公作時下有以師字左傳曰先蔑之使也荀林父止之曰夫人太子猶在而外求君此必不行子以疾辭若何不然將及攝卿以往可也何必子吾嘗同寮敢不盡心乎弗聽及亡荀伯盡送其帑及其器用財賄於秦曰為同寮故也榖梁傳曰不言出在外也孫氏曰自軍中而往也狄侵我西鄙張氏曰間秦晉之爭襄陵許氏曰狄懲箕之敗四年間一侵齊而未敢肆至是始復侵魯侵齊侵宋侵衛晉襄既沒莫之忌矣秋八月公㑹諸侯晉大夫盟于扈左傳曰晉侯立故也杜氏曰扈鄭地滎陽卷縣西北有扈亭張氏曰今之鄭州原武縣襄陵許氏曰諸侯何以不序大夫何以不名大夫而主盟諸侯自扈之㑹始也髙郵孫氏曰春秋書及某大夫盟者唯二莊公九年公及齊大夫盟于蔇及此年是也澄按經書諸侯者皆前目後凡此年以前並無諸國之目若無左傳則不知其為齊宋衛陳鄭許曹七國之君不列叙諸國而但言諸侯以無盟主而大夫强合諸國之君故略之也晉大夫者趙盾也莊公九年書齊大夫時襄公已殺桓公未入齊無君當國大夫自為主而與莊公盟故不書氏名而但曰齊大夫此年書晉大夫時趙盾迎立公子雍靈公未立晉未有君趙盾自為主而與七國盟故亦未書氏名與前書齊大夫同以見趙盾自專國故擅廢置君襄公卒已期年而嗣君猶未正位蓋盟扈之後始立靈公也冬徐伐莒高氏曰徐本戎也厥後自進於中國數與中國諸侯盟㑹僖十五年楚人伐徐齊桓為之大合中國諸侯以救之為其能去逆效順不侵犯中國故也今輒興兵而伐莒以中國無盟主是以敢爾故聖人復外之也公孫敖如莒涖盟左傳曰穆伯娶于莒曰戴已生文伯其娣聲已生惠叔戴已卒又聘于莒莒人以聲已辭則為襄仲聘焉莒人來請盟穆伯如莒涖盟且為仲逆自為娶之仲請攻之叔仲惠伯諫曰兵作于內為亂今臣作亂而君不禁若之何公止之惠伯成之使仲舍之公孫敖反之澄按魯臣每欲娶婦必請於君行聘㑹之禮假公事以遂其私君之無政臣之無禮也况敖代為弟逆名猶不正卒以淫奔禽獸之行也髙氏曰莒為徐所伐故來求援而請修洮之盟公孫敖娶于莒故許其盟而請往涖之經書月三書日二大衍歷正月己丑大乙卯冬至二月己未小經二月甲戌在此月三月戊子大四月戊午大丙戌春分閏月戊子小經四月戊子在此月五月丁巳大旦日榖雨六月丁亥小七月丙辰大八月丙戌小九月乙卯大十月乙酉小十一月甲寅大十二月甲申小長歷甲戌三月十八日戊子四月二日八年壬寅襄王三十三年崩晉霸靈二蔡莊二十七曹共三十四衛成十六鄭穆九陳共十三杞桓十八宋昭公杵臼元年齊昭十四秦康二楚穆七春王正月夏四月秋八月戊申天王崩襄王也在位三十三年世子王臣嗣是為頃王冬十月壬午公子遂㑹晉趙盾盟于衡雍雍於用切左傳曰襄仲㑹趙孟報扈之盟也澄按上年公既與趙盾盟于扈矣趙盾以魯國之權在公子遂而不在文公故必致公子遂盟于衡雍而後信也任氏曰二國之用事者㑹盟政在大夫矣張氏曰衡雍鄭地滎陽卷縣故城在今鄭州原武東與扈相近後漢河南卷縣有垣雍城古衡雍也乙酉公子遂㑹雒戎盟于暴雒戎左一作伊雒之戎公作伊雒戎左傳曰遂㑹雒伊之戎僖公十一年傳云揚拒泉臯伊雒之戎同伐京師杜氏曰雜戎居伊水雒水間者杜氏諤曰左傳以㑹雒戎為遂事孫氏曰再言公子遂非繼事也澄按壬午㑹趙盾越四日乙酉盟雒戎非歸魯而再出蓋初出之時已擬行此二事故經作二事書之公孫敖如京師不至而復至下公無而字丙戌奔莒左傳曰穆伯如周弔喪不至以幣奔莒從己氏焉公羊傳曰不言出在外也榖梁傳曰不言所至未如也未如則未復也未如而曰如未復而曰復其如非如也其復非復也惟奔莒之為信孫氏曰如京師弔喪也不至而復中道而反也宣八年公子遂如齊至黃乃復以疾而還義猶不可况敖如京師弔喪中道而返乎張氏曰國君為天子斬衰公孫敖受命以赴天王之喪廢君命而返已為不赦之罪况懷桑中之行而淫奔乎文公容其復而奔魯之無政刑也陸氏曰還者事畢復者未畢師還公還自晉歸父還自晉士丐聞齊侯卒乃還故曰還事畢也公如晉至河乃復公孫敖如京師不至而復仲遂至黃乃復皆事未畢而復也螽宋人殺其大夫司馬宋司城來奔左傳曰宋襄夫人襄王之姊也昭公不禮焉夫人因戴氏之族以殺大司馬公子卬司城蕩意諸來奔程子曰宋王者後得自命官故獨宋卿書官張氏曰司城司空也宋以武公名司空諱之故曰司城澄按宋人者戴氏之族非一人也見宋昭公無政而臣庶得以擅殺大夫也諸侯大國三卿曰司徒司馬司空當時諸國皆不遵王制改其官名宋亦改司徒曰太宰唯司馬司城尚是舊名故春秋每書宋二官必存其官號以幸王制之猶未改也不書氏名死者無罪例已見前經書月四書日四大衍歷正月癸丑大庚申冬至二月癸未小三月壬子大四月壬午小五月辛亥大六月辛巳大七月辛亥小八月庚辰大戊申二十九日九月庚戌小十月己卯大壬午四日乙酉七日丙戌八日十一月己酉小十二月戊寅大長歷戊申八月晦壬午十月五日九年癸卯頃王元年晉霸靈三蔡莊二十八曹共三十五卒衛成十七鄭穆十陳共十四杞桓十九宋昭二齊昭十五秦康三楚穆八春毛伯來求金左傳曰不書王命未葬也杜氏曰求金以供葬事雖踰年而未葬故不稱王使澄曰天子之喪百官總已以聽於冡宰三年故王不出命也與隱三年武氏子來求賻同毛邑伯爵王朝六命之卿夫人姜氏如齊趙氏曰無父母而歸寧譏也澄按出姜當是齊昭公之女而趙氏以為無父母蓋謂歸寧合禮者經不書故疑其非昭公之女歟二月叔孫得臣如京師葬天王也髙郵孫氏曰春秋天王書葬者五君往者三臣往者二君往者不書公如京師常事得禮法所當略也臣往者書其人以為天王之喪君不自往而使臣焉則是忘君父之恩廢臣子之禮辛丑葬襄王公羊傳曰王葬不及時書過時書我有往者則書晉人殺其大夫先都左傳曰夷之搜晉侯將登箕鄭父先都而使士縠梁益耳將中軍先克曰狐趙之勳不可廢也從之先克奪蒯得田於堇隂故箕鄭父先都士縠梁益耳蒯得作亂使賊殺先克晉人殺先都梁益耳澄按先都下軍佐也襄公於夷之搜將升之上軍以先克之言而止故先都等隂使賊殺先克時靈公幼弱趙盾將中軍秉國政先克其佐也惡先都等使賊殺其佐不敢明正先都之罪而使羣下殺之故書衆殺而不書國殺也三月夫人姜氏至自齊孫氏曰凡夫人出例皆不至惟此獨書至者以其如齊雖不合禮然愈於文姜之如齊故於其歸也特書至以其行猶可以至也劉氏曰夫人曷為或至或不至出入以禮則可以至出入不以禮則不可至此其為有禮奈何父母在而歸寧也胡氏曰出姜如齊以寧父母於禮得矣其至者出姜蓋不安於魯故至而特書澄按或謂出姜無父母或謂出姜有父母兼存之以侯考焉晉人殺其大夫士縠及箕鄭父王氏箋義曰晉自趙盾代士縠當國諸大夫不平之至是謀亂大夫死者五人向若晉從其君之命士縠將中軍箕鄭父之徒各登其職則此亂無由而作矣故春秋原晉亂之本由趙盾之代為中軍帥也既書殺先都又書殺士縠箕鄭父蓋箕鄭之死由士縠之失職士縠之死由趙盾之代其位也然士縠之徒以失職而謀作亂其罪大矣時晉侯年幼政在宣子故皆不以纍上書之而稱人以殺其言及箕鄭父者榖梁所謂纍者是也先儒多不解所以稱人書及之旨故原而釋之胡氏曰稱人以殺者國亂無政衆人擅殺之之辭三大夫挾私怨而使賊殺其中軍佐固有罪矣當是時主幼不君政在趙盾而中軍佐者盾之黨也若獄有所歸則此三人者獨無可議從末減乎而皆殺之是大夫專生殺而政不自人主出也故不稱國討常山劉氏曰殺二大夫以上不言及其事同殺之之志均故也若晉之二趙二郤蔡之二公孫是也書曰殺其大夫某及某者以某之故而延及於某也若元咺信不臣矣而公子瑕不見其辜衛侯遷怒而并殺之故書曰及以志專殺之中又有輕重者也士縠及箕鄭父倣此楚人伐鄭左傳曰范山言於楚子曰晉君少不在諸侯北方可圖也楚子師于狼淵以伐鄭囚公子堅公子尨及樂耳鄭及楚平孫氏曰楚復彊也楚自城濮之敗不敢加兵於鄭今伐鄭者晉文既死中國不振故也公子遂㑹晉人宋人衛人許人救鄭經所書四國皆書人而左氏以為晉趙盾宋華耦衛孔達蓋三卿皆當國主兵者其時不親行而各使微者以將兵救鄭也張氏曰楚自城濮以來不得志於中國其君臣之心未嘗一日忘也趙盾為政欲攘楚而大庇中夏正當力懲其始以振中國之威乃視為常役而緩不及事師及鄭而楚已囚鄭公子而去豈拯焚溺之舉哉夏狄侵齊張氏曰楚得氣去而狄交侵矣書以病晉也秋八月曹伯襄卒曹共公也在位三十五年子夀嗣是為文公九月癸酉地震公羊傳曰記異也冬楚子使椒來聘椒榖作椒鬬椒榖於菟之從子楚卿再命者張氏曰伐鄭而聘魯亦逺交近攻之意秦人來歸僖公成風之襚杜氏曰衣服曰襚追襚僖公并及成風張氏曰當是時秦楚交病中國秦欲伐晉而歸襚于魯猶楚欲圖北方而使椒來聘也髙氏曰僖公薨已九年成風薨已四年其葬既久而秦方以襚為名將焉用之成風於僖公雖曰母子而先君後夫人者禮當然也以過時始至故曰來歸葬曹共公經書月四書日二大衍歷正月戊申小乙丑冬至二月丁丑大辛丑二十五日三月丁未小四月丙子大五月丙午小六月乙亥大七月乙巳小八月甲戌大九月甲辰小十月癸酉大經九月癸酉在此月朔十一月癸卯小十二月壬申大長歷辛丑二月二十六日癸酉九月朔十年甲辰頃王二年晉霸靈四蔡莊二十九曹文公夀元年衛成十八鄭穆十一陳共十五杞桓二十宋昭三齊昭十六秦康四楚穆九春王三月辛卯臧孫辰卒高氏曰此臧哀伯之孫臧文仲也孔子譏其竊位又譏其不仁者三不智者三而魯人師其言以為死而不朽子許曰宣叔張氏曰文仲魯之名大夫也知栁下惠之賢而不與立自莊公末巳與聞國政而四十餘年間國政多疵文公尤甚夏秦伐晉秦下闕一字經七年書令狐之戰左氏載八年夏秦人伐晉取武城以報令狐之役經不書又載今年春晉伐秦取少梁經亦不書此書秦伐晉秦晉交兵報復無已兩罪之也楚殺其大夫宜申左聞傳曰與子家謀弒穆王穆王之殺宜申髙氏曰宜申字子西亦城濮之敗將事弒君父之賊十年矣乃謀弒焉楚子聞而殺之亦可悲也已澄按商臣弒君父天地所不容宜申為工尹不能與同列共謀討賊乃北面而事之君臣之分已定而乃謀弒其義不足稱也然其謀不遂而身見死聖人不以其當受今將之誅而以國殺大夫為文其意深矣自正月不雨至于秋七月義已見前及蘇子盟于女栗女音汝蘇邑子爵王朝四命之大夫受封而有國邑者孫氏曰內不出主名微者文公使微者盟天子卿其惡可知澄按依趙氏例以及為公及之者是冬狄侵宋高氏曰狄侵諸大國獨宋未爾自宋亂之後狄既侵之楚次厥貉又將來伐則國幾亡矣楚子蔡侯次于厥貉厥公作屈左傳曰陳侯鄭伯㑹楚子於息遂及蔡侯次于厥貉將以伐宋宋華御事曰楚欲弱我也先為之弱可乎何必使誘我我實不能民何罪乃逆楚子勞且聽命高氏曰此楚子將求諸侯恐諸侯疑二欲前而未敢也夫楚子者弒君父之賊而中國諸侯如宋陳鄭之君乃皆俯首而聽命焉聖人於此不從諸侯盟㑹之例而特書曰楚子蔡侯次于厥貉次者遲疑不前之意著楚子包藏禍心欲慿陵諸夏而未敢遽前也唯蔡侯首附召亂故獨書以均其罪厥後諸侯知中國之不可棄復同盟于新城非若蔡侯之堅服楚也胡氏曰楚滅江六平陳與鄭於是乎為伐宋之舉次于厥貉當是時陳鄭皆從楚矣獨書蔡侯何哉鄭失三大夫俟救而不獲陳獲公子茷而懼宋方有狄難蓋有不得已者非所欲也蔡無四境之虞則是得已而不已故削三國書蔡侯見其棄諸夏之惡也高郵孫氏曰厥貉之次遂稱楚子而明年伐麇又以爵書自是與中國等楚人盛彊而中國之衰益甚矣經書月二書日一大衍歷正月壬寅大辛未冬至閏月壬申小二月辛丑大三月辛未小辛卯二十一日四月庚子大五月庚午小六月己亥大七月己巳小八月戊戌大九月戊辰小十月丁酉大十一月丁卯小十二月丙申大十有一年乙巳頃王三年晉霸靈五蔡莊三十曹文二衛成十九鄭穆十二陳共十六杞桓二十一宋昭四齊昭十七秦康五楚穆十春楚子伐䴢䴢九倫切公作圈左傳曰厥貉之㑹䴢子逃歸楚成大心敗䴢師于防渚潘崇復伐䴢至於錫穴襄陵許氏曰楚侵伐書爵始此中國日替矣高氏曰中國諸侯自㑹厥貉之後皆不能加楚也成三年㑹蜀之後雖其大夫帥師亦出主名一同中國蓋聖人悼中國無盟主故不以蠻荒待之也夏叔仲彭生㑹晉郤缺于承筐公榖無仲字左傳曰謀諸侯之從楚者杜氏曰九年陳鄭及楚平十年宋聽楚命承筐宋地在陳留襄邑縣西張氏曰今拱州襄陵縣澄按其時楚日益彊晉君幼魯君怠將欲謀楚而乃以以次之大夫相㑹霸謀之不逺而楚勢之益張也宜哉彭生叔仲惠伯公子牙之孫蓋其適子之子以叔孫為氏此其支子之子故以叔仲為氏杜氏諤曰自文公之後大夫擅相為㑹者多矣春秋詳而志之秋曹伯來朝左傳曰曹文公即位而來見也公子遂如宋左傳曰襄仲聘宋且言司城蕩意諸而復之因賀楚師之不害也狄侵齊髙氏曰七年之間狄三侵齊非特齊之不競也亦當狄之方彊爾狄之强如此乃所以大鹹之功也冬十月甲午叔孫得臣敗狄于鹹左傳曰鄋瞞侵齊遂伐我公卜使叔孫得臣追之吉侯叔夏御莊叔綿房甥為右富父終甥駟乘敗狄于鹹獲長狄僑如富父終甥摏其喉以戈殺之杜氏曰鄋瞞狄國名防風氏之後漆姓鹹魯地啖氏曰不言獲其所獲者微爾高氏曰叔孫得臣最善射狄侵齊而復之魯叔孫得臣以一矢斃其酋首故不言帥師春秋書敗狄者四皆不書戰不待戰而敗之喜內勝之辭也劉氏曰非長狄乎曰非也春秋正名狄也戎也淮夷也白狄也赤狄也山戎也夷蠻也陸渾戎也姜戎也是不一名澄曰狄之中有長身者故號之曰長狄長狄即狄也非别有一國名長狄經書月一書日一大衍歷正月丙寅小丙子冬至二月乙未大三月乙丑大四月乙未小五月甲子大六月甲午小七月癸亥大八月癸巳小九月壬戌大十月壬辰小甲午三日十一月辛酉大十二月辛卯小長歷甲午十月四日十有二年丙午頃王四年晉霸靈六蔡莊三十一曹文三衛成二十鄭穆十三陳共十七杞桓二十二宋昭五齊昭十八秦康六楚穆十一春王正月郕伯來奔郕公作盛左傳曰郕太子朱儒自安于夫鍾國人弗徇郕伯卒郕人立君太子以夫鍾與郕邽來奔趙氏曰諸侯嗣位未踰年稱子鄭忽曹羈莒展皆已即位及其出奔猶但稱名豈有身未即位以邑出奔而稱郕伯一何厚誣耶劉氏曰意者先郕伯以去年卒太子即位而不能自安遂出奔孫氏曰諸侯播越失地皆名此不名者非自失國也按莊八年師及齊師圍郕郕降于齊師自是入齊為附庸此又來奔齊所逼爾故不名杞伯來朝左傳曰杞桓公來朝始朝公也二月庚子子叔姬卒趙氏曰時君之女故曰子以别非先君之女也澄按公榖二傳皆以叔姬為文公同母之女弟如此則是先君之女非時君女也不當稱子而左傳又以為杞桓夫人蓋指僖三十一年杞伯姬所求之婦若果爾則非文之女矣杞桓乃魯莊之甥即位在魯文之先所娶決非魯文之女至成五年被出來歸八年卒于魯者乃是杞伯姬所求魯僖之女為杞桓夫人者也夏楚人圍巢左傳曰羣舒叛楚子孔執舒子遂圍巢杜氏曰巢吳楚間小國巢廬江六縣東有古巢城張氏曰今無為軍巢縣秋滕子來朝左傳曰滕昭公來朝亦始朝公也秦伯使術來聘術公作遂左傳曰秦伯使西乞術來聘且言將伐晉澄曰義見前歸襚下冬十有二月戊午晉人秦人戰于河曲左傳曰秦伐晉取羈馬晉趙盾孫林父郤缺臾駢從秦師于河曲臾駢曰秦不能久請深壘固軍以待之秦人欲戰秦軍掩晉上軍趙穿追之不及反怒以其屬出宣子曰秦獲穿也獲一卿矣秦以勝歸我何以報乃皆出戰交綏秦師夜遁趙氏曰凡戰不書及交為主也髙氏曰二國報怨償禍迭起師徒其罪均也不書敗者兩無敗也杜氏曰河曲在河東蒲坂縣南張氏曰今河中府河東縣南有河曲季孫行父帥師城諸及鄆鄆公作運後同杜氏曰鄆莒魯所爭者城陽姑幕縣南有員亭員即鄆也以其逺逼外國故帥師城之張氏曰諸見莊公二十九年注鄆魯之東鄆今鄆州須城縣也莒魯爭鄆蓋始於此前此莒未嘗與魯有爭且未嘗有事于鄆今行父帥師城二邑以起爭端魯自此與莒為讐由鄆始孫氏曰帥師而城畏莒故也杜氏諤曰春秋書城築二十九而帥師城之者二此年及哀三年城啓陽也鄆者莒魯所爭之邑帥師以城之者懼不虞之難故為之備也凡城築之事皆志重民力也况帥師而城者乎勞民甚矣經書月三書日二大衍歷正月庚申大辛巳冬至二月庚寅小庚子十一日三月己未大四月己丑小五月戊午大六月戊子大七月戊午小八月丁亥大九月丁巳小乙酉處暑十月丙戌大乙卯秋分閏月丙辰小十一月乙酉大旦日霜降十二月乙卯小戊午四日長歷是年閏十二月庚子二月十二日戊午十二月五日十有三年丁未頃王五年晉霸靈七蔡莊三十二曹文四衛成二十一鄭穆十四陳共十八卒杞桓二十三宋昭六齊昭十九秦康七楚穆十二春王正月夏五月壬午陳侯朔卒陳共公也在位十八年子平國嗣是為靈公邾子蘧蒢卒蘧其居切蒢文居切邾文公也在位五十年子貜且嗣自正月不雨至于秋七月義見前世室屋壞世左榖作大公羊傳曰世室魯公廟也周公稱太廟魯公稱世室羣公稱宫世室世世不毁也屋壞久不修也澄曰世室屋壞謂伯禽之廟久不修而屋壞也周公封於魯留相王朝而不適魯使伯禽往就封周公雖不適魯然實為魯之始祖故魯之太廟祀周公百世不毁伯禽雖代受封然上有周公為之父則不得為始封之君其廟為昭之第一室親盡則毁蓋諸侯之禮唯太廟不毁二昭二穆皆四世而遞遷周天子也后稷居太廟文王三分天下有其二武王伐商而為天子周之王業自文武始故文武廟為宗謂之世室與太廟皆百世不毁此天子之禮非諸侯之所得僣也成王賜魯重祭俾太廟得用天子之禮以祀周公魯人以為伯禽為魯國始封之君欲不毁其廟故以伯禽之廟為世室如周之文武僭用天子廟制以尊伯禽非禮也魯文公怠慢不䖍久不修廟遂至屋壞聖人書之因以見魯公世室之為非禮也與卜郊失禮郊牛有變而書以見魯郊之為非禮者同世太二字多通用故左穀誤世為太穀梁謂太室猶世室以為伯禽廟字雖誤而義則與公羊同杜氏以為太廟之室諸儒多從之夫廟制其中之一室謂之太室稱太者以别於左右二夾室書洛誥記成王祭文王武王而曰王入太室祼彼文王武王廟非太廟也亦有太室何獨太廟之室謂之太室乎且為人子孫不早修廟以致屋壞謂一廟之屋皆壞也若果是太廟屋壞當書太廟屋壞今乃書太室屋壞則是太廟之中前堂後寢左右夾室東西二廂之屋皆不壞而唯中間一室之屋獨壞也於義有不通矣冬公如晉左傳曰公如晉朝且尋盟衛侯㑹公于沓公無公字左傳曰衛侯㑹公于沓請平于晉澄曰公往朝晉衛侯要之于路而與公㑹于沓欲因公以請平于晉也狄侵衛晉不能霸故狄人屢肆其暴因衛侯之出狄乘間侵之十有二月己丑公及晉侯盟公朝晉而請盟也公還自晉公穀無公字還者在路而未至國也鄭伯㑹公于棐棐公作斐左傳曰公還鄭伯㑹公亦請平于晉公皆成之澄曰公未至魯鄭伯要之於路而與公㑹于棐也杜氏曰鄭衛二于楚畏晉故因公請平棐鄭地高氏曰初衛鄭舍晉而從楚豈得已哉彊弱之勢不敵滅亡之徵可待姑為一時之計爾而晉未之察季文子相魯侯為之請成以紓兩國之禍春秋善和難故詳志之且見公一出而二國附如此惜乎其自怠也杜氏諤曰文公一出三為如晉朝也及晉侯盟也自往及還與二國㑹也經書月四書日二大衍歷正月甲申大丙戌冬至二月甲寅小三月癸未大四月癸丑小五月壬午大壬午一日六月壬子小七月辛巳大八月辛亥小九月庚辰大十月庚戌大十一月庚辰小經十二月己丑在此月十二月己酉大十有四年戊申頃王六年崩不書晉霸靈八蔡莊三十三曹文五衛成二十二鄭穆十五陳靈公平國元年杞桓二十四宋昭七齊昭二十卒秦康八楚莊王旅元年春王正月公至自晉邾人伐我南鄙魯文公七年伐邾取須句疑邾之必來報伐也故城郚以備之然終邾文公之世七年而不伐魯今嗣君即位始加兵於魯左傳謂公使人往弔不敬故邾來伐然邾小國也何至因弔喪使人之不敬而遽敢討魯乎蓋欲以報須句之役爾見魯未易攻故師至南鄙而遄去也叔彭生帥師伐邾按十一年承筐之㑹左氏經文作叔仲彭生則此經叔下亦當有仲字夏五月乙亥齊侯潘卒昭公也在位二十年其子舍嗣六月公㑹宋公陳侯衛侯鄭伯許男曹伯晉趙盾癸酉同盟于新城左傳曰從於楚者服且謀邾也張氏曰從楚者宋陳鄭許許自文公圍之不服襄公又嘗伐之今始與㑹盟也自襄公之末楚再慿陵趙盾得政稍加和集去嵗文公之朝衛鄭求附盾因此并招致久負固之許諸侯偕至然後講同盟之禮髙氏曰去冬鄭衛皆因公而請平于晉至是諸侯之從楚者復附晉也諸侯始皆相㑹衆議既合而後盟且謀納捷菑焉故别書癸酉同盟澄曰同盟者莫適為主也是時晉靈公幼趙盾以當國大夫出㑹諸侯不敢主是盟故書同盟也杜氏曰新城宋地在梁國穀熟縣西秋七月有星孛入于北斗左傳曰周內史叔服曰不出七年宋齊晉之君皆將死亂杜氏曰後三年宋弒昭公五年齊弒懿公七年晉弒靈公胡氏曰此三君皆違道失德而死于亂符叔服之言天之示人顯矣史之有占亦明矣孫氏曰孛彗之屬偏指曰彗光芒四出曰孛入于北斗者入魁中也公至自㑹晉人納捷菑于邾弗克納捷公作接左傳曰邾文公元妃齊姜生定公二妃晉姬生捷菑文公卒邾人立定公捷菑奔晉晉趙盾以諸侯之師八百乘納捷菑于邾邾人辭曰齊出貜且長宣子曰辭順而弗從不祥乃還杜氏曰邾有成君晉趙盾不度于義而大興諸侯之師涉邾之境見辭而退雖有服義之善所興者廣所害者衆趙氏曰弗克納言失之於前而得之於末愈乎遂也九月甲申公孫敖卒于齊左傳曰穆伯之從己氏也魯人立文伯文伯疾請曰穀之子弱請立難文伯卒立惠叔穆伯求復惠叔以為請許之將來卒于齊告喪請葬弗許陸氏曰奔大夫不書卒非我臣也既許其歸即我臣也故書之且明君臣之義死生一也魯卿卒於他國例也齊公子商人弒其君舍左傳曰子叔姬妃齊昭公生舍叔姬無寵舍無威桓公子商人驟施於國而多聚士昭公卒舍即位商人弒舍自立榖梁傳曰舍未踰年其曰君何也成舍之為君所以重商人之弒也陸氏曰春秋之作本以懲姦惡若未踰年之君被弒而不曰君則逆亂之臣皆以未踰年而肆其凶惡也晉奚齊本不正又里克不代其位故異於此髙郵孫氏曰人子之心則未逾年而稱子國人弒君則未逾年而稱君此春秋所以辨君臣之分而防篡弒之禍啖氏曰舍母蓋魯之媵女但一叔姬爾左氏附㑹後事加子字澄按啖說是也左氏附㑹加子字則叔姬乃文公女也文公即位才十四年豈有女配齊昭公而生子可立為君者哉齊昭公以魯僖公二十八年即位叔姬生舍當在魯僖末年時文公尚為世子豈有世子年幼而有女嫁鄰國年長之君為夫人者乎况文四年文公逆婦姜于齊蓋齊昭公之女也豈有齊昭既娶魯文之女而魯文又娶齊昭之女者乎故知左氏以舍母為文公女者妄也宋子哀來奔左傳曰宋髙哀為蕭封人以為卿不義宋公而出遂來奔孫氏曰子哀宋公族子子姓哀名也澄曰子哀三命之卿例稱氏稱名子氏哀名也宋子姓而氏曰子者所謂以姓為氏也周制婦人稱姓男子稱氏再命者有名無氏三命當稱氏則君命之氏宋哀自封人升為卿君未及命氏而出奔故無氏可稱若但書名則疑於再命而非三命之卿故經書宋之姓以為哀之氏表其為三命之卿也傳稱高哀而經書子哀猶晉大夫曰范氏中行而經所書皆以士為氏也張氏曰自宋昭公在位始終無一善可稱大臣死禍出奔者比比皆是獨子哀潔身而去不蹈隕身濡尾之悔觀蕩意諸再歸而卒不免則子哀之見幾而作豈非既明且哲之流哉冬單伯如齊單伯魯大夫之命於天子者自莊公元年至今已七十餘年未必一人或其子若孫歟齊人執單伯胡氏曰商人弒舍固忌魯矣魯使單伯如齊齊人欲辱魯故執單伯并執叔姬而誣之以罪齊人執子叔姬陸氏曰左氏言子叔姬是齊侯舍之母春秋例無執本國人者左傳誤此乃魯女嫁齊齊不受而執之爾公榖義是何氏曰時子叔姬嫁當為齊夫人使單伯送之澄按叔姬稱子則是時君之女左傳誤以為舍母澄已辨之矣當從公榖義及何休陸淳之說但公榖言道淫是以齊之誣辭為實何氏言單伯送叔姬亦非竊詳事意齊舍年幼新立急欲求配居喪而娶文公之女故其逆其歸皆不書姬歸當是九月之末至齊而舍已被弒姬無所從故十月之初魯遣單伯往省商人固忌魯與舍為昏己既弒舍則又有所忌因單伯來省姬遂執單伯併姬而誣以曖昧之罪將以辱魯經書冬單伯如齊則是於叔姬歸齊之後如齊而非送叔姬也經書月五書日三大衍歷正月己卯小壬辰冬至二月戊申大三月戊寅小四月丁未大經五月乙亥在此月五月丁丑小六月丙午大癸酉二十八日七月丙子小八月乙巳大九月乙亥小甲申十日十月甲辰大十一月甲戌小十二月癸卯大長歷乙亥五月二十九日十有五年己酉匡王元年晉霸靈九蔡莊三十四曹文六衛成二十三鄭穆十六陳靈二杞桓二十五宋昭八齊懿公商人元年秦康九楚莊二春季孫行父如晉左傳曰為單伯與子叔姬故也澄按齊商人有可討之罪而魯弱不敢當齊之强使人與君女遭其執辱故上卿往聘於晉欲藉霸主之重請於齊以釋免其所執者也三月宋司馬華孫來盟宋卿書官義已見前華孫督之後名耦氏而不名者四命之孤卿與孔父蔡仲女叔同凡卿之不名者例書字父為最尊伯仲叔季次之稱孫者表其系亞於稱字者也趙氏曰不稱使與齊仲孫屈完義同從簡爾孫氏曰宋自僖公㑹諸侯於薄釋宋公之後未嘗與魯通問今華孫請來結盟于我以尋舊好啖氏曰凡不言君使者皆有義吕氏曰不言使自請之也髙郵孫氏曰其君暗亂國事廢弛賢臣外奔華孫懼鄰國之諸侯因其間隙而侵伐之於是來盟以紓其國之難夏曹伯來朝左傳曰諸侯五年再相朝杜氏曰十一年曹伯來朝至此五年乃來齊人歸公孫敖之喪左傳曰齊人或為孟氏謀曰魯爾親也飾棺置諸堂阜魯必取之從之卞人以告惠叔猶毁以為請立于朝以待命許之取而殯之齊人送之澄謂敖之喪得歸者以難之孝也六月辛丑朔日有食之鼓用牲于社左傳曰非禮也日有食之天子不舉伐鼓于社諸侯用幣于社伐鼓于朝齊氏指要曰莊二十五年鼓用牲于社傳云非常此稱非禮者前傳既非正陽之月時歷差誤則稱非常此年得當鼓之月但用幣非禮故傳變文言非禮也日有食之天子伐鼓于社責羣隂也諸侯用幣于社者社尊於諸侯故請救而不敢責之但伐鼓于朝自責其政事有闕謫于天爾單伯至自齊高氏曰內大夫為它國所執而見釋者皆書其至晉郤缺帥師伐蔡戊申入蔡左傳曰新城之盟蔡人不與晉郤缺以上軍下軍伐蔡曰君弱不可以怠入蔡以城下之盟而還髙氏曰蔡侯既與楚子次于厥貉故新城之盟不與焉晉郤缺帥師伐之斯有名矣凡伐不言入伐之不服然後入焉蔡雖附楚楚人不之救足以知楚之不足恃矣雖蔡人自取之然晉魯不修所以服楚而暴小國以爭諸侯欲使區區之蔡捍楚之强而不二則亦難矣是嵗蔡侯甲午卒不書其子申嗣是為文公張氏曰徒示威武暴及其民而蔡終不心服謂之能輔霸主服諸侯可乎秋齊人侵我西鄙高氏曰齊商人篡弒其君又執我國大夫罪不勝誅而反加兵于我澄按魯無得罪于齊齊之與師無名故曰侵季孫行父如晉高氏曰一嵗再如晉者皆為齊故冬十有一月諸侯盟于扈左傳曰晉侯宋公衛侯蔡侯鄭伯許男曹伯盟于扈尋新城之盟且謀伐齊也齊人賂晉侯故不克而還於是有齊難是以公不㑹澄按此非前目後凡之例而七國之君不列叙略之也晉侯霸主也而與諸國同稱諸侯不以霸主畀晉靈也蔡侯新遭伐入之威故暫二于楚而與中國之盟十有二月齊人來歸子叔姬趙氏曰書來歸于姬上者非嫁後之出故異其文焉澄曰若左氏所載事迹果是則經合書齊子叔姬來歸今不繫齊則為未嫁之女明矣髙氏曰晉㑹諸侯盟於扈受齊賂而不伐齊故齊人自歸子叔姬以解諸侯之意齊侯侵我西鄙遂伐曹入其郛左傳曰齊侵我謂諸侯不能也伐曹入其郛討其來朝也季文子曰齊侯其不免乎已則無禮而討于有禮者曰女何故行禮禮以順天天之道也已則反天而又以討人難以免矣襄陵許氏曰魯盡禮于晉而見侵弗恤曹修禮于魯而被伐莫救夫豈特齊之暴戾無道皆晉靈趙盾之責也髙氏曰齊商人弒君自立諸侯㑹于扈謀伐之晉人取賂而還商人知諸國之無能為益無顧忌肆其威暴且恚魯仗晉以謀已故一歲而再侵我惡魯而及曹非禮甚矣因我而加兵于曹曰侵可也而曰伐者討其朝魯執辭正也經書月四書日一大衍歷正月癸酉小丁酉冬至二月壬寅大三月壬申大四月壬寅小五月辛未大六月辛丑小朔日食戊申八日己巳小滿閏月庚午大七月庚子小旦日夏至八月己巳大九月己亥小十月戊辰大十一月戊戌小十二月丁卯大十有六年庚戌匡王二年晉霸靈十蔡文公申元年曹文七衛成二十四鄭穆十七陳靈三杞桓二十六宋昭九弒齊懿二秦康十楚莊三春季孫行父㑹齊侯于陽穀齊侯弗及盟左傳曰及齊平公有疾使季文子㑹齊侯于陽榖請盟齊侯不肯曰請侯君間澄曰及猶與也謂齊侯不與行父盟也高氏曰晉侯既幼不在諸侯齊侯恃强數見侵伐故魯不得已而事之以行父當齊侯宜齊侯之弗肯與盟也張氏曰文公即位之元年以㑹霸主為憚而付之公孫敖以取晉怒魯之不得志于晉者數十年今齊之亂公能修明政刑告天子方伯以討其罪則雖大國必畏之矣既不能然反使商人得以强大而威我親戚命使執辱于齊不唯邊鄙被患而與國與受其禍此有志者困心衡慮而圖之之時也而文公方且宴安于其國復使其臣犯分求盟以平纍年之隙抑何不思之甚哉夏五月公四不視朔榖梁傳曰四不視朔厭政已甚矣公羊傳曰四不視朔有疾也自是公無疾不視朔蘇氏曰定哀之間子貢欲去告朔之餼蓋不復視朔矣此公羊之所以為此言也然而五月書不視朔則六月視朔矣視朔之廢非始于此也杜氏曰諸侯每月必聽政因朝于廟今公不視二月三月四月五月之朔也趙氏曰公若誠有疾則不當譏據諸侯盟㑹文公三年不及又不㑹齊以此推之知公怠於國務非疾也髙氏曰朔者天子之所頒也諸侯上稟天子之命下授萬民之時故其奉正朔告于廟則謂之告朔退而視朝以授民則謂之視朔前此未有書不視朔者若其有疾則亦常事不書爾此特書者見公之非有疾而然也澄曰公不視朔非真有疾託疾以誑齊也今春季孫行父盟齊侯而齊不與盟必欲公自至公倦於往而畏齊之威故託疾以誑因不視朔乃遣公子遂往盟齊侯而齊侯與之盟蓋既託疾而又納賂故也按前書閏月不告朔猶朝于廟者其月雖不告朔然猶朝于廟朝廟之後退而視朝是視朔之禮不廢也今四不視朔則不告朔不朝廟從可知也在後每朔之禮未嘗廢唯因朝事㑹盟行師而出不在國則廢至則又復舉矣其後蓋因季氏逐昭公魯國無君者七年故廢告朔之禮昭公薨於外定公以元年六月方即位自是告朔之禮不復舉故子貢欲去其羊謂不告朔自文公始者非也六月戊辰公子遂及齊侯盟于郪丘郪公作犀榖作師左傳曰公使公子遂納賂於齊侯故盟于郪丘杜氏曰郪丘齊地髙氏曰陽榖之㑹齊侯弗及盟者非特行父奉使之失也晉為魯故㑹諸侯于扈將以伐齊齊侯賂之遂不果伐於是齊侯欲取償于魯焉至是公使公子遂納賂于齊而復求盟所以尋盟于郪丘則有辭矣謂公四不視朔實有疾故也然則春秋書公四不視朔非特譏公之怠亦以見公子遂得盟之由則知此盟非齊侯之欲故明年齊侯復伐我西鄙僅少紓而已秋八月辛未夫人姜氏薨僖公夫人文公母也毁泉臺公羊傳曰郎臺也未成為郎臺既成為泉臺毁何以書譏爾先祖為之已毁之不如勿居而已矣何氏曰莊公所築不當暴揚先祖之惡也孫氏曰惡勞民也築之勞毁之勞既築之又毁之可謂勞矣楚人秦人巴人滅庸左傳曰楚大饑庸人率羣蠻以叛楚䴢人率百濮聚于選於是申息之北門不啓楚人謀徙於阪高蒍賈曰我能往冦亦能往不如伐庸夫䴢與百濮謂我饑不能師故伐我也我若出師必懼而歸百濮離居將各走其邑誰暇謀人乃出師旬有五日百濮乃罷使廬戢黎侵庸庸人逐之囚子揚忩三宿而逸曰庸師衆羣蠻聚焉不如復大師且起王卒合而後進師叔曰不可姑又與之遇以驕之七遇皆北庸人曰楚不足與戰矣遂不設備楚子乘馹㑹師分為二隊以伐庸秦人巴人從楚師羣蠻從楚子盟遂滅庸高氏曰楚率秦巴以滅人之國則秦又聽服于楚矣夫城濮之役秦人在焉自是遂與中國盟㑹而晉襄因殽之役報復不已自是失秦矣夫秦兵之彊後世莫及焉使其協和以攘楚且討其弒君父之罪蓋有餘力而晉反棄秦以資楚此中國之所以不振也冬十有一月宋人弒其君杵臼杵公作處左傳曰宋公子鮑禮于國人宋饑竭其粟而貸之年自七十以上無不饋詒也無日不數于六卿之門國之材人無不事也親自桓以下無不恤也襄夫人助之施昭公將田孟諸未至夫人王姬使帥甸攻而殺之蕩意諸死之澄按宋昭公立九年不能其大夫國人襄夫人亦惡之出田孟諸甸徒攻而弒之故稱人以弒弒者賤人無名可書也蓋鮑見昭公之失衆心固有圖為君之意而未有篡謀也襄夫人雖有以鮑易杵臼之意而未萌殺心也昭公出田甸徒弒之而鮑與夫人因得遂其素志左傳之文宜刪夫人王姬使帥六字方與經協蓋謂甸衆知襄夫人之意而敢于行弒則可謂襄夫人使人帥旬弒之則未必然也孫氏曰稱人微者也名氏不登于史䇿胡氏曰蕩意諸死之而不得與孔父仇牧並書者君昏不能正危不能救坐待其死而與之同死所謂匹夫匹婦自經於溝瀆而莫之知也經書月四書日二大衍歷正月丁酉小壬寅冬至二月丙寅大三月丙申小四月乙丑大五月乙未小六月甲子大戊辰五日七月甲午小八月癸亥大辛未九日九月癸巳小十月壬戌大十一月壬辰小傳甲寅二十三日十二月辛酉大長歷是年閏五月十有七年辛亥匡王三年晉霸靈十一蔡文二曹文八衛成二十五鄭穆十八陳靈四杞桓二十七宋文公鮑元年齊懿三秦康十一楚莊四春晉人衛人陳人鄭人伐宋左傳曰晉荀林父衛孔達陳公孫寧鄭石楚伐宋討曰何故弒君猶立文公而還澄曰傳所載皆四國之卿而經書人者蓋元帥不行而遣裨將往伐也責其弒君是也但不當不誅弒君之人夏四月癸亥葬我小君聲姜聲公作聖左傳曰有齊難是以緩髙氏曰九月乃葬慢齊侯伐我西鄙左傳曰齊伐我襄仲請盟高氏曰齊猶以公不親盟復來討焉于此見郪丘之盟無益矣六月癸未公及齊侯盟于榖齊伐我而晉不能救公竟不免親與齊侯盟諸侯㑹于扈左傳曰晉侯搜于黃父遂復合諸侯于扈平宋也公不與㑹齊難故也澄曰晉侯不能為盟主而合諸侯故略之而不列序也秋公至自穀危之也冬公子遂如齊左傳曰拜榖之盟杜氏諤曰公及齊侯盟而冬又聘之故左氏謂之拜盟也經書月二書日二大衍歷正月辛卯大丁未冬至二月辛酉小三月庚寅大四月庚申小癸亥四日五月己丑大六月己未小癸未二十五日七月戊子大八月戊午小九月丁亥大十月丁巳大十一月丁亥小十二月丙辰大長歷癸亥四月五日癸未六月二十六日十有八年壬子匡王四年晉霸靈十二蔡文三曹文九衛成二十六鄭穆十九陳靈五杞桓二十八宋文二齊懿四秦康十二卒楚莊五春王二月丁丑公薨于臺下髙郵孫氏曰薨非路寢皆不正也臺下蓋又甚焉秦伯罃卒秦康公也在位十二年子稻嗣是為共公高氏曰秦雖伯益之後本附庸也僻在西夷自秦仲始大至平王時秦襄始有功於周室列於諸侯賜爵為伯穆公班於城濮之戰自後與中國交聘盟㑹遂霸西戎九年康公來歸僖公成風之襚始與魯通好至是遂書其卒夏五月戊戌齊人弒其君商人左傳曰齊懿公之為公子也與邴􅧬之父爭田弗勝及即位乃掘而刖之而使歜僕納閻職之妻而使職驂乘公遊于申池二人弒懿公納諸竹中歸舍爵而行齊人立公子元澄曰歜職皆賤者故稱人而不書名何氏曰商人弒君賊齊人以君事之張氏曰商人固當討之賊然齊人不以為賊北面稱臣而君之者三年以為賊則不當事以為君則不可弒今三年事之一旦弒之亂作於大分已定之後故曰弒其君也六月癸酉葬我君文公秋公子遂叔孫得臣如齊榖梁傳曰使舉上客而不稱介不正其同倫而相介故列而數之也左傳曰襄仲莊叔如齊惠公立故且拜葬也澄按公子遂將殺適立庶而先聘齊以請故託賀立君及拜葬二事以行也二卿同使者一卿賀齊立君一卿拜葬也冬十月子卒左傳曰文公二妃敬嬴生宣公敬嬴嬖而私事襄仲宣公長而屬之襄仲襄仲欲立之叔仲不可仲見于齊侯而請之齊侯新立而欲親魯許之仲殺惡及視而立宣公公羊傳曰子謂子赤也不曰弒也弒何以不曰不忍言也榖梁傳曰子卒不日故也何氏曰與子般異般書日孫氏曰成君弒不地子赤未逾年故不日以别之夫人姜氏歸于齊左傳曰大歸也將行哭而遇市曰天乎仲為不道殺嫡立庶市人皆哭魯人謂之哀姜季孫行父如齊告宣公之立也沙隨程氏曰遂得臣行父三人皆與謀以其前後如齊而知之也髙氏曰前乎子卒書如齊後乎子卒書如齊行父遂與公子遂同弒惡而立宣公故夫人姜氏歸于齊而行父遽如齊焉惡實齊之甥恐齊人聽夫人之訴而來討於是議納賂以請平焉魯國臣子之罪不可勝誅也莒弒其君庶其公羊傳曰稱國以弒者衆弒其君之辭也左傳曰莒紀公生太子僕又生季他愛季他而黜僕且多行無禮于國僕因國人以弒紀公以其寶玉來奔澄曰如左氏之言則是太子僕以子弒父也春秋何得不書而乃書國弒乎且僕既與國人同弒君則又何以奔魯乎或疑僕因國人之下以字當作之謂僕因國人之弒紀公懼并及禍故以其寶王來奔也經書月四書日三大衍歷正月丙戌小癸丑冬至二月乙卯大癸未大寒丁丑二十三日閏月乙酉小三月甲寅大旦日雨水四月甲申小經五月戊戌在此月五月癸丑大經六月癸酉在此月六月癸未小七月壬子大八月壬午小九月辛亥大十月辛巳小十一月庚戌大十二月庚辰小長歷丁丑二月二十四日戊戌五月十一日癸酉六月二十二日春秋纂言卷六
