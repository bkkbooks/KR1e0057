body:
  text: 春秋纂言總例卷四元吳澄撰賔禮如公如京師成十三古制諸侯初嗣位既免喪則朝王受命每當賔貢之年則朝于京師巡守之年則朝于方嶽春秋之時王室衰微諸侯傲慢朝王之禮廢而不講魯號秉禮之國猶然歷十二世二百四十二年之久僅有成公一如京師乃因會晉伐秦道自王都因而朝焉本意不在朝王也故經書曰公如京師而不曰朝也公如齊僖十十五三十三宣四五九十以上魯君如齊朝者七僖公兩朝齊桓事霸主也末年一朝齊昭繼前好也宣公四朝齊惠者以篡立之故懼諸侯之討而結齊以為援爾十年之再如者奔惠公之喪非朝也昭公二十七年之兩如則以播越在外而自鄆往投于齊非朝也宣公十年夏齊侯元卒公如齊昭公二十七年春冬公如齊自齊居于鄆以上三如不與朝齊之數公如晉文三十三成三四十八襄三四八十二二十一昭五十五以上魯君如晉朝者十二文公一朝晉襄一朝晉靈宣公當晉成晉景之時獨不朝晉者蓋懼往而就執故惟專意事齊時晉霸不競亦無暇問魯之罪成公兩朝晉景十年一如則奔晉景之喪非朝也末年一朝于悼襄公相繼四朝于悼時晉霸中興魯襄幼弱事霸惟謹二十一年之如昭公五年十五年之如則朝晉平晉昭也魯君之朝晉唯此十二如而已至若昭公二十八年二十九年其時播越居鄆自鄆如晉晉拒不納與夫二年十二年十三年二十一年二十三年之五如暨定公三年之一如皆為晉所拒而不納者也並書曰如朝與不朝不論美惡之辭如一不顯著其恥也聖筆之意深哉成公十年五月丙午晉侯獳卒公如晉昭公二年十二年十三年二十一年公如晉至河乃復二十三年公如晉至河有疾乃復定公三年公如晉至河乃復昭公二十八年二十九年公如晉次于乾侯以上九如不與朝晉之數公如楚襄二十八昭七以上魯君如楚朝者二楚之馮陵中夏甚矣然亦未能如魯何也襄之朝楚康昭之朝楚靈祗自辱爾齊晉霸國也以魯朝之猶云可也楚蠻荆也初亦小弱後以兼并吞滅諸小國而浸強大晉霸既衰不能與抗魯之朝楚非得已也屈禮義之望國朝崛起之南荒儻書曰朝辱莫甚焉止書曰如猶為諱其恥也聖人如之一字包含諸義如此古者諸侯相朝之禮相朝者齊等之國往來施報互相朝也非特小國朝大國而已天下無道則強陵弱弱役強惟有小國朝大國無復有齊等之國相朝者也故魯所朝者齊晉楚三大國宋衛陳鄭蔡之君與魯齊等則不相往來矣其往朝者畏其力也非若古先盛時相朝之禮故亦不書朝而但曰如也魯臣如京師公子遂僖二十八叔孫得臣文元仲孫蔑宣九叔孫豹襄二十四以上魯臣如京師聘者四春秋二百餘年天王之下聘於魯者七錫命者三會葬者二而魯臣之至王庭僅四聘二會葬而已四聘之一報宰周公也四聘之二拜錫命也皆因王使之來而後往四聘之三則傳云王使來徴聘也仲孫蔑一往而明年之冬王季子遄來報矣前此王使嘗兩聘魯隱三聘魯桓而魯皆不報噫王之於魯也若是其有禮而魯之於王也若是其不臣叔孫豹之聘春先聘晉冬乃聘王王宫之毁晉霸置之不問而夾鄏之城齊人自以為功晉有愧焉而往賀也然則四聘之如豈誠也哉豈禮也哉文八年公孫敖不至而復文九年叔孫得臣葬襄王昭二十二年叔鞅葬景王以上三如不與聘王之數魯臣如齊公子友僖七僖十三公子遂僖二十八文十七文十八同叔孫得臣宣元公孫敖文元季孫行父文十八宣元宣十公孫歸父宣十叔孫僑如成十叔老襄二十仲孫貜昭九叔孫州仇定十叔還襄五以上魯臣如齊聘者十六魯之聘齊也壤地相接從於強令也文末宣初之尤洊聘則醖釀成就宣公奪嫡之事爾莊三十二年公子慶文杜預云時魯無君假赴告以行文十四年單伯為子叔姬齊人執之宣十年公孫歸父葬齊惠公宣八年公子遂至黃乃復以上四如不與聘齊之數魯臣如晉公子遂僖三十僖三十一公孫敖文五季孫行父文六文十五再成六成十一公孫歸父宣十八公孫嬰齊成六叔孫豹襄四襄五同鄫世子巫襄十六襄二十四季孫宿襄六襄九襄十九昭六仲孫羯襄二十八襄二十九叔弓昭二昭八叔孫婼昭二十三季孫斯定六同仲孫何忌以上魯臣如晉聘者二十四晉為霸主魯之時聘固宜然或失之疏或失之數無所為者寡有所為者多無所為者之是不足以蓋有所為者之非也文六年公子遂葬晉襄公昭二年季孫宿歸少薑襚服昭十年叔孫婼葬晉平公昭十六年季孫意如葬晉昭公以上四如不與聘晉之數魯臣如宋公子遂文十一仲孫蔑成五叔孫豹襄二季孫宿襄二十叔孫婼昭二十五以上魯臣如宋聘者五魯宋地醜德齊其聘為講施報之常禮比之他如此善於彼襄三十年叔弓葬宋共姬昭十一年叔弓葬宋平公以上二如不與聘宋之數魯臣如陳公子友莊二十五如衛季孫宿襄七如邾叔孫豹襄六如楚叔弓昭六以上魯臣如陳衛邾楚聘者各一魯與陳前無交際因陳當國之卿與季友善是以有女叔之聘而季友躬往報之也如陳二莊二十七年公子友葬原仲文六年季孫行父聘且娶如牟一僖五年公孫兹娶如莒一成八年公孫嬰齊自為逆如滕一昭二年叔弓葬滕成公以上五如不與聘數人臣無私交大夫假聘以出而私葬其友可乎假聘以出而成己之昏尤不可也如滕為會葬故非聘也啖氏曰公及內卿往他國朝聘皆曰如趙氏曰內朝聘稱如以異外也澄按春秋書法凡盟會侵伐等名內外皆一其稱何獨朝聘則內但稱如以異乎外哉且魯事之異乎外者固有之矣魯君之奔不曰奔而曰孫魯臣之殺不曰殺而曰刺是也奔殺惡事也諱國惡辟其名宜也朝聘美事也豈應辟其名而乃不曰朝聘乎君臣同辭一概稱如聖人之意有在也何也魯所謂朝不成乎朝者也魯所謂聘不成乎聘者也不成乎朝而書曰朝不成乎聘而書曰聘是以其偽者為誠以其苟者為禮也魯事不容直譏顯刺隱其朝聘之名而書曰如則雖不滿於魯而辭意深厚然其朝聘之非誠非禮自不能掩此所以為聖人之筆也與魯君之如而非朝魯臣之如而非聘者各别而異之不與朝聘之數至若魯君臣之如觀社如納幣如逆女如致女及魯夫人之如並已見前嘉禮篇如涖盟見後盟例內如乞師見後軍禮篇外國君相如二齊侯鄭伯如紀桓五州公如曹同上外國君如會二陳侯如會僖二十八鄭伯髠頑如會襄七外國臣如會如師各一陳侯使袁僑如會襄三齊侯使國佐如師成二以上外國君臣之如凡六姑附于如例之後齊鄭同謀襲紀而假託相朝之如以往州公不知為何事故而亦假託相朝之如以行者也朝公朝于王所僖二十八再以上魯君朝王所者二魯成京師一朝經但書如而魯僖王所二朝經書曰朝何也曰春秋時諸侯不朝京師久矣幸有魯成十三年之一朝宜為聖人所喜而乃不滿焉蓋因伐秦之便道過周實不為行朝禮而往也古者天子巡守諸侯朝于方嶽之下王室衰微無復巡守襄王之臨踐土狩河陽雖非舊日天子之巡守而晉文率諸侯以朝王則與盛時諸侯朝方嶽之禮無以異也所以可書曰朝也觀魯僖于王所之書朝魯成如京師之不書朝聖人之意可見矣滕侯薛侯來朝隱十一滕子來朝桓二文十二襄六哀二以上滕君朝魯者五薛一附紀侯來朝桓二桓六以上紀君朝魯者二杞伯來朝莊二十七文十二成四成十八杞子來朝僖二十七以上杞君朝魯者五并朝其子凡六曹伯來朝文十一文十五成七襄二十一以上曹君朝魯者四并世子來朝凡五邾人葛人牟人來朝桓十五邾子來朝宣元成六成十八襄元襄十八定十五以上邾君朝魯者七葛牟各一附郳犂來來朝莊五小邾子來朝僖七襄七昭三昭十七以上小邾君朝魯者五郯子來朝襄七昭十七以上郯君朝魯者二穀伯綏來朝桓七鄧侯吾離來朝同上郜子來朝僖二十季姬及鄫子遇于防使鄫子來朝僖十四以上穀鄧郜鄫之君朝魯者各一曹伯使其世子射姑來朝桓五杞伯姬來朝其子僖二十四公及齊侯遇于穀蕭叔朝公莊二十三以上子若弟代君而朝者三曹一杞一蕭一凡外國君之朝魯共十五國聘天王使凡伯來聘隱七使南季來聘隱九使宰渠伯糾來聘桓四使仍叔之子來聘桓五使家父來聘桓八使宰周公來聘僖三十使王季子來聘宣十以上王使聘魯者七啖氏曰周禮云天子時聘以結諸侯之好穀梁言天子不當聘諸侯誤矣趙氏曰王政行也天子使使聘諸侯所以洽恩惠考政典春秋之聘通好命爾祭叔來聘莊二十三以上王臣自聘魯者一天子之大夫無王命而外聘諸侯非禮也齊侯使其弟年來聘隱七桓三使國歸父來聘僖三十三使國佐來聘宣十使慶封來聘襄二十七以上齊臣聘魯者五晉侯使荀庚來聘成三使士燮來聘成八使郤犨來聘成十一使士丐來聘成十八襄八使荀罃來聘襄元使士魴來聘襄十二使荀吳來聘襄二十六使士鞅來聘襄二十九昭二十一使韓起來聘昭二以生晉臣聘魯者十一宋公使華元來聘成四成八使向戌來聘襄十五使華定來聘昭十三以上宋臣聘魯者四衛侯使寧俞來聘文四使孫良夫來聘成二使公孫剽來聘襄元使孫林父來聘襄七以上衛臣聘魯者四荆人來聘莊二十三楚子使椒來聘文九使薳罷來聘襄三十以上楚臣聘魯者三陳侯使女叔來聘莊二十五鄭伯使公子發來聘襄五秦伯使術來聘文十一吳子使札來聘襄二十五以上陳鄭秦吳之臣聘魯者各一或曰魯國君臣之朝聘春秋但書曰如以其非誠非禮朝不成乎朝聘不成乎聘故也他國君臣之朝魯聘魯夫豈一出于誠悉合于禮乎而聖人皆以朝聘書之何哉曰春秋內魯而外諸國內之非誠非禮者慊其實而隱其名所以責於內者重以周也外國之君臣則彼以朝而來吾亦謂之朝可矣彼以聘而來吾亦謂之聘可矣所以責於外者輕以約也此聖人躬自厚而薄責於人之道也來祭伯來隱元祭公來桓八實來桓六齊仲孫來閔元介葛盧來僖三十九再白狄來襄十八來者如之對自內適外曰如自外適內曰來自外適內其禮至重者來朝來聘也具見于前矣而經又特書曰來不言其來之事者凡七祭公祭伯與實皆王朝之臣公者八命之公伯者六命之卿實之名者一命之下士若奉王命而下聘諸侯則固有其禮而祭伯之來實之來則非奉王命非行聘禮也故既不言使又不言其來之為何事祭公之來為逆王后則非無事亦非無王命矣先為己之私事適魯然後適紀逆后故經書其私事於先而曰來乃書其公事於後而曰遂也齊仲孫湫蓋受桓霸之命來省魯難然不備使介之禮俾若私行然覘視魯國安危之勢而歸復命爾故亦不書君使而來之下不言其事也介葛盧附庸之國未爵命者兩造魯庭為朝魯也而自以僻陋不能行朝禮故不曰來朝而但書曰來也白狄書來義亦同此其餘所書來為某事者重在某事義無關於來一一别論于後來錫三莊元年天王使榮叔來錫桓公命文元年天王使毛伯來錫公命成八年天子使召伯來錫公命來求三桓十五年天王使家父來求車隱三年武氏子來求賻文九年毛伯來求金來歸六歸不言來者三附見隱元年天王使宰咺來歸惠公仲子之賵定十四年天王使石尚來歸脤文五年王使榮叔歸含且賵不言來文九年秦人來歸僖公成風之襚莊六年齊人來歸衛俘隱八年鄭伯使宛來歸祊定十年齊人來歸鄆歡龜陰田宣十年齊人歸我濟西田不言來哀八年齊人歸歡及闡不言來來言一成八年晉侯使韓穿來言汶陽之田歸之于齊來獻二莊二十一年齊侯來獻戎捷僖二十一年楚人使鬬宜申來獻捷來輸平一平而非來者五附見隱六年鄭人來輸平昭七年暨齊平定十年及齊平定十一年及鄭平宣十五年宋人及楚人平宣四年公及齊侯平莒及郯莒人不肯來唁一唁而非來者二附見昭二十九年公居于鄆齊侯使髙張來唁公昭二十五年齊侯唁公于野井昭三十一年晉侯使荀躒唁公于乾侯魯臣去國來歸諸國君臣來奔及逃來並見前人紀篇來納幣來逆女來媵魯女來魯女被執被出來歸來逆魯女喪並見前嘉禮篇來盟來會見盟例會例下來戰來乞師見後軍禮篇來會葬來奔喪見後凶禮篇盟紀子伯莒子盟于密隱二齊侯鄭伯盟于石門隱三宋公齊侯衛侯盟于瓦屋隱八齊侯宋人江人黃人盟于貫僖二宋公曹人邾人盟于曹南僖十九楚子陳侯鄭伯盟于辰陵宣十一齊侯鄭伯盟于鹹定七齊侯衛侯盟于沙同上衛侯鄭伯盟于曲濮定八鄫子會盟于邾僖十九以上外君相盟者九或外君兼外臣盟者不别出會盟一附見盟非盛世事也不得已而有蓋為衰世之亂邦罷民設春秋時王政不行諸侯自恣欲以戰伐而敵讎則不得不以盟會而固黨會不足恃而重之以盟人不自信而要之於神故凡書盟者春秋所惡也春秋魯史也隱之元年書及邾及宋二盟矣他國之盟於魯何與而書者有其故也紀虞齊難而新結魯昏紀莒之盟魯為紀謀也然魯邾魯宋紀莒各為其國而盟爾永嘉陳氏曰特相盟不書必關於天下之故而後書書齊鄭盟于石門以志諸侯之合書齊鄭盟于鹹以志諸侯之散是春秋之始終也莒紀無足道也齊鄭合天下始多故矣天下之無王鄭為之也天下之無霸齊為之也澄謂觀春秋世變陳氏之識超矣齊鄭盟石門繼以宋齊衛瓦屋之盟諸侯之黨合而無王近已胚胎齊霸之糾合矣齊鄭盟鹹繼以齊衛鄭沙曲濮之盟諸侯之黨散而無霸逺已醖釀秦雄之并吞矣貫之盟齊桓霸業之方盛也曹南之盟宋襄霸圖之肇起也辰陵之盟楚莊間霸之不可遏也閲世變者傷之故以外君相盟居盟例之首公會齊侯盟于艾隱六公會紀侯莒子盟于曲池桓十二公會宋公燕人盟于穀丘同上公會鄭伯盟于武父同上公會齊侯紀侯盟于黃桓十八公會齊侯盟于柯莊十三公會齊侯盟于扈莊二十三公會齊侯宋公陳世子欵鄭世子華盟于寧母僖七公會王人齊侯宋公衛侯許男曹伯陳世子欵盟于洮僖八公會齊侯宋公陳侯衛侯鄭伯許男曹伯盟于牡丘僖十五公會衛子莒慶盟于洮僖二十五公會莒子衛寧速盟于向僖二十六公會晉侯齊侯宋公蔡侯鄭伯衛子莒子盟于踐土僖二十八公會晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子膝子薛伯杞伯小邾子盟于澶淵襄二十公會齊侯莒子邾子杞伯盟于鄟陵昭二十六公會齊侯盟于黃定十二以上魯君會外君盟者十六凡言會者外為志言及者內為志也諸侯盟于首止僖四諸侯盟于葵丘僖九諸侯盟于扈文十五諸侯盟于祝柯襄十九諸侯同盟于重丘襄二十五公會諸侯盟于薄僖二十一公會諸侯盟于宋僖二十七公會諸侯晉大夫盟于扈文七公及諸侯盟于皋鼬定四以上盟稱諸侯者九首止之會有王世子葵丘之會有宰周公不言諸侯盟以見王世子宰周公不與盟也不再列序者前目後凡也于扈二盟則前無其目後言諸侯不知諸侯為誰蓋時晉霸失政諸侯離心與盟之君不足序也魯君不與則但總言諸侯魯君與盟則前無其目不得不稱公會不得不稱主盟者也晉大夫不書氏名其時晉未有君也與莊九年書齊大夫同祝柯前年圍齊之諸侯也亦前目後凡也同盟十六惟重丘再稱諸侯者衛地與盟地異中間又有入陳二事間之也皋鼬亦然會盟各地又有滅沈一事間之然祝柯無公及而皋鼬書公及何也蓋定公之立非正嘗朝晉而晉不納故因此會而求盟以定其位也于薄于宋二盟則楚方主事魯為楚而往也諱魯之往會楚而受盟也故總言諸侯而包楚於其中也公及邾儀父盟于蔑隱元公及鄭伯盟于越桓元公及邾儀父盟于趡桓十一公及齊侯盟于落姑閔元公及晉侯盟文三文十三公及齊侯盟于穀文十七公及晉侯盟于長樗襄三以上魯君及外君盟者八盟于趡左氏作公會今從公穀公會陳人蔡人楚人鄭人盟于齊僖十九公會王人晉人宋人齊人陳人蔡人秦人盟于翟泉僖二十九以上魯君會外臣盟者二左氏穀梁二會字上並無公字今從公羊公及齊大夫盟于蔇莊九公及莒人盟于浮來隱八公及楚人秦人宋人陳人衛人鄭人齊人曹人邾人盟于蜀成二以上魯君及外臣盟者三趙氏曰特書公譏公與臣盟也及宋人盟于宿隱元及齊髙傒盟于防莊二十二及晉處父盟文二及荀庚盟成三及孫良夫盟同上及郤犨盟成十一及孫林父盟襄七及向戌盟襄十五及蘇子盟于女栗文十及國佐盟于袁婁成二以上及盟不稱主者八及王臣盟者一如師及盟者一附見趙氏曰及者公及之也不書公諱與大夫盟恥也及蘇子諱與天子大夫盟也陸氏曰齊髙傒晉處父俱書名罪其以臣敵君公屈體而與之盟則非彼之過故但書人柔會宋公陳侯蔡叔盟于折桓十一公孫敖會宋公陳侯鄭伯晉士縠盟于垂隴文二仲孫貜會邾子盟于祲祥昭十一以上魯臣會外君盟者三公子結媵陳人之婦于鄄遂及齊侯宋公盟莊十九公子遂及齊侯盟于郪丘文十六臧孫許及晉侯盟于赤棘成元仲孫何忌及邾子盟于拔定三叔孫州仇仲孫何忌及邾子盟于句繹哀二以上魯臣及外君盟者五趙氏曰大夫盟公侯非禮也其無譏非強之也陸氏曰彼自屈禮非我力能強之公子遂會晉趙盾盟于衡雍文八仲孫速會莒人盟于向襄二十以上魯臣會外臣盟者二季孫行父及晉郤犨盟于扈成十六叔孫豹及諸侯之大夫及陳袁僑盟襄三豹及諸侯之大夫盟于宋襄二十七以上魯臣及外臣盟者三公會晉侯宋公衛侯鄭伯曹伯莒子邾子薛伯杞伯小邾子于溴梁大夫盟襄十六以上盟稱大夫者一經嘗兩書諸侯之大夫則大夫猶繫之君也溴梁之會君會而大夫自盟則大夫專之所由也齊人衛人鄭人盟于惡曹桓十一宋人齊人楚人盟于鹿上僖二十一以上外臣相盟者二同盟于幽莊十六莊二十七于新城文十四于斷道宣十七于蟲牢成五于馬陵成七于蒲成九于戚成十五于柯陵成十七于雞澤襄三于戲襄九于亳城北襄十一于重丘襄二十五于平丘公不與盟昭十三于虛朾成十八于清丘宣十二以上同盟者十六魯君會者十四魯臣會者一外自盟者一永嘉吕氏曰同盟者未專主盟也有主盟則不書同于幽之盟書同則齊桓霸業未盛之時新城以後書同則晉人霸業漸衰之際也杞子來盟襄二十九鄭伯使其弟語來盟桓十四衛侯使孫良夫來盟宣七齊髙子來盟閔二宋司馬華孫來盟文十五楚屈完來盟于師僖四以上來盟者五來盟于師一附見公子友如齊涖盟僖三公孫敖如莒涖盟文七叔孫婼如齊涖盟昭七叔還如鄭涖盟定十一以上涖盟者四啖氏曰他國來魯盟者曰來盟魯往他國盟者曰涖盟趙氏曰不書其誰敵者也公及戎盟于唐隱二桓二公子遂會雒戎盟于暴文八齊人狄人盟于邢僖二十衛人及狄盟僖三十二以上戎狄盟者五及戎及狄以內而及外也齊人狄人則儕矣公子遂會之則彼為主矣會胥命蔡侯鄭伯會于鄧桓二齊侯宋人陳人蔡人邾人會于北杏莊十三齊侯宋公陳侯衛侯鄭伯會于鄄莊十五齊侯宋公江人黃人會于陽穀僖三宋公楚子陳侯蔡侯鄭伯許男曹伯會于盂僖二十二晉侯宋公衛侯鄭伯曹伯會于扈宣九楚子蔡侯陳侯鄭伯許男徐子滕子頓子胡子沈子小邾子宋世子佐淮夷會于申昭四齊侯衛侯鄭遊速會于安甫定十齊侯宋公會于洮定十四諸侯會于扈文十七以上外君相會者九或外君兼外臣會者不别出諸侯會者一附見蔡鄭會鄧中國懼楚之始也齊會北杏中國有霸之始也其關於天下之故不小矣故亦以外君相會居會例之首諸侯相見於國曰朝相見於野曰會或各國君臣相見或各國臣自相見或講好或謀事俱謂之會公會齊侯于防隱九公會齊侯鄭伯于中丘隱十公會鄭伯于時來隱十一公會鄭伯于垂桓九公會齊侯鄭伯于稷以成宋亂桓二公會齊侯于嬴桓三公會紀侯于郕同上公會齊侯于歡同上公會紀侯于成桓六公會宋公于夫鍾桓十一公會宋公于闞同上公會宋公于虛桓十二公會宋公于龜同上公會鄭伯于曹桓十四公會齊侯于艾桓十五公會宋公蔡侯衛侯于曹桓十六公會齊侯于濼桓十八公會齊侯于城濮莊二十七公會齊侯宋公鄭伯曹伯邾人于柳僖元公會宰周公齊侯宋子衛侯鄭伯許男曹伯于葵丘莊九公會齊侯宋公陳侯衛侯許男曹伯于鹹僖十三公會齊侯宋公陳侯衛侯鄭伯許男邢侯曹伯于淮僖十六公會晉侯齊侯宋公蔡侯鄭伯陳子莒子邾子秦人于溫僖二十八公會齊侯于平州宣九公會晉侯宋公衛侯鄭伯曹伯于黑壤宣七公會晉侯衛侯于瑣澤成十二公會晉侯齊侯衛侯宋華元邾人于沙隨不見公成十六公會晉侯宋公陳侯衛侯鄭伯曹伯莒子邾子滕子薛伯齊世子光吳人鄫人于戚襄五公會晉侯宋公陳侯衛侯曹伯莒子邾子于鄬襄七公會晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯小邾子伐鄭會于蕭魚襄十一公會晉侯宋公衛侯鄭伯曹伯莒子邾子薛伯杞伯小邾子于溴梁襄十六公會晉侯齊侯宋公衛侯鄭伯曹伯莒子于商任襄二十一公會晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子薛伯杞伯小邾子于沙隨襄二十二公會晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于夷儀襄二十四襄二十五公會劉子晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于平丘昭二十公會齊侯于夾谷定十公會齊侯衛侯于牽定十四公會衛侯宋皇瑗于鄖哀十二以上魯君會外君者三十九衛侯會公于沓文十三鄭伯會公于棐文十三邾子來會公定十四以上外君會魯君者三公會楚公子嬰齊于蜀成二公會晉人鄭良霄宋人曹人于澶淵襄二十六公會晉師于瓦定八以上魯君會外臣者二會師一附見單伯會齊侯宋公鄭伯于鄄莊十四公孫敖會晉侯于戚文九季孫行父會齊侯于陽穀文十九公孫歸父會齊侯于穀宣十四公孫歸父會楚子于宋宣十五季孫宿會晉侯鄭伯齊人宋人衛人邾人于邢丘襄八叔弓會楚子于陳昭九以上魯臣會外君者七叔仲彭生會晉郤缺于承匡文十一仲孫蔑會齊髙固于無婁宣十五叔孫僑如會晉荀首于穀成五仲孫蔑會晉荀罃宋華元衛孫林父曹人邾人于戚襄二仲孫蔑會晉荀罃齊崔杼宋華元衛孫林父曹人邾人滕人薛人小邾子于戚同上季孫宿會晉士丐宋華閲衛孫林父鄭公孫蠆莒人邾人于戚襄十四叔孫豹會晉士丐于柯襄十九叔孫豹會晉趙武楚屈建蔡公孫歸生衛石惡陳孔奐鄭良霄許人曹人于宋襄二十七叔孫豹會晉趙武楚公子圍齊國弱宋向戌衛齊惡陳公子招蔡公孫歸生鄭罕虎許人曹人于虢昭元季孫意如會晉韓起齊國弱宋華亥衛北宫他鄭罕虎曹人杞人于厥憗昭十一叔詣會晉趙鞅宋樂大心衛北宫喜鄭遊吉曹人邾人滕人薛人小邾人于黃父昭二十五季孫意如會晉荀躒于適歷昭三十一以上魯臣會外臣者十二晉人齊人宋人衛人鄭人曹人莒人邾人滕人薛人杞人小邾人會于澶淵宋災故襄三十晉士鞅宋樂祁犂衛北宫喜曹人邾人滕人會于扈昭二十七以上外臣相會者二公及齊侯宋公陳侯衛侯鄭伯許男曹伯會王世子于首止僖五以上及以會而尊之者一所謂殊會也公會晉侯及吳子于黃池哀十三以上會以及而外之者一吳子書及説者以為會兩霸之辭與之以霸又書其爵雖若進之實則外之也公會晉侯宋公衛侯曹伯莒子邾子滕子薛伯杞伯小邾子齊世子光會吳于柤襄十叔孫僑如會晉士燮齊髙無咎宋華元衛孫林父鄭公子鰌邾人會吳于鍾離成十五季孫宿叔老會晉士丐齊人宋人衛人鄭公孫蠆曹人莒人邾人滕人薛人杞人小邾人會吳于向襄十四以上會以會而外之者三殊會王世子者尊之也不敢以下同於諸侯也殊會吳者外之也不使之內同於巾國也仲孫蔑衛孫林父會吳于善道襄五叔還會吳于柤哀六公會吳于鄫哀七公會吳于橐皋哀十二公會戎于濳隱二晉侯會狄于攢函宣十一以上會而外之者六吳之下不書爵又不稱人外之也不內同諸侯也春秋嘗外楚矣敗蔡入蔡書荆外之也僖之元年荆改號楚則繼書人又繼書爵以漸而進之於中國矣吳初書國與荆同也繼而書人書爵與楚同也繼又但以國書則不得與楚同矣繼又與晉同會而又進書爵於是乎春秋終焉齊侯衛侯胥命于蒲桓三以上胥命者一命當自天子出故諸侯既免喪必受命於天子始得君其國况命之為伯以長諸侯此命之重大者也晉文敗楚於城濮王使尹氏王子虎內史叔興父策命之為侯伯至是始可稱命伯齊僖欲伯東州為無上命乃與衛相結俾衛侯命已已命衛侯自相推尚相命為伯可謂亂命也已其後齊桓受教管仲雖無王命而自為伯葵丘之會王但使宰周公賜胙尊之比於二王後終未命之為伯也此亦二君相會然胥命之事非常故書胥命而不書會今以附于會例之末云遇公及宋公遇于清隱四公及齊侯遇于穀莊二十三公及齊侯遇于魯濟莊三十宋公衛侯遇于垂隱八齊侯陳侯鄭伯遇于垂莊四宋公衛侯遇于梁丘莊三十二公會衛侯于桃丘弗遇桓十以上魯君外君之遇者六會而弗遇者一附見遇者會之簡略者也謂若道途偶相邂逅然至公至自會僖十五十七文十四宣八十七成六七九十五十六再十七襄三五十十一十六二十二十二再二十四二十五昭十三定四十四哀十三以上魯君自會而至者二十六公至自齊莊二十三再二十四僖三十三宣四五九十再公至自晉文四十四成三四十一十八襄三五八十三二十一昭五十四十六公至自楚襄二十九昭七公至自唐桓二公至自穀哀十七公至自瓦定八公至自夾谷定十公至自黃定十二以上魯君自某國某地而至者三十公至自伐楚僖四公至自伐秦成十三公至自伐齊僖二十六襄十九哀十公至自伐鄭桓十六僖六成三成十七襄十襄十一公至自伐衛莊六公至自伐戎莊二十六公至自伐萊宣七公至自侵鄭定六公至自侵齊定八再公至自救陳襄五公至自圍許僖二十九公至自圍成定十二以上魯君自伐侵救圍而至者二十啖氏曰凡公行總一百七十有六書至者八十有二不書至者九十有四因時君告廟不告廟也澄按啖説取左氏義然天子諸侯之行其行其反必皆告廟蓋人子出告反靣之禮不死其親故也歸而告廟亦常事爾春秋何為而書之乎竊詳穀梁傳義為得經意糾合諸侯自齊桓始幽柳首止寧母至葵丘鹹八大會魯君皆與並不書至穀梁傳曰桓會不至安之也得經意矣末年牡丘淮二會乃書公至范寧注曰桓會不至齊桓德衰故危而至之得傳意矣淮之會魯君為齊所止聲薑出會齊桓始得釋以此知書至之為危之也伐楚伐鄭二役書至者兵凶戰危不比衣裳之會故至也齊桓既歿僖公朝齊非所宜朝故至也由是推之桓莊文宣成襄昭定哀之行其書至者大率危之也危之若何或事之難或動之非或地之逺或時之久皆是危道幸其禮成事畢而遄至故書也穀梁於襄公朝楚之傳曰至自楚喜之也殆其往而喜其反也澄故以為得經意也魯夫人惟文九年出薑如齊歸寧為得禮故特書其至其餘夫人之行皆非美事故不書至也然則出薑之至亦危之乎曰婦人無外事禮合歸寧不得已而出亦以其得至國為喜也未至以前詎敢以為安乎彼非禮而行者固不足道又奚恤其危也哉公還自晉文十三歸父還自晉宣十八以上魯君魯臣自某國而還者二至者自外反而已至國也還者自外反而猶在路也陸氏曰還比復為善還者事畢復者事未畢公還自晉歸父還自晉莊八年師還襄十九年士丐聞齊侯卒乃還皆不當更往故曰事畢公如晉至河乃復至河有疾乃復公孫敖如京師不至而復公子遂如齊至黃乃復皆事未畢而復也穀梁云還者事未畢復者事畢文倒也單伯至自齊文十五意如至自晉昭十四婼至自晉昭二十四以上魯臣自某國而至者三魯之三臣為齊晉所執幸得解脫故書其至以此見經之書至者非美事也公至自會居于鄆昭二十六公至自齊居于鄆昭二十六昭二十七再公至自乾侯居于鄆昭二十九以上魯君自外而至居于某地者五昭公出奔居外顛沛如此何廟之可告而亦書至左氏乃謂告廟而後書至豈其然乎公之喪至自齊桓十八公之喪至自乾侯定元夫人氏之喪至自齊僖元以上魯君魯夫人之喪自外而至者三春秋纂言總例卷四
