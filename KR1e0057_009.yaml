body:
  text: 春秋纂言卷二元吳澄撰桓公名軌史記作允惠公之子隱公之弟母仲子夫人文薑在位十八年元年庚午桓王九年蔡桓四年曺桓四十六年衛宣八年晉哀七年鄭莊三十三年陳桓三十四年杞武四十年宋殤九年齊僖二十年秦寧五年楚武三十年春王正月公即位穀梁傳曰先君不以道終則不忍即位也繼故而即位與聞乎弒也啖氏曰凡天子崩諸侯薨既殯而嗣子為君未就阼階之位來年正月朔日乃就位南面而稱元年先君正終則嗣子逾年行即位禮先君遇弒則嗣子廢即位之禮桓公繼弒君而行即位禮與弒也三月公會鄭伯于垂髙氏曰鄭伯知公之篡逆不自安特為好會將以求賂焉度魯亟于會諸侯必從所欲故也夫鄭伯與隱公同盟今見其賊不能討反有所邀求欲以定其位是誠何心哉鄭伯以璧假許田穀梁傳曰非假而曰假諱易地也許田者魯朝宿之邑也禮天子在上諸侯不得以地相與也劉氏曰許田周公之邑也詩云居常與許復周公之宇其稱田何田多邑少稱田邑多田少稱邑蘇氏曰許田所以易祊也以祊為未足而益之以璧爾程子曰隱之八年鄭伯使宛來歸祊蓋欲易許田魯受祊而未與許及桓弒立故為會而求之復加以璧朝宿之邑先祖受之于先王豈可相易也故諱之曰假夏四月丁未公及鄭伯盟于越髙氏曰會垂之時固欲結鄭援以自安以垂會未可保其必信也故又盟而位乃定焉鄭既得許田始與公為此盟也張氏曰越近垂地名鄭人欲得許田以自廣是以為垂之會桓公欲結鄭好以自安是以為越之盟書及內志也秋大水髙郵孫氏曰大者非常之辭水非常而為災或害民禾稼敗民廬居為災則書也張氏曰隂盛惡逆之氣所感也冬十月經書月四書日一大衍厯正月戊申小戊午冬至二月丁丑大三月丁未小四月丙子大五月丙午小經四月丁未在此月六月乙亥大七月乙巳小八月甲戌大九月甲辰小十月癸酉大十一月癸卯小十二月壬申大長厯丁未田月二日二年辛未桓王十年蔡桓五曺桓四十七衛宣九晉哀八鄭莊三十四陳桓三十五杞武四十一宋殤十弒齊僖二十一秦寧六楚武三十一春王正月戊申宋督弒其君與夷及其大夫孔父榖梁傳曰孔氏父字督欲弒君先殺孔父孔父先死其曰及何也尊及卑春秋之義也公羊傳曰孔父立于朝人莫敢致難于其君者孔父存則殤公不可得弒也孫氏曰孔父諸侯之大夫命于天子者宋孔父鄭祭仲魯單伯陳女叔是也澄曰督宋大夫再命者孔父宋大夫四命天子所命者宋穆公和立其兄宣公之子與夷是為殤公使其子馮出居于鄭鄭莊公欲納之宋鄭屢交兵以此之故督執國政蓋黨于馮者欲弒殤公立馮而憚孔父故先攻殺孔父而後殤公可得而弒先書弒君者尊卑之序又以見孔父為君而死也髙氏曰按宋世系正考父生嘉字孔父其孫睪夷因以為氏昔人名嘉而字孔者多矣鄭公子嘉楚成嘉皆字子孔滕子來朝胡氏曰隱公末年滕稱侯距此三嵗爾乃降而稱子孫氏曰杞公爵也滕薛皆侯也入春秋杞或稱侯或稱伯或稱子皆降也滕或稱侯或稱子稱侯正也稱子降也薛或稱侯或稱伯稱侯正也稱伯降也此蓋聖王不作朝會不常彼三國者力既不足禮多不備或以侯禮而朝或以伯子而會孔子從而録之以見其亂也澄曰隱十一年稱侯今降稱子者蓋國小財匱不能備以七為節之禮故自降其等而以五為節也此義文蓋朱子之意與孫氏意同諸家或以為貶或以為誤或以為時王所黜俱未安三月公會齊侯陳侯鄭伯于稷以成宋亂左傳曰宋殤公立十年十一戰民不堪命孔父嘉為司馬督為太宰殺孔父弒殤公召莊公于鄭而立之以郜大鼎賂公齊陳鄭皆有賂故遂相宋公會稷以成宋亂為賂故也杜氏曰稷宋地胡氏曰春秋列會未有言其所為者獨此與襄公末年會于澶淵各書其事督弒殤般弒景皆天下大惡一則受宋賂而立華氏一則謀宋災而不討弒君之賊也張氏曰四國之君若能奉天討如隱四年之誅州吁則其亂不得成矣魯桓弒隱方以類合三國黨惡謀以賄行相與定宋馮立華督而相之反易天常者得以肆志所以直書成亂深著四國之罪永嘉吕氏曰不書以成宋亂則稷之會疑于謀討督不書宋災故則澶淵之會疑于謀討蔡直書其所為而後是非善惡之實著夏四月取郜大鼎于宋戊申納于大廟榖梁傳曰桓內弒其君外成人之亂受賂而退以事其祖周公弗受也杜氏曰大廟周公廟也程子曰四國成宋亂而宋以鼎賂魯魯取成亂之賂器置于周公廟周公其饗之乎髙郵孫氏曰鼎自宋得之然鼎之成自郜也不啻和氏之璧是也秋七月紀侯來朝紀左作杞程子曰凡杞稱侯者皆當為紀杞爵非侯文誤也及紀侯大去其國之後把不復稱侯矣胡氏曰齊欲滅紀紀求魯為之主非為桓立而朝之也澄曰齊謀并紀而鄭助之紀國小弱為齊鄭所謀度不能自存以魯與齊鄭睦故來朝魯將求庇焉然魯桓內負弒逆之惡而外黨弒逆之賊滅天理之人也于所厚者薄無所不薄矣又何能庇婚姻之微國哉蔡侯鄭伯會于鄧左傳曰始懼楚也杜氏曰潁川召陵縣西南有鄧城胡氏曰其地以國鄧亦與焉楚自西周已為中國之患宣王蓋嘗命將南征矣及周東遷僣號稱王馮陵江漢此三國者地與之鄰是以懼也其後卒滅鄧虜蔡侯而鄭以王室懿親為之服役終春秋之世聖人蓋傷之也髙氏曰左氏以為懼楚時楚雖已僣號尚未入侵中國何為而先自懼乎隱四年蔡與宋陳魯伐鄭十年又與宋衛伐鄭其積怨未解今鄭與齊宋魯陳皆釋去前憾故蔡與鄭于是始平于鄧也然至四年而蔡人復從王伐鄭則此會亦不足恃鄧嬴姓侯國也九月入杞程子曰將卑師少外則稱入內則止曰入某伐某髙氏曰以滕紀皆來朝而杞獨不至故也此年入杞八年伐邾夫桓弒君莫入莫伐而已乃入人伐人是使天下共蒙其恥也公及戎盟于唐左傳曰修舊好也澄曰舊好隱公二年盟唐之好也然隱公因戎之請盟至再而後與之盟今戎不請盟而桓及之盟蓋與及鄭盟越之意同以已之負大惡而欲結好以自固無間于內外也冬公至自唐程子曰君出而書至者有三告廟也過時也危之也桓公弒立嘗與鄭齊陳會矣皆同為不義及逺與戎盟故危之而書至戎若不如三國之黨惡則討之矣是以為桓危之也討賊天下之大義戎或能知也張子曰春秋主魯何乃欲戎之討魯君乎蓋聖人初未嘗以主魯而廢拯救三綱之心也程子之傳精矣澄曰春秋書魯君之出而告至自此始古者諸侯出歸必朝于廟此亦常事不當書其書者有意也桓公弒君篡立周失其紀天下無伯列國諸侯無有知義者庶幾求諸野乎使戎能如陳侯之于州吁則諸夏有所不如矣程子所謂危之者邪髙郵孫氏曰春秋書至者皆至其所出之事以地至者四此年公至自唐十七年公至自穀定八年公至自瓦十年夏公至自夾谷四處爾趙子以為魯地則至自地是也經書月五書日二大衍厯正月壬寅小戊申七日癸亥冬至二月辛未大三月辛丑小四月庚午大五月庚子大經四月戊申在此月六月庚午小七月己亥大八月己巳小九月戊戌大丙寅處暑閏月戊辰小十月丁酉大丁酉秋分十一月丁卯小丁卯霜降十二月丙申大長厯戊申正月八日四月戊申亦在五月三年壬申桓王十一年蔡桓六曺桓四十八衛宣十晉哀九鄭莊三十五陳桓三十六杞武四十二宋莊公馮元年齊僖二十二秦寧七楚武三十二春口正月桓之經自三年至八年十一年至十七年春首月不書王皆文闕胡氏曰以為闕文安得一公之一十四年皆闕永嘉吕氏曰春秋授諸弟子其傳之也豈能無脫文哉桓不書王十四不書秋冬二以是知桓公之春秋多闕或曰桓無王明天討不加也然桓宣二公皆篡弒皆天討不加宣未嘗無王而桓獨無王聖人用法何乃如是之異况當時諸侯以篡弒得國者非獨一桓公也何以不去王乎若實以桓公無王而不書王則當始末盡然又奚元年二年十年末年書王乎公會齊侯于嬴嬴之會蓋求昏于齊也以國君娶夫人不由媒介而自往求焉非禮也杜氏曰嬴齊邑今泰山嬴縣夏齊侯衛侯胥命于蒲劉氏曰齊太公之後東州之侯衛康叔之後西州之侯胥命相命也古者方伯州牧命於天子諸侯自相命非也髙氏曰胥命者何相推為牧伯也張氏曰齊衛欲私天下之權于已必求勢力之均者相遜相先乃敢專之蒲之胥命正齊桓非命伯而專征之始也朱子曰齊衛胥命于蒲相命為伯也齊魏會于濁澤以相王相命為王也齊致西帝于秦秦致東帝于齊相命為帝也澄謂齊衛之相命為伯猶漢末朝命不行于天下而州牧表某人為某州牧也杜氏曰蒲衛地在陳留長垣縣西南六月公會紀侯于郕紀左作杞紀憂齊鄭之圖已而求庇于魯公因其來朝而遂與之會也髙氏曰紀懼齊親魯郕亦然秋七月壬辰朔日有食之既榖梁傳曰言日言朔食正朔也公羊傳曰既盡也程子曰食盡為異大也髙氏曰經書日食三十六而食之既者二此年與宣八年秋七月也公子翬如齊逆女公不親逆而使卿逆啖氏曰以公子尤不可也胡氏曰娶妻必親逆禮之正也若夫邦君以爵則有尊卑以國則有小大以道途則有逺邇或迎之于其國或迎之於境上或迎之於所館禮之節也紀侯於魯以小大言則親之者也而使履緰來魯侯于齊以逺邇言則親之者也而使公子翬往是不重大昏之禮失其節矣故書九月齊侯送薑氏于歡左傳曰凡公女嫁于敵國姊妹則上卿送之公子則下卿送之於大國雖公子亦上卿送之於天子則諸卿皆行公不自送于小國則上大夫送之公羊傳曰諸侯越境送女非禮也澄曰魯桓不親迎故齊侯逺送其女至於魯之境按士昏禮父之送女也不下堂况國君之尊送女出境禮之所無也杜氏曰歡魯地濟北蛇丘縣有下歡亭公會齊侯于歡齊僖送其女至歡而魯桓親往受之非禮故書或者乃謂諸侯不出疆親迎但當迎之於其館果若是則魯為得禮何以譏張氏曰齊僖愛其女越境送之魯桓之出不為親迎而為齊侯在歡特往會之僖之送桓之會皆非禮也夫人薑氏至自齊穀梁傳曰其不言翬之以來何也公親受之于齊侯也孫氏曰此齊侯送薑氏公受之于歡也受薑氏于歡不以歡至者不與公受於歡也故書至自齊以正其義冬齊侯使其弟年來聘左傳曰致夫人也杜氏曰女出嫁又使大夫隨加聘問在魯而出則曰致女在他國而來則總曰聘澄曰齊侯親送女至魯境歸未幾又使貴介弟致之見其愛女之至情之私非禮之正也有年穀梁傳曰五穀皆熟為有年公羊傳曰有年僅有年也大有年大豐年也何氏曰宣十六年大有年謂五穀皆大成熟此有年謂五穀多少皆有不能大成熟程子曰人事順于下則天氣和于上桓弒君逆理天地之氣為之謬戾今乃有年故書其異髙郵孫氏曰春秋二百四十二年而書有年大有年者二而已其一桓公其一宣公桓宣大惡行何道而有年乎書有者不宜有也經書月四書日一大衍厯正月丙寅小戊辰冬至二月乙未大三月乙丑小四月甲午大五月甲子小六月癸巳大七月癸亥小八月壬辰大朔日食經書七月壬辰朔食蓋閏差故爾九月壬戌小十月辛卯大十一月辛酉小十二月庚寅大四年癸酉桓王十二年蔡桓七曺桓四十九衛宣十一晉小子侯元年鄭莊三十六陳桓三十七杞武四十三宋莊二齊僖二十三秦寧八楚武三十三春正月公狩于郎啖氏曰搜狩常事不書非時及越禮則書張氏曰狩者冬獵之名當用夏時之仲冬周正月乃其時也國之搜狩自有常處鄭之原圃秦之具囿魯之大野乃田狩之地今不於常所而逺涉郎地所以譏也夏天王使宰渠伯糾來聘左傳曰父在故名澄曰天王桓王也宰冡宰渠邑伯爵糾名也天子之卿六命當書邑爵而不名此書名者蓋父在而子襲其邑爵世其官故於爵之下特書其名以見其為有父也若父在而子未襲其邑爵與官但攝父之職而行事則例當如下年書仍叔之子杜氏曰不書秋冬首月文闕孫氏曰脫二時七年同此經書月一書日無大衍厯正月庚申大癸酉冬至二月庚寅小三月己未大四月己丑小五月戊午大六月戊子小七月丁巳大八月丁亥小九月丙辰大十月丙戌小十一月乙卯大十二月乙酉大五年甲戌桓王十三年蔡桓八曺桓五十衛宣十二晉小子二鄭莊三十七陳桓三十八卒杞武四十四宋莊三齊僖二十四秦寧九楚武三十四春正月甲戌陸氏曰此下文脫程子劉氏義同己丑陳侯鮑卒左傳曰陳亂文公子仲殺太子免而代之澄曰鮑陳桓公也在位三十八年他桓公庶弟免桓公太子也夏齊侯鄭伯如紀左傳曰齊鄭朝于紀欲以襲之紀人知之趙氏曰外相如不書凡書皆譏也常山劉氏曰外諸侯相如唯此年齊侯鄭伯如紀及州公如曺澄曰如紀者朝于紀也凡國君來朝魯則稱朝往朝他國則稱如內外辭也諸侯相朝雖有其禮然春秋之時小役大弱役強強大之國必不往朝小弱之國雖敵體之國亦不相朝唯小弱者必須往朝於強大蓋畏之也事之也齊鄭大且強紀小而弱乃以強大而朝小弱蓋借朝之名以往紀而實欲以兵襲取其國紀素知齊鄭之圖已故覺其謀而齊鄭之詐不得以行外相如不書此特書者惡齊鄭之詐也張氏曰春秋之初齊僖鄭莊皆小人之雄合謀同心以吞噬小國為事自隱二年石門之盟至桓十一年惡曺之盟二十年之間二國為一伐宋取郜防入郕入許今又相與謀紀自二君如紀之後紀侯多為計以謀自免於難而卒不能止齊鄭貪噬之心至莊五年紀季以酅入于齊紀侯去國然後快于心小國困于強暴二君之罪居多澄按許近于鄭紀近于齊鄭欲得許與齊同謀之而卒得許齊欲得紀與鄭同謀之而卒得紀天王使仍叔之子來聘仍穀作佸公羊傳曰父老子代從政也穀梁傳曰父在子代仕之辭也程子曰古之授任稱其才德士無世官周衰官人以世故卿大夫之子代其父任事仍叔受命來聘而使其子代行也澄曰仍氏叔字此天子四命之大夫稱氏稱字者也葬陳桓公不書月史失之蓋陳他篡立而葬之也城祝丘杜氏曰齊鄭將襲紀故髙氏曰祝丘齊魯兩境上邑齊將襲紀公欲助紀而畏齊故城此以備陸氏曰譏不時秋蔡人衛人陳人從王伐鄭左傳曰王奪鄭伯政鄭伯不朝王以諸侯伐鄭鄭伯禦之戰于繻葛王卒大敗公羊傳曰從王正也啖氏曰不言會及臣從君之辭也永嘉陳氏曰春秋之法有天子在則其諸侯稱人有諸侯在則其大夫稱人王師不書書伐鄭鄭不服也伐鄭不服而後王命不行於天下東周之不競鄭莊為之也大雩左傳曰書不時也凡祀龍見而雩過則書孫氏曰雩求雨之祭建巳之月常祀也故經無六月雩建午建申之月非常則書謂之大者雩於內上帝也程子曰雩于上帝用盛樂也諸侯雩于境之山川爾成王尊周公賜魯重祭得郊禘大雩成王之賜魯公之受皆失也故夫子曰魯之郊禘非禮也周公其衰矣大雩嵗之常祀不皆書因其非時則書之郊禘亦因事而書劉氏曰其言大何非諸侯之雩也説者皆曰成王賜魯天子禮樂禮有天子諸侯之别自伏羲以來未之有改成王者周之盛王也其惑于魯之有天子禮樂殆周之末王賜之非成王矣昔者魯惠公使宰讓請郊廟之禮于天子天子使史角往惠公止之其後在魯實始為墨翟之學使成王之世而魯已郊則惠公奚請澄按劉氏此説蓋欲為成王解説過舉之非而已近儒亦有頗宗其説者實則不然當從程子之説為正所引惠公使宰讓請郊廟之禮今載在通鑑外免紀其言龎誕無稽劉侍讀學雖極博擇則未精不時有信竒好異之癖倘使天子之禮諸侯可以請時王可以賜則春秋時強僣之國挾勢援例請之者多矣何獨魯惠能請而他國不敢請乎陸陽李氏曰外紀所據乃姓氏雜書其出又在戴記之後不足引以為證螽螽公作􅏑後皆同公羊傳曰記災也程子曰螽蝗也既旱又蝗冬州公如曹左傳曰淳于公如曹度其國危遂不復杜氏曰淳于州國所都城陽淳于縣也程子曰州公不能保其國去如曹澄曰州薑姓公爵此人君之失國者與紀侯大去其國同但州君之去國則有所如紀君之去國則無所如爾凡國君如他國者皆朝也以畿內八命之公而朝畿外七命之伯蓋其國危亡將寄託於曹假朝禮以行實則奔也曹姬姓武王封其弟振鐸于定陶為曹國張氏曰曹國漢屬濟隂郡在唐為曹州今興仁府濟隂縣州稱公與祭公同則州必畿內之地河內州縣也左傳乃云淳于公杜氏云城陽淳于縣昭元年傳云城淳于或云因州公不反國為紀所并遂以淳于為都未詳孰是經書月一書日二大衍厯正月乙卯小己卯冬至甲戌二十日二月甲申大經正月己丑在此月三月甲寅小四月癸未大五月癸丑小六月壬午大辛亥小滿閏月壬子小七月辛巳大旦日夏至八月辛亥小九月庚辰大十月庚戌小十一月己亥大十二月己酉小長厯正月甲申朔內無甲戌己丑正月六日六年乙亥桓王十四年蔡桓九曹桓五十一衛宣十三晉小子三鄭莊三十八陳厲公躍元年杞武四十五宋莊四齊僖二十五秦寧十楚武三十五春正月實來實王朝一命之下士故稱名無王命而私交故但書曰來而不言其事也與隱元年祭伯來義同夏四月公會紀侯于成成穀作郕左傳曰紀來咨謀齊難也杜氏曰成魯地在泰山巨平縣東南張氏曰此與書二年朝三年會郕同旨秋八月壬午大閲張氏曰失時僣禮故書以譏澄曰天子因四時之田而教民以武事春曰振旅夏曰茇舍秋曰治兵三時所教其法皆略惟仲冬教大閲則其坐作進退擊刺真如戰陳以仲冬之事行於季夏非其時也且大閲者天子之禮非諸侯之所得行為其僣禮故因失時而書之以著其僣與上年僣大雩義同蔡人殺陳他程子曰陳厲公蔡人也故蔡桓侯殺他而立厲公桓侯殺他實以私也而書蔡人同於討賊之例見討賊者衆人之公也澄曰蔡稱人討賊辭也陳不能討而蔡能討之故以討賊之義歸之蔡篡弒之賊人人得而殺之也陳他篡立既葬桓公陳人君之亦已逾年矣然篡賊非可稱君故名而不爵凡篡賊而稱君者見本國之臣子與鄰國之君臣皆不能討而成之為君也苟有一人能明討賊之義則名之為賊而不成之為君矣衛人殺州吁齊人殺無知蔡人殺陳他是也九月丁卯子同生公羊傳曰喜有正也左傳曰以太子生之禮舉之穀梁傳曰疑故志之澄按有正者謂嫡夫人生適長子也春秋十二公如書文公如成公皆嫡夫人之嫡長子其生也何以不凡國君世子生則必舉以世子生之禮此常事爾唐趙氏最善説春秋亦不過從左氏而曰太子生多矣書子同禮備故也餘公皆不備禮記其是以著其非然據經但書子同生何以見其禮之備與不備蓋惟穀梁傳得聖人之意夫世適之生國統所係而同之母文薑其後與齊襄淫亂同既立為君矣猶不能制其母故時人有疑同為齊侯之子者今考之經魯桓公三年九月文薑歸魯至十八年正月始與桓公偕如齊其間十五年文薑在魯未嘗適齊而子同之生在桓公六年之九月則同為魯桓之子而非齊襄之子也明矣桓公十八年文薑始如齊而通于齊襄其時同之生已十有三年矣明年為魯莊公元年文薑遜于齊二年冬會齊侯於禚四年春饗齊侯于祝丘五年夏如齊師七年春會齊侯于防冬會齊侯于穀八年冬齊侯被弒文薑淫亂放蕩其惡播揚在此八年之內子同生之時未有此惡行也人見文薑後來之淫亂故當時有疑之者夫子志子同之生表其非齊侯之子而使後世無疑也此穀梁氏所謂疑故志之者歟齊之詩人刺魯莊公不能防間其母其詩乃曰展我甥兮詩人微意亦為魯莊解釋當時之誣謗作此詩者君子人也况聖人視魯為父母邦寧不思為魯君辨白誣謗之疑乎故以大公至正之直筆寓别嫌明微之深意辭簡而義逺真如化工焉髙氏曰昏禮者上以事宗廟下以繼後世也人疑莊公為齊侯之子審如所疑則周公之祀不傳於魯魯之子孫乃齊之子孫豈不悖哉襄公文薑之淫亂蓋在同生之後當同之生齊魯未嘗亂也謹子同之生月日則以廟祀世系之重在此故特書之使國統著明不書其生則其事不見此之謂微而顯沙隨程氏曰文薑淫在桓公既卒之後子同之生無嫌也所以辨猗嗟之刺著明國統也薛氏曰謹莊公之生決天下之疑也冬紀侯來朝左氏曰請王命以求成于齊公告不能杜氏曰紀微弱不能自通于天子欲因公以請王命公無寵於王故告不能澄曰齊禍迫矣紀侯僕僕會魯朝魯多方求自全之計而卒不能全上無明王賢伯而強大肆意以吞噬小弱哀哉經書月四書日二大衍歷正月戊寅大甲申冬至二月戊申小三月丁丑大四月丁未大五月丁丑小六月丙午大七月丙子小八月乙巳大九月乙亥小經八月壬午在此月十月甲辰大經九月丁卯在此月十一月甲戌小十二月癸卯四大長厯壬午八月八日丁卯九月二十七年丙子桓王十五年蔡桓十曹桓五十二衛宣十四晉小子四鄭莊三十九陳厲二把武四十六宋莊五齊僖二十六秦寧十一楚武三十六春二月己亥焚咸丘杜氏曰焚火田也咸丘魯地髙平巨野縣南有咸亭程子曰古者昆蟲蟄而後火田去莽翳以逐禽獸非竭山林而焚之也澄曰周之二月夏之十二月昆蟲未出固可用火然古禮將有田事則先焚萊此不當田狩之月而火田又咸丘非狩地故譏夏穀伯綏來朝鄧侯吾離來朝杜氏曰穀國在南鄉築陽縣北張氏曰今屬襄陽府穀城縣鄧今之鄧州澄曰二國之君皆稱名者失地之君也兩書朝特見之朝不同日也按二國去魯絶逺蓋以失國寄寓他國與魯相近故因來朝魯也闕秋冬義見四年經書月一書日一大衍厯正月癸酉小己丑冬至二月壬寅大三月壬申小經二月己亥在此月四月辛丑大五月辛未小六月庚子大七月庚午小八月己亥大九月己巳小十月戊戌大十一月戊辰小十二月丁酉大長厯是年閏十二月己亥二月二十八日八年丁丑桓王十六年蔡桓十一曹桓五十三衛宣十五晉侯緡元年鄭莊四十陳厲三杞武四十七宋莊六齊僖二十七秦寧十二楚武三十七春正月己卯蒸公羊傳曰蒸冬祭也常事不書此何以書譏亟也程子曰冬蒸非過也書之以見五月又蒸為非禮趙氏曰周雖以建子為正祭祀則用夏時本月凡四時之祭皆用孟月若有故及日不吉即用仲月正月蒸則夏之仲冬也天王使家父來聘杜氏曰家氏父字澄曰此王朝大夫之四命稱氏稱字者夏五月丁丑蒸建子之月已蒸矣建辰之月又再蒸焉於春季而行冬祭非其時非其禮也程子曰非時復蒸者必以前蒸為不備也黷亂甚矣秋伐邾將卑師少冬十月雨雪雨去聲程子曰建酉之月未霜而雨雪書異也祭公來遂逆王后于紀祭則界切祭國公爵王朝八命之公或是隱元年之祭伯進爵為公或是伯之子或是二人國邑同而爵異不可詳也祭公本受王命逆后于紀而私行先至于魯故先書來而以其正事為遂事齊侯之遂伐楚公子結之遂及齊侯宋公盟並同此例程子曰祭公受命逆后而至魯先行私禮以逆后為遂事不虔王命也趙氏曰遂逆者譏不躬白於王孫氏曰桓王娶后於紀命魯主之故祭公來謀逆后之期既謀之則當復命天子天子命之逆則逆之不可專也祭公不復命于王專逆后于紀故曰遂或曰士昏禮納徵之後行請期之禮歸期有定日而後親逆重昏禮也天子之尊雖與士禮不同然亦必先知女歸之期而後可往逆也魯媒紀女為王后蓋已先報可于王矣雖已報可而未知紀國歸女之日王遽遣祭公往逆祭公不知其期故過魯問期而後往紀往紀逆后者王命也過魯問期者非王命也故春秋書法如此魯為媒而不報歸女之期于王魯之慢也王未知后之歸期而遽然遣使往逆王之輕也祭公無王命而私過魯問期祭公之專也參譏之公羊傳以為祭公此來方是使魯為媒若可則就往逆果如此則輕遽尤甚疑不然也澄按此經程子一義趙孫一義或説與趙孫又微有不同今兼存之經書月五書日二大衍歷正月丁卯大己卯十三日甲午冬至二月丁酉小乙丑大寒三月丙寅大乙未雨水閏月丙申小四月乙丑大丙寅春分五月乙未小六月甲子大經五月丁丑在此月七月甲午小八月癸亥大九月癸己小十月壬戌大十一月壬辰大十二月辛酉小長厯己卯正月十四日丁丑五月十四日九年戊寅桓王十七年蔡桓十二曹桓五十四衛宣十六晉緡二鄭莊四十一陳厲四杞靖公元年宋莊七齊僖二十八秦出子元年楚武三十八春紀季薑歸于京師紀季薑即祭公所逆紀國之女為桓王后者京師天子所居也上年祭公往逆稱王后者主王朝而言之也今歸京師稱季薑者主紀而言之也魯為之媒故書夏四月秋七月冬曹伯使其世子射姑來朝射音亦又音夜曹伯欲朝魯有疾不能行乃使其世子代已行禮按周官言世子以皮幣繼小國之君則世子固有攝君行禮之時然必王朝大朝覲大會同諸侯皆往而已獨有疾則不得已而命世子攝行今曹之朝魯非甚急之務不可缺之禮也君既有疾則不行可也而乃遣其世子攝君父以來是果不可以已乎經書月二書日無大衍厯正月辛卯大庚子冬至二月辛酉小三月庚寅大四月庚申小五月己丑大六月己未小七月戊子大八月戊午小九月丁亥大十月丁巳小十一月丙戌大十二月丙辰小十年己卯桓王十八年蔡桓十三曹桓五十五卒衛宣十七晉緡三鄭莊四十二陳厲五杞靖二宋莊八齊僖二十九秦出子二楚武三十九春王正月庚申曹伯終生卒終生曹桓公也在位五十五年世子射姑嗣是為莊公夏五月葬曹桓公秋公會衛侯于桃丘弗遇杜氏曰桃丘衛地濟北東阿縣東南有桃城衛侯與公為會期中背公更與齊鄭故公獨往而不相遇也冬十有二月丙午齊侯衛侯鄭伯來戰于郎常山劉氏曰春秋之中諸侯加兵于魯者為不少矣而未有書來戰者此不言侵伐而以來戰為文則彼曲我直其義坦然經書月三書日二大衍厯正月乙酉大乙巳冬至二月乙卯小經正月庚申在此月三月甲申大四月甲寅大五月甲申小六月癸丑大七月癸未小八月壬子大九月壬午小十月辛亥大十一月辛巳小己酉霜降閏月庚戌大十二月庚辰小旦日小雪丙午二十七長歷庚申正月六日十有一年庚辰桓王十九年蔡桓十四曹莊公射姑元年衛宣十八晉緡四鄭莊四十三卒陳厲六杞靖三宋莊九齊僖三十秦出子三楚武四十春正月齊人衛人鄭人盟于惡曹上年十二月三國之君來戰于郎而今年之正月三君又使從行之大夫相與結盟以固其交永嘉陳氏曰有君在則大夫降稱人胡氏曰三國既為郎之戰又固黨而為此盟夏五月癸未鄭伯寤生卒寤生鄭莊公也在位四十三年世子忽嗣是為昭公髙氏曰昭公不終于位五世兵革不息自入春秋考莊公之心慮知其積非必有餘殃矣秋七月葬鄭莊公髙氏曰鄭忽既立不待五月而葬其父九月宋人執鄭祭仲祭側界切祭氏仲字諸侯之卿四命命于天子者如宋國之孔父也鄭莊公娶鄧曼生忽立為世子宋雍氏納女于鄭莊公生突莊公卒雍氏欲立其出而雍氏宗有寵于宋莊公馮宋公誘祭仲而執之曰不立突將死祭仲乃以突歸鄭而立之為君陸氏曰執大夫例稱人諸國大夫王賜之畿內邑為號令歸國者皆書族書字同于王大夫鄭祭仲魯單伯陳女叔是也突歸于鄭突不係國庶孽篡立者也自宋而歸于鄭歸易辭也自外入內以篡奪世嫡事之難也而今則易者祭仲挈之以歸而立之故易也鄭忽出奔衛忽係之鄭正也鄭忽以世子嗣位既子葬其父君鄭厯五月矣出奔而不稱位未定也百官總已以聽命于祭仲祭仲既立突而不君忽則忽無其位矣柔會宋公陳侯蔡叔盟于折折之設切又音舌柔魯再命之大夫蔡叔蔡侯之弟攝君者凡諸侯之弟攝君則稱字大夫會諸侯自此始張氏曰自去年魯與齊衛鄭為讐至今年桓公欲合黨以敵之於是結宋與陳蔡要言歃血初無忠信誠慤相與之心又以大夫盟宋公陳侯故不足恃以久而桓公又與宋公屢會求以補前之失堅突之合也公會宋公于夫鍾夫音扶鍾公作童杜氏曰夫鍾郕地冬十有二月公會宋公于闞闞口暫切杜氏曰闞魯地在東平須昌縣東南經書月五書日一大衍厯正月己酉大庚戌冬至二月己卯小三月戊申大四月戊寅小五月丁未大六月丁丑小經五月癸未在此月七月丙午大八月丙子大九月丙午小十月乙亥大十一月乙巳小十二月甲戌大長厯是年閏正月十有二年辛巳桓王二十年蔡桓十五曹莊二衛宣十九卒晉緡五鄭厲公突元年陳厲七卒杞靖四宋莊十齊僖三十一秦出子四楚武十一春正月夏六月壬寅公會紀侯莒子盟于曲池紀左作杞曲池公作驅蛇紀為齊難危急甚矣魯桓切切為紀謀故屢會齊而大國無與同心者此會也僅能與小弱之莒偕其不能為助而無救于紀之亡也蓋可知矣杜氏曰曲池魯地魯國汶陽縣北有曲水亭秋七月丁亥公會宋公燕人盟于穀丘杜氏曰燕人南燕大夫穀丘宋地張氏曰南燕姞姓國漢屬東郡今滑州昨城縣穀丘在今應天府穀熟縣澄曰南燕大夫一命固當稱人或是再命稱名之大夫以魯侯宋公二君在故降而稱人也左氏以此盟為魯欲平宋鄭杜氏云宋多責賂于鄭鄭人不堪蓋宋納鄭突多責其賂于鄭鄭不能償魯桓鄭莊前此本有戰郎之怨鄭莊既卒而突得國突見魯宋數數盟會將謂其相得也故釋前怨而通好于魯欲藉魯以殺宋之賂魯桓鄭厲皆篡賊也以氣類合故欲為鄭祈懇於宋以殺其賂然此盟必是魯宋燕三國别有他事相要約非為鄭賂之事盟也因是盟與宋公相見而為鄭致請焉爾宋未嘗許納故以後魯桓又與宋會至再至三也八月壬辰陳侯躍卒躍陳厲公也在位七年子完不嗣其弟林立是為莊公不書葬魯不會也公會宋公于虗虛去于切公作郊杜氏曰虛宋地髙氏曰宋益疏公而公強從之不已祗自辱也冬十有一月公會宋公于龜左傳曰宋成未可知也故既會於虛又會于龜張氏曰虛龜皆宋地蓋桓公欲成宋之急而屈已連往宋地與之為會故春秋詳書以譏之髙氏曰公六出與宋會不憚屈辱力為鄭請公為鄭而數出會宋宋公亦為求賂而數與公會皆非為國為民其罪均爾丙戌公會鄭伯盟于武父左傳曰宋公辭平故與鄭伯盟于武父遂帥師而伐宋杜氏曰武父鄭地陳留濟陽縣東北有武父城髙氏曰公自龜還遽會鄭伯而謀伐之夫宋鄭之事公何預焉而同惡相濟一至于此澄曰宋公貪得鄭賂之多而不許魯桓之請鄭厲遂忘宋立已之恩與魯結黨將為同伐之舉魯桓亦棄屢會屢盟之好乃與舊怨之鄭結盟而與舊好之宋為仇交道之翻覆不常在匹夫猶不可况國君乎吕氏曰是年書盟會之數如此見諸侯無王放恣之極也襄陵許氏曰王迹既熄伯統未興諸侯自擅無所稟命觀隱十年見兵革之亂也桓十一年十二年見盟會之亂也伯統興則諸侯有所一無復此亂矣是以君子不得已而與桓文丙戌衛侯晉卒穀梁傳曰再稱日決日義也范氏曰明二事皆當日也孫氏曰經未有一日而再書者書丙戌羡文也澄按盟當書日卒亦當書日若史文有闕則無如之何衛侯之卒與上武父之盟同日不再書丙戌則恐後人不知宣衛侯之以是日卒也疑非羡文蓋穀梁疑是晉衛公也在位十九年子朔立是為惠公十有二月及鄭師伐宋丁未戰于宋將皆微者而鄭用重師戰于宋魯鄭曲而宋直與來戰于郎同義張氏曰鄭突借宋之力以篡國宋人責賂則背之而結魯魯桓為突比與宋會及宋辭平魯不反已遽然連鄭以伐之故書及鄭師伐宋罪魯鄭也胡氏曰來戰者罪在彼戰于郎是也往戰者罪在內戰于宋是也經書月五書日六大衍厯正月甲辰小乙卯冬至二月癸酉大三月癸卯小四月壬申大五月壬寅小六月辛未大七月辛丑小經六月壬寅在此月八月庚午大經七月丁亥在此月壬辰二十三日九月庚子小十月己巳大經十一月兩書丙戌皆在此月十一月己亥小經十二月丁未在此月十二月戊辰大長厯壬寅六月二日丁亥七月十八日壬長不在八月在七月二十三日丙戌十一月十八日丁未十二月十日十有三年壬午桓王二十一年蔡桓十六曹莊三衛惠公朔元年晉緡六鄭厲二陳莊公林元年杞靖五宋莊十一齊僖三十二秦出子五楚武四十二春二月公會紀侯鄭伯公先與紀鄭會而後與齊宋衛燕戰者蓋齊連三國之兵將以滅紀紀知之而求援于魯魯侯乃偕鄭伯先至紀相會以待齊兵之至及四國兵至而遂與之戰也己巳及齊侯宋公衛侯燕人戰齊師宋師衛師燕師敗績穀梁傳曰戰稱人敗稱師重衆也其不地于紀也趙氏曰內兵以紀為主外兵以齊為主蓋齊以三國之師伐紀欲滅之公與鄭救之而勝也澄曰昔鄭莊助齊謀紀者也魯桓數數為鄭會宋繼又同鄭伐宋鄭厲德魯故助魯救紀而反其父之所為沙隨程氏曰齊有滅紀之志合四國之兵以臨之今一戰而勝故終公之世而紀不亡或謂紀侯不當主于魯桓鄭厲且溺人近死何暇論援者之賢否乎衛朔以讒得國又背殯即戎不以義舉罪不容于誅矣杜氏曰衛宣公未葬惠公稱侯以接鄰國襄陵許氏曰趙氏謂凡諸侯在喪而有境外之事以喪行者稱子以吉行者稱爵志惡之淺深也三月葬衛宣公張氏曰方與衛戰往會其葬怨不廢義也澄按二月己巳之戰齊紀為敵怨衛助齊滅紀魯為紀禦齊魯衛非敵怨也故不廢會葬之禮夏大水秋七月冬十月經書月四書日一大衍歷正月戊戌大辛酉冬至二月戊辰小經己巳二日三月丁酉大四月丁卯小五月丙申大六月丙寅小七月乙未大癸亥夏至閏月乙丑小八月甲午大甲午大暑九月甲子小十月癸巳大十一月癸亥小十二月壬辰大長歷是年閏正月二月無己巳十有四年癸未桓王二十二年蔡桓十七曹莊四衛惠二晉緡七鄭厲三陳莊二杞靖六宋莊十二齊僖三十三卒秦出子六楚武四十三春正月公會鄭伯于曹前年魯鄭同救紀而敗齊衛之師蓋虞齊衛之報怨也故為會以謀之曹素與魯協故魯會鄭于其地杜氏曰為曹與會按左傳但言曹人致餼其與會不與會不可知也無冰何氏曰周之正月夏之十一月法當堅冰無冰者溫也夏五孫氏曰夏五無月者後人傳之脫漏爾豈其舊史日月之有闕文而孔子不刋正之哉鄭伯使其弟語來盟語穀作禦左傳曰修曹之會澄曰是年正月魯鄭二君會于曹而未盟故鄭伯使弟語來魯與公盟也使弟語與齊侯使弟年義同趙氏曰來盟彼欲之也不書其誰敵者也蘇氏曰凡外大夫來盟于魯內大夫涖盟于他國皆盟其君也程子曰使來盟盟前定矣與髙子不同胡氏曰來盟稱使則前定之盟也其不稱使如楚屈完齊髙子則權在二子盟不盟特未定也秋八月壬申御廩災君之在車與御者最相親近故君所親近之人謂之御御史御妻之類是也君所親用之物亦謂之御後世所謂御食御書御藥之類及此御廩是也御廩者以貯人君躬耕籍田之米專供宗廟之粢盛而不敢他用者災天火也乙亥嘗穀梁傳曰未易災之餘而嘗不敬也孫氏曰嘗秋祭也周八月夏六月也不時而嘗與以災之餘而嘗不恭甚矣澄曰不俟秋而先嘗御廩災才四日遽以災餘之米供粢盛匆遽苟簡以畢事而已冬十有二月齊侯祿父卒祿父僖公也在位三十三年世子諸兒嗣是為襄公宋人以齊人蔡人衛人陳人伐鄭公蔡人在衛人下左傳曰宋人以諸侯伐鄭報宋之戰也焚渠門及大逵伐東郊取牛首以大宫之椽歸為盧門之椽張氏曰鄭突賴宋之力得入篡國歸而背其賂宋人因此與為仇讐魯桓平之宋人不從鄭遂與魯伐宋為丁未之戰宋以鄭突入用其寵而背之且見伐積其忿怒乞師于齊秦陳衛蓋師雖四國之賦而惟宋人之為聽比于平曰諸侯各帥其師以伐人者不同故書之趙氏曰凡不用我師而用彼師曰以言用齊蔡等兵而不自交鋒也經書以者惟此與僖二十六年公以楚師伐齊取穀定四年蔡侯以吳子及楚人戰于柏舉三處而已柏舉之戰左氏所敘事並吳楚自戰蔡不交鋒下文吳入楚亦不言蔡師胡氏曰宋怨鄭突之背已故以四國伐鄭魯怨齊人之侵已故以楚師伐齊蔡怨囊瓦之拘已故以吳子伐楚蔡弱於吳魯弱于楚宋與蔡衛陳敵而弱於齊乃用其師故特書曰以經書月四書日二大衍歷正月壬戌小丙寅冬至二月辛卯大三月辛酉小四月庚寅大五月庚申小六月己丑大七月己未小八月戊子大九月戊午小經八月壬申乙亥在此月十月丁亥大十一月丁巳小十二月丙戌大經丁巳在十一月朔及明年正月二日長歷壬申八月十五日乙亥十八日丁巳十二月二日十有五年甲申桓王二十三年崩蔡桓十八曹莊五衛惠三晉緡八鄭厲四陳莊三杞靖七宋莊十三齊莊公諸兒元年秦武公元年楚武四十四春二月天王使家父來求車左氏曰諸侯不貢車服天子不私求財澄曰家氏父字王朝四命之大夫古者諸侯有功天子賜之乘車諸侯九貢有常制無有以車供王室之用者車重器也天子可以之錫下諸侯不可以之貢上也使當貢之物諸侯不供而天子乏用猶不當遣使以私求况諸侯不當貢之物而可求乎哉三月乙未天王崩桓王也在位二十三年世子他嗣是為莊王莊公三年始書葬夏四月己巳葬齊僖公五月鄭伯突出奔蔡左傳曰祭仲專鄭伯患之使其壻雍糾殺之將享諸郊雍姬知之以告祭仲殺雍糾尸諸周氏之汪厲公出奔蔡程子曰避祭仲而出非國人出之也澄按凡諸侯不生名失地則名啖氏曰君奔例名者言其失地非復諸侯也張氏曰國君失位書爵而不名者其位為未絶突以庶孽奪嫡初與權臣比而篡位又謀殺之為盜賊之計以自取亡書名絶之也髙氏曰前年蔡從宋伐鄭突曷為出奔蔡曰宋人以蔡伐鄭而蔡聽命焉蔡之於突實無憾鄭世子忽復歸于鄭復歸者言復其位而歸也張氏曰世子忽自十一年五月莊公卒而得位至九月奔衛五年于外乃得復歸不從衛侯朔術之例稱爵乃稱世子者忽之所以得歸者以其嘗為世子也不稱鄭伯者以其不能君也故程子曰忽稱世子本當嗣位不能保其位故不爵陸氏曰復歸之正者莫過于鄭忽許叔入于許許叔許莊公之弟叔字也凡諸侯之弟二君者例稱字鄭莊公以隱十一年入許許莊公奔衛鄭悉有許之土地矣而使許叔居許東偏以奉其祭祀鄭取許地逐許君使其君之弟攝君以奉宗廟而不得有其國是年突出忽歸鄭國亂許叔度鄭之力不能與已爭故自入其國而君之以惡入非以善歸故書入而不書歸也劉氏曰稱入何難也何難焉鄭亂而後入也公會齊侯于艾艾公作鄗穀作蒿左傳曰謀定許也張氏曰入許之役鄭莊以壤地相接欲兼并之故糾合齊魯之力而同伐既入之後齊魯俱讓而不受乃與鄭人今鄭既不能有則齊魯遂為之謀以定許叔之位此許之所以復存也邾人牟人葛人來朝來朝者國君也荒裔以號舉君臣皆稱人牟葛號舉故其君稱人邾附庸國當稱名以其同于牟葛二國旅見故亦降從二國之例而稱人也張氏曰牟國今登州牟平縣葛古葛伯國今拱州寧陵縣秋九月鄭伯突入于櫟左傳曰鄭厲公因櫟人殺檀伯而遂居櫟張氏曰櫟鄭别都也在陽翟縣今屬潁昌府按春秋書鄭伯突入于櫟自此以後十七年髙渠彌弒昭公而立公子亹十八年齊人殺子亹祭仲逆鄭子于陳而立之莊十四年鄭傅瑕殺鄭子及其二子而納厲公厲公入忽亹儀之事皆不書昭十一年申無宇對楚子虔曰鄭莊公城櫟而置子元焉使昭公不立蓋大都耦國既入于櫟則鄭國之命已制于突與入其國無異忽亹儀之為君末矣不足紀也薛氏曰櫟者鄭之大都也入於櫟將逼鄭也鄭忽反矣突因櫟以有鄭忽浸微而不見矣春秋著大都之害閔忽之不足以有立也胡氏曰制邑之死虢君京城之叛太叔皆莊公所親戒也又城櫟而置子元何謀國之誤衛有蒲戚而出獻公楚有陳蔡不羮而叛棄疾厲公既入於櫟則其國已復矣故夫子曰古者邑無百雉之城欲墮三都以張公室明強幹弱枝以身使臂之義為來世鑒也襄陵許氏曰鄭亂如此春秋弗志志突入櫟而已語曰櫟人實使鄭子不得其位言邑國之大也忽不能制突使析鄭而居之以生民心此亂根也冬十有一月公會宋公衛侯陳侯于袲伐鄭宋公衛侯上公有齊侯字袲昌氏切公作侈左傳曰會于袲謀伐鄭將納厲公也弗克而還穀梁傳曰地而後伐疑辭也非其疑也胡氏曰昭公之與突是非邪正亦明矣然昭公雖正其才不足以君國復歸于鄭日以微弱厲公雖篡其智足以結四鄰之援既入于櫟日以強盛諸侯不顧是非而計其強弱始疑于輔正終變而與邪穀梁傳所謂非其疑者非其疑于為義而果于為不義相與連兵動衆納篡國之公子也故書其會地而後言伐以譏也張氏曰魯桓宋莊衛朔皆以不正得國其為突謀乃水流濕火就燥獨陳侯疑之爾然寡不勝衆所以疑而遂合也經書月六書日二大衍歷正月丙辰大辛未冬至二月丙戌小三月乙卯大四月乙酉小經三月乙未在此月五月甲寅大經四月己巳在此月六月甲申小七月癸丑大八月癸未大九月癸丑小十月壬午大十一月壬子小十二月癸巳大長厯乙未三月十一日己巳四月十五日十有六年乙酉莊王元年蔡桓十九曹莊六衛惠四晉緡九鄭厲五昭公忽元年陳莊四杞靖八宋莊十四齊襄二秦武二楚武四十五春正月公會宋公蔡侯衛侯于曹左傳曰謀伐鄭也孫氏曰未能納突故復會于此張氏曰於此又邀蔡黨益張矣夏四月公會宋公衛侯陳侯蔡侯伐鄭杜氏曰蔡嘗在衛上今序陳下蓋後至吕氏曰會曹蔡先衛伐鄭衛先蔡蓋當時諸侯皆以一切強弱目前利害為先後不復用周班也胡氏曰王制諸侯之爵先後有序周官大司馬設儀辨位以等邦國不可亂也春秋時伯者以意之向背為升降諸侯以勢之強弱相上下蔡嘗先衛今序陳下者先儒以為後至也以至之先後易其序是以利率人而不要諸禮也程子曰突善結諸侯故皆為之致力屢伐鄭也張氏曰自鄭突入國之後即比魯而仇宋及其出奔乃能使魯與宋自冬及夏悉力伐鄭所謂善結也衛朔與母構兄姦惡之雄因同惡之合陵蔡而居其上當時王政不行伯者未作小人恃強衆陵寡弱如此及桓文之興而後少抑焉王氏曰突之未出也宋嘗伐之既出也又求納之始宋不和而公以鄭伐宋及突既出而公與宋伐鄭向也相戾之深今也相用之固豈無自而然哉蓋以正繼正禮之常諸侯無所求以亂易亂國之釁諸侯有所責故利其亂幸其危貪其賄黨其邪自突入櫟公與宋公三會諸侯而再伐鄭無他焉賄故也秋七月公至自伐鄭公至亦常事書者皆譏也程子曰見其勤勞于鄭突也孫氏曰助篡奪正踰時而返冬城向向失亮切沙隨程氏曰下書十一月而先書冬者非十月能畢工也郯氏曰下有十一月則此乃十月也縱是同月亦今之九月農功未畢不可興役胡氏曰八月則妨田事九月則奪農收唯十月則依于詩禮合于傳例十二月而城者時也十月十一月不時也十有一月衛侯朔出奔齊左傳曰初衛宣公蒸於夷薑生急子屬諸右公子為之娶于齊而美公取之生壽及朔屬壽于左公子夷薑縊宣薑與公子朔構急子公使諸齊使盜待諸萃將殺之壽子告之使行不可曰棄父之命惡用子矣有無父之國則可也及行飲以酒壽子載其旌以先盜殺之急子至曰我之求也彼何罪又殺之二公子怨惠公立公子黔牟惠公奔齊公羊傳曰衛侯朔得罪于天子也張氏曰朔立已五年二公子逐之必因其陵蔑天子而後得以行其志公羊氏之説必有所本傳所以莊六年王人子突救衛經書月四書日無大衍歷正月辛亥小丙子冬至二月庚辰大三月庚戌小四月己卯大丙申春分閏月己酉小五月戊寅大旦日穀雨六月戊申小七月丁丑大八月丁未小九月丙子大十月丙午大十一月丙子小十二月乙巳大十有七年丙戌莊王二年蔡桓二十卒曹莊七衛惠五黔牟元年晉緡十鄭厲六昭二陳莊五杞靖九宋莊十五齊襄三秦武三楚武四十六春正月桓公十八年唯元年二年十年十八年嵗之首月書王九年嵗首書時不書月其餘春之首月不書王者十三公會齊侯紀侯盟于黃左傳曰平齊紀且謀衛故也任氏曰公十三年會紀侯敗齊師以益其怨今乃盟之豈足以釋前憾乎張氏曰又欲納朔一動而二失也杜氏曰黃齊地二月丙午公及邾儀父盟于趡及左作會趡翠執切左傳曰尋蔑之盟也薛氏曰初與邾平也杜氏曰趡魯地澄按隱公元年及邾盟蔑七年而隱公渝盟伐邾桓公八年又伐邾魯邾之不通好者十有餘年矣至桓公十五年邾同牟葛朝魯既朝之後二國欲尋蔑盟而平其再伐之怨故邾來魯地受盟而公及之盟也髙氏曰趡我地彼來而我及之也與蔑之盟同邾來朝魯畏強也至是來為此盟豈非諸侯有謀邾者欲求魯之援耶夏公闕夏字五月丙午及齊師戰于奚奚公作郎左傳曰齊人侵魯疆疆吏來告公曰疆場之事慎守其一而備其不虞事至而戰又何謁焉杜也氏曰奚魯地澄曰此齊師來侵魯境而魯與之戰盟黃未幾而齊來侵境平紀之信豈可恃乎六月丁丑蔡侯封人卒封人桓侯也在位二十年其弟獻舞立是為哀公秋八月蔡季自陳歸于蔡左傳曰蔡人召蔡季于陳杜氏曰桓侯無子故召季而立之髙氏曰季蔡侯之弟即獻舞也蔡桓侯無子未知誰之立也季於是避於陳今蔡侯卒國無正嗣兄終弟及於禮為順于是獻舞自陳歸于蔡見其順而易也澄曰季字也諸侯之弟二君者例稱字何氏曰公羊傳注以蔡季與獻舞為二人非也癸已葬蔡桓侯杜氏曰稱侯蓋謬誤澄按諸儒之説皆以侯伯子男葬而稱公者為私諡之僣今檢尋古書所載未見有子男之國君以諡配其爵而曰某子某男者劉卷天子之大夫其爵曰子而其葬亦稱劉文公彼王朝所諡豈私諡乎齊魯皆侯爵而太公之子諡丁公伯禽之子諡考公此周室盛時非東遷以後豈亦僣諡乎二公去始封之君才一世太公伯禽之遺教猶在豈遽僣諡乎蓋公侯伯子男者五等之爵有尊卑也而公之爵為最尊故在其國雖侯伯子男亦稱曰公舉爵之尊者以稱其君臣子辭也及其死也諡之雖侯伯子男亦曰公者猶生時之稱公也聖人制禮緣人情故順忠臣孝子之情使之生死皆得稱公以尊其君也杜氏以侯字為謬誤者得之其以蔡季為賢獨能請諡而不私諡者其説有所不通矣况季歸至葬未踰月也而遽能請諡于天子乎及宋人衛人伐邾左傳曰宋志也杜氏曰邾宋爭強魯從宋志背趡之盟襄陵許氏曰正月與齊為黃之盟而五月戰焉二月與邾為趡之盟而八月伐之張氏曰桓公春與齊邾盟既而皆背之戰奚伐邾並見于一年之中反顧前日刑牲詔神棄如敝屣瀆信而不仁甚矣冬十月朔日有食之左傳曰不書日官失之也經書月六書日五大衍厯正月乙亥小壬午冬至二月甲辰大丙午三日經正月丙辰在此月三月甲戌小四月癸卯大五月癸酉小六月壬寅大經五月丙午在此月七月壬申小經六月丁丑在此月八月辛丑大九月辛未小經八月癸巳在此月十月庚子大十一月庚午小朔日食經書十月朔食十二月己亥大長歷丙辰正月十三日丙午二月四日又丙午五月五日丁丑六月六日癸巳八月十三日十有八年丁亥莊王三年蔡哀侯獻舞元年曹莊八衛惠六黔牟二晉緡十一鄭厲七子亹元年陳莊六杞靖十宋七莊十六齊襄四秦武四楚武四十春王正月公會齊侯于濼濼盧篤切又音洛左傳曰公將有行遂與薑氏如齊申繻曰女有家男有室無相瀆也謂之有禮易此必敗杜氏曰濼水在濟南厯城縣西北入濟張氏曰濼之會不言夫人者夫人不與行會禮也公與夫人薑氏遂如齊公下公無與字穀梁傳曰不言及夫人夫人伉也陸氏曰婦人從夫者也何夫人之伉公失為夫之道也張氏曰如齊不言及而言與者劉氏以為猶匹夫匹婦之相與云爾夫不夫婦不婦進退制於夫人也澄曰此行公往會齊侯爾夫人欲同往公不能制既于會見齊侯矣會禮畢而夫人又欲從齊侯至齊夫婦既同出公不可獨返國故遂與之同如齊也夏四月丙子公薨于齊左傳曰文薑如齊齊侯通焉公謫之以告享公使公子彭生乘公公薨于車公羊傳曰夫人譛公齊侯怒與飲酒於其出使公子彭生送之於其乘焉拉幹而殺之張氏曰春秋書魯君見殺之例有二在內則不書地以存其實在外則不容不書其地而以上下文之特異者見之此先書與夫人薑氏如齊而明年書夫人孫于齊則桓公之不得其死昭然矣丁酉公之喪至自齊左氏曰其至痛之也秋七月冬十有二月己丑葬我君桓公左傳曰魯人告于齊曰寡君畏君之威不敢寧居來修舊好禮成而不返無所歸咎惡於諸侯請以彭生除之齊人殺彭生澄按君弒賊不討不書葬而此書葬者蓋魯之臣子不敢讐齊襄而但指彭生為賊齊既為魯殺彭生則魯人以為賊已討矣安然而葬與正終者無異見魯之臣子忘君之讐而無復有與齊不共戴天之痛也張氏曰葬稱我君而後舉諡趙氏以為臣子之敬辭不然則恐涉他國之君經書月四書日三大衍歷正月己巳小丁亥冬至二月戊戌大三月戊辰小四月丁酉大五月丁卯小經四月丙子在此月丁酉疑差六月丙申大七月丙寅小八月乙未大九月乙丑小十月甲午大十一月甲子小十二月癸巳大經己丑在十一月二十六日長歷丙子四月十日丁酉當為五月朔己丑十二月二十六日春秋纂言卷二
