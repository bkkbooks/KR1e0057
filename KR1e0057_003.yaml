body:
  text: 春秋纂言總例卷三元吳澄撰嘉禮王后經書王后者二桓王后紀姜紀侯之女書逆書歸祭公來遂逆王后于紀桓八紀季姜歸于京師桓九王后天下母也上儀天王猶乾之有坤可不重歟桓王后以三公逆是矣遂事而徃則非也於祭公遂事之逆而紀姜遄歸于京師其逆其歸兩從荀簡夫豈知天下母之為重哉靈王后齊姜齊靈公之女書逆不書歸劉夏逆王后于齊襄十五靈王之逆后於禮盖無失然不使八命之公乃使三命之士是不重嘉事也春秋特書劉夏以譏焉王之逆后雖非其人而齊之歸女無違於禮故不書歸得禮者不書失禮然後書春秋凡事皆然非但昏禮一事為然也或曰魯桓八年桓王之十六年也魯襄十五年靈王之十四年也即位十六年十四年而始逆后謂之元后耶則已晩矣謂之繼后耶則天子諸侯内職具備元后崩止立次妃攝行内事無再娶之義春秋十三王書后者二盖譏也何譏也天子親耕王后親蠶奉宗廟祭祀之重故即位之初必立后周衰禮廢昏姻之制不時聖人因祭公之來劉夏之逆而書以示譏也歟王女經書王女者二齊王姬襄夫人單伯逆王姬莊元築王姬之館于外同上王姬歸于齊同上齊王姬卒莊二天子嫁女於諸侯必使同姓諸侯主之則魯主王姬之昏舊矣然魯莊與齊新有不共戴天之讎為之主昏可乎况凶服未除而行嘉禮容王姬行禮於宗廟之中則不安於是别為築館于外單伯之逆外館之築皆為非禮譏魯之不當主昏傷莊之不能自立也齊王姬桓夫人王姬歸于齊莊十一魯主昏則書王姬之歸同於内女其逆之者常禮也其館之者常處也故皆不書而但書王姬之歸魯夫人桓公夫人文姜齊僖公之女也公㑹齊侯于嬴桓三公子翬如齊逆女同上齊侯送姜氏于讙同上公㑹齊侯于讙同上夫人姜氏至自齊同上齊侯使其弟年來聘同上子同生桓六齊侯禄父卒桓十四𦵏齊僖公桓十五公㑹齊侯于濼桓十八公與夫人姜氏遂如齊同上公薨于齊同上公之䘮至自齊同上葬我君桓公同上夫人孫于齊莊元夫人姜氏㑹齊侯于禚莊二夫人姜氏饗齊侯于祝丘莊四夫人姜氏如齊師莊五夫人姜氏㑹齊侯于防莊七夫人姜氏㑹齊侯于穀同上齊無知弑其君諸兒莊八葬齊襄公莊九夫人姜氏如齊莊十五夫人姜氏如莒莊十九夫人姜氏如莒莊二十夫人姜氏薨莊二十一葬我小君文姜莊二十二昏禮之大節有三納幣一也親迎二也夫人至三也得禮則皆不書魯桓㑹嬴書譏不由媒介而自求昏于齊也逆女書譏不親迎而使公子翬也送姜氏書譏齊侯親送也㑹讙書譏不親迎而親㑹齊侯也夫人至不書翬以譏魯桓初使翬逆而中自受姜氏于讙也書年來聘譏齊侯之隆私愛違正禮也書子同生夫子之意甚深也夫人孫齊以後歸魯不書而㑹饗如師及如齊如莒無一不書者雖國惡不容諱也莊公夫人哀姜盖齊襄公之女及齊髙傒盟于防莊二十二公如齊納幣同上公如齊觀社莊二十三公及齊侯遇于穀同上丹桓宫楹同上公及齊侯盟于扈同上刻桓宫桷莊二十四公如齊逆女同上公至自齊同上夫人姜氏入同上大夫宗婦覿用幣同上公薨于路寝莊三十二子般卒同上公子慶父如齊同上葬我君莊公閔元吉禘于莊公同上公薨同上夫人姜氏孫于邾同上公子慶父出奔莒同上夫人姜氏薨于夷齊人以歸僖元夫人氏之䘮至自齊同上葬我小君哀姜僖元魯莊受制於母即位二十餘年而不得娶母死未幾屈己與齊臣盟求昏之切也齊諾未堅而遽自徃納幣雖已納幣而昏議猶未定觀社遇糓盟扈三徃齊而後許昏齊難之也書公逆公至而夫人不偕至夫不夫婦不婦也夫人不書至而書入不順也竊嘗考之魯莊所娶齊襄之女也若以為僖女歟則僖卒已二十八年矣豈有三十未嫁之女且不應娶母之妹以為夫人也若以為桓女歟則訃齊桓之年盖下於魯莊應未有可嫁之女而得壻魯莊也意者其時惟齊襄尚有遺女未嫁而魯莊求之齊所以難之者盖亦有疑焉齊桓管仲故遲遲其事而魯莊求之愈力想齊之君臣固嗤之矣戰國時楚懐王客死于秦而其子頃襄王迎婦于秦司馬氏通鑑痛之曰忍其父而昏其讎彼父但為秦氏拘留而已未嘗被殺也司馬氏猶痛之况魯莊之父為齊所殺而又娶其女則忍父昏讎之罪奚啻數十倍於楚頃襄也哉而方且飾桓宫用覿幣以夸富盛於齊女魯荘之庸愚一至此夫異日淫縱弑逆之禍殆勢之有所必至齊桓殺之當矣而左氏以為已甚甚哉左氏之無識也僖公夫人聲姜齊桓公之女也禘于太廟用致夫人僖八公及夫人姜氏㑹齊侯于陽穀僖十一公㑹齊侯宋陳衛鄭許邢曹于淮僖十六滅項僖十七夫人姜氏㑹齊侯于卞同上公至自㑹同上齊侯小白卒同上葬齊桓公僖十八公薨于小寢僖三十三葬我君僖公文元夫人姜氏薨文十六葬我小君聲姜文十七僖公之娶夫人納幣不書逆女不書夫人至不書盖皆得禮無譏故也惟夫人既至之後未當廟見而遽於禘祭之時以夫人至于太廟此其失爾魯之諸君僖公頗為賢君魯之諸夫人聲姜頗為賢婦故時人頌僖公而亦以令妻頌夫人然女之歸寧當歸本國也夫人與夫同㑹齊侯于陽穀而因以省問則非其禮矣魯君㑹淮魯臣滅項齊将正公婦人無與外事也夫人為夫出㑹齊侯于卞而因以解釋則非其義矣稔於見聞之非肓於禮義之正是以好成人之美者惜焉文公夫人出姜齊昭公潘之女舍之女兄也公子遂如齊納幣文二逆婦姜于齊文四夫人姜氏如齊文九夫人姜氏至自齊同上齊侯潘卒文十四齊公子商人弑其君舍同上公薨于臺下文十八齊人弑其君商人同上葬我君文公同上公子遂叔孫得臣如齊同上子卒同上夫人姜氏歸于齊同上季孫行父如齊同上文公之納幣不應使公子遂况又其叔父乎逆婦姜者公自逆也婦有姑之辭于齊者譏成禮于齊也夫人如齊者歸寧也其歸得禮故特書至異乎前此夫人之如齊者也出姜盖有所不安而歸寧以愬於父母云爾越六年而齊昭公潘卒夫人失所怙矣同父之弟舎又弑懿公商人者夫人之讎也魯文且遭其陵及魯文既薨商人亦斃公子遂求齊恵公元為大援乃殺夫人所生之太子而立平日私事己者之孽子盖由魯文昏惰嬖妾敢於私事其叔父以致不能保其妻子聞出姜哭而過市之言孰不為之衰宣公夫人穆姜齊恵公元之女公子遂如齊逆女宣元遂以夫人婦姜至自齊同上季孫行父如齊同上公子遂如齊同上齊侯元卒宣十葬齊恵公同上公薨于路寢宣十八葬我君宣公成元夫人姜氏薨襄九葬我小君穆姜同上文公使公子遂納幣已非况宣公逆夫人而可遣僖祖之弟乎行父與遂於成昏之後相繼如齊者猶恐昏姻不足以結大援而重之以賄賂也成公夫人齊姜盖齊頃公無野之女靈公環之妹也叔孫僑如如齊逆女成十四僑如以夫人婦姜氏至自齊同上公薨于路寢成十八葬我君成公同上夫人姜氏薨襄二葬我小君齊姜同上齊頃公無野成公九年卒齊靈公環襄公十九年卒以公族代逆夫人而揭之以至於禮不可其説已具於前婦姜之下氏字趙氏以為衍按經書婦姜者三文公婦姜姑僖公夫人聲姜也成公婦姜姑宣公夫人穆姜也宣公婦姜其姑則文公之妾敬嬴爾魯女恵公長女紀伯姬次女紀叔姬桓公長女杞伯姬次女莒慶叔姬莊公長女宋蕩伯姬伯姬僖九年卒幼女鄫季姬僖公長女宋蕩氏婦次女杞叔姬文公長女或郯伯姬是次女子叔姬文十二年卒子叔姬文十四年齊人執之宣公庶長女莫考次女子叔姬宣五年歸齊髙固適長女宋伯姬夫人穆姜所生成九年歸宋共公六公之女凡十四人其歸為諸侯夫人者六書歸者四紀伯姬杞伯姬鄫季姬宋伯姬是也不書歸者二杞叔姬郯伯姬是也盖先君之女則書歸時君之女則不書歸使男有室使女有家此為人父者之事有女未嫁而先君終至嗣君之時始有所歸傷先君即世之速門内女不得及父存而嫁也若時君自嫁其女則以父歸女其嫁及時此常事爾故僖公以叔姬歸于杞為杞伯姬之婦杞桓公之夫人不書郯季姬盖文公之女文公之時歸于郯亦不書二姬皆因後来被出而書來歸乃見於經也紀伯姬盖恵公之長女隠公之女弟桓公之女兄疑與桓公同母紀裂繻來逆女隠二伯姬歸于紀同上叔姬歸于紀隠七紀侯來朝桓二公㑹紀侯于郕桓三齊侯鄭伯如紀桓五公㑹紀侯于成桓六紀侯來朝同上鄭伯寤生卒桓十一公㑹紀侯莒子盟于曲池桓十二公㑹紀侯鄭伯及齊侯宋衞燕戰齊侯宋衛燕敗績桓十三齊侯禄父卒桓十四公㑹齊侯紀侯盟于黃桓十七齊師遷紀郱鄑郚莊元紀季以􅈶入于齊莊三紀伯姬卒莊四紀侯大去其國同上齊侯葬紀伯姬同上紀叔姬歸于􅈶莊十二紀叔姬卒莊二十九葬紀叔姬莊三十裂繻來逆紀侯不親迎也伯姬歸紀恵公䘮滿而後歸也恵公之薨其在季年秋七月之前乎叔姬歸紀歸娣而與歸女君同隠公厚於先君之女而非禮也恵公欲夫人其仲子而太子其所生隠公順父之意而於仲子於桓公每加厚焉故於桓公同母之女如此予以是知二姬之為桓母所産也中庸云敦厚以崇禮徒厚而不合於禮君子不以為可也紀者齊之同姓也齊将吞滅之其昏於魯也豈但内求助於家抑亦外求援於國也魯桓在位十八年之間紀來朝魯者二魯徃㑹紀者二為紀而與它國盟者二為紀而與它國戰者一紀之資援於魯者甚切魯之圖援於紀者亦甚勤矣齊僖鄭荘當時諸侯之雄黠齊素結鄭二國将共襲紀而為紀所覺其謀不行既而鄭莊卒魯桓能使鄭厲反父所為齊復結宋衛燕四國将共滅紀而魯桓鄭厲潜師于紀竟敗四國之兵既而齊僖卒則二雄黠皆斃紀憂其少紓乎而事又不然也魯桓既為紀敗齊僖之兵遂亟為紀講齊襄之好明年魯桓殞於齊身且不保又何能庇其姻親然終魯桓之世猶能竭心竭力於紀紀未即亡者魯桓不為無功魯莊以童豎嗣立父讎不報而胡可責望其援紀也哉紀失魯援齊逼遷其三邑紀侯知其國之不可存於是命介弟分國事齊俾先祀不絶妻死不葬去國不争此亡國之最善者紀侯隠於民而令終叔姬托於酅而待盡哀哉杞伯姬盖桓公之長女莊公之女弟伯姬歸于杞莊二十五公㑹杞伯姬于洮莊二十七杞伯姬來同上杞伯來朝同上杞伯姬來朝其子僖五杞子卒僖二十五杞子來朝僖二十七公子遂帥師入杞同上杞伯姬來僖二十八杞伯姬來求婦僖三十一杞德公之四年娶魯桓公長女伯姬為夫人時魯桓薨已二十六年而伯姬始嫁姬年殆将三十矣歸杞三年而出㑹其兄未幾夫婦接踵造于魯庭毋乃自嫌其僻陋而嚮慕魯國之甚乎越十有三年伯姬再來以其長子代父行朝禮子年甫十嵗左右爾意者德公有疾而姬欲託其子於魯也是年德公果卒長子成公嗣位十有八年又卒伯姬特來告䘮而魯史書卒自是杞君之䘮無不來赴者矣盖由伯姬欲親魯而然也姬之次子桓公繼成公而立桓之四年來朝本圖結讙而不料啓禍公子遂帥師入其國為責來朝之無禮魯之薄姻親陵小弱如此哉明年伯姬復來消釋舊怨桓之八年年漸可娶伯姬復來締結新好此皆伯姬之欲親魯而然也伯姬以魯莊二十五年歸杞至魯僖三十一年來為其子桓公求婦在杞已歴四十餘年而數數至魯率為扶植其夫維持其子之計求婦以後伯姬不復見經不知何年終也鄫季姬盖荘公之幼女宋蕩伯姬之妹季姬及鄫子遇于防使鄫子來朝僖十四季姬歸于鄫僖十五鄫季姬卒僖十六季姬父母之身教盖無足言僖公號為賢侯而不能閑家有妹如此是可恥也杞叔姬盖僖公之次女杞伯姬來求婦僖三十一杞伯來朝文十二公伐杞宣十八杞伯來朝成四杞叔姬來歸成五杞叔姬卒成八杞伯來逆叔姬之䘮以歸成九杞伯姬來為其子求婦而僖公以次女叔姬與之歸為杞桓公之夫人經於僖之二十五年書宋蕩伯姬來逆婦僖之三十一年書杞伯姬來求婦僖公先以長女與宋蕩伯姬為婦後以次女與杞伯姬為婦也經不書叔姬歸于杞者時若嫁女例不書也按魯僖三十一年乃杞桓之八年魯成五年乃杞桓之五十一年叔姬為杞夫人四十餘年夫婦年皆六十以上各已老矣而姬始來歸盖非為夫家所出疑是叔姬無子杞桓别有妾子為太子叔姬心不自安而願歸魯故叔姬既卒而杞桓復來逆其䘮以歸以是知其非為夫家所出也郯伯姬不知何公之女或文公之長女歟郯伯姬來歸宣十六伯姬歸于郯盖是父存之時故不書于經宋伯姬宣公之女成公之妹宋公使華元來聘成八宋公使公孫夀來納幣同上衛人來媵同上伯姬歸于宋成九季孫行父如宋致女同上晉人來媵同上齊人來媵成十宋公固卒成十五葬宋共公同上宋災宋伯姬卒襄三十𦵏宋共姬同上共姬宣公夫人穆姜之愛女也故其歸女之禮特隆焉擇配而儀九命之上公未納幣而彼有上卿来聘既歸宋而此有上卿徃致皆其禮之特隆者也雖然納幣常事也而書者以公孫夀之不當使也媵賤事也而書者以三國來媵之越禮制也為君夫人僅七年而得以終所天共姬之婦德靡虧矣為君母餘三十年而不得以終其天宋平之子道何如也噫以上魯女歸于諸侯為夫人者六為娣者一凡七莒慶叔姬盖桓公之次女莒慶來逆叔姬莊二十七叔姬年亦将三十矣昏姻之不得及時者也當為杞伯姬之娣而别以歸莒大夫慶書者譏莊公降尊而自主大夫之昏宋蕩伯姬盖莊公之長女鄫季姬之姊也宋蕩伯姬來逆婦僖二十五伯姬歸于宋大夫蕩氏之内子因來為其子逆婦而見於經伯姬盖亦荘公之女伯姬卒僖九未嫁故不繫國已許嫁故書卒莊女有二伯姬者或是孟任所生之長女或是哀姜所生之長女皆稱伯姬也或以此為僖女則伯上當有子字宋蕩氏婦盖僖公之長女宋蕩伯姬來逆婦僖二十五僖公之女許嫁宋蕩伯姬之子而伯姬自來逆之以姑逆婦非禮之杞伯姬所求之婦是僖公次女叔姬則知此蕩伯姬所逆之婦當是僖公長女也子叔姬文公之女子叔姬卒文十二子者時君之女亦未嫁而已許嫁者故卒之也子叔姬盖亦文公之女齊人執子叔姬文十四齊人來歸子叔姬文十五此子叔姬盖十二年卒者之妹兩母所生之次女皆稱叔姬故有两子叔姬亦如莊女之有两伯姬也左氏以此子叔姬為齊昭姬謂是齊昭公夫人齊侯舎之母也且魯文四年所逆婦姜即是齊昭公之女齊昭乃魯文之婦翁豈可反以魯文為齊昭之婦翁也哉縱使魯文為太子時所生之女亦未應其女嫁人而生子可立為君也指為齊侯舍之母者考其年不合足見其誣矣昭姬盖是齊昭公所娶它國姬姓之女非魯女也齊髙固子叔姬宣公之女齊髙固來逆子叔姬宣五齊髙固及子叔姬來同上此子叔姬宣公未為國君時妾之所生也國君女嫁大夫命大夫主之君不自主經書莒慶來逆叔姬齊髙固來逆子叔姬皆譏國君自主大夫之昏也宣公簒立懼諸侯之討而倚齊以為援髙固齊當國之卿挾勢而脅取其女魯宣不敢不從昏姻之禮如敵體然譏之者傷之也其時宋伯姬盖猶未生故後二十三年乃歸于宋伯姬年在叔姬之下而稱伯姬者適夫人之長女也叔姬生在伯姬之先而稱叔姬者妾所生之庶女也以上魯女歸于大夫者四未嫁而卒者二方嫁而執者一凡七春秋纂言總例卷三
