body:
  text: 春秋纂言總例卷一元呉澄撰天道年隠公元年己未竟己巳凡十一年桓公元年庚午竞丁亥凡十八年莊公元年戊子竟己未凡三十二年閔公元年庚申竟辛酉凡二年僖公元年壬戌竟甲午凡三十三年文公元年乙未竟壬子凡十八年宣公元年癸丑竟庚午凡十八年成公元年辛未竟戊子凡十八年襄公元年己丑竟己未凡三十一年昭公元年庚申竟辛夘凡三十二年定公元年壬辰竟丙午凡十五年哀公元年丁未至庚申春獲麟凡十四年新君繼世踰年稱元年先儒謂踰年改元非也自漢武帝後天子立年號以紀元繼世之君次年更易舊君年號而别立年號故曰改元古諸侯非如後世天子之有年號直以在位之一年而稱為元年爾何改之云又謂諸侯無史記不當僣稱元年亦非也後世天子既有年號則諸侯之國紀事皆用天子之年古天子無年號諸侯但遵用時王之正朔而已年則自以其國君在位之一年二年而紀何僣之有按禮記内則言閭史州史夫以二十五家之閭尚且有史以記一閭之事豈有諸侯之君而乃無史以記一國之事乎魯自伯禽初封子考公首嗣弟煬公熙立子幽公宰嗣弟魏公瀆弑宰簒立子厲公擢嗣弟獻公其立子貞公濞嗣弟武公敖立廢長子招次子懿公戲嗣立招之子伯御弑戲簒立宣王誅之戲之弟孝公稱立子恵公弗湟嗣春秋前十三世不滿四百年春秋隠桓莊閔僖文宣成襄昭定訖哀十四年十二世凡二百四十二年春秋後哀公又十三年通計二十七年子悼公寜嗣三十七年子元公嘉嗣二十一年子穆公顯嗣三十三年子共公奮嗣二十二年子康公屯嗣九年子景公匽嗣二十九年子平公旅嗣二十二年子文公賈嗣二十三年子頃公讎嗣二十四年楚滅魯春秋後九世凡二百二十年共三十四世八百餘年時春二百四十二公羊莊二十六年闕春字夏二百四十一秋二百三十九闕秋二桓四七冬二百三十七闕冬四桓四七昭十定十四公羊成十年亦闕冬時者天之春夏秋冬也初昏斗柄指寅指邜指辰之月為春指巳指午指未之月為夏指申指酉指戌之月為秋指亥指子指丑之月為冬夏后氏以建寅為正月孟春為歳首季冬為歳終最得天時之正商人以建丑為正月漢律厯志所援商厯十有二月冬至為歳終周人以建子為正月故禮記左傳冬至在正月夏至在七月考漢律厯志則周書武成召誥所載月數皆從建子之月數起又考周官所言春夏秋冬四時則與夏商無異盖月數雖改而天時不可改也古書凡書時者不繫以月金縢秋大熟未獲是也書月者不冠以時召誥惟二月既望是也春秋書時而繫以月書月而冠以時盖因魯厯改時而書以譏其變常正月二月冬也而曰春四月五月春也而曰夏七月八月夏也而曰秋十月十有一月秋也而曰冬據實書之其非著矣月王正月九十三隠元桓元二十十八莊元三五六八十十一十六十九二十一二十二三十閔元二僖元二三四六八十十五十六十八二十四二十五二十六三十三十二文元三五八十二十三十四宣元三四九十四十六十七成元三五六七九十四十六十八襄元二八十一十四十六十九二十二十一二十二二十九三十三十四昭元三四五六七十十五二十二十三二十六三十三十一三十二定二三六七八九十五哀元八闕王十桓三四五六八十一十二十四十六十七王二月二十一隠三四十莊二四二十僖三十三文二十八宣二成十五襄十七二十三二十六昭十一二十四定四哀二四九十闕王三桓七十三十五不首時十七桓十七莊十文元九十二成元三六九襄十四十五昭十五定三六八十四十五王三月十九隠七莊十二十八二十四三十八僖九十二十九文十成十一襄四六十二昭十八二十一二十八定元五十不首時三十四隠元三八九桓元二十三十五莊元四十僖十三十六二十八文二五七九十五宣元成元四十三十五襄十六二十三昭元七十二十四二十六定四八哀十四月五十九隠三五桓元二六九十五十六十八莊三七十二十九二十八三十一僖三十三十六二十五二十八三十一三十二三十三文元七八十七宣六十十八成二四十十六襄三七十一十四二十二三十昭七八九十一十三十四二十二二十七二十八二十九三十一定三四七九十一哀元二三五月五十三隠元二六十一桓八十十一十四十五十七莊三十一二十一二十二二十五閔二僖二十五十八二十二十三二十八文三十三十四十六十八宣十十四十五成七十十三襄二九十十六二十五二十九三十昭三十一十二十八十九二十四定二四十四十五哀三十一十二六月五十七隠八十桓三十二十七莊四六十十三二十五二十七三十一閔元僖元三十四十九二十七二十八二十九文二十四十五十六十七十八宣元四八十十二十五十七成二六十十五十六十七襄二三二十二十五三十一昭元十五十七十八二十二二十三二十八三十定元四五九哀四七月七十二隠元六八九十一桓二三九十一十二十三十六十八莊二四九十三十四二十二十一二十二三十三十二僖元二八九十十二十五十六二十四三十一文二十十三十四宣八十二十八成二八九十十三襄二四十一十九二十二二十四二十七三十昭四五十十二二十一二十三二十五二十八二十九三十二定元四五八十五哀三六八十一八月五十九隠二三八桓六十二十四十七莊九十二二十四三十三十二閔元二僖元四五十一十四十五十八二十二二十七文二六七八九十六宣六九成二七十五十八襄四七九十五十九二十三二十四二十五二十六二十八昭三七十三十四十六十七二十一二十三二十四三十定十五哀二四七九月五十一隠元二四五八桓二三六十一十五莊