或他國告辭不具不當書日而書日者皆有意也合書日而不書者盖為同日上文已有事不可重言其日亦有舊史文闕不合書日而書日者盖為同日下文有大事須書日故於上文書之亦有同時上文有大事既書日矣若下文不書日則似同日故書日以别之事合書日而值晦朔則因寄其晦朔以為推厯之徴驗日食皆書日及朔不書日者文闕不書朔者或非朔日星不見星隕及隕石有定日故書日其星孛或累日或逾月則書月書時震電如常者不書非常者書日無氷彌時無之者書時其月無之者書月雨氷氷亦書月十二月霜不殺草冬不寒也十月今之八月隕霜記其早也故皆書月雨雪雨雹不踰時但以為災故書其時而不書月日桓八年十月大雨雪今之八月記非時也故書月昭四年王正月大雨雹歳首為災故書月隠九年三月庚辰大雨雪書日者承上文大雨震電之後欲見相去八日之近洊有變異故特書日不雨皆書月者既不成災但記其苦於月不雨爾旱及水皆書時者為其久而成災故不可書月日也饑有年冬收後則知之故但書時無麥禾亦同無麥苖則在秋時地震山崩皆一日故書月書日内災皆書日内事詳也外災或書月或書時莫能定知外事畧也昭十八年夏四月壬午宋衛陳鄭災以四國同日災天下所異故特書日螟螽為害書月者當月有之不連月也書時者連月有之也蟲獸飛禽之異皆書時者但記其異故不假月日惟僖十六年六鷁退飛承上文春正月戊申朔隕石之下故特加是月二字以見其與隕石不同日而同在正月也獲麟書時者從書田狩例公即位皆不書日以其必是朔日故也惟定公以昭公之喪六月乃至故書日以明其既殯而即位且志非常也天王歸入書月以魯史不定知王室之事故也若王史則當書日諸侯歸入納亦然大夫歸入則但書時天王出魯公夫人出遜皆月而不日者出與至皆不同日故不書日諸侯出奔皆書月大夫奔及逃叛則但書時内大夫奔即書月執諸侯皆書月諸侯執他國大夫皆書時若執魯大夫即書月異於外也弑君皆書日大其事也殺他國君亦然外殺公子大夫皆但書時降於君也内刺公子大夫即書日比之卒也昏禮往納幣徃送女依聘例書時逆夫人至國則書月惟莊公逆哀姜特變文書入又書日以示急切外來納幣亦書時外來逆女則書月莒慶來逆不書月文不具内女歸外永離本國故亦書月外女歸外者情不比内但書其時内女自夫家來者但書時不比嫁時也内女被出即書月事切於常也夫人被出亦如之諸侯來朝常事也但記其時僖十四年六月季姬使鄫子來朝以事異特書月也他國使使來聘亦常事故但書時雜事來者亦書時其有事大者如天王錫命之類乃書月爾公如京師及如他國合嘗月或不書者因舊史也故夫子存其書月者以示義内大夫如外但書時㑹葬者即書月重喪事也盟以結二國之好國之大事故例皆書日内盟有不書者文闕外盟多不書者或告辭畧或文闕也其來盟及莅盟不書日者來盟者不以至日盟莅盟者但紀其去盟時所以不日也平者皆書月事輕於盟也公㑹諸侯皆書月重公也外諸侯㑹則但書時内大夫㑹外大夫亦不書月公與諸侯遇禮合書月不書者因舊史也公自外還至國皆書月内大夫至但書時不可比君也諸侯相侵伐但書時輕於入滅故也内侵伐當書月經中書月者少因舊史也故夫子存其書月者以示義内被侵伐當書月經不書月者多意與上同内與外共侵伐義亦同上圍襲追等用日月與侵伐並同内與外取國邑悉書月重於侵伐也内外救皆書月竊記其善也内外次例但書時遷皆書月重於侵伐也降克並同棄師殱亡皆積久而致非一日之事故不書日内兵入他國例合書日不日者史文闕也戰及敗及滅及焚皆書日事重故也軍旅雜事惟大閲及治兵一日之事故書日其餘但記非常及改是作故隨事輕重或月或時以明變常之始爾故皆不書其日蒐狩之禮四時有常變者則書紀其失也但著其時桓四年公狩于郎為公非禮之行故書月興作皆合於農隙但紀其時是非著矣僖二年正月城楚丘内為外城故特書月改革但紀其初不必言日賦稅但紀變常之時故不必標其日月崩薨卒𦵏例嘗日重喪事也雖未踰年之君卒亦書日其不日者故也與成君之薨故則不地者同葬書月以紀得禮失禮也或無月者史文闕郊及廟祭皆記日敬大事也其或不日者文闕若泛序郊廟如卜郊丹楹等即不日非祭事故也雩事為旱而非正祭故月而不日其社祭自有定日其他所載皆雜事故亦不日變異日食三十六有日有朔二十六桓三既莊二十五二十六三十僖五文十五成十六十七襄十四二十二十一再二十三二十四既再二十七昭七十五十七二十一二十二二十四三十一定五十二十五有日無朔七隠三僖十二文元宣八既十十七􅏆十五無日有朔一桓十七日朔俱無二莊十八僖十恒星不見莊七隕同上有星孛文十四昭十七襄十三震電隠九震夷伯之廟僖十五隕霜不殺草李梅實僖三十三隕霜殺菽定元無冰桓十四成元襄二十八雨木冰成十六大雨雪隠九僖十雨雪桓八大雨雹僖二十九昭三四大雨隠九雨僖三不雨莊三十一僖二三再文二十十三大旱僖二十一宣十饑宣十十五大饑襄二十四無麥苖莊七大無麥禾莊二十八有年桓三大有年宣十六地震文九襄十六昭十九二十三哀三沙鹿崩僖十四梁山崩成五隕石僖十六大水桓元十三莊七十一二十四二十五宣十成五襄二十四火宣十六災桓十四僖二十成三襄九三十昭九十八定二哀三四大災莊二十螟隠五八莊六螽桓五僖十五文八宣六十三十五襄七哀十二十三再雨螽文三蝝生宣十五有蜚莊二十九有􅈮莊十八多麋莊十七有鸜鵒來巢昭二十五六鷁退飛僖十六獲麟哀十四自日食至此皆天道之變異也春秋常事不書唯變異則書有年大有年獲麟亦是變異或指為祥瑞者非二百四十二年有年者再而已豈得謂祥乎麟非治世不出出於亂世為獵人所獲而死異孰大焉春秋纂言總例卷一
