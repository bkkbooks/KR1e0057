body:
  text: 春秋纂言總例卷七元吳澄撰吉禮郊四月三卜郊不從乃免牲襄七四月四卜郊不從乃免牲僖三十一四月四卜郊不從乃不郊襄十一四月四卜郊不從乃不郊成十正月郊牛之口傷改卜牛牛死乃不郊宣三正月鼷鼠食郊牛角改卜牛鼷鼠又食其角乃免牛不郊成七正月鼷鼠食郊牛牛死改卜牛四月辛亥郊定十四正月鼷鼠食郊牛角改卜牛四月辛巳郊哀元九月辛丑用郊成十七經書天神之祀此其一趙氏曰郊者天子所以事不上帝也魯曷為有之成王尊周公故錫天子之禮於日至避王室也卜用夏正於農耕之始也啖氏曰天子以冬至祭上帝又以夏之孟春祈榖於上帝謂之郊魯以周公之故得以孟春祈穀於郊郊皆用辛二月卜三月上辛不吉則卜中辛又不吉則卜下辛陸氏曰卜三旬皆不吉則不郊凡牲必養二牲一以祀上帝一以祀后稷帝牛有變則改卜稷牛以代之而别以他牛為稷牛者卜稷牛不吉及稷牛又死亦皆不郊凡不郊皆卜免牲卜免牲吉則免之不吉則但不郊而已不敢免繫牲待明年元牲時不用未成牲曰卜牲傷者亦曰牛澄按經之書郊者九龜違者四牛災者四非時大不敬者一魯郊雖僭然行之已久視為常事故亦不書惟卜之不從牛之有變及時之大異於常而後書因以見其僭郊之非禮也三卜不從而不郊正也三不吉而至四卜四不吉而乃免牲瀆甚矣牛災洊作亦可見魯郊之僭鬼神亦弗之與也四月之郊固為不時然猶是夏時之春也九月則孟秋建申之月豈郊之時乎不卜日不卜牲而強用其禮焉故特書曰用非時之甚不敬之大也雩大雩二十七月上辛大雩一季辛大雩附趙氏曰季辛不言大從上文可知也昭二十五八月大雩四僖十一襄二十八昭三昭二十四九月大雩七僖十三襄八襄十七昭六昭十六定元定七秋大雩七桓三成三襄五襄十六昭八定七定十二冬大雩一成七經書天神之祀此其二雩祀為祈澤設諸侯雩于境內山川則祭地示也唯天子雩于上帝者為祀天神魯郊既僭王禮故其雩祀亦僭王禮經特書曰大雩以表其為天子祀上帝之雩而非諸侯祭山川之雩也左傳謂龍見而雩過則書龍見者孟夏建已之月經無書六月雩者蓋得禮則不書七月八月九月則皆過時故書也書秋者史失其月然不出乎七八九之三月書冬則建酉之月穀已成熟尤為非時也魯有舞雩壇蓋祀帝于壇如郊焉而用盛樂歌舞於壇上故名其壇為舞雩而日亦如郊之用辛也月令大雩帝在仲夏彼蓋秦禮與古異社日食鼓用牲于社莊二十五莊三十文十五大水鼓用牲于社于門莊二十五經書地示之祭此其一社者祭地示也其祭存常祭其日有常日其事為常事故皆不書經所書社凡四非為社書也以遭日食大水之變而乃用牲于社為非禮故書爾望乃免牲猶三望僖三十一乃不郊猶三望宣三乃免牛不郊猶三望成七經書地示之祭此其二望者望祭山川也天子祭四望謂望東西南北四方之山川而祭之每郊祀上帝必望祭山川天子郊禮舉則祭四望魯諸侯也以成王之賜雖許用王禮然郊祀不得用冬至而但得為孟春之郊郊後不得祭四望而闕其一方但祭三望皆殺於王禮也望祭在郊祀之後因郊而望也郊禮既廢則望禮可以不舉魯既不郊而猶三望故書以譏其非傳云猶者可以已之辭也又云不郊亦無望可也禘禘于太廟禘者廟享之大禮自昔帝王之興推其基業功德之所起者為太祖太祖居第一廟曰太廟其尊蔑以加矣猶以報本反始之意為未足又推太祖之所自出追享于太祖之廟而太祖降居子孫之位以配食是之謂禘后稷為周太祖后稷出自帝嚳故禘嚳於太祖后稷之廟而以后稷配嚳也成王賜魯得禘則以文王為周公所自出故禘文王於太祖周公之廟而以周公配文王也逸禮有禘于太廟禮今篇名存而其禮亡用致夫人禘于太廟之禮雖大然經不書所以書者因用致夫人之非禮而書也用致夫人義見經注此不重釋僖八吉禘于莊公夫禘者追享無廟之上世位于太廟之尊位而本廟之正主降居卑位以配食也此乃享新祔之莊公于其廟而已非别有所追饗而降莊公為配食也然則何以謂之禘欲尊莊公故僭用禘禮之盛樂於其廟而因名之曰禘爾非禘而曰禘書之以見僭用禘樂竊用禘名之罪喪未二十七月而遽吉祭故加吉字於禘之上新祔未可以稱宫故不曰莊宫而曰莊公其時閔公幼事出亂臣淫妻之所為無知不孝非禮非義而其名非實一舉而五惡具書法五字諸罪畢見真聖筆也閔二經書人鬼之享此其一按吉禘于莊公有禘之名無禘之實雖是僖公以前事因其竊用禘名而附于僖公禘太廟之後以著其非焉祫大事于太廟大事者祫也祫亦廟享之大禮亞於禘者也天子四親廟之上有二祧廟四親二祧為三昭三穆矣太祖之廟而七二祧之上親盡廟毁不與時享矣若有功德則别立為宗其廟百世不毁與太祖同非百世不毁之宗者其主皆藏於太廟之夾室三年一祫則太祖而下祧廟而上毁廟之主皆合食於太廟是之謂祫斯禮也天子有之諸侯則否魯既得禘又得祫是以毁廟之主亦有時合食於太祖之廟經所書大事于太廟是也先儒名此禮為大祫蓋以又有時享之祫故加大字以别於時祫有祫者四親廟之主共享于太廟而毁廟之主不與也今正其名不以時享之祫為祫惟此大祫得專祫之名既専其名則不須加大字以别之也躋僖公有事于太廟之禮雖大然經亦不書所以書者因躋僖公之非禮而書也文二從祀先公從者順也先公謂閔僖二公也文公時躋僖公於閔公之上後君位于前前君位于後是為逆祀今再復閔公位僖公之上而昔之逆者順矣故曰從祀定八經書人鬼之享此其二因躋僖公而附從祀先公於後以備一事之始終時享六月辛巳有事于太廟大事者祫享之大禮也有事者時享之常禮也先儒名此為時祫禮記孔氏疏云迎髙曽祖禰於太祖之廟合祭秦溪楊氏云為四時禴祠蒸嘗祭羣廟禮煩乃於太祖之廟合髙曽祖禰之主共祭之澄按時享之禮或分享於五廟或合享於太廟分享煩而難合享簡而易合享則書有事于太廟分享則書四時祭名或分或合均為時享故今謂此禮不得名為祫也仲遂卒于垂壬午猶繹萬入去籥有事于太廟常事不書為卿卒猶繹之非禮而書也宣八二月癸酉有事于武宫諸侯惟祭禰祖曽髙四親廟成公之時宣公文公僖公閔公為親廟上距武公十二世矣廟已久毁乃於戰鞍之後復祭其廟武公既有廟則亦以時而行享禮故書有事于武宫籥入叔弓卒去樂卒事有事于武宫本不書因為叔弓卒於祭所其事非常故書昭十五正月己卯蒸五月丁丑蒸建子之月冬蒸得禮無譏為下建辰之月再蒸非時而黷祀故先書正月之蒸以起下文桓八八月壬申御廪災乙亥嘗趙氏曰譏不時又不改卜也澄按不時謂夏之季夏而秋嘗也改卜謂御廪災之後當用改卜次月之日也桓十四經書人鬼之享此其三按王制所紀四時禴祠蒸嘗之禮或特或祫程子云祭諸廟禮煩故每年四祭之中三祭合食於祖廟張子云天子七廟一日而行則力不給故禮有一特一祫之説特則祭一祫則遍祭春祭髙祖夏祫羣廟秋祭曽冬又祫來春祭祖夏又祫秋祭禰冬又祫秦溪楊氏云張子一特一祫之説雖可通但言特者只祭一廟遺其餘廟恐有所不安不若程子之言簡而意備澄謂程子之言雖簡而意亦未備蓋不言七廟之享是一日而行禮乎抑各日而行禮乎一日行禮則力不給若各日行禮諸廟皆須卜日齋戒必兩三月始可畢七廟之祭若諸廟不復卜日齋戒但連日接續行禮亦精神困憊無復可交神明今以張子特則祭一之説而釋之曰祭一者謂人君自祭此一廟也餘廟則大臣攝行其人君自祭之廟今年一時祭髙一時祭曽明年一時祭祖之時祭禰周而復始四時四享一年特祠特嘗一年特禴特蒸不專是春秋特而夏冬祫也如此庶幾近之又按有事于武宫叔弓涖事亦是以臣攝行君不在也姑附論于此俟精深於禮者議之廟公羊傳曰周公稱太廟魯公稱世室羣公稱宫取郜大鼎于宋納于太廟桓二經書太廟者四其三見前并此凡四世室屋壞文十三經書世室者一左氏穀梁世作大非也今從公羊立煬宫定元立武宫成六丹桓宫楹莊二十三刻桓宫桷莊二十四桓宫僖宫災哀三新宫災成三考仲子之宫隱五經書宫者八煬宫一武宫二其一見前桓宫三僖宫一新宫一仲子之宫附見主作僖公主此主謂栗主也桑主作於虞祔之時栗主作於小祥之時既有栗主則埋其桑主僖公三十三年十二月薨文公元年十二月及一期矣二年二月喪已十五月始作粟主怠慢於喪事無孝敬之心也文二年三月丁丑天子諸侯之廟享必有主故以此附於宫廟之後告朔閏月不告朔猶朝於廟趙氏曰天子常以今年冬頒明年正朔於諸侯諸侯受之每月奉月朔甲子以告于廟所謂稟正朔也文公以閏非正不行告朔禮但以其朔日至廟拜謁而已不告朔而至廟謁故譏之文六五月公四不視朔文公齊昭公之壻也文十四年齊昭公卒其弟懿公商人弒昭公之子舍而篡立執魯臣魯女以辱魯又侵伐不已文公遣季文子往求盟齊懿弗與之盟要文公親出文公憚於一往託為有疾以詐齊而不視其年二月三月四月五月之朔詐稱有疾不能出乃遣襄仲納賂求盟而後得盟既盟之後又復來伐至十七年文公強勉一出親與齊懿盟而後得免侵伐次年齊懿被弒矣視朔者告朔朝廟畢退而視朝聽政也前時閏月雖不告朔而朝廟聽政自若今既詐齊而不視朔則不告朔不朝廟可知文十六告朔者一月一至太廟也故亦附於宫廟之後初獻六羽隱五二肆大眚莊二十以上事之無例可附者二附綴八十八例之終云春秋纂言總例卷七
