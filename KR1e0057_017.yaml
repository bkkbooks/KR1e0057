body:
  text: 春秋纂言卷十元吳澄撰昭公名稠襄公妾齊歸之子在位三十二年夫人吳孟子元年庚申景王四年晉霸平十七年蔡靈二年曹武十四年衛襄三年鄭簡二十五年陳哀二十八年杞文九年宋平三十五年齊景七年秦景三十六年楚郟四年卒吳夷末三年春王正月公即位叔孫豹會晉趙武楚公子圍齊國弱宋向戌衛齊惡陳公子招蔡公孫歸生鄭罕虎許人曹人於虢國弱公弱作酌後同齊惡公齊作石招常遙切罕虎公罕作軒後同虢公作漷榖作郭左傳曰尋宋之盟也祁午謂趙文子曰宋之盟楚人得志於晉今令尹之不信諸侯之所聞也子弗戒懼又如宋子木之信稱於諸侯猶詐晉而駕焉况不信之尤者乎楚重得志於晉晉之恥也文子曰宋之盟子木有禍人之心武有仁人之心是楚所以駕於晉也今武猶是心也楚又行僣非所害也武將信以為本吾聞之能信不為人下吾不能自難楚不為患楚令尹圍請用牲讀舊書加於牲上而已晉人許之杜氏曰楚恐晉先歃故欲從舊書加於牲上不歃血經所以不書盟讀舊書荆楚先晉而先書趙武者張氏曰春秋正中外之分宋之盟楚爭先而晉不與較今虢之役又以計讀書加牲上是以蠻荒而爭勝也內外之分不可亂故二役皆先趙武焉髙氏曰此會乃楚公子圍帥諸侯之大夫尋宋之盟也宋之盟齊人不預焉今齊又從楚矣中國徴弱可知也莒人弒君諸侯不共討之者是時楚人方聽莒人之訴而欲執魯大夫是不以莒人為可討也春秋不書莒人蓋斥之爾衛齊惡在陳蔡之上者上卿也三月取鄆鄆公作運後同左傳曰季武子伐莒取鄆莒人告於會楚告於晉曰尋盟未退而魯伐莒瀆齊盟請戮其使樂桓子相趙文子欲求貨於叔孫而為之請使請帶焉弗與梁其脛曰貨以藩身子何愛焉叔孫曰諸侯之會衛社稷也我以貨免魯必受師是禍之也何衛之為雖怨季孫魯國何罪叔出季處有自來矣吾又誰怨然鮒也賄弗與不已召使者裂裳帛而與之曰帶其褊矣趙孟聞之曰臨患不忘國忠也思難不越官信也圗國忘死貞也謀主三者義也有是四者又可戮乎乃請諸楚曰魯雖有罪其執事不辟難畏威而敬命矣子若免之以勸左右可也不靖其能其誰從之魯叔孫豹可謂能矣請免之以靖能者子會而赦有罪又賞其賢諸侯其誰不欣焉望楚而歸之疆場之邑一彼一此何常之有主齊盟者誰能辨焉莒魯爭鄆為日久矣苟無大害於其社稷可無亢也子其圗之楚人許之夏秦伯之弟針出奔晉針其亷切左傳曰秦后子有寵於桓如二君於景其母曰弗去懼選針適晉其車千乘公羊傳曰此仕於晉也千乘之國而不能容其母弗故謂之出奔也胡氏曰夫后子出奔其父禍之而罪秦伯何也春秋以均愛望人父而以能友責人兄父母有愛妾猶終身敬之不衰况兄弟乎六月丁巳邾子華卒悼公也在位十五年晉荀吳帥師敗狄于太原太原左作大鹵左傳曰晉中行穆子敗無終及羣狄於大原崇卒也將戰魏舒曰彼徒我車所遇又厄以付共車必免困諸厄又克請皆卒自我始乃毁車以為行五乘為三伍為五陳以相離兩於前伍於後專為右角參為左角偏為前拒以誘之狄人笑之未陳而薄之大敗之榖梁傳曰中國曰大原外域曰大鹵公羊傳曰此大鹵也謂之大原地物從人也相氏曰大鹵大原晉陽縣胡氏曰薄伐玁狁至於大原詩人笑之謂不窮追逺討及封境而止也大原在禹服之內而狄人來侵攘斥宜矣其過在毁車崇卒以詭誘狄人而敗之爾後乘車戰法亡崇尚步卒以詐變相髙皆此等啓之髙氏曰書敗狄所以與中國之勝也箕與交剛之役皆書人至是卿帥師則晉益衰矣秋莒去疾自齊入于莒去起吕切左傳曰莒展輿立而奪羣公子秩公子召去疾於齊齊公子鉏納去疾孫氏曰莒子二子長去疾次展輿莒子遇弒去疾奔齊展輿立國人不與程子曰去疾假齊之力以入莒討展輿之罪正也故稱莒莒展輿出奔吳展下公榖無輿字陸氏曰莒展輿雖踰年猶不書爵髙氏曰不稱莒子聖人不與其為君也展輿吳出也故奔吳程子曰展輿為弒君者所立而亦以國氏何也虢之會雖國亂未與然諸侯與其立矣故欲執叔孫也稱莒展輿罪諸侯之與其立也叔弓帥師疆鄆田左傳曰因莒亂也趙氏曰凡疆田而書帥師皆有難也髙氏曰文十二年季孫行父嘗帥師而城之復為莒所取今乘莒之亂而取之又帥師以疆其田必帥師者以不義得之懼不服也疆之者溝封之以别乎莒也劉氏曰譏以亂為利也葬邾悼公髙氏曰入春秋來邾始書葬蓋邾滕薛小國也秦逺國也皆至昭公而書葬是時魯衰甚矣小國如大國逺國如近國冬十有一月己酉楚子麋卒麋公榖作卷左傳曰楚公子圍將聘於鄭伍舉為介未出竟聞王有疾而還伍舉遂聘公子圍至入問王疾縊而弒之遂殺其二子幕及平夏右尹子干出奔晉宫廄尹子晳出奔鄭殺太宰伯州犂于郟葬王於郟謂之郟敖澄曰楚圍之欲弒逆而篡立也久矣郟敖有疾圍自外至入問其疾適值其卒因殺其君之二子而自立國人遂疑麋之卒為圍所弒也夫子别嫌明微以明其非弒圍之逆亂如仲遂之殺子惡而己未嘗弒麋也吕氏曰經書楚子麋卒而左氏以為公子圍弒之至誅慶封則左氏榖梁又載慶封稱圍弒君之語後垂緣楚圍汰侈遂以為實甚矣三傳之為經害也趙盾弒其君曰非盾也穿也許止弒其君曰不嘗藥也鄭伯髠頑如會未見諸侯而卒而曰子駟弒之也凡若此類皆誣偽失實重為經害者也楚公子比出奔晉髙氏曰靈王既殺其君之子而自立比為令尹力不能制亦不從亂是以出奔春秋書之為十三年起也經書月四書日二大衍厯正月辛巳小乙酉冬至閠月庚戌大二月庚辰小三月己酉大四月己卯小五月戊申大經六月丁巳在此月六月戊寅大七月戊申小八月丁丑大九月丁未小十月丙子大十一月丙午小己酉四日十二月乙亥大長厯是年閏十二月丁巳六月十一日己酉不在十一月二年辛酉景王五年晉霸平十八蔡靈三曹武十五衛襄四鄭簡二十六陳哀二十九杞文十宋平三十六齊景八秦景三十七楚靈王虔元年吳夷末四春晉侯使韓起來聘左傳曰韓宣子來聘且告為政而來見髙氏曰起韓厥次子也襄七年韓厥老長子無忌有廢疾讓起為卿公新即位晉不敢輕魯釋其姦盟取鄆而以貴卿來聘焉夏叔弓如晉左傳曰報宣子也秋鄭殺其大夫公孫黑左傳曰鄭徐吾犯之妹美公孫楚聘之矣公孫黑又使強委禽焉犯懼告子産子産曰是國無政非子之患也唯所欲與適子南氏子晳怒既而櫜甲以見子南欲殺之而取其妻子南知之執戈逐之及衝擊之以戈子晢傷而歸告大夫曰我好見之不知其有異志也故傷大夫皆謀之子産曰直鈞幼賤有罪罪在楚也乃執子南放之于吳鄭伯及其大夫盟于公孫段氏罕虎公孫僑公孫段印段遊吉駟帶私盟於閨門之外實薰隧公孫黑強與於盟使大史書其名且曰七子子産弗討鄭公孫黑將作亂欲去遊氏而代其位傷疾作而不果駟氏與諸大夫欲殺之子産在鄙聞之懼弗及乘遽而至使吏數之曰伯有之亂以大國之事而未爾討也爾有亂心無厭國不女堪專伐伯有而罪一也昆弟爭室而罪二也薰隧之盟女矯君位而罪三也有死罪三何以堪之不速死大刑將至再拜稽首辭曰死在朝夕無助天為虐子産曰人誰不死凶人不終命也不速死司寇將至縊尸諸周氏之衢加木焉髙氏曰黑則有罪而鄭人初畏其強不之討也今因其疾而幸勝之亦云殆矣故稱國以殺冬公如晉至河乃復左傳曰韓須如齊送女齊陳無宇逆女致少薑少薑有寵於晉侯謂之少齊少薑卒公如晉及河晉侯使士文伯來辭曰非伉儷也請君無辱孫氏曰公如晉至河乃復者六唯二十三年書有疾明有疾而反餘皆見距不納大取困辱也髙氏曰公如晉而晉不納春秋以公至河乃復為文者臣子之心不欲其君見拒於人而以為公臨河而不濟懼涉難而自復也乃者有阻之辭公不以禮自重而自取輕辱於大國也且公得至晉是公得與乎國事也季氏不使公與國事故公不得至晉焉季孫宿如晉左傳曰公還季孫宿遂致服焉榖梁傳曰公如晉而不得入季孫宿如晉而得入髙氏曰以是知晉不納公季孫有以使之也經書月無書日無大衍厯正月乙巳小乙卯冬至二月甲戌大三月甲辰小四月癸酉大五月癸卯小六月壬申大七月壬寅小八月辛未大九月辛丑小十月庚午大十一月庚子大十二月庚子小三年壬戌景王六年晉霸平十九蔡靈四曹武十六衛襄五鄭簡二十七陳哀三十把文十一宋平三十七齊景九秦景三十八楚靈二吳夷末五春王正月丁未滕子原卒原公作泉成公也春秋於滕至是三書其卒夏叔弓如滕滕小國也而魯使卿往會其葬以我襄公之葬滕子來會故報之也五月葬滕成公秋小邾子來朝左傳曰小邾穆公來朝季武子欲卑之穆叔曰不可曹滕二邾實不忘我好敬以逆之猶懼其二又卑一睦焉逆羣好也其如舊而加敬焉季孫從之髙氏曰公即位之初大國來聘小國來朝非不可為之國也而終之以流播詩曰靡不有初鮮克有終可不戒哉八月大雩冬大雨雹雨去聲北燕伯欵出奔齊左傳曰燕簡公多嬖寵欲去諸大夫而立其寵人燕大夫比以殺公之外嬖公懼奔齊胡氏曰大夫國之陪二晉屬公弒三郤立胥童而弒於匠麗氏漢隱帝殺楊史立郭允明而弒於趙村衛獻公蔑冢卿而信其左右亦奔夷儀故人主不尊陪二而與賤臣圖柄臣者事成則失身而見弒事不成則失國而出奔此有國之大戒也經書月三書日一大衍厯正月己亥大丁未九日庚申冬至二月己巳小三月戊戌大四月戊辰小五月丁酉大六月丁卯小七月丙申大八月丙寅小九月乙未大閠月乙丑小十月甲午大十一月甲子小十二月癸巳大長厯丁未正月十日四年癸亥景王七年晉霸平二十蔡靈五曹武十七衛襄六鄭簡二十八陳哀三十一把文十二宋平三十八齊景十秦景三十九楚靈三吳夷末六春王正月大雨雹雹公穀作雪胡氏曰雹者隂脅陽臣侵君之象是時季孫宿襲位世卿弱公室數月之間再有雹變申豐者季氏之孚也不端言其事歸咎藏氷之失誣矣夏楚子蔡侯陳侯鄭伯許男徐子滕子頓子胡子沈子小邾子宋世子佐淮夷會于申左傳曰楚子使椒舉如晉求諸侯晉侯欲勿許司馬侯曰晉楚唯天所相不可與爭君其許之乃許楚使楚子問於子産曰晉其許我諸侯乎對曰許君晉君少安不在諸侯其大夫多求莫匡其君在宋之盟又曰如一若不許君將焉用之王曰諸侯其來乎封曰必來不來者其魯衛曹邾乎曹畏宋邾畏魯魯衛逼於齊而親於晉唯是不來諸侯如楚魯衛曹邾不會曹邾辭以難公辭以時祭衛侯辭以疾鄭伯先待于申椒舉言於楚子曰臣聞諸侯無歸禮以為歸今君始得諸侯其慎禮矣霸之濟否在此會也杜氏曰胡汝隂縣西北有胡城張氏曰淮夷淮浦之夷後漢志下邳國有淮浦縣申薑姓之國在南陽宛縣程子曰晉平不在諸侯楚於是強為霸者之事孫氏曰中國自宋之會政在大夫諸侯不見者十年楚子得大合諸侯於此者中國不振喪亂日甚幅裂橫潰自是天下之政中國之事皆荆楚制之至於平丘召陵之會諸侯雖再出尋復叛去事無所救不足道也髙氏曰楚子會諸侯者尋宋之盟也謀吳也圖霸也蓋中國自晉平始衰齊靈莊背之平公屢合諸侯以討焉襄二十五年莊公遇弒始與晉平晉侯自是不復出與盟會其大夫趙武為政不在諸侯故諸侯少安然而晉日以衰政在六卿楚子始求合諸侯而未定問於子産曰晉其許我乎又曰諸侯其來乎則靈王固自以為不足服諸侯而懼其未必從矣當是時使晉稍自強其誰敢與爭晉強而諸侯從之則楚亦不能肆其志也而晉方且溺於嬖寵故楚偃然得專諸侯諸侯舍晉無所附亦不得已而從楚雖然楚之會諸侯也非與國則小國爾魯齊衛曹薛邾杞不會也宋鄭滕小邾雖會而終不與也以是知楚人必不能主中國也蔡人春秋以來常在陳衛之上自莊十六年之後以服屬於楚故未嘗一會而先陳衛者今楚子大合諸侯故復居陳之上楚人執徐子左傳曰徐子吳出也以為二焉故執諸申髙氏曰執之非道也蓋楚子亦欲效桓文之舉以示威諸侯爾秋七月楚子蔡侯陳侯許男頓子胡子沈子淮夷伐吳左傳曰楚子以諸侯伐吳宋太子鄭伯先歸宋華費遂鄭大夫從髙氏曰諸侯畏楚之強守宋之盟而從之然猶不能致魯衛曹薛邾杞至伐吳之役則中國之諸侯皆去唯楚屬從之爾人心之嚮背可知也執齊慶封殺之左傳曰使屈申圍朱方克之執齊慶封而盡滅其族將戮慶封椒舉曰臣聞無瑕者可以戮人慶封唯逆命是以在此其肯從於戮乎播於諸侯焉用之王弗聽負之斧鉞以徇於諸侯使言曰無或如齊慶封弒其君弱其孤以盟其大夫慶封曰無或如楚共王之庶子圍弒其君兄之子麋而代之以盟諸侯王使速殺之榖梁傳曰慶封其以齊氏何也為齊討也不以殺君罪之者慶封不為靈王服也張氏曰春秋書殺它國大夫之法有二凡有罪而當誅者書曰某人殺某若楚人殺陳夏徴舒是也無罪而不服者書執而殺之若執蔡世子有以歸用之楚人執行人于徴師殺之是也慶封有與弒其君之罪楚子殺之宜也不曰殺齊慶封而曰執齊慶封殺之者楚靈有諸已而非諸人是以慶封不服而春秋不純以討賊之法書之也髙氏曰初崔杼弒齊君而慶封為之黨齊人欲併討之慶封走之吳吳與之朱方而居之楚子以慶封在吳至是會諸侯伐吳為齊討執慶封而殺之假中國仁義以重其會所以盜亦有道也殺夏徴舒殺陳孔奐不言執者直辭也此先言執者曲辭也然執徐子稱楚人此執慶封若不主於楚者不與楚討也陳背中國而屬楚楚故得殺徴舒孔奐而討之今慶封得罪於中國故聖人不與荆楚之討中國所以深罪中國之不能自正也遂滅賴賴公穀作厲左傳曰遂以諸侯滅賴遷賴於鄢楚子欲遷許於賴使鬪韋龜與公子棄疾城之而還申無宇曰楚禍之首將在此矣召諸侯而來伐國而克城竟莫校王心不違民其居乎民之不處其誰堪之不堪王命乃禍亂也髙氏曰楚人會中國之諸侯又帥之以伐吳專殺中國之大夫遂以諸侯之兵滅人之國流毒如此蓋出於向戌弭兵之謀也九月取鄫左傳曰莒亂著丘公立而不撫鄫鄫叛而來孫氏曰襄六年莒人滅鄫蓋莒滅鄫以為附庸今魯取之冬十有二月乙卯叔孫豹卒左傳曰初穆子去叔孫氏及庚宗遇婦人使私為食而宿焉問其行告之故哭而送之適齊娶於國氏生孟丙仲壬及宣伯奔齊魯人召之歸既立所宿庚宗之婦人獻以雉問其姓對曰余子長矣能奉雉而從我矣召而見之號之曰牛遂使為竪有寵長使為政叔孫田於丘蕕遂遇疾焉竪牛欲亂其室殺孟逐仲疾急命召仲牛許而弗召杜泄見告之飢渴授之戈對曰求之而至又何去焉竪牛曰夫子疾病不欲見人使置饋于個而退牛弗進則置虛命徹叔孫不食卒髙氏曰穆叔質直好義博聞強識季文孟獻所不逮也然蔽於所習卒以餓死襄陵許氏曰叔孫豹卒而毁中軍則公若寄矣以是知豹之有力於公室所謂剝之無咎者歟經書月四書日一大衍厯正月癸亥大乙丑冬至二月癸巳小三月壬戌大四月壬長小五月辛酉大六月辛卯小七月庚申大八月庚寅小九月己未大十月己丑小十一月戊午大十二月戊子小乙卯二十八日長厯是年閠四月乙卯十二月二十九日五年甲子景王八年晉霸平二十一蔡靈六曹武十八衛襄七鄭簡二十九陳哀三十二杞文十三宋平三十九齊景十一秦景四十卒楚靈四吳夷末七春王正月舍中軍舍音捨左傳曰卑公室也初作中軍三分公室而各有其一季氏盡征之叔孫氏臣其子弟孟氏取其半焉及其舍之也四分公室季氏擇二二子各一皆盡征之而貢於公孔氏曰初作中軍季氏盡征之並不入公室也叔孫氏臣其子弟以一家之內有父子兄弟四品以父兄之稅入公子弟之稅入已大率半屬公半入已孟氏則於子弟中取其半或取子或取弟大率三分歸公一分入已十二分其國民三家得七公得五國民不盡屬公公室已卑矣今舍中軍四分公室三家自取其稅而各貢于公公室彌卑矣初云作三軍今不云舍三軍者初作時舊有二軍今更增一軍人數不足故各毁其乘足成三軍今此則唯舍中軍之衆屬上下二軍季氏因叔孫家禍退之使同孟孫獨取其半為專已甚又擇取善者是專之極故傳言擇二以見之髙氏曰季氏欲乘叔孫之弱而去之名曰復古實欲自強爾自是公室有貢而已無復有民矣楚殺其大夫屈申左傳曰楚子以屈申為二於吳乃殺之以屈生為莫敖公如晉左傳曰晉侯謂女叔齊曰魯侯不亦善於禮乎自郊勞至于贈賄禮無違者對曰是儀也不可謂禮也禮所以守其國行其政令無失其民者也今政令在家不能取也公室四分民食於他思莫在公不圖其終為國君難將及身不恤其所禮之本末將於此乎在而屑屑焉習儀以亟言喜於禮不亦逺乎髙氏曰公至是受三家之貢而已無復有民故雖如晉非季氏之所忌也夏莒牟夷以牟婁及防兹來奔髙氏曰牟夷者展輿之黨也公如晉未反而魯受莒牟夷邑季氏專且見莒益弱矣書及者以防與兹别二邑也防本屬魯蓋嘗為莒所取今還吾所喪邑而與受叛邑同者不以私害公也杜氏曰防兹城陽平昌縣西南有防亭姑幕縣東北有兹亭張氏曰地譜密州安丘縣有平昌故城莒縣有姑幕故城秋七月公至自晉左傳曰莒人訴于晉晉侯欲止公范獻子曰不可人朝而執之誘也討不以師而誘以成之惰也為盟主而犯此二者無乃不可乎請歸之間而以師討焉乃歸公髙氏曰歷二時乃得歸戊辰叔弓帥師敗莒師于蚡泉蚡扶粉切公作濆榖作賁左傳曰莒人來討不設備叔弓敗諸蚡泉髙氏曰魯既受莒叛邑莒人興師而來叔弓敗之曰敗莒師幸魯之勝乃所以罪之也杜氏曰蚡泉魯地張氏曰地諎東境之地秦伯卒景公也在位四十年子哀公嗣冬楚子蔡侯陳侯許男頓子沈子徐人越人伐吳左傳曰四年冬吳伐楚入棘櫟麻以報朱方之役楚子以諸侯及東夷伐吳以報棘櫟麻之役薳射以繁揚之師會於夏汭越大夫常夀過帥師會楚子于瑣聞吳師出薳啓疆帥師從之遽不設備吳人敗諸鵲岸楚子以馹至於羅汭吳子使其弟蹶由犒師楚人執之楚師濟於羅汭沈尹赤會楚子次於萊山薳射帥繁揚之師先入南懷楚師從之及汝清吳不可入楚子遂觀兵於坻箕之山是行也吳早設備楚無功而還以蹶由歸髙氏曰往年伐吳矣今又伐吳者吳不畏故也越於是始見徐己預中國會盟唯前年從楚子會申又二於吳而見執於楚今又從以伐吳張氏曰越始見經姒姓其先夏后少康之庶子封於越杜氏曰越國會稽山隂縣經書月二書日一大衍厯正月丁巳大庚午冬至二月丁亥小三月丙辰大四月丙戌小王月乙卯大六月乙酉大七月乙卯小戊辰十四日八月甲申大九月甲寅小十月癸未大十一月癸丑小十二月壬午大長厯戊辰七月十五日六年乙丑景王九年晉霸平二十二蔡靈七曹武十九衛襄八鄭簡三十陳哀三十三杞文十四卒宋平四十齊景十二秦哀公元年楚靈五吳夷末八春王正月杞伯益姑卒文公也在位十四年其弟郁釐立是為平公葬秦景公秦於是始書葬夏季孫宿如晉左傳曰拜莒田也髙氏曰謝前年取莒牟夷叛邑蓋莒既伐魯則魯有辭是以晉受季孫之聘而不見討也彌兵之時莒亦好合矣葬杞文公宋華合比出奔衛左傳曰宋寺人栁有寵太子佐惡之華合比曰我殺之桞聞之乃坎用牲埋書而告公曰合比將納亡人之族既盟於比郭矣公使視之有焉遂逐華合比合比奔衛襄陵許氏曰經書宋公殺其世子痤宋華合比出奔衛皆著寺人讒慝敗國以為世戒秋九月大雩楚薳罷帥師伐吳罷公作頗左傳曰徐儀楚聘于楚楚子執之逃歸懼其叛也使薳泄伐徐吳人救之令尹子蕩帥師伐吳師於豫章而次于乾溪吳人敗其師于房鍾獲宫廄尹棄疾子蕩歸罪于薳泄而殺之髙氏曰三書伐吳者見楚終不得志於吳也襄陵許氏曰敗楚師者非薳泄也而泄伏其誅故書薳罷伐吳以正之楚再不競於吳乃彌兵鋒有事陳蔡至復伐徐而國亂矣吳蓋自是休兵息民國始浸強冬叔弓如楚左傳曰聘且弔敗也髙氏曰左氏以為弔敗非也楚恃強暴雖敗猶諱之魯豈敢弔乎蓋四年公不會申已而震楚兵威將朝楚而不能故以叔弓先聘而明年躬繼之也張氏曰楚與吳仇敵之國而昭公昏吳逺楚故申之會魯不與焉今楚復伐吳其惡益逺昭公非能以中國自尊而逺夷狄者姑通好於楚蓋不待薳啓疆之召已服楚而將朝之矣齊侯伐北燕左傳曰齊侯如晉請伐北燕晉侯許之遂伐北燕將納簡公晏子曰不入燕有君矣民不二吾君賄左右諂諛作大事不以信未嘗可也經書月二書日無大衍厯正月壬子小丙子冬至二月辛巳大三月辛亥小四月庚辰大五月庚戌小六月己卯大閏月己酉小七月戊寅大八月戊申小九月丁丑大十月丁未小十一月丙子大十二月丙午大長厯是年閠六月七年丙寅景王十年晉霸平二十三蔡靈八曹武二十衛襄九卒鄭簡三十一陳哀三十四杞平公郁釐元年宋平四十一齊景十三秦哀二楚靈六吳夷末九春王正月暨齊平襄陵許氏曰襄公之世齊數伐魯至齊景公一使慶封來聘而不書魯報至是乃暨齊平劉氏曰齊大魯小魯為齊弱久矣然而能以暨齊平者介於楚也夫不自計德之厚薄勢之利害而借人之威以憑諸侯是以逹者不服近者不親昭公棄其國死於外諸侯莫之救也從此生矣三月公如楚左傳曰楚子成章華之臺願與諸侯落之太宰薳啓疆曰臣能得魯侯薳啓疆來召公辭曰昔先君成公命我先大夫嬰齊曰吾不忘先君之好將使衡父照臨楚國嬰齊受命于蜀我先君共王引領北望日月以冀傳序相授於今四王矣嘉惠未至唯襄公之辱臨我喪今君若步玉趾辱見寡君寵靈楚國以信蜀之役是寡君既受貺矣何蜀之敢望君若不來使臣請問行期寡君將承質幣而見於蜀以請先君之貺髙氏曰楚靈非強君也數會諸侯焉皆其微者又且多叛而吳人之窺未艾也亦奚庸必朝哉蓋晉平不能修文公之業使我不能自安而玉帛馹馳嵗不遑暇以是知王室不綱而霸主猶有功於諸夏也叔孫婼如齊涖盟婼敕略切公作舍後同襄陵許氏曰始暨齊平故盟以結好夏四月甲辰朔日有食之秋八月戊辰衛侯惡卒穀梁傳曰卿衛齊惡君衛侯惡何以君臣同名也君子不奪人名不奪人親之所名重其所以來也澄曰襄公也在位九年庶子元嗣是為靈公九月公至自楚自如楚今半年餘冬十有一月癸未季孫宿卒此季孫行父之子武子也子紇嗣十有二月癸亥葬衛襄公髙氏曰襄公之卒晉反戚田王有追命可以蓋獻之愆也經書月七書日四大衍厯正月丙子小辛巳冬至二月乙巳大三月乙亥小四月甲辰大朔日食五月甲戌小六月癸卯大七月癸酉小八月壬寅大戊辰二十七日九月壬申小十月辛丑大十一月辛未小癸未十三日十二月庚子大癸亥二十四日八年丁卯景王十一年晉霸平二十四蔡靈九曹武二十一衛靈公元年鄭簡三十二陳哀三十五卒杞平二宋平四十二齊景十四秦哀三楚靈七吳夷末十春陳侯之弟招殺陳世子偃師左傳曰陳哀公元妃鄭姬生悼太子偃師二妃生公子留下妃生公子勝二妃嬖留有寵屬諸司徒招與公子過哀公有廢疾公子招公子過殺悼太子偃師而立公子留澄按齊侯弟年鄭伯弟語皆非三命之卿特以其屬貴而同於再命之卿陳公子招既為三命之卿而以氏名通矣今又去其氏而曰陳侯之弟招何也蓋曰陳公子招殺陳世子偃師則似兩下相殺之辭今曰陳侯之弟招則見其挾叔父之尊而賊其兄之世嫡也夏四月辛丑陳侯溺卒哀公也在位三十五年髙氏曰陳侯以廢疾不能討殺世子之賊因自縊而死夫楚觀從納公子比而靈王縊春秋謂比弒其君陳侯之弟招立公子留而哀公縊春秋不謂留弒君何也比之立無君者也靈雖不縊亦不與比並存是靈王之死由比也招之立留由君之廢也且君有命哀雖不縊亦不可以君國是哀之死不以留也叔弓如晉左傳曰賀虒祁也鄭伯亦賀史趙曰甚哉其相蒙也可弔也而又賀之襄陵許氏曰財費則國貧役煩則民敝此之謂可弔而諸侯賀之是以人君安於危亡而不自知蓋諛之者衆也當楚之隆勢專諸夏而晉弗慮圖唯宫室之崇以為安榮平公可謂卑矣髙氏曰前年楚成章華之臺召諸侯落之至是晉成虒祁之宫而諸侯遂皆往賀之晉之效尤如此霸業之不振宜哉楚人執陳行人于徴師殺之左傳曰于徴師赴于楚且告有立君公子勝訴之于楚楚子執而殺之劉氏曰楚惡公子招而殺于徴師非其罪也陳公子留出奔鄭蘇氏曰楚將討陳故留出奔留既為君矣不曰陳留而曰陳公子留何也留立於招爾未成為君也髙氏曰偃師曰世子留曰公子别嫡庶也秋搜于紅左傳曰大搜于紅自根牟至于商衛革車千乘杜氏曰紅魯地沛國蕭縣西有紅亭逺疑劉氏曰搜春事也秋興之非正也搜有常地矣于紅亦非正也曷為不言公公不得與於搜爾三家專魯而分之政令出焉公寄食焉爾陳人殺其大夫公子過過古禾切左傳曰陳公子招歸罪於公子過而殺之澄曰按哀公屬留於招與過故招過同殺太子二人之罪均也招畏國人公論懼楚人來討故歸過於過而欲免己人其可欺乎大雩冬十月壬午楚師滅陳左傳曰楚公子棄疾帥師奉偃師之子吳圍陳宋戴惡會之滅陳使穿封戌為陳公執陳公子招放之于越髙氏曰公子招死有餘罪反宥而放之殺陳孔奐孫氏曰陳公子招殺世子之賊也而放之陳孔奐無罪之人也而殺之吁楚靈暴虐淫刑如此澄曰孔奐招之黨不為無罪然招首惡也而放奐同惡也而殺刑頗矣葬陳哀公楚葬之也與齊侯滅紀而葬紀伯姬同不曰楚子葬者蒙上楚師滅陳之文而書三事其執其放其殺其葬皆楚也經書月二書日二大衍厯正月庚午大丙戌冬至二月庚子小三月己巳大四月己亥小辛丑三日五月戊辰大六月戊戌小七月丁卯大八月丁酉小九月丙寅大十月丙申小十一月乙丑大經十月壬午在此月十二月乙未小長厯是年閏八月辛丑四月四日壬午十月十八日九年戊辰景王十二年晉霸平二十五蔡靈十曹武二十二衛靈二鄭簡三十三陳滅杞平三宋平四十三齊景十五秦哀四楚靈八吳夷末十一春叔弓會楚子于陳左傳曰叔弓宋華亥鄭遊吉衛趙黶會楚子于陳杜氏曰楚子在陳故四國大夫往不行會禮故不總書襄陵許氏曰楚既滅陳威震中夏是以無所號召而諸國之大夫會之許遷于夷左傳曰楚公子棄疾遷許于夷實城父取州來淮北之田以益之杜氏曰許畏鄭欲遷故以自遷為文髙氏曰陳滅許遷皆中國無霸之故也杜氏諤曰許自成十五年遷于葉至此又遷于夷春秋詳録以見許之危弱不能自守矣夏四月陳災災公榖作大左傳曰鄭禆竈曰五年陳將復封封五十二年而遂亡公羊傳曰陳已滅矣其言陳災何存陳也胡氏曰凡外災告則書今楚己滅陳夷於屬縣使穿封戌為公也必不使告於諸侯言亡國之有天災也何以書於魯國之䇿乎當是時叔弓與楚子會于陳則目擊其事矣雖彼不來告此不往弔叔弓使畢而歸語陳故也魯史遂書之爾髙氏曰陳雖為楚所滅而土地居民猶在焉聖人不與楚滅之也故還係之陳秋仲孫貜如齊貜俱縛切左傳曰孟僖子如齊殷聘杜氏曰自叔老聘齊至今二十年禮意久曠今修盛聘以無忘舊好髙氏曰此暨齊平之故也齊平而不來聘則著齊輕公非特居鄆時也其來久矣冬築郎囿左傳曰季平子欲其速成也叔孫昭子曰焉用速成其以勦民也無囿猶可無民其可乎襄陵許氏曰公內制於強臣外輕於大國亂亡危辱兆矣是之弗慮而築郎囿知公之志日以荒矣張氏曰此見季孫意如逢其君以耳目之娛而竊其權昭公安之而不誤也經書月一書日無大衍厯正月甲子大辛卯冬至二月甲午小三月癸亥大閏月癸巳小四月壬戌大五月壬辰小六月辛酉大七月辛卯大八月辛酉小九月庚寅大十月庚申小十一月己丑大十二月己未小十年己巳景王十三年晉霸平二十六卒蔡靈十一曹武二十三衛靈三鄭簡三十四陳滅杞平四宋平四十四卒齊景十六秦哀五楚靈九吳夷末十二春王正月夏齊欒施來奔齊公作晉左傳曰齊惠欒髙氏皆耆酒信內多怨強於陳鮑氏而惡之有告陳桓子曰子旗子良將攻陳鮑亦告鮑氏桓子授甲而如鮑氏遭子良醉而騁遂見文子則亦授甲矣使視二子則皆將飲酒桓子曰彼雖不信聞我授甲則必逐我及其飲酒也先伐諸陳鮑方睦遂伐欒髙氏子良曰先得公陳鮑焉往遂伐虎門公卜使王黑以靈姑銔率吉請斷三尺焉而用之戰于稷欒髙敗又敗諸莊國人追之又敗諸鹿門欒施髙強來奔髙氏曰欒施與髙強以兵攻君官欲伐君以伐陳鮑遂與君戰不勝而來奔此罪大矣春秋不書髙氏非卿故也魯方通聘而受其奔亡之臣非義也秋七月季孫意如叔弓仲孫貜帥師伐莒意公作隱後同胡氏曰前已舍中軍矣曷為猶以三卿並將乎季孫毁中軍四分公室擇其二二家各有其一至是季孫意如身為主將二子各帥一軍為之副則三軍固在其曰舍之者特欲中分魯國之衆為己私爾以為復古則異矣襄公以來既作三軍地皆三家之土民皆三家之兵每一軍出各將其所屬而公室無預焉是知雖舍中軍而三卿並將舊額固存矣髙氏曰是時魯間晉之衰故三卿帥師同伐莒欲一舉滅之而三卿擅以為己功也戊子晉侯彪卒平公也在位二十六年子夷嗣是為昭公九月叔孫婼如晉左傳日叔孫婼齊國弱宋華定衛北宫喜鄭罕虎許人曹人莒人邾人滕人薛人杞人小邾人如晉葬平公也葬晉平公左傳曰既葬諸侯之大夫欲因見新君叔向辭之曰大夫之事畢矣而又命孤孤斬焉在衰絰之中其以嘉服見則喪禮未畢其以喪服見是重受弔也大夫將若之何皆無辭髙氏曰不及期而葬簡也不書冬缺文十有二月甲子宋公成卒成公作戌平公也在位四十年子佐嗣是為元公經書月四書日二大衍厯正月戊子大丁酉冬至二月戊午小三月丁亥大四月丁巳小五月丙戌大六月丙辰小七月乙酉大戊子四日八月乙卯小九月甲申大十月甲寅大十一月甲申小十二月癸丑大甲子十二日長厯七月庚寅朔無戊子十有一年庚午景王十四年晉霸昭公夷元年蔡靈十二弒曹武二十四衛靈四鄭簡三十五陳滅杞平五宋元公佐元年齊景十七秦哀六楚靈十吳夷末十三春王二月二月公作正月叔弓如宋彭氏曰卿共盟主之葬猶可言也卿共同列之葬非禮甚矣葬宋平公亦速葬也夏四月丁巳楚子虔誘蔡侯般殺之于申虔穀作乾左傳曰楚子在申召蔡靈侯靈侯將往蔡大夫曰王貪而無信唯蔡於憾今幣重而言甘誘我也不如無往蔡侯不可楚子伏甲而饗蔡侯于申醉而執之殺之刑其士七十人陸氏曰般弒君父之賊也誘而殺之何為其不可乎楚子內利其國外託討罪故不許其誘而責其詐也夫以大國之力而討小國之逆當聲其罪而伐之倡大義於天下今乃誘而殺之雖曰討賊實取其國蔡侯之罪自不容誅楚子之惡亦已甚矣髙氏曰蔡般弒逆之罪雖義當討而楚子亦弒逆之賊也以賊討賊何辨曲直况楚子非真治般志在滅蔡也故春秋書楚子虔蔡侯般同斥其名以見其罪同永嘉吕氏曰諸侯不生名卒則名失國則名爭國則名見滅則名衛侯燬滅邢漢儒有滅同姓名之説然諸侯之滅同姓者多矣何以獨名衛侯耶楚子虔誘蔡侯般謂其誘而殺之故名然楚子誘戎蠻子亦誘之也何以不名説者曰以詐術誘荆蠻猶可以詐術誘中國不可然聖人書誘所以著楚子之罪矣豈以中外之故而有異乎然則衛侯燬楚子虔之所以名皆衍字爾或謂衛侯燬滅邢之下有衛侯燬卒因此而訛遂於滅邢之上亦加燬字楚子虔亦恐後儒於蔡侯般之上見其不應名般而不名虔故加一虔字不知蔡侯般之名非以罪般也此與胡子髠沈子逞徐子章羽沈子嘉胡子豹蔡世子有潞子嬰兒同一例爾楚公子棄疾帥師圍蔡左傳曰韓宣子問於叔向曰楚其克乎對曰克哉蔡侯獲罪於其君而不能其民天將假手於楚以斃之何故不克然肸聞之不信以幸不可再也楚王奉孫吳以討於陳曰將定而國陳人聽命而遂縣之今又誘蔡而殺其君以圍其國雖幸而克必受其咎弗能久矣髙氏曰楚滅陳易滅蔡難此書圍蔡者般出會而世子有守尚能有拒且望中國諸侯之救也五月甲申夫人歸氏薨襄公之妾昭公之母胡女歸姓大搜于比蒲髙氏曰備楚故也曰大云者僭天子之制也十年書搜此書大搜見三家益強而車徒日衆也大搜雖素定然公以夫人之喪不自臨也而大搜不廢則是三家者以馳騁田獵間君喪也張氏曰比蒲魯南鄙之地胡氏曰君有重喪喪不二事簡車徒非禮也乃有身從金革而無避者獨何與曰有門庭之寇宗廟社稷之存亡係焉必從權制伯禽服喪徐夷並興至於東郊出戰之師與築城之役同日並舉度緩急輕重蓋有不得已焉者矣晉王克用薨梁兵壓境而莊宗決勝於夾寨周太祖殂契丹入寇而世宗接戰於髙平若此者君行為顯親非不顧也臣行為愛君非不忌也唯審於輕重緩急之宜斯可矣澄按伯禽之以喪服從戎者服武王之喪也仲孫貜會邾子盟于祲祥祲祥公作侵芉左傳曰修好禮也杜氏曰盟會以安社稷故喪盟謂之禮趙氏曰春秋盟會是常何獨於有喪之時而稱得禮是時又無大患邾又小國何能有救患之益髙氏曰始也公及邾儀父盟于蔑公及邾儀父盟于躍是魯侯親與之盟會也今公雖以夫人之喪使仲孫貜會邾子盟于祲祥然自是仲孫何忌及邾子盟于援叔孫州仇仲孫何忌及邾子盟于句澤是吾大夫與其君盟會爾然則魯邾之更為強弱斷可知矣雖與邾盟以修好然魯人之志必欲滅邾而後已此盟豈可信邪秋季孫意如會晉韓起齊國弱宋華亥衛北宫他鄭罕虎曹人杞人于厥憖厥憖公作屈銀憖魚敬切又平聲左傳曰謀救蔡也楚師在蔡晉荀吳謂韓宣子曰不能救陳又不能救蔡物以無親晉之不能亦可知也已為盟主而不恤亡國將焉用之晉人使狐父請蔡於楚弗許襄陵許氏曰蔡能嬰城堅不下楚此易助也厥憖合天下之兵畏不敢救遣使請命示之不能使楚益驕有以量中國之力而卒取之此韓起之罪也九月已亥葬我小君齊歸左傳曰公不戚晉士之送葬者歸以語史趙史趙曰必為魯郊叔向曰魯公室其卑乎君有大喪國不廢搜有三年之喪而無一日之戚國不恤喪不忌君也君無戚容不顧親也國不忌君君不顧親能無卑乎冬十有一月丁酉楚師滅蔡髙氏曰楚子滅陳蔡皆稱師者著其無道恃衆強滅之也四月圍而十有一月方滅者世子有之力也執蔡世子有以歸用之有榖作友髙氏曰滅國而用世子有者怒其拒師之久也用之者以為牲也夫蔡本中國之諸侯乃背中國而即荆楚必以荆楚為可恃也今蔡侯既為荆楚所誘而殺之又從而滅其國其世子有又為所執而虐用之以絶其世然則荆楚何補於蔡哉此萬世人君之戒也蔡侯已死而有稱世子何也未得乎立也般誘殺則外亂國被圍則內急喪柩未至則世子固未得乎立矣而能拒狂楚者三時不改真所謂世子也不言以世子有歸者有不從楚故也斯得古人不共戴天之義也楚子誘人君而殺之乘人之喪而滅之執其嫡嗣而歸用之此楚子不道之甚聖人所以詳録之非専罪楚子也乃所以罪吾中國王綱既墜霸統又絶諸侯莫敢救致荆蠻之自恣一至於此也然則向戌之謀實何利於中國哉經書月五書日四大衍厯正月癸未小壬寅冬至二月壬子大三月壬午小四月辛亥大丁巳七日五月辛巳小甲申四日六月庚戌大七月庚辰小八月己酉大九月己邜小已亥二十一日十月戊申大十一月戊寅小丁酉二十日十二月丁未大閏月丁丑大十有二年辛未景王十五年晉霸昭二蔡滅曹武二十五衛靈五鄭簡三十六卒陳滅杞平六宋元二齊景十八秦哀七楚靈十一吳夷末十四春齊髙偃帥師納北燕伯于陽北燕伯下一有欵字左傳曰因其衆也杜氏曰言因唐衆欲納之故得先入唐不言于燕未得國都也陽即唐也燕别邑中山有唐縣髙氏曰三年北燕伯出奔齊六年齊將納之而不果欵播越在外蓋十年矣不能自復而藉齊之力僅能納之於别邑而已失國之難反如此三月壬申鄭伯嘉卒簡公也在位三十六年子寧嗣是為定公髙氏曰鄭去中國即楚久矣至於簡公乘晉悼之方興以國反正遂息諸侯之兵子産相之薰然慈仁民蒙其澤蔚為春秋之賢諸侯夏宋公使華定來聘左傳曰通嗣君也髙氏曰公始以卿共平公之葬故宋元公即位而使人來聘也公如晉至河乃復穀梁傳曰季孫氏不使遂乎晉也左傳曰取郠之役莒人訴于晉晉有平公之喪未之治也故辭公公子憖遂如晉髙氏曰晉昭公嗣位公往朝焉公四如晉皆至河乃復五月葬鄭簡公三月而葬速楚殺其大夫成熊熊公作然榖作虎左傳曰楚子謂成虎若敖之餘也遂殺之或譖成虎於楚子成虎知之而不能行懷寵也秋七月冬十月公子憖出奔齊憖魚覲切公作整左傳曰季平子立而不禮於南蒯南蒯謂子仲吾出季氏而歸其室於公子更其位我以費為公臣子仲許之叔仲小南蒯公子憖謀季氏憖告公而遂從公如晉南蒯以費叛如齊子仲還及衛聞亂逃介而先及郊聞費叛遂奔齊髙氏曰季氏之臣南蒯將去季氏而立憖不克而以費叛憖遂奔齊是以君子譏其妄而哀其志也楚子伐徐左傳曰楚子狩於州來次于潁尾使蕩侯潘子司馬督囂尹午陵尹喜帥師圍徐以懼吳楚子次于乾溪以為之援髙氏曰徐吳之姻國也楚人疾吳故遷怒於徐既執其君又伐其國也晉伐鮮虞左傳曰晉荀吳偽會齊師者假道於鮮虞遂入昔陽滅肥以肥子綿臯歸伐鮮虞因肥之役也杜氏曰不書將帥史闕文鮮虞白狄别種在中山新市縣昔陽肥國都樂平沾縣東有昔陽城肥白狄也綿臯其君名巨鹿下曲陽縣西有肥纍城髙氏曰楚靈不道既滅陳蔡今方伐徐晉為盟主坐視而不救若力不能君子不責也能伐鮮虞而不救徐非力不能棄中國也經書月四書日一大衍厯正月丁未小旦曰冬至二月丙子大三月丙午小壬申二十七日四月乙亥大五月乙巳小六月甲戌大七月甲辰小八月癸酉大九月癸卯小十月壬申大十一月壬寅小十二月辛未大長厯是年閏正月三月無壬申十有三年壬申景王十六年晉霸昭三蔡平公廬元年曹武二十六衛靈六鄭定公寧元年陳惠公吳元年杞平七宋元三齊景十九秦哀八楚靈十二弒吳夷末十五春叔弓帥師圍費左傳曰叔弓圍費弗克敗焉平子怒令見費人執之以為囚俘冶區夫曰非也若見費人寒者衣之飢者食之為之令主而共其乏困費來如歸南氏亡矣民將叛之誰與居邑若憚之以威懼之以怒民疾而叛為之聚也若諸侯皆然費人無歸不親南氏將焉入矣平子從之費人叛南氏陸氏曰凡家臣以邑叛悉不書叛但書大夫圍之則邑叛可知矣髙氏曰費季氏邑也叔弓帥師圍之見家臣之強季氏之無君也家臣以邑叛不以君命而使大夫討之如是則大夫非魯之大夫也季氏之大夫也師非魯之師也季氏之師也如是而欲討南蒯不思之甚矣夏四月楚公子比自晉歸于楚弒其君虔于乾溪乾音干左傳曰楚薳氏之族及薳居許圍蔡洧蔓成然皆王所不禮也因羣喪職之族啓越大夫常夀過作亂圍固城克息舟城而居之觀起之死也其子從在蔡事朝吳曰今不封蔡蔡不封矣我請試之以蔡公之命召子干子晳及郊而告之情強與之盟入襲蔡蔡公將食見之而逃觀從使子干食坎用牲加書而速行已徇於蔡曰蔡公召二子將納之與之盟而遣之矣將師而從之蔡人聚將執之辭曰失賊成軍而殺余何益乃釋之朝吳曰二三子若能死亡則如違之以待所濟若求安定則如與之以濟所欲且違上何適而可衆曰與之乃奉蔡公召二子而盟於鄧依陳蔡人以國楚公子比公子黑肱公子棄疾蔓成然蔡朝吳帥陳蔡不羮許葉之師因四族之徒以入楚及郊蔡公使須務牟與史猈先入因正僕人殺太子祿及公子罷敵公子比為王公子黑肱為令尹次于魚陂公子棄疾為司馬先除王宫使觀從從師於乾溪而遂告之且曰先歸復所後者劓師及訾梁而潰王聞羣公子之死也自投于車下曰人之愛其子也亦如余乎侍者曰甚焉小人老而無子知擠於溝壑矣王曰余殺人子多矣能無及此乎右尹子革曰請待於郊以聽國人王曰衆怒不可犯也曰若入於大都而乞師於諸侯王曰皆叛矣曰若亡於諸侯以聽大國之圖君也王曰大福不再祇取辱焉然丹乃歸於楚王沿夏將欲入鄢芋尹無宇之子申亥求王遇諸棘圍以歸王縊於芋尹申亥氏公羊傳曰楚靈王為無道作乾溪之臺三年不成百姓苦之諸侯怨之公子棄疾主方城之外以君陳蔡脅比而立焉然後令于乾溪之役曰比已立矣先歸者復其田里後者劓衆潰而散靈王經而死蘇氏曰比將為君不曰楚比而曰公子比何以比之歸非其謀也亂始於觀從而成於棄疾以比為名而已比迫於觀從而以身許之以致虔死則比雖不弒而弒君之名比尸之矣比之歸也虔猶在楚其不曰入何也觀從召之蔡人與之楚人不拒則比之歸無難也髙氏曰先言比歸者明在外本無弒君之心也及其以棄疾之請也遂有得位之心故復言弒者正比之罪也既曰歸於楚又曰弒於乾溪者非比親弒之也加之罪爾初楚子麋疾靈王因殺其子而自立公子比以是出奔晉比在晉十年矣其能一旦自外歸而弒其君乎蓋靈王無道雖棄疾脅比而立靈王自縊而死若比不從棄疾之脅則靈王未必死以此言之棄疾不得比之勢則無以濟其亂比見利而動遽欲為君則成楚靈之縊者乃比也蓋是時比當效死不立而既立矣又焉得避是名哉若使人之受其名也巳享其利則後世姦人苟有籍口以濟其私者莫不皆置力焉故聖人正名比之弒君所以絶後世姦人之禍也杜氏曰乾溪在譙國城父縣東竟楚公子棄疾殺公子比左傳曰觀從謂子干曰不殺棄疾雖得國猶受禍也子干曰余不忍也子玉曰人將忍子國每夜駭曰王入矣棄疾使周走而呼曰王至矣國人大驚使蔓成然走告子干子晳曰王至矣國人殺君司馬將來矣君若早自圖也可以無辱又有呼而走至者曰衆至矣二子皆自殺棄疾即位名曰熊居葬子干于訾實訾敖張氏曰公子比已為王棄疾為司馬則君臣若已定矣及棄疾殺比乃不以弒君書者君臣之分未定而棄疾譎殺之也比不能效死不立而貪為君之利不得不服首惡之罪若夫分未正而以譎殺之於曖昧之中目之以兩下相殺可矣未可謂之殺君也髙氏曰比復稱公子而不以討賊之辭加之者非討賊也殺而代之也憫比墮棄疾之謀以深罪棄疾也棄疾本圖位而脅立比比既立遂殺而篡之比既死遂自立改名曰居蓋弒君之人名在諸侯之䇿故公子圉改名曰虔公子棄疾改名曰居秋公會劉子晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于平丘左傳曰晉成虒祁諸侯朝而歸者皆有二心為取郠故晉將以諸侯來討叔向曰諸侯不可以不示威乃並徴會告於吳晉侯會吳子於良水道不可吳子辭乃還治兵於邾南甲車四千乘遂合諸侯於平丘晉人將尋盟齊人不可晉侯使叔向告劉獻公曰抑齊人不盟若之何對曰盟以底信君苟有信諸侯不二何患焉告之以文辭董之以武師雖齊不許君庸多矣天子之老請帥王賦元戎十乘以先啓行遲速唯君叔向告於齊曰諸侯求盟已在此矣今君弗利寡君以為請對曰諸侯討二則有尋盟若皆用命何盟之尋叔向曰明王之制使諸侯嵗聘以志業間朝以講禮再朝而會以示威再會而盟以顯昭明志業於好講禮於等示威於衆昭明於神自古以來未之或失也晉禮主盟懼有不治奉承齊犧而布諸君求終事也君曰余必廢之何齊之有唯君圖之寡君聞命矣齊人懼對曰小國言之大國制之敢不聽從叔向曰諸侯有間矣不可以不示衆治兵建而不斾復斾之諸侯畏之髙氏曰霸圖不競久矣晉主夏盟諸侯皆二平丘之會諸侯之衆兵車之盛奕世未覩又有天子之使以臨之使晉之威靈少振而聳動吳楚此叔向之謀也張氏曰平丘今開封府封丘縣在東漢志尚為平丘縣八月甲戌同盟于平丘甲戌榖作庚戌左傳曰齊服也孫氏曰自宋之會諸侯不出大夫専會者十年至申之會則又甚矣楚子以蠻荒之衆橫行中國戕滅陳蔡以厭其欲諸侯莫敢伉楚子專盟會者又十年矣今晉昭一旦與劉子合諸侯同盟於此者其能與楚子伉乎乘楚靈弒逆之禍爾髙氏曰晉若果能與劉子大合諸侯以討楚平弒逆之罪亦足以強中國之威矣今但同盟於此何所為哉雖然楚人自是不入寇而中國為之少安亦由此盟也公不與盟左傳曰邾人莒人訴於晉曰魯朝夕伐我幾亡矣我之不共魯故之以晉侯不見公使叔向來辭曰諸侯將以甲戌盟寡君知不得事君矣請君無勤子服惠伯對曰君信蠻夷之訴以絶兄弟之國棄周公之後亦唯君寡君聞命矣叔向曰寡君有甲車四千乘在雖以無道行之必可畏也况其率道其何敵之有牛雖瘠僨於豚上其畏不死南蒯子仲之憂其庸可棄乎若奉晉之衆用諸侯之師因邾莒杞鄫之怒以討魯罪間其二憂何求而弗克魯人懼聽命髙氏曰此晉侯聽邾莒之訴而辱公使不得與盟也夫晉侯與公同體當同心同力以復霸業而諸侯咸會乃聽邾莒之妄訴與衆棄公不以比數孫氏曰與公同事而不同盟非所以宗諸侯也天下孰不解體故自是訖會召陵諸侯復不出者二十四年至如鄟陵之會晉自不出其不足以宗諸侯矣晉人執季孫意如以歸左傳曰晉人執季孫意如以幕蒙之使狄人守之司鐸射懷錦奉壺飲氷以蒲伏焉守者御之乃與之錦而入晉人以平子歸子服湫從胡氏曰魯自文公以來公室微弱三家専魯而季氏罪之首也宿及意如尤為強逼不臣晉人若按邾莒有無之狀究南蒯子仲奔叛之因告於諸侯以其罪執之請於天子以大義廢之選於魯卿更意如之位收斂私邑為公室之民使政令在君三家臣順今徒以邾莒之故執意如則是意在貨財而不責其無君臣之義也澄按胡氏之論可謂萬世之大義矣而非當時之事情也録之者以示教云爾公至自會公雖不與同盟然已與平丘之會矣故以會至蔡侯廬歸于蔡左傳曰平王即位陳蔡皆復隱太子之子廬歸於蔡杜氏曰隱太子太子有也廬蔡平侯陳侯吳歸于陳左傳曰悼太子之子吳歸於陳杜氏曰悼太子偃師也吳陳惠公澄按魯昭公八年正月陳哀公之弟公子招殺世子偃師哀公縊而死九月楚公子棄疾奉偃師之子吳圍陳十月滅之使穿封戌為陳公十一年四月楚靈王誘蔡靈侯殺之公子棄疾帥師圍蔡十一月滅之執蔡世子有以歸用之楚城陳蔡不羮使棄疾為蔡公問於申無宇曰棄疾在蔡何如對曰鄭莊公城櫟置子元焉使昭公失位臣聞五大不在邊五細不在庭末大必折尾大不掉君所知也至是年棄疾果以陳蔡叛陳蔡之人以復讎之故而樂從之棄疾因此得國故復陳蔡以報其功也陳先聖之後蔡王室之親楚靈無道滅其國而有其土地廬蔡靈之孫吳陳哀之孫當為君者也土地雖入楚國固其國也侯固其位也故其復國也書國書爵書名如失國之君歸其國然蓋陳蔡乃天子所封之國非楚所得滅也常山劉氏曰陳蔡者先王之建國非楚可滅非楚可復也故書爵書歸言二國之嗣位其所固有國其所宜歸也二君名者素非諸侯至此始立也髙氏曰楚靈不道暴滅陳蔡而平王始依陳蔡之國籍以發難今既得位遂復二國之後暴靈之惡而歸恩於已以説中國春秋不言歸自楚者見二國之復乃自當復非外域得滅而復之也廬靈公少子世子有之弟先儒謂世子有之子非也冬十月葬蔡靈公陸氏曰國復乃葬凡三十有一月公如晉至河乃復左傳曰公如晉荀吳謂韓宣子曰諸侯相朝講舊好也執其卿而朝其君有不好焉不如辭之乃使士景伯辭公子河髙氏曰晉不與公盟今又執吾卿而公復朝之無恥甚矣豈欲因晉之執而請討季氏之罪乎然季氏在晉宜其不見納也吳滅州來左傳曰吳滅州來楚令尹子旗請伐吳王弗許曰吾未撫民人未事鬼神未修守備未定國家而用民力敗不可悔州來在吳猶在楚也子姑待之髙氏曰成六年吳入州來蓋本楚屬也至是取之盡殺其吏民無道之甚故稱滅焉春秋詳楚伐吳略吳伐楚而志其甚者滅州來是也吳人以州來封季子之後入以遷蔡焉經書月三書日一大衍厯正月辛丑小壬子冬至二月庚午大三月庚子小四月己巳大五月己亥大六月己巳小七月戊戌大八月戊辰小甲戌七日九月丁酉大十月丁卯小十一月丙申大十二月丙寅小十有四年癸酉景王十七年晉霸昭四蔡平二曹武二十七卒衛靈七鄭定二陳惠二杞平八宋元四齊景二十秦哀九楚平王居元年吳夷末十六春意如至自晉左傳曰季孫猶在晉子服惠伯私於中行穆子曰魯事晉何以不如夷之小國魯兄弟也土地猶大所命能具若為夷棄之使事齊楚其何瘳於晉穆子告韓宣子且曰楚滅陳蔡不能救而為夷執親將焉用之乃歸季孫惠伯曰寡君未知其罪合諸侯而執其老若猶有罪死命可也若曰無罪而惠免之諸侯不聞是逃命也何免之為請從君惠于會宣子患之使叔魚見季孫曰鮒也聞諸吏將為子除館於西河平子懼先歸惠伯待禮孫氏曰大夫執則至至名不稱氏前見也三月曹伯滕卒武公也在位二十七年其子頃嗣是為平公夏四月秋葬曹武公八月莒子去疾卒去上聲左傳曰莒著丘公卒郊公不戚國人弗順欲立著丘公之弟庚與郊公惡公子鐸而善於意恢公子鐸因蒲餘侯而與之謀曰爾殺意恢我出君而納庚與許之襄陵許氏曰昭公以來微國皆葬而莒著丘公不葬者莒卒無諡棄周禮也是以春秋不書也冬莒殺其公子意恢左傳曰蒲餘侯兹夫殺莒公子意恢郊公奔齊公子鐸逆庚與於齊齊隰黨公子鉏送之有賂田澄按小國之卿再命書名其大夫一命但當書人意恢不稱大夫則是不命之士其名載於䇿者以其屬為公子則貴而同於再命之卿故於公子之下書名也經書月三書日無大衍厯正月乙未大丁巳冬至二月乙丑小三月甲午大四月甲子小五月癸巳大六月癸亥小七月壬辰大閏月壬戌小八月辛卯大九月辛酉大十月辛卯小十一月庚申大十二月庚寅小十有五年甲戌景王十八年晉霸昭五蔡平三曹平公須元年衛靈八鄭定三陳惠三杞平九宋元五齊景二十一秦哀十楚平二吳夷末十七卒春王正月吳子夷末卒夷末公作夷昧夷末立在位十七年庶弟僚三月癸酉有事于武宫籥入叔弓卒去樂卒事去上聲左傳曰將禘於武公戒百官梓慎曰吾見赤黑之祲非祭祥也喪氣也其在涖事乎叔弓涖事籥入而卒髙郵孫氏曰武宫廢廟也成六年復立之胡氏曰有事於宗廟聞大夫之喪則去樂而祭可乎按曽子問君在祭不得成禮夫子語之詳矣而無有及大臣者是知祭而去樂不可也有事於宗廟遭大夫之變則可以聞乎按禮衛太史栁莊寢疾君曰若疾亟雖當祭必告是知祭而以聞不可也禮莫重於當祭大夫有變而不以聞則內得以盡其誠敬之心於宗廟外得以全其隱恤之意於大臣是兩得之也然則有事於宗廟大臣涖事籥入而卒於其所則如之何禮雖未之有可以義起也有事于宗廟大臣涖事籥入而卒於其所去樂卒事其可也緣先祖之心見大臣之卒必聞樂不樂緣孝子之心視己設之饌必不忍輕徹故去樂而卒事其可也宗廟合禮者常事不書苟以為可則春秋何書乎此記禮之變而書之者也澄曰叔子叔老之子也夏蔡朝吳出奔鄭朝吳下公無出字朝作昭左傳曰楚費無極害朝吳之在蔡也欲去之乃謂之曰王唯信子故處子於蔡子亦長矣而在下位辱必求之吾助子請又謂其上之人曰王唯信吳故處諸蔡二三子莫之如也而在其上不亦難乎弗圖必及於難蔡人逐朝吳朝吳出奔鄭王怒曰余唯信吳故置諸蔡且微吳吾不及此女何故去之無極對曰臣豈不欲吳然而前知其為人之異也吳在蔡蔡必速飛去吳所以翦其翼也胡氏曰朝吳蔡之忠臣雖不能存蔡而能復蔡其從於棄疾以棄疾必能封之也棄疾以其忠於舊君而信之使居舊國可謂知所信矣則曷為出奔費無極害其寵也無極楚之讒人也出朝吳出蔡侯喪太子建殺連尹奢屏王耳目使不聰明卒使吳師入郢辱及宗廟讒人為亂可不畏乎志朝吳出奔而入郢之師兆矣六月丁巳朔日有食之秋晉荀吳帥師伐鮮虞左傳曰圍鼓克之以鼓子鳶鞮歸髙氏曰十二年伐之未服故然僅能得鼓而卒叛去晉之不能逺略可知矣冬公如晉左傳曰平丘之會故也澄按平丘之會公不與盟大夫被執公既往朝而不見納辱亦甚矣至此又往朝焉蓋畏大國不敢以辱為恥也經書月三書日二大衍厯正月己未大癸亥冬至經二月癸酉在此月二月己丑小三月戊午大四月戊子小五月丁巳大朔日食經書六月食蓋置閏後失也六月丁亥小七月丙辰大八月丙戌小九月乙卯大十月乙酉小十一月甲寅大十二月甲申大長厯是年閏九月癸酉二月十五日十有六年乙亥景王十九年晉霸昭六卒蔡平四曹平二衛靈九鄭定四陳惠四杞平十宋元六齊景二十二秦哀十一楚平三吳僚元年春齊侯伐徐左傳曰齊師至於蒲隧徐人行成徐子及郯人莒人會齊侯盟於蒲隧賂以甲父之鼎叔孫昭子曰諸侯之無伯害哉齊君之無道也興師而伐逺方會之有成而還莫之亢也無伯也夫襄陵許氏曰景公之時吳楚方爭晉既不能逺略以齊之強務德修政以通天下之志糾合諸侯復霸可也而區區務爭徐伐莒之利志亦卑矣楚子誘戎蠻子殺之蠻公作蔓後同左傳曰楚子聞蠻氏之亂也與蠻子之無質也使然丹誘戎蠻子嘉殺之遂取蠻氏杜氏曰河南新城縣有蠻城張氏曰今伊闕縣即新城也蘇氏曰楚子誘蔡侯殺之名而書地以詐術害中國疾之也誘殺戎蠻不名不地其類相殘略之也夏公至自晉胡氏曰昭公數朝於晉三至於河而不得入兩得見而晉侯又欲討其罪而止旃其困辱亦甚矣昭公安於危辱無激昻勉厲之意所謂自棄者不可與有為不亦悲乎秋八月己亥晉侯夷卒昭公也在位六年其子去疾嗣是為頃公九月大雩季孫意如如晉卿共葬事畏晉也冬十月葬晉昭公三月而葬速經書月三書日一大衍厯正月甲寅小戊辰冬至二月癸未大三月癸丑小四月壬午大五月壬子小六月辛巳大七月辛亥小八月庚辰大己亥二十日九月庚戌小十月己卯大十一月己酉小十二月戊寅大十有七年丙子景王二十年晉霸頃公去疾元年蔡平五曹平三衛靈十鄭定五陳惠五杞平十一宋元七齊景二十三秦哀十二楚平四吳僚二春小邾子來朝夏六月甲戌朔日有食之秋郯子來朝八月晉荀吳帥師滅陸渾之戎左傳曰晉侯使屠蒯如周請有事於雒與三塗萇𢎞謂劉子曰客容猛非祭也其伐戎乎陸渾氏甚睦於楚必是故也君其備之乃警戎備晉荀吳帥師涉自棘津使祭史先用牲於雒陸渾人弗知師從之遂滅陸渾數之以其二於楚也陸渾子奔楚其衆奔甘鹿周大獲宣子夢文公擕荀吳而授之陸渾故使穆子帥師獻俘於文宫髙氏曰宣三年楚子伐陸渾之戎自是陸渾睦於楚而為中國之害至是荀吳帥師滅之胡氏曰文子之於潞氏士會之於甲氏苟吳之於陸渾戎皆滅之也而林父士會稱人荀吳舉其名氏何哉中外有别陸渾之戎密邇王室而縱之雜處則非尊京師别內外之義也與夫闢土服逺以圖強霸則異矣冬有星孛于大辰左傳曰西及漢申須曰彗所以除舊布新也天事恆象今除於火火出必布焉諸侯其有火災乎梓慎曰往年吾見之是其徴也火出而見今兹火出而章必火入而伏其居火也久矣其與不然乎火出於夏為三月於商為四月於周為五月夏數得天若火作其四國當之在宋衛陳鄭乎宋大辰之虛也陳太皥之虛也鄭祝融之虛也皆火房也星孛及漢漢水祥也衛顓頊之虛也故為帝丘其星為大水水火之牡也其以丙子若壬午作乎水火所以合也若火入而伏必以壬午不過其見之月鄭禆竈言於子産曰宋衛陳鄭將同日火襄陵許氏曰星孛大辰火災應之天地之符也大辰明堂當宋之分故王室亂宋亦亂衛陳鄭災氣所溢也衛亂君奔陳敗卿獲唯鄭有令政而無後災是知禍福之可轉也楚人及吳戰于長岸杜氏曰長岸楚地張氏曰水戰也左傳曰吳伐楚陽丐為令尹卜戰不吉司馬子魚曰我得上流何故不吉且楚故司馬令龜我請改卜令曰魴也以其屬死之楚師繼之尚大克之吉戰於長岸大敗吳師獲其乘舟餘皇使隨人與後至者守之環而塹之及泉盈其隧炭陳以待命吳公子光請於其衆曰喪先王之乘舟豈唯光之罪衆亦有焉請藉取之以救死衆許之使長鬛者三人潛伏於舟側曰我呼餘皇則對師夜從之三呼皆迭對楚人從而殺之楚師亂吳人大敗之取餘皇以歸胡氏曰楚地五千里帶甲數十萬戰勝諸侯威動天下本非吳敵也唯不能去讒賤貨使費無極以讒勝囊瓦以貨行而䇿士竒材為敵國用故日以侵削至雞父之師七國皆敗柏舉之戰國破君奔幾於亡滅吳日益強而楚削矣經書月二書日一大衍厯正月戊申小癸酉冬至二月丁丑大三月丁未小四月丙子大五月丙午大閏月丙子小六月乙巳大經書六月甲戌朔日食程氏曰按大衍是年閏五月六月朔乙巳非食限五月丙午朔日食黃道婁四度太甚甲戌則九月朔名也而亦不入食限是月也魯太史以為夏之四月而季平子以為非正陽之月平子必有所考而言足明食朔之誤也是魯太史之誤也非春秋之誤也七月乙亥小八月甲辰大九月甲戌小十月癸卯大十一月癸酉小十二月壬寅大十有八年丁丑景王二十一年晉霸頃二蔡平六曹平四卒衛靈十一鄭定六陳惠六杞平十二宋元八齊景二十四秦哀十三楚平五吳僚三春王三月曹伯須卒平公也在位四年其子午嗣是為悼公夏五月壬午宋衛陳鄭災左傳曰火始昏見丙子風梓慎曰是謂融風火之始也七日其火作乎戊寅風甚壬午大甚宋衛陳鄭皆火梓慎登大庭氏之庫以望之曰宋衛陳鄭也數日皆來告火公羊傳曰記異也同日而俱災為天下記異也劉氏曰四國同日而災非人所能為也其序宋衛陳鄭春秋之正也同德則尚爵同爵則尚親同親則尚齒六月邾人入鄅鄅音禹左傳曰鄅人籍稻邾人襲鄅鄅人將閉門邾人羊羅攝其首焉遂入之盡俘以歸鄅子曰余無歸矣從帑於邾邾莊公反鄅夫人而舍其女杜氏曰鄅國在琅琊開陽縣張氏曰今屬沂州臨沂縣妘姓國秋葬曹平公冬許遷于白羽左傳曰楚左尹王子勝言於楚子曰許於鄭仇敵也而居楚地以不禮於鄭晉鄭方睦鄭若伐許而晉助之楚喪地矣君盍遷許楚子使王子勝遷許於柝實白羽張氏曰白羽一名折楚邑今鄧州內鄉縣杜氏曰自葉遷也畏鄭而樂遷故以自遷為文髙氏曰許至是三遷矣經書月三書日一大衍厯正月壬申小戊寅冬至二月辛丑大三月辛未小四月庚子大五月庚午小壬午十三日六月己亥大七月己巳小八月戊戌大九月戊辰小十月丁酉大十一月丁卯小十二月丙申大長厯是年閏正月十有九年戊寅景王二十二年晉霸頃三蔡平七曹悼公午元年衛靈十二鄭定七陳惠七杞平十三宋元九齊景二十五秦哀十四楚平六吳僚四春宋公伐邾左傳曰鄅夫人宋向戌之女也故向寧請師宋公伐邾圍蟲取之乃盡歸鄅俘髙氏曰為鄅故也天下無霸而宋元於此一正入鄅之亂是以春秋録而進之胡氏曰此所謂聲罪執言之師也故書伐邾而釋其取邑之罪夏五月戊辰許世子止弒其君買左傳曰許悼公瘧飲太子止之藥卒太子奔晉張氏曰藥劑之得失決死生於須臾之間瘧疾未足以死而遽至於大故是許悼公之卒止實殺之也孟子曰殺人以挺與刃有以異乎曰無以異也以刃與政有以異乎曰無以異也進藥而藥殺可不謂之弒哉其所以異於商臣蔡般者過與故不同爾蘇氏曰今律過失殺人以贖論過失殺期尊減殺人二等過失殺大父母父母減殺人一等而和御藥誤不如法者死蓋春秋之遺意己卯地震地道安靜以震為異秋齊髙發帥師伐莒左傳曰莒子奔紀鄣使孫書伐之初莒有婦人莒子殺其夫已為婺婦及老託於紀彰紡焉以度而去之及師至則投諸外或獻諸子占子占使師夜縋而登莒共公懼啓西門而出齊師入紀髙氏曰莒不事齊故冬葬許悼公吕氏大圭曰傳例君弒賊不討不書葬此二傳妄為之説也黎曰被弒之君多不書葬者或彼國方有事變雖葬我畏其亂無使往會之許悼弒而書葬者蓋變生於內而不及國欲沒其弒逆之迹具禮葬其父我有使往故書葬歐陽公論止為弒經書月一書日二大衍厯正月丙寅大甲申冬至二月丙申小三月乙丑大四月乙未小五月甲子大戊辰五日己卯十六日六月甲午小七月癸亥大八月癸巳小九月壬戌大十月壬辰小十一月辛酉大十二月辛卯大二十年己卯景王二十三年晉霸頃四蔡平八卒曹悼二衛靈十三鄭定八陳惠八把平十四宋元十齊景二十六秦哀十五楚平七吳僚五春王正月夏曹公孫會自鄸出奔宋鄸莫公切榖作夢髙氏曰會者公子喜時之子喜時者子臧也鄸其采邑也杜氏曰鄸曹邑張氏曰今興仁府乘氏縣大有饗城古老云古鄸城也劉氏曰奔未有言自者此其言自鄸何自鄸待故也大夫有罪待放於境三年君賜之環則復賜之玦則去春秋之時臣能専其邑無不畔其國者能使其衆無不要其君者臧武仲之智猶據以求為後於魯是以孔子譏之公孫會之自鄸奔宋也其賢於臧武仲逺矣秋盜殺衛侯之兄縶縶張立切公榖作輒左傳曰衛公孟縶狎齊豹奪之司冦與鄄有役則反之無則取之公孟惡北宫喜褚師圃欲去之公子朝通於襄夫人宣薑懼而欲以作亂故齊豹北宫喜禇師圃公子朝作亂初齊豹見宗魯於公孟為驂乘焉將作亂而謂之曰公孟之不善子所知也勿與乘吾將殺之對曰吾由子事公孟子假吾名焉故不吾逺也雖其不善吾亦知之抑以利故不能去是吾過也今聞難而逃是僣子也子行事乎吾將死之以周事子而歸死於公孟其可也衛侯在平夀公孟有事於蓋獲之門外齊子氏惟於門外而伏甲焉使祝蛙置戈於車薪以當門使一乘從公孟以出使華齊御公孟宗魯驂乘及閎中齊氏用戈擊公孟宗魯以背蔽之斷肱以中公孟之肩皆殺之公聞亂乘驅自閲門入慶比御公公南楚驂乘使華寅乘二車及公宫鴻駵魋駟乘于公公載寶以出褚師子申遇公於馬路之衢遂從過齊氏使華寅肉袒執蓋以當其闕齊氏射公中南楚之背公遂出寅閉郭門踰而從公公如死鳥折朱鉏宵從竇出徒行從公齊氏之宰渠子召北宫子北宫氏之宰不與聞謀殺渠子遂伐齊氏滅之公入與北宫喜盟於彭水之上遂盟國人公子朝褚師圃子玉霄子髙魴出奔晉孫氏曰以衛侯之母兄盜得殺之衛侯之無刑政也張氏曰衛襄公二子長曰縶次曰元孟縶之足不良於是立其弟元為太子襄公卒元立舜之親愛其弟也富貴之而使吏治其國不得有為以暴其民靈公受國於有疾之兄聽其無禮於大夫且俾之預於政而又不能正其母以預制其禍亂使齊豹北宫喜褚師圃公子朝之倫如盜賊竊發兄死身危幾亡其國任公輔曰尉止齊豹公孫翩陽虎皆大夫非卿故曰盜澄按此説非也凡稱盜蓋皆賤者但當稱人以其所作不義故不稱人而稱盜陸氏曰稱盜者目罪人之賤者也冬十月宋華亥向寧華定出奔陳向寧公作向寧後同左傳曰宋元公無信多私而惡華向華定華亥與向寧謀曰亡愈於死先諸華亥偽有疾以誘羣公子殺公子寅公子御戎公子朱公子固公孫援公孫丁拘向勝向行於其廩公如華氏請焉弗許遂劫之取太子欒與母弟辰公子地以為質公亦取華亥之子無戚向寧之子羅華定之子啓與華氏盟以為質公請於華費遂將攻華氏曰子死亡有命余不忍其詬殺華向之質而攻之華向奔陳華登奔吳向寧欲殺太子華亥曰干君而出又殺其子其誰納我且歸之有庸使少司寇牼以歸十有一月辛卯蔡侯廬卒平公也在位八年其子朱嗣隱太子有之子東國以世嫡之故攻朱而自立是為悼公經書月三書日一大衍厯正月辛酉小巳丑冬至按左傳謂二月己丑日南至三統厯謂正月己丑朔旦冬至皆氣同而朔差二月庚寅大閏月庚申小三月己丑大四月己未小五月戊子大六月戊午小七月丁亥大八月丁巳小九月丙戌大十月丙辰小十一月乙酉大辛卯七日十二月乙卯小長厯是年閏八月二十有一年庚辰景王二十四年晉霸頃五蔡悼侯東國元年曹悼三衛靈十四鄭定九陳惠九杞平十五宋元十一齊景二十七秦哀十六楚平八吳僚六春王三月葬蔡平公夏晉侯使士鞅來聘左傳曰叔孫婼為政季孫欲惡諸晉使有司以齊鮑國歸費之禮為士鞅士鞅怒曰鮑國之位下其國小而使鞅從其牢禮是卑敝邑也將復諸寡君魯人恐加四牢焉為十一牢杜氏曰晉頃公即位通嗣君也髙氏曰晉頃公即位六年公以晉昭見止之故不復往朝今使士鞅來聘而賔客牢禮不以命數二十有三年晉侯遂執婼宋華亥向寧華定自陳入于宋南里以叛叛公作畔左傳曰宋華費遂生華貙華多僚華登貙為少司馬多僚為御士與貙相惡乃譖諸公曰貙將納亡人公懼使告司馬司馬歎曰必多僚也吾有讒子而弗能殺吾又不死抑君有命可若何乃與公謀逐華貙子皮殺多僚劫司馬以叛而召亡人華向入樂大心豐愆華牼禦諸橫華氏居盧門以南里叛宋城舊鄘及桑林之門而守之華登以吳師救華氏齊師宋師敗吳師於鴻口華登帥其餘以敗宋師公欲出厨人濮曰吾小人可藉死而不能送亡君請待之齊烏枝鳴曰用少莫如齊致死齊致死莫如去備彼多兵矣請皆用劒從之華氏北復即之遂敗華氏於新里公子城以晉師至曹翰胡會晉荀吳齊苑何忌衛公子朝救宋與華氏戰於赭丘大敗華氏圍諸南里楚薳越帥師逆華氏胡氏曰凡書叛有入於戚者而不言衛有入於朝歌者而不言晉有入於蕭者而不言宋比獨稱宋南里何也戚與朝歌及蕭皆其所食邑也若南里則宋國城內之里名也傳稱華氏居盧門南里以叛宋城舊墉及桑林之門以守是華氏與宋分國而居矣故其出其入皆以南里繫之宋此叛臣逼脅其君已甚之詞也秋七月壬午朔日有食之八月乙亥叔輒卒輒公作痤此叔弓之子伯張也冬蔡侯東出奔楚東左公並作朱今從穀梁穀梁傳曰東者東國也王父誘而殺焉父執而用焉澄按東下闕國字前年東平公卒而東國立至此年冬而奔楚或是國人黨平公之下或是恐楚之討已然無事迹可考不可知也左氏事迹不可信按是年蔡侯東出奔楚二十三年蔡侯東國卒於楚當是一人不應作朱蓋文日在木中為東一在木中為朱此經當是蔡侯東國穀既脫一國字左公二家又因文日漫為一遂誤東為朱今正之公如晉至河乃復左傳曰鼓叛晉晉將伐鮮虞故辭公澄按公朝晉至是凡六矣而不見納者四積弱積輕是以屢辱也經書月三書日二大衍厯正月乙卯小己亥冬至二月戊申大三月戊寅小四月丁未大乙丑十九日五月丁丑小六月丙午大七月丙子小八月乙巳大九月乙亥大十月乙巳小閏月甲戊大十一月甲辰小十二月癸酉大朔日食黃道箕四度半強二十有二年辛巳景王二十五年崩晉霸頃六蔡悼二曹悼四衛靈十五鄭定十陳惠十杞平十六宋元十二齊景二十八秦哀十七楚平九吳僚七春齊侯伐莒左傳曰齊北郭啓帥師伐莒莒子將戰苑羊牧之諫曰不如下之大國不可怒也弗聽敗齊師於夀餘齊侯伐莒莒子行成莒於是乎大惡其君髙氏曰齊景矜而自功如此安能及逺哉宋華亥向寧華定自宋南里出奔楚左傳曰楚薳越使告於宋曰聞君有不令之臣為君憂寡君請受而戮之諸侯之戍謀曰若華氏知困而致死楚恥無功而疾戰非吾利也不如出之以為楚功其亦無能為也已乃固請出之宋人從之宋華亥向寧華定華貙華登皇奄傷省臧士平出奔楚胡氏曰華向誘殺羣公子又劫其君取太子母弟為質又求助於吳楚蠻夷入披其國都以叛此必誅不赦之賊也宋宜竭力必討之於內諸侯宜協心必救之於外楚子宜執叛臣之使而戮之於境今楚人釋君而臣是助諸侯之戍怠於救患固請逸賊而宋人又從之其曰自宋南里者譏宋之縱釋有罪不能致討也大搜于昌間問公作姦胡氏曰昭公之時凡三書搜或以非其時或以非其地大意在權臣専行公不與也髙氏曰三家卒徒益衆於搜加大字所以甚三家之盛見公室之卑也夏四月乙丑天王崩左傳曰王子朝賔起有寵於景王王與賔孟説之欲立之王田北山使公卿皆從將殺單子劉子王有心疾崩於榮錡氏單子攻賔起殺之六月叔鞅如京師葬景王髙氏曰天子崩天下諸侯九夷八蠻莫不奔其喪故七月而葬者盡天下臣子之心使逺近得會其葬也今天王崩諸侯無一奔喪者昭公但使叔鞅往會之又以三月而葬是天子而用士庶人之禮也王室亂左傳曰王子朝因舊官百工之喪職秩者與靈景之族以作亂逐劉子劉子奔揚單子逆悼王于莊宫以歸王子還夜取王以如莊宫單子出王子還奉王以追單子單子殺還姑發弱鬷延定稠子朝奔京伐之京人奔山劉子入於王城鞏簡公敗績於京甘平公亦敗焉叔鞅至自京師言王室之亂也髙氏曰春秋記事必指其實下書王猛子朝之事自足以見王室之亂而聖人乃於此不隱其辭何哉此前王室衰微猶未至於亂也故聖人每扶而尊之言王則曰天王不混稱於吳楚也言周則曰京師不下同於列國也王敗於鄭而曰蔡人衛人陳人從王伐鄭以諸侯不可敵王故明君臣之大義也王與戎戰而書王師敗績於茅戎以茅戎不可敵王故以自敗為文也以至襄王出奔而書天王出居於鄭晉侯召王而書天王狩於河陽王臣雖微者亦序於諸侯之上則所以嚴其名分者至矣故凡王室可譏可貶者皆遷就其辭而為之隱避今景王不能正其家而致諸子之爭立於是尹氏召伯毛伯欲立王子朝而劉子單子欲立王猛二子相爭遂以干戈相向迭勝迭負五年之間國無定主王室之亂莫此為甚故特書之然莊二十年惠王有子頺之亂僖二十四年襄王有子帶之亂春秋不書王室亂何獨於此乎書惠襄二王亂不在已今景王之亂乃自取之是王室自亂蓋有甚於惠襄者劉子單子以王猛居于皇左傳曰單子欲告急於晉以王如平畤遂如圃車次于皇劉子如劉單子使王子處守於王城盟百工於平宫鄩肸伐皇大敗獲鄩肸焚諸王城之市司徒醜以王師敗績於前城百工叛伐單氏之宮敗焉反伐之伐東圉杜氏曰河南鞏縣西南有皇亭張氏曰西北有湟水胡氏曰猛未逾年何以稱王示當立也既當立矣何以稱名明嗣君也曰王猛者見居尊得正又以别乎諸王子也按左氏景王太子夀以昭十五年卒至是八年矣猛與丐皆其母弟當立然久而未立者王愛庶子朝欲立以為嗣未果而王崩故諸大臣競立君諸王子爭欲立以正則有猛以寵則有朝猛雖正而無寵其威不足以懾羣下朝雖寵而不正其分不足以正人心二子廢立皆恃大臣強弱而後定也秋劉子單子以王猛入于王城左傳曰晉籍談荀躒帥九州之戎及焦瑕溫原之師以納王於王城單子劉蚠以王師敗績於郊前城人敗陸渾于社髙氏曰王城天子都而子朝之黨在焉故言入杜氏曰王城郟鄏今河南縣張氏曰河南縣乃周書洛誥所謂澗水東瀍水西為定鼎之地平王東遷即都於此而春秋所謂京師皆指此也冬十月王子猛卒左傳曰不成喪也敬王即位館於子旅氏晉籍談荀躒賈辛司馬督帥師軍于隂于侯氏于溪泉次于社王師軍于汜于解次于任人晉箕遺樂微右行詭濟師取前城軍其東南王師軍於京楚伐京毁其西南杜氏曰未即位故不言崩諡為悼王髙氏曰居喪而稱王者明當嗣也出而書居者如成君也卒而書子猛者蓋生己正其當王故死以未逾年之君書之也立後之法先立嫡無嫡則立子爾立嫡者以嫡為重故太子死立嫡孫未有嫡孫則立太子之母弟以母嫡故也立子則從諸子之長者立之均吾庶子故也今猛又卒於是又立猛之母弟王子丐是為敬王十有二月癸酉朔日有食之經書月四書日二大衍厯正月己卯小己亥冬至二月戊申大三月戊寅小四月丁未大乙丑十九日五月丁丑小六月丙午大七月丙子小八月乙巳大九月乙亥大十月乙巳小閏月甲戌大十一月甲辰小十二月癸酉大朔日食黃道箕四度半強二十有三年壬午敬王元年晉霸頃七蔡悼三卒曹悼五衛靈十六鄭定十一陳惠十一杞平十七宋元十三齊景二十九秦哀十八楚平十吳僚八春王正月叔孫婼如晉婼敕略切左傳曰邾人城翼還將自離姑公孫鉏曰魯將御我欲自武城還循山而南徐鉏丘弱茅地曰道下遇雨將不出是不歸也遂自離姑武城人塞其前斷其後之木而弗殊邾師過之乃推而蹶之遂取邾師獲鉏弱地邾人訴於晉晉人來討叔孫婼如晉杜氏曰謝取邾師也癸丑叔鞅卒叔弓之子叔輒之弟也晉人執我行人叔孫婼左傳曰晉人使與邾大夫坐叔孫曰列國之卿當小國之君固周制也邾又夷也寡君之命介子服回在請使當之不敢廢周制故也乃不果坐韓宣子使邾人聚其衆將以叔孫與之叔孫聞之去衆與兵而朝士彌牟謂韓宣子曰子弗良圖而以叔孫與其讎叔孫必死之魯亡叔孫必亡邾邾君亡國將焉歸子雖悔之何及所謂盟主討違命也若皆相執焉用盟主乃弗與使各居一館士伯聽其辭而訴諸宣子乃皆執之士伯御叔孫從者四人過邾館以如吏先歸邾子士伯曰以芻蕘之難從者之病將館子於都叔孫旦而立期焉乃館諸箕舍子服昭伯於他邑范獻子求貨於叔孫使請冠焉取其冠法而與之兩冠曰盡矣為叔孫故申豐以貨如晉叔孫曰見我吾告女所行貨見而不出吏人之與叔孫居於箕者請其吠狗弗與及將歸殺而與之食之叔孫所館者雖一日必葺其牆屋去之如始至髙氏曰晉人雖以我取邾師為罪而執我行人其實則為二十一年士鞅來聘以魯為卑己故也晉人圍郊左傳曰二師圍郊郊鄩潰晉師在乎隂王師在澤邑王使告間二師還髙氏曰郊王畿之邑不繫之國者天下皆王土也王臣亦無所繫蓋士無二王所以别其於諸侯也春秋諸侯更相侵伐未嘗敢及於周蓋外相攻奪以傾天下之勢其心實無王而外不敢犯王室者懼天下諸侯執言而攻已也此圍郊者子朝在焉故也東萊吕氏曰當是時王必自以為無假於晉師故使之間而晉因此遂還然晉師還而子朝之勢復熾若因郊潰遂取子朝不至如後日之難也夏六月蔡侯東國卒于楚悼公也在位三年二十一年冬奔楚今年夏卒其弟申立是為昭公秋七月莒子庚輿來奔左傳曰莒子庚輿虐而好劒苟鑄劒必試諸人國人患之又將叛齊烏存帥國人以逐之庚輿將出聞烏存執殳而立於道左懼將止死苑羊牧之曰君過之烏存以力聞可矣何必以弒君成名遂來奔齊人納郊公髙氏曰庚輿不正而立又不安其國而出奔於魯與鄭伯突同澄曰庚輿名失國也戊辰吳敗頓胡沈蔡陳許之師于雞父胡子髠沈子逞滅獲陳夏齧雞父榖作雞甫髠苦門切逞公作楹榖作盈左傳曰吳人伐州來楚薳越帥師及諸侯之師奔命救州耒吳人禦諸鍾離子瑕卒楚師熸吳公子光曰諸侯從於楚者衆而皆小國也畏楚而不獲已是以來七國同役而不同心若分師先以犯胡沈與陳必先奔三國敗諸侯之師乃搖心矣諸侯乖亂楚必大奔請先者去備薄威後者敦陳整旅吳子從之戰於雞父吳子以罪人三千先犯胡沈與陳三國爭之吳為三軍以繫於後中軍從王光帥右掩餘帥左吳之罪人或奔或止三國亂吳師擊之三國敗獲胡沈之君及陳大夫舍胡沈之囚使奔許與蔡頓曰吾君死矣師譟而從之三國奔楚師大奔書曰胡子髠沈子逞滅獲陳夏齧君臣之辭也公羊傳曰君死於位曰滅生得曰獲大夫生死皆曰獲胡氏曰君死曰滅胡子髠沈子逞是也生得曰獲秦晉戰於韓原獲晉侯是也大夫生死皆曰獲鄭獲宋華元生也吳獲陳夏齧死也髙氏曰此見吳之強而楚人益弱夫頓胡沈蔡陳許皆楚與國也吳伐州來楚人帥六國之師以救之於是吳人禦之盡敗其師于雞父頓胡沈其君自將蔡陳許則大夫帥師是以其次如此也杜氏曰雞父楚地安豐縣南有雞備亭張氏曰今屬壽州天王居于狄泉左傳曰王子朝入於尹尹圍誘劉他殺之單子從阪道劉子從尹道伐尹單子先至而敗劉子還召伯奐南宫極以成周人戍尹單子劉子樊齊以王如劉張氏曰狄泉即僖二十九年翟泉杜氏曰洛陽城內太倉西南池水也時在城外髙氏曰猛之母弟始立而遽稱天王者蓋景王崩逾年矣不可曠年無王故稱之且明正也著天下已有王而子朝不可以亂之也尹氏立王子朝左傳曰王子朝入於王城次於左巷鄩羅納諸莊宫尹辛敗劉師于唐又敗諸鄩尹辛取西闈攻蒯蒯潰澄曰此時敬王與朝皆立為王周之大臣各有所從周人亦莫知其孰為正孰為非正夫子書敬王為天王書朝為尹氏立邪正辨矣孫氏曰嗣子有常位不言立立者篡辭髙氏曰與衛人立晉同衛人者衆人同欲立之猶且不可今尹氏一己之私而立之以亂周室罪尹氏也尹氏即尹子此稱氏者著其世執國柄也陸氏曰大夫稱氏者唯尹氏武氏崔氏皆譏世卿也時世卿既多不可勝譏因尹氏私赴不以名因齊崔氏出奔因武氏以子代父故特書之及尹氏立王子朝奔楚皆以世卿亂王室故從而書之譏此數者足以見世卿之惡也八月乙未地震左傳曰南宫極震萇𢎞謂劉文公曰君其勉之先君之力可濟也周之亡也其三川震今西王之大臣亦震天棄之矣東王必大克杜氏曰經書地震魯地也周地亦震南宫極震為屋所壓而死子朝在王城故謂西王敬王居狄泉在王城之東故曰東王冬公如晉至河有疾乃復至河下公榖又有公字左傳曰公為叔孫故如晉公羊傳曰有疾乃復殺恥也蘇氏曰書有疾言非晉之不受也胡氏曰昭公兩朝於晉而一見止五如晉而四不得入焉以周公之胄千乘之君執幣帛修兩君之好而不見納斯可恥矣今此書有疾乃復殺恥也經書月四書日三大衍厯正月癸卯小乙巳冬至癸丑十一日二月壬申大三月壬寅小四月辛未大五月辛丑小六月庚午大七月庚子大戊辰晦八月己巳大乙未二十七日九月己亥小十月戊辰大十一月戊戌小十二月丁卯大二十有四年癸未敬玉二年晉霸頃八蔡昭侯申元年曹悼六衛靈十七鄭定十二陳惠十二杞平十八卒宋元十四齊景三十秦哀十九楚平十一吳僚九春王二月丙戌仲孫貜卒貜俱縛切髙氏曰此孟獻子之曾孫孟僖子也按左傳初公如楚僖子為介不能相儀及楚又不能答郊勞僖子病之乃講學焉苟能禮者從之及將死也召其大夫曰禮人之幹也無禮無以立吾聞將有達者曰孔丘聖人之後也我若獲沒必屬説與何忌於夫子而師事之而學禮焉以定其位故孟獻子何忌南宫敬叔皆師事仲尼婼至自晉婼公作叔孫舍左傳曰晉士彌牟逆叔孫于箕曰寡君以為盟主之故是以久子不腆敝邑之禮將致諸從者使彌牟逆吾子叔孫受禮而歸吕氏曰婼不言叔孫前此也劉原父謂公羊獨言叔孫似是聖人本意以為褒之世儒説經之鑿皆類此原父能知他人之鑿而不自知其鑿也夏五月乙未朔日有食之左傳曰梓慎曰將水昭子曰旱也日過分而陽不克克必甚能無旱乎秋八月大雩丁酉杞伯郁釐卒平公也在位十八年子成嗣是為悼公冬吳滅巢左傳曰楚子為舟師以略吳疆沈尹戌曰此行也楚必亡邑不撫民而勞之吳不動而速之吳踵楚而疆場無備邑能無亡乎越大夫胥犴勞王於豫章之汭越公子倉歸王乘舟倉及壽夢帥師從王王及圉陽而還吳人踵楚而邊人不備遂滅巢及鍾離而還沈尹戌曰亡郢之始於此在矣王一動而亡二姓之師幾如是而不及郢胡氏曰巢楚之附庸實邑之也書吳入州來著陵楚之漸書吳滅巢著入郢之漸四鄰封境之守既不能制則封境震矣四境國都之守既不能保則國都危矣故沈尹戌以此為亡郢之始也葬杞平公經書月三書日三大衍厯正月丁酉大庚戌冬至二月丁卯小丙戌二十日三月丙申大四月丙寅小五月乙未大朔日食黃道胃四度半強六月乙丑小七月甲午大八月甲子小九月癸巳大經八月丁酉在此月經有日無月十月癸亥小十一月壬辰大十二月壬戌小二十有五年甲申敬王三年晉霸頃九蔡昭二曹悼七衛靈十八鄭定十三陳惠十三杞悼公成元年宋元十五卒齊景三十一秦哀二十楚平十二吳僚十春叔孫婼如宋左傳曰宋公享昭子明日宴飲酒樂語相泣也樂祁佐退而告人曰今兹君與叔孫其皆死乎吾聞之哀樂而樂哀皆喪心也心之精爽是為魂魄魂魄去之何以能久季公若之姊為小邾夫人生宋元夫人生子以妻季平子昭子如宋聘且逆之公若從謂曹氏勿與魯將逐之曹氏告公公告樂祁樂祁曰與之如是魯君必出政在季氏三世矣魯君喪政四公矣無民而能逞其志者未之有也魯君失民矣焉得逞其志靖以待命猶可動必憂夏叔詣會晉趙鞅宋樂大心衛北宫喜鄭遊吉曹人邾人滕人薛人小邾人于黃父詣公榖作倪後同大心公作世心左傳曰謀王室也趙簡子令諸侯之大夫輸王粟具戌人曰明年將納王宋樂大心曰我不輸粟我於周為客若之何使客晉士伯曰自踐土以來宋何役之不會而何盟之不同曰同恤王室子焉得避之子奉君命以會大事而宋背盟無乃不可乎右師不敢對受牒而退髙氏曰自二十二年景王崩王室亂天王播越在諸侯皆莫奔救四年之後晉始為此會而諸侯不至但合諸大夫以謀之命諸大夫具戍曰明年將納王夫王室之急如此豈可坐待明年哉有霸者作如齊桓公盟首止以定王世子鄭晉文公誅叔帶以入襄王豈不美哉桓文不作朝猛相競王室世臣不能明先王一定之制順非而廢適使頃公而為桓文果至是乎是以聖人傷王室之亂而又於此著諸侯之無霸也張氏曰黃父即黑壤晉地有鸜鵒來巢鸜公作鸛左傳曰書所無也張氏曰卲子曰天下將治則天地之氣自北而南天下將亂則天地之氣自南而北禽烏之類得氣之先者也春秋書六鷁退飛氣使之也鸜鵒不踰濟而至魯豈非氣自南而北之驗哉當此之先楚雖為中國患而齊晉猶足以抑之自此之後晉霸不競吳楚越皆以南服迭主夏盟諸侯斂袵事之馴至大亂則知鸜鵒來巢之祥不特昭公出奔之兆而已秋七月上辛大雩季辛又雩左傳曰再雩旱甚也啖氏曰季辛不言大承上可知九月己亥公孫于齊次于陽州陽公作楊左傳曰初季公鳥娶妻于齊鮑文子生甲公鳥死季公亥與公思展與公鳥之臣申夜姑相其室及季姒與饔人檀通而懼乃使其妾抶已以示秦遄之妻曰公若欲使余余不可而抶余又訴於公甫曰展與夜姑將要余秦姬以告公之公之與公甫告平子平子拘展於卞而執夜姑將殺之公若泣而哀之曰殺是是殺余也將為之請平子使竪勿納日中不得請有司逆命公之使速殺之故公若怨平子季郈之雞鬭季氏介其雞郈氏為之金距平子怒益宫於郈氏且讓之故郈昭伯亦怒平子臧昭伯之從弟會為讒於臧氏而逃於季氏臧氏執旃平子怒拘臧氏老將禘于襄公萬者二人其衆萬於季氏臧孫曰此之謂不能庸先君之廟大夫遂怨平子公若獻弓於公為且與之出射於外而謀去季氏公為告公果公賁公果公賁使侍人僚柤告公公寢將以戈擊之乃走公曰執之亦無命也懼而不出數月不見公不怒又使言公執戈以懼之乃走又使言公曰非小人之所及也公果自言公以告臧孫臧孫以難告郈孫郈孫以可勸告子家懿伯懿伯曰讒人以君徼幸事若不克君受其名不可為也舍民數世以求克事不可必也且政在焉其難圖也公退之辭曰臣與聞命矣言若泄臣不獲死乃館於公叔孫昭子如闞公居於長府伐季氏殺公之於門遂入之平子登臺而請曰君不察臣之罪使有司討臣以于戈臣請待於沂上以察罪弗許請囚于費弗許請以五乘亡弗許子家子曰君其許之政自之出久矣隱民多取食焉為之徒者衆矣日入慝作弗可知也衆怒不可蓄也蓄而弗治將藴藴蓄民將生心生心同求將合君必悔之弗聽郈孫曰必殺之公使郈孫逆孟懿子叔孫氏之司馬鬷戾言於其衆曰若之何莫對又曰我家臣也不敢知國凡有季氏與無於我孰利皆曰無季氏是無叔孫氏也鬷戾曰然則救諸帥徒以往陷西北隅以入公徒釋甲執氷而踞遂逐之孟氏使登西北隅以望季氏見叔孫氏之旌以告孟氏執郈昭伯殺之於南門之西遂伐公徒子家子曰諸臣偽劫君者而負罪以出君止意如之事君也不敢不改公曰余不忍也與臧孫如墓謀遂行公孫于齊次于陽州杜氏曰陽州齊魯境上邑未敢直前故次于竟也蘇氏曰次于陽州待命于齊也東萊吕氏曰使叔孫昭伯而在則魯昭公必不至孫也齊侯唁公于野井榖梁傳曰弔失國曰唁左傳曰齊侯將唁公於平隂公先至於野井齊侯曰寡人之罪也使有司待於平隂為近故也齊侯曰自莒疆以西請致千社以待君命寡人將帥敝賦以從執事唯命是聽君之憂寡人之憂也公喜子家子曰天祿不再天若胙君以魯足矣失魯而以千社為臣誰與之立且齊君無信不如早之晉弗從公羊傳曰齊侯唁公曰奈何君去魯國之社稷昭公曰喪人不佞失守魯國之社稷執事以羞再拜顙慶子家駒曰慶子免君於大難矣子家子曰臣不佞陷君於大難君不忍加之鐵鑕賜之以死再拜顙髙子執簞食與四脡脯國子執壺漿曰吾寡君聞君在外餕饔未就敢致糗於從者昭公曰君不忘吾先君延及喪人錫之以大禮再拜稽首以衽受髙子曰有夫不祥君無所辱大禮昭公蓋祭而不嘗景公曰寡人有不腆先君之服未之敢服有不腆先君之器未之敢用敢以請昭公曰喪人不佞失守魯國之社稷執事以羞敢辱大禮敢辭景公曰寡人有不腆先君之服未之敢服有不腆先君之器未之敢用敢固以請昭公曰以吾宗廟之在魯也有先君之服未之能以服有先君之器未之能以出敢固辭景公曰寡人有不腆先君之服未之敢服有不腆先君之器未之敢用請以饗乎從者昭公曰喪人其何稱景公曰孰君而無稱昭公於是噭然而哭諸大夫皆哭既哭以人為災以幦為席以鞍為几以遇禮相見孔子曰其禮與其辭足觀矣胡氏曰齊侯來唁其禮與辭是矣而方伯達帥之職則未修也又豈所以為禮哉石氏曰齊侯之為禮不誠昭公之為辭不哀可見矣任氏曰公孫于齊求齊之援也次於陽州待齊之命也齊侯唁公於野井以唁為名拒公之適已也昭公微弱季氏盛強迫脅而出欲求救拯以齊大國之力伐季氏至易也為君而伐臣至順也行至易以成至順速若發殪惜乎齊侯不知為此而亦唯季氏之與野井之唁豈弔失國之禮乎拒公而已季氏曰野井齊地杜氏曰濟南祝柯縣東有野井亭冬十月戊辰叔孫婼卒左傳曰昭子自闞歸見平子平子稽顙曰子若我何對曰人誰不死子以逐君成名子孫不忘不亦傷乎將若子何平子曰苟使意如得改事君所謂生死而肉骨也昭子從公于齊與公言子家子命適公館者執之公與昭子言於幄內曰將安衆而納公公徒將殺昭子伏諸道左師展告公公使昭子自鑄歸平子有異志昭子齊於其寢使祝宗祈死戊辰卒十有一月己亥宋公佐卒于曲棘左傳曰宋元公將為公故如晉卒於曲棘杜氏曰曲棘宋地陳留外黃縣城中有曲棘里在開封雍丘胡氏曰宋元意如之外舅也不此之顧而求欲納公是以正倫恤患為心而不恤其私親其賢於當時諸侯逺矣澄按元公在位十五年子欒嗣是為景公十有二月齊侯取鄆公羊傳曰為公取之也杜氏曰取以居公也吕氏曰齊侯不能討季氏而獨取鄆以處公其無逺略可知也經書月五書日三大衍厯正月辛卯大乙卯冬至二月辛酉小三月庚寅大四月庚申大五月庚寅小六月己未大閏月己丑小七月戊午大八月戊子小經九月己丑在此月九月丁巳大經十月戊辰在此月十月丁亥小經十一月己亥在此月十一月丙辰大十二月丙戌小長厯是年閏十二月己亥九月十二日戊辰十月十三日又己亥十一月十三日二十有六年乙酉敬王四年晉霸頃十蔡昭三曹悼八衛靈十九鄭定十四陳惠十四杞悼二宋景公顯曼元年齊景三十二秦哀二十一楚平十三卒吳僚十一春王正月葬宋元公三月而葬速三月公至自齊居于鄆左傳曰處於鄆言魯地也髙郵孫氏曰入魯境故書至猶在外故書地凡公行反而告廟則書至在外雖不告而書至所以存公也夏公圍成左傳曰齊侯將納公命無受魯貨申豐從女賈以幣錦二兩縛一如瑱適齊師謂子猶之人髙齮能貨子猶為髙氏後粟五千庾髙齮以錦示子猶子猶欲之齮曰魯人買之百兩一布以道之不通先入幣財子猶受之言於齊侯曰齊人不盡力於魯君者非不能事君也然據有異焉宋元公為魯君如晉卒於曲棘叔孫昭子求納其君無疾而死不知天之棄魯耶抑魯君有罪於鬼神以及此也君若待於曲棘使羣臣從魯君以卜焉若可師有濟也君而繼之兹無敵矣若其無成君無辱焉齊侯從之使公子鉏帥師從公成大夫公孫朝謂平子曰有都以衛國也請我受師許之請納質弗許曰信女足矣告於齊師曰孟氏魯之敝室也用成已甚請息肩於齊齊師圍成成人伐齊師之飲馬於淄者曰將以厭衆魯成備而後告曰不勝衆師及齊師戰於炊鼻孫氏曰公圍成書者見國內皆叛也胡氏曰不書齊師者景公怵於邪説為義不終故微之也書公圍成則季氏之不臣昭公之不君齊侯之不能修方伯連率之職咸見矣秋公會齊侯莒子邾子杞伯盟于鄟陵左傳曰謀納公也髙氏曰公失國而會諸侯者求入也求入不主晉而主齊齊侯矯為此盟以莒邾杞皆魯之與國也公至自會居于鄆九月庚申楚子居卒平王也在位十三年子昭王軫嗣冬十月天王入于成周左傳曰單子如晉告急劉人敗王城之師于尸氏王城人劉人戰於施谷劉師敗績劉子以王出次於渠王城人焚劉王宿於禇氏王次於萑谷王入於胥靡王次於滑晉知躒趙鞅帥師納王使女寬守闕塞王起師於滑在郊遂次於尸召伯逆王于尸及劉子單子盟遂軍圉澤次於隄上王入於成周晉師使成公般戍周而還澄按平王東遷都於王城王城者周召所卜澗水東瀍水西之地一名郟鄏以定九鼎為朝會諸侯之處是曰東都蓋以鎬京為周之西都故以此王城為東都東對西而言也在漢為河南縣成周者周召所卜瀍水東之地以遷殷頑民者是曰下都蓋以王城為洛之上都故以此成周為下都下對上而言也在漢為洛陽縣時王子朝據王城故王入於成周而居及王子朝出奔王畏朝之餘黨多在王城者故不復歸王城而徙都成周至赧王初年始復再遷王城以依西周公而居焉左氏敘事以王入成周在於朝奔楚之後今依經所書正之尹氏召伯毛伯以王子朝奔楚左傳曰晉師克鞏召伯盈逐王子朝王子朝及召氏之族毛伯得尹氏固南宫嚚奉周之典籍以奔楚劉氏曰召伯盈逐王子朝杜氏云召伯當言召氏經誤非也召伯既逐王子朝而歸敬王矣又何為以子朝奔乎若云召伯當作召氏者則又不與經合且召伯既自歸周則其族亦必隨之何故猶奉子朝為亂乎且召伯尊也召族卑也今召伯不奔召族自出法不當書於經而敘毛伯之上也又不得以尹氏為比尹氏所以書者以有尹固也固尊自得書爾召族無盈則卑卑則何以得書乎胡氏曰景王寵愛子朝踈薄子猛徒設此心兩棄之也寵孽為羣小所宗而人心不附正適為人心所向而羣小不從故伯服雖殺而平王亦不能復宗周之盛申生已死而卓子奚齊亦不能勝里克之兵是兩棄之也澄按定五年王人殺子朝子楚經書月四書日一大衍厯正月乙卯大庚申冬至二月乙酉小三月甲寅大四月甲申小五月癸丑大六月癸未大七月癸丑小八月壬午大九月壬子小庚申九日十月辛巳大十一月辛亥小十二月庚辰大二十有七年丙戌敬王五年晉霸頃十一蔡昭四曹悼九卒衛靈二十鄭定十五陳惠十五杞悼三宋景二齊景三十三秦哀二十二楚昭王軫元年吳僚十二弒春公如齊杜氏曰自鄆行也公至自齊居于鄆髙氏曰公至自齊居於鄆者二至自會居於鄆者一至自乾侯居於鄆者一書至書居不外公也我居故也君播越於外不得其所而魯國臣子之義可絶乎春秋之作明君臣也夏四月吳弒其君僚左傳曰吳子欲因楚喪而伐之使公子掩餘公子燭庸帥師圍潛使延州來季子聘于上國楚莠尹然工尹麋帥師救潛吳師不能退吳公子光曰此時也弗可失也告鱄設諸曰我王嗣也吾欲求之光伏甲於堀室而享王鱄設諸置劒於魚中以進抽劒刺王鈹交於胸遂弒王吳公子掩餘奔徐公子燭庸奔鍾吾公羊傳曰謁也餘祭也夷昧也與季子同母者四人季子弱而才兄弟皆愛之同欲立之以為君謁曰今若是迮而與季子國季子不受也請無與子而與弟弟兄迭為君而致國乎季子皆曰諾故諸為君者皆輕死為勇飲食必祝曰天苟有吳國尚速有悔於豫身故謁也死餘祭也立餘祭也死夷昧也立夷昧也死則國宜之季子者也季子使而亡焉僚者長庶也即之季子使而反至而君之爾闔廬曰先君之所以不與子國而與弟者凡為季子故也將從先君之命與則國宜之季子者也如不從先君之命與則我宜立者也僚惡得為君乎於是使專諸刺僚而致國乎季子季子不受曰爾弒吾君吾受爾國是吾與爾為篡也爾殺吾兄吾今殺爾是父子兄弟相殺終身無已也去之延陵終身不入吳國故君子以其不受為義不殺為仁劉氏曰稱國以弒者衆弒君之辭也謁餘祭夷昧不與子國而與弟為季子也季子亡僚長庶即位是廢讓毁義以篡也國人莫説故衆弒其君也澄按史記以僚為夷昧之子光為謁之子如此則僚乃光之兄弟也詳觀僚在位十二年光尊事之故其弒也乘機而後發竊疑以僚為餘祭之庶弟而扎之庶兄者近是扎之三兄相傳本欲置國于扎而扎不受故夷昧之卒也扎避之僚也無知自謂扎不在則已為扎兄可繼夷昧而立遂即位然季子不受國則夷昧自當立子而僚取之是篡也國固光之國也僚烏得而間之國之大臣及臣民皆欲弒僚而還國於光也故稱國弒楚殺其大夫郤宛左傳曰郤宛直而和國人説之鄢將師為右領與費無極比而惡之令尹子常賄而信讒無極譛郤宛焉謂子常曰子惡欲飲子酒又謂子惡令尹欲飲酒於子氏子惡曰我賤人也不足以辱令尹令尹將必來辱為惠已甚吾無以酬之若何無極曰令尹好甲兵子出之吾擇焉取五甲五兵曰置諸門令尹至必觀之而從以酬之及饗日帷諸門左無極謂令尹曰吾幾禍子子惡將為子不利甲在門矣子必無往且此役也吳可以得志子惡取賂焉而還又誤羣帥使退其師曰乘亂不祥吳乘我喪我乘其亂不亦可乎令尹使視郤氏則有甲焉不往召鄢將師而告之將師退遂令攻郤氏且爇之子惡聞之遂自殺也國人弗爇令曰不爇郤氏與之同罪或取一編菅焉或取一秉杆焉國人投之遂弗爇也令尹炮之盡滅郤氏之族黨殺陽令終與其弟完及他與晉陳及其子弟晉陳之族呼於國曰鄢氏費氏自以為王專禍楚國弱寡王室蒙王與令尹以自利也令尹盡信之矣國將如何令尹病之劉氏曰君不明故臣得專其威殺其大夫而莫之止也然而郤宛則有以取之張氏曰恃國人之悅已而無見幾知人之明以立於無道之朝見殺宜矣秋晉士鞅宋樂祁犂衛北宫喜曹人邾人滕人會于扈左傳曰令戍周且謀納公也宋衛皆利納公固請之范獻子取貨於季孫謂司城子梁與北宫貞子曰季孫未知其罪而君伐之請囚請亡於是乎不獲君又弗克而自出也夫豈無備而能出君乎季氏之復天救之也休公徒之怒而啓叔孫氏之心不然豈其伐人而説甲執氷以遊叔孫氏懼禍之濫而自同於季氏天之道也魯君守齊三年而無成季氏甚得其民淮夷與之有十年之備有齊楚之援有天之贊有民之助有堅守之心有列國之權而弗敢宣也事君如在國故鞅以為難二子皆圖國者也而欲納魯君鞅之願也請從二子以圍魯無成死之二子懼皆辭乃辭小國而以難復冬十月曹伯午卒悼公也在位九年弟野立是為聲公邾快來奔髙氏曰快亦是叛人之黨魯為逋逃淵藪而受之魯之強臣逐君而邾快來奔從其類也公如齊左傳曰齊侯請饗之子家子曰朝夕立於其朝又何饗焉其飲酒也乃飲酒使宰獻而請安子仲之子曰重為齊侯夫人曰請使重見子家子乃以君出杜氏曰禮君宴大夫使宰為獻主比公於大夫也齊侯請自安不在坐也子仲魯公子憗十二年謀逐季氏不能而奔齊今行飲酒禮而欲使重見從宴媟也公至自齊居于鄆髙氏曰公以齊之卑我也遂歸而明年如晉經書月二書日無大衍厯正月庚戌小丙寅冬至二月己卯大三月己酉小四月戊寅大五月戊申小六月丁丑大七月丁未小八月丙子大九月丙午小十月乙亥大十一月乙巳小十二月甲戌大二十有八年丁亥敬王六年晉霸頃十二蔡昭五曹聲公野元年衛靈二十一鄭定公十六卒陳惠十六杞悼四宋景三齊景三十四秦哀二十三楚昭二吳闔廬光元年春王三月葬曹悼公公如晉次于乾侯左傳曰公如晉將如乾侯子家子曰有求於人而即其安人孰矜之其造於竟弗聽使請逆於晉晉人曰天禍魯國君淹恤在外君亦不使一個辱在寡人而即安於甥舅其亦使逆君使公復於竟而後逆之孫氏曰公一年如齊者再皆不見禮故如晉其言次於乾侯者不得入於晉也公既不見禮於齊又不得入於晉其窮辱若此吕氏曰公如齊不得入如晉又不得入當世諸侯如是然後知無霸之害也任氏曰齊晉大國也皆與季氏不恤昭公中國主盟所以在夷狄乎杜氏曰乾侯晉竟內邑在魏郡斥丘縣張氏曰地譜今大名府成安縣東南有斥丘故城夏四月丙戌鄭伯寧卒寧公作寧定公也在位十九年子蠆嗣是為獻公六月葬鄭定公秋七月癸巳滕子寧卒寧公作寧悼公也在位二十五年子結嗣是為頃公冬葬滕悼公公不在國凡喪葬之禮皆季氏專之也經書月四書日二大衍厯正月甲辰大辛未冬至二月甲戌小三月癸卯大閏月癸酉小經四月丙戌在閏月四月壬寅大五月壬申小六月辛丑大七月辛未小癸巳二十三日八月庚子大九月庚午小十月己亥大十一月己巳小十二月戊戌大長厯是年閏五月丙戌四月四日二十有九年戊子敬王七年晉霸頃十三蔡昭六曹聲二衛靈二十二鄭獻公蠆元年陳惠十七杞悼五宋景四齊景三十五秦哀二十四楚昭三吳闔廬二春公至自乾侯居于鄆杜氏曰以乾侯至不得見晉侯故齊侯使髙張來唁公左傳曰來唁稱主君子家子曰齊卑君矣君秪辱焉杜氏曰髙張髙偃子唁公至晉不見受襄陵許氏曰荀躒唁公地髙張不地以公居鄆猶以魯志也故稱來焉髙氏曰唁於野井齊地也唁於乾侯晉地也今在鄆乃魯地故但書來而已公如晉次于乾侯齊氏曰齊侯唁公比公於大夫故公復如晉冀晉見恤也而晉復不受公故次於乾侯諸侯出奔狼狽未有如公之甚者夏四月庚子叔詣卒此叔輒之子也髙氏曰叔詣欲納公而卒秋七月冬十月鄆潰胡氏曰公之出奔處鄆四年民不見德亡無愛徵至於潰散豈非昏迷不返從者又艾殺其民視如土芥其下不堪所以潰歟髙氏曰此齊侯誘之使潰也鄆固畏季氏以齊使公居而不憚今齊不終惠鄆亦叛公昭公居於國國人逐之出君於鄆而鄆潰見魯民皆叛但知畏季氏也經書月三書日一大衍厯正月戊辰小丙子冬至二月丁酉大三月丁卯大四月丁酉小庚子四日五月丙寅大六月丙申小七月乙丑大八月乙未小九月甲子大十月甲午小十一月癸亥大十二月癸巳小三十年己丑敬王八年晉霸頃十四卒蔡昭七曹聲三衛靈二十三鄭獻二陳惠十八杞悼六宋景五齊景三十六秦哀二十五楚昭四吳闔廬三春王正月公在乾侯胡氏曰公去社稷於今五年每嵗首月不書公在魯四封之內則無適而非其所也至於鄆潰客寄乾侯非其所矣嵗首必書公之所在者蓋以存君不與季氏之專國也劉氏曰公在外久矣居於鄆有魯也在乾侯無魯也公雖無魯魯不可以無公向曰居今曰在向也魯而今也晉一民莫得使焉尺地莫得有焉人固曰乾侯之君爾春秋則以為猶吾君也夏六月庚辰晉侯去疾卒頃公也在位二十四年其子午嗣是為定公時公在乾侯晉地也而不弔其喪者晉不受故也秋八月葬晉頃公頃音傾左傳曰鄭遊吉弔且送葬魏獻子使士景伯詰之曰悼公之喪子西弔子蟜送葬今吾子無二何故對曰先王之制諸侯之喪士弔大夫送葬唯嘉好聘饗三軍之事於是乎使卿晉之喪事敝邑之間先君有所助執紼矣若其不間雖士大夫有所不獲數矣靈王之喪我先君簡公在楚我先大夫印段實往敝邑之少卿也王吏不討恤所無也晉人不能詰冬十有二月吳滅徐徐子章羽奔楚羽公作禹左傳曰吳子使徐人執掩餘使鍾吾人執燭庸二公子奔楚楚子大封而定其徙使監馬尹大心逆吳公子使居飬莠尹然左司馬沈尹戌城之取於城父與胡田以與之將以害吳也子西誎曰吳光新得國而親其民視民如子辛苦同之將用之也若好吳邊疆使柔服焉猶懼其至吾又強其讎以重怒之無乃不可乎王弗聽吳子怒執鍾吾子遂伐徐防山以水之滅徐徐子章羽斷其髮擕其夫人以逆吳子吳子唁而送之使其邇臣從之遂奔楚楚沈尹戌帥師救徐弗及遂城夷使徐子處之吳子問於伍員曰初而言伐楚余知其可也而恐其使余往也又惡人之有余之功也今余將自有之矣伐楚何如對曰楚執政衆而乖莫適任患若為三師以肄焉一師至彼必皆出彼出則歸彼歸則出楚必道敝亟肄以罷之多方以誤之既罷而後以三軍繼之必大克之闔廬從之楚於是乎始病經書月四書日一大衍厯正月壬戌大辛巳冬至二月壬辰小三月辛酉大四月辛卯小五月庚申大經六月庚辰在此月六月庚寅小七月己未大八月己丑大九月己未小十月戊子大十一月戊午小十二月丁亥大閏月丁巳小長厯是年閏五月庚辰六月二十二日三十有一年庚寅敬王九年晉霸定公午元年蔡昭八曹聲四衛靈二十四鄭獻三陳惠十九杞悼七宋景六齊景三十七秦哀二十六楚昭五吳闔廬四春王正月公在乾侯左傳曰言不能內外也高氏曰鄆曰居者鄆魯地公所有乾侯曰在者乾侯晉地非公得而專也春秋凡言居者境內之辭天王出居於鄭之類是也言在者境外之辭公在楚之類是也季孫意如會晉荀躒于適歷躒力狄切公作適丁歷切左傳曰晉侯將以師納公范獻子曰若召季孫而不來則信不臣矣然後伐之若何晉人召季孫獻子使私焉曰子必來我受其無咎季孫意如會晉荀躒于適歷荀躒曰寡君使躒謂吾子何故出君有君不事周有常刑子其圖之季孫練冠麻衣跣行伏而對曰事君臣之所不得也敢逃刑命君若以臣為有罪請囚於費以待君之察也亦唯君若以先臣之故不絶季氏而賜之死若弗殺弗亡君之惠也死且不朽若得從君而歸則固臣之願也敢有異心胡氏曰意如出君不事專有魯國晉實主盟不能致討而寵以會禮不亦逆哉季孫行貨齊晉使不納公禱於煬宫求君不入齊晉不能誅亂禁姦悖君臣之義不知其從自及也吕氏曰晉為盟主以號令諸侯將以託國者也而使大夫與叛臣會荀躒奉命而行不能諫止其為臣亦可知也林氏曰適歷晉地夏四月丁巳薛伯榖卒入春秋唯莊三十一年書薛伯卒及此年書名晉侯使荀躒唁公于乾侯左傳曰季孫從知伯如乾侯子家子曰君與之歸一慙之不忍而終身慙乎公曰諾衆曰在一言矣君必逐之荀躒以晉侯之命唁公且曰寡君使躒以君命討於意如意如不敢逃死君其入也公曰君惠顧先君之好施及亡人將使歸糞除宗祧以事君則不能見夫人已所能見夫人者有如河荀躒掩耳而走曰寡君其罪之恐敢與知魯國之難臣請復於寡君退而謂季孫君怒未怠子姑歸祭子家子曰君以一乘入於魯師季孫必與君歸公欲從之衆從者脅公不得歸榖梁傳曰唁公不得入於魯也陸氏曰在晉地故不言來吕氏曰齊侯唁公於野井晉侯使荀躒唁公於乾侯言大國盟主皆不能討亂無助順向正之意也髙氏曰荀躒既會季孫於適歷復以晉侯之命唁公於乾侯蓋晉侯有不納公之言夫不恤見逐之君而信不臣者之言隂交其臣陽唁其君空言無實卒使六卿之強遂分晉國而有之則晉侯亦魯侯已秋葬薛獻公髙氏曰季氏恐失鄰國之歡故使人會其喪葬冬囗黑肱以濫來奔肱公作弓黑肱上脫邾字杜氏曰不書邾史闕文濫東海昌慮縣襄陵許氏曰邾快黑肱相繼來奔季孫當國以類至也十有二月辛亥朔日有食之經書月三書日二大衍厯正月丙戌大丁亥冬至二月丙辰小三月乙酉大四月乙卯小丁己三日五月甲申大六月甲寅小七月癸未大八月癸丑小九月壬午大十月壬子大十一月壬午小十二月辛亥大朔日食黃道尾十二度半強三十有二年辛卯敬王十年晉霸定二蔡昭九曹聲五衛靈二十五鄭獻四陳惠二十杞悼八宋景七齊景三十八秦哀二十七楚昭六吳闔廬五春王正月公在乾侯取闞闞口暫切杜氏曰闞魯邑公别居乾侯遣人誘闞而取之不用師徒張氏曰昭公之難叔孫如闞定元年季孫使役如闞公氏將溝焉此魯地而公取之也澄曰昭公為魯國之君四封之內皆其土地也今昭公為季氏所逐而書取鄆取闞以見季氏據國公無尺土矣雖得魯邑猶取之於外云爾夏吳伐越左傳曰始用師於越也髙氏曰前此越與楚伐吳故吳於是年伐越秋七月冬仲孫何忌會晉韓不信齊髙張宋仲幾衛世叔申鄭國參曹人莒人薛人杞人小邾人城成周世叔榖作太叔左傳曰王使富辛與石張如晉請城成周天子曰天降禍於周俾我兄弟並有亂心以為伯父憂我一二親昵甥舅不遑啓處於今十年勤戍五年余一人無日忘之閔閔焉如農夫之望嵗懼以待時伯父若肆大惠復二文之業弛周室之憂徼文武之福以固盟主宣昭令名則余一人有大願矣昔成王合諸侯城成周以為東都崇文德焉今我欲徼福假靈於成王修成周之城俾戌人無勤諸侯用寧蝥賊逺屏晉之力也其委諸伯父使伯父實重圖之俾我一人無徵怨於百姓而伯父有榮施先王庸之范獻子謂魏獻子曰與其戌周不如城之天子實云雖有後事晉勿與知可也從王命以紓諸侯晉國無憂是之不務而又焉從事魏獻子曰善使伯音對曰天子有命敢不奉承以奔告於諸侯遲速衰序於是焉在士彌牟營成周計文數揣髙卑度厚薄仞溝洫物土方議逺邇量事期計徒庸慮材用書餱糧以令役於諸侯屬役賦文書以授帥而效諸劉子韓簡子臨之以為成命澄曰王城自平王東遷以來天子世世居之故其城完固子朝揚居王城敬王居狄泉晉師納王然後王入於成周子朝遂棄王城而奔楚子朝雖已出奔王畏子朝餘黨尚多故不敢歸王城而留居成周成周乃周公遷殷頑民之地其城圮惡故諸侯以兵戍之至此晉率諸侯城成周之後始撤諸侯之戌吕氏曰周室雖微諸侯猶勤之如此先王之德澤猶有存焉者也十有二月己未公薨于乾侯左傳曰言失其所也趙簡子問於史墨曰季氏出其君而民服焉諸侯與之君死於外而莫之或罪也對曰天生季氏以二魯侯為日久矣民忘君矣雖死於外其誰矜之社稷無常奉君臣無常位自古以然三后之姓於今為庶主所知也成季友桓之季也受費以為上卿至於文子武子政在季氏於此君也四公矣民不知君何以得國是以為君慎器與名不可以假人胡氏曰諸侯失國出奔者多矣昭公在外八年終以客死為天下笑何也祭仲雖專而世權不重於季氏衛侯失國猶夫人也而有推挽之者所以雖失而復得也魯自季友至於意如專執國命四世矣其臣皆季氏之孚也其民皆季氏之獲也昭公有一子家駒言不見聽計不行也不能復國宜矣經書月三書日一大衍厯正月辛巳小壬辰冬至三月庚戌大三月庚辰小四月己酉大五月己卯小六月戊申大七月戊寅小八月丁未大九月丁丑小十月丙午大十一月丙子小十二月乙巳大己未十五日春秋纂言卷十
