body:
  text: 春秋纂言總例卷五元吳澄撰軍禮伐趙氏曰凡師稱罪致討曰伐蔡人衛人陳人從王伐鄭桓五以上從伐者一左傳曰王以諸侯伐鄭永嘉陳氏曰春秋之法有天子在則其諸侯稱人有諸侯在則其大夫稱人曰蔡人衛人陳人從王伐鄭尊王也公㑹宋公衛侯陳侯于袲伐鄭桓十五公㑹宋公衛侯陳侯蔡侯伐鄭桓十六公會齊侯伐萊宣七公㑹晉侯宋公衛侯曹伯伐鄭成三公㑹晉侯齊侯宋公衛侯曹伯伐鄭成十公自京師遂㑹晉侯齊侯宋公衛侯鄭伯曹伯邾人滕人伐秦成十三公㑹尹子晉侯齊國佐邾人伐鄭成十六公㑹尹子單子晉侯齊侯宋公衛侯曹伯邾人伐鄭成十七公㑹單子晉侯宋公衛侯曹伯齊人邾人伐鄭同上公㑹晉侯宋公衛侯曹伯莒子邾子滕子薛伯杞伯小邾子齊世子光伐鄭襄九公㑹晉侯宋公衛侯曹伯莒子邾子齊世子光滕子薛伯杞伯小邾子伐鄭襄十公㑹晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯杞伯小邾子伐鄭襄十一再公㑹齊人宋人陳人蔡人伐衛莊五公㑹宋人齊人伐徐莊二十六公㑹吳伐齊哀十哀十一宋公陳侯衛侯曹伯㑹晉師于棐林伐鄭宣五翬帥師㑹宋公陳侯蔡人衛人伐鄭隠四叔老㑹鄭伯晉荀偃衛甯殖宋人伐許襄十六叔孫僑如㑹晉士燮齊人邾人伐郯成八叔孫豹㑹晉荀偃齊人宋人衛北宫括鄭公孫蠆曹人莒人邾人滕人薛人杞人小邾人伐秦襄十四溺㑹齊師伐衛莊二翬帥師㑹齊人鄭人伐宋隠十單伯㑹伐宋莊十四叔孫得臣㑹晉人宋人陳人衛人鄭人伐沈大三公孫歸父㑹齊人伐莒宣十一以上㑹伐者二十七魯君㑹十七外君㑹一魯臣㑹九會伐者孟子所謂摟諸侯以伐諸侯三王之罪人也及鄭師伐宋桓十二及宋人衛人伐邾桓十七及江人黄人伐陳僖四以上及伐者三及者皆不出主名盖以師及外師以人及外人也公伐齊莊九公伐邾隠七桓八僖二十一二十二三十三文七哀七公伐莒宣四公伐杞宣十八公子慶父帥師伐於餘丘莊二公子遂帥師伐邾僖二十三叔彭生帥師伐邾文十四公孫歸父帥師伐邾宣十仲孫速帥師伐邾襄二十季孫意如叔弓仲孫貜帥師伐莒昭十仲孫何忌帥師伐邾哀元哀六季孫斯叔孫州仇仲孫何忌帥師伐邾哀二伐邾桓八以闕國伐宋公陳侯蔡人衛人伐鄭隠四宋公曹伯衛人邾人伐齊僖十八宋公衛侯許男滕子伐鄭僖二十二齊侯伐宋僖三十三晉侯伐衛僖二十八文元晉侯伐秦文四楚子伐麋文十一楚子伐鄭宣四宣九宣十成十五襄九齊侯伐萊宣九楚子伐宋宣十二晉侯伐鄭宣十四晉侯衛世子臧伐齊宣十八鄭伯伐許成四楚子鄭伯伐宋成十八襄十一楚子伐吳襄二十四楚子蔡侯陳侯許男伐鄭同上吳子遏伐楚襄二十五楚子蔡侯陳侯伐鄭襄二十六楚子蔡侯陳侯許男頓子胡子沈子淮夷伐吳昭四楚子蔡侯陳侯許男頓子沈子徐人越人伐吳昭五齊侯伐北燕昭六楚子伐徐昭十二齊侯伐徐昭十六宋公伐邾昭十九齊侯伐莒昭二十一齊侯衛侯伐晉哀元齊侯伐宋哀五宋公伐鄭哀九晉郤缺帥師伐蔡文十五晉荀林父帥師伐陳宣九鄭公子去疾帥師伐許成三楚公子嬰齊帥師伐鄭成六成七晉欒書帥師伐鄭成九楚公子嬰齊帥師伐莒同上鄭公子喜帥師伐許成十四晉韓厥帥師伐鄭襄元楚公子嬰齊帥師伐吳襄三晉荀罃帥師伐許同上楚公子貞帥師伐陳襄三楚公子貞帥師伐鄭襄八楚公子貞鄭公孫輒帥師伐宋襄十楚公子貞帥師伐吳襄十四衛石買帥師伐曹襄十七楚公子午帥師伐鄭襄十八衛孫林父帥師伐齊襄十九齊崔杼帥師伐莒襄二十四鄭公孫夏帥師伐陳襄二十五楚薳罷帥師伐吳昭十九衛公孟彄帥師伐曹定十二定十三鄭罕達帥師伐宋定十五宋樂髠帥師伐曹哀三晉趙鞅帥師伐衛哀五宋向巢帥師伐曹哀六楚公子結帥師伐陳哀十宋向巢帥師伐鄭哀十二楚公子申帥師伐陳哀十三齊師曹師伐厲僖十五秦師伐晉宣二晉師白狄伐秦宣八楚師伐陳同上宋師伐滕宣十宋師伐陳宣十二齊師伐莒宣十三鄭師伐宋襄二晉師伐秦襄十鄭人伐衛隠二莒人伐杞隠四邾人鄭人伐宋隠五宋人伐鄭隠五哀十宋人蔡人衛人伐戴隠十齊人陳人曹人伐宋莊十四宋人齊人邾人伐郳莊十五宋人齊人衛人伐鄭莊十六楚人伐鄭僖元僖三文九宣五齊人伐鄭僖七楚人伐黄僖十一楚人伐徐僖十五宋人伐曹同上齊人徐人伐英氏僖十七邢人狄人伐衛僖十八衛人伐邢僖十九楚人伐隨僖二十楚人伐陳僖二十三哀九衛人伐齊僖二十六楚人伐宋同上晉人陳人鄭人伐許僖三十三衛人伐晉文元晉人宋人陳人鄭人伐秦文二秦人伐晉文二宣十五襄十一晉人衛人陳人鄭人伐宋文十七晉人宋人伐鄭宣元晉人宋人衛人曹人伐鄭宣十秦人白狄伐晉成九宋人伐陳襄十七楚人伐吳定二以上外伐者百一十君伐三十四臣伐三十師伐九人伐三十七齊侯伐我西鄙文十七齊侯伐我北鄙成二襄十五十六再十七齊髙厚帥師伐我北鄙襄十七齊崔杼帥師伐我北鄙襄二十五齊國夏帥師伐我西鄙定七定八齊國書帥師伐我哀十一齊師伐我北鄙襄十八齊人宋人陳人伐我西鄙莊十九齊人伐我北鄙僖二十六邾人伐我南鄙文十四襄十五襄十七莒人伐我東鄙襄八襄十襄十二吳伐我哀八以上伐我者二十一君伐六臣伐五師伐一人伐八國伐一荆伐鄭莊十六莊二十八徐伐莒文七吳伐郯成七吳伐越昭三十二吳伐陳哀六狄伐邢莊三十二狄伐晉僖八狄伐鄭僖二十四秦缺伐晉文十鄭缺伐許成三晉缺伐鮮虞昭十二以上國伐者八秦鄭晉各一附見秦下鄭下晉下文缺或是伯字侯字或是師字或是人字疑以傳疑非可臆補今且列國伐例中公伐戎莊二十六齊人伐戎莊二十齊人伐山戎莊三十齊侯許男伐北戎僖十楚子伐陸渾之戎宣二晉郤克衛孫良夫伐廧咎如成三晉缺伐鮮虞昭十二晉荀吳帥師伐鮮虞昭十五晉士鞅衛孔圉帥師伐鮮虞定四晉趙鞅帥師伐鮮虞哀六以上伐戎狄者十君伐三人伐二臣伐四誤稱國伐一公以楚師伐齊僖二十六宋人以齊人蔡人衛人陳人伐鄭桓十四以上以伐者二又以戰一蔡侯以吳子及楚人戰見後戰例中宋公楚子陳侯蔡侯鄭伯許男曹伯㑹于盂執宋公以伐宋僖二十一齊人執衛行人北宫結以侵衛定七以上執伐者一執侵一附見後侵例中不重出公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯侵蔡遂伐楚僖四齊侯侵我西鄙遂伐曹文十五齊侯伐衛遂伐晉襄三十三楚子鄭人侵陳遂侵宋宣元晉士鞅帥師侵鄭遂侵衛以上遂伐者三遂侵二附見後侵例中不重出侵趙氏曰無名行師曰侵公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯侵蔡僖四公㑹劉子晉侯宋公蔡侯衛侯陳子鄭伯許男曹伯莒子頓子胡子滕子薛伯杞伯小邾子齊國夏于召陵侵楚定四公孫兹帥師㑹齊人宋人衛人鄭人許人曹人侵陳僖四以上會侵者三魯君㑹二魯臣會一公侵宋莊十公侵鄭定六公侵齊定八再仲孫蔑叔孫僑如帥師侵宋成六仲孫羯帥師侵齊襄二十四季孫斯仲孫何忌帥師侵衛定八以上内侵者七君侵四臣侵三晉侯侵曹僖二十八晉趙穿帥師侵崇宣元晉趙盾衛孫免侵陳宣六衛孫良夫帥師侵宋成六晉欒書帥師侵蔡成八衛侯之弟黒背帥師侵鄭成十鄭公子喜帥師侵宋成十六衛北宫括帥師侵鄭成十七楚公子壬夫帥師侵宋襄元鄭公孫舍之帥師侵宋襄十一楚公子貞帥師侵宋襄十二晉士匄帥師侵齊襄十九宋皇瑗帥師侵鄭哀七晉趙鞅帥師侵齊哀十晉魏曼多帥師侵衛哀十三楚師鄭師侵衛成二晉師宋師衛甯殖侵鄭襄二鄭人侵宋莊十五鄭人侵許莊二十九楚人侵鄭僖二定二介人侵蕭僖二十晉人宋人衛人陳人侵鄭宣二楚人鄭人侵宋成十八鄭人侵蔡襄八以上外侵者二十五君侵一臣侵師侵十六人侵八又楚鄭侵陳遂侵宋晉侵鄭遂侵衛齊執衛行人以侵衛凡三只附見義伐例中今不重出齊侯侵我西鄙定十五齊人侵我西鄙僖二十六文十五莒人侵我東鄙襄十四狄侵我西鄙文七以上侵我者五君侵一人侵三狄侵一戎侵曹莊二十四狄侵衛僖十三僖二十一文十三狄侵鄭僖十四狄侵齊僖三十僖三十三文四文九文十二狄侵宋文十赤狄侵齊宣三宣四衛人侵狄僖三十一以上戎狄侵者十三侵狄一附見齊侯襲莒襄三十三以上襲者一附于侵例之末杜氏曰掩其不備曰襲戰公㑹紀侯鄭伯及齊侯宋公衛侯燕人戰齊師宋師衛師燕師敗績桓十三晉侯及楚子鄭伯戰于鄢陵楚子鄭師敗績成十六宋公及楚人戰于泓宋師敗績僖二十二晉侯齊師宋師秦師及楚人戰于城濮楚師敗績僖二十八晉侯及秦師戰于彭衙秦師敗績文二蔡侯以吳子及楚人戰于柏舉楚師敗績定四晉荀林父帥師及楚子戰于邲晉師敗績宣十二季孫行父臧孫許叔孫僑如公孫嬰齊帥師㑹晉郤克衛孫良夫曹公子首及齊侯戰于鞌齊師敗績成二宋華元帥師及鄭公子歸生帥師戰于大棘宋師敗績宣二晉趙鞅帥師及鄭罕達帥師戰于鐵鄭師敗績哀二衛孫良夫帥師及齊師戰于新築衛師敗績成二齊國書帥師及吳戰于艾陵齊師敗績哀十一衛人及齊人戰衛人敗績莊二十八宋師及齊師戰于甗齊師敗績僖十八及齊師戰于乾時我師敗績莊九王師敗績于茅戎成元以上戰而敗績者十五外敗績十四内敗績一王師敗績一附見趙氏曰凡外師敵者曰戰戰而書及以主及客也以華及夷也啖氏曰王師不言戰無敵也敗則但書敗而已人臣無敵君之義也晉侯及秦伯戰于韓僖十五晉人及秦人戰于令狐文七晉人秦人戰于河曲文十二楚人及吳戰于長岸昭十七齊侯衛侯鄭伯來戰于郎桓十及鄭師伐宋戰于宋桓十二及齊師戰于奚桓十七及邾人戰于升陘僖二十二以上戰不言敗者八外戰四内戰四啖氏曰外戰有不言勝敗者勝敗等也趙氏曰戰不言及交為主也敗公敗宋師于菅隠十公敗宋師于乗丘莊十公敗齊師于長勺同上公敗宋師于鄑莊十一公敗邾師于偃僖元公子友帥師敗莒師于酈同上叔弓帥師敗莒師于蚡泉昭五叔孫得臣敗狄于鹹文十一以上内敗者八魯君所敗五魯臣所敗三啖氏曰凡魯勝曰敗某師晉人及姜戎敗秦師于殽僖三十三荆敗蔡師于莘莊十吳敗頓胡沈蔡陳許之師于雞父昭二十三於越敗吳于檇李定十四楚人敗徐于婁林僖十五晉人敗狄于箕僖三十三晉人敗狄于交剛成十二晉荀吳帥師敗狄于大鹵昭无以上外敗者八敗諸國五敗狄三趙氏曰凡外師撓敗之曰敗某師鄭伯克段于鄢隠元以上克者一附于敗例之末啖氏曰克者君戡臣之稱雖君能敗臣之師亦不言敗不許臣有師徒以敵君也但曰克言能破之而已追公追戎于濟西莊十八公追齊師至酅弗及僖二十六以上追者二啖氏曰追者冦已去而躡之也救王人子突救衛莊六以上王救者一啖氏曰救者救其患難皆為美也諸侯遂救許僖六公㑹晉侯齊侯宋公衛侯曹伯莒子邾子把伯救鄭成七公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯齊世子光救陳襄五公㑹齊人宋人救鄭莊二十八公子遂㑹晉人宋人衛人許人救鄭文元公孫敖帥師及諸侯之大夫救徐僖十五以上㑹救及救者六君㑹四臣㑹臣及各一晉陽處父帥師伐楚以救江文二晉趙盾帥師救陳宣元晉郤缺帥師救鄭宣九晉欒書帥師救鄭成六楚公子貞帥師救鄭襄十鄭駟𢎞帥師救曹哀七齊師宋師曹師次于聶北救邢僖元齊人救邢閔元楚人救衛僖二十八衛人救陳宣十二吳救陳哀十狄救齊僖十八以上外救者十二臣救六師救一人救三國救二師救齊僖十八叔孫豹帥師救晉襄二十三季孫宿帥師救台襄十二公救成襄十五以上内救者四救國二自救内邑二次公㑹伐楚次于陘僖四公㑹盟于牡丘遂次于匡僖十五仲孫蔑㑹齊曹邾杞次于鄫襄元以上㑹次者三君㑹二臣會一趙氏曰凡師駐曰次公次于滑莊三師次于郎莊八師次于成莊三十叔孫豹救晉次于雍榆襄二十三公孫于齊次于陽州昭二十五公如晉次于乾侯昭二十八昭二十九以上内次者四魯君出奔次于外者三附見楚子蔡侯次于厥貉文十齊侯衛侯次于五氏定九齊侯衛侯次于垂葭定十五齊侯衛侯次于渠蒢定十五齊師宋師次于郎莊十齊師宋師曹師次于聶北僖元以上外次者六君次四師次二戍公子買戌衛僖二十八戍陳襄五戍鄭虎牢襄十齊人殱于遂莊十七以上戍者三啖氏曰戍者以兵守之也殱者一附見圍諸侯遂圍許遂㑹諸侯圍許僖二十八公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子同圍齊襄十八師及齊師圍郕莊八楚人陳侯蔡侯鄭伯許男圍宋僖二十七楚子圍鄭宣十二楚子圍宋宣十四楚子陳侯隨侯許男圍蔡成元楚公子貞帥師圍陳襄七楚公子棄疾帥師圍蔡昭十一晉趙鞅帥師圍衛定十晉趙鞅帥師圍鮮虞定五宋師圍曹宣三楚人圍許僖六宋人圍曹僖十九哀七楚人圍陳僖二十五晉人秦人圍鄭僖三十楚人圍江文三楚人圍巢文十二宋人圍滕宣九鄭人圍許成九陳人圍頓襄四楚人圍蔡定四狄圍衛僖三十一叔孫州仇仲孫何忌帥師圍邾哀三以上圍國者二十五㑹圍二及圍一外圍二十一内圍一啖氏曰以兵圍其國都曰圍公㑹齊侯宋公陳侯衛侯曹伯伐鄭圍新城僖六仲孫蔑㑹晉欒黶宋華元衛甯殖曹人莒人邾人滕人薛人圍宋彭城襄元齊侯伐宋圍緡僖二十齊國夏衛石曼姑帥師圍戚哀三宋人伐鄭圍長葛隠五楚人伐宋圍緡僖二十六晉人圍郊昭二十三莒人伐我東鄙圍台襄十二齊人伐我北鄙圍成襄十四襄十六齊侯伐我北鄙圍桃襄十七齊髙厚帥師伐我北鄙圍防同上公圍成昭二十八定十一叔孫僑如帥師圍棘成三叔弓帥師圍費昭十三季孫斯仲孫何忌帥師圍鄆定六叔孫州仇仲孫何忌帥師圍郈定十叔孫州仇仲孫何忌帥師圍費同上以上圍邑者十九㑹圍二外圍他邑四外圍我邑四内自圍我邑七趙氏曰凡内自圍者皆叛邑取取根牟宣九取鄟成六取邿襄十三取鄆昭元取鄫昭四取闞昭三十二取濟西田僖三十一取汶陽田成二取邾田自漷水襄十九公敗宋師于管取郜取防防十公以楚師伐齊取穀僖二十六公伐邾取須句僖二十二文七公伐邾取訾婁僖三十三公伐莒取向宣四公孫歸父帥師伐邾取繹宣十季孫斯叔孫州仇仲孫何忌伐邾取漷東田及沂西田哀二以上内取者十七取國六取邑七取田四趙氏曰凡内取之邑不繫國者本是魯邑魯為外國所奪今取之也莒人伐把取牟婁隠四宋人取長葛隠六徐人取舒僖三齊侯取鄆昭二十五齊人取濟西田宣元齊人取讙及闡哀八宋人蔡人衛人伐戴鄭伯伐取之隠十宋皇瑗帥師取鄭師于雍丘哀九衛罕達帥師取宋師于嵒哀十三以上外取者六取國一取邑三取田二取師三附見趙氏曰凡力得之曰取不是其専奪也或以師威偪或招收而得皆為力得陸氏曰取師義亦同取者悉俘虜之故不言敗入趙氏曰公羊謂入者得而不居澄按亦有滅國而但書入者盖猶不絶其祀罪輕於滅也入杞桓二入邾哀七無駭帥師入極隠二公子遂帥師入杞僖二十七季孫宿帥師救台遂入鄆襄十二以上内入者五入國四入邑一公及齊侯鄭伯入許隠十一以上及入者一主兵者齊主謀者鄭而公與其役故書公及若出於公之意然晉侯入曹僖二十八楚子入陳宣十一宋公入曹哀八齊侯遂伐曹入其郛文十五晉郤缺帥師伐蔡入蔡同上鄭公孫舍之帥師入陳襄二十五衛師入郕隠五莒人入向隠二宋人衛人入鄭隠十齊人鄭人入郕同上鄭人入滑僖二十二秦人入滑僖三十三秦人入鄀文五楚人入鄆成九邾人入鄅昭十八荆入蔡莊十四吳入州來成七吳入楚定四於越入吳定五哀十三狄入衛閔二以上外入者二十一入國二十入邑一君入四臣入二師入一人入八國入六滅趙氏曰覆邦絶祀曰滅滅項僖十七以上内滅者一不出主名者非重將重師也遂滅偪陽襄十遂滅賴昭四以上遂滅者二晉滅一楚滅一衛侯燬滅邢僖二十五楚子滅蕭宣十二齊侯滅萊襄六楚子滅胡定十四楚屈建帥師滅舒鳩襄二十五晉荀吳帥師滅陸渾之戎昭十七蔡公孫姓帥師滅沈定四鄭游速帥師滅許定六楚公子結陳公孫佗人帥師滅頓定十四齊師滅譚莊十虞師晉師滅下陽僖二晉師滅赤狄潞氏宣十五楚師滅陳昭八楚師滅蔡昭十一齊人滅遂莊十三楚人滅弦僖五楚人滅黄僖十二楚人滅夔僖二十六楚人滅江文四楚人滅六文五楚人秦人巴人滅庸文十六楚人滅舒蓼宣八晉人滅赤狄甲氏及留吁宣十六楚人滅舒庸成十七莒人滅鄫襄六吳滅州來昭十三吳滅巢昭二十四吳滅徐昭三十狄滅温僖十以上外滅者二十九君滅四臣滅五師滅五人滅十一國滅四降郕降于齊師莊八齊人降鄣莊三十以上降者二啖氏曰服從内附曰降不言滅不絶祀也遷齊師遷紀郱鄑郚莊九宋人遷宿莊十齊人遷陽閔二邢遷于夷儀僖元衛遷于帝丘僖三十一許遷于葉成十五許遷于夷昭元許遷于白羽昭十八許遷于容成定四蔡遷于州來哀二以上遷者三自遷七附見啖氏曰遷者移其國於國中而為附庸也趙氏曰徒而臣之曰遷某唯齊遷紀三邑與諸遷國不同潰亡蔡潰僖四沈潰文三莒潰成九鄆潰昭十九梁亡僖十九以上潰者四潰者其衆奔逃分散四出也亡者一附見獲滅晉秦戰于韓獲晉侯僖十五宋鄭戰于大棘獲宋華元宣二齊吳戰于艾陵獲齊國書哀十一鄭侵蔡獲蔡公子燮襄八公子友敗莒師獲莒挐僖元吳敗頓胡沈蔡陳許之師胡子髠沈子逞滅獲陳夏齧昭二十三以上獲者六獲君一獲臣五君滅附啖氏曰君戰而死曰滅言與國滅同也生擒曰獲大夫死生皆曰獲以歸以來荆敗蔡以蔡侯獻舞歸莊十楚滅夔以夔子歸僖二十六晉滅赤狄潞氏以潞子嬰兒歸宣十五鄭滅許以許男斯歸定六楚陳滅頓以頓子牂歸定十四楚滅胡以胡子豹歸定十五蔡滅沈以沈子嘉歸殺之定四楚滅蔡執蔡世子有以歸用之昭十一宋入曹以曹伯陽歸哀八公伐邾入邾以邾子益來哀七戎伐凡伯于楚丘以歸隠七以上以歸者十敗其師而以君歸一滅其國而以君歸六執其世子以歸一入其國而以君歸二以歸魯者曰來以之歸者師敗國滅自欲免死而甘心隨之唯蔡世子有書執者與楚鬬敵不勝而遭擒獲也伐王臣而以歸者一附見又執以歸者二見前人紀篇執例下師師者兵衆之稱按周官之制二千五百人為師一分其師而益其四則為一萬二千五百人之軍五分其師而損其四則為五百人之旅五旅為師五師為軍軍師旅三名師在其中故舉中以該上下而總名其軍旅之衆曰師所謂師者非以周官之三千五百人而言也師及齊師圍郕莊八師救齊僖十八師次于郎莊八師次于成莊三十師還莊八我師敗績莊九以上内師凡内師一命之人為將師少則伐國滅國不出主名者是師衆則稱帥師及齊師圍郕師救齊者是衛師隠五桓十三成二宋師隠十桓十三莊十再莊十一僖元再僖十八僖二十三僖二十八宣二宣三宣十宣十二襄二襄十三鄭師桓十二成二成十六襄二哀九齊師桓十三桓十七莊元莊三莊五莊八莊九莊十三再僖元再僖十五僖十八再僖二十六僖二十八宣十三成二再襄十八哀十一燕師桓十三燕師莊十曹師僖元再僖十五邾師僖元莒師同上虞師僖二晉師僖二宣元宣十二宣十五襄二定八楚師僖二十六宣八成二昭八昭十一定四秦師僖二十八文二再宣二鄭棄其師閔二吳敗頓胡沈蔡陳許之師昭一十三以上外師凡外師將卑師少則但稱某人將卑師衆則稱某師然亦有君自將或三命再命之大夫將而稱某師者盖汎指君大夫所將之衆而言又與將卑師衆而稱某師者異無駭帥師隠二翬帥師隠四隠十公子慶父帥師莊二公子友帥師僖元公孫兹帥師僖四公孫敖帥師僖十五公子遂帥師僖二十七僖三十三公孫歸父帥師宣十季孫行父帥師成二臧孫許帥師同上叔孫僑如帥師成二成三成六公孫嬰齊帥師成二仲孫蔑帥師成六季孫宿帥師襄十二襄十五叔孫豹帥師襄十五襄二十三仲孫速帥師襄二十仲孫羯帥師襄二十四叔弓帥師昭元昭五昭十昭十三季孫意如帥師昭十仲孫貜帥師同上季孫斯帥師定六定八定十二哀二哀三仲孫何忌帥師定六定八定十一再定十二哀元哀二哀三哀六叔孫州仇帥師定十再哀二哀三再以上内帥師二十三人凡三命再命之大夫將而師衆則稱某帥師若師少則但稱某而不曰帥師也魯隠公之時猶以再命之大夫帥師莊公以後經所書帥師者皆三命之大夫矣晉郤缺帥師文十五宣九趙盾帥師宣元趙穿帥師同上荀林父帥師宣九宣十二欒書帥師成六成八成九韓厥帥師襄元荀罃帥師襄三士匄帥師襄十九荀吳帥師昭元昭十五昭十七士鞅帥師定四定五定八趙鞅帥師定十哀二再哀四哀六哀十魏曼多帥師哀七哀十三宋華元帥師定二樂髠帥師哀三向巢帥師哀六皇瑗帥師哀七哀九鄭公子歸生帥師宣二公子喜帥師成十四成十一公孫輒帥師襄十公孫舍之帥師襄十一襄二十五公孫夏帥師襄二十五游速帥師定六罕達帥師定十五哀二哀十三駟𢎞帥師哀七衛孫良夫帥師成二成六衛侯之弟黒背帥師成十北宫括帥師成十七石買帥師襄十七孫林父帥師襄十九孔圉帥師定四公孟彄帥師定十二定十三石曼姑帥師哀三楚公子嬰齊帥師成六成七成九襄三公子壬夫帥師襄元公子貞帥師襄七襄八襄十再襄十二襄十四公子午帥師襄十八屈建帥師襄二十五薳罷帥師昭十公子棄疾帥師昭十一公子結帥師定十四哀十公子申帥師哀十三齊髙厚帥師襄十七崔杼帥師襄二十四襄二十五髙偃帥師昭十二髙發帥師昭十九國夏帥師定七定八哀三國書帥師哀十一再陳公孫佗人帥師定十四以上外帥師四十八人晉十二宋四鄭八衛八楚九齊六陳一計所書大夫帥師者凡七國皆三命之大夫也唯衛侯之弟黒背非三命然以國君之弟其屬之貴與三命大夫同故特書曰衛侯之弟公子遂如楚乞師僖二十六晉侯使郤錡來乞師成十三晉侯使欒黶來乞師成十六晉侯使荀罃來乞師成十七晉侯使士魴來乞師成十八以上内外乞師者五内一外四凡鄰國自有以師相救援之禮魯欲藉彊楚之力以報齊卑屈其辭以求之故曰乞其後晉厲公以霸主徵師於諸侯而亦遣其臣乞師非禮也晉悼公初立尚仍其非遄改之矣如師一見前賔禮篇如例下來盟于師一見前盟例下卒于師二見後凶禮篇卒例下軍制作三軍襄十七舍中軍昭五周制萬二千五百人為一軍大國三軍次國二軍小國一軍用衆之法無過家一人凡一成之地六十四井出賦公田外有五百一十二夫是為一旅之衆二十五成有二十五旅是為一軍之衆大國之地百成除二十五成為大夫采邑等用其七十五成之衆即三軍也魯地方百里其初封之時有三軍後舍其一軍止有二軍作三軍者復舊制也然其時三家専國非有意於復舊但借改作之名而分公室之民為私家之民爾分民既定則復舍中軍矣晉軍制附見莊十晉武公三十八年王使虢公六命曲沃伯以一軍為晉侯閔二晉獻公十六年晉侯作二軍公將上軍太子申生將下軍僖二晉文公三年蒐十七于被廬作三軍中軍帥佐溱上軍帥佐偃下軍帥佐軫郤榖郤狐毛狐欒枝先僖二十八先軫胥臣作三行以禦狄晉有三軍又作三行是僭天子六軍矣中行帥荀林父右行帥屠擊左行帥先蔑三行不見其佐僖三十一蒐于清原作四軍以禦狄晉自知三軍三行之僭故罷三行而更新上軍新下軍共為四軍中軍先軫郤溱上軍狐毛狐偃下軍欒枝胥臣新上軍新軍將佐下軍四人餘不見趙衰將當有文二晉襄公三年先且居趙衰文六狐射姑趙盾趙盾狐射姑蒐于夷舍二軍文七晉靈公元年趙盾先克箕鄭父荀林父先蔑先都文十二趙盾荀林父郤缺㬰駢欒盾胥甲父宣元胥克宣八晉成公六年郤缺士會宣十晉景公三年二荀林父先榖士㑹郤克趙朔欒書宣三十士㑹郤克荀首宣十士㑹六郤克荀首荀庚宣十郤克七荀首荀庚成二郤克荀首荀庚士燮欒書成三中軍郤克荀佐首上軍荀庚士佐燮下軍欒書趙佐同晉舊有三軍今新中軍趙佐韓厥括新上軍韓佐鞏朔穿新下軍旃佐為増三軍荀騅趙六軍成四欒書荀首欒書荀首荀庚士燮郤錡趙同新厥韓趙括鞏朔韓穿荀騅趙旃成十三晉厲公三年欒書荀庚士燮郤錡韓厥荀罃新中軍郤至趙朔成十六欒書士燮郤錡荀偃韓厥荀罃新中軍郤佐郤犫至新上軍罷新下軍罷成十韓厥知罃范匄荀偃韓起魏相新魴士魏頡襄元晉悼公元年韓厥知罃范匄荀偃韓起士魴新頡魏趙武襄三韓厥知罃范匄荀偃韓起士魴新武趙魏絳襄七知罃范匄荀偃韓起欒黶士魴新武趙魏絳荀偃范匄趙武韓起欒黶魏絳新軍無帥晉侯使其羣吏率卒乗官屬以從於下軍佐襄十中軍四荀偃范佐匄上軍趙武韓佐起下軍欒黶魏佐絳舍新軍襄十晉平公三年八荀偃范匄趙武韓起魏絳欒盈襄二士匄十趙武韓起魏絳襄二十四程鄭襄二趙武十五韓起魏絳昭二韓起趙成中行吳魏舒范鞅知盈昭九荀躒昭二晉頃公十二年十八魏舒范鞅昭二十九中行寅霸者壞先王之軍制肇於齊而甚於晉然齊之改作務從簡便欲其功之易成而已其事非但不見於經而且不載於傳惟外傳齊語中及之故治春秋經者亦置而不論若晉則僭上威下彊大侈肆非止如齊管仲之所為故今摭其變亂軍制之大槩附于魯國軍制之末云軍賦初稅畆宣十五作丘甲成元用田賦哀十二原軍賦出於井田井田之法十取其一宣公稅畝自壊井田十一之法則賦民之財者非古矣成公作丘甲則賦民之力者非古矣至哀公用田賦而民財民力竭矣軍事大閲桓六治兵莊八公狩于郎桓四公及齊人狩于糕莊四西狩獲麟哀十四蒐于紅昭八大蒐于北蒲昭十一定十三定十四大蒐于昌間昭二十二焚咸丘桓七公觀魚于棠隠五先王之時兵弭而不用然不忘武備每嵗四時之田春蒐夏苗秋獮冬狩皆於農隙教民以習武事故春蒐而教以振旅夏苗而教以茇舍秋獮而教以治兵冬狩而教以大閲魯桓大閲魯莊治兵則僭用天子教民習軍事之禮至若蒐狩諸侯雖得為之然大蒐亦僭也狩郎焚咸丘於時固可而郎咸丘皆非狩地狩榚則忘父讎而越境以狩故皆譏觀魚者為游觀之樂非教習軍事也附見田狩之後以著其非力役齊師宋師曹師城邢僖元以上外役者一城邢之役齊宋曹三國之師城之也魯無與焉故曰外役諸侯城縁陵僖十四㑹于戚遂城虎牢襄二仲孫羯㑹晉荀盈齊髙止宋華定衛世叔儀鄭公孫段曹人莒人滕人薛人小邾人城把襄二十九仲孫何忌㑹晉韓不信齊髙張宋仲幾衛世叔申鄭國㕘曹人莒人薛人把人小邾人城成周昭三十二以上㑹役者四縁陵之城㑹鹹之諸侯也鹹之㑹魯君㑹七國之君也虎牢之城因㑹戚而遂城之也戚之㑹魯臣㑹九國之臣也把之城成周之城則皆魯臣㑹十國之臣故曰㑹役城中丘隠七城郎隠九城沈丘桓五城向桓六城諸及防莊二十九城小穀莊三十二城楚丘僖二城郚文七城諸及鄆文十二城平陽宣八城鄆成四城中城成九定六城費襄七城防襄十三城成郛襄十五城西郛襄十九哀四城武城襄十九城莒父及霄定十四城漆定十五城啟陽哀三城毗哀五城邾瑕哀六築郿莊二十八築臺于郎莊三十一築臺于薛同上築臺于秦同上築鹿囿成十八築郎囿昭九築蛇淵囿定十二築王姬之館莊元浚洙莊九墮郈定十二墮費同上新延廐莊二十九新作南門僖二十新作雉門及兩觀定二毁泉臺文十六以上内役者二十九城二十四築八浚一墮二新一新作二毁一皆魯自用其民力也故曰内役凡君之資於民者資其力也民之報於君者報其力也故無事則資其力而用之於農以足食生財有事則資其力而用之於兵以敵愾禦侮非農非兵而勞民之力必以其時以其禮而不敢妄興不得已而役之亦必節其力而不盡也春秋凡力役之事必書重民力也春秋纂言總例卷五
