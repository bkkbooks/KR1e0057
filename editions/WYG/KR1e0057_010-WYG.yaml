body:
  text: 春秋纂言卷三元吳澄撰莊公名同桓公之子母文姜夫人哀姜在位三十二年元年戊子莊王四年蔡哀二年曹莊九年衛惠七年黔牟三年晉緡十二年鄭厲八年子儀元年陳莊七年卒杞靖十一年宋莊十七年齊襄五年秦武三年楚武四十八春王正月穀梁傳曰繼弑君不即位先君不以其道終則子不忍即位也澄曰以先君之不得正終故不忍行即位之禮三月夫人孫于齊孫去聲公羊傳曰不稱姜氏與弑公也或曰䝉前年夫人姜氏遂如齊之文依前目後凡之例故不稱姜氏以見今日孫于齊之夫人即前年遂如齊之夫人也或曰文闕也杜氏曰夫人莊公母也魯人責之故出奔内諱奔謂之孫猶孫讓而去澄曰夫人在齊蓋隨桓公之䘮歸魯矣魯人以桓公之弑實由夫人衆怒羣誚夫人内慙不安故出奔齊因以遂其姦也夏單伯逆王姬單音善後並同逆左作送公羊傳曰天子嫁女於諸侯必使諸侯同姓者主之諸侯嫁女於大夫必使大夫同姓者主之澄曰王將嫁女於齊以尊卑不敵不自主昏而命魯主之故魯遣單伯徃逆王姬於周俾先至於魯而後徃歸於齊也單氏伯字魯四命之卿天子所命者張氏曰常事不書而此特書之斬衰而主昏固已非禮况齊乃不可同天之讎奈何為之主昏秋築王姬之館于外穀梁傳曰衰麻非所以接弁冕也仇讎非所以接昏姻也髙郵孫氏曰桓公見殺於齊仇讎未復天王遽使魯主王姬之昏莊公當辭期於得請而後已是時非無同姓之諸侯蓋莊公未知辭爾辭之不固與不辭同知主昏之非政築王姬之館於外孰與辭之不築也澄曰魯為王姬主昏非自今日始王姬所舘固有嘗處矣盖館於廟也時公在諒闇慮齊侯親迎若就以嘉服接見於廟則於心有所不安然又不敢辭主昏之事故特築館于外以為王姬之舍而侯齊侯之逆因其變常而書之以譏也冬十月乙亥陳侯林卒林莊公也在位八年其弟杵臼立是為宣公按莊公與桓王同時王名林公亦名林君臣同名也王使榮叔來錫桓公命曰不書天者脫榮叔夫榮氏叔字澄曰稱氏稱字者天子四命之大夫錫賜也蘇氏曰錫命者命之以策也衛襄公之殁王使成簡公追命之髙氏曰禮諸侯嗣位三年䘮畢以士服朝天子天子錫之黼冕圭璧然後歸以臨其民謂之受命桓簒弑未嘗入朝受命王命魯主昏故追錫桓公以寵之張氏曰莊公主王姬之昏故王寵嘉其父桓公已終而遣使賜之策命若昭七年王使成簡公追命衛侯之比也桓弑隠在王法有賊殺其親之罪乃司馬九伐之所宜加王不能討又示褒嘉啖氏以為寵篡弑以瀆三綱得春秋之旨矣王姬歸于齊張氏曰王姬來而不書至别於魯之夫人也澄曰書歸于齊魯既主昏則同乎内女也趙氏曰凡外女歸皆以非常乃書齊師遷紀郱鄑郚郱音平鄑音兹郚音吾杜氏曰郱在東莞臨朐縣東南北海都昌縣西有訾城郚在朱虚縣東南齊欲滅紀故徙其郡邑之民而取其地常山劉氏曰遷者廹逐之也沙隨陳氏曰土地人民盡有之曰取逐其人有其地曰遷張氏曰迫遷三邑之民不服者取其地實以齊之民胡氏曰遷不言師其以師遷之者見紀民猶足與守而齊人彊暴用大衆以迫之也經書月三書日一大衍歴正月癸亥大壬辰冬至閏月癸巳小二月壬戌大旦日大寒三月壬辰小四月辛酉大五月辛卯小六月庚申大七月庚寅大八月庚申小九月己丑大十月己未小乙亥十七日十一月戊子大十二月戊午小長歴是年閏十月二年己丑莊王五年蔡哀三曹莊十衛惠八黔牟四晉緡十三鄭厲九子儀二陳宣公杵臼元年杞靖十二宋莊十八卒齊襄六秦武六楚武四十九年春王二月𦵏陳莊公夏公子慶父帥師伐於餘丘公子氏慶父名魯三命之卿於發語辭餘丘小國之近戎者其曰於餘丘猶曰於越蓋夷俗所稱杜氏曰莊公時年十五則慶父莊公庶兄於餘丘國名沙隨程氏曰書伐國也二傳以為邾邑盖邾附庸啖氏曰按前後未有邑言伐者故仍依左氏舊説為國秋七月齊王姬卒公羊傳曰外夫人不卒此何以卒我主之也穀梁傳曰為之主者卒之也范氏曰主其嫁則有兄弟之恩死則服之故書卒禮記曰齊告王姬之䘮魯莊公為之大功薛氏曰檀弓謂由魯嫁故為之服則主昏之為服自莊公始也其以説齊乎沙隨程氏曰禮於舅之妻無服外祖父母纔小功爾今以世讎而厚其䘮非禮也不然外夫人卒不書冬十有二月夫人姜氏㑹齊侯于禚禚音灼公作郜左傳曰齊姦也杜氏曰姜前與公如後出奔至此始㑹㑹非夫人之事比年書㑹其義皆同禚齊地澄曰元年正月夫人既奔齊矣其後復歸魯而今年冬又自魯徃㑹也趙氏曰著姜氏齊矦之惡亦以病公也曰子可以制母乎夫死從子通乎其下况國君乎君者人神之主風化之本也不能正家如正國何若莊公哀痛以思父誠敬以事母威刑以督下車馬僕御莫不從命夫人徒徃乎夫人之徃也則公威命之不行哀敬之不至爾乙酉宋公馮卒馮莊公也在位十八年子捷嗣是為閔公髙氏曰考觀宋莊忮求敗類則穆公之不以其國與子有以知之矣經書月三書日一大衍歴正月丁亥大丁酉冬至二月丁巳小三月丙戌大四月丙辰小五月乙酉大六月乙卯小七月甲申大八月甲寅小九月癸未大十月癸丑大十一月癸未小十二月壬子大月内無乙酉長歴乙酉十二月四日三年庚寅莊王六年蔡哀四曹莊十一衛惠九黔牟五晉緡十四鄭厲十子儀三陳宣二杞靖十三宋閔公捷元年齊襄七秦武七楚武五十春王正月溺㑹齊師伐衛溺魯大夫再命者孫氏曰朔在齊故溺㑹齊伐衛謀納朔也髙氏曰衛朔奔齊齊欲納之然天王已絶朔而立公子黔牟為衞矦魯輙興兵㑹仇讎之人抗天子之命納不義之君其罪大矣夏四月𦵏宋莊公五月𦵏桓王左傳曰緩也公羊傳穀梁傳曰改𦵏杜氏曰以桓十五年三月崩七年乃葬髙氏曰平王之崩求賻於諸侯然後克葬至於桓崩七年乃克葬者蓋承諸侯背叛王師傷敗之後力益不足矣夫以天下而葬一人安可緩也聖人書之以著天下臣子之罪若曰改𦵏則聖人明書之矣薛氏曰王升遐七年然後克𦵏閔王室也沙隨程氏曰周人東遷之初尚有志於歸𦵏已而侵削益甚故於此始葬秋紀季以酅入于齊酅戸圭切穀梁傳曰酅紀之邑也入于齊者以酅事齊也公羊傳曰請後五廟以存姑姊妹左傳曰紀於是乎始判杜氏曰酅在齊國東安平縣澄曰紀侯無子其弟為君之貳而别居於酅前年齊取紀三邑紀之土地無幾矣季知紀之亡在旦夕故先以其所居邑入于齊為附庸之國而存先祀也陸氏曰紀季以君之邑入於它國不書曰叛其有兄之命矣沙隨程氏曰紀侯迫於彊齊之暴自度不能支命其弟以酅下齊將委國而去之不勦民以鬬暴遜賢弟以存祀其與力屈而請降國滅而出奔者有間矣冬公次于滑滑公穀作郎左傳曰一宿為舍再宿為信過信為次次于滑將㑹鄭謀紀也鄭辭以難穀梁傳曰次止也有畏也欲救紀而不能也胡氏曰伐而書次以次為善救而書次以次為譏次於滑譏也澄曰紀將亡矣以昏姻之故告急於魯魯荘不能自已故出次於滑將㑹鄭伯為紀謀而祈哀乞憐於齊鄭伯知齊之滅紀不可止也故辭而不㑹杜氏曰滑鄭地在陳留襄邑縣西北經書月三書日無大衍歴正月壬午小癸卯冬至二月辛亥大三月辛巳小四月庚戌大五月庚辰小六月己酉大七月己卯小八月戊申大九月戊寅小丙午處暑閏月丁未大十月丁丑小旦日秋分十一月丙午大十二月丙子小四年辛卯莊王七年蔡哀五曹莊十二衛惠十黔牟六晉緡十五鄭厲十一子儀四陳宣三杞靖十四宋閔二齊襄八秦武八楚武五十一春王二月夫人姜氏饗齊侯于祝丘饗左作享穀梁傳曰饗甚矣澄曰何待至於饗而後為甚哉古者飲酒之禮有三饗食燕也燕禮最輕蓋主于飲酒而食物不盛食禮次之食物甚盛而不飲酒饗禮最重飲酒如燕禮之多食物如食禮之備雖君大夫亦無行饗食燕之禮于野者况婦人乎然此亦不足責也吕氏曰前此嘗㑹矣而未之享也今享矣又復如齊師矣人之為不善一縱之後如水方至莫知所極杜氏曰祝丘魯地三月紀伯姬卒穀梁傳曰外夫人不卒此其言卒何也吾女也適諸侯則尊同以吾為之變卒之也范氏曰禮諸侯絶旁朞姑姊妹女子嫁於國君者尊與已同則變不服之例為之服大功九月啖氏曰内女為諸侯之夫人則書卒以公為之服故也孫氏曰伯姫隱二年紀裂繻所迎者内女嫁國君則服大功常事也此卒者蓋為下紀侯去國齊𦵏紀伯姬起義夏齊侯陳侯鄭伯遇于垂襄陵許氏曰齊與陳鄭遇垂蓋謀取紀是以紀侯見難而去也蘇氏曰鄭伯鄭子儀也桓十五年五月書鄭伯突出奔蔡九月書鄭伯突入于櫟十八年齊襄公殺子亹鄭人立子儀莊十四年突使傅瑕弑子儀而入則遇于垂者子儀也然則鄭有二君矣春秋有一國而二君者鄭突與儀衛衎與剽是也突衎始終為君子儀之君鄭十有四年剽之君衛十有一年皆能君者也故春秋因其實而君之然則孰與曰皆不與也突之入也以篡衎之出也以惡儀剽雖國人之所立而突衎在焉非所以為安也故四人者春秋莫適與也皆不没其實而已胡氏曰蘇子由以鄭伯為子儀謂春秋有一國二君其説辨其理通善發春秋之意者然而鄭伯實厲公終始能君故不没其實非與之也惟不没其實故出奔蔡入于櫟㑹于垂皆書其爵惟非與之也故歸于鄭出奔蔡入于櫟皆書其名春秋於世子忽猶不書爵而况子儀之微者乎髙氏曰或以此鄭伯為子儀非也忽世子再出奔猶不得稱子其復歸猶不得稱爵子儀雖乗間得立其為君微矣豈敢輕去國都而與諸侯㑹乎故知此鄭伯即突也齊恐陳鄭救紀故求結二國歡心先過於垂使紀失其援也紀侯大去其國左傳曰紀侯不能下齊以與紀季去其國違齊難也程子曰大名也常山劉氏曰紀侯名大生名之著失地也去其國自去也澄曰諸侯失地名紀侯去其國而紀遂亡故名之紀之郱鄑郚為齊所取紀季又以酅入于齊紀之土地蓋僅有國外近郊之境而亦無人民可以自守齊又將以兵力取之故自去其國而齊遂有其地也言去其國而不言出奔某國者盖自逃於民伍而不復適他國或入山林或入河海也乙丑齊侯𦵏紀伯姬伯姬卒值紀侯去國不能自𦵏齊侯既取紀地遂𦵏其䘮書以閔之也啖氏曰凡内女之𦵏不書書者皆非常也胡氏曰齊襄迫逐紀侯使之去國雖其夫人在殯而不及葬陸氏曰𦵏者臣子之事非由隣國也齊侯并人之國而禮葬其妻是謂豺狼之行而為婦人之仁也秋七月冬公及齊人狩于禚禚公穀作郜於本國而非狩地且譏况越境而與鄰國之微臣狩于彼國之地乎此四年冬公及齊人所狩之地即二年冬姜氏與齊侯所㑹之地也莊公於是乎無羞惡之心矣經書月四書日一大衍歴正月乙巳大戊申冬至二月乙亥大三月乙巳小四月甲戌大五月甲辰小六月癸酉大七月癸卯小經六月乙丑在此月八月壬申大九月壬寅小十月辛未大十一月辛丑小十二月庚午大長歴是年閏四月乙丑六月三日五年壬辰莊王八年蔡哀六曹莊十三衛惠十一黔牟七晉緡十六鄭厲十二子儀五陳宣四杞靖十五宋閔三齊襄九秦武九楚文王熊貲元年春王正月夏夫人姜氏如齊師時齊侯帥師出外而夫人徃與之㑹也不言地師行而不次也秋郳黎來來朝郳公作倪杜氏曰郳附庸國也東海昌慮縣東北有郳城黎來名澄曰附庸之君未爵例稱名其後齊桓圖霸以王命爵之為子改國號為邾經書曰小邾以别於邾也冬公㑹齊人宋人陳人蔡人伐衛左傳曰納惠公也澄曰齊宋陳蔡皆卿也以公在故降稱人三年春齊師㑹魯伐衛以納朔而未克納故今又㑹四國之兵以納之也經書月一書日無大衍歴正月庚子小癸丑冬至二月己巳大三月己亥小四月戊辰大五月戊戌小六月丁卯大七月丁酉小八月丙寅大九月丙申小十月乙丑大十一月乙未小十二月甲子大六年癸巳莊王九年蔡哀七曹莊十四衛惠十二黔牟八晉緡十七鄭厲十三子儀六陳宣五杞靖十六宋閔四齊襄十秦武十楚文二春王正月王人子突救衛王人王朝一命之下士子王之子突名也一命者稱人而不得稱名以王子之貴同於三命故稱屬稱未嘗去王今王子突子上無王字者䝉上文王子者文也蓋以官則卑而為王之人以屬則貴而為王之子故稱人而又稱名也五國伐衛納朔王命突救之欲存黔牟而拒朔也夏六月衛侯朔入于衛左傳曰衛侯入放公子黔牟于周放甯跪于秦殺左公子洩右公子職澄曰五國之兵破衛而朔得入也朔搆兄篡國天討所當加又得罪於王王當明正其罪布告諸侯乃不能然遂使齊與四國敢抗王命而納之王人之救不能明示天子之命自同於列國之兵爭以力為强弱卒不能救而五國竟破衛納朔王室之不競而威令不行於諸侯可悲也夫秋公至自伐衛莊之出十有九其至之者五譏也其不至者十有四常事不書張氏曰書至與至自唐意同王誅若行齊魯宋衛皆有當誅之罪故書至以危之螟冬齊人來歸衛俘俘公穀作寶左傳曰文姜請之也澄曰俘伐衛所俘獲之臣虜財物也五國共伐衛而齊主兵故四國所俘獲不敢有而悉以與齊文姜醜行自知魯人所不與故請於齊侯使以伐衛所俘獲之民物歸于魯以恱魯人也經書月二書日無大衍歴正月甲午大戊午冬至二月甲子小己丑大寒三月癸巳大四月癸亥小五月壬申大庚寅穀雨閏月壬戌小六月辛夘大辛卯小滿七月辛酉小八月庚寅大九月庚申大十月庚寅小十一月己未大十二月己丑小七年甲午莊王十年蔡哀八曹莊十五衛惠十三晉緡十八鄭厲十四子儀七陳宣六杞靖十七宋閔五齊襄十一秦武十一楚文三春夫人姜氏㑹齊侯于防左傳曰齊志也杜氏曰防魯地文姜數與齊侯㑹至齊地則姦發夫人至魯地則齊侯之志夏四月辛卯夜恒星不見夜中星隕如雨辛卯夜穀夜作昔見音現中如字又去聲隕音尹公作霣後凡隕字並同穀梁傳曰恒星經星也左傳曰不見夜明也啖氏曰星隕如雨謂奔流衆如雨之多李陵云謀臣如雨皆言多爾澄曰恒星謂有名之經星星謂無名之衆星夜無日光則暗而星見晝有日光則明而星不見恒星不見夜明如晝故也天星之恒見者不見則小星之無名者亦無也隕謂自天而隕没於半空而不至地如雨言衆多不可為數也小星之無名者隕則大星之常見者自若也秋大水無麥苗周之秋夏之五月麥熟而黍稷粱之苗將秀大水漂盡故麥與苖俱無也冬夫人姜氏㑹齊侯于穀胡氏曰防魯地也穀齊地也初㑹于禚次享于祝丘又次如齊師又一嵗而再㑹焉其為惡益逺矣明年無知弑諸兒其禍淫之明驗也杜氏曰穀濟北穀城縣張氏曰今屬鄆州東阿縣文姜元年以罪孫于齊後復宣滛自二年至今詳書於策敝笱載驅錄于齊風論其時世與衛之鶉之奔奔牆有茨諸篇皆一時之事魯衛先王之後婦行放逸同播其惡於萬民夫子曰魯衛之政兄弟也蓋不特周公康叔之盛而其世衰俗末政之陵夷亦相似也其後慶父亂魯齊幾取之與衛滅同時聖人以魯事詳於春秋而齊詩及魯事者不刪夫二南之風后妃不待閑而徳足以化天下後世閑有家之道廢而亡國敗家之禍同一軌轍詩春秋之旨蓋相為表裏也經書月一書日一大衍歴正月戊午大甲子冬至二月戊子小三月丁巳大四月丁亥小辛卯五日五月丙辰大六月丙戌小七月乙卯大八月乙酉小九月甲寅大十月甲申小十一月癸丑大十二月癸未小長歴是年閏四月八年乙未莊王十一年蔡哀九曹莊十六衛惠十四晉緡十九鄭厲十五子儀八陳宣七杞靖十八宋閔六齊襄十二弑秦武十二楚文四春王正月師次于郎以俟陳人蔡人師次之將卑而師衆也杜氏曰期共伐郕陳蔡不至故駐師于郎以待之甲午治兵治公作祠俟陳蔡不至故治兵于郎周官大司馬因秋獮而治兵以教戰此常禮也微者帥師在外因有所俟曠日持久見師徒之不整而擅舉治兵之禮不於獵所則非其地不於仲秋則非其時微者擅舉則非其人皆非常也故書夏師及齊師圍郕郕公作成郕者郕叔所封周公與郕叔皆文王之子魯兄弟之國也齊貪其地而連魯陳蔡之兵伐之魯莊事齊奉命惟謹期與陳蔡㑹齊伐郕而陳蔡不至於是魯之師獨與齊師圍郕也魯莊忘親而奉仇讎以伐同姓不義之甚陳蔡善於魯多矣説者謂魯欲取郕而結陳蔡同伐陳蔡既不至乃藉力於齊按魯弱國也安能摟諸侯以伐諸侯乎齊彊國也豈肯為魯役魯亦何敢役之哉蓋齊欲圍郕而徵兵於魯與陳蔡爾惟李杜二說近是李氏堯俞曰魯不應與齊伐同姓之國杜氏諤曰魯兵出無名止為彊齊圍郕國畏齊之暴横而㑹之也郕降于齊師降奚江切欲得郕者齊也郕畏齊而不畏魯故齊魯同圍而郕獨降齊也魯之興師為齊出力而已秋師還還音旋後並同見其勞民於外歴三時而後還也冬十有一月癸未齊無知弑其君諸兒左傳曰齊侯使連稱管至父戍葵丘請代弗許故謀作亂僖公之母弟曰夷仲年生公孫無知有寵於僖公襄公絀之二人因之以作亂齊侯田于貝丘反賊遂弑之而立無知張氏曰齊襄之見弑以禍本言之則無知之亂適積漸於僖公之時而襄公之惡蹟不可揜如抗王伐衛殺魯桓公色荒禽荒暱比小人以至禍發蕭墻身殱賊手考其即位至今所書齊事無非亡國戕身之媒所謂積不善之餘殃也澄曰諸兒襄公也在位十二年明年弟小白立是為桓公經書月二書日二大衍歴正月壬子大己巳冬至二月壬午大經正月甲午在此月三月壬子小四月辛巳大五月辛亥小六月庚辰大七月庚戌小八月己卯大九月己酉小十月戊寅大十一月戊申小十二月丁丑大經十一月癸未在此月長歴甲午正月十三日癸未十一月六日九年丙申莊王十二年蔡哀十曹莊十七衛惠十五晉緡二十鄭厲十六子儀九陳宣八杞靖十九宋閔七齊桓公小白元年秦武十三楚文五春齊人殺無知左傳曰初無知虐於雍廪雍廩殺無知杜氏曰雍廩齊大夫劉氏曰雍廩殺之其稱人何討賊之辭也公及齊大夫盟于蔇蔇公作暨左傳曰襄公無常鮑叔牙曰亂將作矣奉公子小白出奔莒亂作管夷吾召忽奉公子糾來奔穀梁傳曰齊人殺無知而迎公子糾于魯國語韋氏註曰齊逆子糾魯莊公不即遣而盟以要之齊大夫歸迎小白于莒髙氏曰此盟蓋公意杜氏曰小白僖公庶子糾小白庶兄蔇魯地瑯琊齊縣有蔇亭張氏曰今沂州承縣也大夫齊太宰是時齊無君太宰任國事故不名與文七年扈之盟趙盾書大夫同澄按糾與小白皆襄公之庶弟而糾為長齊人擇君先自長始故大夫自至魯地請糾于魯且觀糾之可立與否魯既要之以盟而齊大夫之意已不在糾矣姑狥魯而與之盟非其本心故歸即背之若是齊不來請魯自欲納糾則齊大夫安肯至魯地而受盟乎齊大夫既自至魯地請糾而復中變改圖背盟失信始謀之不審可罪也大夫不氏名者齊無君而以當國之大夫敵君也夏公伐齊納糾納糾左作納子糾高氏曰齊大夫既歸遂背蔇之盟隂召小白而不迎糾魯始引兵伐齊而納糾方其納也小白猶未入于齊齊不受糾而公尚以蔇之盟强欲納之夫頓子比燕伯失地之君内為彊臣所拒非假大援不可復其位故經書納若出奔之子則異此矣既素無位又在外焉必有君父之命乃可以還否則國人義欲奉之庶乎其可苟非此二者而隣國以兵來脅必欲其立豈王法所容乎晉納捷菑雖弗克猶貶伐齊納糾罪公也齊小白入于齊左傳曰桓公自莒先入澄按襄公諸兒公子糾公子小白皆齊僖公之子襄公遭弑而無嗣則糾與小白皆可君齊齊人初欲迎糾既而當國者知糾之不如小白故拒糾而召小白先入于國而奉以為君小白之立蓋齊國公議為社稷計也則小白乃齊國之所共戴而糾特魯君之所私納故曰齊小白言其當為齊君也入者難辭雖齊大夫之所欲立然有魯兵見伐奉糾爭國故小白亦藉莒兵䕶送而後得入齊非如歸之易也秋七月丁酉葬齊襄公賊已討而弟立九月乃得葬八月庚申及齊師戰于乾時我師敗績乾音干公親將兵納糾小白既定猶不退師此戰書及書齊師蓋公不自戰微者與齊微者戰而魯敗也杜氏曰乾時齊地時水在樂安界岐流旱則竭故曰乾時九月齊人取子糾殺之左傳曰鮑叔帥師來言曰子糾親也請君討之管召讎也請受而甘心焉乃殺子糾于生竇公羊傳曰脅我使我殺之也穀梁傳曰猶曰取其子糾而殺之云爾范氏曰言齊之子糾今取而殺之魯不能救䕶也趙氏曰論語云桓公殺公子糾則知齊自殺之非魯殺也若實魯殺則當書云齊人使我殺子糾不應云取也澄曰趙說蓋非當從三傳未踰年之君稱子齊立小白魯亦立糾以與小白爭國書子糾以見魯莊擅立鄰國君之罪小白立而魯師還則糾乃一亡公子寄寓於魯者爾何罪而齊欲殺之乎今齊有君而魯又立糾是齊有二君矣勢固不兩立也魯兵戰敗力不敵齊故齊聲子糾爭國之罪逼魯殺之魯不能庇遂殺之于生竇殺之者雖魯從齊令也是猶齊人取之于魯魯以畀齊而殺之焉爾所以著子糾之死皆魯之罪也冬浚洙公羊傳曰畏齊也張氏曰洙水在魯城北齊伐魯之道也魯雖殺子糾而猶有畏齊之心故浚而深之以備齊師之至經書月三書日二大衍歴正月丁未小甲戌冬至二月丙子大甲辰大寒三月丙午小甲戌雨水閏月乙亥大四月乙巳小旦日春分五月甲戌大六月甲辰大七月甲戌小丁酉二十四日八月癸卯大庚申十八日九月癸酉小十一月壬申小十二月辛丑大長歴是年閏八月十年丁酉莊王十三年蔡哀十一曹莊十八衛惠十六晉緡二十一鄭厲十七子儀十陳宣九杞靖二十宋閔八齊桓二秦武十四楚文六春王正月公敗齊師于長勺勺市若切左傳曰齊師伐我澄曰齊師來伐以報乾時之戰而公敗其師也偏戰曰敗彼未陳而我薄之也啖氏曰凡魯勝則曰敗某師張氏曰戰法定日刻期兩陣相向以決勝負雖敗而奔亦無多殺之禍偏戰則出於本意僥幸一勝也二月公侵宋潛師掠境曰侵莊公僥幸得志於齊遂舉無名之師以掠宋境此所以召郎之師也三月宋人遷宿趙氏曰徙而臣之曰遷某陸氏曰移入封内以為附庸也襄陵許氏曰遷之使未失其國家以行其義猶有所難則是王澤之未竭也僖文以後有滅國無遷國矣澄曰使宿之民從其君遷它處宋遂有其舊都之地夏六月齊師宋師次于郎魯莊以正月敗齊二月侵宋故齊宋二國合兵報魯駐兵于郎而未名所伐可見其師出之無名也公敗宋師于乗丘乗繩證切左傳曰齊師宋師次于郎公子偃曰宋師不整可敗也宋敗齊必還自雩門竊出䝉臯比而先犯之公從之大敗宋師于乗丘齊師乃還杜氏曰乗丘魯地劉氏曰齊宋揚兵整旅經人之國欲窺利乗便攻取使魯人懼疑出竒計詐謀覆滅其軍以自救此輕用其衆之罪也魯人偷得一時之勝非弭患止亂安國使民之道襄陵許氏曰齊桓始入未撫其民而輕用之是以再不得志于魯也晉文公之入五年而後用其民蓋監此秋九月荆敗蔡師于莘以蔡侯獻舞歸舞穀作武杜氏曰荆楚本號後改為楚莘蔡地獻舞蔡季名啖氏曰蔡侯失地故名澄曰荆之下不書其君臣者狄之也荆為中國患久矣宣王時已伐之入春秋遂僭稱王猾夏彌甚殘滅小國以廣其土地者非一也其事不聞於魯故不書于春秋之經蔡與齊魯宋衛陳鄭皆中國之望蔡見楚之浸彊前此與鄭㑹于鄧傳以為始懼楚至此蔡果首受其禍此經書荆蠻猾夏之始蓋荆舉兵犯蔡至莘地蔡侯禦之為荆所敗蔡侯師敗為荆所獲而以之歸也蔡侯獻舞哀公也留于楚九年至魯莊十九年卒子􅆄嗣是為穆公冬十月齊師滅譚譚子奔莒左傳曰齊侯之出也過譚譚不禮焉及其入也諸侯皆賀譚又不至杜氏曰譚國在濟南平陵縣西南張氏曰今濟南府歴城縣澄曰滅者夷其社稷絶其宗祀也齊桓方欲圖霸而首以私憾滅小國所以為三王之罪人也譚子爵而不名者蓋是小國史策不詳其名或曰為彊大所吞雖失國而非其罪然聖筆決不以名不名而定其有罪無罪也奔不言出者國已滅矣無復有歸入之地也經書月六書日無大衍歴正月辛未小己卯冬至二月庚子大三月庚午小四月己亥大五月己巳小六月戊戌大七月戊辰小八月丁酉大九月丁卯小十月丙申大十一月丙寅小十二月乙未大十有一年戊戌莊王十四年蔡哀十二曹莊十九衛惠十七晉緡二十二鄭厲十八子儀十一陳宣十杞靖二十一宋閔九齊桓三秦武十五楚文七春王正月夏五月戊寅公敗宋師于鄑鄑音兹左傳曰宋為乗丘之役故侵我公禦之宋師未陣而薄之敗諸鄑杜氏曰鄑魯地張氏曰宋師再至再敗魯雖再勝國亦困於兵矣秋宋大水左傳曰宋大水公使弔焉曰天作淫雨害於粢盛若之何不弔對曰孤實不敬天降之災又以為君憂拜命之辱杜氏曰公使弔之故書陸氏曰外災來告則書冬王姬歸于齊左傳曰齊侯來逆共姬張氏曰即齊侯之夫人王姬是也澄曰齊桓公娶王女以為夫人而魯主其昏故書歸同于内女不書來逆常事無譏也經書月四書日一大衍歴正月乙丑大乙酉冬至二月乙未小三月甲子大四月甲午小丙辰春分五月癸亥大戊寅十六日六月癸巳小七月壬戌大八月壬辰小九月辛酉大十月辛卯小己未秋分十一月庚申大己丑霜降閏月庚寅小十二月己未大長歴是年閏三月十有二年己亥莊王十五年崩不書蔡哀十三曹莊二十衛惠十八晉緡二十三鄭厲十九子儀十二陳宣十一杞靖二十二宋閔十弑齊桓四秦武十六楚文八春王二月紀叔姬歸于酅公羊傳曰隱之也何氏曰痛其國滅無所歸也澄曰紀無國矣而曰紀叔姬者録其舊也按伯姬魯女為紀侯大之夫人叔姬其娣也紀國既亡紀侯又死叔姬無所依紀季以酅為齊附庸猶存紀之宗祀欲歸就紀國宗祀所存之處而終其身得婦人從一而終之義焉然紀侯去國九年之後乃始歸酅者俟季之位定也惟恐齊不能容季而紀祀不可存則酅不可依也又見其謹審逺辱之幾焉賢哉叔姬也杜氏曰紀侯去國而死叔姬歸魯紀季自定于齊而後歸之全守節義以終婦道故係之紀啖氏曰非嫁而歸故加紀字稱紀言紀之婦也蓋紀侯去國之後死于它而叔姬還魯至是乃歸于酅胡氏曰魯為宗國婦人有來歸之義紀既亡矣不歸于魯全節守義不以亡故而虧婦道也夏侯令女曹爽之弟婦寡居守志曰曹氏全盛之時尚欲保終况今衰亡何忍棄之其聞叔姬之風者也夏四月秋八月甲午宋萬弑其君捷及其大夫仇牧捷公作接左傳曰乗丘之役公以金僕姑射南宫長萬公右歂孫生搏之宋人請之宋公靳之曰始吾敬子今子魯囚也吾弗敬子矣病之弑閔公于䝉澤遇仇牧于門批而殺之遇太宰督于東宫之西又殺之張氏曰仇牧遇弑君之賊不畏彊禦死于其難故書及華督弑君亂臣死不償責故不書澄曰公羊傳言莊公獲萬舍諸宫中數月然後歸之歸反為大夫于宋按萬稱名是自魯歸宋而為再命之大夫也萬有力無德戰敗免罪已幸矣又以之為大夫宋閔用人如此其遭弑也自取之也冬十月宋萬出奔陳左傳曰立子游羣公子奔蕭公子御説奔亳南宫牛猛獲帥師圍亳蕭叔大心及戴武宣穆莊之族以曹師伐之殺南宫牛于師殺子游于宋立桓公猛獲奔衛南宫萬奔陳宋人請猛獲于衛衛人歸之亦請南宫萬于陳以賂皆醢之胡氏曰宋人醢萬則賊已討矣不書殺萬特書萬出奔陳以著陳人黨惡之罪張氏曰陳容其奔罪已大矣受賂而後歸之與所謂殺其人汙其宫而瀦之之意何如澄曰陳之人當如昔年之執州吁者以執萬今乃受其奔是為逆賊之逋逃主也宋臣雖能敗賊而立君然賊既逸去後始得而誅之視石碏討州吁之義則有愧矣故不言宋人殺萬經書月四書日一大衍歴正月己丑大庚寅冬至二月己未小三月戊子大四月戊午小五月丁亥大六月丁巳小七月丙戌大八月丙辰小九月乙酉大經八月甲午在此月十月乙卯小十一月甲申大十二月甲寅小長歴甲午八月九日十有三年庚子僖王元年齊霸桓公五年蔡哀十四曹莊二十一衛惠十九晉緡二十四鄭厲二十子儀十三陳宣十二杞靖二十三宋桓公御說元年秦武十七楚文九春齊侯宋人陳人蔡人邾人㑹于北杏齊侯穀作齊人左傳曰㑹于北杏以平宋亂杜氏曰北杏齊地澄曰是時管仲為政四年矣教齊桓糾合諸侯以圖霸而始為此㑹也按上年宋有弑君之亂蕭叔大心僅能率五族殄亂賊立桓公御説平宋亂者定御説之位也以平宋亂㑹諸侯其名正矣然列國僅有陳蔡小國僅有邾併宋四國而已又君不躬至而卿代行若魯若衛最近于齊而皆不㑹是齊桓之信未能申于諸侯也宋陳蔡以卿㑹君故降而稱人春秋之世以諸侯而主天下盟㑹由此北杏之㑹始以大夫而主天下盟㑹由文七年扈之盟始張氏曰宋弑君之首惡方誅嗣君新立合諸侯定宋亂陳蔡邾並來受命齊桓苟能於宋萬初弑君之時舉兵討之則不勞告諭而天下翕然宗齊矣齊桓欲合諸侯行霸事恐諸侯之未喻故未欲煩其君而使其臣來㑹告以平宋亂之事晉悼公合諸侯于邢丘命朝聘之數使諸侯之大夫聽命鄭伯之外齊宋衛邢皆稱人殆齊桓故事歟夏六月齊人滅遂管仲相桓公方將糾合諸侯以圖霸而前此滅譚今又滅遂不仁甚矣此孔門所以羞稱齊桓曾西所以不為管仲也杜氏曰遂國在濟北蛇丘縣東北張氏曰蛇丘屬漢泰山郡隧鄉故遂國也秋七月冬公㑹齊侯盟于柯左傳曰始及齊平也孫氏曰公不及北杏之㑹桓公既滅遂懼其見討故盟于此杜氏曰柯齊之阿邑張氏曰今鄆州東阿縣魯莊自齊桓入國屢與之戰雖一再勝而齊方修軍政以圖霸魯有見伐之虞至此始及齊平公穀所載曹子之事齊桓捐小利以收魯容或有之皆霸術也但公羊言之過其實爾趙氏曰按桓公未嘗侵魯地盟後未嘗歸魯田其事妄經書月二書日無大衍歴正月癸未大乙未冬至二月癸丑小三月壬午大四月壬子小五月辛巳大六月辛亥大七月辛己小八月庚戌大九月庚辰小十月己酉大十一月己卯小十二月戊申大十有四年辛丑僖王二年齊霸桓六蔡哀十五曹莊二十二衛惠二十晉緡二十五鄭厲二十一子儀十四陳宣十三杞共公元年宋桓二秦武十八楚文十春齊人陳人曹人伐宋左傳曰宋人背北杏之㑹諸侯伐宋取成而還澄按北杏之㑹齊侯在以定宋君之位而宋即背之盖假仁義非誠心故人心不予也張氏曰伐宋用陳曹皆宋之鄰不勤逺國簡便之規撫也程子曰齊自管仲為政莊十一年而後未嘗興大衆也其賦於諸侯亦寡矣終管仲之身息養天下厚矣至於秦晉使之不競而已不彊致也是以其功卑而易成夏單伯㑹伐宋伐宋之役齊止用近宋之陳曹而不煩逺兵然魯方從霸故齊雖不徵于魯而魯自遣單伯以兵徃㑹也張氏曰魯自盟柯已平于齊而未從其役故因齊討宋命上卿率師徃㑹示從霸之意齊桓方興理勢當從固異於翬㑹宋殤黨亂賊伐無罪矣故書㑹伐而不再叙諸國也秋七月荆入蔡左傳曰蔡哀侯娶于陳息侯亦娶焉息媯過蔡蔡侯止而見之弗賓息侯聞之怒使謂楚文王曰伐我吾求救于蔡而伐之楚子從之敗蔡于莘以蔡侯歸蔡哀侯為莘故繩息媯以語楚子楚子如息以食入享遂滅息以息媯歸生堵敖及成王未言楚子問之對曰吾一婦人而事二夫縱弗能死其又奚言楚子以蔡侯滅息遂入蔡張氏曰息之亡蔡之入皆哀侯致之蔡自㑹鄧懼楚之後非但不為徹桑土綢繆牖户之謀而以婦人之故再召楚師始則身虜繼以國破楚熊貲興兵以恱婦人是時齊桓之業未成遂致其横行淮漢侵及中國也澄曰齊雖圖霸力未能以帖荆十年荆方敗蔡而虜其君今又破蔡而入其國春秋屢書痛中國之不競也冬單伯㑹齊侯宋公衛侯鄭伯于鄄鄄戈見切左傳曰宋服故也杜氏曰鄄衛地張氏曰今濮州鄄城縣澄曰春齊陳曹三國之人伐宋其夏魯單伯方徃㑹伐時宋已成而三國還師單伯不及至宋境矣故冬而單伯復㑹齊宋之君以結成而衛鄭之君亦來㑹也此衣裳之㑹之一齊霸蓋略定矣若陳蔡曹邾已歸齊者不復與㑹蓋齊之霸政務簡便不欲煩諸侯也經書月一書日無大衍歴正月戊寅小庚子冬至二月丁未大三月丁丑小四月丙午大五月丙子小六月乙巳大傳甲子二十日七月乙亥小八月甲辰大癸酉大暑閏月甲戌大九月甲辰小旦日處暑十月癸酉大十一月癸卯小十二月壬申大長歴是年閏五月十有五年壬寅僖王三年齊霸桓七蔡哀十六曹莊二十三衛惠二十一晉緡二十六鄭厲二十二陳宣十四杞共二宋桓三秦武十九楚文十一春齊侯宋公陳侯衛侯鄭伯㑹于鄄左傳曰齊始霸也張氏曰傳謂始覇指諸侯始定而言然魯未信服自後宋人猶或主兵衛鄭未免復叛蓋齊霸駸駸而定而諸侯之心猶未一也劉氏曰伯則主諸侯諸侯莫先焉此年伐郳宋序齊上明年伐鄭宋亦序齊上齊之未主諸侯明矣然則齊始霸在十六年九國盟于幽之時自此始為諸侯主矣襄陵許氏曰十三年十四年㑹至是又㑹三合諸侯而不盟以示慎重是以盟則衆信莫敢渝也夏夫人姜氏如齊張氏曰文姜播惡齊襄之世不如齊八年矣至此復如齊桓公欲求魯好以定覇業而不之非襄陵許氏曰鄄之㑹魯尚未從桓公未能比近無以示逺務求合于魯是以受文姜以昭親親而齊魯之交卒合然而禮坊一弛夫人復啓越竟之恣遂成如莒之姦秋宋人齊人邾人伐郳郳公作兒左傳曰諸侯為宋伐郳張氏曰小邾宋之附庸不服宋桓公為宋伐之宋序齊上蓋齊桓霸體未全正此役為宋而興亦猶伐宋之師邾人為道而序鄭之上也劉氏曰此齊桓之師何以不先諸侯猶未成乎霸也明年㑹幽為九合之始九者始于幽終于淮澄按九合之數説各不同故朱子以為九當作糾杜氏諤曰齊桓内不能率諸侯以朝天子外不能攘夷狄以救中國為宋討一附庸以求其服從斯德之小乎鄭人侵宋左傳曰鄭人間之而侵宋張氏曰間諸侯伐郳而侵宋不誠服齊而背二鄄之㑹鄭之反覆於齊楚之間蓋始于此冬十月經書月一書日無大衍歴正月壬寅小丙午冬至二月辛未大三月辛丑小四月庚午大五月庚子小六月己巳大七月己亥小八月戊辰大九月戊戌小十月丁卯大十一月丁酉小十二月丙寅大十有六年癸卯僖王四年齊霸桓八蔡哀十七曹莊二十四衛惠二十二晉武公稱三十八年鄭厲二十三陳宣十五杞共三宋桓四秦武二十楚文十二春王正月夏宋人齊人衛人伐鄭左傳曰宋故也孫氏曰鄭背鄄之㑹侵宋故齊桓帥諸侯伐之齊序宋下者與伐郳義同張氏曰伐鄭不止為宋而已蓋鄭不服則諸侯之心未一也襄陵許氏曰中國諸侯宋為大既為之服郳又為之報鄭宋蓋自是與齊為一宋親而中國諸侯定矣秋荆伐鄭左傳曰鄭伯自櫟入緩告于楚楚伐鄭及櫟孫氏曰桓未能救中國也張氏曰蓋齊霸未定楚之威侵及中國自桓二年鄭已懼楚㑹鄧至此三十餘年而後受兵楚之威不輕用盖如此師氏曰自桓公之立而荆為中國患矣十年敗蔡師十四年又入蔡今復伐鄭而桓不能討聖人詳而書之以罪桓也冬十有二月公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯滑伯滕子同盟于幽左穀無公字許男下左無曹伯字齊自北杏以後屢合諸侯有㑹無盟者諸侯之心未一也至此而鄭服始合九國之君而為此盟此桓公糾合諸侯一匡天下之始自入春秋以來所未嘗有之事也諸侯尊桓公為霸而主盟然桓公執謙未敢專主盟之權故曰同盟同者列國相與盟而莫適為主及二十七年再盟于幽齊亦未專主盟也至僖二年宋江黄盟貫齊始為盟主而自此以後不復書同矣杜氏曰陳國每盟㑹皆在衛下齊桓始霸楚亦始彊陳介於二大國之間而為三恪之客齊桓因而進之班在衛上終於春秋滑國都費河南緱氏縣幽宋地邾子克卒克邾儀父也蓋齊桓請命于王爵之為子而儀父改名克也子瑣嗣經書月二書日無大衍歴正月丙申大辛亥冬至二月丙寅小三月乙未大四月乙丑小五月甲午大六月甲子小七月癸巳大八月癸亥小九月壬辰大十月壬戌小十一月辛卯大十二月辛酉小十有七年甲辰僖王五年崩不書齊霸桓九蔡哀十八曹莊二十五衛惠二十三晉武三十九鄭厲二十四陳宣十六杞共四宋桓五秦德公元年楚文十三春齊人執鄭詹詹公作瞻詹者鄭再命之大夫鄭嘗再㑹鄄又背之而侵宋今雖盟幽然其心必又有不誠服于齊者故齊執其大夫不知當時指何罪而執之左氏以為鄭不朝也孔氏曰齊以不朝責鄭鄭命詹詣齊謝罪齊人執之襄陵許氏曰宋大鄭小齊桓蓋徳宋而威鄭文王之興大邦畏其力小邦懐其德而桓反之是以為霸道也至於宋襄執鄫之虐則桓不為矣夏齊人殱于遂殱公作瀐左傳曰遂因氏領氏工妻氏須遂氏饗齊戍醉而殺之齊人殱焉澄曰殱者盡殺之之辭齊桓霸事方興而以彊大吞小弱滅遂而慮遂之遺民不服故遣齊之民戍守其地以無罪滅遂固已失遂人之心矣而齊之戍遂者或又凌蔑其舊民故遂人憤怒而盡殺之也張氏曰不言遂人殱齊戍而書其自殱所以伸遂人復讎之志而著桓公不仁以至於自殱其衆也襄陵許氏曰齊師滅譚譚子奔莒著其君不詘也齊人滅遂齊人殱于遂著其民不歸也孟子謂霸者以力服人非心服也力不贍也荀子謂桓詐邾襲莒并國三十五則所滅葢不盡書書滅譚滅遂上下一見之也秋鄭詹自齊逃來常山劉氏曰詹為鄭卿見執於齊不能自辨以理取直而歸反如匹夫之逃越在他國斯可賤也蘇氏曰詹之義當身任齊責以紓國患而逃遁自免書逃來賤之也胡氏曰齊桓始霸同盟于幽而魯首叛盟受其逋逃虧信義矣張氏曰執叛國大夫逾歴三時不令其服罪而去致防閑弛慢國囚亡逸齊之罪也竊身逃竄同于苟免之匹夫無大夫之行失節辱國詹之罪也為逋逃主以取伐於霸主魯之罪也冬多麋麋鹿之大者魯地所有昔不如是之多而今之多過于常時異也故書髙郵孫氏曰以有為災則書有有蜮是也以無為異則書無無氷是也麋者常有之物惟其多則書之經書月無書日無大衍歴正月庚寅大丙辰冬至二月庚申小三月己丑大四月己未小丁亥春分閏月戊子大五月戊午小旦日穀雨六月丁亥大七月丁巳小八月丙戌大九月丙辰小十月乙酉大十一月乙卯小十二月甲申大長歴是年閏六月十有八年乙巳惠王元年齊霸桓十蔡哀十九曹莊二十六衛惠二十四晉獻公佹諸元年鄭厲二十五陳宣十七杞共五宋桓六秦徳二楚文十四春王三月日有食之孫氏曰不日不朔日朔俱失也吕氏曰史失之春秋無由追攷也夏公追戎于濟西戎即隠公桓公與之盟者追謂於其已退而躡其後以追之也戎入魯境魯將禦之而戎遄退故魯莊以兵逺追逐之至於濟水之西也孫氏曰僖二十六年齊人侵我西鄙公追齊師至酅先言侵而後言追此不言侵伐者明不覺其來已去而追之也秋有􅈮穀梁傳曰一有一亡曰有蜮射人者也公羊傳曰記異也何氏曰以有為異也杜氏曰蜮短狐含沙射人張氏曰蜮能含沙射水中人影中之輒病或至于死江淮以南水濱有之魯所無也冬十月經書月二書日無大衍歴正月甲寅大辛酉冬至二月甲申小三月癸丑大四月癸未小五月壬子大日食沈括謂春秋日食三十六淮南衛朴能推算三十五猶不得莊十八年三月者一杜預長歴三月癸未朔不入食限劉孝孫以為五月壬子朔食與大衍歴合經書三月閏差也六月壬午小七月辛亥大八月辛巳大九月辛亥小十月庚辰大十一月庚戌小十二月己卯大十有九年丙子惠王二年齊霸桓十一蔡哀二十曹莊二十七衛惠二十五晉獻二鄭厲二十六陳宣十八杞共六宋桓七秦宣公元年楚文十五春王正月夏四月秋公子結媵陳人之婦于鄄遂及齊侯宋公盟公子結魯三命大夫魯因受鄭詹之逃疑得罪于齊霸故命公子結與齊宋二君會鄄而盟冀以釋前罪而鄄之巨室有嫁女為陳人之婦者結以庶女媵之因有盟鄄之便而送其女於鄄然後與齊宋盟春秋以其不敬君命故先書其私事而反以君命之正事為遂事例與祭公來遂逆王后于紀同結以私家之鄙事參㑹霸之大盟不惟不足以釋齊之怒而又以重魯之罪是以致齊之來伐也夫人姜氏如莒夫人自齊襄既弑之後八年不出因十五年又一至齊蓋假托國事以愚其昏懦之子莊公不能制因此又復縱恣故于今如莒也婦人既嫁不踰境父母没不得歸寧雖兄弟之國且不可徃况徃它國乎冬齊人宋人陳人伐我西鄙魯之臣送已女為媵而恭遂與霸主大國之盟不也是以聲其罪而伐之陳亦以結媵其國人之婦而輕慢霸主故與齊宋同興問罪之師結不知禮而為私為公兩失歡好禮之不可不謹也如是經書月二書日無大衍歴正月己酉小丁卯冬至二月戊寅大三月戊申小四月丁丑大五月丁未小六月丙子大七月丙午小八月乙亥大九月乙巳小十月甲戌大十一月甲辰小十二月癸酉大二十年丁未惠王三年齊霸桓十二蔡穆侯肹元年曹莊二十八衛惠二十六晉獻三鄭厲二十七陳宣十九杞共七宋桓八秦宣二楚堵敖熊囏元年春王二月夫人姜氏如莒比年書夫人徃它國以姦而魯莊若罔聞知昔年猶可諉曰年未長也今既年長矣而如此其不子也甚矣哉夏齊大災張氏曰天火曰災書大志其甚也齊人來告魯徃弔之故書秋七月冬齊人伐戎戎穀作我張氏曰齊桓于是有安諸夏之志戎在徐州之域最近于魯故先治之也經書月二書日無大衍歴正月癸卯大壬申冬至閏月癸酉小二月壬寅大三月壬申小四月辛丑大五月辛未小六月庚子大七月庚午小八月己亥大九月己巳小十月戊戌大十一月戊辰小十二月丁酉大長歴是年閏十二月二十有一年戊申惠王四年齊霸桓十三蔡穆二曹莊二十九衛惠二十七晉獻四鄭厲二十八卒陳宣二十杞共八宋桓九秦宣三楚堵敖二春王正月夏五月辛酉鄭伯突卒突鄭厲公也在位二十八年子捷嗣是為文公張氏曰突鄭莊公之孽子莊公既殁奪忽之位其後雖為蔡仲所逐旋入于櫟卒取鄭國故不復著忽亹儀之在位以其不能君也論者以為突始終能君夫簒弑竊國之人而春秋終始君之且記其卒于位所以著小人肆志亂賊得終王法不行而世之所由亂也秋七月戊戌夫人姜氏薨夫人桓公之夫人莊公之母也冬十有二月葬鄭厲公經書月四書日二大衍歴正月丁卯小丁丑冬至二月丙申大三月丙寅小四月乙未大五月乙丑大六月乙未小經五月辛酉在此月七月甲子大八月甲午小經七月戊戌在此月九月癸亥大十月癸巳小十一月壬戌大十二月壬辰小長歴辛酉五月二十七日戊戌七月五日二十有二年己酉惠王五年齊霸桓十四蔡穆三曹莊三十衛惠二十八晉獻五鄭文公捷元年陳宣二十一杞惠公元年宋桓十秦宣四楚堵敖三春王正月肆大眚眚公作省肆謂縱放之也眚謂過誤而犯者虞書言眚災肆赦眚固可赦而不言大聖人雖至仁然赦人之罪亦必有所劑量於其間不一槩也今書肆大眚則是罪之大而不當赦者亦赦之譏其惠姦佚罰也癸丑葬我小君文姜髙氏曰婦人無爵何諡之有先王之制但取夫之諡冠於姓之上以明所屬詩所謂莊姜宣姜共姜經所書宋共姫是也豈有不繫其夫而别自為謚者哉夫人姜氏弑逆滛亂之人得罪於宗廟國人之所不容今也云亡雖以母子之故不忍棄絶則𦵏之足矣又迫於大義不敢加以夫之諡别為之諡曰文而不復繫於桓公將以掩其惡也然而棄天罔民壊先王之制則其罪又不若從其夫之諡耳自是魯國從而效尤凡夫人之死皆為之别立諡後世因循不改大失春秋之旨矣沙隨程氏曰婦人之諡從夫文姜别作諡以其得罪於先公也其後或妾母僭稱夫人或雖正嫡亦不能從夫諡者著禮之變也陳人殺其公子御冦御上聲穀梁傳曰言公子而不言大夫公子未命為大夫也其曰公子何也公子之重視大夫孫氏曰春秋之義非天子不得專殺二百四十二年無天王殺大夫文書諸侯殺大夫者四十七古者諸侯之大夫皆命于天子諸侯不得專命也大夫有罪則請于天子諸侯不得專殺也大夫猶不得專殺况世子母弟乎春秋之世國無小大其卿大夫士皆專命之有罪無罪皆專殺之其無王也甚矣陳人殺其公子御冦者譏專殺也稱君稱國稱人雖有輕重其專殺之罪則一也胡氏曰殺而稱君者獨出於其君之意而大夫國人有不與焉如晉侯殺其世子申生之類是也稱國者國君大夫與聞其事而不請于天子如鄭殺其大夫申侯之類是也稱人有二義其一國亂無政衆人擅殺而不出於其君則稱人如陳人殺其公子御寇之類是也其一弑君之賊人人之所得討背叛之臣國人之所同惡則稱人如衛人殺州吁鄭人殺良霄之類是也澄曰公子言其屬也非稱其氏也屬之下單稱名與再命之大夫同故穀梁以為公子之重視大夫夏五月孫氏曰春秋未有以夏五月首時者此蓋五月之下文有脱事爾或曰書時之首月而四訛為五也秋七月丙申及齊高傒盟于防及髙傒盟蓋求昏于齊也髙傒齊三命之卿當國者豈吾微者可與之盟哉孰及之公也趙氏以為凡盟不目内皆指公也冬公如齊納幣穀梁傳曰納幣大夫之事也公親納幣非禮也趙氏曰昏禮有六一納采二問名三納吉四納徴納徵即納幣也五請期六親迎親迎即逆女也春秋獨書其二以納幣方契成逆女為事終舉重之義也啖氏曰魯徃它國納幣皆常事不書凡書者皆譏也它國來亦如之孫氏曰按桓六年九月丁卯子同生公十四嵗即位又二十四年如齊逆女年三十七始昏者文姜制之不得以時而昏爾故母䘮未終如齊納幣圖昏之速也澄曰魯莊受制于母年長而不得娶母既死急於娶故於䘮制中屈已與齊大夫盟而求昏焉齊之許未堅而公自如齊納幣納幣非公所當自行也程子曰齊疑昏議故公自行納幣後二年方逆齊難之也經書月三書日二大衍歴正月辛酉大壬午冬至二月辛卯小經正月癸丑在此月三月庚申大四月庚寅小五月己未大六月己丑小七月戊午大乙酉夏至八月戊子小經七月丙申在此月九月丁巳大丙戌處暑十月丁亥大丙辰秋分閏月丁巳小十一月丙戌大丁亥霜降十二月丙辰小長歴癸丑正月二十三日丙申七月九日二十有三年庚戌惠王六年齊霸桓十五蔡穆四曹莊三十一卒衛惠二十九晉獻六鄭文二陳宣二十二杞惠二宋桓十一秦宣五楚成王頵元年春公至自齊至之者譏之也譏其不當親徃納幣也祭叔來聘祭音債祭者周畿内之國隠之時爵為伯桓之時爵為公叔者公之弟貳君者也例稱字幾内之國王臣也不當外交諸侯而祭國入春秋以來至今凡三交魯矣伯之來公之來來下不書其事蓋伯與公君也行兩君相見之禮是朝魯也王臣外交通問且不可况以畿内之國朝畿外之諸侯烏可哉故不書曰朝而但曰來祭叔臣也蓋以臣禮見公然當時有介弟攝君行禮之事若不書聘則或疑其為攝君而行朝禮也故書來聘者見其奉君命以聘而非攝君事以朝此春秋别嫌明微之意若夫王臣私交之非禮則或朝或聘其罪一也夏公如齊觀社公求昏於齊而齊之許未慤於是公屈尊親徃納幣以致請而未得齊之諾欲再徃齊致請而無名遂托觀社以行夫社者諸侯祭其土示之常事未聞鄰國之君徃觀之者如齊而曰觀社此何禮哉按春秋外傳載曹劌之言曰齊棄太公之法觀民於社君為是舉而徃觀之非故業也又按襄二十四年齊社蒐軍實使客觀之蓋齊俗每因祭社則蒐軍以夸示威衆而聚人觀之故公得託此為名以如齊也程子曰昏議尚疑故以觀社再徃諸議後一年方逆盖齊難之公至自齊其譏與前納幣之至同荆人來聘按前書敗蔡入蔡伐鄭單書荆此於荆下加人字者啖氏曰若言荆來聘則似舉州皆來故加人字以成文爾無它意也陸氏曰凡以號舉者皆稱人君臣同辭張氏曰楚自四五年來先加兵於鄭蔡而聘使至魯用逺交近攻之術公及齊侯遇于穀昏議猶未定故又遇於穀以致請蕭叔朝公蕭附庸國今徐州蕭縣叔蕭君之弟貳君者攝君行朝禮朝公者朝公于穀也朝聘當廟受于野非禮也介弟攝君而朝又行朝禮於野蕭之朝魯之受皆非也交譏之秋丹桓宫楹穀梁傳曰禮天子諸侯黝堊大夫倉士黈丹楹非禮也何氏曰楹柱也丹之者為將娶齊女欲以誇大示之冬十有一月曹伯射姑卒射音亦射姑莊公也在位三十一年卒世子覊嗣踰年而庶子赤篡立是為僖公史記世家赤作夷十有二月甲寅公㑹齊侯盟于扈遇穀以請而齊猶難之故又盟以要其信而後許也夫求昏者可求則求不可則已許昏者可許則許不可則郤魯欲求齊婚不以媒妁徃覘其可不可公乃自與齊髙傒盟以求之未得齊諾而公遽請納幣是與彊委禽者同也躬納幣而猶未諾則又徃觀社以請觀社以請而猶未諾則又遇于穀以請遇穀之後宜若可矣又必盟于扈而後可焉何其難之之甚也二國之昏姻不以禮不以義如此哀姜之不終也宜哉杜氏曰扈鄭地在滎陽卷縣西北孫氏曰扈齊地經書月二書日一大衍歴正月乙酉大戊子冬至二月乙卯小三月甲申大四月甲寅小五月癸未大六月癸丑小七月壬午大八月壬子小九月辛巳大十月辛亥小十一月庚辰大十二月庚戌大甲寅五日二十有四年辛亥惠王七年齊霸桓十六蔡穆五曹僖公赤元年衛惠三十晉獻七鄭文三陳宣二十三杞惠三宋桓十二秦宣六楚成二春王三月刻桓宫桷穀梁傳曰天子之桷斵之礱之加宻石焉諸侯之桷斵之礱之大夫斵之士斵本刻桷非正也杜氏曰刻鏤也桷椽也澄曰于礱斵之外又加刻鏤之功丹楹刻桷者以齊女將歸見于禰廟故示此華廢以夸之也葬曹莊公曹覊嗣位而𦵏其父也夏公如齊逆女親迎常事不書公納幣越三年而後得親迎則非常也故書秋公至自齊納幣之久而後親迎親迎以非常而書故至之以示譏也八月丁丑夫人姜氏入孫氏曰公親迎于齊不俟夫人而至失夫之道也婦人從夫者也夫人不從公而入失婦之道也澄曰凡卿為君逆夫人本非禮也猶且以夫人同至公親徃逆而不與同至夫人後公而入盖夫人難之以要公也公羊謂夫人與公有所約而後入所謂有所約者杜氏曰為以孟任故蓋公嬖孟任必與公約不復嬖孟任而後入也入者非順易之辭有阻難之意焉張氏曰見莊公不夫哀姜妬忌之情矣戊寅大夫宗婦覿用幣覿音迪大夫宗婦者同宗大夫之婦也覿見也用幣以幣為贄也凡見必用贄卿贄以羔大夫贄以鴈士贄以雉婦人之贄榛栗棗脩而已夫人姜氏既入莊公欲夸寵之故使同宗大夫之婦用幣為贄以見也大水隂盛所致也冬戎侵曹侵曹葢納赤也曹覊出奔陳杜氏曰覊葢曹世子微弱不能自定澄按上年十一月曹莊公射姑卒今年三月而葬則覊以世子嗣位𦵏其先君至今年冬在位期年矣為戎所逐而出不書爵而書名義與鄭忽同赤歸于曹赤曹僖公名葢曹莊公之庶子覊之弟也歸者易辭為戎所納故易義與突歸于鄭同但彼先書突歸而後書忽出蓋祭仲在宋挈突以歸而後忽出此則覊避戎兵出而赤乃得歸也張氏曰覊繫于曹與鄭忽同明其正也赤不繫國庶孽也赤以庶逐適戎以裔謀夏天子方伯不能正郭公郭國名或云即虢也公爵畿内八命之國也公下文缺或云公字疑是亡字書郭亡義與梁亡同劉氏曰齊桓公之郭問父老曰郭何故亡曰以其善善而惡惡也公曰若子之言乃賢君也何至於亡父老曰郭君善善不能用惡惡不能去所以亡也考其時與事或然經書月二書日二大衍歴正月庚辰小癸巳冬至二月己酉大三月己卯小四月戊申大五月戊寅小六月丁未大七月丁丑小八月丙午大九月丙子小經八月丁丑戊寅在此月十月乙巳大十一月乙亥小十二月甲辰大長歴是年閏七月丁丑八月三日戊寅四日二十有五年壬子惠王八年齊霸桓十七蔡穆六曹僖二衛惠三十一卒晉獻八鄭文四陳宣二十四杞惠四宋桓十三秦宣七楚成三春陳侯使女叔來聘女音汝左傳曰始結陳好也杜氏曰季友相魯原仲相陳二人有舊故女叔來聘季友冬亦報聘髙郵孫氏曰諸侯之大夫天子賜之邑使之歸國則書氏書字鄭祭仲魯單伯陳女叔是也澄曰女氏叔字天子所命四命之大夫陳三恪也其初公爵故有四命之孤夏五月癸丑衛侯朔卒朔惠公也在位三十一年魯不㑹故不書葬其子赤嗣是為懿公六月辛未朔日有食之鼓用牲于社穀梁傳曰鼓禮也用牲非禮也澄謂日食者隂盛陽微鼓聲以助陽氣伯姬歸于杞髙氏曰凡内女書歸若時君之女則加子字以别之此伯姬葢桓公末嵗所生之女于今殆二十有餘嵗失時而後嫁也陸氏曰不言逆者夫自逆常事不書澄以他書攷證葢歸於杞惠公秋大水鼓用牲于社于門左傳曰凡天災有幣無牲非日月之眚不鼔冬公子友如陳杜氏曰報女叔之聘經書月二書日二大衍歴正月甲戌小戊戌冬至二月癸卯大三月癸酉小四月壬寅大五月壬申大庚子穀雨六月壬寅小庚午小滿經五月癸丑在此月閏月辛未大日食經書六月朔置閏下同也七月辛丑小旦日夏至八月庚午大九月庚子小十月己巳大十一月己亥小十二月戊辰大長歴癸丑五月十二日二十有六年癸丑惠王九年齊霸桓十八蔡穆七曹僖三衛懿公赤元年晉獻九鄭文五陳宣二十五杞惠五宋桓十四秦宣八楚成四春公脫春字公伐戎張氏曰為追于濟西之恥報怨也襄陵許氏曰隱桓世有戎盟至於莊公戎始變渝我是以有濟西之役於此伐戎義已勝矣齊魯伐戎而中國崇也夏公至自伐戎襄陵許氏曰以伐戎至大伐戎也杜氏諤曰伐戎無譏也所以至者公出師于外踰時而返必書至以危之曹殺其大夫劉氏曰稱國以殺而不名者大夫無罪而君殺之也張氏曰曹伯赤殺之也豈於覊赤出入之際或不附戎而殺之若鄭厲殺原繁傅瑕與髙氏曰除覊之黨惡其内應也澄曰大夫不書氏名被殺者無罪也惟此年曹殺大夫僖二十七年宋殺大夫文七年宋人殺大夫三條爾其他縱或無罪必有被殺之因是亦罪也縱或有罪亦當告之天子侯國不得專殺也秋公㑹宋人齊人伐徐張氏曰徐嬴姓國國近齊魯今徐州彭城境也澄曰穆以後徐僭稱王徐國雖小但春秋之前已甞僭稱王號今見楚彊則服於楚國與宋鄰必與宋有惡齊桓為宋伐之故命宋主兵而序齊上齊宋蓋皆卿也以公在故降稱人胡氏曰按書伯禽嘗征徐戎則徐為魯患舊矣是年春公伐戎狄又伐徐者必徐與戎合兵表裏為魯患也故雖齊宋師少而公獨親行冬十有二月癸亥朔日有食之經書月一書日一大衍歴正月戊戌小癸卯冬至二月丁卯大三月丁酉小四月丙寅大五月丙申小六月乙丑大七月乙未小八月甲子大九月甲午大十月甲子小十一月癸巳大十二月癸亥小日食二十有七年甲寅惠王十年齊霸桓十九蔡穆八曹僖四衛懿二晉獻十鄭文六陳宣二十六杞惠六宋桓十五秦宣九楚成五春公㑹杞伯姬于洮洮音滔陸氏曰參譏之沙隨程氏曰與二年夫人姜氏㑹齊侯于禚之事同髙氏曰婦人無相㑹之禮伯姬既歸於杞復來與公㑹是與文姜齊襄無異也杜氏曰洮魯地張氏曰洮溝在濟州今濟南府也夏六月公㑹齊侯宋公陳侯鄭伯同盟于幽左傳曰陳鄭服也張氏曰再舉同盟之禮以申霸令而一諸侯之心也魯宋陳鄭偕至而衛獨不來故明年伐衛澄曰同盟者齊桓猶未專主㑹也秋公子友如陳𦵏原仲原仲陳大夫原氏仲字禮臣既没不名故稱字猶管夷吾稱管仲也按無㑹葬鄰國大夫之禮季友與原仲有舊欲徃㑹其𦵏以大夫不可私行出境請于公而公命之行故書公子友如陳無以異於常時奉君命而使者大夫無私交公之遣行友之㑹𦵏原氏之受皆非禮也叅譏之冬杞伯姬來趙氏曰譏無父母而來凡内女稱來不宜來也合禮者皆常事不書蓋非禮而來故書爾髙氏曰伯姬春方出與公㑹而冬又來何其不安于杞也而杞伯不能制其妻如其國何莒慶來逆叔姬此亦是桓公之女昏姻失時年近三十而始嫁也大夫娶公女公不自主而使大夫主之凡書者譏尊卑不敵而公自主之也莒慶莒國之卿再命稱名莒無三命之卿此其上卿也髙氏曰叔姬者伯姬之妹皆非莊公之女伯姬歸于杞不以叔姬娣而以適莒慶者卑杞故也不曰逆女而曰逆叔姬以别卿為君逆者也慶不名者莒小國無三命卿與齊髙固異杞伯來朝髙氏曰致伯姬也杞伯不能制其内縱伯姬之數出又來朝而致之其卑弱可知矣公㑹齊侯于城濮杜氏曰城濮衛地張氏曰齊欲討衛而㑹魯於此定其交而後加兵於人所以見其謀之審也經書月一書日無大衍歴正月壬辰大己酉冬至二月壬戌小三月辛卯大四月辛酉小五月庚寅大六月庚申小七月己丑大八月己未小九月戊子大十月戊午小十一月丁亥大十二月丁巳大二十有八年乙卯惠王十一年齊霸桓二十蔡穆九曹僖五衛懿三晉獻十一鄭文七陳宣二十七杞惠七宋桓十六秦宣十楚成六春王三月甲寅齊人伐衛衛人及齊人戰衛人敗績左傳曰王使召伯廖賜齊侯命且請伐衛以其立子頽也齊伐衛敗衛師數之以王命取賂而還髙氏曰初蒍邉奉子頽犯王而不克奔衛衛興兵助頽犯王而齊為霸主不能奔救及鄭伯既納王王乃錫齊侯命使討之於是乎伐衛曰伐者討得其罪也然既敗衛乃取賂而還嗟夫齊侯以能尊王室覇諸侯而所為乃若是沙隨程氏曰齊侯自去年已㑹公于城濮則駐師於衛地久矣而曰三月甲寅伐衛衛受子頽之奔王命齊侯伐之則齊侯待於城濮為有禮矣及衛人不服而戰則前乎甲寅之日其伐未果也是宜以衛人主兵張氏曰衛嘗受盟于幽前年同盟不至伐不服罪乃以齊來伐之日而急擊之然不能敵齊節制之師而敗以衛為主罪之也不地於衛都也澄曰前年冬齊侯出㑹魯于衛地矣今年春伐衛稱人者蓋齊侯待於城濮但遣微者徃伐意欲以不戰屈之也而衛不服罪敢與齊戰輕躁寡謀不量其力自取敗衂也夏四月丁未邾子瑣卒瑣在位十二年其子蘧蒢嗣秋荆伐鄭左傳曰楚令尹子元以車六百乗伐鄭入于桔柣之門衆車入自純門及逵市縣門不發楚言而出子元曰鄭有人焉胡氏曰子元無故伐鄭是凌弱暴寡之師也澄曰齊霸已盛而楚猶敢伐其與國恃其彊而不畏齊也公㑹齊人宋人救鄭宋人下公有邾婁人三字左傳曰諸侯救鄭楚師夜遁鄭人将奔桐丘諜告曰楚幕有烏乃止穀梁傳曰善救鄭也胡氏曰得救急䘏鄰之義桓公攘外冦安中國之事見矣澄曰齊宋皆卿壓於公故稱人張氏曰是時楚文王卒成王幼子元伐鄭師出無名故鄭人示以閒暇而不敢入聞諸侯之救而遂遁時桓公攘楚之計未定楚政適亂然自若敖蚡冒至于武文兵制尚在其後二年之間殺子元而授政令尹子文復修國政故召陵之師雖舉而楚之君臣非此時比故僅能使之受盟終不足以大服之也冬築郿郿音眉公作微築者創始造邑也夏時之冬用民力之時魯之冬則是建酉建戌之月未可用民力也杜氏曰郿魯下邑大無麥禾此於冬後縂記一年之事夏秋之間既無麥秋冬之間又無禾禾黍稷稻粱也大無者言全無也蘇氏曰是嵗未嘗有水旱螟蟲之災而書大無麥禾劉向曰土氣不養稼穡不成也沈約宋志言吳孫皓時嘗有之苖稼豐美而實不成百姓以饑闔境皆然連嵗不已此所謂大無麥禾也臧孫辰告糴于齊辰穀作臣外傳魯語曰魯饑臧文仲言於公曰夫為四鄰之援固國之艱急是為鑄名器藏寳財固民之殄病是待今國病矣盍以名器請糴于齊公曰誰使對曰國有饑饉卿出告糴古之制也辰也請如齊公使徃從者曰君不命而請之其為選事乎文仲曰賢者急病而讓夷居官者當事不避難在位者恤民之患是以國家無違我不如齊非急病也在上不恤下居官而惰非事君也文仲以鬯圭與玉磬如齊齊人歸其玉而予之糴劉氏曰君子之為國也務農重穀節用愛人則倉廪實不知為此事至而憂之以急病讓夷為功何其末歟澄曰臧孫氏辰名魯世卿三命古者一年耕必有三年之食三年耕必有九年之食故雖饑而民不害者蓄積多而偹先具也是年冬大無麥禾而臧孫即徃告糴于齊見魯之無政事而財用不足也張氏曰一年不熟而上下相顧無以粒民重臣自徃告糴若不遇齊桓則魯之民必至轉死於溝壑矣經書月二書日二大衍歴正月丁亥小甲寅冬至二月丙辰大甲申大寒閏月丙戌小甲寅二十九日三月乙卯大旦日雨水四月乙酉小丁未二十三日五月甲寅大六月甲申小七月癸丑大八月癸未小九月壬子大十月壬午小十一月辛亥大十二月辛巳小長歴是年閏三月甲寅三月晦日二十有九年丙辰惠王十二年齊霸桓二十一蔡穆十曹僖六徫懿四晉獻十二鄭文八陳宣二十八杞惠八宋桓十七秦宣十一楚成七春新延廐穀梁傳曰冬築郿春新延廐其用民力為已悉矣孫氏曰大無麥禾告糴於齊則民饑矣延廐雖壊未新可也莊公不愛民力若此澄曰新有故而修之也延廐馬閑也夏鄭人侵許張氏曰許鄭世讎也然許自盟幽之後不與齊桓之㑹鄭人侵之或齊之命與自後許始從中國襄陵許氏曰許以近楚未㑹諸侯故鄭侵之以求好焉秋有蜚蜚音吠公羊傳曰記異也何氏曰惡臭之蟲南粤所生非中國所有書有言本無也澄曰書螟書螽止言螟螽為災則書也蟳曰生麋曰多蜚曰有不常多而今多不常生而今生不常有而今有也鸛鵒亦昔無而今有書來者以其自它國而來也蜚蜮他處所有而此地今自生其有非自彼來故穀梁以為一有一亡是也冬十有二月紀叔姬卒啖氏曰内女為諸侯之夫人則書卒以公為之服也禮諸侯絶朞服惟適國君者為之服大功九月尊卑敵故也許嫁為夫人者亦然其為媵及嫁大子公子大夫則不書澄按叔姫娣也自隠公厚於先君之女以夫人之禮而歸之於紀自此以後魯紀二國之待叔姬叔姬之所以自待其身皆與伯姬同春秋備書之以見魯之過於厚而非禮也然則此葢莊公以為姑而為服大功之服也與叔姬莊十二年歸于酅此卒于酅也紀滅而猶繫之紀者蓋國亡無所倚托雖寄寓於酅以待死其為紀國夫人伯姬之娣則如初也城諸及防杜氏曰諸防皆魯邑張氏曰諸今密州諸城縣縣又有故防城及者别二邑也澄曰但言城諸防則似于邑然凡書土功雖時非善之也書之於農隙愈於非時者爾於春夏書譏可知也其間亟興土功而亟書之者不繫乎時與不時皆貶也若此前年冬築郿大饑而告糴此年春新延廐於是又城諸及防豈不為亟而譏之乎經書月一書日無大衍歴正月庚戌大己未冬至二月庚辰小三月己酉大四月己夘大五月己酉小六月戊寅大七月戊申小八月丁丑大九月丁未小十月丙子大十一月丙午小十二月乙亥大三十年丁巳惠王十三年齊霸桓二十二蔡穆十一曹僖七衛懿五晉獻十三鄭文九陳宣二十九杞惠九宋桓十八秦宣十二楚成八春王正月夏師次于成左無師字師少將卑師衆也張氏曰成魯地地譜今泰山鉅平縣東南趙氏曰魯葢欲㑹齊圍鄣至成待命聞鄣已降不復行爾秋七月齊人降鄣降奚江切鄣音章杜氏曰鄣紀附庸國東平無鹽縣東北有障城小國孤危不能自固蓋齊遙以兵威脅使降附趙氏曰降服而為附庸也常山劉氏曰不書鄣降而曰降鄣齊肆彊力脅而服之也髙郵孫氏曰郕降于齊師是時齊魯之師相㑹圍郕郕不降我而獨降齊非齊師能使之降郕自降爾齊人降鄣非鄣欲降也齊降之爾八月癸亥葬紀叔姬魯之徃𦵏皆以正夫人禮九月庚午朔日有食之鼔用牲于社孫氏曰書鼔用牲者譏其用牲爾非謂九月不鼓也冬公及齊侯遇于魯濟濟上聲左傳曰謀山戎也以其病燕故張氏曰簡禮以議軍旅之事杜氏曰濟水歴齊魯界在齊為齊濟在魯為魯濟蓋魯地襄陵許氏曰齊桓伐郳伐鄭伐徐皆以宋人主兵與公㑹城濮而後伐衛與公遇魯濟而後伐戎以是知桓公之霸不自恃也用兵行師每資武于宋桓取䇿於魯莊其治國也一則仲父二則仲父用人之能以為能集人之功以為功遂能力正天下澤被生民齊人伐山戎公羊傳曰此齊侯也趙氏曰伐山戎當書齊侯獻戎捷當書齊人交互致誤爾程子曰蓋互錯一字杜氏曰山戎北狄經書月四書日二大衍歴正月乙巳小甲子冬至二月甲戌大三月甲辰小四月癸酉大五月癸卯小六月壬申大七月壬寅小八月辛未大九月辛丑小經八月癸亥在此月十月庚午大日食經書九月置閏不同也十一月庚子大閏月庚午小十二月己亥大長歴是年閏二月癸亥八月二十三日三十有一年戊午惠王十四年齊霸桓二十三蔡穆十二曹僖八衛懿六晉獻十四鄭文十陳宣三十杞惠十宋桓十九秦成公元年楚成九春築臺于郎何氏曰四方而髙曰臺禮天子有靈臺以候天地諸侯有時臺以候四時登髙望逺人情所樂動而無益於民者雖樂不為也劉氏曰去國而築臺是樂而已矣譏厲民也夏薛伯卒薛侯爵今稱伯降班而告終也小國無可攷不知其名築臺于薛杜氏曰薛魯地六月齊侯來獻戎捷侯字當從趙氏作人齊之將伐戎也甞與魯莊遇于魯濟以謀之伐而得勝故使人獻捷于魯以嘉其謀之中也秋築臺于秦杜氏曰東平范縣西北有秦亭張氏曰寰宇記范縣今屬濮州亭尚存莊公一嵗三築臺政所謂及是時般樂怠敖者冬不雨蓋歴建酉建戌建亥之月凡三月無雨也經書月二書日無大衍歴正月己巳小己巳冬至二月戊戌大三月戊辰小四月丁酉大五月丁卯小六月丙申大七月丙寅小八月乙未大九月乙丑小十月甲午大十一月甲子小十二月癸巳大三十有二年己未惠王十五年齊霸桓二十四蔡穆十三曹僖九衛懿七晉獻十五鄭文十一陳宣三十一杞惠十一宋桓二十秦成二楚成十春城小穀范氏曰小穀魯地孫氏曰曲阜西北有小穀城永嘉薛氏曰莊公六年後無麥苗大無麥禾螟麋􅈮蜚相繼而有大水者三中君尚當少警而公之侈心日起因娶而觀社丹楹刻桷告糴之時有築郿之役次年新廐城諸防去年三築臺而不雨今春又城小穀平嵗猶不可况薦饑而輕用民力乎澄按左傳云城小穀為管仲也而杜氏注謂公感齊桓之徳故為管仲城私邑且釋此地名為在齊之濟北穀城縣唯泰山孫氏以為在魯之曲阜西北胡氏曰孫魯人也而終身學春秋其攷此詳矣髙氏曰先儒以小穀為齊邑魯為管仲城之若然聖人亦當異其文而繫之齊且公雖感齊桓之私豈肯為管仲城邑乎昭十一年傳云齊桓城穀而寘管仲焉齊自有穀如文十一年公及齊侯盟于穀宣十四年公孫歸父㑹齊侯于穀此齊穀也非魯之小穀沙隨程氏曰齊地别有穀在濟北有管仲井非小穀也文十七年宣十四年盟㑹者乃濟北之穀也夏宋公齊侯遇于梁丘左傳曰齊侯為楚伐鄭之故請㑹于諸侯宋公請先見于齊侯張氏曰齊不以霸主自居以梁丘近宋而先之也梁丘在濟州昌邑縣西南髙氏曰梁丘宋地齊侯將㑹諸侯為鄭謀楚而宋公先遇於梁丘宋序齊上者地主也用兵則以主兵者為先盟㑹則以主盟者為先若相遇則以地為賓主皆非其地莫適為主則序以爵而已秋七月癸巳公子牙卒左傳曰初公築䑓臨黨氏見孟任從之生子般公疾問後于叔牙對曰慶父材問於季友對曰臣以死奉般公曰鄉者牙曰慶父材成季使以君命命僖叔待於鍼巫氏使鍼季酖之歸及逵泉而卒公羊傳曰公病召季子曰牙謂我曰魯一生一及君知之矣慶父也存季子曰是將為亂乎俄而牙弑械成季子和藥而飲之公子牙今將爾將而誅焉誅不避兄君臣之義也行誅乎兄隱而逃之使若以疾死然親親之道也沙隨程氏曰牙叔孫氏之祖也左氏以為欲立慶父而季友酖殺之時公年四十有五距薨時尚一月苟以是誅牙則慶父何為尚執國柄而二傳以為將弑公又不近理蓋是見閔公不書即位考例不合故為是異説牙實善終也髙氏曰左氏具載季友殺叔牙之事考之於經全不寓微意以此言之公子牙蓋自卒爾八月癸亥公薨于路寢書月書日謹之書其所詳凶變也路寢正寢也公病遷居正寢而於正寢終焉禮也冬十月己未子般卒己未公穀作乙未般音班左傳曰子般即位次於黨氏共仲使圉人犖賊子般成季奔陳立閔公孫氏曰子般莊公太子未踰年之君也莊公未𦵏故名不薨不地者降成君也此與襄三十一年秋九月癸巳子野卒義同沙隨程氏曰般之卒書日辰書名與襄三十一年子野同蓋亦令終也文十八年冬十月子卒不書日辰不名則故可知也先儒謂君薨子名既𦵏稱子然景王既𦵏矣王子猛猶名是此例不通也胡瑗謂子般非遇弑信然髙氏曰新君未踰年稱子莊公薨般既立不幸而卒三傳皆以為慶父所殺考之於經所書與子野同若以子般為被弑則子野亦豈被弑乎惟文十八年書子卒而不名者乃被弑也何則既書子卒即書夫人姜氏歸于齊蓋文公既薨子赤為宣公襄仲所弑而弑君之賊自立哀姜不能容自歸於父母之國也子般子野皆非被弑而子般特以哀姜慶父之故疑若為其所弑爾春秋别嫌明微深辨乎疑似之際豈有實弑其君而全不寓意哉乃區區曲為之諱乎公子慶父如齊沙隨程氏曰公薨子般卒慶父以國統未定請於霸主而國人立閔公髙氏曰若以慶父弑君而出奔則聖人豈不著其出奔之罪乎知此非出奔也蓋公薨子卒繼嗣未定慶父雖有僥倖之心而身為國卿加以公子之貴有嫌疑之避於是如齊告難蓋以桓公始霸謀定其君及自齊歸魯已立閔慶父始有簒弑之意故明年齊侯使仲孫湫來省難而仲孫謂不去慶父魯難未已也澄按諸說誤謂慶父弑般故有以此為出奔齊者亦有以此謂自托於齊者竊詳閔二年慶父哀姜弑閔公慶父不容於魯國遂出奔莒哀姜於齊親也亦有所憚而不敢歸齊逃罪于邾竟不免於死齊桓霸令如此設使慶父實弑子般果何所恃而遽敢如齊乎齊桓亦何所顧惜何所阿徇而不問其罪乎以此知子般之非弑也不然齊桓寛縱於般之弑而嚴察于閔之弑何其用刑之頗也因左傳事逆失實誤以子般為被弑遂使魯臣虚負縱賊之罪霸主亦受佚罰之誣得孫胡程髙四家一正前誤則見齊桓霸令之光明無可譏者矣狄伐邢狄北狄杜氏曰邢姬姓周公之𦙍國在廣平襄國縣張氏曰今邢州龍岡縣狄前此雖未見於經然自伐邢而滅衛三年之間塗炭兩國首以伐書著其彊已髙氏曰謂之伐者當時諸侯素不能治自正故也襄陵許氏曰春秋戎先見荆次之狄次之而荆暴於戎狄又暴于荆當惠王世戎狄荆楚交伐諸國使無齊桓攘服定之將伊于何底哉經書月三書日三大衍歴正月癸亥大乙亥冬至二月癸巳小三月壬戌大四月壬辰小五月辛酉大六月辛卯小七月庚申大八月庚寅小經七月癸巳在此月九月己未大經八月癸亥在此月十月己丑小十一月戊午大經十月己未在此月十二月戊子小長歴是年閏三月癸巳七月四日癸亥八月五日己未十月二日春秋纂言卷三
