body:
  text: 春秋纂言卷四元吳澄撰閔公名啟方莊公子母哀姜之娣叔姜在位二年史記云名開元年庚申惠王十六年齊霸桓二十五年蔡穆十四年曹昭公班元年衛懿八年晉獻十六年鄭文十二年陳宣三十二年杞惠十二年宋桓二十一年秦成三年楚成十一年春王正月沙隨程氏曰不書即位與隱公同齊人救邢左傳曰管敬仲言於齊侯曰戎狄豺狼不可厭也諸夏親暱不可棄也宴安酰毒不可懐也詩云豈不懐歸畏此簡書簡書同惡相恤之謂也請救邢以從簡書張氏曰管仲請救邢桓公始興救邢之師論語以九合一匡之功歸管仲蓋救諸夏䘏同患皆管仲發其端也夏六月辛酉葬我君莊公十一月乃葬秋八月公及齊侯盟于落姑落公穀作洛左傳曰請復季友也杜氏曰落姑齊地澄按左傳所載去年成季奔陳竊意子般卒後慶父哀姜專國故季友出以避禍此時慶父秉外權哀姜為内主蓋唯恐季友之歸閔公八嵗爾孰能奉之出㑹霸主而為國計者必魯之世臣有不當權而忠于國能如衛之石碏深謀秘計告於霸主請復季友故桓公以霸令召閔公至齊地而與之盟使若復季友之意出於齊而不出於魯故盟以要其信而使魯復之既盟之後桓公使召諸陳而閔公次于郎以待之若不敢背霸主之盟而使季友得以歸魯者季友以霸主之重則慶父不敢去之矣春秋書公及齊侯盟于落姑所以著魯大臣之有謀也季子來歸季者公子友字子者天子大夫之爵而當時諸侯之大夫僭以為稱也凡諸侯之大夫無君在上者不稱名當時閔公幼弱政在大夫魯雖有君若無君然故季友至國慶父接之以大夫見大夫無復有以君召臣之禮此雖慶父之無君而友不露其謀亦姑徇之也君前臣名友不書名所以著魯臣之不知有君也冬齊仲孫來季友既歸而齊桓遣仲孫湫來省魯難書氏不書名者蓋魯臣以兩臣相見之禮接而不復以之見君來下不書其事非聘也其時慶父專權本國之季子歸他國之仲孫來皆大夫自相交際不復知有君矣故上書季子此書仲孫皆不書名以著魯臣無君之罪沙隨程氏曰書仲孫與文十五年華孫同經書月三書日一大衍歴正月丁巳大庚辰冬至二月丁亥小三月丙辰大四月丙戌大五月丙辰小六月乙酉大七月乙卯小經六月辛酉在此月八月甲申大癸丑大暑閏月甲寅小九月癸未大癸未處暑十月癸丑小十一月壬午大十二月壬子小長歴辛酉六月八日二年辛酉惠王十七年齊霸桓二十六蔡穆十五曹昭二衛懿九晉獻十七鄭文十三陳宣三十三杞惠十三宋桓二十二秦成四楚成十二春王正月齊人遷陽遷者强以兵力刼遷之也與宋人遷宿同謂遷其民於他處而取其地杜氏曰陽國名張氏曰漢志東海郡陽都縣是其國也夏五月乙酉吉禘于莊公吉者言䘮制中未可以吉祭也禘者言羣公廟不當用禘樂也主未入廟故不稱莊宫而但稱莊公也張氏曰禘為天子宗廟之大祭不王不禘諸侯不得用之魯有禘樂雖先王所賜止可用於周公之廟不可施於莊公況䘮禮二十五月而祥又兩月而禫然後以吉祭易䘮祭今莊公之薨纔二十二月主未遷附嗣君幼弱而以吉禮盛樂用於神主蓋出於哀姜慶父樂哀謀篡而為之又非他日僭禮之所得比矣秋八月辛丑公薨左傳曰公傅奪卜齮田公弗禁共仲使卜齮賊公於武闈澄按弑而書薨而不地義與隱公同九月夫人姜氏孫于邾孫去聲左傳曰共仲通于哀姜哀姜欲立之閔公之死也哀姜與知之故孫于邾澄按夫人不奔齊而奔邾者蓋有淫行與弑謀身負二惡自歉於心而畏齊桓故不敢歸齊也公子慶父出奔莒左傳曰成季以僖公適邾共仲奔莒乃入立之以賂求共仲于莒莒人歸之及宻使公子魚請不許哭而徃共仲曰奚斯之聲也乃縊張氏曰慶父與哀姜謀弑閔公欲自立而不遂此魯國秉禮之驗也方季友適邾之時使魯國無人安能逐姜氏慶父哉季友既立僖則當正慶父之罪致辟於甸人以致兩弑其君之討乃以賂求于莒不許其入而已又立孟氏與叔牙同無輕重之别豈非邦憲之失與冬齊高子來盟來盟蓋與季友盟立僖公也髙傒不書名而書子者其時魯無君季友接之以二臣相見也十有二月狄入衛左傳曰衛懿公及狄人戰於滎澤衛師敗續遂滅衛衛之遺民男女七百有三十人益之以共滕之民為五千人立戴公以廬于曹齊侯使公子無虧帥車三百乗甲士三千人以戍曹歸公乗馬祭服五稱牛羊豕雞狗皆三百與門材歸夫人魚軒重錦三十兩杜氏曰戴公其年卒立文公孔氏曰此年之末文公即位戴公為君不過十數日爾張氏曰衛之滅非特懿公好鶴失人心自惠公即位宣姜淫恣耽樂忘政習貫為常公又重之亡形已具故狄人一至而渙然離散國隨以亡非齊桓救而封之則康叔之後至此無唯類矣桓公迎其遺民立文公而為之建國家社稷此所以止書入也以衛懿春秋初時大國方興齊侯胥命欲為方伯才四十年淪於亡滅故治國必先齊家而􅁋亂之禍不篡則滅可不戒哉鄭棄其師左傳曰鄭人惡髙克使帥師次於河上久而弗召師潰而歸髙克奔陳澄聞之吾夫子曰以不教民戰是為棄之古人視民如赤子故平日教之習戰一旦不得已而用之於軍旅欲其完師而歸一無所損也今鄭無戰鬬之事乃使其臣將兵于外久而弗得歸致其衆潰散非棄其民而何哉經書月五書日二大衍歴正月辛巳大乙酉冬至二月辛亥小三月庚辰大四月庚戌小五月己卯大乙酉七日六月己酉小七月戊寅大八月戊申大九月戊寅小經八月辛丑在此月十月丁未大十一月丁丑小十二月丙午大長厯是年閏五月辛丑八月二十五日春秋纂言卷四
