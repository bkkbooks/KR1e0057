body:
  text: 春秋纂言卷七元吳澄撰宣公名倭一名接文公妾敬贏之子在位十八年夫人穆姜元年癸丑匡王五年晉霸靈十三年蔡文四年曹文十年衛成二十七年鄭穆二十年陳靈六年杞桓二十九年宋文三年齊惠公元元年秦共公稻元年楚莊六年春王正月公即位凡繼弑君不即位者以君父遭弑而賊未討則太子不忍行即位禮或國亂人心危疑不暇行即位禮也仲遂以臣弑君宣公以庶奪嫡方以子惡被弑而已得立為得志故安然行即位禮公子遂如齊逆女胡氏曰宣公懼於見討故結昏于齊為自安計越典禮而逆女如此其亟而不顧者必敬嬴公子遂立接之始謀也高氏曰不待喪畢而公子遂遽如齊逆女者恐姻好久不通而齊人來討也且娶于齊則公因得以列于㑹而諸侯不復討矣澄按負簒弑之罪而急于結齊昏以定其位此惡之大喪娶卿逆之非禮則其惡之小者爾三月遂以夫人婦姜至自齊髙氏曰不直書夫人婦姜至自齊而稱遂以者明公子遂不當以夫人歸也婚禮莫重乎親迎豈容他人得以之歸哉公子遂葢公族之尊者尤不可也不稱公子一事再見也文公逆婦姜于齊不稱夫人自逆故也此稱夫人者臣下之辭也婦者有姑之辭無姑則專以夫人之禮至有姑則以婦禮至姑者敬嬴以嬖妾私事襄仲以屬其子弑世嫡兄弟黜主君夫人乃援成風故事即以子貴為國母今斬焉在衰絰之中而請昏納婦故因夫人至特稱婦姜以顯敬嬴妾也而姑之李堯俞曰經稱婦姜者不言氏婦人言氏以配姓葢欲稱謂之順也春秋於内女則稱叔姬於外女則不可以叔伯言之故夫人不言諡不稱婦則必以氏配之今此婦而言姜加氏則稱謂之繁也亦猶文姜成風以諡稱而不以氏稱也如成十四年書婦姜氏者趙氏曰繆増也夏季孫行父如齊左傳曰如齊納賂以請㑹高氏曰公既昏矣然後季文子如齊納賂諸列于㑹蓋春秋時凡國君不以其道立苟得一預於諸侯之㑹則他國不得復討其罪所以季文子不憚自行者欲假大國之權以定宣公之位也宣公之位定則一時臣子黨亂誤國之罪庶皆可以逃矣昔人稱季文子三思而後行今當魯國喪禍之際而舉動乖錯如此安在其為三思哉是必思之過多而方寸亂矣故孔子譏之吕氏曰君母不正孽子簒立而國之大臣恃大國以免施旌肆肆無所忌憚行父名大夫也而猶若是先王之澤盡矣張氏曰文公世子之死在官當誅者公子遂其首行父次之晉放其大夫胥甲父于衛左傳曰晉人討不用命者杜氏曰胥甲晉下軍胥臣之子文公十二年戰河曲不肯薄秦於險蘇氏曰胥甲趙穿其罪一也放胥甲而捨趙穿穿盾之族子也胡氏曰秦晉戰河曲撓臾駢之謀者趙穿也若討其不用命當以穿為首而獨放胥甲父則以趙盾當國而庇其族子也澄按河曲之戰及今八年矣豈有不用命之罪八年而後討哉必胥甲父以他事取惡於趙盾而盾逐之也公㑹齊侯于平州左傳曰㑹于平州以定公位杜氏曰平州齊地在泰山牟縣西張氏曰後漢志瑯琊國陽都故地有牟臺註云平州在縣西凡亂臣賊子之所以不敢縱其欲者以有霸主大國能討之也齊乃魯之鄰其力足以正魯而惠公不明于義利邪正之辨始許仲遂以亂魯之適庶終㑹平州以定賊子之位則亂賊復何畏而不逞哉晉為盟主而齊宋弑君威弗能加魯亂不治見晉之無能為也公子遂如齊左傳曰如齊拜成胡氏曰遂一再見千經矣拜成又書者著其始終成就弑立之謀六月齊人取濟西田左傳曰為立公故以賂齊也杜氏曰濟西故曹地僖三十一年晉文以分魯吕氏大圭曰春秋書取田邑有伐而書取者八如隠四年莒人伐杞取牟婁十年公敗宋師取郜取防僖二十二年公伐邾取須句二十六年公以楚師伐齊取穀三十三年公伐邾取訾婁宣四年公伐莒取向九年齊侯伐萊取根牟十年公孫歸父伐邾取繹是用兵力以取之也有直書取者如僖三十一年春取濟西田我取之曹也此年齊人取濟西田齊取之我也成二年取汶陽田以鞌之戰而齊以歸我也此則不用兵力而取之也張氏曰桓公簒立求援于鄭而誘以許田宣公奪嫡主齊以自立而賂以濟西以利自固前後一轍使鄭莊齊惠不貪其利則桓宣必不能以自立矣秋邾子來朝文十四年邾伐我南鄙今六年來朝不詳其故楚子鄭人侵陳遂侵宋左傳曰宋人之弑昭公也晉荀林父以諸侯之師伐宋宋及晉平宋文公受盟于晉又㑹諸侯于扈將為魯討齊皆取賂而還鄭穆公曰晉不足與也遂受盟于楚陳共公卒楚人不禮焉陳靈公受盟于晉故楚子侵陳宋胡氏曰鄭以宋人弑君晉不能討以此罪晉為不足與今乃附楚以亟病中國何義乎書侵陳遂侵宋者以見此師為不義掠境侵暴非能聲宋之罪也吕氏大圭曰春秋盟㑹而書楚子自孟始征伐而書楚子自侵陳始向也次厥貉嘗書楚子矣然未嘗加兵於中國也伐䴢亦書楚子矣然不過加兵于其與國也征伐而書爵者皆伯之之辭侵蔡伐楚書齊侯霸齊侯也侵曹伐衛書晉侯霸晉侯也侵陳侵宋書楚子春秋固霸楚子乎書齊侯晉侯喜中國之猶有霸也書楚子傷中國之無霸而荆蠻得以執霸權也晉趙盾帥師救陳髙氏曰鄭連楚以侵陳與宋晉何為獨救陳曰以楚兵主在于陳因加于宋晉人踰宋而救陳救陳而師退是救宋也故舉救陳則及宋舉救宋則不及陳矣胡氏日傳稱師救陳宋經不書宋聖人削之也前方以不能討宋諸侯㑹而不序今若書救宋則典刑紊矣宋公陳侯衛侯曹伯㑹晉師于棐林伐鄭棐公作斐左傳曰楚蒍賈救鄭遇于北林囚晉解揚晉人乃還杜氏曰棐林鄭地滎陽宛陵縣東南有林鄉澄曰晉師即趙盾救郊之師也以四國之君在㑹故不稱趙盾而稱晉師也陳先代之後而受侵逼霸主所宜救也鄭以畿内之國而附蠻夷霸主所當伐也惜乎晉霸不競荆蠻方彊晉卿能致四國之君聲罪致討不能服鄭而反遺楚禽中國之不振可傷也冬晉趙穿帥師侵崇崇公作栁左傳曰晉欲求成於秦趙穿曰我侵榮秦急崇必救之吾以求成焉趙穿侵崇秦弗與成杜氏曰崇秦之與國任公輔曰按地譜商有崇國在京兆鄠縣甘亭高氏曰晉方病楚而欲得秦欲求成而反加兵於他人之國適足以衆晉之敵耳此謬計也晉人宋人伐鄭左傳曰以報北林之役于是晉侯侈趙宣子為政驟諫而不入故不競于楚澄按棐林之㑹晉合四國以伐鄭而無功故至于再伐不復可致三國伐鄭者為宋也故獨與宋連兵高氏曰宋怨鄭與楚之侵也復請晉伐鄭晉亦以前救之無功也遂連兵伐之夫晉以貪賂致諸侯之叛不能退而自責乃謀動干戈於外以遂宋之復怨况宋人弑君豈可與之合兵乎經書月三書日無大衍歴正月己酉大戊午冬至二月己卯大三月己酉小四月戊寅大五月戊申小六月丁丑大七月丁未小八月丙子大九月丙午小十月乙亥大十一月乙巳小十二月甲戌大二年甲寅匡王六年崩晉霸靈十四弑蔡文五曹文十一衛成二十八鄭穆二十一陳靈七杞桓三十宋文四齊惠二秦共二楚莊七春王二月壬子宋華元帥師及鄭公子歸生帥師戰于大棘宋師敗績獲宋華元左傳曰鄭公子歸生受命于楚伐宋華元樂吕御之戰于大棘宋師敗績囚華元獲樂吕及甲車四百六十乗俘二百五十人馘百人宋人以兵車百乗文馬百駟以贖華元于鄭半入華元逃歸杜氏曰大棘在陳留襄邑縣南張氏曰襄邑今屬拱州澄曰鄭附楚侵中國之陳宋晉為宋故再伐鄭而皆無功鄭受楚命一戰宋而乃大勝楚人之氣益張矣李氏堯俞曰春秋三十四戰主客並書帥師者惟此及哀二年趙鞅罕達而已高氏曰元年秋鄭人與楚子侵宋宋人既為棐林之役以報之是冬又與晉人伐鄭一役而兩報之遂起此役今鄭師之來宋當明大義以諭之否則慎固封守使鄭不得而犯焉華元乃遽帥師出與之戰於是三軍大敗以至見獲不能效死徒殄民辱國而已以見中國因夷狄之故而自相殘如此吕氏大圭曰春秋書戰言大夫帥師自此始自是而後若晉荀林父衛孫良夫魯季孫行父莊孫許叔孫僑如公孫嬰齊國書皆大夫帥師而戰惟晉趙鞅鄭罕達戰于鐵及此年戰大棘而稱帥師者其衆敵也春秋書獲者七惟齊國書及此年宋華元書敗績者身見獲而師又敗也大夫生死皆言獲鄭獲宋華元生也吳獲陳夏齧吳獲齊國書死也蓋存之殺之皆在既獲之後爾秦師伐晉左傳曰以報崇也遂圍焦晉趙盾救焦胡氏曰晉用大師于崇乃趙穿私意而無名也故書侵秦人為是興師而報晉則問其無名之罪也故書伐夏晉人宋人衛人陳人侵鄭左傳曰晉趙盾遂自隂地及諸侯之師侵鄭以報大棘之役楚鬬椒救鄭曰能欲諸侯而惡其難乎遂次于鄭以待晉師盾曰彼宗競于楚殆將斃矣姑益其疾乃去之澄曰晉于興諸侯之師為宋報鄭師出無名又畏楚之救而還師髙氏曰自是楚與晉爭晉不能競反有弑逆之禍於是楚益自肆明年遂有問鼎之事秋九月乙丑晉趙盾弑其君夷臯臯公作左傳曰晉侯飲趙盾酒伏甲將攻之其右提彌明知之趨登曰臣侍君宴過三爵非禮也遂扶以下公嗾夫獒焉明搏而殺之盾曰棄人用犬雖猛何為鬬且出提彌明死之靈輒與為公介倒㦸以禦公徒而免之遂自亡也趙穿攻靈公于桃園宣子未出山而復澄曰趙盾專晉國之政幾二十年境内境外知有盾而不知有靈公公既長不堪其專遂欲殺盾提彌明扶盾出走明既搏殺公獒又與公徒鬬而死則盾之私屬與公徒敵無復有臣禮矣靈輒内叛倒㦸以禦内兵故盾得幸免然君臣既為仇敵非盾弑公則公殺盾勢固不兩立也穿盾之族子平日所愛信之人也弑公而盾乃復穿之弑為盾弑也盾為首惡穿特承意行事者爾此正與魏帝髦之弑同髦惡司馬昭之專率徒以攻昭昭倉皇奔避賈充謂成濟曰司馬公養汝等政在今日於是成濟抽戈弑髦而昭得免於誅夫弑髦賈充發言成濟操刃而皇極經世書及通鑑綱目皆書曰魏司馬昭弑其君髦曷嘗歸獄於賈充與成濟哉趙盾之專猶司馬昭之專也晉靈之欲殺盾猶曹髦之欲殺昭也趙穿之弑晉靈猶成濟之弑曹髦也趙盾陽為不知謀以求自免其弑君之罪將誰欺乎夫子書曰晉趙盾弑其君夷臯誅首惡也故曰春秋成而亂臣賊子懼亂臣謂趙盾也賊子謂許世子止也彼二人者弑君弑父而欲欺人以為非己所弑其懼者何以聖人不可欺而直筆不之赦也自三傳以來説春秋者多方為盾止分釋則是亂臣賊子不可以欺聖人而乃可以欺後儒也靈公在位十四年趙盾使趙穿逆襄公之弟黑臋于周而立之是為成公冬十月乙亥天王崩匡王也在位六年其弟瑜立是為定王經書月三書日三大衍歴正月甲辰小癸亥冬至經二月壬子在此月二月癸酉大三月癸卯小四月壬申大五月壬寅大六月壬申小七月辛丑大八月辛未小九月庚子大乙丑二十六日十月庚午小乙亥六日十一月己亥大戊辰處暑閏月己巳小十二月戊戌大長歴是年閏五月壬子二月二日乙丑九月二十七日乙亥十月八日三年乙卯定王元年晉霸成公黒臋元年蔡文六曹文十二衛成二十九鄭穆二十二卒陳靈八杞桓三十一宋文五齊惠三秦共三楚莊八春王正月郊牛之口傷改卜牛牛死乃不郊猶三望公羊傳曰郊則必祭稷養牲養二卜帝牲不吉則扳稷牲而卜之帝牲在于滌三月于稷者唯具是視左傳曰望郊之屬也不郊亦無望可也杜氏曰牛不稱牲未卜日也齊氏旨要曰牛卜日曰牲今未卜日尚為祭牛范氏曰牛無故其口自傷易牛改卜復死乃廢郊禮髙氏曰魯僭郊禮久矣隱桓莊閔不書者聖人不敢無故斥言君父之過故因變異而書也胡氏曰乃不郊者為牛之口傷改卜而牛又死也不然郊矣禮為天王服斬衰周人告喪於魯史策已書而未葬也祀帝于郊夫豈其時而或謂不以王事廢天事禮乎張氏曰此又因事之變以明魯郊之非禮也而僭禮之中復有忘哀從吉之罪三年之喪乃臣子斬衰奔赴之時豈可僭天子越紼行事之禮此春秋所以特書之并書猶三望以譏其可已而不已也葬匡王髙氏曰前期而葬者簡也王室微諸侯不至也楚子伐陸渾之戎陸渾之戎公作奔賁戎左傳曰楚子伐陸渾之戎遂至于雒觀兵於周疆定王使王孫滿勞楚子楚子問鼎之大小輕重對曰在徳不在鼎周德雖衰天命未改鼎之輕重未可問也夏楚人侵鄭左傳曰晉侯伐鄭及郔鄭及晉平士㑹入盟楚人侵鄭鄭即晉故也胡氏曰鄭以晉靈不君取賂釋賊為不足與是也而徃從楚非矣今晉成初立背僭竊而歸諸夏是反正也春秋大改過許遷善不書晉伐鄭鄭及晉平者與鄭伯之能反正也故獨書楚人侵掠諸夏之罪秋赤狄侵齊赤秋始見經張氏曰赤狄狄之别國孔疏云謂之赤狄白狄者俗尚赤衣白衣也地譜洛州春秋赤狄之地髙氏曰見狄之族類已分矣襄陵許氏曰楚侵其南狄侵其北天下楝撓之時也宋師圍曹左傳曰宋文公即位三年殺母弟須及昭公子武氏之謀也使戴桓之族攻武氏于司馬子伯之館盡逐武穆之族武穆之族以曹師伐宋宋師圍曹報武氏之亂也髙氏曰武氏之亂非曹所致也宋不能内睦九族而興兵以圍人之國不亦左乎冬十月丙戌鄭伯蘭卒鄭穆公也在位二十二年子夷嗣是為靈公𦵏鄭穆公葬速禮不備也經書月二書日一大衍歴正月戊辰小旦日冬至二月丁酉大三月丁卯大四月丙申大五月丙寅小六月乙未大七月乙丑小八月甲午大九月甲子小經十月丙戌在此月十月癸巳大十一月癸亥小十二月壬辰大長歴丙戌十月二十五日四年丙辰定王二年晉霸成二蔡文七曹文十三衛成三十鄭靈公夷元年弑陳靈九杞桓三十二宋文六齊惠四秦共四卒楚莊九春王正月公及齊侯平莒及郯莒人不肯杜氏曰莒郯二國相怨故公與齊侯共平之髙氏曰莒郯相怨而郯乃魯昏姻之國公欲為郯平莒而挾齊以為重故及齊侯公之義不足以服莒之心莒所以不肯也肯者心以為然而從之也曰莒人見其不肯者非特其君也公伐莒取向向舒亮切左傳曰平國以禮不以亂伐而不治亂也以亂平亂何治之有杜氏曰向莒邑東海承縣東南有向城張氏曰宣公平二小國若出於公不必假齊一言而彼已服今挾齊為重而莒尚不肯伐莒而齊不復與復取向以自益著宣公之公而終之以利也髙氏三曰大國以好平兩小國之怨而且不能不知自反而取邑於人亦已甚矣公既無以得莒後書郯伯姬來歸則郯亦不能固其好也然向本魯地桓十六年城向是也後入于莒豈魯與莒有好而向還莒歟至此莒弗肯平然後公復取向也秦伯稻卒秦共公也左位五年子桓公嗣夏六月乙酉鄭公子歸生弑其君夷夷靈公也嗣位一年鄭人立穆公之庶子堅是為襄公據諸家之説皆謂公子宋弑君歸生不能誅宋而反從其邪謀故為首惡然宋實手弑其君之賊何乃得免于罪乎左傳所載事蹟猥陋蓋不足信而諸家為傳所惑故生曲説以從傳也歸生貴戚之卿秉國重權嗣君新立必有所不獲於其君者因宋之有邪謀陽為畜老憚殺之言隂實假手于宋以除其君此亂臣之首而宋特其從也赤狄侵齊高氏曰以齊之彊而連年為狄所侵則惠公之無政可知矣秋公如齊高氏曰狄在齊境而公徃朝之宣公之無政也又可知矣公至自齊胡氏曰宣公比年如齊而皆至者危之也張氏曰危之者與桓二年公至自唐同意冬楚子伐鄭左傳曰鄭未服也杜氏曰前年楚侵鄭不獲成故曰未服髙氏曰中國諸侯不問鄭國弑君之罪而夷狄興兵以討之所以病中國也經書月二書日一大衍歴正月壬戌大甲戌冬至二月壬辰小三月辛酉大四月辛卯小五月庚申大經六月乙酉在此月六月庚寅小傳七月戊戌在此月七月己未大八月己丑小九月戊午大十月戊子小十一月丁巳大十二月丁亥小長歴乙酉六月二十七日五年丁巳定王三年晉霸成三蔡文八曹文十四衛成三十一鄭襄公堅元年陳靈十杞桓三十三宋文七齊惠五秦桓公榮元年楚莊十春公如齊髙氏曰公以不義得國故亟朝於齊且公始即位公子遂季孫行父一歲而三聘齊至是甫及三時而再朝謹事大國以自固也夏公至自齊左傳曰齊髙固使齊侯止公請叔姬焉髙氏曰春如齊而夏至者以齊人止公彊為髙固請昏也故書至以危之秋九月齊高固來逆子叔姬左逆下無子字左傳曰卿自逆也高氏曰古者三十而娶五十而爵為大夫故大夫無出竟親迎者髙固為齊正卿而始與魯昏越竟逆女非禮矣胡氏曰嫁女於大夫而不使大夫主之公自為主厭尊毁列卑朝廷慢宗廟矣鄭國褊小楚公子圍之貴驕彊大來娶于鄭子産辭而却之使館于外宣公以國君而逼于髙固彊委禽焉而不能止春秋詳書此辱為後世鑒澄曰宣公負簒國之罪倚齊以安數朝數聘卑身事齊猶以為未甚至齊之臣彊取其女甘心與之而不敢違蓋身為不義故忍恥忍辱而屈於人下如此曹子臧吴季札彊與之國義不肯受不降其志而常伸於人上者果何人哉叔孫得臣卒不書日文闕冬齊高固及子叔姬來左傳曰反馬也胡氏曰禮嫁女留其送馬不敢自安及廟見成婦遣使反馬高固親來非禮也况是逆未易嵗遽歸寧乎髙氏曰歸寧常事不書反馬亦常事不書髙固為齊卿非王事不當出境既未娶而為國卿又不可以國卿而有新昏反馬之禮也啖子曰大夫非公事與妻出境非禮也時叔姬初嫁未合歸寧楚人伐鄭楚數犯中國也經書月一書日無大衍歴正月丙辰大己卯冬至二月丙戌大三月丙辰小四月乙酉大五月乙卯小六月甲申大七月甲寅小壬午夏至八月癸未大壬子大暑閏月癸丑小九月壬午大旦日處暑十月壬子小十一月辛巳大十二月辛亥小六年戊午定王四年晉霸成四蔡文九曹文十五衛成三十二鄭襄二陳靈十一杞桓三十四宋文八齊惠六秦桓二楚莊十一春晉趙盾衛孫免侵陳左傳曰陳及楚平晉荀林父帥師救鄭伐陳陳即楚故也髙氏曰趙盾前㑹衛侯救陳今更與衛孫免加兵于其國故書侵以正主盟者之罪雖以陳背晉即楚亦以晉救之無功故也夏四月秋八月螽髙氏曰書八月者惟八月有之非歴時也螽為農災王道所重今以月書則為災不久輕於以時書者矣冬十月經書月三書日無大衍歴正月庚辰大甲寅冬至二月庚戌小三月己卯大四月己酉大五月己卯小六月戊申大七月戊寅小八月丁未大九月丁丑小十月丙午大十一月丙子小十二月乙巳大長歴是年閏五月七年己未定王五年晉霸成五蔡文十曹文十六衛成三十三鄭襄三陳靈十二杞桓三十五宋文九齊惠七秦桓三楚莊十二春衛侯使孫良夫來盟左傳曰孫桓子來盟始通且謀㑹晉也胡氏曰是盟衛欲為晉致魯而魯專事齊初未與晉通也必有疑焉而衛侯任其無咎故遣良夫來為此盟夏公㑹齊侯伐萊杜氏曰萊國東萊黄縣張氏曰今登州黄縣有萊山胡氏曰平莒及郯魯欲也故書及伐萊齊志也故書㑹齊合黨連兵恃彊陵弱而宣公惟命之從也高氏曰公方與衛盟將復從晉而又應齊侯之命興兵以陵弱小之國此又取辱之道也秋公至自伐萊髙氏曰為齊興兵逾時而歸故以伐萊至大旱胡氏曰公與齊侯合黨連兵恃彊陵弱軍旅之後必有凶年言民以征役怨咨之氣感動天變而旱乾作矣冬公㑹晉侯宋公衛侯鄭伯曹伯于黑壤左傳曰鄭及晉平公子宋之謀也故相鄭伯以㑹晉侯之立也公不朝焉又不使大夫來聘晉人止公于㑹盟于黄父啖氏曰經但言㑹傳作盟不與經合又見公止亦近誣經書月無書日無大衍歴正月乙亥小己丑冬至二月甲辰大三月甲戌小四月癸卯大五月癸酉小六月壬寅大七月壬申小八月辛丑大九月辛未大十月辛丑小十一月庚午大十二月庚子小八年庚申定王六年晉霸成六蔡文十一曹文十七衛成三十四鄭襄四陳靈十三杞桓三十六宋文十齊惠人秦桓四楚莊十三春公至自㑹宣公簒立自疑而不敢㑹晉衛欲為晉致魯故去春使孫良夫來盟而後去冬公與黒壤之盟縱使無左傳所記止公不得與盟之辱亦必懐疑而自危故此書至而自是不敢如晉矣夏六月公子遂如齊至黄乃復公羊傳曰有疾也髙氏曰不稱有疾者大夫受命而出雖死以尸將命豈可以疾而廢君命耶張氏曰黄齊境上地書至黄乃復與公孫敖不至而復同罪其違君命也辛巳有事于太廟仲遂卒于垂有事于太廟常事不書欲知仲遂以祭之日而卒故書遂不書公子上文已有公子字史文從簡仲者遂之字也卒而以字加於名之上者賜之族而以其字為氏使世為卿如季友之例也張氏曰垂齊地非魯境故書也壬午猶繹萬入去籥辛巳日祭壬午祭之明日胡氏曰繹者祭之明日賓尸也猶者可已之辭禮大夫卒當祭則不告終事而聞則不繹不告者盡肅敬之誠於宗廟不繹者全始終之恩於臣子今仲遂國卿也卒而猶繹則失遇臣之禮矣吕氏曰萬舞文武二舞之縂名籥舞文舞之别名文舞又謂之羽舞蓋文舞吹籥秉翟羽也萬入去籥者文武二舞俱入於二舞中去文舞吹籥以其有聲也去其有聲而用其舞者仲遂卒於正祭之日則次日已聞之行吉禮於方聞喪之時雖用舞而僅去其有聲者是知其不可而猶為之也戊子夫人嬴氏薨嬴公榖作熊杜氏曰宣公母也高氏曰此文公之妾也何以稱夫人薨援成風之例僭也胡氏曰自成風事季友而屬其子及僖公得國立為夫人嫡妾亂矣敬嬴又私事襄仲而屬宣公援例以立晉師白狄伐秦左傳曰白狄及晉平㑹晉伐秦張氏曰白狄今丹州延州銀夏之地白狄秦同壤之國也晉與秦自侵崇啟釁七年猶未已與白狄為昏結以伐秦自此至成十三年吕相絶秦之辭皆連兵之事髙氏曰晉不能糾合諸侯以興霸業乃外連白狄以伐秦殽之役書晉人及姜戎此不言反者以傳考之白狄為主也經先晉者不與白狄之得主兵也伯國而乃以兵屬人晉之恥也楚人滅舒蓼蓼榖作鄝左傳曰楚為衆舒叛故伐舒蓼滅之楚子疆之及滑汭盟吴越而還杜氏曰舒蓼二國名或曰僖三年經書徐人取舒文五年傳記楚公子變滅蓼彼蓋上義陽之蓼不與羣舒近其國已滅矣此舒蓼則如舒庸舒鳩蓋羣舒之别種非二國也秋七月甲子日有食之既冬十月己丑葬我小君敬嬴雨不克𦵏敬嬴公榖作頃熊庚寅日中而克葬榖梁傳曰𦵏既有日不為雨止禮也雨不克𦵏喪不以制也胡氏曰卜葬先逺日以避不慎也諸侯相朝與旅見天子大雨霑服失容則廢矧送終大事人情所不忍遽者反可冒雨不待成禮而𦵏乎潦車載簑笠士喪禮也有國家者乃不能為雨備何也襄陵許氏曰子惡之弑謀自敬嬴故春秋因其不克𦵏而著咎徵焉君子於是乎知有天道城平陽杜氏曰泰山平陽縣張氏曰今鄒縣南有平陽城髙氏曰懼晉故也方舉大喪又城平陽重困人力也楚師伐陳髙氏曰陳以晉衛見侵復棄楚而從晉故楚以為討稱師稱伐所以譏其始謀之失也然晉不能救陳陳遂復即楚經書月三書日六大衍厯正月己巳大己未冬至二月己亥小二月戊辰大四月戊戌小五月丁卯大丙申榖雨閏月丁酉小六月丙寅大丁卯小滿辛巳十六日壬午十七日戊子二十三日七月丙申小八月乙丑大九月乙未小十月甲子大己丑二十六日庚寅二十七日經書七月甲子日食程氏公説曰杜預長厯自僖十二年至文元年五年一閏者二四年一閏者三失二閏焉又自文十六年至宣十年四年一閏者三又失一閏焉預厯七月朔不入食限甲子晦亦不入食限大衍厯十月甲子朔日食黄道命五度半十一月甲午小十二月癸亥大長厯辛巳六月十七日己丑十月二十五日九年辛酉定王七年晉霸成七年蔡文十二曹文十八衛成三十五卒鄭襄五陳靈十四杞桓三十七宋文十一齊恵九秦桓五楚莊十四春王正月公如齊孫氏曰公有母喪而逺朝彊齊無哀甚矣公至自齊胡氏曰經於如齊每行必至深罪之也夏仲孫蔑如京師左傳曰王使來徴聘髙氏曰信斯言也益見王室之微矣胡氏曰宣公享國九年再朝齊矣於周僅一徃聘歲首月朝齊夏使大夫聘京師比事而惡自見齊侯伐萊襄陵許氏曰赤狄北侵齊不敢報萊不伐齊而齊亟伐之可以觀惠公畏彊陵弱矣秋取根牟杜氏曰根牟近魯國也瑯邪陽都縣東有牟鄉劉氏曰附庸之國也髙氏曰蓋萊邑也七年公㑹齊侯伐萊此齊侯再伐公雖不與伐而乗危取之也昭八年傳云大蒐于紅自根牟至于商衛八月滕子卒昭公也子文公嗣髙氏曰自隠七年書滕侯卒至此始書滕子九月晉侯宋公衛侯鄭伯曹伯㑹于扈左傳曰討不睦也髙氏曰復謀齊也齊與諸侯不睦而魯獨事之故公不與㑹晉荀林父帥師伐陳陳不來㑹即楚故也去年楚伐陳晉不能救今乃伐之不義甚矣辛酉晉侯黑臋卒于扈成公也在位七年其子獳嗣是為景公冬十月癸酉衛侯鄭卒成公也在位三十五年其子速嗣是為穆公胡氏曰晉成公不葬魯不㑹也衛成公不葬亦魯不㑹也宋人圍滕左傳曰因其喪也胡氏曰滕小國又方有喪所宜矜哀弔恤而用兵圍之不仁甚矣楚子伐鄭髙氏曰楚子聞晉侯卒于扈以重兵來討鄭伯之貳於是鄭復與楚平晉郤缺帥師救鄭髙氏曰鄭已與楚平矣救之無益也自是晉楚交伐鄭陳殺其大夫洩冶洩公榖作泄左傳曰陳靈公與孔寧儀行父通於夏姬皆衷其衵服以戲于朝洩冶諫曰公卿宣淫民無效焉且聞不令君其納之公曰吾能改矣公告二子二子請殺之公弗禁遂殺洩冶胡氏曰稱國以殺者君與用事大臣同殺之也冶以諫殺身者也殺諫臣者必有亡國弑君之禍此為徵舒弑君楚子滅陳之端經書月四書日二大衍歴正月癸巳大庚子冬至二月癸亥小三月壬辰大四月壬戌小五月辛卯大六月辛酉小七月庚寅大八月庚申小經九月辛酉在此月九月己丑大十月己未小癸酉十五日十一月戊子大十二月戊午小長歴九月辛酉亦在八月癸酉十月十六日十年壬戌定王八年晉霸景公獳元年蔡文十三曹文十九衛穆公速元年鄭襄六陳靈十五弑把桓三十八宋文十二齊惠十卒秦桓六楚莊十五春公如齊公至是四朝齊矣公至自齊齊人歸我濟西田左傳曰齊侯以我服故歸濟西之田杜氏曰元年以賂齊也不言來公如齊因受之澄按公在齊而齊以田歸之非遣使來致也故不書來歸胡氏曰宣公于齊順其所欲既以女妻其臣又㑹伐萊又每嵗徃朝於齊廷惠公恱其順事已而以所取濟西田歸之也髙氏曰元年書齊人取濟西田蓋魯以濟西之田賂齊而齊人取之也至是而歸者公比年朝齊齊侯感公朝事之勤因其請而歸之也夫魯之分地先君受之于天子豈可失墜又况負簒逆之罪賂以免討乎齊人取弑逆之賂以縱惡故其取其歸皆謹書之然其它歸田未有言我而此獨曰我濟西田者獨此本魯田也若哀八年歸讙及鄆闡定八年齊人歸鄆讙龜陰田皆魯侵諸侯而得之非周公之本封也既本它國之田故不言我鄆讙龜陰田特曰來歸者夾谷之㑹孔子相焉責以禮義齊人自服而來歸也它祇書歸者皆因請而得之爾夏四月丙辰日有食之己巳齊侯元卒惠公也在位十年其子無野嗣是為頃公齊崔氏出奔衛左傳曰崔杼有寵於惠公髙國畏其偪也公卒而逐之公羊傳曰稱崔氏譏世卿也張氏曰特書其氏見崔杼之宗彊於齊故勢足以偪髙國今日雖逐之而尚能復歸於齊如崔成之徒後日卒自遺滅宗之禍豈非族大勢張而不知制節謹度卒至凶于家禍于國也歟孫氏曰東遷之後天子諸侯之大夫皆世書尹氏譏天子之大夫書崔氏譏諸侯之大夫髙氏曰隠三年書尹氏卒昭三十三年書尹氏立王子朝又三年書尹氏以王子朝奔楚自隠至昭二百年矣而尹氏世執國政故卒有子朝之難而專廢立之權也此年書齊崔氏出奔衛至襄二十三年書齊崔杼弑其君光自宣至襄五十餘年崔氏世為齊大夫故卒有弑君之禍也春秋之時尊莫如周彊莫如齊而世卿之禍如此尹氏崔氏聖人於世卿之中擇其至彊而為害之深者以為戒也公如齊左傳曰如齊奔喪杜氐曰公親奔喪非禮也五月公至自齊胡氏曰春如齊朝夏復奔其喪若是雖不至可也而皆至者甚之也癸巳陳夏徴舒弑其君平國左傳曰陳靈公與孔寧儀行父飲酒於夏氏公謂行父曰徴舒似汝對曰亦似君徵舒病之公出自其廏射而殺之二子奔楚澄曰靈公在位十五年子午嗣是為成公成公不討弑君父之賊則知靈公之惡播於國人而徴舒之罪國人所弗憝也胡氏曰禍莫大于拒諫而殺直臣忠莫顯於身見殺而其言驗洩冶所謂不憚斧鉞盡言於其君者正謂靈公君臣通于夏徵舒之家恐其及禍不忍坐視故昧死言之靈公不能納又從而殺之卒以見弑而亡其國書以驗見弑之由也六月宋師伐滕左傳曰滕人恃晉而不事宋宋師伐滕胡氏曰稱師用衆也鄰有弑逆不能聲罪致討乃用大衆以伐所當矜恤之小邦且滕不事已無乃已徳猶有所闕而滕何尤焉公孫歸父如齊歸父仲遂之子胡氏曰宣公深徳齊侯之能定其位故生則傾身以事之而不辭屈辱没則親徃奔喪而使貴卿㑹其葬𦵏齊惠公晉人宋人衛人曹人伐鄭左傳曰鄭及楚平諸侯之師伐鄭取成而還胡氏曰鄭居大國之間從于彊令豈其罪乎不能以徳撫而爭之以力庸何愈于楚襄陵許氏曰自晉靈以來成景相繼力爭陳鄭而無以服楚髙氏曰是時陳有弑君之亂曾是不圖而從事于鄭張氏曰舍亂臣賊子之大惡而輕動干戈以討迫於彊令無所適從之小國秋天王使王季子來聘公羊傳曰王季子者王之母弟也左傳曰劉康公來報聘杜氏曰康公即王季子其後食邑于劉澄曰王之子以王子為氏季其字也天子四命之大夫稱氏稱字如南季氏也以王子為氏者稱王子季則不成辭故曰王季子報聘者報九年夏仲孫蔑之聘也張氏曰宣公事周簡慢極矣僅遣一介而重臣繼來胡氏曰宣公至是享國十年不朝于周而比年朝齊不奔王喪而奔齊侯喪不遣貴卿㑹匡王葬而使歸父㑹齊之葬縱未舉法勿聘焉猶可也而使王季子來王靈益不振矣襄陵許氏曰自是王靈益亡王聘益輕春秋不復録矣公孫歸父帥師伐邾取繹繹公作蘱杜氏曰繹邾邑魯國鄒縣北有繹山張氏曰詩保有鳬繹邾文公遷于繹皆此今在襲慶府鄒縣為邾魯二國之境髙氏曰自文公時邾魯有隙宣公簒立而邾子首朝之自是絶迹魯廷者又十年故歸父帥師以討其罪然以貴卿為將舉大衆而征伐不施於亂臣賊子而陵弱侵小近在附庸之國是為盜也大水季孫行父如齊始聘嗣君也冬公孫歸父如齊左傳曰伐邾故也高氏曰以伐邾故恐齊人以為討遂謀伐莒焉甚矣魯之懼齊也二歲之間而公與大夫如齊者五胡氏曰齊侯嗣立宣公親徃奔其父喪又使貴卿㑹葬矣若待逾年然後脩聘未晚也而季孫行父亟行歸父繼徃宣公君臣不知為國以禮而謂以妄恱之可以免討也歸父貪于取繹畏齊而徃蓋理曲則氣必餒能無畏乎齊侯使國佐來聘高氏曰嗣子逾年即位始稱君未逾年稱子故葵丘之㑹稱宋子蓋齊桓方倡大義以尊中國諸侯之從者唯恐後故宋公雖在喪而來與㑹亦不深責以其不獲已而趨急務爾魯之於齊與國也聘雖後時亦何害耶惠公之卒葬之既速又未逾年而以君命遽遣使來聘焉議伐莒也當凶釁而行吉禮忘哀思而結歡好書曰齊侯著其惡也饑張氏曰王政以民食為重故積貯天下之大命也前此百有餘年水旱螟螽之災多矣不以饑書今大水之後特書饑者著宣公煩於事外國用無節上下用竭故一遇水旱遂致乏食爾楚子伐鄭髙氏曰是夏鄭因晉同三國見伐而復棄楚故楚子又伐鄭據左氏載晉士㑹救鄭及諸侯伐鄭而春秋削之者責晉雖得鄭而不能有之也經書月三書日三大衍歴正月丁亥大乙巳冬至二月丁巳小三月丙戌大四月丙辰大日食己巳十四日五月丙戌小癸巳八日六月乙卯大七月乙酉小八月甲寅大九月甲申小十月癸丑大十一月癸未小十二月壬子大長歴是年閏五月癸巳五月九日十有一年癸亥定王九年晉霸景二蔡文十四曹文二十衛穆二鄭襄七陳成公午元年杞桓三十九宋文十三齊頃公無野元年秦桓七楚莊十六春王正月夏楚子陳侯鄭伯盟于辰陵辰榖作夷左傳曰楚子伐鄭及櫟子良曰晉楚不務徳而兵爭與其來者可也晉楚無信我焉得有信乃從楚盟于辰陵陳鄭服也杜氏曰辰陵陳地穎川長平縣東南有辰亭張氏曰今陳州西華縣楚莊於是合二國為盟而欲討陳夏徴舒也春秋以晉齊二大國方見用兵于莒狄而不能討獨楚合諸侯以討之所以楚子書爵於陳侯鄭伯之上與之也公孫歸父㑹齊人伐莒張氏曰莒恃晉而不事齊魯事齊故從齊而伐之兵不討亂而附彊陵弱著齊魯之罪也秋晉侯㑹狄于欑函欑才端切函音咸左傳曰晉郤成子求成于衆狄衆狄疾赤狄之役遂服于晉㑹于欑函衆狄服也杜氏曰欑函狄地澄曰楚方倡義于天下而晉孜孜于羣狄至徃㑹焉晉卑甚矣髙氏曰是時晉失諸侯陳鄭諸國皆棄晉而從楚于是狄在欑函而晉侯親徃㑹之夫中國諸侯所恃者晉爾齊方伐莒晉方㑹狄而使楚人為霸者之事此反道也冬十月楚人殺夏徴舒左傳曰楚子為陳亂故伐陳謂陳人無動將討于少西氏遂入陳執夏徴舒轘諸栗門髙氏曰弑君之賊固人人可得而殺之豈有所抉擇于其間哉然徴舒弑君今已逾年國人不能討天子方伯不能誅反致楚人執大義而殺之楚荆蠻尚知弑君之當殺則中國如之何不能殺之耶聖人書此傷中國之不自正也丁亥楚子入陳納公孫寧儀行父于陳寧公作甯左傳曰陳侯在晉因縣陳申叔時曰夏徴舒弑其君其罪大矣討而戮之君之義也諸侯之從也曰討有罪也今縣陳貪其富也以討召諸侯而以貪歸之無乃不可乎王曰善哉乃復封陳鄉取一人焉以歸謂之夏州髙氏曰是時陳侯在晉故楚子不動干戈自入于陳然則人君可輕出乎吕氏曰楚人殺陳夏徴舒討賊之辭且衆同欲也故曰楚人入陳非衆志也故曰楚子胡氏曰公孫寧儀行父從君於昏宣淫於朝誅殺諫臣使其君見弑蓋致亂之臣也肆諸市朝與衆同棄然後快於人心今乃詭辭奔楚託於討賊復讎以自脫其罪而楚莊亦不能察又使陳人用之可乎為楚莊著宜奈何瀦徴舒之宫封洩冶之墓尸孔寧儀行父于朝謀于陳衆定其君而去其庶幾乎經書月二書日一大衍歴正月壬午小庚戌冬至閏月辛亥大二月辛巳小旦日大寒三月庚戌大四月庚辰小五月己酉大六月己卯小七月戊申大八月戊寅大九月戊申小十月丁丑大丁亥十一日十一月丁未小十二月丙子大十有二年甲子定王十年晉霸景三蔡文十五曹文二十一衛穆三鄭襄八陳成二杞桓四十宋文十四齊頃二秦桓八楚莊十七春葬陳靈公賊討國復二十二月而後得葬楚子圍鄭左傳曰鄭既受盟于辰陵又徼事于晉楚圍鄭克之入自皇門至于逵路鄭伯肉袒牽羊以逆退三十里而許之平潘尫入盟子良出質澄曰中國不能霸與國屈服于荆蠻鄭伯禮之恭辭之善以媚恱於楚極矣至今使人惡之夏六月乙卯晉荀林父帥師及楚子戰于邲晉師敗績邲蒲必切左傳曰晉師救鄭荀林父將中軍先縠佐之士㑹將上軍郤克佐之趙朔將下軍欒書佐之及河聞鄭既及楚平桓子欲還曰無及于鄭而勦民焉用之隨武子曰善㑹聞用師觀釁而動見可而進知難而退軍之善政也彘子曰不可晉所以霸師武臣力也今失諸侯不可謂力有敵而不從不可謂武由我失霸不如死以中軍佐濟楚子北師次于郔將飲馬于河而歸聞晉師既濟王欲還嬖人伍參欲戰言于王曰晉之從政者新未能行令其佐先縠剛愎不仁未肯用命其三帥者專行不獲聽而無上衆誰適從此行也晉師必敗且君而逃臣若社稷何王病之次于管以待之楚少宰如晉師曰寡君此行也將鄭是訓定豈敢求罪于晉二三子無淹久隨季對曰昔平王命我先君文侯曰與鄭夾輔周室毋廢王命今鄭不率寡君使羣臣問諸鄭豈敢辱候人彘子以為諂使趙括從而更之曰行人失辭寡君使羣臣遷大國之迹於鄭曰無避敵羣臣無所逃命楚子又使求成于晉晉人許之盟有日矣楚許伯御樂伯攝叔為右以致晉師晉魏錡求公族未得而怒欲敗晉師請致師弗許請使許之遂徃請戰而還趙旃求卿未得且怒于失楚之致師者請挑戰弗許請召盟許之與魏錡皆命而徃晉人懼二子之怒楚師也使以軘車逆之潘黨望其塵使騁而告曰晉師至矣楚人亦懼王之入晉軍也遂出陣孫叔曰進之寧我薄人無人薄我遂疾進師車馳卒奔乗晉軍桓子不知所為鼓於軍中曰先濟者有賞中軍下軍爭舟舟中之指可掬也晉師右移上軍未動工尹齊將右拒卒以逐下軍潘黨率游闕四十乗從唐侯為左拒以從上軍隨季曰楚師方壯若萃于我吾師必盡不如收而去之分謗生民不亦可乎殿其卒而退不敗楚熊負羈囚知罃知莊子以其族反之厨武子御下軍之士多從之射連尹襄老獲之載其尸射公子穀臣囚之以二者還及昏楚師軍於邲晉之餘師不能軍宵濟亦終夜有聲楚重至于邲遂次于衡雍祀于河作先君宫告成事而還杜氏曰邲鄭地張氏曰地譜鄭州城下管城縣有邲城在縣南晉不能討陳亂已失三綱軍政之本乃欲恃力以爭鄭不知楚莊既討陳亂則師出有名而所以施于鄭者又進退得宜勇怯中節林父上不能輔君討亂以行主聖之大義而此行本為救鄭而鄭已服楚士縠之徒恃彊專制故林父雖知楚之不可敵而不能止諸帥之從楚師此春秋特以林父主此戰著其敗師之罪也秋七月冬十有二月戊寅楚子滅蕭左傳曰楚子伐蕭宋華椒以蔡人救蕭蕭人囚熊相宜僚及公子丙王曰勿殺吾退蕭人殺之王怒遂圍蕭蕭潰杜氏曰蕭宋附庸國也髙氏曰楚既得陳鄭又敗晉師遂深入中國慿陵諸夏滅人之國晉人宋人衛人曹人同盟于清丘杜氏曰清丘衛地張氏曰地譜今濮州臨濮縣東南有清丘髙氏曰晉為楚所敗故諸侯懼而為此盟既又不旋踵而皆背之澄按春秋之例㑹盟戰伐有君在則雖國卿亦降稱人其特出姓名者著其罪也此盟雖無君在然盟者霸主及國君之事也今皆以大夫行之故雖無君臣亦降稱人宋師伐陳左傳曰宋為盟故伐陳杜氏曰陳貳于楚故髙氏曰陳有弑逆之事宋不能討而楚能討之宋以楚子滅蕭且為清丘之盟故請于晉以伐陳以討其道楚師之罪衛人救陳髙氏曰書衛救陳者所以罪宋也然衛方盟于清丘而反救陳救雖義事而有背盟之惡經書月三書日二大衍歴正月丙午小丙辰冬至二月乙亥大三月乙巳小四月甲戌大五月甲辰小六月癸酉大七月癸卯小經六月乙卯在此月八月壬申大九月壬寅小十月辛未大十一月辛丑小十二月庚午大戊寅九日長歴是年閏五月乙卯六月十四日十一月己亥朔戊寅在十一月十有三年乙丑定王十一年晉霸景四蔡文十六曹文二十二衛穆四鄭襄九陳成三杞桓四十一宋文十五齊頃三秦桓九楚莊十八春齊師伐莒莒公作衛左傳曰莒恃晉而不事齊故也澄曰齊以彊陵弱而伐莒且十一年之伐稱齊人此稱齊師者甚其動大衆而伐小國也夏楚子伐宋左傳曰以其救蕭也胡氏曰楚滅蕭將以脅宋諸侯懼而同盟為宋人計者恤民固本輕徭薄賦使民效死親其上則可以待敵矣計不出此而急於伐陳攻楚與國非策也故楚有辭于伐秋螽為災故書冬晉殺其大夫先縠左傳曰赤狄伐晉及清先縠召之也晉人討邲之敗與清之師歸罪于先縠而殺之盡滅其族髙氏曰邲之役三帥皆欲還先縠固請戰遂及于敗至是以為討然釋趙旃魏錡不討而獨誅先縠為政不平殺者不受治矣又族滅之惡之甚也張氏曰越椒將攻王而楚莊尚思子文之治楚而復克黄之所先縠先軫之孫而滅其族蓋晉之徳刑皆不足以敵楚矣經書月無書日無大衍歴正月庚子大辛酉冬至二月庚子小三月己亥大四月己巳小五月戊戌大六月戊辰小七月丁酉大八月丁卯小九月丙申大閏月丙寅小十月乙未大十一月乙丑小十二月甲午大十有四年丙寅定王十二年晉霸景五蔡文十七曹文二十三卒衛穆五鄭襄十陳成四杞桓四十二宋文十六齊頃四秦桓十楚莊十九春衛殺其大夫孔達左傳曰清丘之盟晉以衛之救陳也討焉使人弗去曰罪無所歸將加而師孔達曰苟利社稷請以我説罪我之由我則為政而亢大國之討將以誰任我則死之縊而死衛人以說于晉而免遂告于諸侯曰寡君有不令之臣達搆我敝邑于大國既伏其罪矣敢告衛人以為成勞復室其子使復其位髙氏曰晉既討邲之敗而殺先縠矣以衛背清丘之盟而救陳也討焉孔達自知不可免乃縊而死衛人因以説于晉故稱國以殺夏五月壬申曹伯夀卒文公也在位三十三年子盧嗣是為宣公晉侯伐鄭左傳曰為邲故也告於諸侯蒐焉而還中行桓子之謀也曰示之以整使謀而來鄭人懼使子張代子良于楚鄭伯如楚謀晉髙氏曰晉救鄭而敗于邲鄭遂即楚夫鄭背徳忘恩討之正也然自文公没襄公僅能脩先君之業靈公幼而趙盾為政其殆庶幾矣成景之世文公之澤寢微干戈日尋積而至于蜀之盟而諸侯盡屬楚矣豈特失鄭而已乎秋九月楚子圍宋左傳曰楚子使申舟聘于齊及宋宋人止之華元曰過我而不假道鄙我也鄙我亡也殺其使必伐我伐我亦亡也亡一也乃殺之楚子圍宋澄曰宋前以救蕭而見伐今又以殺楚使而受圍楚之荐食上國宋之挑釁彊隣俱可罪也葬曹文公冬公孫歸父㑹齊侯于榖髙氏曰齊侯在榖而歸父徃聘焉故不書于齊蓋謀於齊侯而平楚宋也齊人始疑張氏曰魯素事齊而宣公之立公子遂主之故其父子常親于齊而齊亦不復計等列之不班從而與之㑹也王氏曰遂以不正而立宣公公以不正而任其子歸父此年㑹齊侯明年㑹楚子見公與之深也諸侯失政自宣公始大夫專政自歸父始石氏曰文公以來大夫擅專盟㑹至是以為常矣經書月二書日一大衍歴正月甲子小丙寅冬至二月癸巳大三月癸亥小四月壬辰大五月壬戌大壬申十一日六月壬辰小七月辛酉大八月辛卯小九月庚申小十月己丑大十一月己未大十二月己丑小長歴壬申五月十二日十有五年丁卯定王十三年晉霸景六蔡文十八曹宣公盧元年衛穆六鄭襄十一陳成五杞桓四十三宋文十七齊頃五秦桓十一楚莊二十春公孫歸父㑹楚子于宋左傳曰孟獻子言于公曰臣聞小國之免于大國也聘而獻物於是有庭實旅百朝而獻功於是有容貌采章嘉淑而有加貨謀其不免也誅而薦賄則無及也今楚在宋君其圖之公說襄陵許氏曰楚圍宋之威振及魯矣胡氏曰楚不假道于宋以啟釁端而圍之陵蔑中華甚矣諸侯縱不能畏簡書䘏同惡存先代之後嚴兵固圉以為聲援猶之可也乃以周公之裔千乗之國謀其不免至於薦賄不亦鄙乎比事以觀則知中國盛衰之由矣夏五月宋人及楚人平左傳曰宋人使樂嬰齊告急于晉晉侯欲救之伯宗曰不可古人有言曰雖鞭之長不及馬腹天方授楚未可與爭雖晉之彊能違天乎乃止楚師將去宋申犀稽首于王之馬前曰毋畏知死而不敢廢王命王棄言焉王不能答申叔時僕曰築室反耕者宋必聽命從之宋人懼使華元夜入楚師登子反之床起之曰寡君使元以病告曰敝邑易子而食析骸以爨雖然城下之盟有以國斃不能從也去我三十里惟命是聽子反懼與之盟而告王退三十里宋及楚平華元為質杜氏諤曰禦狄之道莫大乎完守備也今楚子自秋九月圍宋至此歴三時宋固守以待晉之救非不完于所備也晉不能援救之宋儻不求平于楚則若社稷何若邦衆何由是不得已及楚平澄曰平者兩國之大夫也然此權非可自大夫出故二國之卿皆降稱人與清丘之盟同例公至自㑹六月癸卯晉師滅赤狄潞氏以潞子嬰兒歸左傳曰潞子嬰兒之夫人晉景公之姊也酆舒為政而殺之又傷潞子之目晉荀林父敗狄于曲梁滅潞張氏曰潞氏今潞州潞城縣杜氏曰潞氏赤狄之别族國故稱氏子爵也王氏箋義曰東遷之後狄以寖盛諸侯不能制乃與之㑹盟交聘雖云進之以漸蓋亦患之之甚也赤狄近于晉並為晉患比數侵齊奪黎氏地疆土益廣晉侯因酆舒之罪命桓子伐而滅之陳氏折衷曰稱潞子蓋滅國以其君歸皆稱爵如齊人滅弦弦子奔黄楚人滅頓以頓子牂歸楚人滅胡以胡子豹歸第言奔者不名之以歸者名之髙氏曰是時楚肆其彊圍宋踰年晉不能救而反滅狄利其土地亦怠於憂中國矣秦人伐晉左傳曰秦桓公伐晉次于輔氏魏顆敗秦師髙氏曰自二年秦師伐晉晉不報秦今十四年矣此復來伐者乗晉兵遠事狄土而闞其虚也王札子殺毛伯召伯左傳曰王孫蘇與召氏毛氏爭政使王子捷殺召戴伯及毛伯衛卒立召襄孫氏曰王札子文誤倒爾杜氏諤曰桓襄之前列國諸侯交相戰伐列國不稟王命也至此而臣有相殺者内之卿士不奉王命也秋螽張氏曰按自六年至今三遇螽災而水旱未與焉此宣公不脩徳節用愛人之所感也仲孫蔑㑹齊髙固于無婁無公作牟杜氏曰無婁杞邑張氏曰大夫相㑹蓋始于此髙氏曰齊侯在榖則公孫歸父㑹之齊卿在無婁則仲孫蔑㑹之蓋公主齊久矣幸晉楚之爭而不我及也忽焉而平楚宋俾歸父請於齊侯齊侯則疑我之從楚也蔑于是㑹焉以脩舊好初稅畝公羊傳曰初始也稅畝者履畝而稅也榖梁傳曰古者三百步為里名曰井田井九百畝籍而不稅杜氏曰公田之法十取其一今又履其餘畝復十收其一遂以為常故曰初冬蝝生蝝恱全切又去聲髙郵孫氏曰蝝者螽之子也春秋之秋夏時之夏春秋之冬夏時之秋也螽為災于夏而蝝生于秋一嵗而再為災故志之饑胡氏曰春秋饑嵗多矣書于經者三而宣公有其二張氏曰宣兩書饑一在大水之後一在螽蝝之後甚言國無蓄積而民無以生也經書月二書日一大衍歴正月戊午大辛未冬至二月戊子小三月丁巳大四月丁亥小五月丙辰大六月丙戌小癸夘十八日七月乙卯大八月乙酉大九月乙酉小十月甲申大十一月甲寅小十二月癸未大長歴是年閏十一月癸卯六月十九日十有六年戊辰定王十四年晉霸景七蔡文十九曹宣二衛穆七鄭襄十二陳成六把桓四十四宋文十八齊頃六秦桓十二楚莊二十一春王正月晉人滅赤狄甲氏及留吁左傳曰晉士㑹帥師滅赤狄甲氏及留吁鐸辰杜氏曰甲氏留吁赤狄之族晉既滅潞氏今又并盡其餘黨髙氏曰書及所以别言二氏也胡氏曰甲氏潞之餘裔留吁其殘邑也要荒之外王者所並生不使侵軼則止矣必欲盡殄滅之無遺類豈仁人之心王者之事乎夏成周宣榭火榭公作謝火公榖作災公羊傳曰成周者東周也左傳曰人火之也杜氏曰成周洛陽宣榭講武屋爾雅曰無室曰榭謂屋歇前澄曰公羊以宣榭為宣宫之榭榖梁以為樂器所藏何休以為宣王之廟至此不毁者有中興之功啖氏曰按宣王之廟久已毁矣縱失禮不毁止當在王城不當在成周也李氏堯俞曰廟不應有榭榭不應藏樂榭者講武之所宣者其宣王之所為乎至是歴十二世王業日壊求其如宣之盛既不可得而見而王之迹又煨燼蓋痛之也高氏曰國語曰先王之為臺榭也臺不過望氛氣榭不過講軍實宣王中興南征荆舒北伐玁狁内修政以復文武之竟土今周復衰平惠以降皆庸暗齷齪無能興者孟子曰夫明堂者王者之堂也王欲行王政則勿毁之矣况我宣王中興講武之座屋子孫衰微不能振舊而反為火所焚乎秋郯伯姬來歸左傳曰出也髙氏曰不能事舅姑為夫所出見棄而歸也吕氏曰婦人既嫁而出人道之大者故書之冬大有年榖梁傳曰五榖大熟為大有年澄謂宣公在位十六年天灾饑饉薦臻咎徴常多今忽大有年記異也經書月一書日無大衍歴正月癸丑小丁丑冬至二月壬午大三月壬子小四月辛巳大五月辛亥小六月庚辰大戊申小滿閏月庚戌小七月己卯大旦日夏至八月己酉小九月戊寅大十月戊申小十一月丁丑大十二月丁未大十有七年己巳定王十五年晉霸景八蔡文二十卒曹宣三衛穆八鄭襄十三陳成七杞桓四十五宋文十九齊頃七秦桓十三楚莊二十二春王正月庚子許男錫我卒許昭公也在位三十年其子甯立是為靈公丁未蔡侯申卒蔡文公也在位二十年其子固立是為景公夏𦵏許昭公葬蔡文公胡氏曰日卒書名赴得禮也𦵏不月其畧在内宣公不知禮義邦交之實送終獨厚於齊而利害不切于身者皆薄其禮大則君親次則盟主又其次若秦若衛若滕雖赴告而不㑹葬考春秋之備書而宣公失事上交隣之禮見矣六月癸卯日有食之己未公㑹晉侯衛侯曹伯邾子同盟于斷道斷音短左傳曰晉侯使郤克徴㑹于齊齊頃公帷婦人使觀之郤子登婦人笑于房獻子怒出而􅊎曰所不此報無能涉河齊侯使髙固晏弱蔡朝南郭偃㑹及斂盂髙固逃歸盟于卷楚辭齊人晉人執晏弱于野王執蔡朝於原執南郭偃于温晉師還杜氏曰斷道晉地張氏曰此蓋郤克怒齊假同盟之禮約諸侯共伐齊也秋公至自㑹冬十有一月壬午公弟叔肸卒肸許乙切曰公弟者以屬書未命為大夫故不以公子為氏肸之生雖未為卿而於其死也宣公寵愛之故賜之族使其子孫世世為卿如季友仲遂經書月三書日五大衍歴正月丁丑小壬午冬至庚子二十四日二月丙午大二月丁未經有日無月三月丙子小四月乙巳大五月乙亥小六月甲辰大己未十六日經書六月癸卯日食程氏公說曰大衍歴食當在五月乙亥朔食黄道胃十三度少七月甲戌小八月癸卯大九月癸酉小十月壬寅大十一月壬申小壬午十一日十二月辛丑大長歴庚子正月二十六日丁未二月四日己未六月十七日壬午十一月十三日十有八年庚午定王十六年晉霸景九蔡景公固元年曹宣四衛穆九鄭襄十四陳成八杞桓四十六宋文二十齊頃八秦桓十四楚莊二十三卒春晉侯衛世子臧伐齊左傳曰晉侯衛世子臧伐齊至于陽榖齊侯㑹晉侯盟于繒以公子疆為質于晉晉師還蔡朝南郭偃逃歸髙氏曰晉衛先伐齊故齊人求成以緩諸侯之師公伐杞髙氏曰杞自文十六年來朝而不復至故伐之已不脩徳而欲人之朝已亦不思之甚矣夏四月秋七月邾人戕鄫子于鄫左傳曰凡自虐其君曰弑自外曰戕杜氏曰弑戕皆殺也弑者積微而起所以相測量非一朝一夕戕者卒暴之名陸氏希聲曰弑非其君曰戕范氏曰于鄫惡其臣子不能距難孫氏曰僖十九年邾人執鄫子用之天子不能誅故此肆然復戕鄫子于鄫也胡氏曰邾人蓋甞執鄫子用之則不共戴天之世讎也既不能復又使邾人得造其國都而戕殺其君曰于鄫者所以深責鄫之臣子也甲戌楚子旅卒旅穀作吕楚莊王也在位二十三年子共王審嗣高氏曰前此不書楚子之卒者以外之也此書之者以楚入為中國之害甚於前日中國不能自正乃與楚人相為朝聘相與盟誓相通問好故自此詳卒也公孫歸父如晉左傳曰公孫歸父以襄仲之立公也有寵欲去三桓以張公室與公謀而聘於晉欲以晉人去之髙氏曰公自簒立以來所以事齊諂矣晚覩齊之不競於晉則翻然事晉而棄齊如遺迹焉甚哉利之使人輕合易絶也傳載公之欲謀伐齊至成二年而有鞌之役蓋歸父此行實為始謀亦以三桓專命欲假晉以去之故也胡氏曰宣公刻意事齊易世猶未怠也及頃公不能謹禮怒晉魯上卿而郤克當國決策討之晉方强盛齊少懦矣於是背齊而事晉其于邦交以利為向背者也况欲以晉人去三桓夫輕於背大國易於謀大家而不知其本末未有能成而無悔者也冬十月壬戌公薨于路寢正其終也歸父還自晉至笙遂奔齊笙公作檉左傳曰公薨季文子言於朝曰使我殺適立庶以失大援者仲也夫臧宣叔怒曰當其時不能治後之人何罪予欲去之許請去之遂逐東門氏子家還及笙壇帷復命於介既復命袒括髪即位哭三踊而出遂奔齊髙氏曰夫先君未殯而逐其臣是死其君而忘其父也歸父既畢使事盡哀而奔是知死亡之不免而能不失度於顛沛造次之時異乎它大夫之奔矣雖然人臣之正受命而出雖君薨猶當致命于殯前若其有罪待命於新君可也今歸父還未及魯境遽即奔齊則有惡於新君矣故書遂書奔以著其逃刑之罪經書月二書日二大衍歴正月辛未小丁亥冬至二月庚子大三月庚午小四月己亥大五月己巳大六月己亥小七月戊辰大甲戌七日八月戊戌小九月丁卯大十月丁酉小壬戌二十六日十一月丙寅大十二月丙申小長歴甲戌七月八日壬戌十月二十八日春秋纂言卷七
