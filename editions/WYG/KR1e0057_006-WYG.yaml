body:
  text: 春秋纂言總例卷六元吳澄撰凶禮崩天王崩平王也魯隠三年不書𦵏天王崩桓王也魯桓十五年𦵏桓王莊三年七年始𦵏或云改𦵏也莊王魯莊十二年崩不書僖王魯莊十七年崩不書天王崩恵王也魯僖八年不書𦵏天王崩襄王也魯文八年𦵏襄王文九年頃王魯文十四年崩不書天王崩匡王也魯宣二年𦵏匡王宣三年葬三月而天王崩定王也魯成五年不書𦵏天王崩簡王也魯襄元年𦵏簡王襄二年葬五月而天王崩靈王也魯襄二十八年不書𦵏天王崩景王也魯昭二十二年𦵏景王同上年𦵏三月而王子猛卒悼王也未踰年故不稱天王不曰崩魯昭二十二年春秋十三王敬王崩在春秋後其十二王書崩者九不書崩者三九王之崩書𦵏者五不書𦵏者四趙氏曰王崩三不書王室不告魯不赴也王室無人諸侯不臣也啖氏曰天王之𦵏魯㑹則書不書者皆不㑹也王猛未踰年之王卒特加子字澄按經書王子有以氏書者王子虎是也有以屬書者王子朝是也王子猛之書則非以其氏非以其屬盖天子諸侯之嗣位而未踰年者稱子于上加王字者表其為天王未踰年之子以别於諸侯未踰年之子也薨公薨隠公也十一不書𦵏公薨于齊桓公也十八𦵏我君桓公同上年葬九月乃公薨于路寢莊公也三十三𦵏我君莊公閔元月乃葬十一子般卒莊公長子公薨閔公也二不書𦵏公薨于小寢僖公也三十三𦵏我君僖公文元公薨于臺下文公也十八𦵏我君文公同上年子卒文公嫡子公薨于路寢宣公也十八𦵏我君宣公成元公薨于路寢成公也十八𦵏我君成公同上年公薨于楚宫襄公也三十一𦵏我君襄公同上年子野卒襄公長子公薨于乾侯昭公也三十二𦵏我君昭公定元乃葬八月公薨于髙寢定公也十五𦵏我君定公同上年魯君之薨十一未成君而卒者三附見公薨而𦵏者九不𦵏者二啖氏曰公薨必書其所詳内事重凶變也若遇弑則不地公葬皆書惟隠公閔公不書者言賊不討如不𦵏然也未踰年君不書薨而曰卒未成君也先君未𦵏則名既𦵏則不名未踰年不書葬無子不列序於廟也夫人子氏薨隠公夫人也謂隠母桓母者非夫人姜氏薨桓公夫人文姜莊公母也莊二十一𦵏我小君文姜莊二十二七月乃𦵏夫人姜氏薨于夷莊公夫人哀姜也僖元𦵏我小君哀姜僖二十一月乃葬夫人姜氏薨僖公夫人聲姜文公母也文十六𦵏我小君聲姜文十七葬九月乃夫人姜氏薨宣公夫人穆姜成公母也襄九葬我小君穆姜同上年𦵏四月而夫人姜氏薨成公夫人齊姜也襄二葬我小君齊姜同上年葬三月而孟子卒昭公夫人也哀十二姒氏卒定公夫人定姒哀公母也定十五𦵏定姒同上年葬三月而夫人之尊與君同故薨𦵏一如君禮昭夫人以吳女同姓不可書夫人姬氏卒故從其生時隠諱之稱而曰孟子卒無諡不列於廟故亦不書𦵏定夫人不書薨不書𦵏小君哀未成君而魯臣不以夫人之禮喪其君母也夫人風氏薨莊公妾僖公母也文四葬我小君成風文四葬五月夫人嬴氏薨文公妾宣公母也宣公𦵏我小君敬嬴同上年四月𦵏夫人姒氏薨成公妾襄公母也襄四𦵏我小君定姒同上年𦵏踰月而夫人歸氏薨襄公妾昭公母也昭十一𦵏我小君齊歸同上年四月葬妾母借用夫人禮者四書薨書𦵏並與嫡夫人無别啖氏曰成風之後妾母皆僭用夫人禮故亦書薨以著其非諸侯不二嫡桓公母仲子猶别築宫不列於廟自文公𦵏成風之後乃有二夫人祔廟非禮也澄謂僖宣襄昭四妾母羣臣皆逢君之意而尊其母及至定哀之際君弱臣彊嗣君之母先君之嫡夫人也乃敢蔑視其君而卑其母焉甚矣魯道之衰也卒宋穆公和七年春秋始宋公和卒穆公也隠二𦵏宋穆公同上殤公與夷桓二弑宋公馮卒莊公也莊二𦵏宋莊公莊三閔公十一弑莊宋公御説卒桓公也僖九宋公兹父卒襄公也二僖二十宋公王臣卒成公也文七昭公杵臼弑文十六宋公鮑卒文公也成二葬宋文公成三宋公固卒共公也成十四葬宋共公同上宋公成卒平公也昭十葬宋平公昭十一宋公佐卒于曲棘元公也五昭二十葬宋元公昭二十六景公頭曼三十六年春秋終宋之君書卒者九書𦵏者六衛桓公完十三年春秋始桓公完弑隠四𦵏衛桓公隠五賊討𦵏十五月乃衛侯晉卒宣公也桓十二𦵏衛宣公桓十三衛侯朔卒恵公也五莊二十懿公赤狄所滅閔二衛侯燬卒文公也五僖二十葬衛文公同上衛侯鄭卒成公也宣九衛侯速卒穆公也成二葬衛穆公成三衛侯臧卒定公也成十四葬衛定公成十五衛侯衎卒獻公也九襄二十葬衛獻公同上衛侯惡卒襄公也昭七𦵏衛襄公同上衛侯元卒靈公也哀二𦵏衛靈公同上出公輒十二年春秋終衛之君書卒者九書𦵏者七弑而書𦵏者一蔡宣公考父二十八年春秋始蔡侯考父卒宣公也隠八𦵏蔡宣公同上蔡侯封人卒桓侯也桓十七𦵏蔡桓侯同上哀公獻舞卒于楚莊十九蔡侯肸卒穆公也僖十四莊公甲午卒文十五蔡侯申卒文公也宣十七葬蔡文公同上景公固十弑襄三𦵏蔡景公襄三十靈公般一楚殺之昭十葬蔡靈公昭十三二十一月國復乃𦵏蔡侯廬卒平公也昭二十葬蔡平公昭二十蔡侯東國卒于楚悼公也三昭二十昭公申盜殺哀四𦵏蔡昭公哀四月乃𦵏十一成公朔十年春秋終蔡之君書卒者六書𦵏者四弑殺而書𦵏者三陳桓公鮑二十三年春秋始陳侯鮑卒桓公也桓五𦵏陳桓公同上陳侯躍卒厲公也桓十二陳侯林卒莊公也莊元葬陳莊公莊二陳侯杵臼卒宣公也僖十二𦵏陳宣公僖十三陳侯欵卒穆公也八僖二十陳侯朔卒共公也文十三靈公平國宣十弑𦵏陳靈公宣十二賊討國復二十一月葬陳侯午卒成公也襄四葬陳成公同上陳侯溺卒哀公也昭八葬陳哀公同上國滅七月乃葬陳侯吳卒恵公也定四𦵏陳恵公同上陳侯栁卒懷公也定八𦵏陳懷公同上閔公越二十一年春秋終陳之君書卒者十書𦵏者七弑而書𦵏者一齊僖公禄父九年春秋始齊侯禄父卒僖公也桓十四葬齊僖公桓十四襄公諸兒莊八弑葬齊襄公莊九乃葬九月齊侯小白卒桓公也僖十七𦵏齊桓公僖十八葬九月乃齊侯昭卒孝公也七僖二十𦵏齊孝公同上齊侯潘卒昭公也文十四懿公商人弑文十八齊侯元卒恵公也宣十𦵏齊恵公同上齊侯無野卒頃公也成九𦵏齊頃公同上齊侯環卒靈公也襄十九葬齊靈公同上莊公光十五弑襄二齊侯杵臼卒景公也哀五葬齊景公同上孺子荼弑哀六齊侯陽生卒悼公也哀十葬齊悼公同上簡公壬四年春秋終齊之君書卒者九書葬者八弒而書𦵏者一晉鄂侯郗二年春秋始哀侯光小子侯侯緡稱武公晉侯佹諸卒獻公也僖九晉侯夷吾卒恵公也四僖二十晉侯重耳卒文公也二僖三十葬晉文公僖三十三晉侯驩卒襄公也文六葬晉襄公同上靈公夷皋宣二弑晉侯黒臀卒于扈成公也宣九晉侯獳卒景公也成十厲公州蒲成十八晉侯周卒悼公也襄十四葬晉悼公襄十六晉侯彪卒平公也昭十葬晉平公同上晉侯夷卒昭公也昭十六葬晉昭公同上晉侯去疾卒頃公也昭三十𦵏晉頃公同上定公午三十一年春秋終晉之君書卒者十書葬者六曹桓公終生三十四年春秋始曹伯終生卒桓公也桓十𦵏曹桓公同上曹伯射姑卒莊公也三莊二十葬曹莊公莊二十四僖公赤十二卒不書莊二曹伯班卒昭公也僖七葬曹昭公同上曹伯襄卒共公也文九𦵏曹共公同上曹伯夀卒文公也宣十四𦵏曹文公同上曹伯廬卒于師宣公也成十三𦵏曹宣公同上曹伯負芻卒于師成公也襄十八𦵏曹成公襄十九曹伯滕卒武公也昭十四葬曹武公同上曹伯須卒平公也昭十八葬曹平公同上曹伯午卒悼公也七昭二十葬曹悼公昭二十八聲公野十二昭三不書隠公甬定四不書曹伯露卒靖公也定八葬曹靖公同上伯陽魯哀八年國亡曹之君書卒者十一書葬亦十一鄭莊公寤生二十二年春秋始鄭伯寤生卒莊生也桓十一葬鄭莊公同上鄭伯突卒厲公也莊二十葬鄭厲公同上鄭伯捷卒文公也二僖二十鄭伯蘭卒穆公也宣三葬鄭穆公同上靈公夷弑宣四鄭伯堅卒襄公也成四葬鄭襄公同上鄭伯費卒悼公也成六鄭伯睔卒成公也襄二鄭伯髠頑卒于鄵僖公也襄七葬鄭僖公襄八鄭伯嘉卒簡公也昭十二葬鄭簡公鄭伯蠆卒獻公也定九葬鄭獻公同上聲公勝二十年春秋終鄭之君書卒者十書葬者七秦文公四十二年春秋始寧公出子武公徳公宣公成公穆公任好秦伯罃卒康公也文十八秦伯稻卒共公也宣四秦伯卒桓公榮也成十四秦伯卒景公厚也昭四葬秦景公昭六秦伯卒哀公也定九𦵏秦哀公同上秦伯卒恵公也哀三葬秦恵公哀四悼公十一年春秋終秦之君書卒者六書葬者三杞武公二十九年春秋始靖公共公恵公杞子卒成公也三僖二十杞伯姑容卒桓公也襄六葬杞桓公同上杞伯匄卒孝公也三襄二十葬杞孝公同上杞伯益姑卒文公也昭六葬杞文公同上杞伯郁釐卒平公也四昭二十𦵏杞平公同上杞伯成卒于㑹悼公也定四𦵏杞悼公同上杞伯過卒僖公也哀八葬杞僖公閔公維六年春秋終杞之君書卒者七書葬者六楚武王熊通十九年春秋始文王熊貲堵敖熊囏成王頵弑文元穆王商臣楚子旅卒莊王也宣十八楚子審卒共王也襄十三楚子昭卒康王也八襄二十楚子麇卒郟敖也昭元靈王䖍三弑昭十楚子居卒平王也六昭二十楚子軫卒昭王也哀六恵王章八年春秋終楚之君書卒者六不書葬者葬必舉號楚僭王號以避僭故削而不書吳夀夢始書卒吳子乗卒夀夢也襄十二吳子遏伐楚門于巢卒諸樊也五襄二十餘祭二十九弑襄吳子夷末卒昭十五僚昭二十七弑吳子光卒闔閭也定十四夫差十五年春秋終吴之君書卒者四吳亦僭稱王又未能用夏禮變蠻俗其死無諡故不可書𦵏滕滕侯卒隠七滕子卒宣九滕子卒成十六滕子原卒成公也昭三葬滕成公同上滕子寧卒悼公也八昭二十葬滕悼公同上滕子結卒頃公也哀四葬滕頃公同上滕子虞母卒隠公也哀十一葬滕隠公同上滕之君書卒者七書葬者四薛薛伯卒莊三十一薛伯穀卒獻公也一昭三十葬薛獻公同上薛伯定卒襄公也定十二葬薛襄公同上薛伯夷卒恵公也哀十葬薛恵公同上薛之君書卒者四書葬者三邾邾子克卒莊十六邾子瑣卒莊二十八邾子蘧蒢卒文十三邾子貜且卒成十七邾子牼卒襄十七邾子華卒悼公也昭元葬邾悼公同上邾子穿卒莊公也定三葬邾莊公同上邾之君書卒者七書葬者二莒莒子朱卒成十四莒子去疾卒昭十四莒之君書卒者二莒棄周禮死無諡故不書葬許許男新臣卒穆公也僖四葬許穆公同上許男業卒僖公也文五葬許僖公文六許男錫我卒昭公也宣十七葬許昭公同上許男寗卒于楚靈公也八襄二十葬許靈公同上悼公買九弒昭十葬許悼公同上許男成卒元公也哀十三葬許元公同上許之君書卒者五書𦵏者亦五弑而書葬者一宿宿男卒隠八宿之君書卒者一宿㣲國服從於宋故隠元年魯宋盟於其國至八年而告喪於魯以後經不再書盖莊十年宋人遷宿自是為宋私屬不復列於諸侯矣以上書諸侯之卒者十八國禮云天子曰崩諸侯曰薨大夫曰卒諸侯國君之薨但書曰卒何也春秋魯史臣薨者我君之有凶變也臣子愛敬於君所不願聞故諱辟其名而於他國君薨俾降從大夫但書曰卒也鄰國生則有朝㑹相見聘問徃來之禮死則在彼告終稱嗣而在此往弔其喪往㑹其𦵏也凡經不書卒由彼不訃不書葬由此不㑹也亦或有因他故者而大槩不出乎是尹氏卒尹邑不稱名者盖天王崩為諸侯之主凡天子諸侯之大夫有當書名者無君在上則例皆不名隠三王子虎卒陸氏曰無采地但言王子澄按虎即僖二十九年盟于翟泉之王人也王朝一命之下士故不稱名而稱人至文三年又八年矣疑已升為三命之上士故書氏名而亦有諡諡為文公也或謂王子非氏但以其屬之貴而書則不當書卒亦不當有諡也文三劉卷卒趙氏曰畿内諸侯不同列國故不言劉子卷卒澄按劉者邑其爵為子卒不稱爵而稱名盖畿内之國厭於王故以邑配名與三命之氏配名者畧等也定四𦵏劉文公同上年趙氏曰天子畿内諸侯列國不當與行交往之禮今㑹其𦵏非禮也以上書王臣之卒者三趙氏曰王臣無外交之禮死而赴告非禮也故書以譏澄按三王臣三書卒各一例公子益師卒隠元無駭卒公子某字展者之孫也隠八挾卒隠九三臣之族世未詳益師隠公先君之命卿無駭挾未三命非卿也書卒者盖隠公攝立謙讓不自命卿而以再命之大夫攝卿無駭再命稱名而官司空且帥師是居卿位行卿事矣挾疑亦是大夫攝卿故並書卒至桓莊之時若柔若溺雖㑹盟㑹伐而不書卒再命之大夫非卿故也益師無駭挾三人之外有四族六氏其世可考譜以明之與隠桓兄弟者為一世莊二閔僖三文四宣五成六襄七昭定八哀九十二公凡九世云公子彄卒僖伯也孝公之子隠五公孫達辰伯也彄之子一世臧孫辰卒文仲也彄之孫達之子二世文十臧孫許卒宣叔也辰之子三世成四臧孫紇武仲也許之子四世孝公之族一氏書卒者三公子慶父共仲也桓公之子二世公孫敖卒于齊穆伯也慶父之子三世文十四仲孫穀文伯也敖之子四世仲孫蔑卒獻子也穀之子五世襄十九仲孫速卒莊子也蔑之子六世襄二十二仲孫羯卒孝伯也速之子七世襄三十一仲孫貜卒僖子也羯之子八世昭二十四仲孫何忌懿子也貜之子九世仲孫彘武伯也何忌之子十世公子牙卒僖叔也桓公之子二世莊三十公孫兹卒戴伯也牙之子三世僖十六叔孫得臣卒莊叔也兹之子四世宣五叔孫豹卒穆子也得臣之子五世昭四叔孫婼卒昭子也豹之子六世昭二十五叔孫不敢卒成子也婼之子七世定五叔孫州仇武叔也不敢之子八世叔孫舒文子也州仇之子九世公子季友卒成季也桓公之子二世僖十六公孫無逸季友之子三世季孫行父卒文子也季友之孫無逸之子四世襄四季孫宿卒武子也行父之子五世昭七季孫紇悼子也宿之子六世季孫意如卒平子也紇之子七世定四季孫斯卒桓子也意如之子八世哀二季孫肥康子也斯之子九世桓公之族三氏書卒者十六仲孫氏五叔孫氏六季孫氏四公子仲遂卒于垂襄仲也莊公之子三世宣八公孫歸父仲遂之子四世仲嬰齊卒歸父弟為兄後四世成十四莊公之族一氏書卒者二公弟叔肸卒恵伯也文公之子四世宣十七公孫嬰齊卒于貍脤聲伯也叔肸之子六世成十七叔老卒齊子也嬰齊之子七世襄二十二叔弓卒敬子也老之子八世昭十四叔輒卒弓之子九世昭二十叔鞅卒弓之子九世昭二十三叔詣卒輒之子十世昭二十九叔還詣之子十一世叔青還之子十二世文公之族一氏書卒者七以上書魯臣之卒者三十一人趙氏曰卿不書葬降於君也魯卿凡四十三人書族而不書卒者五公子慶父公子翬單伯公子結叔彭生也啖氏曰柔弱不書卒非命卿也公孫歸父叔孫僑如不書卒出奔故也仲孫何忌叔孫州仇叔還獲麟時卒也餘三十一人並書卒齊王姬卒莊二以上書王女之卒者一穀梁傳曰為之主者卒之啖氏曰魯主昬公為之服故書卒不書者不為之服也澄按禮記云齊告王姬之喪魯莊公為之大功詳記文之意則禮經本無為王姬服之禮莊公因齊之來告喪特為之服姊妹之服以媚齊也故書以譏其非紀伯姬卒莊四齊侯葬紀伯姬同上紀叔姬卒莊二十九葬紀叔姬莊三十伯姬卒僖九鄫季姬卒僖十六子叔姬卒文十二杞叔姬卒成八宋伯姬卒襄三十𦵏宋共姬同上以上書魯女之卒者七書𦵏者三啖氏曰内女之𦵏不書書者皆非常也澄按内女之卒其書者亦皆非常啖氏但以為嫁為諸侯之夫人尊同則公為之服故書考經意盖有未然者葬各已附見于崩薨卒之下含襚賵賻王使榮叔歸含且賵天王使宰咺來歸恵公仲子之賵秦人來歸僖公成風之襚武氏子來求賻並已見前人紀篇天王下賔禮篇來例之末今不重出奔喪㑹葬邾子來奔喪定十五滕子來㑹𦵏襄三十一定十五王使叔服來㑹𦵏王使召伯來㑹葬已見人紀篇天王下賔禮篇來例之末今不重出春秋纂言總例卷六
