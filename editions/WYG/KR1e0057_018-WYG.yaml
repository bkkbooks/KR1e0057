body:
  text: 春秋纂言卷十一元吴澄撰定公名宋襄公庶子昭公弟也左傳及史記不見其母之姓氏在位十五年元年壬辰敬王十一年晉覇定三年蔡昭十年曹隠公通元年衛靈二十六年鄭獻五年陳恵二十一年把悼九年宋景八年齊景三十九年秦哀二十八年楚昭七年吳闔廬六年薛氏曰昭公已卒定公未踐祚是昭公之末世未得為定公之始年也春公羊傳曰定無正月者即位後也沙隨程氏曰定公未立先書元年春者追書之也劉氏曰定無正月㣲辭也張氏曰昭公自去年十二月薨於乾侯魯國之政聽命疆臣不書正月見一國之無主而正朔之無所承也澄曰凡人君初年雖無事必書正月者盖於是日行即位禮也隠公雖不行即位禮而書正月者亦於是日見羣臣也唯定公不書正月盖昭公薨於外定公未立魯國無君正月朔日羣臣無朝正之禮而此月又無它國之事可書二月亦無事至三月始有執宋仲幾之事故書王於三月也王三月晉人執宋仲幾于京師左傳曰晉魏舒合諸侯之大夫城成周屬役於韓簡子宋仲幾不受功曰滕薛郳吾役也薛宰曰宋為無道絶我小國於周以我適楚故我常從宋晉文公為踐土之盟曰各復舊職若從踐土若從宋亦唯命仲幾曰踐土固然薛宰曰薛之皇祖奚仲居薛以為夏車正奚仲遷於邳仲虺居薛以為湯左相若復舊職將承王官何故以役諸侯仲幾曰三代各異物薛焉得有舊為宋役亦其職也士彌牟曰晉之從政者新子姑受功歸吾視諸故府仲幾曰縱子忘之山川鬼神其忘諸乎士伯怒謂韓簡子曰薛徴於人宋徴於鬼宋罪大矣且己無辭而抑我以神誣我也啟寵納侮其此之謂也必以仲幾為戮乃執仲幾以歸城三旬而畢乃歸諸侯之戍榖梁傳曰不正其執人於尊者之所也澄曰上年之冬晉率魯齊宋衛鄭曹莒薛杞小邾十國之臣城成周仲氏幾名宋三命之卿來㑹城役左氏以為宋仲幾不受功故今年三月晉以覇主之令執之京師即成周也其時王居成周故以成周為京師左氏有歸於京師四字㨿經所書但見其執於京師不見其歸於京師也孫氏曰宋仲幾㑹城成周韓不信陪臣也非天子命執仲幾於天子之側甚矣胡氏曰周官凡卿大夫之獄訟斷以邦法則大司冦之職也不告於司冦而執人於天子之側故雖以王事討有罪猶貶夏六月癸亥公之䘮至自乾侯左傳曰叔孫成子逆公之䘮于乾侯季孫曰子家子亟言於我未嘗不中吾志也吾欲與之從政子必止之且聽命焉子家子不見叔孫易幾而哭叔孫請見子家子子家子辭曰覊未得見而從君以出君不命而薨覊不敢見叔孫使告之曰公衍公為實使羣臣不得事君若公子宋主社稷則羣臣之願也凡從君出而可以入者將唯子是聽子家氏未有後季孫願與子從政此皆季孫之願也使不敢以告對曰若立君則有卿士大夫與守龜在覊弗敢知若從君者則貌而出者入可也冦而出者行可也若覊也則君知其出也而未知其入也覊將逃也䘮及壊隤從公者皆反戊辰公即位公羊傳曰曷為戊辰之日然後即位榖梁傳曰殯然後即位也陸氏曰凡公即位皆於朔日故不書朔定公待昭公䘮至既殯而即位故書之劉氏曰昭公薨於乾侯季孫廢太子衍及務人而立昭公之弟公子宋盖受之於季氏也髙氏曰季氏既逐其君君薨又不即以國君䘮禮迎之今又廢其適嗣而專立其弟宋不擇所處汚於偽誘於利昭公䘮至五日而殯遂自即位此非受之先君而專受之意如者也既為意如所立故不復討意如之罪秋七月癸巳𦵏我君昭公左傳曰季孫使役如闞公氏將溝焉榮駕鵞曰生不能事死又離之以自旌也縱子忍之後必或恥之乃止𦵏昭公於墓道南孔子之為司冦也溝而合諸墓杜氏曰公在外薨八月乃𦵏髙氏曰昭公薨於外凡半嵗餘始以䘮歸歸及周月而遽𦵏見魯之臣子無恩於先君如此九月大雩立煬宫煬羊讓切左傳曰昭公出季平子禱於煬宫髙氏曰昔季孫行父嘗立武宫矣煬公伯禽之子比武公尤逺廟毁久矣意如之逐君也懼而禱焉昭公薨於外因以為應遂為之立宫張氏曰季氏妄禱而踰祀典以立久祧之宫聖人特書必有曽謂煬宫不如林放之嘆乎冬十月隕霜殺菽榖梁傳曰未可以殺而殺舉重可殺而不殺舉輕其曰菽舉重也杜氏曰周十月今八月隕霜殺菽非常之災蘇氏曰於其不殺而言草言其廣也於其殺而言菽言其所害也髙氏曰菽草之難殺者也言殺菽則知草皆死矣言不殺草則知菽亦不死也經書月五書日三大衍厯正月乙亥小丁酉冬至二月甲辰大三月甲戌大四月甲辰小五月癸酉大六月癸卯小癸亥二十一日戊辰二十六日七月壬申大癸巳二十二日八月壬寅小閏月辛未大九月辛丑小十月庚午大十一月庚子小十二月己巳大二年癸巳敬王十二年晉覇定四蔡昭十一曹隠二衛靈二十七鄭獻六陳恵二十二杞悼十宋景九齊景四十秦哀二十九楚昭八吳闔廬七春王正月夏五月壬辰雉門及两觀災杜氏曰雉門公宫之南門两觀闕也孔䟽曰闕在門两旁中央缺然為道也其上縣法象其狀巍然為大謂之象魏使人觀之謂之觀两觀也象魏也闕也一物而三名也两觀在雉門之两旁孫氏曰雉門两觀天子之制雉門與两觀俱災也杜氏諤曰魯以周公之故立雉門两觀僣天子也魯之僣禮聖人譏之必因其事而托義焉此雉門两觀其僣乆矣若不災則不可得而錄之今災及而書實譏其僣也秋楚人伐吳左傳曰桐叛楚吳子使舒鳩氏誘楚人曰以師臨我我伐桐為我使之無忌楚囊瓦伐吳師於豫章吳人見舟於豫章而潜師於巢吳軍楚師於豫章敗之遂圍巢克之獲楚公子繁襄陵許氏曰自襄三年書楚伐吳七書楚伐僅能一克於朱方它役皆敗無功積其陵暴首兵之咎將至於禍敗失國也冬十月新作雉門及两觀榖梁傳曰言新有舊也作為也有加其度也劉氏曰魯用王禮其庫門天子臯門雉門天子應門而設两觀僣君甚矣習舊而不知以為非髙氏曰荘二十有九年新延廐不言作言作者改舊制而増大之也魯僣天子之禮天亦變以警之遇災而不知以為戒乃更作而新之反加其度焉是魯之僣終無已也特書新作罪在定公也經書月三書日一大衍厯正月己亥小壬寅冬至二月戊辰大三月戊戌小四月丁邜大經五月壬辰在此月五月丁酉小六月丙寅大七月丙申大八月丙寅小九月乙未大十月乙丑小十一月甲午大十二月甲子小長厯是年閏五月壬辰五月二十六日三年甲午敬王十三年晉覇定五蔡昭十二曹隠三衛靈二十八鄭獻七陳惠二十三杞悼十一宋景十齊景四十一秦哀三十楚昭九吳闔廬八春王正月公如晉至河乃復程子曰季孫意如上不請於天子下不告於方伯而立定公故晉怒而公往朝焉晉辭公而復故明年因㑹而請盟於臯鼬二月辛邜邾子穿卒荘公也在位三十三年子益嗣夏四月秋𦵏邾莊公七月而𦵏緩冬仲孫何忌及邾子盟于㧞㧞公作枝左傳曰修邾好也襄陵許氏曰公至河乃復晉之輕魯也仲孫何忌及邾子盟魯之輕邾也當昭公時祲祥猶未爾也髙氏曰邾子居䘮而以吉禮與魯大夫盟其㣲弱可知經書月三書日一大衍厯正月癸巳大戊申冬至二月癸亥小辛邜二十九日三月壬辰大四月壬戌小五月辛邜大六月辛酉小七月庚寅大八月庚申小九月己丑大十月己未小十一月戊子大十二月戊午大四年乙未敬王十四年晉覇定六蔡昭十三曹隠四衛靈二十九鄭獻八陳惠二十四卒杞悼十二卒宋景十一齊景四十二秦哀三十一楚昭十吳闔廬九春王二月癸巳陳侯吳卒惠公也在位二十四年子栁立是為懐公三月公㑹劉子晉侯宋公蔡侯衛侯陳子鄭伯許男曹伯莒子邾子頓子胡子滕子薛伯杞伯小邾子齊國夏于召陵侵楚左傳曰蔡昭侯為两佩與两裘以如楚獻一佩一裘於昭王昭王服之以享蔡侯蔡侯亦服其一子常欲之弗與三年止之唐成公如楚有两肅爽馬子常欲之弗與亦三年止之唐人或相與謀請代先從者許之飲先從者酒醉之竊馬而獻之子常子常歸唐侯自拘於司敗曰君以弄馬之故隠君身弃國家羣臣請相夫人以償馬必如之唐侯曰寡人之過也二三子無辱皆賞之蔡人聞之固請而獻佩於子常子常朝見蔡侯之徒命有司曰蔡君之久也官不共也明日禮不畢將死蔡侯歸及漢執玉而沈曰余所有濟漢而南者有若大川蔡侯如晉以其子元與其大夫之子為質焉而請伐楚三月劉文公合諸侯於召陵謀伐楚也晉荀寅求貨於蔡侯弗得言於范獻子曰國家方危諸侯方貳將以襲敵不亦難乎水潦方降疾瘧方起中山不服弃盟取怨無損於楚而失中山不如辭蔡侯吾自方城以來楚未可以得志祇取勤焉乃辭蔡侯晉人假羽旄於鄭鄭人與之明日或斾以㑹晉於是失諸侯程子曰楚恃其彊侵陵諸侯晉上請於天子大合諸侯以伐之而不能明暴其罪以行天討無功而還故書侵髙氏曰入春秋來蔡人首叛中國而附楚至是蔡人不勝楚之陵虐乃使告於諸侯有能伐楚者蔡願為之先鋒晉侯於是合諸侯于召陵以救蔡伐楚也書㑹于召陵侵楚者以見諸侯不振卒使救蔡伐楚之功歸於吳晉為盟主大合諸侯十八國之衆天子使大夫臨之可謂盛矣乃不能成伐楚之功而吳以一國之師敗之召陵近蔡地是時晉荀寅求貨於蔡蔡人弗與遂辭不進晉是以失諸侯中國遂大亂吳子主黄池之㑹自此始也夏四月庚辰蔡公孫姓帥師滅沈以沈子嘉歸殺之姓公作歸姓左傳曰沈人不㑹於召陵晉人使蔡伐之滅沈胡氏曰所惡於前無以先後出乎爾者反乎爾者也蔡侯視楚猶沈視蔡也昭公拘於郢三年而後反非以國小而弱乎沈雖不㑹召陵未有大罪惡也而恃彊殺之甚矣能無公孫翩之及哉吕氏曰蔡公孫姓不能正其君之失而遂滅沈至以沈子嘉歸殺之其罪極矣髙氏曰沈不與於召陵者與楚故也與楚者不受晉令也故晉因使蔡逞其忿焉夫蔡屢為楚所滅今而舎楚不易矣晉侯不能恢𢎞覇業求所以服楚而保蔡從蔡侵楚固己失之一沈不能容而殺之歸惡於蔡是重楚人怒蔡而易晉爾蔡雖齊桓之世不深即中國非不即中國也國近楚有畏焉不能保其無它也昭公毅然弃之蔡計則失蔡意則可嘉乃復為此舉嗚呼使昭公而知保國必悔之五月公及諸侯盟于臯鼬鼬由又切公作浩油左傳曰及臯鼬將長蔡於衛衛侯使祝佗私於萇𢎞𢎞恱告劉子與范獻子謀之乃長衛侯於盟張氏曰臯鼬許地杜氏曰繁陽縣東南有城臯亭髙氏曰此召陵之諸侯也襄二十五年重丘之盟亦㑹盟異處而不言公及何也程子曰公以不獲見於晉故因㑹而求盟焉則此盟公意也故書公及陸氏曰重言諸侯劉子不與盟也杞伯成卒于㑹成公作戊不言卒於師者以不成伐楚也杞悼公在位十二年世子乞嗣是為隠公七月其弟過殺隠公而自立是為僖公六月𦵏陳惠公髙氏曰此見陳侯背殯出㑹也盖君有殯則辭㑹可也雖不得已於晉令而齊亦使國夏来爾許遷于容城容城也闕任公輔以為華容縣亦祈之近地也髙氏曰自葉遷也至是盖四遷矣秋七月公至自㑹襄陵許氏曰不至侵楚譏無功也髙氏曰晉以伐楚召諸侯而以㑹至者不成乎伐也劉卷卒卷音權趙氏曰畿内諸侯不同列國澄曰王朝大夫雖食邑於劉其爵為子然不同於列國諸侯故卒不稱爵而但稱名若畿外諸侯則稱爵稱名也𦵏杞悼公魯往㑹也楚人圍蔡左傳曰楚為沈故圍蔡晉士鞅衛孔圉帥師伐鮮虞襄陵許氏曰謀楚而不能討盟蔡而不能救一唯中山是伐書卿與師著威勝不行於彊暴而行於寡弱也𦵏劉文公趙氏曰劉文公天子畿内諸侯列國不當與行交往之禮今㑹其𦵏非禮也髙氏曰尹氏王子虎皆不書𦵏此書𦵏者以魯特往㑹之也冬十有一月庚午蔡侯以吳子及楚人戰于栢舉楚師敗績栢舉公作伯莒左傳曰伍員為吳行人以謀楚楚之殺郤宛也伯氏之族出伯州犂之孫嚭為吳太宰以謀楚楚自昭王即位無嵗不有吳師蔡侯因之以其子乾與其大夫之子為質於吳蔡侯吳子唐侯伐楚舎舟於淮汭自豫章與楚夾漢左司馬戍謂子常曰子沿漢而與之上下我悉方城外以毁其舟還塞大隧直轅㝠阨子濟漢而伐之我自後撃之必大敗之既謀而行武城黑謂子常曰吳用木也我用革也不可久也不如速戰史皇謂子常楚人惡子而好司馬若司馬毁吳舟於淮塞城口而入是獨克吳也子必速戰不然不免乃濟漢而陳自小别至於大别三戰子常知不可欲奔史皇曰安求其事難而逃之將何所入子必死之初罪必盡說二師陳於伯舉闔廬之弟夫㮣王晨請於闔廬曰楚瓦不仁其臣莫有死志先伐之其卒必奔而後大師繼之必克弗許夫㮣王曰所謂臣義而行不待命者其此之謂也今日我死楚可入也以其屬五千先擊子常之卒子常之卒奔楚師亂吳師大敗之公羊傳曰蔡昭公朝乎楚有美裘焉囊瓦求之昭公不與為是拘昭公於南郢數年然後歸之於其歸焉用事乎河曰天下諸侯苟有能伐楚者寡人請為之前列楚人聞之怒為是興師使囊瓦將而伐蔡蔡請救於吳伍子胥復曰蔡非有罪也楚人為無道君如有憂中國之心則若時可矣於是興師而救蔡孫氏曰以者乞師而用之也楚人圍蔡晉師不出故蔡侯去晉求救於吳晉合十八國不能救蔡伐楚吳能救之伐之自是諸侯小大皆宗於吳杜氏曰栢舉楚地楚囊瓦出奔鄭髙氏曰此栢舉之敗將也胡氏曰囊瓦貪以敗國又不能死可賤甚矣庚辰吳入楚楚左作郢左傳曰吳從楚師五戰及郢楚子取其妺季芉畀我以出吳入郢以班處宫子山處令尹之宫夫㮣王欲攻之懼而去之夫㮣王入之楚子渉睢濟江入於雲中盜攻之王奔鄖鄖公辛與其弟巢以王奔随初伍員與申包胥友其亡也謂申包胥曰我必復楚國申包胥曰勉之子能復之我必能興之及昭王在随申包胥如秦乞師曰吳為封豕長蛇以薦食上國虐始於楚寡君失守社稷越在草莽使下臣告急曰夷徳無厭若鄰於君疆埸之患也逮吳之未定君其取分焉若楚之遂亡君之土也若以君靈撫之世以事君秦伯使辭焉曰寡人聞命矣子姑就館將圖而告對曰寡君越在草莽未獲所伏下臣何敢即安立依於庭牆而哭日夜不絶聲勺飲不入口七日秦哀公為之賦無衣九頓首而坐秦師乃出秦子蒲子虎帥車五百乘以救楚子蒲曰吾未知吳道使楚人先與吳人戰而自稷㑹之大敗夫㮣王於沂吳人獲薳射於栢舉其子帥奔徒以從子西敗吳師於軍祥子期子蒲滅唐吳師敗楚師於雍澨秦師又敗吳師吳師居麇子期焚之而又戰吳師敗又戰於公壻之谿吳師大敗吳子乃歸孫氏曰吳子救蔡伐楚善也乘囊瓦之敗長驅入郢夷其宗廟壊其宫室則甚矣經書月七書日四大衍厯正月戊子小癸巳六日癸丑冬至二月丁巳大三月丁亥小四月丙辰大庚辰二十五日閏月丙戌小五月乙夘大六月乙酉小七月甲寅大八月甲申小九月癸丑大十月癸未小十一月壬子大庚午十九日庚辰二十九日十二月壬午小長厯是年閏七月五年丙申敬王十五年晉覇定七蔡昭十四公曹靖公露元年衛靈三十鄭獻九陳懐栁元年杞僖公過元年宋景十二年齊景四十三秦哀三十二楚昭十一吳闔廬十春王三月三月公作正月辛亥朔日有食之夏歸粟于蔡杜氏曰蔡為楚所圍飢乏故魯歸之粟吕氏曰列國飢諸侯歸粟以先王之澤猶有存者也於越入吳左傳曰吳在楚也杜氏曰於發聲也劉氏曰於越者其自稱者也越者中國稱之者也髙郵孫氏曰越見於經凡六其三稱越皆在昭公之時五年越人與楚人伐吳七年楚放公子昭於越三十二年吳伐越皆曰越也其三稱於越二在定公之時五年於越入吳十四年於越敗吳於檇李一在哀公之時十三年於越入吳皆曰於越也髙氏曰闔廬争入郢之利而於越入吳夫差取盟晉之功而於越入吳意有所逐而愛有所忘矣按昭五年楚子以諸侯伐吳而越人已見於經至此及十四年至哀十三年皆書於越越人自名曰於越君子名之曰越吳之伐楚有安中國之意焉越乃乗其士卒罷弊掩入其國至十四年又敗吳於檇李哀十三年又入吳若為楚復讎者是以君子惡之於越與漢書於越同義盖於于越粤皆發語辭經書於餘丘亦即其自稱書之也六月丙申季孫意如卒左傳曰季平子卒陽虎將以璵璠歛仲梁懐弗與曰改步改玉陽虎欲逐之告公山不狃不狃曰彼為君也子何怨焉既𦵏桓子行東野及費子洩為費宰逆勞於郊桓子敬之勞仲梁懐仲梁懐弗敬子洩怒謂陽虎子行之乎陽虎囚季桓子及公父文伯而逐仲梁懐殺公何藐盟桓子於稷門之内大詛逐公父歜及秦遄皆奔齊澄按平子意如季孫宿之孫悼子紇之子也子斯嗣是為桓子秋七月壬子叔孫不敢卒此成子不敢叔孫婼之子無見於經而卒之者著叔孫之有後也子州仇嗣是為武叔冬晉士鞅帥師圍鮮虞左傳曰報觀虎之役也杜氏曰三年鮮虞獲晉觀虎髙氏曰以四年之伐未得志故也兵益憤義益不勝也經書月三書日三大衍厯正月辛亥大戊午冬至二月辛巳大三月辛亥小朔日食黄道室四度半彊四月庚辰大五月庚戌小六月己夘大丙申十八日七月己酉小壬子四日八月戊寅大九月戊申小十月丁丑大十一月丁未小十二月丙子大六年丁酉敬王十六年晉覇定八蔡昭十五曹靖二衛靈三十一鄭獻十陳懐二杞僖二宋景十三齊景四十四秦哀三十三楚昭十二吳闔廬十一春王正月癸亥鄭游速帥師滅許以許男斯歸左傳曰因楚敗也髙氏曰鄭許之怨舊矣許本恃楚以固其國至於四遷而楚不能為之疆而鄭游速以偏師一出滅其國而俘其君豈是楚人累敗於吳故鄭因乘許之㣲弱而肆其暴邪張氏曰按許自隠十一年齊魯鄭之入至今年大扺困於與鄭為鄰至成十五年遷葉之後又畏鄭而遷也定四年方自析遷容城以依楚不數年楚困於吳鄭遂滅之然自哀元年以後許復見之者楚又存之也大岳之後其亡一見害於鄭其存一恃於楚不過百年韓遂滅鄭亦有由也二月公侵鄭左傳曰周儋翩率王子朝之徒因鄭人將以作亂於周鄭於是乎伐馮滑胥靡負黍狐人闕外公侵鄭取匡為晉討鄭之伐胥靡也髙氏曰召陵之盟口血未乾而鄭保囊瓦滅許故晉命公興師而討之是時季孫斯初嗣卿位陪臣陽虎執國命又廹於晉命進退皆不由公也公至自侵鄭髙氏曰公内有彊臣不能討乃為晉討鄭内外結怨危之道也夏季孫斯仲孫何忌如晉左傳曰季桓子如晉獻鄭俘也陽虎彊使孟懿子往報夫人之幣晉人兼享之孟孫立於房外謂范獻子曰陽虎若不能居魯而息肩於晉所不以為中軍司馬者有如先君獻子曰寡君有官將使其人鞅何知焉獻子謂簡子曰魯人患陽虎矣孟孫知其釁以為必適晉故彊為之請以取入焉髙氏曰一卿將命尚兼它事豈可毎事一卿乎故累數之見二卿為陽虎所制也夫以二子之力專國擅君而陽虎乃能制之進云則進止云則止猶僕𨽻也嗚呼天子㣲諸侯僣諸侯㣲大夫凌大夫微陪臣脅理勢然爾襄陵許氏曰魯國政在大夫而家臣能彊使之則家臣始擅國矣秋晉人執宋行人樂祁犂左傳曰宋樂祁言於景公曰諸侯唯我事晉今使不往晉其憾矣樂祁告其宰陳寅陳寅曰必使子往它日公謂樂祁曰唯寡人說子之言子必往陳寅曰子立後而行吾室亦不忘唯君亦以我為知難而行也見溷而行趙簡子逆而飲之酒於綿上獻楊楯六十於簡子陳寅曰昔吾主范氏今子主趙氏又有納焉以楊楯賈禍弗可為也己然子死晉國子孫必得志於宋范獻子言於晉侯曰以君命越疆而使未致使而私飲酒不敬二君不可以不討也乃執樂祁張氏曰諸侯唯宋事晉懼討而遣使善逆以懐之猶懼不來而大夫黷貨賄争權利卒使來者見執叛者得志晉之亂政亟行覇統所由絶也胡氏曰使范趙方睦皆有獻焉則弗執之矣執異國行人出於列卿私意威柄不復在其君矣冬城中城榖梁傳曰三家張也髙氏曰三家張公之所有中城而已成九年城之矣此復城者外有齊鄭之怨故懼而城焉杜氏曰公為晉侵鄭故懼而城之季孫斯仲孫忌帥師圍鄆忌上脫何字杜氏曰何忌不言何闕文吕氏曰仲孫忌闕文無疑也而公羊以為譏二名三傳解經皆㨿文主義不論是非無復闕疑髙氏曰鄆自昭二十五年齊侯取之以居昭公三十年鄆潰遂貳於齊至是二卿圍而欲復取之盖陽虎欲傾季氏以謀政也季仲圍而曰陽虎何哉虎專季氏季氏專魯仲何為哉經書月二書日一大衍厯正月丙午小癸亥十八日冬至二月乙亥大三月乙巳小四月甲戌大五月甲辰小六月癸酉大七月癸夘大八月癸酉小九月壬寅大十月壬申小十一月辛丑大十二月辛未小七年戊戌敬王十七年晉覇定九蔡昭十六曹靖三衛靈三十二鄭獻十一陳懐三杞僖三宋景十四齊景四十五秦哀三十四楚昭十三吳闔廬十二春王正月夏四月秋齊侯鄭伯盟于鹹左傳曰齊鄭盟于鹹徵㑹于衛襄陵許氏曰齊鄭之盟叛晉也覇道隳諸侯散離盟始復自是中國無殷㑹矣杜氏曰鹹衛地永嘉陳氏曰此特相盟自齊桓以來未之有於是再見諸侯無主盟矣是故石門志諸侯之合也鹹志諸侯之判也齊人執衛行人北宫結以侵衛左傳曰衛侯欲叛晉諸大夫不可使北宫結如齊而私於齊侯曰執結以侵我齊侯從之劉氏曰善為國者親近而逺信之附内而外歸之衛侯欺其羣臣以紿晉殘其百姓以奉齊齊之執結也固非覇討矣而衛之無良又甚焉從此觀之孟子曰今之諸侯五覇之罪人也不亦信乎齊侯衛侯盟于沙沙下公有澤字杜氏曰結叛晉也澄謂執其行人以與其君結盟以叛晉齊衛之罪均也杜氏曰陽平元城縣東南有沙亭張氏曰元城今屬大名府大雩齊國夏帥師伐我西鄙左傳曰齊國夏伐我陽虎御季桓子公歛處父御孟懿子將宵軍齊師齊師聞之堕伏而待之處父曰虎不圖禍而必死苫夷曰陥二子於難不待有司余必殺女虎懼乃還不敗蘇氏曰魯事晉而齊叛之故伐我髙氏曰齊叛晉與鄭盟故為鄭伐我且報二卿之圍鄆襄陵許氏曰東夏諸侯唯魯事晉故齊伐之景公乘晉之衰不思唯徳之務以懐諸侯而欲力征經營以定覇統是知時之或可而不知己之不可者也九月大雩冬十月經書月四書日無大衍厯正月庚子大己巳冬至閏月庚午小二月己亥大三月已巳小四月戊戌大五月戊辰小六月丁酉大七月丁夘小八月丙申大九月丙寅小十月乙未大十一月乙丑大十二月乙未小三統厯是年正月己巳朔冬至殷厯正月庚午朔八年己亥敬王十八年晉覇定十蔡昭十七曹靖四卒衛靈三十三鄭獻十二陳懐四卒杞僖四宋景十五齊景四十六秦哀三十五楚昭十四吳闔廬十三春王正月公侵齊左傳曰門于陽州杜氏曰報前年伐我西鄙髙氏曰去年齊伐我西鄙有辭于我也公加兵于齊則無名矣是魯政不復在公矣而三家者實使公欲歸怨於公故也公至自侵齊髙氏曰侵齊本出於三家而三家欲歸怨於公故未逾月而至之且為下復侵齊起也二月公侵齊左傳曰攻廪丘之郛杜氏曰未得志故泰山孫氏曰公再侵齊以重其怨甚矣三月公至自侵齊髙氏曰公踰月之間再出侵齊雖三家者之為然頻往頻来不得休息見公之進退益不自專矣故兩書侵至以見之曹伯露卒靖公也自曹悼公卒其弟聲公野立五年而其弟通弑聲公代立是為隠公隠公立四年其弟露又弑隠公代立而經不書者曹亂故畧之也凡立四年其子陽嗣遂為宋所滅夏齊國夏帥師伐我西鄙髙氏曰以公不與鹹沙之盟且報此春之再侵也按昭公之孫也齊雖不克納而有意存之矣定公即位未嘗修好於齊故齊比年伐我而我亦再侵齊觀春秋書齊伐公侵則其曲直可見矣襄陵許氏曰春秋書内伐十六宣以後七内侵七宣以後六伐我二十一宣以後十七侵我五宣以後一用兵則侵多而伐少被兵則伐多而侵少盖魯自中世衰矣而欲與齊搆怨以侵易伐其能久乎公㑹晉師于瓦左傳曰齊伐我晉士鞅趙鞅荀寅救我公㑹晉師髙氏曰晉將來救而齊師已退故公出而逆之于瓦不書救者齊師先自退不因晉救之至也杜氏曰瓦衛地東郡㷼縣東北有瓦亭張氏曰今滑州白馬縣公至自瓦髙氏曰不以㑹至者公非出㑹也秋七月戊辰陳侯栁卒懐公也在位四年子越立是為愍公晉士鞅帥師侵鄭遂侵衛士公作趙左傳曰晉師將盟衛侯于鄟澤趙簡子曰羣臣誰敢盟衛君者涉佗成何曰我能盟之衛人請執牛耳成何曰衛吾温原也焉得視諸侯將歃涉佗捘衛侯之手及捥衛侯怒王孫賈趨進曰盟以信禮也有如衛君其敢不唯禮是事而受此盟也衛侯欲叛晉而患諸大夫王孫賈使次于郊大夫問故公以晉詬語之且曰寡人辱社稷其改卜嗣寡人從焉大夫曰是衛之禍豈君之過也公曰又有患焉謂寡人必以而子厚與大夫之子為質大夫曰苟有益也公子則往羣臣之子敢不皆負覊絏以從將行王孫賈曰苟衛國有難工商未嘗不為患使皆行而後可公以告大夫乃皆將行之行有日公朝國人使賈問焉曰若衛叛晉晉五伐我病何如矣皆曰五伐我猶可以能戰賈曰然則如叛之病而後質焉何遲之有乃叛晉晉人請改盟弗許晉士鞅㑹成桓公侵鄭圍蟲牢報伊闕也遂侵衛髙氏曰鄭伯與齊為鹹之盟衛侯與齊為沙之盟二國皆以齊而叛晉晉以是侵鄭侵衛所以絶齊之與國也晉不聲其罪不能取服故兩書侵襄陵許氏曰招擕以禮懐逺以徳鹹沙之盟諸侯已貳晉不思徳禮之是務而欲恃力攘服則失覇何日之有𦵏曹靖公九月𦵏陳懐公季孫斯仲孫何忌帥師侵衛左傳曰晉故也髙氏曰以其為晉興師故書侵澄曰魯於衛無可聲之罪故其師之出為無名冬衛侯鄭伯盟于曲濮杜氏曰結叛晉也曲濮衛地髙氏曰去年公侵鄭今年二卿侵衛皆為晉故而士鞅又自帥師侵之故二君同為此盟以固其謀從祀先公左傳曰季寤公鉏極公山不狃皆不得志於季氏叔孫輙無寵於叔孫氏叔仲志不得志於魯故五人因陽虎陽虎欲去三桓以季寤更季氏以叔孫輙更叔孫氏已更孟氏順祀先公而祈焉劉氏曰從祀先公正也所以從祀先公則非正矣其非正柰何季氏專魯陽虎專季氏欲去三桓而代之從祀先公以說焉非能正者也杜氏曰從順也先公閔公僖公也將正二公之位次所順非一親盡故通言先公盜竊寳玉大弓左傳曰陽虎將享季氏於蒲圃而殺之戒都車成宰公歛處父告孟孫曰季氏戒都車何故孟孫曰吾弗聞處父曰然則亂也必及於子先偹諸陽虎前驅林楚御桓子虞人以鈹盾夾之陽越殿將如蒲圃桓子咋謂林楚曰而先皆季氏之良也爾以是繼之對曰臣聞命後陽虎為政魯國服焉違之徵死死無益於主桓子曰何後之有而能以我適孟氏乎對曰不敢愛死懼不免主桓子曰往也孟氏選圉人之壯者三百人以為公期築室於門外林楚怒馬及衢而騁陽越射之不中有自門間射陽越殺之陽虎刼公與武叔以伐孟氏公歛處父帥成人自上東門入與陽氏戰於南門之内弗勝又戰於棘下陽氏敗陽虎說甲如公宫取寳玉大弓以出入於讙陽闗以叛杜氏曰盜謂陽虎也家臣賤名氏不見故曰盜寳玉夏后氏之璜大弓封父之繁弱蘇氏曰陽虎將殺季孫斯不勝而出取寳玉大弓於公宫以行其稱盜陪臣也寳玉大弓魯之分器也是時陽虎以鄆讙龜隂叛奔齊十年侯犯以郈叛及昭十二年南蒯以費叛皆以賤不書其書竊寳玉大弓何也分器重於地也分器重於地者賤貨而貴命也常山劉氏曰寳玉大弓天子所錫先君之分器藏於國子孫世世保之不可失墜而為盜所竊國慢無政可知矣胡氏曰古者告終易代𢎞璧琬琰天球夷玉兌之戈和之弓垂之竹矢莫不陳列非直為美觀也先王所寳得及其身能全而歸之則可以免矣魯失其政陪臣擅權雖先公分器猶不能守而盜得竊諸公宫其能國乎經書月五書日一大衍厯正月甲子大甲戌冬至一月甲午小三月癸亥大四月癸巳小五月壬戌大六月壬辰小七月辛酉大戊辰八日八月辛夘小九月庚申大十月庚寅小十一月己未大十二月己丑小長厯是年閏二月九年庚子敬王十九年晉覇定十一蔡昭十八曹伯陽元年衛靈三十四鄭獻十三卒陳閔公越元年杞僖五宋景十六齊景四十七秦哀三十六卒楚昭十五吳闔廬十四春王正月夏四月戊申鄭伯蠆卒蠆勅邁切公作囆獻公也在位十三年子勝嗣是為聲公得寳玉大弓左傳曰陽虎歸寳玉大弓伐陽闗陽虎使焚萊門師驚犯之而出奔齊請師以伐魯曰三加必取之齊侯將許之鮑文子諌曰魯免其疾而君又收之無乃害乎齊侯執陽虎虎遂奔晉適趙氏仲尼曰趙氏其世有亂乎公羊傳曰何以書國寳也䘮之書得之書杜氏諤曰直書曰得以明其失而復得不正其得之於盜也六月𦵏鄭獻公秋齊侯衛侯次于五氏左傳曰齊侯伐晉夷儀晉車千乘在中牟衛侯將如五氏卜過之龜焦衛侯曰可也衛車當其半寡人當其半敵矣乃過中牟中牟人欲伐之衛褚師圃亡在中牟曰衛雖小其君在焉未可勝也齊師克城而驕其帥又賤遇必敗之不如從齊乃伐齊師敗之齊侯致禚媚杏於衛杜氏曰五氏晉地任氏曰非伐晉也不書伐而書次者晉實大國未敢輕伐始盟于沙中次于五氏又次于垂葭至哀公元年而後伐其欲有所逞也久矣秦伯卒哀公也在位二十六年世子早卒世子之子嗣是為惠公冬𦵏秦哀公襄陵許氏曰秦自晉悼以後寢不見於春秋則知秦益退保西戎軍旅禮聘之事不交於中國矣經書月三書日一大衍厯正月戊午大己夘冬至二月戊子大三月戊午小四月丁亥大戊申二十二日五月丁巳小六月丙戌大七月丙辰小八月乙酉大九月乙夘小十月甲申大閏月甲寅小十一月癸未大十二月癸丑小十年辛丑敬王二十年晉覇定十二蔡昭十九曹陽二衛靈三十五鄭聲公勝元年陳閔二杞僖六宋景十七齊景四十八秦恵公元年楚昭十六吳闔廬十五春王三月及齊平杜氏曰平前八年再侵齊之怨吕氏曰及齊平我志也夏公㑹齊侯于夾谷夾公榖作頰後同左傳曰公㑹齊侯于祝其實夾谷孔丘相犂彌言於齊侯曰孔丘知禮而無勇若使萊人以兵刼魯侯必得志焉齊侯從之孔丘以公退曰士兵之兩君合好而裔夷之俘以兵亂之非齊君所以命諸侯也裔不謀夏夷不亂華俘不干盟兵不偪好於神為不祥於徳為愆義於人為失禮君必不然齊侯聞之遽辟之齊侯將享公孔丘謂梁丘㨿曰齊魯之故吾子何不聞焉事既成矣而又享之是勤執事也且犧象不出門嘉樂不野合饗而既具是棄禮也若其不具用秕稗也用秕稗君辱棄禮名惡子盍圖之夫享所以昭徳也不昭不如其已也乃不果享張氏曰夾谷魯地漢東海祝其縣有夾山今海州懐仁縣公至自夾谷榖梁傳曰其至何也危之也其危之奈何頰谷之㑹孔子相焉兩君就壇兩相相揖齊人鼓譟而起欲以執魯君孔子歴階而上不盡一等而視歸乎齊侯曰兩君合好夷狄之民何為來為命司馬止之齊侯逡廵而謝罷㑹齊人使優施舞於魯君之幕下孔子曰笑君者罪當死使司馬行法焉首足異門而出髙氏曰夾谷之㑹齊侯使萊人以兵刼故書至以危之晉趙鞅帥師圍衛左傳曰報夷儀也杜氏曰前年齊為衛伐晉夷儀故伐衛以為報襄陵許氏曰使晉有以報齊則衛可無用兵而服也今圍衛而不能服則徒足以堅齊之從而已矣齊人來歸鄆讙龜隂田讙火官切龜隂下榖有之字張氏曰鄆即昭公時齊取以居公者讙見桓三年杜氏以為齊地濟北蛇丘縣有讙亭而汶水經濟北至東平湏昌入濟泰山博縣有龜山今在泗水東北七十里隂田在山北也鄆讙二邑與龜隂俱在汶水北杜氏曰三邑皆汶陽田也何氏曰齊侯自夾谷歸謂晏子曰寡人獲過於魯侯如之何晏子曰君子謝過以質小人謝過以文齊嘗侵魯四邑請皆還之程子曰齊人服義而來歸之故書來歸胡氏曰齊人前此嘗歸濟西田矣後此嘗歸讙及闡矣而此獨書來歸何也曰歸者魯請而得之也曰來歸者齊人心服而歸之也桓公以義責楚而楚人求盟夫子以禮責齊而齊人歸地皆書曰來序績也叔孫州仇仲孫何忌帥師圍郈左傳曰初叔孫成子欲立武叔公若藐固諫曰不可成子立之而卒公南使賊射之不能殺公南為馬正使公若為郈宰武叔既定使郈馬正侯犯殺公若弗能其圉人曰吾以劒過朝公若必曰誰之劒也吾稱子以告必觀之吾偽固而授之末則可殺也使如之公若曰爾欲吳王我乎遂殺公若侯犯以郈叛武叔懿子圍郈弗克杜氏曰犯以不能副武叔之命故叛郈叔孫氏邑任公輔曰東平無鹽縣東南有郈縣張氏曰無鹽在今鄲州湏城縣東秋叔孫州仇仲孫何忌帥師圍郈郈公作費左傳曰二子及齊師復圍郈弗克叔孫謂郈工師駟赤曰郈非唯叔孫氏之憂社稷之患也將若之何駟赤謂侯犯曰居齊魯之際而無事必不可矣子盍求事於齊以臨民不然將叛侯犯從之齊侯至駟赤與郈人為之宣言於郈中曰侯犯將以郈易於齊齊人將遷郈民衆兇懼駟赤謂侯犯曰衆言異矣子不如易於齊與其死也猶是郈也而得紓焉何必此齊人欲以此偪魯必倍與子地且盍多舍甲於子之門以偹不虞侯犯曰諾乃多舍甲焉侯犯請易於齊齊有司觀郈將至駟赤使周走呼曰齊師至矣郈人大駭介侯犯之門甲以圍侯犯駟赤將射之侯犯止之曰謀免我侯犯請行許之駟赤先如宿侯犯殿毎出一門郈人閉之及郭門止之曰子以叔孫氏之甲出有司若誅之羣臣懼死駟赤曰叔孫氏之甲有物吾未敢以出犯謂駟赤曰子止而與之數駟赤止而納魯人侯犯奔齊齊人乃致郈胡氏曰侯犯以郈叛不書於䇿再書二卿帥師圍郈則彊亦可知矣三家專魯為曰既久至是家臣争叛三子知傾公室以自張而不知家𨽻之擬其後也據事直書深切著明矣宋樂大心出奔曹大心公作世心下同左傳曰宋公使樂大心盟於晉且逆樂祁之尸辭偽有疾乃使向巢如晉盟且逆子梁之尸子明謂桐門右師出曰吾猶衰絰而子擊鍾何也右師曰䘮不在此故也既而告人曰已衰絰而生子余何故舎鍾子明聞之怒言於公曰右師將不利戴氏不肯適晉將作亂不然無疾乃逐桐門右師髙氏曰辭使非大譴而讒言乘之罪累上矣宋公子地出奔陳地公作池下同左傳曰宋公子地嬖蘧富獵十一分其室而以其五與之公子地有白馬四公嬖向魋魋欲之公取而朱其尾鬛以與之地怒使其徒抶魋而奪之魋懼將走公閉門而泣之目盡腫母弟辰曰子分室以與獵也而獨卑魋亦有頗焉子為君禮不過出竟君必止子冬齊侯衛侯鄭游速㑹于安甫安公作鞌髙氏曰三國皆叛晉而㑹於此者盖結謀也張氏曰安甫齊地按今屬鄆州平隂縣叔孫州仇如齊左傳曰齊侯享之曰子叔孫若使郈在君之它竟寡人何知焉屬與敝邑際故敢助君憂之對曰非寡人之望也所以事君封疆社稷是以敢以家𨽻勤君之執事夫不令之臣天下之所惡也君豈以為寡君賜杜氏曰謝致郈也髙氏曰夾谷之㑹歸我鄆讙龜隂田侯犯以郈奔齊齊又致郈是以叔孫州仇如齊謝焉宋公之弟辰暨仲佗石彄出奔陳暨下公榖有宋字彄苦侯切左傳曰公子地出奔陳公弗止辰為之請弗聽辰曰是我廷吾兄也吾以國人出君誰與處母弟辰暨仲佗石彄出奔陳澄曰地氏公子者已三命也辰不氏公子未三命也曰宋公之弟著其屬之貴胡氏曰宋公以嬖魋故而失二弟無親親之恩辰以兄故帥其大夫出奔無尊君之義仲佗石彄見脅於辰不能自立無大臣之節孫氏曰交譏之經書月一書日無大衍厯正月壬午大甲午冬至二月壬子小三月辛巳大四月辛亥小五月庚辰大六月庚戌大七月庚辰小八月己酉大九月己夘小十月戊申大十一月戊寅小十二月丁未大長厯是年閏六月十有一年壬寅敬王二十一年晉覇定十三蔡昭二十曹陽三衛靈三十六鄭聲二陳閔三把僖七宋景十八齊景四十九秦惠二楚昭十七吳闔廬十六春宋公之弟辰及仲佗石彄公子地自陳入于蕭以叛髙氏曰始辰之出奔非其本心故書暨今入於蕭以叛則變其初心故書及夏四月秋宋樂大心自曹入于蕭左傳曰宋公母弟辰暨仲佗石彄公子地入于蕭以叛樂大心從之大為宋患寵向魋故也胡氏曰四卿在蕭以叛而大心自曹從之不書叛而曰入于蕭其叛可知也冬及鄭平左傳曰始叛晉也杜氏曰平六年侵鄭取匡之怨襄陵許氏曰夫晉之為晉自若也定亦未有它惡而諸侯離心焉者政在多門貨賄讒慝汩昬其間則無以令天下極於執樂祁也叔還如鄭涖盟還音旋叔還叔弓曽孫及鄭平者我欲之故鄭卿不來盟而我卿往涖盟也經書月一書日無大衍厯正月丁丑小庚寅冬至二月丙午大三月丙子小四月乙巳大五月乙亥小六月甲辰大七月甲戌小八月癸夘大九月癸酉小十月壬寅大十一月壬申小十二月辛丑大十有二年癸夘敬王二十二年晉覇定十四蔡昭二十一曹陽四衛靈三十七鄭聲三陳閔四把僖八宋景十九齊景五十秦惠三楚昭十八吳闔廬十七春薛伯定卒襄公也在位十三年子比嗣夏𦵏薛襄公春秋書薛卒者三𦵏者一不日不月史文畧也叔孫州仇帥師堕郈左傳曰仲由為季氏宰將堕三都於是叔孫氏堕郈髙郵孫氏曰堕毁也是時三桓之邑皆為城以自固故其家臣因之以叛昭十三年叔弓圍費十年夏秋郈凡再圍於是一堕毁之髙氏曰魯懲侯犯之難以其險固􅂲為國患故堕之堕之而至於帥師是邑之力足以抗也衛公孟彄帥師伐曹左傳曰克郊杜氏曰彄孟縶子季孫斯仲孫何忌帥師堕費左傳曰季氏將堕費公山不狃叔孫輙帥費人以襲魯公與三子入於季氏之宫登武子之臺費人攻之弗克入及公側仲尼命申句湏樂頎下伐之費人北國人追之敗諸姑篾二子奔齊遂堕費公羊傳曰孔子行乎季孫三月不違曰家不藏甲邑無百雉之城於是帥師堕郈堕費何氏曰郈叔孫氏所食邑費季孫氏所食邑二大夫宰吏數叛患之以問孔子孔子曰陪臣執國命采長數叛者坐邑有城池之固家有甲兵之藏故也季氏說其言而堕之故君子時然後言人不厭其言書者善公復古制弱臣勢也胡氏曰三桓既㣲陪臣擅命憑恃其城數有叛者三家亦不能制也而問於仲尼遂堕三都是謂以禮為國可以為之兆也髙氏曰前此未有堕邑之事堕邑亂之至也傳以為孔子之功是不然魯以大夫專國政不臣諸侯陪臣專家政不臣大夫上下循習之所致非一日矣苟欲其不叛在正其本而已諸侯正則大夫正矣大夫正則陪臣正矣何城池甲兵之患哉唯叔孫季孫不知出此故堕郈堕費所以譏也而傳反歸功於孔子不思甚矣昔者季氏將伐顓臾孔子曰是社稷之臣也何以伐為冉求曰顓臾固而近於費孔子曰季孫之憂不在顓臾而在蕭墻之内也今焉費叛豈非蕭墻之内歟然弗狃之叛召孔子欲往子路曰何必公山氏之之也孔子曰夫召我者而豈徒哉如有用我者吾其為東周乎孔子之㫖逺矣仲由所不及也秋大雩冬十月癸亥公㑹齊侯盟于黄齊公作晉杜氏曰結叛晉也張氏曰黄齊地十有一月丙寅朔日有食之公至自黄十有二月公圍成左傳曰將堕成公歛處父謂孟孫堕成齊人必至於北門且成孟氏之保障也無成是無孟氏也子偽不知我將不堕公圍成弗克髙氏曰天子令行乎天下諸侯令行乎一國故天子未嘗有伐諸侯者諸侯亦未嘗有伐其國之邑者以其令之則從也春秋之時天下無王而諸侯擅命故有王伐鄭之事陪臣擅國而權在私家故有公圍成之事叔孫既堕郈矣季氏既堕費矣孟氏將堕成而其臣不服至是公親圍之亦不克堕經書三子堕郈堕費而獨書公圍成著公之弱不能堕成也公至自圍成襄陵許氏曰竟内不至至圍成者魯與之如列國矣髙氏曰春秋書公行凡一百七十六而書至者八十有二皆危之也隠公當春秋之始天下之亂未甚故雖有㑹盟侵伐未嘗至也至桓二年及戎盟于唐十六年㑹諸侯伐鄭始於此至焉盖桓公弑君自立敢外交強隣又助簒伐鄭踰年始還故危之也荘僖㑹盟最數而無至者時齊侯外攘強暴内安諸夏屢合諸侯不以兵車故魯君之出無它虞也唯牡丘之盟過三時淮之㑹踰年故至爾成襄之間齊楚争覇諸侯日尋干戈故盟㑹侵伐鮮不至焉及㑹于蕭魚之後楚雖稍息然中國皆大夫專政魯亦有三桓之患至有敢逐其君而自廢置者故終春秋之世公出罕有不至者此雖伐邑亦至焉可謂危亂之世矣經書月三書日二大衍厯正月辛未大乙未冬至二月辛丑小三月庚午大四月庚子小五月己巳大六月己亥小七月戊辰大閏月戊戌小八月丁夘大九月丁酉小經十月癸亥在此月十月丙寅大日食經書十一月朔食盖春秋置閏在日食後故差一月也十一月丙申小十二月乙丑大長是年閏十一月癸亥十月二十七日十有三年甲辰敬王二十三年晉覇定十五蔡昭二十二曹陽五衛靈三十八鄭聲四陳閔五把僖九宋景二十齊景五十一秦惠四楚昭十九吳闔廬十八春齊侯衛侯次于垂葭榖無衛侯葭公作瑕左傳曰使師伐晉將濟河諸大夫皆曰不可邴意茲曰可鋭師伐河内傳必數日而後及絳絳不三月不能出河則我既濟水矣乃伐河内齊侯欲與衛侯乘與之宴而駕乘廣載甲馬使告曰晉師至矣齊侯曰比君之駕也寡人請攝乃介而與之乘驅之或告曰無晉師乃止杜氏曰二君將使師伐晉次垂葭以為援垂葭一名郥氏髙平鉅野縣有郥亭張氏曰今屬濟州髙氏曰書次于垂葭與九年次于五氏同夏築蛇淵囿襄陵許氏曰魯政不修而非時勤民築囿奉已而已志不及國也夫圍成弗克歸而力此何振之有髙氏曰魯國之囿一而已成築鹿囿昭築郎囿定築蛇淵囿何囿之多也大蒐于比蒲比音毗髙氏曰囿所以養禽獸待畋獵也築囿蛇淵今乃蒐于比蒲則又何為哉魯既叛晉而三桓日懼人之圖已故數蒐焉衛公孟彄帥師伐曹髙氏曰衛此伐曹者曹不叛晉故也靈公志在軍旅之事而不知以禮為國故亟戰如此秋晉趙鞅入于晉陽以叛左傳曰晉趙鞅謂邯鄲午曰歸我衛貢五百家吾舎諸晉陽午許諾歸告其父兄父兄皆曰不可衛是以為邯鄲而寘諸晉陽絶衛之道也不如侵齊而謀之乃如之而歸之于晉陽趙孟怒召午而囚諸晉陽使其從者說劒而入涉賔不可乃使告邯鄲人曰吾私有討於午也二三子唯所欲立遂殺午趙稷涉賔以邯鄲叛上軍司焉籍秦圍邯鄲邯鄲午荀寅之甥也荀寅范吉射之姻也而相與睦故不與圍邯鄲將作亂董安于聞之告趙孟曰先偹諸趙孟曰晉國有命始禍者死為後可也安于曰與其害于民寕我獨死請以我說趙孟不可范氏中行氏伐趙氏之宮趙鞅奔晉陽晉人圍之公羊傳曰晉荀寅與士吉射君側之惡人也趙鞅取晉陽之甲以逐荀寅士吉射曷為以叛言之無君命也趙氏曰趙鞅之入晉陽報范中行也而書曰叛人臣不當專土也髙氏曰據土背君曰叛鞅殺邯鄲午固有罪矣范中行氏特以姻親之故興師以攻鞅故鞅入晉陽以拒之因興晉陽之甲託辭以逐君側之惡而不知投䑕忌器之義故聖人正名曰叛以著其不由君命而專土興兵之罪張氏曰晉陽太原府并州也冬晉荀寅士吉射入于朝歌以叛荀寅下公有及字左傳曰范臯夷無寵於范吉射而欲為亂於范氏梁嬰父嬖於知文子欲以為卿韓簡子與中行文子相惡魏襄子亦與范昭子相惡故五子謀將逐荀寅而以梁嬰父代之逐范吉射而以范臯夷代之荀躒言於晉侯曰君命大臣始禍者死載書在河今三臣始禍而獨逐鞅刑已不鈞矣請皆逐之荀躒韓不信魏曼多奉公以伐范氏中行氏弗克二子將伐公齊髙彊曰三折肱知為良醫唯伐君為不可民弗與也我以伐君在此矣三家未睦可盡克也克之君將誰與若先伐君是使睦也弗聽遂伐公國人助公二子敗從而伐之荀寅士吉射奔朝歌張氏曰朝歌晉地衛州衛縣西有朝歌城南有牧野胡氏曰晉主夏盟威服天下及大夫專政賄路公行内外離析示威平丘而齊叛辭請召陵而蔡叛盟于沙鹹而鄭叛次于五氏而衛叛涖盟于鄭㑹于夾谷歃于而魯叛諸侯叛于外大夫叛于内故奔于晉陽而趙鞅叛入于朝歌而荀寅士吉射叛以晉國之大天下莫彊焉邦分崩而不能守也三卿内叛直書于䇿見其效也晉趙鞅歸于晉左傳曰韓魏以趙氏為請趙鞅入于絳盟于公宫髙氏曰此盖二子既出晉侯自謂趙鞅保其邑以違荀范之難實非叛者故許之歸也先儒以歸為善辭遂謂鞅有叛迹而無叛心春秋先正其罪以勵臣節此許其歸以廣君恩是不然叛者人臣之大惡也脫使鞅初入晉陽本拒范中行氏而非有叛君之心然人臣無君命輙據土興兵此豈可赦乎使後世亂臣賊子敢興兵向闕以除君側惡人為名而實欲脅君專權者皆先儒啟之也可不辨乎况衛孫林父亦書歸爾何善之有蘇氏曰鞅之言歸寅吉射既出則無難也鞅寅吉射之叛其罪均也鞅以有助故得復寅吉射以無援故終叛春秋無所與也澄按左氏傳哀公三年十月晉趙鞅圍朝歌師于其南荀寅伐其郛使其徒自北門入已犯師而出癸丑奔邯鄲四年九月趙鞅圍邯鄲十一月邯鄲降荀寅奔鮮虞趙稷奔臨十二月弦施逆之遂堕臨國夏伐晉取邢任欒鄗逆畤隂人盂壺口㑹鮮虞納荀寅于柏人五年春晉圍柏人荀寅士吉射奔齊薛弑其君比在位一年惠公夷嗣立經書月無書日無大衍厯正月乙未大庚子冬至二月乙丑小三月甲午大四月甲子小五月癸巳大六月癸亥小七月壬辰大八月壬戌小九月辛夘大十月辛酉小十一月庚寅大十二月庚申小十有四年乙巳敬王二十四年晉覇定十六蔡昭二十三曹陽六衛靈三十九鄭聲五陳閔六把僖十宋景二十一齊景五十二秦惠五楚昭二十吳闔廬十九春衛公叔戍來奔左傳曰初衛公叔文子朝而請享靈公退見史鰌而告之史鰌曰子必禍矣子富而君貪罪其及子乎文子曰然吾不先告子是吾罪也君既許我矣其若之何史鰌曰無害子臣可以免富而能臣必免於難上下同之戍也驕其亡乎富而不驕者鮮吾唯子之見驕而不已者未之有也戍必與焉及文子卒衛侯始惡於公叔戌以其富也公叔戌又將去夫人之黨夫人愬之曰戍將為亂衛侯逐公叔戌與其黨故趙陽奔宋戍來奔胡氏曰靈公無道不能正家以䘮其大臣戍又以富見惡於衛侯夫富者怨之府也使戍積而能散以財發身不為貪人之所怨於以保其爵位儻庶幾乎衛趙陽出奔宋衛公作晉杜氏曰陽趙黶孫二月辛巳楚公子結陳公孫佗人帥師滅頓以頓子牂歸公孫佗人孫公作子牂子郎切公作牄左傳曰頓子牂欲事晉背楚而絶陳好楚滅頓杜氏曰小不事大所以亡夏衛北宫結來奔左傳曰公叔戌之故也杜氏曰亦黨公叔戌皆惡之髙氏曰衛靈耳於閨以奔其世臣又及其所與是以其國聽之也五月於越敗吳于檇李檇音醉公作醉左傳曰吳伐越越子勾踐禦之陳于檇李勾踐患吳之整也使死士再禽焉不動使罪人三行屬劒於頸遂自剄師屬之目越子因而伐之大敗之杜氏曰吳郡嘉興縣南醉李城張氏曰檇李吳地今為秀州地所吳子光卒左傳曰靈姑浮以戈擊闔廬闔廬傷將差指取其一屨還卒於陘去檇李七里夫使人立於庭苟出入必謂已曰夫差而忘越王之殺而父乎則對曰唯不敢忘三年乃報越襄陵許氏曰書檇李之敗用見光玩兵滅身以為殘民伐國之戒公㑹齊侯衛侯于牽牽公作堅左傳曰晉人圍朝歌公㑹齊侯衛侯于脾上梁之間謀救范中行氏析成鮒小王桃甲率狄師以襲晉戰於絳中不克而還士鮒奔周小王桃甲入於朝歌張氏曰齊景公欲求覇誅晉之亂臣以正其國可也當是時孔子已去魯故㑹齊衛合謀救范中行氏三國之君同為范中行為㑹而助不衷也杜氏曰魏郡黎陽縣東北有牽城公至自㑹秋齊侯宋公㑹于洮左傳曰范氏故也襄陵許氏曰齊宋魯衛崇奬亂逆謀動干戈大義亡矣杜氏曰洮曹地天王使石尚來歸脤脤市軫切公羊傳曰石尚天子之士也脤爼實也腥曰脤熟曰膰杜氏曰脤祭社之肉盛以脤器以賜同姓劉氏曰脤膰以親兄弟之國受脤禮也歸脤非禮也髙氏曰周自季子來聘之後王命不復加於諸侯矣今敬王有事於社魯未嘗有敵王所愾之功而天王特使石尚忽為此舉雖天子損禮之甚是猶有盛王之意也聖人於周眷眷如此故於使歸脤以見焉曰天子之在唯祭與號而已衛世子蒯聵出奔宋蒯苦怪切聵五怪切左傳曰衛侯為夫人南子召宋朝㑹於洮太子蒯聵獻盂于齊過宋野野人歌之曰既定爾婁豬盍歸吾艾豭太子羞之謂戯陽速曰從我而朝少君少君見我我顧乃殺之速曰諾乃朝夫人夫人見太子太子三顧速不進夫人見其色啼而走曰蒯聵將殺余公執其手以登臺太子奔宋太子告人曰戯陽速禍余戯陽速告人曰太子則禍余太子無道使余殺其母余不許將戕於余若殺夫人將以余說余是故許而不為以紓余死劉氏曰左氏叙蒯聵事云云蒯聵雖不善謀安有此事哉且殺夫人蒯聵獨得全乎彼所羞者以夫人名惡也如殺其母為惡愈大反不知可羞乎盖蒯聵聞野人之歌其心慙焉則以謂夫人夫人惡其斥已之滛則啼而走言太子將殺余以誣之靈公惑於南子所言必聽從故外則召宋朝内則逐公叔戌趙陽彼不恥召宋朝固亦不難逐蒯聵矣此其真也不當如左氏所記又蒯聵出乃奔宋宋南子家也蒯聵負殺南子之名而走又入其家使真有其事者敢乎哉此亦一證也常山劉氏曰靈公聽南子之譛謂蒯聵欲殺母不為辨明以致其出奔靈公之罪也張氏曰劉氏明蒯聵之不弑母當合劉質夫觧觀之自古讒婦之誣其子多矣考二劉之言足以知左氏所記乃南子之讒言而非當時之實錄也澄曰蒯聵不能自明而出奔其黨皆逐戯陽速太子家臣也非逐則殺矣速反覆小人一聞夫人之誣言即為證成其事曰太子實使余為此而余弗為以自黨於夫人而免已之禍靈公既不察夫人之誣時人又誤聽戯陽速之證莫能辨其情實故左氏所記如此劉氏乃能辨明於千載之後其卓識君子哉衛公孟彄出奔鄭左傳曰太子奔宋盡逐其黨故公孟彄奔鄭自鄭奔齊髙氏曰其年志公孟帥師此衛國用事之卿靈公疑其為蒯聵之黨而逐之夫衛國一嵗之中出奔者五人而衛侯獨與南子處靈公之無道也宋公之弟辰自蕭來奔髙氏曰宋公不能容一弟既使為奔亡之臣又使為叛逆之臣一身無所容懼洮之謀逐來奔魯以求入察辰之本心非叛也大蒐于比蒲髙氏曰凡蒐狩皆與衆共之雖不善公公在可知然公狩于郎公及齊人狩于禚皆特書公此又專罪公也張氏曰公親蒐矣而不書公以軍政不屬公而專於三家則季孫孟孫氏之所為也髙郵孫氏曰春秋田狩之事公行之者必書公公觀魚于棠公狩于郎隠桓之時政猶自公出也自昭之紅蒐政在三桓蒐田之禮雖公自行皆曰大蒐而不曰公焉所以見公之不得為政而大夫專國也邾子來㑹公髙氏曰比蒲之蒐三家之事故特言㑹公以别之此與荘四年蕭叔朝公同盖未嘗期約因來朝偶遇與公為㑹爾此年無冬史闕文城莒父及霄杜氏曰公叛晉助范氏故懼而城二邑張氏曰皆魯邑子夏嘗為莒父宰經書月二書日一大衍厯正月己丑大乙巳冬至二月己未小辛巳二十三日三月戊子大四月戊午小五月丁亥大六月丁巳大七月丁亥小八月丙辰大九月丙戌小十月乙夘大十一月乙酉小十二月甲寅大長厯是年閏十二月十有五年丙午敬王二十五年晉覇定十七蔡昭二十四曹陽七衛靈四十鄭聲六陳閔七杞僖十一宋景二十二齊景五十三秦惠六楚昭二十一吳夫差元年春王正月邾子來朝左傳曰邾隠公來朝子貢觀焉邾子執玉髙其容仰公受玉卑其容俯子貢曰以禮觀之二君其皆有死亡焉正月相朝而皆不度心已亡矣嘉事不體何以能乆髙仰驕也卑俯替也驕近亂替近疾君為主其先亡乎髙氏曰去年所以㑹公比蒲者欲其來朝正故也鼷䑕食郊牛牛死改卜牛公羊傳曰曷為不善所食漫也趙氏曰上元二年因避地旅於㑹稽時牛災小䑕噬牛纔傷皮膚輙死二月辛丑楚子滅胡以胡子豹歸左傳曰吳之入楚也胡子盡俘楚邑之近胡者楚既定胡子豹又不事楚曰存亡有命事楚何為多取費焉楚滅胡夏五月辛亥郊公羊傳曰曷為以夏五月郊三卜之運也何氏曰運轉也已卜春三正不吉復轉卜夏三月周五月得二吉故五月郊髙氏曰魯郊當在孟春今以改卜牛在滌三月故至五月乃郊壬申公薨于髙寢榖梁傳曰髙寢非正也杜氏曰髙寢宫名襄陵許氏曰内卒凡十四公得正而薨者唯荘宣成鄭罕達帥師伐宋罕公作軒左傳曰敗宋師于老丘杜氏曰宋公子地奔鄭鄭為之伐宋欲取地以處之事見哀十二年齊侯衛侯次于渠蒢渠公作蘧左傳曰謀救宋也襄陵許氏曰齊衛新與宋鄭同盟叛晉故為宋出請為鄭次止其不言救為其不誠於救也髙氏曰謀救宋而不果其文意與五氏垂葭同邾子來奔䘮公羊傳曰奔䘮非禮也髙氏曰來奔魯䘮畏三家之彊而求説於魯爾秋七月壬申姒氏卒姒榖作弋下同左傳曰不稱夫人不赴且不祔也杜氏曰姒氏定公夫人也八月庚辰朔日有食之九月滕子來㑹𦵏吕氏曰邾子來奔䘮畏魯甚也滕差逺而大於邾故但來㑹𦵏此專以利害彊弱為國者也髙氏曰此亦畏三桓故爾於定公何有哉丁巳𦵏我君定公雨不克𦵏戊午日下昃乃克𦵏昃榖作積穀梁傳曰𦵏既有日不為雨止禮也雨不克𦵏䘮不以制也髙氏曰不克𦵏無偹之甚也義見宣八年然彼言日中而克𦵏此言日下昃乃克𦵏日中則裕於日昃矣君子之於親不忍一日離也故𦵏日虞所以寕親也日下昃則失虞之時矣辛巳𦵏定姒左傳曰不稱小君不成䘮也杜氏曰公未𦵏而夫人薨煩於䘮禮不赴不袝故不稱小君臣子怠慢也薛氏曰定姒定夫人也卒不書夫人𦵏不書小君殺夫人之禮也卒之而𦵏諡配先公臣子而不以為君夫人其可乎澄曰左氏以定姒為正夫人而諸家皆以為定公之妾今按姒氏與公同謚其為正夫人也審矣僖昭宣三公之母皆妾也而稱夫人薨稱𦵏小君欲致隆於君母雖越禮不顧也今姒氏定公之夫人嗣君之適母而乃不成其䘮降殺其禮見三家之不臣而蔑其君是以敢卑其母也冬城漆杜氏曰邾庶其邑余氏曰前年冬城莒父此年秋𦵏定公又𦵏定姒冬城漆其勞民也甚矣張氏曰城漆謀伐邾也定公之䘮邾子來奔事魯謹矣哀公初立不務善鄰而以土地之故勞民力啟鄰怨二年取其田七年俘其君卒使吳人乘間以伐其國齊人問罪而取讙闡利未得而害随之謀國如此其不終也宜哉經書月六書日七大衍厯正月甲申小辛亥冬至經二月辛丑在此月二月癸丑大三月癸未小閏月壬子大四月壬午小五月辛亥大經書郊不言朔史逸之壬申二十二日六月辛巳小七月庚戌大壬申二十三日八月庚辰小朔日食黄道星三度太疆九月己酉大丁巳九日戊午十日十月己夘大經書辛巳當在此月三日十一月己酉小十二月戊寅大春秋纂言卷十一
