body:
  text: 春秋纂言總例春秋類提要臣等謹案春秋纂言總例七卷春秋纂言十二卷元吳澄撰澄有易纂言已著録是書採托諸家傳注而間以己意論斷之首為總例凡分七綱八十一目其天道人紀二例澄所創作餘吉凶軍賓嘉五例則與宋張大亨春秋五禮例宗互相出入似乎蹈襲然澄非蹈襲人書者蓋大亨學派出於睂山蘇氏澄之學派兼出於金溪新安之間門户不同師傳各異未暏大亨之書故與之暗合而不知也然其縷析條分則較大亨為密矣至於經文行欵多所割裂而經之闕文亦皆補以方空於體例殊為未協則澄於諸經率皆有所點竄不獨春秋為然讀是書者取其長而置其所短可也明嘉靖中嘉興府知府蔣若愚嘗為鋟木嵗久散佚世罕傳本王士禎居易録自云未見其書又云朱檢討曾見之吳郡陸醫其清家是朱彛尊經義考之注存字亦僅曾一睹之耳此本為兩淮所採進殆即傳寫陸氏本歟久微而復著固亦可寶之笈矣乾隆四十六年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀春秋纂言總例原序屬辭比事春秋教也昔唐啖助趙匡集春秋傳門人陸淳又類聚事辭成纂例十卷今澄既采托諸家之言各麗于經乃分所異合所同倣纂例為總例七篇初一天道次二人紀次三嘉禮次四賔禮次五軍禮次六凶禮次七吉禮例之綱七例之目八十有八凡春秋之例禮失者書出于禮則入于法故曰刑書也事實辭文善惡畢見聖人何容心哉蓋渾渾如天道焉嗚呼其義微矣而執謙自謂之竊取區區末學庸詎可得與聞乎臨川吳澄序
