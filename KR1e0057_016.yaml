body:
  text: 春秋纂言卷九元吳澄撰襄公名午成公妾定姒之子在位三十一年元年己丑簡王十四年崩晉霸悼公周元年蔡景二十年曹成六年衛獻五年鄭成十三年陳成二十七年把桓六十五年宋平四年齊靈十年秦景五年楚共十九年吳夀夢十四年春王正月公即位襄公生甫四嵗大臣相之見諸臣而行即位之禮仲孫蔑㑹晉欒黶宋華元衛寧殖曹人莒人邾人滕人薛人圍宋彭城左𫝊曰非宋地追書也於是為宋討魚石故稱宋彭城降晉晉人以宋五大夫在彭城者歸置諸瓠丘齊人不㑹彭城晉人以為討齊太子光為質於晉榖梁𫝊曰繫彭城於宋者不與魚石也劉氏曰魚石走之楚楚子取彭城而封之諸侯為是討之楚已取彭城矣曷為繫之宋楚子不得取之宋魚石不得受之楚也師氏曰苟書彭城而不書宋則無以見魚石之不臣楚子之奬亂與夫諸侯討叛之功矣夏晉韓厥帥師伐鄭厥公作屈左𫝊曰晉韓厥荀偃帥諸侯之師伐鄭入其郛敗其徒兵於洧上仲孫蔑㑹齊崔杼曹人邾人把人次于鄫鄫公作合左傳曰東諸侯之師次于鄫以待晉師杜氏曰鄫鄭地在陳留襄邑縣東南高氏曰晉以韓厥已足以當鄭不欲重勤東諸侯之師故使次于鄫以震鄭心且備楚師之出也秋楚公子壬夫帥師侵宋左𫝊曰晉師自鄭以鄫之師侵楚焦夷及陳晉侯衛侯次于戚以為之援楚子辛救鄭侵宋吕留鄭子然侵宋取大邱孫氏曰楚師侵宋所以救鄭也高氏曰楚不敢敵諸侯之師卒不為動則有以量楚力所至矣以其無名加兵故書曰侵九月辛酉天王崩蕳王也在位十四年子泄心嗣是為靈王邾子來朝高氏曰公雖新立才四嵗爾又在衰絰之中豈能以禮相接乎冬衛侯使公孫剽來聘剽匹妙切高氏曰剽蓋衛國用事者厥後遂逐衛侯而自立晉侯使荀罃來聘孫氏曰天王崩邾子衛晉之朝聘皆不臣也高氏曰二國來聘以公新即位故也凡聘必以禮樂相見公在喪中又遭天王之喪而邾子來朝是時訃未至於諸侯猶可言也至冬而晉衛二國不廢聘好則諸侯不臣之罪著矣縱彼未聞訃而來魯亦豈可晏然受之乎經書月二書日一大衍厯正月辛亥小丁卯冬至二月庚辰大三月庚戌小四月己卯大五月己酉小六月戊寅大七月戊申小八月丁丑大九月丁未小辛酉十五日十月丙子大十一月丙午小十二月乙亥大二年庚寅靈王元年晉霸悼二蔡景二十一曹成七衛獻六鄭成十四卒陳成二十八杞桓六十六宋平五齊靈十一秦景六楚共二十吳夀夢十五春王正月葬簡王五月而葬速也鄭師伐宋左傳曰楚令也高氏曰楚以彭城故令鄭伐之鄭受制於夷狄而為之伐中國襄陵許氏曰書伐宋者積鄭之疚夏五月庚寅夫人姜氏薨此成公夫人齊姜也六月庚辰鄭伯睔卒睔古困切左傳曰鄭成公疾子駟請息肩于晉公曰楚君以鄭故親集矢於其目非異人任寡人也若背之是棄力與言其誰䁥我免寡人唯二三子襄陵許氏曰鄭之託於楚夫豈以中國為終可畔既䝉其德遂不可反是以君子貴謀始也澄曰鄭成公也在位十四年子髠頑嗣是為僖公高氏曰不書葬者以成公背中國故諸侯不㑹其葬也晉師宋師衛寧殖侵鄭左傳曰於是子罕當國子駟為政子國為司馬晉師侵鄭諸大夫欲從晉子駟曰官命未改杜氏曰宋雖非卿師重故叙衛上吕氏曰衛不稱師將尊師少也蘇氏曰鄭雖有畔中國之罪而伐其喪非禮也澄曰以伐喪故書侵而不言伐秋七月仲孫蔑㑹晉荀罃宋華元衛孫林父曹人邾人于戚左傳曰謀鄭故也孟獻子曰請城虎牢以逼鄭知武子曰善鄫之㑹吾子聞崔子之言今不來矣滕薛小邾之不至皆齊故也寡君之憂不唯鄭罃將復於寡君而請於齊得請而告吾子之功也若不得請事將在齊吾子之請諸侯之福也豈唯寡君賴之己丑葬我小君齊姜齊諡也三月而葬速叔孫豹如宋左傳曰通嗣君也杜氏曰豹於此始自齊還為卿冬仲孫蔑㑹晉荀罃齊崔杼宋華元衛孫林父曹人邾人滕人薛人小邾人于戚遂城虎牢左傳曰復㑹于戚齊崔武子及榺薛小邾之大夫皆㑹知武子之言故也遂城虎牢鄭人乃成張氏曰虎牢故東虢之邑也鄭滅為制邑秦漢為成臯東有汜水今孟州有汜水縣故虎牢城胡氏曰虎牢巖險聞於天下猶虞之下陽晉之上黨魏之安邑燕之榆關吳之西陵蜀之漢樂地有所必據城有所必守而不可以棄焉者也程子曰鄭有虎牢而不能守故不繫於鄭也劉氏曰此鄭虎牢也曷為不繫之鄭取之已非鄭之地也陸氏曰諸侯之大夫相與取它國之邑而城之非正也城之可以安中國息征伐故聖人許之而不繫之於鄭也楚殺其大夫公子申左傳曰公子申為右司馬多受大國之賂以逼子重子辛楚人殺之劉氏曰嬰齊也壬夫也申也三人者執楚國之政公子申賄而專嬰齊壬夫畏其逼而殺之也襄陵許氏曰著楚之所以不競於晉也經書月四書日三大衍厯正月乙巳小壬申冬至二月甲戌大三月甲辰大閏月甲戌小四月癸卯大五月癸酉小庚寅十八日六月壬寅大七月壬申小經六月庚辰在此月九日己丑十八日八月辛丑大九月辛未小十月庚子大十一月庚午小十二月己亥大長厯是年閏四月庚寅五月十九日六月亦無庚辰三年辛卯靈王二年晉霸悼三蔡景二十二曹成八衛獻七鄭僖公髠頑元年陳成二十九杞桓六十七宋平六齊靈十二秦景七楚共二十一吳夀夢十六春楚公子嬰齊帥師伐吳左傳曰楚子重伐吳為簡之師克鳩兹至于衡山使鄧廖帥組甲三百被練三千以侵吳吳人要而擊之獲鄧廖其能免者組甲八十被練三百而已既飲至三日吳人伐楚取駕駕良邑也鄧廖亦楚之良也君子謂子重於是役也所獲不如所亡楚人以是咎子重子重病之遇心疾而卒襄陵許氏曰國政失御大臣相殘又外結吳怨而內為晉讎此共王之所以不振也高氏曰楚始志伐吳吳與鍾離之㑹故也楚自鄢陵之敗勢稍屈於中國楚畏中國諸侯並力謀之而吳乘其間故先伐吳以張其勢公如晉左傳曰始朝也高氏曰童子侯不朝王蓋不可接以成人之禮也豈可反朝同列乎夏四月壬戌公及晉侯盟于長樗左傳曰孟獻子相公稽首知武子曰天子在而君辱稽首寡君懼矣孟獻子曰以敝邑介在東表密邇仇讎寡君將君是望敢不稽首高氏曰移所以事天子之禮事晉也張氏曰孟獻子魯之賢大夫尚不知君臣之義春秋諸賢之同病也長樗近晉之地蘇氏曰晉侯修禮於諸侯故去其國都與公盟于長樗公至自晉何氏曰上盟不于國都嫌如晉不得入故以晉至六月公㑹單子晉侯宋公衛侯鄭伯莒子邾子齊世子光己未同盟于雞澤左傳曰晉為鄭服故且欲修吳好將合諸侯使士丐告于齊曰寡君使丐以歲之不易不虞之不戒寡君願與二三兄弟相見以謀不協請君臨之使丐乞盟齊侯欲勿許而難為不協乃盟於耐外公㑹單頃公及諸侯同盟于雞澤晉侯使荀㑹逆吳子于淮上吳子不至髙氏曰此因城虎牢之故鄭服而同盟而王臣亦與焉杜氏曰雞澤晉地在廣平曲梁縣西南任公輔曰按地譜一名雞丘張氏曰今洺州永平縣晉悼公始合諸侯而儕王官於諸侯俾同㰱血與桓公首止葵丘異矣故書諸侯㑹不再言雞澤而己未同盟例之於新城同盟之書陳侯使袁僑如㑹左傳曰楚子辛為令尹侵欲於小國陳成公使袁僑如㑹求成晉侯使和組父告于諸侯啖氏曰不召而自來也高氏曰陳自辰陵之盟而即楚凡十有八年矣晉屢爭鄭而不爭陳者非不爭陳也得鄭則亦得陳者也今聞鄭伯受盟故俾大夫來求成于晉以其本非召㑹而自來來又後時故書如㑹戊寅叔孫豹及諸侯之大夫及陳袁僑盟榖梁傳曰諸侯盟大夫又相與盟是大夫張也雞澤之㑹諸侯始失政矣啖氏曰諸侯既盟袁僑乃至故使大夫别與之盟也孫氏曰諸侯既盟而袁僑至無盟可也諸侯盟大夫又盟諸侯始失政也至湨梁之盟曰大夫而不復言諸侯之大夫則政在大夫矣胡氏曰陳久叛中國不堪楚之侵欲然後求盟于晉悼公立已四年其從晉不亦晚乎悼公盍亦增修德政而謂袁僑曰諸侯之盟事畢矣而吾子始來若再刑牲歃血要質鬼神是瀆也吾子以帝王之胄習於禮義害楚之政背夷即華此諸侯之願寡君之欲也雖微盟誓天地鬼神實照臨之其唯同心糾逖王慝厚禮遣之使往報焉足矣奚必汲汲使大夫盟之哉秋公至自㑹冬晉荀罃帥師伐許左傳曰許靈公事楚不㑹于雞澤知武子帥師伐許張氏曰荀罃悼公之賢大夫也偶見陳人之服不能輔悼公益修德以保陳陳固則許何患其不來今遽帥師以問罪於許規模欲速宜其並陳不能保也經書月二書日三大衍厯正月己巳小丁丑冬至二月戊戌大三月戊辰小四月丁酉大壬戌二十六日五月丁卯大六月丁酉小己未二十三日七月丙寅大經六月戊寅在此月八月丙申小九月乙丑大十月乙未小十一月甲子大十二月甲午小長厯六月七月朔同戊寅亦不在六月四年壬辰靈王三年晉霸悼四蔡景二十三曹成九衛獻八鄭僖二陳成三十卒杞桓六十八宋平七齊靈十三秦景八楚共二十二吳壽夢十七春王三月己酉陳侯午卒成公也在位三十年子溺嗣是為哀公高氏曰陳成公既為雞澤之㑹則是國已變於夏矣夏叔孫豹如晉左傳曰報知武子之聘也高氏曰且為鄫世子故事見五年六年秋七月戊子夫人姒氏薨姒公作弋下定姒同杜氏曰成公妾襄公母姒杞姓高氏曰襄公以夫人之禮葬之葬陳成公八月辛亥葬我小君定姒杜氏曰逾月而葬速高氏曰死才二十四日爾襄陵許氏曰傳載季文子欲不以夫人之禮葬定姒而不得已於人言卒夫人之觀此逾月而葬禮略也冬公如晉左傳曰公如晉聽政晉侯享公公請屬鄫晉侯不許孟獻子曰以寡君之密邇於仇讎而願固事君無失官命鄫無賦於司馬為執事朝夕之命敝邑敝邑褊小缺而為罪寡君是以願借助焉晉侯許之陳人圍頓左傳曰楚人使頓間陳而侵伐之故陳人圍頓髙氏曰僖二十五年楚人圍陳納頓子于頓陳侯畏楚而不敢討頓子恃楚而不事陳今陳復從中國而頓為楚間故圍之自雞澤之㑹而書伐許圍頓著晉興而楚詘矣經書月三書日三大衍酉正月癸亥大壬午冬至二月癸巳小經三月己在此月三月壬戌大四月壬辰小五月辛酉大六月辛卯小七月庚申大戊子二十九日八月庚寅大辛亥二十二日九月庚申小十月己丑大十一月己未小十二月己丑大閏月戊午小長三月亦無己酉戊子七月二十八日五年癸巳靈王四年晉霸悼五蔡景二十四曹成十衛獻九鄭僖三陳哀公溺元年杞桓六十九宋平八齊靈十四秦景九楚共二十三吳夀夢十八春公至自晉高氏曰著公不朝正于廟也且公幼而頻年如晉是危道也襄之出二十四至之者二十危之也夏鄭伯使公子發來聘左傳曰通嗣君也高氏曰鄭自雞澤之㑹始離於荆楚來聘於中國諸侯得以息兵修好也叔孫豹鄫世子巫如晉左傳曰穆叔覿鄫太子于晉以成屬鄫鄫世子比諸魯大夫也劉氏曰鄫不勝莒魯之患求為附庸以自定鄫屬於魯為附庸故相與往見於晉也鄫世子猶吾大夫焉交譏之陸氏曰鄫列國也使其世子同於我大夫魯與晉俱失正矣鄫力不足者故無譏焉仲孫蔑衛孫林父㑹吳于善道道公榖作稻左傳曰吳子使夀越如晉辭不㑹雞澤之故且請聽諸侯之好晉人將為之合諸侯使魯衛先㑹吳且告㑹期故孟獻子孫文子㑹吳于善道杜氏曰魯衛俱受命于晉故不言及二大夫往㑹之故曰㑹吳善道吳地張氏曰悼公初立其風聲所及逺人慕之故吳有志於親中國辭謝雞澤之不㑹而請聽後㑹之期悼公告以㑹戚之期而聽其自來足矣至使魯衛特往㑹之則是以中國大邦而為蠻方屈此二大夫㑹吳之所以特書也襄陵許氏曰晉楚爭衡權實在吳故晉急吳如此秋大雩高氏曰因旱祭志僣也楚殺其大夫公子壬夫左傳曰楚人討陳叛故曰由令尹子辛實侵欲焉乃殺之杜氏曰共王敗於鄢陵殺子反殺公子申壬夫八年之中殺三卿髙氏曰楚之所以不競公㑹晉侯宋公陳侯衛侯鄭伯曹伯莒子邾子滕子薛伯齊世子光吳人鄫人于戚左傳曰㑹吳且謀戍陳也穆叔以屬鄫為不利使鄫大夫聽命于㑹張氏曰因吳之來而命戍陳也石氏曰成九年為蒲之㑹將以㑹吳而吳不至故十五年諸侯之大夫㑹之于鍾離前三年悼公盟雞澤使荀㑹逆吳子而又不至故此年使魯衛先㑹之于善道此皆往㑹之也至秋戚之㑹序吳於列而不復殊者因其來㑹也凡序吳者來㑹我也殊吳者往㑹之也公至自㑹冬戍陳左傳曰楚子囊為令尹范宣子曰我喪陳矣楚人討二而立子囊必改行而疾討陳陳近於楚民朝夕急能無往乎有陳非吾事也無之而後可諸侯戍陳公羊傳曰曷為不言諸侯戍之離至不可得而序故言我也啖氏曰戍者以兵守之也張氏曰自桓文以來所以服陳者未聞以兵守之也士丐知戍陳之非長䇿是以有喪陳之嘆高氏曰陳即安于楚二十餘年為諸侯所伐未嘗少息歸於中國則又為楚人所伐既不能鑿斯池築斯城與民效死守之而勿去又恃人之力以自戍其為國何足道也然此諸侯同戌非獨魯戍之也書於公至之後則知諸侯各遣戌與僖二年城楚丘同義楚公子貞帥師伐陳左傳曰子囊伐陳高氏曰楚使頓間陳而陳伐之乃歸罪於壬夫楚又為之殺壬夫而陳又不改於是乎伐之公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯齊世子光救陳曹伯下左無莒子邾子滕子薛伯高氏曰陳方附中國諸侯既戍之復為楚所伐而又相率救之救之義事也悼公之能也十有二月公至自救陳善救陳也辛未季孫行父卒高氏曰此公子友之孫季文子也自文子卒而魯有城費作三軍事則知季孫雖專魯而文子猶忠貞僣亂未啓也其子宿嗣是為武子季孫之彊萌於僖公大於成公熾於襄昭極於定哀經書月一書日一大衍厯正月丁亥大戊子冬至二月丁巳小三月丙戌大四月丙辰小五月乙酉大六月乙卯小七月甲申大八月甲寅小九月癸未大十月癸丑小十一月壬午大十二月壬子小辛未二十日長厯是年閏四月六年甲午靈王五年晉霸悼六蔡景二十五曹成十一衛獻十鄭僖四陳哀二杞桓七十卒宋平九齊靈十五秦景十楚共二十四吳夀夢十九春王三月壬午杞伯姑容卒桓公也在位七十年子丐嗣是為孝公高氏曰杞入春秋未嘗書名自僖公二十三年杞子卒後桓公繼立僖二十七年來朝成九年來逆叔姬之喪此年卒夏宋華弱來奔左傳曰宋華弱與樂轡少相狎長相優又相謗也子蕩恕以弓梏華弱於朝平公見之曰司武而梏於朝難以勝矣遂逐之華弱來奔司城子罕曰同罪異罰非刑也專戮於朝罪孰大焉亦逐子蕩子蕩射子罕之門曰幾日而不我從子罕善之如初秋葬杞桓公滕子來朝左傳曰始朝公也莒人滅鄫左傳曰鄫恃賂也杜氏曰鄫有貢賦之賂于魯恃之以慢莒故滅之冬叔孫豹如邾左傳曰穆叔如邾聘且修平也高氏曰公初即位邾子來朝後有狐駘之戰在四年而經不書至是叔孫豹往聘且修平焉以無忘舊好也季孫宿如晉左傳曰晉人以鄫故來討曰何故亡鄫季武子如晉見且聽命髙氏曰宿始執政而往朝于霸主且聽命焉襄陵許氏曰魯既世卿而大夫無復三年之喪哀典廢於下矣十有二月齊侯滅萊左傳曰二年齊侯伐萊萊人使正輿子賂夙沙衛以索馬牛皆百匹齊師乃還齊侯滅萊萊恃謀也於鄭子國之來聘也晏弱城東陽而圍萊堙之環城傳於堞及杞桓公卒之月王湫帥師及正輿子棠人軍齊師齊師大敗之入萊萊共公浮柔奔棠正輿子王湫奔莒莒人殺之陳無宇獻萊宗器于襄宫晏弱圍棠滅之遷萊于郳高厚崔杼定其田高氏曰齊圍萊久矣自宣七年伐萊至是而遂滅之不言萊君出奔國滅君死也經書月二書日一大衍厯正月辛巳大癸巳冬至二月辛亥大三月辛巳小壬午二日四月庚戌大五月庚辰小六月己酉大七月己卯小八月戊申大九月戊寅小十月丁未大十一月丁丑小十二月丙午大七年乙未靈王六年晉霸悼七蔡景二十六曹成十二衛獻十一鄭僖五卒陳哀三杞孝公丐元年朱平十齊靈十六秦景十一楚共二十五吳夀夢二十春郯子來朝左傳曰始朝公也澄按郯少昊氏之後也夏四月三卜郊不從乃免牲左傳曰孟獻子曰夫郊祀后稷所以祈農事也故啓蟄而郊郊而後耕今既耕而卜郊宜其不從也小邾子來朝左傳曰亦始朝公也城費費音祕左傳曰南遺為費宰叔仲昭伯為隧正欲善季氏而求媚於南遺謂遺請城費吾多與而役胡氏曰夫文子相三君無衣帛之妾無食粟之馬無藏金玉無重器備則固忠於公室而不顧其所食之私邑也及行父卒宿專魯國之政羣小媚之無故勞民妄興是役季氏益張其後孔子至於墮費其越禮不度可知縣矣張氏曰費季氏之邑今沂州費秋季孫宿如衛左傳曰報子叔之聘且辭緩報非二也襄陵許氏曰此書滕郯小邾來朝而季卿如邾如晉如衛衛來拜聘著朝廷之間交際之文則泛矣八月螽高氏曰莊公以前螟猶書之莊公已後螟不復書螽然後書以是知災異之益多矣春秋不勝其書舉其重以見輕爾冬十月衛侯使孫林父來聘左傳曰拜武子之言而尋孫桓子之盟也壬戌及孫林父盟孰及之公也楚公子貞帥師圍陳高氏曰晉悼將修文公之業復有志於攘楚而楚先圍陳陳侯遂出㑹諸侯以求救於晉晉悼於是遽為之合諸侯也十有二月公㑹晉侯宋公陳侯衛侯曹伯莒子邾子于鄬杜氏曰鄬鄭地謀救陳陳侯逃歸不成救故不書救也鄭伯髠頑如㑹未見諸侯髠頑公榖作髠原丙戌卒于鄵鄵七報切公榖作操左傳曰將㑹于鄬子駟相及鄵子駟使賊夜弒僖公而以瘧疾赴于諸侯胡氏曰弒而僞赴又順其欲而不彰則亂臣賊子免於見討而春秋非傳信之書矣趙氏曰諸侯死例書名此為上文已言鄭伯如㑹下不可又云鄭伯髠頑卒又不可上言鄭伯如㑹下但言髠頑卒所以須於如㑹時便書名以便其文爾三傳不達此體見其文特異不能釋遂妄云被弒若實見弒而以疾赴則從而書之諸國弒君豈有實告乎按經文未見諸侯則是已出境臨欲相見之時爾公羊云未出境益非也永嘉吕氏曰諸侯不書名此名之者以其卒也吳子遏伐楚門于巢卒同屬省文也諸侯卒於國都不地此其地者以其不在其國為如㑹而卒故也與宋公佐卒于曲棘同未見諸侯而卒與許男卒于師同此諸侯之例如此而說者徒見其文之異便有鄭伯見弒之說誤矣杜氏曰鄵鄭地澄按僖公在位四年子嘉嗣是為簡公陳侯逃歸左傳曰陳人患楚慶虎慶寅謂楚人曰吾使公子黃往而執之楚人從之二慶使告陳侯于㑹曰楚人執公子黃矣君若不來羣臣不忍社稷宗廟懼有二圖陳侯逃歸胡氏曰上二年諸侯戍陳今楚令尹來伐諸侯又救之亦既勤矣為陳侯計者下命國中大申警備立太子以固守親聽命於諸侯謀禦敵之䇿當是時晉君方眀諸侯聽命必能致力於陳矣不此之顧棄儀衛以逃歸故書以罪之高氏曰楚人以陳叛故殺公子壬夫而亟討陳晉雖為陳再合諸侯卒不能攘楚以安中國故陳侯內為二慶所逼而逃歸也然為一國之君而不能自立從夷狄則懼為中國所伐從中國則又懼楚若匹夫之逃亦可羞矣經書月四書日二大衍厯正月丙子小戊戌冬至二月乙巳大三月乙亥小四月甲辰大五月甲戌大六月甲辰小七月癸酉大八月癸卯小閏月壬申大九月壬寅小經十月壬戌在此月十月辛未大十一月辛丑小十二月庚午大丙戌十七日長厯是嵗閏十月壬戌十月二十一日丙戌十二月六日八年丙申靈王七年晉霸悼八蔡景二十七曹成十三衛獻十二鄭簡公嘉元年陳哀四杞孝二宋平十一齊靈十七秦景十二楚共二十六吳夀夢二十一春王正月公如晉左傳曰公如晉朝且聽朝聘之數夏葬鄭僖公觀此則知僖公之非弒眀矣鄭人侵蔡獲蔡公子燮燮榖作濕左傳曰鄭子國子耳侵蔡獲蔡司馬公子燮鄭人皆喜唯子産不順曰小國無文德而有武功禍莫大焉楚人來討能勿從乎從之晉師必至晉楚伐鄭自今鄭國不四五年弗得寧矣子國怒之曰國有大命而有正卿童子言焉將為戮矣王氏箋義曰鄭欲從楚故侵蔡以致楚然後告絶於晉而與楚平故子國聞子産之言怒之懼其謀泄爾不然無故而侵蔡何也季孫宿㑹晉侯鄭伯齊人宋人衛人邾人于邢丘左傳曰以命朝聘之數使諸侯之大夫聽命季孫宿齊高厚宋向戌衛寧殖邾大夫㑹之大夫不書尊晉侯也鄭伯獻捷于㑹故親聽命杜氏曰時公在晉晉悼唯使大夫聽命故季孫在㑹而公先歸有晉鄭二君在故齊宋衛三國之大夫降稱人內大夫書氏名者以著其亢也胡氏曰朝聘事之大者重煩諸侯而使大夫聽命無乃以姑息愛人乎使政在大夫而諸侯失國豈所以愛之也後此八年湨梁之㑹悼公初沒諸侯皆在而大夫獨盟君若贅旒夫豈一朝一夕之故哉張氏曰㑹而使大夫聽命自齊桓北杏始春秋之法必辨等列以大夫㑹諸侯而人之者所以嚴君臣之分謹上下之交也任公輔曰邢丘故邢國河內平臯縣也公至自晉如晉朝不與邢丘之㑹而先歸故書至自晉而不言至自㑹也莒人伐我東鄙左傳曰伐我以疆鄫田也張氏曰莒人滅鄫而魯不敢爭霸主不討所以興伐魯疆鄫田之師也髙氏曰鄫田接於魯而疆界不眀故興兵伐我以正之鄫遂屬於莒矣襄陵許氏曰莒恃逺滅鄫伐魯以奸齊盟而霸討弗及者晉方患秦楚故也秋九月大雩義見前冬楚公子貞帥師伐鄭左傳曰楚子囊伐鄭討其侵蔡也子駟子國子耳欲從楚子孔子蟜子展欲待晉子駟曰民急矣姑從楚以紓吾民晉師至吾又從之犧牲玉帛待於二竟以待彊者而庇民焉冦不為害民不罷病不亦可乎子展曰小所以事大信也小國無信兵亂日至亡無日矣五㑹之信今將背之雖楚救我將安月之親我無成鄙我是欲不可從也不如待晉晉君方眀四軍無闕八卿和睦必不棄鄭楚師遼逺糧食將盡必將速歸何患焉舍之聞之杖莫如信完守以老楚杖信以待晉不亦可乎子駟曰請從楚騑也受其咎乃及楚平使王子伯駢告于晉知武子使行人子員對之曰君有楚命亦不使一介行李告于寡君而即安于楚君之所欲也誰敢違君寡君將帥諸侯以見于城下唯君圖之胡氏曰鄭介大國之間若能任仁賢眀政刑以禮法自守而親此四鄰必能保國楚雖大何畏焉乃加兵於蔡無故怒楚而公子貞來伐則及楚平見鄭之屈服而不信也晉侯使士丐來聘左傳曰范宣子來聘且拜公之辱告將用師于鄭經書月二書日無大衍厯正月庚子小癸卯冬至二月己己大三月己亥小四月戊辰大五月戊戌小六月丁卯大七月丁酉小八月丙寅大九月丙申大十月丙寅小十一月乙未大十二月乙丑小九年丁酉靈王八年晉霸悼九蔡景二十八曹成十四衛獻十三鄭簡二陳哀五杞孝三宋平十二齊靈十八秦景十三楚共二十七吳夀夢二十二春宋災災公作火高氏曰宋自昭文以來亂敗相屬三書宋災見人事之不修也夏季孫宿如晉左傳曰報宣子之聘也高氏曰公朝晉而晉來聘又使報焉事大國之禮則順矣五月辛酉夫人姜氏薨宣公夫人成公母也秋八月癸未葬我小君穆姜杜氏曰四月而葬速高氏曰别為之諡用文姜之例也冬公㑹晉侯宋公衛侯曹伯莒子邾子滕子薛伯杞伯小邾子齊世子光伐鄭左傳曰諸侯伐鄭季武子齊崔杼宋皇鄖從荀罃士丐門于鄟門衛北宫括曹人邾人從荀偃韓起門于師之梁滕人薛人從欒黶士魴門于北門杞人郳人從趙武魏綘斬行栗師于泛令于諸侯曰修器備盛餱糧歸老幼居疾于虎牢肆眚圍鄭鄭人恐乃行成中行獻子曰遂圍之以待楚人之救也而與之戰不然無成知武子曰許之盟而還師以敝楚人吾三分四軍與諸侯之鋭以逆來者於我未病楚不能矣猶愈於戰暴骨以逞不可以爭大勞未艾君子勞心小人勞力先王之制也乃許鄭成十有二月己亥同盟于戲戲許宜切左傳曰鄭服也將盟鄭六卿公子騑公子發公子嘉公孫輒公孫蠆公孫舍之及其大夫門子皆從鄭伯晉士莊子為載書曰自今日既盟之後鄭國而不唯晉命是聽而或有異志者有如此盟公子騑趨進曰天禍鄭國使介居二大國之間大國不加德音而亂以要之使其鬼神不獲歆其禋祀其民人不獲享其土利夫婦辛苦蟄隘無所底告自今日既盟之後鄭國而不唯有禮與彊可以庇民者是從而敢有異志者亦如之荀偃曰改載書公孫舍之曰昭大神要言焉若可改也大國亦可叛也知武子謂獻子曰我實不德而要人以盟豈禮也哉非禮何以主盟姑盟而退修德息師而來終必獲鄭何必今日我之不德民將棄我豈唯鄭若能休和逺人將至何恃於鄭乃盟而還楚子伐鄭左傳曰子駟將及楚平子孔子蟜曰與大國盟口血未乾而背之可乎子駟子展曰吾盟固云唯强是從今楚師至晉不我救則楚强矣乃及楚平經書月三書日三大衍厯正月甲午大己酉冬至二月甲子小三月癸巳大四月癸亥小五月壬辰大辛酉三十日六月壬戌小七月辛卯大八月辛酉小癸未二十三日九月庚寅大十月庚申小十一月己丑大經十二月己亥在此月十一日疑經書月誤以一為二十二月己未小長厯辛酉五月二十九癸未八月二十二十一月庚寅朔己未亦在其月十日十年戊戌靈王九年晉霸悼十蔡景二十九曹成十五衛獻十四鄭簡三陳哀六杞孝四宋平十三齊靈十九秦景十四楚共二十八吳夀夢二十三春公㑹晉侯宋公衛侯曹伯莒子邾子滕子薛伯杞伯小邾子齊世子光㑹吳于柤柤莊加切左傳曰㑹吳子壽夢也杜氏曰吳子在柤晉以諸侯往㑹之故曰㑹吳柤楚地張氏曰後漢彭越國付陽縣有柤水夏五月甲午遂滅逼陽逼甫目彼力二切穀作傅左傳曰晉荀偃士丐請伐逼陽而封宋向戌焉荀罃曰城小而固勝之不武弗勝為笑固請圍之不克諸侯之師久於逼陽荀偃士丐請於荀罃曰水潦將降懼不能歸請班師知伯怒投之以機出於其間曰女成二事而後告豫豫恐亂命以不女違女既勤君而興諸侯牽率老夫以至于此既無武守而又欲易余罪曰是實班師不然克矣余羸老也可重任乎七日不克必爾乎取之荀偃士丐帥卒攻逼陽親受矢石滅之以與向戌向戌辭乃與宋公以逼陽子歸獻于武宫謂之夷俘使周內史選其族嗣納諸霍人高氏曰逼陽楚與國也杜氏曰逼陽妘姓國今彭城逼陽縣張氏曰今徐州沛縣公至自㑹榖梁傳曰存中國也中國有善事則并焉無善事則異之杜氏諤曰踰時而反故危而至之楚公子貞鄭公孫輒帥師伐宋左傳曰楚子囊鄭子耳伐家師于訾母圍宋門于桐門高氏曰以宋公受逼陽故也晉師伐秦左傳曰九年秦景公使士雃乞師于楚將以伐晉楚子許之師于武城以為秦援秦人侵晉晉饑弗能報也晉荀罃伐秦報其侵也高氏曰晉方帥諸侯㑹吳滅逼陽又越千里而伐秦可謂虐用其民矣為晉計者莫若修文公之業與秦通和庶因秦之兵力共攘彊楚可以少安中國不此之圖而反以秦資楚此晉之失也秋莒人伐我東鄙左傳曰莒人間諸侯之有事也故伐我東鄙高氏曰伐者必有辭也公㑹晉侯宋公衛侯曹伯莒子邾子齊世子光滕子薛伯杞伯小邾子伐鄭左傳曰諸侯伐鄭齊崔杼使太子光先至于師故長於滕師于牛首吕氏曰齊世子光序諸侯上主㑹者為之也春秋不改所以示譏言專以强弱事勢為先後也鄭於是復從晉然亦不敢背楚也冬盜殺鄭公子騑公子發公孫輒騑公穀作斐左傳曰初子駟與尉止有爭將禦諸侯之師而默其車尉止獲遂弗使獻初子駟為田洫司氏堵氏侯氏子師氏皆喪田焉故五族聚羣不逞之人因公子之徒以作亂於是子駟當國子國為司馬子耳為司空子孔為司徒尉止司臣侯晉堵女父子師僕帥賊以入晨攻執政于西宫之朝殺子駟子國子耳子孔知之故不死子西聞盜不警而出尸而追盜盜入于北宫乃歸授甲臣妾多逃器用多喪子産聞盜為門者庇羣司閉府庫慎閉藏完守備成列而後出兵車十七乘尸而攻盜於北宫子蟜率國人助之殺尉止子師僕盜衆盡死侯晉奔晉堵女父司臣尉翩司齊奔宋子孔當國孫氏曰盜一日而殺三卿鄭伯失刑政胡氏曰卿大夫者國君之陪二也身不能保而盜得殺之於朝安在其為陪二乎戍鄭虎牢左傳曰諸侯之師城虎牢而戍之晉師城梧及制士魴魏絳戌之虎牢非鄭地也言將歸焉鄭及晉平胡氏曰虎牢之城不繫鄭者責在鄭也戍而繫鄭者罪諸侯也鄭人從楚固為不義然中國所以城虎牢非欲斷荆楚之路為鄭蔽也駐師厄險以逼之爾至是伐而復戍焉可謂以義服之乎張氏曰前年戍陳不能制楚以保陳矣又踵前轍勞諸侯以戍守恃力逼小豈霸主服人之道乎高氏曰鄭雖行成而諸侯所以為之戍則其意有在使鄭復二則虎牢之戍反為腹心之憂如其不二則助之守而為之援焉定則固將反之矣是以還繫于鄭然五年城虎牢不繫鄭者是時諸侯城之以駐師而禦楚雖鄭亦不能有之也楚公子貞帥師救鄭左傳曰楚子囊救鄭諸侯之師還鄭而南至於陽陵楚師不退知武子欲退曰今我逃楚楚必驕驕則可與戰矣欒黶曰逃楚晉之恥也合諸侯以益恥不如死我將獨進師遂進與楚夾潁而軍子蟜曰諸侯既有成行必不戰矣從之將退不從亦退退楚必圍我猶將退也不如從楚亦以退之宵涉潁與楚人盟欒黶欲伐鄭師荀罃不可曰我實不能禦楚又不能庇鄭鄭何罪不如致怨焉而還今伐其師楚必救之戰而不克為諸侯笑克不可命不如還也諸侯之師還侵鄭北鄙而歸楚人亦還胡氏曰以救許楚罪諸侯不能保鄭肆其陵逼曾荆楚之不若也公至自伐鄭襄陵許氏曰書楚救鄭而至公知諸侯之避楚也經書月一書日一大衍厯正月戊子大甲寅冬至二月戊午大三月戊子小四月丁巳大閏月丁亥小經五月甲午在閏月五月丙辰大六月丙戌小七月乙卯大八月乙酉小九月甲寅大十月甲申小十一月癸丑大十二月癸未小長厯是年閏十一月甲午五月八日十有一年己亥靈王十年晉霸悼十一蔡景三十曹成十六衛獻十五鄭簡四陳哀七杞孝五宋平十四齊靈二十秦景十五楚共二十九吳壽夢二十四春王正月作三軍左傳曰季武子將作三軍告叔孫穆子曰請為三軍各征其軍穆子曰政將及子子必不能武子固請之穆子曰然則盟諸乃盟諸僖閎詛諸五父之衢三分公室而各有其一三子各毁其乘季氏使其乘之人以其役邑入者無征不入者倍征孟氏使半為臣若子若弟叔孫氏使盡為臣不然不舍杜氏曰魯本無中軍唯上下二軍皆屬於公有事三卿更帥以征伐季氏欲專其民人故假立中軍因以改作孔氏曰往前民皆屬公家若非征伐不屬三子故三子自以其邑之民為已之車乘今既三分公室所分得者即是已有故三家各自壞舊時車乘部伍以足成三軍也季氏使所分得國內三分有一之人以其役與邑皆來入季氏者則無公征若不以役邑入季氏則使公家倍征之役今之丁也邑賦稅也設利害以驅民使入已爾民畏倍征則盡歸季氏所分得者無一入公也孟氏以子弟之中課取其一又分半以歸公也叔孫氏使子弟盡為已臣唯以父兄歸公爾故昭公五年傳云季氏盡征之叔孫氏臣其子弟言不臣父兄取二分而二分歸公也孟氏取其半又如叔孫所取之中止取其半以半歸公取一分而三歸公也吕氏曰孟氏稍弱所以只使半為臣季氏彊直欲盡無公室也澄曰古之制地方百里為大國大國三軍方七十里為次國次國二軍方五十里為小國小國一軍魯為方百里之大國當有三軍故魯頌曰公車千乘又曰公徒三萬蓋言伯禽初受封之時有三軍也其後不能備三軍故止有二軍然不知二軍自何時始以魯之衆本不能備三軍之數季武子欲增中軍而作為三軍者蓋借此改作而分公室之衆也按二十五成之地出一軍則三軍者該地七十五成魯之方百里其地有百成但三桓皆百乘之家各有十成之地則取百成中之三十成矣况又臧氏仲氏叔氏之類亦有采邑則魯之公室其不滿七十五成矣何以能有三軍故三家毁其乘者各以其家所得采邑十成之民補足其數僅可備三軍也夏四月四卜郊不從乃不郊因四卜之瀆以著魯郊之僣鄭公孫舍之帥師侵宋左傳曰鄭人患晉楚之故諸大夫曰不從晉國幾亡楚弱於晉晉不吾疾也晉疾楚將辟之何為而使晉師致死於我楚弗敢敵而後可固與也子展曰與宋為惡諸侯必至吾從之盟楚師至吾又從之則晉怒甚矣晉能驟來楚將不能吾乃固與晉大夫說之使疆場之司惡於宋宋向戌侵鄭大獲子展曰師而伐宋可矣若我伐宋諸侯之伐我必疾吾乃聽命焉且告於楚楚師至吾又與之盟而重賂晉師乃免矣子展侵宋杜氏曰欲以致諸侯也公㑹晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯杞伯小邾子伐鄭左傳曰諸侯伐鄭齊太子光宋向戌先至于鄭門于東門其莫晉荀罃至于西郊東侵舊許右還次于瑣圍鄭觀兵于南門西濟于濟隧鄭人懼乃行成高氏曰以前伐未得志而鄭復來侵宋故也凡世子代父與盟㑹當在諸侯之下齊光代君出㑹十年在滕子薛伯上已為僣矣此㑹又在莒子邾子上於是為甚以莒邾皆屬於齊故也見世子益驕而主㑹者莫能制也自再㑹蕭魚之後霸業稍振諸侯不復與光㑹矣則知十九年同圍齊之役蓋齊有以取之也秋七月己未同盟于亳城北亳公榖作京左傳曰同盟于亳范宣子曰不慎必失諸侯諸侯道敝而無成能無二乎乃盟載書曰凡我同盟毋蕰年毋壅利毋保姦毋留慝救災患恤禍亂同好惡奬王室或間兹命司慎司盟名山名川羣臣羣祀先王先公七姓十二國之祖眀神殛之俾失其民墜命亡氏踣其國家胡氏曰鄭既盟而又叛從子展之謀欲致晉師而後與之也故其載書雖有隊命亡氏踣其國家之言渝之而不顧噫慢鬼神至此而盟猶足恃乎杜氏曰亳城鄭地任氏曰偃師也故湯都公至自伐鄭以前事至者見雖同盟而未得鄭也楚子鄭伯伐宋左傳曰楚子囊乞旅于秦秦右大夫詹帥師從楚子將以伐鄭鄭伯逆之伐宋高氏曰晉師方還而鄭伯逆楚子同伐宋蓋用公孫舍之之謀以伐宋自信於楚而數叛晉使楚道敝而固與晉以托國焉公㑹晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯杞伯小邾子伐鄭左傳曰諸侯悉師復伐鄭杜氏曰此夏諸侯皆復來故曰悉師高氏曰諸侯之師方歸未及解甲息肩而復至于鄭之城下㑹于蕭魚左傳曰諸侯之師觀兵于鄭東門鄭人使王子伯駢行成晉趙武入盟鄭伯鄭子展出盟晉侯㑹于蕭魚赦鄭囚皆禮而歸之納斥候禁侵掠晉侯使叔肸告于諸侯公使臧孫紇對曰凡我同盟小國有罪大國致討苟有以藉手鮮不赦宥寡君聞命矣鄭人賂晉侯以師悝師觸師蠲廣車軘車淳十五乘甲兵􅍯凡兵車百乘歌鍾二肆及其鎛磬女樂二八杜氏曰鄭服而諸侯㑹蕭魚鄭地蘇氏曰鄭與㑹也八年鄭人侵蔡獲公子燮自是晉侯爭鄭五年之間晉人四以諸侯伐鄭楚輒救之晉用知罃之謀未嘗與楚人戰至是楚不能應遂全師以服鄭於是鄭固與晉二十餘年楚不能爭雖城濮之克不能過也孫氏曰言伐言㑹者得鄭之辭也鄭自齊桓晉文死或即蠻荆或即中國晉楚爭之久矣晉悼比嵗大合諸侯伐鄭今始得之不能有鄭者餘二十年此晉悼之績也程子曰諸侯數月之間再伐鄭鄭服而請㑹鄭不可信也而晉悼公誠以待人信之不疑自此鄭不背晉者二十四年公至自㑹榖梁傳曰伐而後㑹不以伐鄭至得鄭伯之辭也程子曰兵不加鄭故書至自㑹楚人執鄭行人良霄左傳曰鄭人使良霄太宰石㚟如楚告將服于晉曰孤以社稷之故不能懷君君若能以玉帛緩晉不然則武震以攝威之孤之願也楚人執之襄陵許氏曰見楚之力盡於是矣高氏曰鄭使良霄告絶于楚楚不能得鄭故執良霄以舒憤悶不平之氣自是不復出師以與晉爭鄭於是堅從晉良霄公孫輒之子也冬秦人伐晉左師曰秦庶長鮑庶長武帥師伐晉以救鄭鮑先入晉地士魴禦之少秦師而弗設備武濟自輔氏與鮑交伐晉師戰于櫟晉師敗績易秦故也高氏曰秦景公妹為楚共王夫人於是為楚伐晉報去年之役也經書月三書日一大衍厯正月壬子大己未冬至二月壬午小三月辛亥大四月辛巳大五月辛亥小六月庚辰大七月庚戌小己未十日八月己卯大九月己酉小十月戊寅大十一月戊申小十二月丁丑大十有二年庚子靈王十一年晉霸悼十二蔡景三十一曹成十七衛獻十六鄭簡五陳哀八杞孝六宋平十五齊靈二十一秦景十六楚共三十吳夀夢二十五卒春王三月莒人伐我東鄙圍台台穀作邰下同高氏曰諸侯伐我未有言圍邑者書圍邑自此始莒人間嵗伐我公五與莒子㑹宜其釋怨同好矣而見伐不已則魯弱可知矣杜氏曰台琅琊費縣有台亭季孫宿帥師救台遂入鄆公羊傳曰言遂何公不得為政爾榖梁傳曰受命而救台不受命而入鄆也孫氏曰不受命而入鄆專也何氏曰公微弱政教不行故季孫宿遂取鄆以自益其邑高氏曰善救台惡入鄆也成十二年嘗帥師城鄆矣魯不能守復為莒所取今復取之夏晉侯使士魴來聘左傳曰來聘且拜師杜氏曰謝前年伐鄭師襄陵許氏曰晉悼服鄭抑楚而聘魯善持勝矣秋九月吳子乘卒此吳子夀夢也在位二十五年其子諸樊嗣杜氏諤曰宣十八年録楚子旅卒者以其暴盛而諸侯交接赴告之相親也至此書吳子乘卒者亦以其暴盛且眀諸侯通之㑹之而赴告之相及也冬楚公子貞帥師侵宋左傳曰楚子囊秦庶長無地伐宋師于揚梁以報晉之取鄭也髙氏曰秦人與焉而削之者楚人率秦故專罪楚也公如晉左傳曰朝且拜士魴之辱髙氏曰晉侯一使人來聘而公遂親往朝之事晉之禮恭矣經書月二書日無大衍厯正月丁未小甲子冬至二月丙子大三月丙午小四月乙亥大五月乙巳小六月甲戌大七月甲辰小八月癸酉大九月癸卯小十月癸酉小十一月壬寅大十二月壬申小十有三年辛丑靈王十二年晉霸悼十三蔡景三十二曹成十八衛獻十七鄭簡六陳哀九杞孝七宋平十六齊靈二十二秦景十七楚共三十一卒吳諸樊遏元年春公至自晉公在外不朝正於廟也夏取邿邿音詩公作詩左傳曰邿亂分為三師救邿遂取之杜氏曰邿小國也任城元父縣有邿亭高氏曰魯乘其亂滅之以為附庸襄陵許氏曰晉始息民是以楚侵宋不報魯取邿不討取無大亂而已秋九月庚辰楚子審卒此楚共王也在位三十一年子昭嗣冬城防左傳曰於是將早城臧武仲請俟畢農事高氏曰防臧氏之邑也厥後齊髙厚伐我北鄙圍防則城防者畏齊也襄陵許氏曰鄭役既息魯政稍暇則知取邿以為利城防以為安而已矣經書月一書日一大衍厯正月辛丑大庚午冬至閏月辛未小二月庚子大三月庚午小四月己亥大五月己巳小六月戊戌大七月戊辰小八月丁酉大九月丁卯小庚辰十四日十月丙申大十一月丙寅小十二月乙未大長厯是年閏八月十有四年壬寅靈王十三年晉霸悼十四蔡景三十三曹成十九衛獻十八鄭簡七陳哀十杞孝八宋平十七齊靈二十三秦景十八楚康王昭元年吳諸樊二春王正月季孫宿叔老㑹晉士丐齊人宋人衛人鄭公孫蠆曹人莒人邾人滕人薛人杞人小邾人㑹吳于向蠆丑邁切公作萬下同向式亮切左傳曰吳侵楚養由基奔命子庚以師繼之養叔曰吳乘我喪謂我不能師也必易我而不戒子為三覆以待我我請誘之子庚從之戰于庸浦大敗吳師吳告敗于晉㑹于向為吳謀楚故也范宣子數吳之不德也以退吳人杜氏曰吳伐楚喪故謂之不德數而遣之卒不為伐楚襄陵許氏曰四卿帥師自成公始二卿列㑹自襄公始大夫張也高氏曰吳人在向諸侯往㑹之因謀伐秦焉夫楚結秦以病晉而晉又交吳以害楚亦相激而然爾重言㑹吳與成十五年鍾離之㑹同澄按左氏以向㑹為吳謀楚然吳在向而晉率諸侯之大夫往㑹之是晉有求於吳非吳有求於晉也故疑左氏所載事迹非其實而惟高氏謀伐秦之說或是二月乙未朔日有食之夏四月叔孫豹㑹晉荀偃齊人宋人衛北宫括鄭公孫蠆曹人莒人邾人滕人薛人杞人小邾人伐秦左傳曰諸侯之大夫從晉侯伐秦以報櫟之役也晉侯待于竟使六卿帥諸侯之師以進及涇不濟叔向見叔孫穆子穆子賦匏有苦葉叔向退而具舟魯人莒人先濟鄭子蟜北宫懿子見諸侯之師而勸之濟濟涇而次秦人毒涇上流師人多死鄭司馬子蟜帥鄭師以進師皆從之至于栻林不獲成焉荀偃令曰雞鳴而駕塞井夷竈唯余馬首是瞻欒黶曰晉國之命未有是也余馬首欲東乃歸下軍從之伯游曰吾令實過悔之何及多遺秦禽乃命大還晉人謂之遷延之役欒針曰此役也報櫟之敗也役又無功晉之恥也吾有二位於戎路敢不恥乎與士鞅馳秦師死焉士鞅反欒黶謂士丐曰余弟不欲往而子召之余弟死而子來是而子殺余之弟也弗逐余亦將殺之士鞅奔秦高氏曰春夏興師煩擾中國將帥不和威德兩弛晉國之政衰矣悼公所以不及文襄也己未衛侯衎出奔齊左榖無衎字左傳曰衛獻公戒孫文子寧惠子食皆服而朝日旰不召而射鴻于囿二子從之不釋皮冠而與之言二子怒孫文子如戚孫蒯入使公飲之酒使太師歌巧言之卒章太師辭師曹請為之遂誦之蒯懼告文子文子曰君忌我矣弗先必死并帑於戚公使子蟜子伯子皮與孫子盟于丘宫孫子皆殺之公如鄄使子行於孫子又殺之公出奔齊孫氏追之敗公徒公及竟使祝宗告亡衛人立公孫剽孫林父寧殖相之以聽命於諸侯杜氏曰孫寧逐衛侯春秋以其自取奔亡之禍故諸侯失國者皆不書逐君之賊也襄陵許氏曰逐君之惡未有若林父者矣鄭厲衛惠猶以禮去者也王氏箋義曰左傳穀梁衛侯出奔皆不書名獨公羊書名按諸侯不書名唯出奔書名者罪其不道而失國也衎當名公羊得之矣莒人侵我東鄙杜氏曰報入鄆也高氏曰莒自滅鄫之役四伐我矣是無晉也秋楚公子貞帥師伐吳左傳曰楚子為庸浦之役故子囊師于棠以伐吳吳不出而還子囊殿以吳為不能而弗警吳人自臯舟之隘要而擊之楚人不能相救吳人敗之獲楚公子宜榖冬季孫宿㑹晉士丐宋華閲衛孫林父鄭公孫蠆莒人邾人于戚左傳曰晉侯問衛故於中行獻子對曰衛有君矣伐之未可以得志而勤諸侯不如因而定之㑹于戚謀定衛也杜氏曰戚衛地張氏曰前書衛侯之奔此列孫林父于㑹晉為霸主抑君助臣晉大夫之黨孫林父罪惡見矣經書月三書日二大衍厯正月乙丑大乙亥冬至二月乙未小朔日食三月甲子大四月甲午小己未二十六日五月癸亥大六月癸巳小七月壬戌大八月壬辰小九月辛酉大十月辛卯小十一月庚申大十二月庚寅小十有五年癸卯靈王十四年晉霸悼十五卒蔡景三十四曹成二十衛獻十九殤公剽元年鄭簡八陳哀十一杞孝九宋平十八齊靈二十四秦景十九楚康二吳諸樊三春宋公使向戌來聘左傳曰聘且尋盟杜氏曰報二年豹之聘尋十一年亳之盟二月己亥及向戌盟于劉孫氏曰劉魯地襄陵許氏曰不盟于國而盟于劉崇向戌故公弱甚矣高氏曰凡因來聘而盟者必在國內如成三年晉侯使荀庚來聘衛侯使孫良夫來盟丙午及荀庚盟丁未及孫良夫盟十一年晉侯使郤犫來聘己丑及郤犫盟襄七年衛侯使孫林父來聘壬戌及孫林父盟是也劉蓋王畿采地豈有來聘魯而逺盟于劉者乎蓋下文有劉夏因傳者以為春夏之夏與文四年夏逆婦姜于齊同文故誤增于劉二字爾劉夏逆王后于齊杜氏曰劉采地夏名也天子卿書字劉夏非卿故書名孫氏曰天子不親迎娶后則三公逆之劉夏士也王后天下母使微者逆之可哉高郵孫氏曰天子逆后使三公春秋二百四十二年周王十三書逆王后者唯二非禮則書也祭公行得禮而書之者譏遂事也劉夏之逆則以非三公而譏之宋氏曰何以書魯主婚也夏齊侯伐我北鄙圍成左傳曰齊侯圍成二於晉故也高氏曰是時季孫在齊季孫宿為戚之㑹以定衛而齊不與焉齊固有憾於諸侯矣而尤懷夫袁婁之恥者也伐我北鄙以此之故成蓋吾仲孫之邑也公救成至遇公羊傳曰不敢進也杜氏曰遇魯邑公至遇畏齊不敢至成范氏曰至遇而齊師已退髙氏曰魯於是時巳三分其民而公室卑弱已不足以當敵故書公救成至遇若畏而不進則書次矣不當書至也季孫宿叔孫豹帥師城成郛常山劉氏曰由不能救成成郛見壞而城之也吕氏曰成郛壞而城苟完而已髙氏曰此孟孫之邑而叔孫季孫帥師以城之者見三家相黨以備齊為名而興役之衆故其城堅固可守卒為魯患而不可墮也定十二年公圍成是也郛蓋外城也秋八月丁巳日有食之高氏曰按長厯七月丁巳朔八月無丁巳又不書朔蓋因舊史也邾人伐我南鄙左傳曰使告于晉晉將為㑹以討邾莒晉侯有疾乃止高氏曰邾二於晉以與齊黨於莒故來伐我襄陵許氏曰政在君則民一民一則國强政在臣則民二民二則國弱魯自文襄失政大夫盜竊國柄齊與邾莒交伐其國不競甚矣無他民分於三桓故也冬十有一月癸亥晉侯周卒悼公也在位十五年子彪嗣是為平公襄陵許氏曰悼公之霸功亞桓文平公受之遺烈猶在祝柯澶淵之盟是已自是則晉日替矣經書月三書日三大衍厯正月己未大庚辰冬至二月己丑小己亥十一日三月戊午大四月戊子大五月戊午小六月丁亥大七月丁巳小日食經書八月丁巳食閏法差也八月丙戌大九月丙辰小十月乙酉大閏月乙卯小十一月甲申大經十一月癸亥在閏十月及十二月十二月甲寅小長厯是年七月丁巳朔日食十有六年甲辰靈王十五年晉霸平公彪元年蔡景三十五曹成二十一衛獻二十殤二鄭簡九陳哀十二杞孝十宋平十九齊靈二十五秦景二十楚康三吳諸樊四春王正月葬晉悼公踰月而葬速三月公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子薛伯杞伯小邾子于溴梁溴古間切左傳曰平公即位改服修官蒸于曲沃警守而下㑹于溴梁杜氏曰溴水名出河內軹縣東南至溫入河高氏曰為討邾莒也邾莒連伐魯魯使告于晉悼公將為㑹以討之遇疾乃止平公即位遂成父志蘇氏曰衛侯剽也二十五年衛侯入于夷儀衎也二君皆稱衛侯戊寅大夫盟左傳曰晉侯與諸侯宴于溫使諸大夫舞曰歌詩必類齊高厚之詩不類荀偃怒且曰諸侯有異志矣使諸大夫盟高厚高厚逃歸於是叔孫豹晉荀偃宋向戌衛寧殖鄭公孫蠆小邾之大夫盟曰同討不庭公羊傳曰諸侯皆在是言大夫盟信在大夫也穀梁傳曰不曰諸侯之大夫大夫不臣也高氏曰或謂晉侯在喪故使大夫盟非也晉侯不憚出㑹豈不肯出盟邪雞澤之㑹諸侯巳盟而陳轅僑至勢不可拒因與之盟然僑人臣也不可當君使大夫盟之故以大夫而繫諸侯見諸侯之已盟也今叙諸侯而不言盟言大夫而不繫諸侯也是時晉為魯故將執邾莒二君而齊使高厚來㑹先知其故遽自逃歸所以諸侯不欲先自盟也夫晉㑹諸侯而使大夫盟則信在大夫矣烏在其為盟主哉是時齊有崔高衛有孫寧六卿專晉三家柄魯聖人因此盟以著喪亂之階趙氏曰高厚若以在㑹而逃歸經文不合不書僖五年鄭伯逃歸不盟襄七年陳侯逃歸並書以著其罪何獨此不書左氏此傳不足憑也胡氏曰上年春㑹向十三國之大夫也夏㑹伐秦亦十三國之大夫也冬㑹戚七國之大夫也此三㑹皆國之大事也而使大夫專之是君不自為政矣况悼公既沒晉平初立無先君之明大夫張宜矣夫豈一朝一夕之故哉張氏曰春秋莊十三年之前禮樂征伐自諸侯出而權未一也自齊桓晉文繼霸中國之政齊晉專之然猶在諸侯也至今年以後則皆自大夫出矣故於此書大夫盟著世變之益降也永嘉陳氏曰文十五年盟扈十七年㑹扈伯在而但曰諸侯者無伯也君在而但曰大夫者無君也自文以下則有斥言諸侯而不序自襄以下則有斥言大夫而不序晉人執莒子邾子以歸左傳曰以我故執邾宣公莒犂比公且曰通齊楚之使孫氏曰執以歸不以歸京師劉氏曰稱人以執非伯討也高郵孫氏曰晉平初立㑹于溴梁將以號令而安之也一㑹而執二君春秋罪之齊侯伐我北鄙高氏曰齊既叛晉聞公在㑹將討邾莒故復來伐是時齊益彊自柯陵之㑹遂不復出但使大夫聽命使世子抗禮出㑹蓋有輕諸侯之心矣故前年北鄙之役為莒伐我邾竇附齊故亦伐我南鄙晉患齊之益驕也於是為溴梁之㑹以討二焉邾莒畏晉不敢不㑹而齊獨不至故晉人乃執二君以歸也齊知二君之執為我之故乃益復伐我二年之間齊師五至于魯之城下夏公至自㑹高氏曰見公出㑹謀齊尚未及還而齊師已見伐矣五月甲子地震叔老㑹鄭伯晉荀偃衛寧殖宋人伐許左傳曰許男請遷于晉諸侯遂遷許許大夫不可晉人歸諸侯鄭子蟜聞將伐許遂相鄭伯以從諸侯之師穆叔從公齊子帥師㑹晉荀偃次于棫林伐許次于函氏髙氏曰許欲棄楚請遷于晉既而不果故晉㑹諸侯大夫同伐之鄭與許有宿怨故其君親行而在晉上蓋卿不先諸侯尊國君也宋人稱人蓋微者也宋當在諸侯之上今列衛寧殖之下故知其微者張氏曰許男有從中國之志而大夫沮之足以見一時之俗矣秋齊侯伐我北鄙圍成左傳曰齊侯圍成孟孺子速徼之齊侯曰是好勇去之以為之名速遂塞海陘而還高氏曰去年伐我圍成而壞其郛今春再伐我至是又伐我圍成甚之也大雩冬叔孫豹如晉左傳曰聘且言齊故晉人曰以寡君之未禘祀與民之未息不然不敢忘穆叔曰以齊人之朝夕釋憾於敝邑是以大請敝邑之急朝不及夕引領西望曰庶幾乎比執事之聞恐無及也見中行獻子賦析父獻子曰偃知罪矣敢不從執事以同恤社稷而使魯及此見范宣子賦鴻鴈之卒章宣子曰丐在此敢使魯無鳩乎髙氏曰魯不能內修其政以禦無道之齊而乞憐于晉魯之君臣庸甚矣經書月三書日二大衍厯正月癸未大乙酉冬至二月癸丑小經三月戊寅在此月三月壬午大四月壬子大經五月甲子在此月五月壬午小六月辛亥大七月辛巳小八月庚戌大九月庚辰小十月己酉大十一月己卯小十二月戊申大長厯是年閏十月戊寅三月二十六日甲子五月十三日十有七年乙巳靈王十六年晉霸平二蔡景三十六曹成二十二衛獻二十一殤三鄭簡十陳哀十三把孝十一宋平二十齊靈二十六秦景二十一楚康四吳諸樊五春王二月庚午邾子牼卒牼苦耕切公穀作瞷宣公也在位十八年子華嗣是為悼公去年晉人執以歸此書卒者晉人釋之也莒亦如之髙氏曰考成公末年宣公來朝襄公九年宣又來朝魯亦以其貴卿往聘而修平蓋崇睦矣而晚卒起仇讎如此者魯國政刑不修有以啓之也宋人伐陳左傳曰宋莊朝伐陳獲司徒卬卑宋也髙氏曰七年鄬之㑹陳侯逃歸自是不復與諸侯㑹而楚鄭連年侵宋宋人於是請於晉而伐之宋無為中國取陳之意自適己事而已然書伐許伐陳亦著楚之絀也夏衛石買帥師伐曹左傳曰衛孫蒯田于曹隧飲馬于重丘毁其瓶重丘人閉門而詬之曰親逐而君爾父為厲是之不憂而何以田為衛石買孫蒯伐曹取重丘曹人訴于晉髙氏曰雖石買以私忿背盟加兵於人然曹亦有以致之是以有辭于伐也秋齊侯伐我北鄙圍桃桃公作洮左傳曰齊人以其未得志於我故伐我北鄙圍桃杜氏曰辨縣東南有桃虛齊高厚帥師伐我北鄙圍防高厚上左無齊字左傳曰髙厚圍臧紇于防師自陽關逆臧孫至于旅松鄹叔紇臧疇臧賈帥甲三百宵犯齊師送之而復齊師去之齊人獲臧堅髙氏曰齊之君臣同來伐我分兵以圍吾二邑其恃衆暴寡如此齊魯世昏姻之國也而數年之間見伐不已見魯政之衰失矣九月大雩宋華臣出奔陳左傳曰宋華閲卒華臣弱臯比之室使賊殺其宰華吳賊六人以鈹殺諸盧門合左師之後左師懼曰老夫無罪賊曰臯比私有討於吳遂幽其妻曰畀余而大璧宋公聞之曰臣也不唯其宗室是暴大亂宋國之政必逐之左師曰臣也亦卿也大臣不順國之恥也不如蓋之乃舍之左師為己短䇿苟過華臣之門必騁國人逐瘈狗瘈狗入于華臣氏國人從之華臣懼遂奔陳高氏曰華臣暴其宗室而亂宋國之政不有國討失政刑矣震駭而奔懷慝之禍也夫陳乃宋讎而奔焉意尤可誅冬邾人伐我南鄙左氏曰為齊故也杜氏曰齊未得志於魯故邾助之高氏曰邾之先君以伐魯而為晉所執既歸而辛嗣子在喪而復興師伐我者叛晉也與齊也齊人使之修先君之怨也此祝柯之㑹所以復來執也經書月二書日一大衍厯正月戊寅小辛卯冬至二月丁未大庚午二十四曰三月丁丑小四月丙午大五月丙子小六月乙巳大七月乙亥小八月甲辰大九月甲戌小十月癸卯大十一月癸酉小十二月壬寅大十有八年丙午靈王十七年晉霸平三蔡景三十七曹成二十三卒衛獻二十二殤四鄭簡十一陳哀十四杞孝十二宋平二十一齊靈二十七秦景二十二楚康五吳諸樊六春白狄來公羊傳曰白狄之君也不言朝不能行朝禮髙氏曰與介葛盧來同春秋書白狄於是焉止夏晉人執衛行人石買左傳曰執衛行人石買于長子執孫蒯于純留為曹故也杜氏曰石買即是伐曹者宜即懲治本罪而晉因其為使執之故書行人高氏曰晉侯欲修方伯之義黜叛夫而誅亂臣則莫如正孫蒯之惡今大惡不舉而小過必察霸討果若是乎秋齊師伐我北鄙師穀作侯襄陵許氏曰四年之中六伐鄙而四圍邑又縱邾莒以助其虐諸侯之陵暴未有若是者也是以動天下之兵幾亡其國冬十月公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子同圍齊左傳曰晉侯伐齊將濟河獻子以朱絲係玉二㲄而禱曰齊環怙恃其險負其衆庶棄好背盟陵虐神主曾臣彪將帥諸侯以討焉其官臣偃實先後之苟捷有功無作神羞㑹于魯濟尋溴梁之言同伐齊齊侯禦諸平隂塹防門而守之廣里夙沙衛曰不能戰莫如守險弗聽諸侯之士門焉齊人多死范宣子告析文子曰吾知子敢匿情乎魯人莒人皆請以車千乘自其鄉入既許之矣若入君必失國子家以告公公恐齊侯登巫山以望晉師晉人使司馬斥山澤之險雖所不至必斾而疏陳之使乘車者左實右僞以斾先輿曳柴而從之齊侯見之畏其衆也乃脫歸齊師夜遁入平隂遂從齊師晉人欲逐歸者魯衛請攻險荀偃士丐以中軍克京兹魏絳欒盈以下軍克邿趙武韓起以上軍圍盧弗克及秦周伐雍門之萩范鞅門于雍門焚雍門及西郭南郭劉難士弱率諸侯之師焚申池之竹木焚東郭北郭范鞅門于揚門州綽門于東閭齊侯駕將走郵棠太子與郭榮叩馬曰師速而疾略也將退矣君何懼焉且社稷之主不可以輕輕則失衆君必待之將犯之太子抽劒斷鞅乃止東侵及濰南及沂高氏曰凡侵伐圍入之類未有言同者此為魯討齊而書同圍何也以謂諸侯皆不義齊乎則邾莒亦嘗病魯矣以謂諸侯皆睦於晉而二於齊乎則滕薛小邾既屬齊矣然則謂之同圍猶同盟也澄曰凡合諸侯而為盟必有一國主盟同盟則諸國同飲血而無適主盟者也合諸侯而用兵必有一國主兵同圍齊則諸國同主兵而無適主兵者也唯其莫適為主故諸國之兵雖甚盛而不相統一各行其志環而攻之大擾齊境然竟莫能聲罪致討以服齊之心而取其成故書同圍齊而不書伐也曹伯負芻卒于師成公也在位二十三年子勝嗣是為武公楚公子午帥師伐鄭左傳曰鄭子孔欲去諸大夫將叛晉而起楚師以去之使告子庚子庚弗許楚子聞之使揚豚尹宜告子庚曰國人謂不穀主社稷而不出師死不從禮不穀即位於今五年師徒不出人其以不榖為自逸而忘先君之業矣大夫圗之其若之何子庚嘆曰君王其謂午懷安乎吾以利杜稷也見使者稽首而對曰諸侯方睦於晉臣請嘗之若可君而繼之不可收師而退可以無害君亦無辱子庚帥師治兵於汾於是子蟜伯有子張從鄭伯伐齊子孔子展子西守二子知子孔之謀完守入保子孔不敢㑹楚師楚師伐鄭次于魚陵右師城上棘遂涉潁次于旃然蒍子馮公子格率鋭師侵費滑胥靡獻于雍梁右回梅山侵鄭東北至于蟲牢而反子庚門于純門信于城下而還涉于魚齒之下甚雨及之楚師多凍役徒幾盡高氏曰楚自蕭魚之役不復伐鄭鄭伯在㑹而楚伐之者公子嘉召之也經書月一書曰無大衍厯正月壬申大丙申冬至二月壬寅小三月辛未大四月辛丑小五月庚午大六月庚子小閏月己巳大七月己亥小八月戊辰大九月戊戌小十月丁卯大十一月丁酉小十二月丙寅大十有九年丁未靈王十八年晉霸平四蔡景三十八曹武公滕元年衛獻二十三殤五鄭簡十二陳哀十五杞孝十三宋平二十二齊靈二十八卒秦景二十三楚康六吳諸樊七春王正月諸侯盟于祝柯柯古多切公作阿左傳曰諸侯還自沂上盟于督揚曰大毋侵小孫氏曰諸侯不序前目後凡也杜氏曰前年圍齊之諸侯也祝柯縣今屬濟南郡張氏曰後漢志平原郡祝柯地譜齊州禹城縣齊邑晉人執邾子左傳曰以其伐我故高氏曰既來同㑹又與同盟而乃執之非霸討也劉氏曰邾人伐魯晉人疾之執其君以劫其地不言以歸釋之也未得其地故劫之巳得其地故釋之襄陵許氏曰執之舍之削取其田不以上命皆專於晉討雖當命非正也公至自伐齊上年書圍齊而此以伐至者蓋興師本以伐齊也兵無適主故不能共聲罪以伐之而乃各逞力以圍之故書同圍以示譏公既至則本其事而以伐至也取邾田自漷水漷好虢切又音郭左傳曰次于于泗上疆我田取邾田自漷水歸之我杜氏曰取邾田以漷水為界漷水出東海合鄉縣西南經魯國至高平湖陸縣入泗蘇氏曰成二年晉人敗齊于鞍使齊歸我汶陽之田書曰取汶陽田不言齊田魯地也今以晉命取田于邾故曰取邾田言非魯地也高氏曰邾之病魯信有罪矣魯以諸侯之力前既執其先君此又執其嗣君取其田蓋已甚矣但書取邾田足矣又云自漷水者隨漷水以為界藎言其取之多也襄陵許氏曰邾自漷水既削庶其畀我相繼來奔邾始衰亂矣季孫宿如晉左傳曰如晉拜師澄曰謝討齊且取邾田也葬曹成公曹小國常朝魯其君卒魯常㑹其葬况今又為魯同圍齊而卒于師夏衛孫林父帥師伐齊左傳曰晉荀偃卒而視不可含宣子盥而撫之曰事吳敢不如事主猶視欒懷子曰其為未卒事於齊故也乎乃復撫之曰主苟終所不嗣事于齊者有如河乃瞑受含欒魴帥師從衛孫文子伐齊張氏曰欒魴不書孫林父並將也夫討彊暴之罪而使逐君之大夫尸其事則晉何以服齊高氏曰十四年林父逐衛侯衎奔于齊故獨伐齊林父逐君霸主所當討而與之㑹伐則晉平公之霸業可知矣秋七月辛卯齊侯環卒環公作瑗靈公也在位二十八年子光嗣是為莊公晉士丐帥師侵齊至穀聞齊侯卒乃還穀齊地劉氏曰天下無王諸侯擅命征伐各自己出利人之難以成其私故伐人之喪者比比而士丐乃還師不侵不亦善乎陸氏曰士丐聞喪不當更往還為合禮蘇氏曰榖梁謂為士丐宜墠唯復命于介大將在軍君命有所不受有善而專之君與有焉必君命而後可則安用將矣八月丙辰仲孫蔑卒此孟文伯之子獻子也子速嗣曰莊子齊殺其大夫高厚左傳曰齊侯娶于魯曰顔懿姬無子其姪鬷聲姬生光以為太子諸子仲子戎子戎子嬖仲子生牙屬諸戎子戎子請以為太子許之仲子曰不可廢常不祥間諸侯難光之立也列於諸侯矣今無故而廢之是專黜諸侯而以難犯不祥也君必悔之公曰在我而巳遂東太子光使高厚𫝊牙以為太子夙沙衛為少傅齊侯疾崔杼微逆光疾病而立之光殺戎子莊公即位執公子牙於句瀆之丘夙沙衛奔高唐以叛崔杼殺高厚於灑藍而兼其室高氏曰齊高厚嘗帥師伐我矣晉新行義於齊齊侯始立而欲親晉故歸罪於高厚而殺之以說于晉此明年齊侯所以及澶淵之盟也張氏曰殺髙厚者崔杼也杼雖擅生殺之柄亦莊公之所欲也鄭殺其大夫公子嘉嘉公作喜左傳曰鄭子孔之為政也專國人患之乃討西宫之難與純門之師子孔當罪子展子西率國人伐之殺子孔而分其室胡氏曰嘉則有罪矣子展子西不能正以王法肆諸市朝與衆同弃乃利其室而分之有私焉故稱國以殺冬葬齊靈公高氏曰齊魯乃世昏姻之國雖有前怨今已易世故不廢喪紀示不忘好城西郛左傳曰懼齊也高氏曰夫齊怨在魯靈公以是而死莊公既立思所以報魯此人情之必至也叔孫豹㑹晉士丐于柯左傳曰齊及晉平盟于大隧故穆叔㑹范宣子于柯穆叔見叔向賦載馳之四章叔向曰肸敢不承命杜氏曰魏郡內黃縣東北有柯城高氏曰魯猶懼齊故為柯之㑹以自固城武城左傳曰穆叔歸曰齊猶未也不可以不懼乃城武城杜氏曰泰山南武城縣經書月二書日二大衍厯正月丙申小辛丑冬至二月乙丑大三月乙未大四月乙丑小五月甲午大六月甲子小經七月辛卯在此月七月癸巳大經八月丙辰在此月八月癸亥小九月壬辰大十月壬戌小十一月辛卯大十二月辛酉小長厯是年閏九月辛卯七月十七日丙辰八月二十四日二十年戊申靈王十九年晉霸平五蔡景三十九曹武二衛獻二十四殤六鄭簡十三陳哀十六杞孝十四宋平二十三齊莊公光元年秦景二十四楚康七吳諸樊八春王正月辛亥仲孫速㑹莒人盟于向左傳曰及莒平盟于向督揚之盟故也杜氏曰向莒邑莒數伐魯前年諸侯盟督揚以和解之故二國自復共盟結其好高氏曰向本屬莒宣四年取之諸侯盟祝柯以和解莒魯二國復自結好自是二十年莒魯不交兵速代父為卿未練而從政無復三年之喪也夏六月庚申公㑹晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯小邾子盟于澶淵澶市然切左傳曰齊成故也高氏曰齊以晉不伐其喪而感服居喪而出盟襄陵許氏曰自文十四年新城之役諸侯盟書同平公祝柯澶淵之盟不書同此悼公之遺烈也歟杜氏曰澶淵衛地近戚田在頓丘縣南一名繁汗張氏曰唐置澶州今屬開德府臨河縣秋公至自㑹仲孫速帥師伐邾左傳曰邾人驟至以諸侯之事弗能報也孟莊子伐以報之孫氏曰速伐邾背澶淵之盟也襄陵許氏曰祝柯之㑹既執邾子又取其田報亦足矣而復伐之譏已甚也且澶淵在彼高氏曰方與之盟而退又興師以伐之可乎然邾小國也不量力而易霸國敵彊國連兵不已豈謀也哉蔡殺其大夫公子燮左傳曰蔡公子燮欲以蔡之晉蔡人殺之初蔡文侯欲事晉曰先君與於踐土之盟晉不可弃且兄弟也畏楚不能行而卒楚人使蔡無常公子燮求從先君以利蔡不能而死高氏曰燮蓋嘗為鄭所獲者欲舍荆楚而之中國正也追先君之志而成之順也楚政無常求寬其民利也而用事者安楚弗欲懼燮之起晉爭也而殺之非所謂可殺者也而以國殺者蔡侯以為罪也蔡公子履出奔楚高氏曰履燮之弟也因懼而奔楚亦可傷矣君子之謀國也必審其力察其勢揆其時三者可矣然後度其義義雖可而三者弗可君子弗輕為也夫蔡之事楚也殆將百年矣楚不與中國交兵者甫十年爾二子見其稍為晉下也將伸百年之辱改而從晉此所以義雖可為而三者未可也故燮之殺履之出衆人矜其功之弗就而君子以為謀之未臧師為楚撼而晉不能救卒亡其國哀哉陳侯之弟黃出奔楚黃公穀作光左傳曰陳慶虎慶寅畏公子黃之逼訴諸楚曰與蔡司馬同謀楚人以為討公子黃將出奔呼於國曰慶氏無道求專陳國暴蔑其君而去其親五年不滅是無天也高氏曰黃與履何以奔楚自理也黃以寵任太過權逼其卿故慶氏譛而陳侯不能為之辨明是以一國之大不能容一弟也澄曰黃非三命之大夫故不氏之曰公子然以時君之弟其尊與再命之大夫同故得稱名其稱名者以其為陳侯之弟故也故曰陳侯之弟黃叔老如齊杜氏曰齊魯有怨交聘禮絶今復繼好息民冬十月丙辰朔日有食之季孫宿如宋左傳曰報向戌之聘也高氏曰我有齊難至是始報經書月三書日三六衍厯正月庚寅大丙午冬至辛亥二十二日二月庚申小三月己丑大四月己未小五月戊子大六月戊午小庚申三日七月丁亥大八月丁巳大九月丁亥小十月丙辰大朔日食十一月丙戌小十二月乙卯大二十有一年己酉靈王二十年晉霸平六蔡景四十曹武三衛獻二十五殤七鄭簡十四陳哀十七杞孝十五宋平二十四齊莊二秦景二十五楚康八吳諸樊九春王正月公如晉左傳曰拜師及取邾田也邾庶其以漆閭丘來奔左傳曰季武子以公姑姊妻之皆有賜於其從者澄曰庶其再命之大夫例名而不氏杜氏曰二邑在高平南平陽縣東北有漆鄉西北有顯閭亭任公輔曰兖州鄒縣即南平陽也後漢山陽南平鄉有漆亭山陽南平陽有閭丘亭劉氏曰漆一邑閭丘一邑也不言及所受於君之私邑而食之者也私邑不言及公邑言及高氏曰時公在晉而季氏受叛臣納其邑是謂以利主逋逃也夏公至自晉秋晉欒盈出奔楚左傳曰欒桓子娶於范宣子生懷子范鞅以其亡也怨欒氏桓子卒欒祁與其老州賔通幾亡室矣懷子患之祁懼其討也訴諸宣子曰盈將為亂范鞅為之徴懷子好施士多歸之宣子畏其多士也信之懷子為下卿宣子使城著而遂逐之高氏曰盈不能防間其母遂為范丐所逐然不以范丐逐之為文者使盈無可逐之釁則丐亦不得而逐矣既取奔亡復有作亂之志故特奔于楚焉以楚彊大今日可恃以逃難他日可挾以復歸也九月庚戌朔日有食之冬十月庚辰朔日有食之襄陵許氏曰比年食又比月食蓋自是八年之間而日七食禍變重矣曹伯來朝即位三年而來朝也公㑹晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子于商任任音壬左傳曰錮欒氏也襄陵許氏曰欒氏之出非其罪也徒以權門私相忌怨何有於國而平公受其激怒勤動諸侯以逞范鞅之積憾必欲使盈無所容於世故盈發憤卒興禍亂此皆以私敗公足以為古今之至戒是時中國無事晉無所發政以亟㑹諸侯則知徒以欒氏信不誣也經書月三書日二大衍厯正月乙酉小壬子冬至二月甲寅大閏月甲申小三月癸丑大四月癸未小五月壬子大六月壬午小七月辛亥大八月辛巳小九月庚戌大朔日食十月庚辰小朔日食大衍九月日食黃道翼九度大十月日在黃道角四度弱非食限十一月己酉大十二月己卯大長厯是年閏八月二十有二年庚戌靈王二十一年晉霸平七蔡景四十一曹武四衛獻二十六殤八鄭簡十五陳哀十八杞孝十六宋平二十五齊莊三秦景二十六楚康九吳諸樊十春王正月公至自㑹著不朝正于朔夏四月秋七月辛酉叔老卒此叔肸之孫聲伯之子子叔齊子也其子弓嗣是曰子叔敬子冬公㑹晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于沙隨邾子下左無滕子在傳曰樂盈自楚適齊晏平仲言於齊侯曰商任之㑹受命于晉今納欒氏將安用之小所以事大信也失信不立君其國之弗聼㑹于沙隨復錮欒氏也欒盈猶在齊晏子曰禍將作矣齊將伐晉不可以不懼胡氏曰古者大夫去國君不歸其社稷不繫纍其子弟不收其田邑使人導之出疆又先於其所往厚人倫也今晉不念欒氏世勳而逐盈又將搏執之而命諸侯無得納焉何其已甚也楚逐申公巫臣子反請以重幣錮之楚子曰止彼若能利國家雖重幣晉將可乎若無益於晉晉將棄之何勞錮焉其賢於商任沙隨之謀逺矣高氏曰晉以大夫之故期年之間再合諸侯見晉失霸者之義不足以令諸侯矣齊人於是終保盈是令不行也令不行者盈之譖為可憫者也諸侯皆知之而平公不知也故齊侯慨然背此盟而眀年伐衛遂伐晉也公至自㑹為一欒盈而再合諸侯見大夫之彊也楚殺其大夫公子追舒左傳曰楚觀起有寵於令尹子南未益祿而有馬數十乘楚人患之王將討焉子南之子棄疾為王御士王每見之必泣棄疾曰君三泣臣矣敢問誰之罪也王曰令尹之不能爾所知也國將討焉爾其居乎對曰父戮子居君焉用之泄命重刑臣亦不為王遂殺子南於朝轘觀起於四竟子南之臣謂棄疾請徙子尸於朝曰君臣有禮唯二三子三日棄疾請尸王許之既葬其徒曰行乎曰吾與殺吾父行將焉入曰然則臣王乎曰棄父事讎吾不忍也遂縊而死蘇氏曰追舒罪不至死故稱國以殺高氏曰追舒寵近小人故及於難然以楚國之力除一寵嬖之大夫顧豈難哉而康王始則與人之子圖其父終則殺之轘其黨由威柄失於上故刑不足以馭下也夫威柄既立則責譙足以折姦臣之鋒及其失之則刀鋸不足以當姦臣之罪其怨毒所鍾遂發於靈王之世楚之不亡者幸而已以强大之國而威柄一失其禍遂至於此則中國之君可不監于兹經書月三書日一大衍厯正月己酉小丁巳冬至二月戊寅大三月戊申小四月丁丑大五月丁未小六月丙子大七月丙午小辛酉十六日八月乙亥大九月乙巳小十月甲戌大十一月甲辰小十二月癸酉大二十有三年辛亥靈王二十二年晉霸平八蔡景四十二曹武五衛獻二十七殤九鄭簡十六陳哀十九杞孝十七卒宋平二十六齊莊四秦景二十七楚康十吳諸樊十一春王二月癸酉朔日有食之三月己巳杞伯丐卒孝公也在位十七年晉悼夫人之兄弟也五與魯盟其弟益姑立是為文公高氏曰杞自桓公以來晉悼為昏姻國國恃以興而魯禮有加夏邾畀我來奔卑公作鼻杜氏曰庶其之黨同竊邑以叛君高氏曰向受邾之叛臣與其邑今又受其叛臣是年冬臧孫紇出奔邾亦受之葬杞孝公陳殺其大夫慶虎及慶寅左傳曰陳侯如楚公子黃訴二慶於楚楚人召之使慶樂往殺之慶氏以陳叛屈建從陳侯圍陳陳人城板隊而殺人役人相命各殺其長遂殺慶虎慶寅高氏曰書及者罪在慶虎以虎之罪而及寅也陳侯之弟黃自楚歸于陳高氏曰二慶死則黃之歸易也衛侯之弟鱄秦伯之弟針皆不書歸何也鱄針之歸衛侯秦伯己卒矣晉欒盈復入于晉入于曲沃左傳曰晉將嫁女于吳齊侯使析歸父媵之以藩載欒盈及其士納諸曲沃欒盈夜見胥午而告之許諾伏之而觴曲沃人樂作午言曰今也得欒孺子何如對曰得主而為之死猶不死也皆歎有泣者爵行義言皆曰得主何二之有盈出遍拜之欒盈帥曲沃之甲因魏獻子以晝入絳初欒盈佐魏莊子於下軍獻子私焉故因之樂王鮒侍坐於范宣子或告曰欒氏至矣宣子懼樂王鮒曰奉君以走固宫必無害也且欒氏多怨子為政欒氏自外子在位其利多矣既有利權又執民柄將何懼焉欒氏所得其唯魏氏乎而可强取也夫克亂在權子無懈矣公有姻喪王鮒使宣子墨縗冒絰二婦人輦以如公奉公以如固宫范鞅逆魏舒則成列既乘將逆欒氏矣趨進曰欒氏帥賊以入鞅之父與二三子在君所矣使鞅逆吾子鞅請驂乘持帶遂超乘右撫劒左援帶命驅之出僕請鞅曰之公宣子逆諸階執其手賂之以曲沃范氏之徒在臺後欒氏乘公門宣子謂鞅曰矢及君屋死之鞅用劒以帥卒欒氏退欒盈奔曲沃晉人圍之張氏曰曲沃在河東聞喜縣劉氏曰曲沃欒氏之邑也然則曷為不言叛非叛者也劫衆以敵君直亂而已矣蘇氏曰欒盈自齊入于曲沃不言自齊何也齊之納欒盈非以兵納之也譬如盜賊私納之故不書自齊胡氏曰欒氏晉之世臣故盈雖出奔猶繫於晉復入者甚逆之詞為其既絶而復入也曲沃者所食之地當時權寵之臣各以利誘其下使為之用至於殺身而不避莫知有君臣之分者也故聞語欒孺子者則或嘆或泣而樂為之死盈從之遂入絳乘公門若非天棄欒氏又有范鞅之謀晉亦殆矣原其失在於錮之甚急致無所容是以至此極春秋備書以見人而不仁疾之已甚亂也其為後世鍳豈不深切著眀也哉秋齊侯伐衛遂伐晉左傳曰齊侯伐衛自衛將遂伐晉晏平仲曰君恃勇力以伐盟主若不濟國之福也不德而有功憂必及君崔杼諫曰不可臣聞之小國間大國之敗而毁焉必受其咎君其圖之弗聽陳文子見崔武子曰將如君何武子曰吾言於君君弗聽也以為盟主而利其難羣臣若急君於何有子姑止之文子退告其人曰崔子將死乎謂君甚而又過之不得其死過君以義猶自抑也况以惡乎齊侯遂伐晉取朝歌為二隊入孟門登大行張武庫於熒庭戍郫邵封少水以報平隂之役乃還趙勝帥東陽之師以追之獲晏氂髙氏曰此齊侯背澶淵商任沙隨之盟因晉有欒氏之難而助之以報十八年之役也十八年諸侯同圍齊者魯之故也齊之所以數伐魯者衛之故也故先伐衛先伐衛者試也晉不之問於是遂伐晉雖皆有辭于伐然晉為盟主而衛其同盟也齊莊既伐同盟又伐盟主禍亂之成著于此矣八月叔孫豹帥師救晉次于雍榆雍於用切榆公作渝穀作俞陸氏曰凡言救者救急之名不當次止也僖元年次于聶北救邢本次止而遙為郉援故先書次後言救譏其失救急之義也今魯君命往救晉豹畏齊而次故上言救晉以眀師出本意是先通君命也言君本命往救而豹自次止所以不譏君而罪豹也孫氏曰不救則懼晉之討往救則畏齊之强大夫帥師救之而次焉聶北之次先次後救可救而不救則罪重也雍榆之次先救後次欲救而力不能有罪而猶輕爾春秋之義次皆有罪於次之中有足矜者雍榆之次是也杜氏曰雍榆晉地汲郡朝歌東有雍城已邜仲孫速卒左傳曰季武子無適子公彌長而愛悼子欲立之訪於申豐申豐趨退訪於臧紇紇曰飲我酒吾為子立之季孫飲大夫酒臧紇為客既獻臧孫命北面重席新樽潔之召悼子降逆之及旅而召公鉏使與之齒季孫失色季氏以公鉏為馬正孟孫惡臧孫季孫愛之孟氏之御騶豐㸃好羯也曰從余言必為孟孫豐㸃謂公鉏苟立羯請讎臧氏公鉏謂季孫曰孺子秩固其所也若羯立則季氏信有力於臧氏矣弗應孟孫卒公鉏奉羯立于户側季孫至曰秩焉在公鉏曰羯在此矣季孫曰孺子長公鉏曰何長之有唯其才也且夫子之命也遂立羯秩奔邾臧孫入哭甚哀多涕出其御曰孟孫之惡子也而哀如是季孫若死其若之何臧孫曰季孫之愛我疾疢也孟孫之惡我藥石也美疢不如惡石夫石猶生我疢之美其毒滋多孟孫死吾亡無日矣冬十月乙亥臧孫紇出奔邾左傳曰孟氏閉門告於季孫曰臧氏將為亂不使我葬季孫不信臧孫聞之戒孟氏將辟藉除於臧氏臧孫使正夫助之除於東門甲從已而視之孟氏又告季孫季孫怒命攻臧氏臧紇斬鹿門之關以出奔邾初臧宣叔娶于鑄生賈及為而死繼室以其姪穆姜之姨子也生紇長於公宫姜氏愛之故立之臧賈臧為出在鑄臧武仲自邾使告臧賈且致大蔡焉曰紇不佞失守宗祧敢告不弔紇之罪不及不祀子以大蔡納請其可賈曰是家之禍也非子之過也賈聞命矣再拜受龜使為以納請遂自為也臧孫如防使來告曰紇非能害也知不足也非敢私請苟守先祀毋廢二勳敢不辟邑乃立臧為臧紇致防而奔齊其人曰其盟我乎臧孫曰無辭將盟臧氏季孫召外史掌惡臣而問盟首焉對曰盟東門氏也曰毋或如東門遂不聼公命殺適立庶盟叔孫氏也曰毋或如叔孫僑如欲廢國常蕩覆公室季孫曰臧孫之罪皆不及此孟椒曰盍以其犯門斬關季孫用之乃盟臧氏曰無或如臧孫紇干國之紀犯門斬關臧孫聞之曰國有人焉誰居其孟椒乎穀梁傳曰蘧伯玉曰不以道事君者其出乎杜氏曰阿順季氏為之廢長立少以取奔亡晉人殺欒盈左傳曰晉人克欒盈于曲沃盡殺欒氏之族黨欒魴出奔宋不言大夫言自外也公羊傳曰非其大夫也陳氏折衷曰凡稱諸侯殺大夫必上書大夫下書氏名其不稱大夫唯叛人而已如鄭良霄齊慶封陳孔奐陳夏區夫及欒盈是也欒盈與鄭良霄一類皆已出奔自外復入為亂故也高氏曰欒盈之罪不及亡國而范氏之怨本以其私至於勤諸侯作盟㑹以錮之盈得衆心而外不容於諸侯內不復其國邑逆亂之謀自是而作蓋疾之巳甚之過也故君子謂欒氏之惡成於兩㑹之錮幾至亡國齊侯襲莒左傳曰齊侯還自晉不入遂襲莒門于且于傷股而退眀日將復戰期于夀舒杞殖華還載甲夜入且于之隧宿於莒郊眀日先遇莒子于蒲侯氏莒子重賂之使無死曰請有盟華周對曰貪貨棄命亦君所惡也昏而受命日未中而棄之何以事君莒子親鼓之從而伐之獲杞梁莒人行成杜氏曰掩其不僃曰襲高郵孫氏曰以强攻弱又掩以不偹焉罪之尤者也高氏曰以十八年莒子同諸侯圍齊故也用兵皆聲言彼罪執辭以伐若乘人不偹掩而取之則盜賊之為爾春秋獨此書襲者罪齊莊以諸侯之尊為盜賊之事也經書月四書日四大衍厯正月癸卯大壬戌冬至二月癸酉小朔日食三月壬寅大己巳二十八日四月壬申小五月辛丑大六月辛未小七月庚子大八月庚午小已卯十日九月己亥大十月己巳小乙亥七日十一月戊戌大十二月戊辰小閏月丁酉大二十有四年壬子靈王二十三年晉霸平九蔡景四十三曹武六衛獻二十八殤十鄭簡十七陳哀二十杞文公益姑元年宋平二十七齊莊五秦景二十八楚康十一吳諸樊十二春叔孫豹如晉杜氏曰賀克欒氏也仲孫羯帥師侵齊左傳曰晉故也高氏曰齊之伐晉也魯使叔孫豹救之次于雍榆無功於晉故仲孫羯至此復帥師侵齊為晉報焉蓋懼晉之疑也羯代速為卿未練而從政無復三年之喪夏楚子伐吳左傳曰楚子為舟師以伐吳不為軍政無功而還高氏曰於是見楚弱而吳之張也自襄公言之楚十一年失鄭十四年伐吳自是舍鄭而不取置欒盈而不事又十年而一再伐吳以是知楚弱而勢分於吳方急吳而緩中國也秋七月甲子朔日有食之既襄陵許氏曰春秋三書日食既桓三年以周桓敗宣八年以楚莊興至是而中國諸侯皆受盟於楚矣齊崔杼帥師伐莒左傳曰齊侯既伐晉而懼將欲見楚子楚子使薳啓疆如齊聘且請期齊侯聞將有晉師使陳無宇從薳啓疆如楚辭且乞師崔杼帥師送之遂伐莒侵介根高氏曰去年齊侯襲莒已與莒平今崔杼因帥師送使者如楚而遂伐莒是見利則乘齊人之無信也大水襄陵許氏曰夷儀之㑹以水不克伐齊則知水之所及廣矣非特魯之災也八月癸巳朔日有食之張氏曰漢五行志曰董仲舒以為比食又既象陽將絶中國將衰微之象也後六君弒楚子伐鄭滅舒鳩魯侯朝之卒主中國公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于夷儀左傳曰將以伐齊水不克高氏曰自盟于柯陵之後齊有輕晉之心㑹齊侯環卒而光新立乃受盟于澶淵及商任沙隨之㑹晉失其令齊於是不賔眀年乃伐衛遂伐晉又再加兵於莒晉侯為是故為此夷儀之㑹帥十二國諸侯之師將以討齊然㑹而不伐是有畏也國勢不競衆志不一也曰水不克者特辭不能伐爾下言崔杼伐我西鄙蓋知晉之無能為也冬楚子蔡侯陳侯許男伐鄭左傳曰楚子伐鄭以救齊門于東門次于棘澤諸侯還救鄭晉侯使張骼輔躒致楚師高氏曰齊侯聞諸侯已㑹遂告急于楚楚畏吳而緩晉故舍鄭者十有四年今以鄭伯在㑹故帥三國同伐鄭以救之公至自㑹襄陵許氏曰夷儀之師不能正齊之亂而徒致棘澤之役以為鄭難其救不足録矣高氏曰諸侯救鄭不書故以㑹至陳針宜咎出奔楚針其廉切左傳曰陳人復討慶氏之黨針宜咎出奔楚叔孫豹如京師左傳曰齊人城郟穆叔如周聘且賀城王嘉其有禮也賜之大路高氏曰襄公即位二十八年如晉者五出㑹者八未嘗朝天子也是時穀雒鬬毁王宫而齊侯叛晉欲求媚於天子故為王城之於是叔孫豹如京師聘且賀襄陵許氏曰自宣九年仲孫蔑如京師其後五十餘年乃始有叔孫豹以罕書也蓋自是不書聘王矣大饑穀梁傳曰五榖不升為大饑一穀不升謂之嗛二穀不升謂之饑胡氏曰古有救荒之政若國凶荒或發廩以賑之或移粟以通用或徙民以就食或為粥以救饑莩或興工以聚失業之人緩刑舍禁弛力薄征索鬼神除盜賊弛射侯而不燕置廷道而不修殺禮物而不備雖有旱乾水溢民無菜色所以偹之者如此其至是年秋有隂沴之災而冬大饑蓋所以賑業之者有不偹矣經書月二書日二大衍厯正月丁卯小旦日冬至二月丙申大三月丙寅小四月乙未大五月乙丑小六月甲午大七月甲子小朔日食八月癸巳大朔日食大衍七月日食黃道井二十一度半强八月日在黃道星二度弱非食限九月癸亥大十月癸巳小十一月壬戌大十二月壬辰小長厯是年閏三月二十有五年癸丑靈王二十四年晉霸平十蔡景四十四曹武七衛獻二十九殤十一鄭簡十八陳哀二十一杞文二宋平二十八齊莊六弒秦景二十九楚康十二吳諸樊十三卒春齊崔杼帥師伐我北鄙左傳曰報孝伯之師也公患之使告于晉孟公綽曰崔子將有大志不在病我必速歸何患焉其來也不冦使民不嚴異於他日齊師徒歸襄陵許氏曰崔子之志鄰國知之而齊莊不寤人將戕其躬之不恤而務貪伐國之功故利令智昏外競而內傾自然之符也夏五月乙亥齊崔杼弒其君光左傳曰齊棠公之妻東郭偃之姊也東郭偃臣崔武子棠公死偃御武子以弔焉見棠姜而美之遂娶之莊公通焉驟如崔氏崔子因是又以其間伐晉也曰晉必將報欲弒公以說于晉而不獲間公鞭侍人賈舉而又近之乃為崔子間公莒子朝于齊饗諸北郭崔子稱疾不視事公問崔子遂從姜氏姜入于室與崔子自側户出公拊楹而歌侍人賈舉止衆從者而入閉門甲興公登臺而請弗許請盟弗許請自刃於廟弗許皆曰君之臣杼疾病不能聽命近於公宫陪臣干掫有淫者不知二命公踰牆又射之中股反隊遂弒之襄陵許氏曰齊莊勢陵大邦衆暴小國而又躬亂臣室淫肆不君故使崔杼因民不忍以與敵市此足以為世鑒矣高氏曰崔杼不能防間其妻以淫于家反不絶其妻而行大逆於君齊莊公背諸侯之盟數行侵伐崔杼因民之忿遂以宣淫之故弒之澄按莊公在位六年其弟杵臼立是為景公公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于夷儀左傳曰晉侯濟自泮㑹于夷儀伐齊以報朝歌之役齊人以莊公說使隰鉏請成慶封如師男女以班賂晉侯以宗器樂器自六正五吏三十帥三軍之大夫百官之正長師旅及處守者皆有賂晉侯許之使叔向告于諸侯公使子服惠伯對曰君舍有罪以靖小國君之惠也寡君聞命矣孫氏曰莊公背澶淵之盟加兵晉衛信不道矣晉再合諸侯將伐齊齊人弒莊公以求成逆之大者晉不能討之以定齊國之亂曷以示諸侯哉胡氏曰晉本為報朝歌之役及聞崔杼之弒則宜聲於齊人問莊公之故執崔杼而戮之謀於齊衆置君以定其國今乃不討而受其賂高氏曰晉㑹諸侯以伐齊齊以莊公既弒為解因納賂以求成焉晉侯許之故不書伐夫以義㑹諸侯而以姦終之有以知晉平之不競矣六月壬子鄭公孫舍之帥師入陳左傳曰初陳侯㑹楚子伐鄭當陳隧者井堙木刋鄭人怨之鄭子展子産帥車七百乘伐陳宵突陳城遂入之陳侯扶其太子偃師奔墓子展命師無入公宫與子産親御諸門陳侯使司馬桓子賂以宗器陳侯免擁社子展執縶而見再拜稽首子美入數俘而出司徒致民司馬致節司空致地乃還高氏曰去秋夷儀之㑹楚與陳蔡許三國同伐鄭今嵗復㑹於夷儀鄭慮楚之復來也故先帥師入陳以奪其心觀左氏所載春秋入人之國未有若子展子産之有禮者也秋八月己巳諸侯同盟于重丘左傳曰齊成故也胡氏曰崔杼既弒其君晉侯受其賂而許之成高氏曰不能仗義討齊弒逆之賊反納賂而與之平然不敢討齊者以衛侯逐君篡立而同在㑹故也於是晉侯使人逆衛侯衎將使衛與之夷儀故先書崔杼之弒後書衛侯之入又以見晉侯啓殖喜之謀以召衛亂杜氏曰重丘齊地張氏曰曹州乘氏縣有故城公至自㑹衛侯入于夷儀侯下當有衎字左傳曰晉侯使魏舒宛沒逆衛侯將使衛與之夷儀衛獻公入子夷儀杜氏曰夷儀本邢地衛滅邢而為衛邑晉愍衛衎失國使衛分之吕氏曰夏五月㑹夷儀之衛侯剽也此入於夷儀之衛侯衎也不嫌兩君名實相亂乎曰衎雖無道非臣下所當逐剽亦非臣下所得立故衎入不名然則鄭伯突入于櫟何以名曰突不當立者衎當主者澄按衛侯下當有衎字蓋闕之也解者不知為文之缺故曲生意義楚屈建帥師滅舒鳩左傳曰二十四年吳人為楚舟師之役故召舒鳩人舒鳩人叛楚楚子師于荒浦使沈尹夀與師祁犂讓之舒鳩子敬逆二子而告無之且請受盟二子復命王欲伐之薳子曰不可彼告不叛且請受盟而又伐之伐無罪也姑歸息民以待其卒卒而不二吾又何求若猶叛我無辭有庸乃還舒鳩人卒叛楚令尹子木伐之及離城吳人救之楚擊敗吳師遂圍舒鳩舒鳩潰冬鄭公孫夏帥師伐陳夏公作囆左傳曰鄭子産獻捷于晉子展相鄭伯如晉拜成子西復伐陳陳及鄭平澄按六月已入陳矣陳侯賂以宗器免而擁社以示服鄭即還師未得成也故再伐之得成乃已十有二月吳子遏伐楚門于巢卒遏公穀作謁左傳曰吳子諸樊伐楚以報舟師之役門于巢巢牛臣曰吳王勇而輕若啓之將親門我獲射之必殪是君也死疆其少安從之吳子門焉牛臣隱於短牆以射之卒榖梁傳曰吳子遏伐楚至巢入其門門人射吳子有矢創友舍而卒夫卒之名加之伐楚之上者見其以伐楚卒也劉氏曰古者入境必假道過門則為之釋甲其卒非巢之罪也高氏曰吳人恃彊欲窺中夏而先楚楚之彊亦已久矣吳豈能遽得志乎自襄公十一年楚專意於吳再伐焉雖不得吳吳終畏之也已而伐鄭滅舒鳩吳子以楚人再伐而驕於是興師而卒于門巢澄曰遏諸樊也在位十三年其弟餘祭立經書月四書日三大衍厯正月辛酉大癸酉冬至二月辛卯小三月庚申大四月庚寅小五月己未大乙亥十七日六月己丑小壬子二十四日七月戊午大經書八月己巳當在此月十二日蓋七字誤作八八月戊子小九月丁巳大十月丁亥小十一月丙辰大十二月丙戌大二十有六年甲寅靈王二十五年晉霸平十一蔡景四十五曹武八衛獻三十殤十二弒鄭簡十九陳哀二十二杞文三宋平二十九齊景公杵臼元年秦景三十楚康十三吳餘祭元年春王二月辛卯衛寧喜弒其君剽剽匹妙切左傳曰二十年衛寧惠子疾召悼子曰吾得罪於君悔而無及也名藏在諸侯之策曰孫林父寧殖出其君君入則掩之若能掩之則吾子也若不能猶有鬼神吾有餒而已不來食矣悼子許諾惠子遂卒二十五年衛獻公自夷儀使與寧喜言寧喜許之太叔文子聞之曰今寧子視君不如奕棊其何以免乎奕者舉棊不定不勝其偶而况置君而弗定乎必不免矣九世之卿族一舉而滅之可哀也哉衛獻公使子鮮為復辭敬姒彊命之對曰君無信臣懼不免敬姒曰雖然以吾故也許諾初獻公使與寧喜言寧喜曰必子鮮在子鮮不獲命于敬姒以公命與寧喜言曰苟反政由寧氏祭則寡人告右宰穀右宰榖曰不可獲罪於兩君天下誰畜之悼子曰吾受命於先人不可以二榖曰我請使焉而觀之遂見公於夷儀反曰君淹恤在外十二年矣而無憂色亦無寬言猶夫人也若不已死無日矣悼子曰子鮮在右宰穀曰子鮮在何益多而能亡於我何為悼子曰雖然弗可以已孫文子在戚孫嘉聘於齊孫襄居守寧喜右宰穀伐孫氏不克伯國傷寧子出舍於郊伯國死孫氏夜哭國人召寧子寧子復攻孫氏克之殺子叔及太子角劉氏曰不與剽之立則其曰寧喜弒其君剽何寧氏君之寧氏殺之是以稱弒焉出衛侯而立剽者寧殖也則曷為於喜加弒為見喜之受命於殖而殺剽也然則為寧喜者宜奈何宜乎效死勿聽胡氏曰聖人特正寧喜弒君之罪示天下後世使知慎於廢立之際而不敢忽也霍光以大義廢昌邑立宣帝猶有言其罪者況私意邪袁粲桓彛之徒殺身不顧君子所以深取之衛孫林父入于戚以叛左傳曰孫林父以戚如晉杜氏曰衎雖未居位林父專邑背國猶為叛也高氏曰獻公之奔齊也林父實逐之今寧喜弒剽將納獻公故林父懼而入于戚以叛叛甚于奔前此諸大夫有不利於已則奔而已未有若林父之叛者故書叛自林父始甲午衛侯衎復歸于衛左傳曰衛侯入書曰復歸國納之也大夫逆於竟者執其手而與之言道逆者自車揖之逆於門者頷之而已公至使讓太叔文子曰寡人淹恤在外二三子皆使寡人朝夕聞衛國之言吾子獨不在寡人古人有言曰非所怨勿怨寡人怨矣對曰臣知罪矣臣不佞不能負羈絏以從扞牧圉臣之罪一也有出者有居者臣不能二通內外之言以事君臣之罪二也有二罪敢忘其死乃行公使止之澄曰衎失國八年矣雖一入于夷儀猶未得國也故書名夏晉侯使荀吳來聘左傳曰晉人為孫氏故召諸侯將以討衛中行穆子來聘召公也公㑹晉人鄭良霄宋人曹人于澶淵澶市延切左傳曰以討衛疆戚田取衛西鄙懿氏六十以與孫氏杜氏曰澶淵衛地又近戚田高氏曰諸侯皆大夫㑹而獨召公者以魯衛兄弟國故使公正之也秋宋公殺其世子痤痤才何切榖作座左傳曰初宋芮司徒生女子曰棄平公嬖生佐惡而婉太子痤美而狠寺人惠牆伊戾為太子內師而無寵楚客聘於晉過宋太子知之請野享之公使往伊戾請從之至則欿用牲加書徴之而騁告公曰太子將為亂既與楚客盟矣公曰為我子又何求對曰欲速公使視之則信有焉問諸夫人與左師則皆曰固聞之公囚太子太子曰唯佐也能免我召而使請曰日中不來吾知死矣左師聞之聒而與之語過期乃縊而死佐為太子公徐聞其無罪也乃亨伊戾高氏曰晉獻公惑驪姬之讒殺申生宋平公聽伊戾之詐而殺子痤漢武帝唐明皇猶蹈之以二君猶爾晉宋不足道也自古讒人之為國患雖其君之父子不能相保况臣下乎晉人執衛寧喜公羊傳曰此執有罪何以不得為霸討執之不以其罪也劉氏曰寧喜如晉晉人執之曰爾曷為納君而伐孫氏云爾高氏曰弒君之賊人人皆得討之晉人執之非討其弒君也討其伐戚而殺晉戍也八月壬午許男寧卒于楚左傳曰許靈公如楚請伐鄭曰師不興孤不歸矣卒于楚楚子曰不伐鄭何以求諸侯高氏曰十二年晉伐許他國皆大夫獨鄭伯自行故許男欲報之以中國諸侯而卒於蠻荒死非其所矣澄曰靈公在位四十五年其子買嗣是為悼公冬楚子蔡侯陳侯伐鄭左傳曰鄭人將禦之子詹曰晉楚將平諸侯將和楚王是故昧於一來不如使逞而歸乃易成也子展說不禦冦入南里墮其城涉於樂氏門于師之梁縣門發獲九人焉涉于汜而歸而後葬許靈公高氏曰為許故也於是鄭不禦冦怨之所以平兵之所以弭也葬許靈公楚伐鄭歸而後葬之經書月二書日三大衍厯正月丙辰小戊寅冬至二月乙酉小辛卯七日甲午十日三月甲寅大四月甲申大五月甲寅小六月癸未大七月癸丑小八月壬午大壬午旦日辛亥大暑閏月壬子小九月辛巳大十月辛亥小十一月庚辰大十二月庚戌小長厯是年閏十二月二十有七年乙卯靈王二十六年晉霸平十二蔡景四十六曹武九衛獻三十一鄭簡二十陳哀二十三杞文四宋平三十齊景二秦景三十一楚康十四吳餘祭二春齊侯使慶封來聘高氏曰景公即位通嗣君也夫鄭不擊楚而齊魯釋怨此宋之盟所以輯也夏叔孫豹㑹晉趙武楚屈建蔡公子歸生衛石惡陳孔奐鄭良霄許人曹人于宋屈俱勿切奐公作瑗後同左傳曰宋向戌善於趙文子又善於令尹子木欲弭諸侯之兵如晉告趙孟趙孟謀於諸大夫韓宣子曰兵民之殘也財用之蠹小國之大菑也將或弭之雖曰不可必將許之弗許楚將許之以召諸侯則我失為盟主矣晉人許之如楚楚亦許之如齊齊人難之陳文子曰晉楚許之我焉得已齊人許之告於秦秦亦許之皆告於小國為㑹于宋孫氏曰隱桓之際天子失道諸侯擅權宣成之間諸侯僭命大夫專國至宋之㑹諸侯日微天下之政中國之事皆大夫專持之故二十九年城杞三十年㑹澶淵昭元年㑹虢諸侯莫有見者高氏曰此何以㑹楚意也楚人患吳而結諸夏也此事利害甚重而諸侯大夫不詳其故始徇其弭兵之名遂㑹于宋而與之盟自是華夏蠻貊莫辨而諸國俯首兩事晉楚當時天下之事中國之政皆大夫專持之諸侯亦弗能制也嗟夫桓文數十年之功業一朝而壞之百姓雖暫免於兵革之苦而天下之勢遂大潰而不可收拾矣彼宋向戌者又豈足知天下之大計哉衛殺其大夫寧喜左傳曰衛寧喜專公患之公孫免餘請殺之公曰微寧子不及此吾與之言矣對曰臣殺之君勿與知乃與公孫無地公孫臣謀使攻寧氏弗克皆死免餘復攻寧氏殺寧喜及右宰穀尸諸朝高郵孫氏曰喜弒剽而衎反國里克弒奚齊而立夷吾既而殺之皆以其私里克寧喜之見殺皆不以其罪故皆曰殺其大夫也衛侯之弟鱄出奔晉鱄市轉切又音專穀作專左傳曰子鮮曰逐我者出納我者死君失其信鱄實使之遂出奔晉託於木門不鄉衛國而坐終身不仕高氏曰鱄與喜同納君者喜既殺而鱄不安遂棄其君而出奔也秋七月辛巳豹及諸侯之大夫盟于宋胡氏曰此一地也曷為再言宋宋之盟向戌欲弭諸侯之兵以為名而楚屈建請晉楚之從交相見自是中國諸侯南嚮而朝楚及申之㑹蠻荒之君篡弒之賊大合十有七國之衆而用齊桓召陵之事無敢違者聖人傷中國之衰而其事自宋之盟始也或者乃以宋之盟中國不出楚師不入玉帛之使交乎天下為晉趙武楚屈建之力而善此盟其說誤矣冬十有二月乙亥朔日有食之經書月二書日二大衍厯正月己卯大癸未冬至二月己酉大三月己卯小四月戊申大五月戊寅小六月丁未大七月丁丑小辛巳五日八月丙午大九月丙子小十月乙巳大十一月乙亥小朔日食經書十二月食左氏謂失閏也或字誤十二月甲申大二十有八年丙辰靈王二十七年崩晉霸平十三蔡景四十七曹武十衛獻三十二鄭簡二十一陳哀二十四杞文五宋平三十一齊景三秦景三十二楚康十五卒吳餘祭三春無冰夏衛石惡出奔晉左傳曰衛人討寧氏之黨故石惡出奔晉衛人立其從子圃以守石氏之祀邾子來朝高氏曰邾自晉立其君魯取其田益微弱矣至是悼公來朝秋八月大雩仲孫羯如晉左傳曰告將為宋之盟故如晉也冬齊慶封來奔左傳曰齊崔杼生成及彊而寡娶東郭姜生明東郭姜以孤入曰棠無咎與東郭偃相崔氏崔成有疾而廢之而立眀成請老于崔崔子許之偃與無咎弗豫曰崔宗邑也必在宗主成與彊怒將殺之告慶封慶封告盧蒲嫳盧蒲嫳曰彼君之讎也天或者將棄彼矣崔之薄慶之厚也他日又告慶封曰苟利夫子必去之難吾助女崔成崔彊殺東郭偃棠無咎於崔氏之朝崔子怒而出遂見慶封慶封使盧蒲嫳帥甲以攻崔氏殺成與彊而盡俘其家其妻縊嫳復命於崔子且御而歸之至則無歸矣乃縊慶封當國慶封好田而耆酒與慶舍政則以其內實遷于盧蒲嫳氏易內而飲酒數日國遷朝焉使諸亡人得賊者以告而反之故反盧蒲癸癸臣子之有寵言王何而反之二人皆嬖慶封田于萊嘗于太公之廟慶舍蒞事盧蒲癸自後刺子之王何以戈擊之死慶封歸遇告亂者伐西門弗克還伐北門克之入伐內宫弗克反陳于嶽請戰弗許遂來奔既而齊人來讓奔吳吳句餘豫之朱方富於其舊十有一月公如楚左傳曰為宋之盟故公及宋公陳侯鄭伯許男如楚十有二月甲寅天王崩靈王也在位二十七年子貴嗣是為景王不書葬諸侯不赴也髙氏曰靈王雖無傳政周人以為王甚神聖蓋非庸主矣乙未楚子昭卒左傳曰公及衎至漢聞康王卒欲反叔仲昭伯曰我楚國之為豈為一人行也子服惠伯曰君子有逺慮小人從邇饑寒之不恤誰遑其後不如姑歸也叔孫穆子曰叔仲子專之矣子服子始學者也榮成伯曰逺圖者忠也公遂行宋向戌曰我一人之為非為楚也饑寒之不恤誰能恤楚姑歸而息民待其立君而為之備宋公遂反澄曰康王也在位十五年子郟敖麋嗣胡氏曰甲寅天王崩乙未楚子昭卒相距四十二日則閏月也然不以閏書見喪服之不數閏也齊景公葬書閏月則眀殺恩之非禮也吕氏曰閏承前月而受其餘日故書閏月之日繫前月之下此范寧之說也經書月三書日二大衍厯正月甲戌小戊子冬至二月癸卯大三月癸酉小四月壬寅大五月壬申小六月辛丑大七月辛未大八月辛丑小九月庚午大十月庚子小十一月己巳大十二月己亥小甲寅十六日乙未蓋字誤乙當作已二十一日也二十有九年丁巳景王元年晉霸平十四蔡景四十八曹武十一衛獻三十三卒鄭簡二十二陳哀二十五杞文六宋平三十二齊景四秦景三十三楚郟敖麋元年吳餘祭四弒春王正月公在楚左傳曰釋不朝正於廟也楚人使公親襚孫氏曰按成十年秋七月公如晉十一年三月公至自晉昭十五年冬公如晉十六年夏公至自晉皆不言所在公在中國猶可在蠻荆則甚矣故詳而録之胡氏曰嵗之首月公如他國者有矣此獨書公在楚耆外為蠻荆所制以俟其葬而不得歸內為强臣所逼欲擅其國而不敢入故特書所在以存君也髙氏曰公在晉齊多矣闕朝正之禮亦不少矣但書公如晉如齊則義自見也今書公在楚則聖人之㫖深矣按二十八年公如楚十二月甲寅天王崩乙未楚子昭卒公不篤君臣之義以奔天王之喪而徇夷狄之彊以俟楚子之葬久留于楚待夏乃歸故聖人特於朝正之時書公所在與昭公失國在乾侯同且以責季氏之無君也夏五月公至自楚左傳曰葬楚康王公及陳侯鄭伯許男送葬至于西門之外諸侯之大夫皆至于墓公還及方城季武子取卞使公冶問璽書追而與之曰聞守卞者將叛臣帥徒以討之既得之矣敢告公曰欲之而言叛祗見疏也公謂公冶曰吾可以入乎對曰君實有國誰敢違君公欲無入榮成伯賦式微乃歸孫氏曰公留于楚者七月庚午衛侯衎卒獻公也在位通前三十三年其子惡嗣是為襄公閽弒吳子餘祭祭側界切左傳曰吳人伐越獲俘焉以為閽使守舟吳子餘祭觀舟閽以刀弒之穀梁傳曰閽門者也不稱姓名閽不得齊於人不稱其君閽不得君其君也舉至賤而加之吳子吳子近刑人也沙隨程氏曰謂之弒蓋其君也不曰其君賤閽也盜殺蔡侯申書殺閽書弒何也以日食庶人在官者之祿也若士則書某人弒其君某澄曰餘祭在位三年其弟夷昧立仲孫羯㑹晉荀盈齊高止宋華定衛世叔儀鄭公孫段曹人莒人邾人滕人薛人小邾人城杞世叔儀公儀作齊莒人下左無邾人左傳曰晉平公杞出也故知悼子合諸侯之大夫以城杞鄭子太叔曰晉國不恤周宗之闕而夏肄是屛其棄諸姬亦可知也已諸姬是棄其誰歸之胡氏曰平公不撫其民而逺屯戍于母家周人怨思平公不能修文襄之業而有城杞之役可謂知本乎晉侯使士鞅來聘左傳曰拜城杞也高氏曰謝城杞且使我歸杞田也杞子來盟左傳曰晉侯使司焉女叔侯來治杞田弗盡歸也晉悼夫人愠曰齊也取貸先君若有知也不尚取之公告叔侯叔侯曰武獻以下兼國多矣誰得治之杞夏餘也而即東夷魯周公之後也而睦於晉公卿大夫相繼於朝史不絶書府無虛月如是可矣何必瘠魯以肥杞杞文公來盟高氏曰晉使魯歸前所侵杞田故書杞子來盟於士鞅來聘之下吳子使札來聘左傳曰通嗣君也澄曰餘祭立而通聘使于魯札受命以出不知餘祭之被弒也秋九月葬衛獻公齊髙止出奔北燕左傳曰齊公孫蠆公孫竈放其大夫高止於北燕髙止好以事自為功且專故難及之襄陵許氏曰君放大夫可也臣放大夫是無君也不可以訓故以出奔書杜氏曰髙止高厚之子張氏曰北燕燕國薊縣姬姓召公奭之後至此始見於經冬仲孫羯如晉左傳曰報范氏也經書月三書日一大衍厯正月戊辰大甲午冬至二月戊戌小三月丁卯大四月丁酉小五月丙寅大庚午五日閏月丙申小六月乙丑大七月乙未小八月甲子大九月甲午小十月癸亥大十一月癸巳小十二月壬戌大長厯是年閏八月三十年戊午景王二年晉霸平十五蔡景四十九弒曹武十二衛襄公惡元年鄭簡二十三陳哀二十六杞文七宋平三十三齊景五秦景三十四楚郟二吳夷昧元年春王正月楚子使薳罷來聘薳千委切罷音皮公作頗左傳曰通嗣君也余氏曰且報朝也張氏曰魯以君朝而楚以大夫聘此齊桓晉文所以行乎列國者故自宋之盟內外不分楚人行霸主之禮於中國非晉平趙武之責而誰哉高氏曰公踰年在楚楚郟敖新即位故使薳罷來聘以報之自文公九年至此歷七十餘年未嘗交聘今薳罷之來蓋為恭也自是吳楚皆不復來聘夏四月蔡世子般弒其君固般音班左傳曰蔡景侯為太子般娶于楚通焉太子弒景侯澄按景公在位四十九年子般嗣是為靈公五月甲午宋災左傳曰或呌於宋太廟曰嘻嘻出出鳥嗚於亳社如曰嘻嘻宋大災宋伯姬卒公穀無宋字榖梁傳曰取卒之日加之災上者見以災卒也伯姬之舍失火左右曰夫人少辟乎伯姬曰婦人之義傅母不在宵不下堂左右又言伯姬曰保母不在宵不下堂遂逮乎火而死婦人以貞為行者也伯姬之婦道盡矣劉氏曰使共姬避火而全生未足以害其貞也然而不以避之可以全其生之故而違天下之常義此安乎性命者乃能之故審乎死生之度辨乎榮辱之境知禮之重重於生辱之甚甚於死伯夷叔齊餓於首陽之下何以過乎沙隨程氏曰古者女子二十而嫁至是六十歲矣保傳不應宵出無常處以逮乎火為賢則嫂溺援之以手者非耶今書之詳蓋哀之也澄嘗聞之君子曰此蓋罪宋之子與臣不能救其君母使之逮乎火而死也天王殺其弟佞夫佞公作年左傳曰初王儋季卒其子括將見王而嘆單公子愆期為靈王御士過諸廷聞其嘆而言曰烏乎必有此夫入以告王且曰必殺之不戚而願大視躁而足高心在他矣王曰童子何知及靈王崩儋括欲立王子佞夫佞夫不知儋括圍蒍逐成愆成愆奔平畤尹言多劉毅單蔑甘過鞏成殺佞夫髙氏曰靈王崩王孫括欲立佞夫佞夫不知及景王既立括逐蒍邑大夫於是尹劉單甘鞏共殺佞夫景王弗問焉澄曰象欲殺舜而舜封之為諸侯仁人之於弟蓋如此儋括為亂佞夫實不知謀而尹劉諸人乃殺佞夫書王殺者罪王不能免其弟也王子瑕奔晉范氏曰王子瑕不言出周無外也澄按此言非也夫出者對入而言不幸而出奔者他日可以再入瑕天王之子蓋亦與聞乎儋招佞夫之謀括事敗而佞夫見殺瑕懼及禍而奔晉瑕不能明為子事父之孝可自比於逆亂之黨蓋逆子也奔以逃死而自絶於父有罪而奔不可復入者也與王子朝奔楚同故不言出秋七月叔弓如宋葬宋共姬穀無宋字公羊傳曰外夫人不書葬此何以書隱之也杜氏曰共姬從夫諡也沙隨程氏曰伯姬有賢行遇乎不幸故書之詳鄭良霄出奔許自許入于鄭左傳曰二十九年鄭伯有使公孫黑如楚辭曰楚鄭方惡而使余往是殺余也伯有曰世行也子晳曰可則往難則巳何世之有伯有將彊使之子晳怒將伐伯有氏大夫和之鄭大夫盟于伯有氏三十年鄭伯有耆酒為窟室而夜飲酒擊鐘焉朝至未已朝者曰公焉在其人曰吾公在壑谷皆自朝布路而罷既而朝則又將使子晳如楚歸而飲酒子晳以駟氏之甲伐而焚之伯有奔雍梁醒而後知之遂奔許鄭伯及其大夫盟于太宫盟國人于師之梁之外伯有聞鄭人之盟己也怒聞子皮之甲不與攻巳也喜曰子皮與我矣晨自墓門之瀆入因焉師頡介于襄庫以伐舊北門張氏曰良霄之出公孫黑蓋有罪焉春秋舍公孫黑專伐之罪而罪良霄何也伯有之所為有喪家亡身之道焉雖微公孫黑其能免於死乎既亡而不自省又入伐君而大亂其國春秋於喪國失家者皆不書所逐之人以眀其身之有罪使有國有家者兢兢自謹而求所以保也知所以反身自修之道則奔亡之禍逺矣胡氏曰不言復入者其位未絶也若宋魚石若晉欒盈去國三年位已絶矣鄭人殺良霄左傳曰駟帶帥國人以伐之伯有死於羊肆胡氏曰良霄自許襲鄭以伐公門弗勝死不言殺其大夫者非其大夫矣討賊之辭也冬十月葬蔡景公呂氏曰許止蔡般皆以子弒父臣弒君罪惡之極而二君皆書葬則是君弒賊未討不書葬者本無是說也晉人齊人宋人衛人鄭人曹人莒人邾人滕人薛人杞人小邾人㑹于澶淵宋災故左傳曰為宋災故諸侯之大夫㑹以謀歸宋財叔孫豹㑹晉趙武齊公孫蠆宋向戌衛北宫他鄭罕虎及小邾之大夫㑹于澶淵既而無歸于宋澄按左傳所載魯晉齊宋衛鄭六國之卿皆出㑹而經皆書人者蓋謀歸宋財由魯請之晉故㑹諸侯既而諸侯各無歸宋財之意故魯叔孫豹不復往而晉齊宋衛鄭五卿亦皆中止但遣微者往至澶淵以與七小國之大夫同㑹故經書十二國之人而魯無人與㑹也張氏曰父子君臣之變自文元年書楚商臣猶外裔之臣也及是年蔡以中國之臣子為之而魯㑹其葬晉合諸侯而所恤者宋之火災而已故於此章三致意焉上書景公之葬下書為宋災而㑹然後舍大圖小輕重失倫之罪見矣此比事屬辭之所以為春秋也盟㑹之書其故者有二稷也澶淵也以稷考之則澶淵之所貶非為宋財之無歸眀矣胡氏曰魯㑹蔡景公之葬是不以世子般為賊也蔡弒君大變也而不討宋有災小事也則合十二國而歸其財可謂知務乎經書月五書日一大衍厯正月壬辰大己亥冬至二月壬戌小三月辛卯大四月辛酉小五月庚寅大甲午五日六月庚申小七月己丑大八月己未小九月戊子大十月戊午小十一月丁亥大十二月丁巳小長厯甲午五月六日三十有一年己未景王三年晉霸平十六蔡靈公般元年曹武十三衛襄二鄭簡二十四陳哀二十七杞文八宋平三十四齊景六秦景三十五楚郟三吳夷昧二春王正月夏六月辛巳公薨于楚宫左傳曰公作楚宫穆叔曰太誓云民之所欲天必從之君欲楚也夫故作其宫若不復適楚必死是宫也杜氏曰適楚好其宫歸而作之不居先君之路寢而安所樂失其所矣秋九月癸巳子野卒左傳曰立胡女敬歸之子子野次于季氏年毁也立敬歸之娣齊歸之子公子稠穆叔不欲曰太子死有母弟則立之無則立長年鈞擇賢義鈞則卜古之道也非適嗣何必娣之子且是人也居喪而不哀在戚而有嘉容是謂不度不度之人鮮不為患若果立之必為季氏憂武子不聽卒立之比及葬三易衰衰衽如故衰於是昭公十九年矣猶有童心是以知其不能終也孫氏曰襄公太子未逾年之君也名未葬也不薨不地降成君也杜氏曰不書葬未成君也已亥仲孫羯卒左傳曰穆叔見孟孝伯語之曰趙孟將死矣其語偷若趙孟死為政者其韓子乎吾子盍與季孫言之可以樹善君子也孝伯曰人生幾何誰能無偷朝不及夕將安用樹穆叔出而告人曰孟孫將死矣吾語諸趙孟之偷也而又甚焉孟孝伯卒冬十月滕子來㑹葬左傳曰滕成公來㑹葬惰而多涕子服惠伯曰滕君將死矣怠於其位而哀已甚兆於死所矣能無從乎襄陵許氏曰先王之制諸侯之喪士弔大夫送葬滕子㑹葬非禮也癸酉葬我君襄公十有一月莒人弒其君密州左傳曰莒犂比公生去疾及展輿既立展輿又廢之犂比公虐國人患之展輿因國人以攻莒子弒之乃立去疾奔齊齊出也展輿吳出也陸氏曰據傳則展輿弒其父不當不書恐傳是展輿因國人之攻莒子弒之乃立誤以之為以字澄曰文十八年庶其之弒澄已疑傳文之字誤而知陸氏之說矣經書月五書日四大衍厯正月丙戌大甲辰冬至二月丙辰大三月丙戌小四月乙卯大五月乙酉小六月甲寅大辛巳二十八日七月甲申小八月癸丑大九月癸未小癸巳十一日己亥十七日十月壬子大癸酉二十二日十一月壬午小十二月辛亥大長厯辛巳六月二十七日癸巳九月十二日己亥十八日癸酉在十月二十三日春秋纂言卷九
