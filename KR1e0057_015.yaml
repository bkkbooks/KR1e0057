body:
  text: 春秋纂言卷八元吳澄撰成公名黑肱宣公之子母穆姜在位十八年夫人齊姜元年辛未定王十七年晉霸景十年蔡景二年曹宣五年衛穆十年鄭襄十五年陳成九年杞桓四十七年宋文二十一年齊頃九年秦桓十五年楚共王審元年春王正月公即位二月辛酉葬我君宣公無氷孫氏曰周之二月夏之十二月無氷冬溫也三月作丘甲左傳曰為齊難故澄按班氏食貨志誤以司馬法采地供王之賦為一成正賦之數馬氏鄭氏周禮注因之至於今諸儒承其誤唯公羊何注論語包注不與班氏同今因近世傅氏所考一正諸儒之誤以合於何包之說一成方十里凡百井四井為邑四邑為丘四丘為甸一甸六十四井也每井八夫則六十四井該五百一十二夫此五卒為一旅之衆於五百夫之中內三百七十五人為兵車五乘甲士十五人步卒三百六十人又一百一十五夫為重車五乘此一甸六十四井之賦餘二丘有四井不賦周井田出軍賦之制如此蓋一成之內唯一甸出甲今魯益兵雖不成甸其甸外之二丘計二百五十六夫亦皆為兵則一成之賦又增兵車二乘重車二乘也而一成共賦兵車七乘重車七乘為兵者共七百人矣夏臧孫許及晉侯盟于赤棘左傳曰聞齊將出楚師杜氏曰與晉盟懼齊楚赤棘晉地胡氏曰初宣公謀以晉人去三桓歸父為是見逐而奔齊矣今季孫當國恨齊人之立宣公納歸父又懼晉侯之或見討也故往結此盟為齊難既作丘甲矣聞將出楚師又逺與晉尋盟豈固本保邦之道乎秋王師敗績于茅戎茅公穀作貿左傳曰晉侯使瑕嘉平戎干王單襄公如晉拜成劉康公徼戎將遂伐之叔服曰背盟而欺大國此必敗不聽遂伐茅戎敗績于徐吾氏劉氏曰茅戎戎之别也胡氏曰桓王伐鄭兵敗身傷而經不書敗存君臣之義也劉康公徼戎伐之敗績于徐吾氏而經不書戰辨內外之分也經雖以尊君父辨內外為義而君父所以尊內外所以别則有道矣桓王不以討賊興師而急於伐鄭康公不以惇信持國而輕於徼戎是失所以君天下禦外侮之道也冬十月經書月四書日一大衍厯正月乙丑大壬辰冬至二月乙未小辛酉二十七日癸亥大寒三月甲子大癸巳雨水閏月甲午小四月癸亥大旦日春分五月癸巳小六月壬戌大七月壬辰大八月壬戌小九月辛卯大十月辛酉小十一月庚寅大十二月庚申小長厯閏同辛酉二月二十九日二年壬申定王十八年晉霸景十一蔡景三曹宣六衛穆十一卒鄭襄十六陳成十杞桓四十八宋文二十二卒齊頃十秦桓十六楚共二春齊侯伐我北鄙左傳曰臧宣叔令修賦繕完具守備曰齊楚結好我新與晉盟晉楚爭盟齊師必至雖晉人伐齊楚必救之是齊楚同我也知難而有備乃可以逞齊侯伐我北鄙圍龍頃公之嬖人盧蒲就魁門焉龍人囚之齊侯曰勿殺吾與而盟無入而封弗聽殺而膞諸城上齊侯親鼓士陵城三日取龍遂南侵及巢丘髙氏曰魯絶齊而與晉盟齊遂即楚而伐我也胡氏曰初魯事齊甚謹雖易世而聘㑹不絶也及與晉侯盟于斷道而怨隙成再盟于赤棘而後伐吾北鄙夏四月丙戌衛孫良夫帥師及齊師戰于新築衛師敗績左傳曰衛侯使孫良夫石稷寧相向禽將侵齊與齊師遇石子欲還孫子曰不可以師伐人遇其師而還將謂君何若知不能則如無出今既遇矣不如戰也戰于新築石成子曰師敗矣子不少須衆懼盡豫喪師徒何以復命曰子國卿也隕子辱矣齊師次于鞠居新築人仲叔于奚救孫桓子桓子是以免杜氏曰新築衛地高氏曰衛將侵齊齊自伐魯還相遇於新築石稷欲避之孫子不可遂與之戰以至於敗六月癸酉季孫行父臧孫許叔孫僑如公孫嬰齊帥師㑹晉卻克衛孫良夫曹公子首及齊侯戰于鞍齊師敗績首公穀作手左傳曰孫桓子還於新築不入遂如晉乞師臧宣叔亦如晉乞師皆主卻獻子晉侯許之七百乘卻子曰此城濮之賦有先君之明與先大夫之肅故捷克於先大夫無能為役請八百乘許之卻克將中軍士燮將上軍欒書將下軍韓厥為司馬以救魯衛臧宣叔逆晉師且道之季文子帥師㑹之師從齊師于莘至于靡笄之下齊侯使請戰曰子以君師辱於敝邑不腆敝賦詰朝請見對曰晉與魯衛兄弟也來告曰大國朝夕釋憾於敝邑之地寡君不忍使羣臣請於大國無令輿師淹於君地能進不能退君無所辱命齊侯曰大夫之許寡人之願也若其不許亦將見也齊高固入晉師桀石以投人禽之而乘其車繫桑本焉以徇齊壘曰欲勇者賈余餘勇師陳于鞍邴夏御齊侯逢丑父為右晉解張御郤克鄭丘緩為右齊侯曰余姑翦滅此而後朝食不介馬而馳之郤克傷於矢流血及屨未絶鼓音曰余病矣張侯曰師之耳目在吾旗鼓進退從之此車一人殿之可以集事若之何其以病敗君之大事也擐甲執兵固即死也病未及死吾子勉之左并轡右援枹而鼓馬逸不能止師從之齊師敗績逐之三周華不注韓厥從齊侯逢丑父與公易位將及華泉驂絓於木而止韓厥執縶馬前奉觴加璧以進曰寡君使羣臣為魯衛請曰無令輿師陷入君地下臣不幸屬當戎行無所逃隱且懼奔避而黍兩君臣辱戎士敢告不敏攝官承乏丑父使公下如華泉取飲鄭周父御佐車宛茷為右載齊侯以免杜氏曰鞍齊地胡氏曰大國三軍次國二軍魯雖大國而四卿共將是四軍也上卿行父與僑如嬰齊各帥一軍㑹戰而臧孫許如晉乞師又逆晉師為之道本不將兵特往來晉魯兩軍之間與謀議爾將稱元帥略其副屬辭之體也而四卿皆書者豈特為詳內録哉趙氏曰首稱公子即三命之卿但以國小不能自崇樹其大夫請命于王者少爾唯此與昭二十年公孫㑹凡二人爾齊氏曰鞍之戰齊有必勝之氣晉有不敵之勢而齊以驕輕取敗晉以必死致勝董氏繁露曰齊頃公桓公之孫霸主之餘業即位九年未嘗一與㑹同之事有怒魯衛之志伐魯入其北郊伐衛敗之新築大國往聘慢而弗敬晉魯俱怒內悉其衆外得衛曹四國相輔大困之於鞍獲齊頃公斫逢丑父大辱身幾亡國為天下笑秋七月齊侯使國佐如師己酉及國佐盟于袁婁袁公作爰左傳曰晉師從齊師入自丘輿擊馬陘齊侯使賔媚人賂以紀甗玉磬與地賔媚人致賂晉人不可曰必以蕭同叔子為質而使齊之封內盡東其畝曰子以君師辱於敝邑畏君之震師徒撓敗吾子惠徼齊國之福不泯其社稷唯是先君之敝器土地不敢愛子又不許請收合餘燼背城借一敝邑之幸亦云從也况其不幸敢不唯命是聽魯衛諫曰齊疾我矣其死亡者皆親昵也子若不許讎我必甚唯子則又何求子得其國寶我亦得地而紓於難其榮多矣齊晉亦唯天所授豈必晉晉人許之對曰羣臣帥賦輿以為魯衛請苟有以藉口而復於寡君君之惠也敢不唯命是聽晉師及齊國佐盟于袁婁公羊傳曰曷為不盟于師卻克眣魯衛之使使為之請然後許之逮于袁婁而與之盟穀梁傳曰鞍去齊三百里袁婁去齊五十里一戰綿地五百里焚雍門之茨侵車東至海君子甚之張氏曰齊國治臨淄去洛陽東千八百里縣西有袁婁高氏曰齊侯至於乞盟辱亦甚矣國佐受成命於君而可否在晉之大夫又非服晉也直畏晉彊賂晉而請盟爾故不曰來盟而曰齊侯使如師師在齊境故書如不與之盟于師進逮袁婁而後盟見四國之師乘勝而逼之胡氏曰荆楚暴橫憑陵諸夏齊桓公仗義致討而楚人帖服其書來盟于師者楚人自服而來盟也盟于召陵者桓公退舍禮與之盟也若夫袁婁則異于是齊未若楚之暴而諸大夫含憤積怒欲雪一笑之恥至於殺人盈野非有擊彊扶弱之心國佐如師特以賂免非服之也澄曰楚服齊桓之義故使屈完來受盟于師其盟已前定也故彼書來盟桓公又退一舍而與之盟于召陵齊有禮矣齊師既敗于鞍使國佐來納賂以求成許不許在晉卻克其盟未前定也故此但書如師晉之義既不足以服齊之心故國佐徑去四國進師追及國佐近逼齊都而後與之盟于袁婁此晉之無義而又無禮也八月壬午宋公鮑卒文公也在位二十二年子固嗣是為共公庚寅衛侯速卒穆公也在位十一年子臧嗣是為定公取汶陽田公羊傳曰鞍之賂也左傳曰使齊人歸我汶陽之田杜氏曰晉使齊還魯故書取不以好得故不言歸孫氏曰汶陽之田魯地也齊人侵之今復取之不言取之齊者明本非齊地杜氏諤曰宣十年濟西田言歸此言取者彼公如齊之後而齊曰歸之故以齊歸起文今因晉衛之力伐而後取之故以魯取為文非齊實欲歸之矣冬楚師鄭師侵衛左傳曰宣公使求好於楚莊王卒宣公薨不克作好公即位受盟于晉㑹晉伐齊衛人不行使于楚而亦受盟于晉從於伐齊故楚令尹子重為陽橋之役以救齊將起師子重曰君弱羣臣不如先大夫師衆而後可乃悉師王卒盡行楚師侵衛遂侵我師于蜀高氏曰楚人以魯衛受盟于晉而伐齊故令尹子重為陽橋之役以救齊而先與鄭加兵于衛夫鄭以中國從蠻荆而首伐衛喪是授戈與冦而攻其親戚也十有一月公㑹楚公子嬰齊于蜀左傳曰楚侵及陽橋孟孫請往賂之以執斫執針織紝皆百人公衡為質以請盟楚人許平澄曰楚用令尹子重之謀以救齊為名而加兵於魯衛先遣禆將帥重師及鄭師侵衛而遂侵魯主兵之嬰齊入魯境而駐師于蜀魯懼遂從孟孫之謀納賂請平楚既許平魯而又約諸國㑹盟公先往㑹嬰齊然後諸國之大夫皆至而盟于蜀也不沒嬰齊之氏名者欲見其挾衆威魯而以臣伉君也杜氏曰蜀魯地泰山博縣西南有蜀亭丙申公及楚人秦人宋人陳人衛人鄭人齊人曹人邾人薛人鄫人盟于蜀左傳曰楚公子嬰齊蔡侯許男秦右大夫說宋華元陳公孫寧衛孫良夫鄭公子去疾及齊國之大夫澄曰楚人先諸國者公子嬰齊為盟主也不書氏名者以有魯君在㑹而同諸國大夫例降稱人也嬰齊於此盟降稱人而前㑹稱氏名者欲見楚人者即公子嬰齊也齊叙鄭下者以其命數卑於鄭大夫也蔡許之君不書者以其為楚之車左車右降在臣列同於楚臣左氏謂之失位是也蘇氏曰楚自城濮之敗不競於晉莊王雖入陳圍鄭及宋而未嘗合諸侯及蜀之盟諸侯從之者十有一國晉不敢爭然其盟十一國也諸侯實畏晉而竊與之盟其後四十二年晉趙武楚屈建合諸侯於宋然後晉楚之從得相交見又八年楚靈王求諸侯於晉晉人許之然後諸侯公然與楚盟爾經書月五書日六大衍厯正月己丑大戊戌冬至二月己未小三月戊子大四月戊午小丙戌二十九日五月丁亥大六月丁巳小癸酉十七日七月丙戌大己酉二十四日八月丙辰小壬午二十七日九月乙酉大庚寅六日十月乙卯大十一月乙酉小丙申十二日十二月甲寅大長厯四月丙戌在五月朔癸酉六月十八日己酉七月二十五日壬午八月二十八日庚寅九月七日丙申十一月十四日三年癸酉定王十九年晉霸景十二蔡景四曹宣七衛定公臧元年鄭襄十七陳成十一杞桓四十九宋共公固元年齊頃十一秦桓十七楚共三春王正月公㑹晉侯宋公衛侯曹伯伐鄭左傳曰諸侯伐鄭次于伯牛討邲之役也遂東侵鄭鄭公子偃帥師禦之使東鄙覆諸鄤敗諸丘輿皇戌如楚獻捷髙氏曰去冬之役鄭為楚導而宋魯曹衛雖盟于蜀猶不敢背晉故罷盟而遂㑹晉伐鄭焉於是鄭公子偃帥師禦之敗晉游兵于丘輿使皇戌如楚獻捷終鄭襄公之身不復從晉矣胡氏曰鄭附蠻荆擾中國則盟主有詞於伐爾宋衛未葬稱爵背殯越境以吉禮從金革之事也辛亥葬衛穆公髙氏曰此見衛侯背殯出師不臨先君之喪二月公至自伐鄭雖未逾時伐鄭無功亦危之而至也甲子新宫災三日哭公羊傳曰新宫者宣公之宫也廟災三日哭禮也穀梁傳曰迫近不敢稱諡恭也孫氏曰哀三年桓宫僖宫災稱諡此不稱諡者親廟也乙亥葬宋文公胡氏曰按左傳文公卒始厚葬益車馬重器備君子謂華元樂舉於是乎不臣考於經未有以驗其厚也數其葬之月則信矣天子七月諸侯五月大夫三月士逾月以降殺遲速為禮之節不可亂也文公之卒國家安靖外無危難曷為越禮逾時逮乎七月而後克襄事哉高氏曰七月而葬天子之禮也以葬月考之知其僣禮夏公如晉左傳曰拜汶陽之田也鄭公子去疾帥師伐許左傳曰許恃楚而不事鄭張氏曰晉方怒鄭之不服其為國憂未有底止也乃怒許之不事已而使大夫動大衆以伐之見其興兵之不度德量力也公至自晉高氏曰公始畢三年之喪不朝天王而朝晉故書至以譏之秋叔孫僑如帥師圍棘公羊傳曰棘者汶陽之不服邑也左傳曰取汶陽之田棘不服故圍之杜氏曰棘汶陽之邑在濟北蛇丘張氏曰今宛州龔丘縣是也趙氏曰凡內自圍者皆叛邑胡氏曰復故地而民不聽至命上將用大師環其邑而攻之蓋魯於是時初稅畝作丘甲稅役日重棘雖歸故國所以不願為之民也與大雩義見前經晉卻克衛孫良夫伐牆咎如牆在良切公作將榖作牆咎古刀切左傳曰討赤狄之餘牆咎如潰高氏曰不係赤狄者非赤狄也杜氏曰晉滅赤狄其餘民散入牆咎如故討之冬十有一月晉侯使荀庚來聘公朝晉故衛侯使孫良夫來聘鞍之役故丙午及荀庚盟丁未及孫良夫盟孫氏曰二子來聘不能以信相親反要公以盟鄭伐許鄭下缺一字胡氏曰晉楚爭鄭鄭兩事焉及邲之戰於是始專於事楚不通中華晉雖加兵終莫之聽利在從晉則從于晉利在從楚則從于楚而不擇義之可否為去就况又憑弱犯寡許亦事楚而鄭反伐之一歲之中而再動干戈於鄰國不亦甚乎經書月三書日五大衍厯正月甲申小癸卯冬至辛亥二十八日二月癸丑大甲子十二日乙亥二十三日三月癸未小四月壬子大五月壬午小六月辛亥大七月辛巳小八月庚戌大九月庚辰小十月己酉大十一月己卯小丙午二十八日丁未二十九日閏月戊申大十二月戊寅大長厯辛亥正月三十日甲子二月十三日乙亥二十四日丙午十一月二十九日四年甲戌定王二十年晉霸景十三蔡景五曹宣八衛定二鄭襄十八卒陳成十二杞桓五十宋共二齊頃十二秦桓十八楚共四春宋公使華元來聘左傳曰通嗣君也澄曰宋共公新即位故晉衛宋三國相繼來聘以三年春同㑹伐鄭交結和好也三月壬申鄭伯堅卒堅公作取襄公也在位十八年子費嗣是為悼公杞伯來朝左傳曰歸叔姬故也杜氏曰將出叔姬先修朝禮言其故夏四月甲寅臧孫許卒此文仲之子宣叔也子紇嗣是為武仲公如晉左傳曰晉侯見公不敬季文子曰晉侯必不免張氏曰晉景公勝齊而驕也高氏曰公連歲如晉者以嘗即楚故也葬鄭襄公秋公至自晉左傳曰公欲求成于楚而叛晉季文子曰不可乃止冬城鄆任公輔曰魯西邑東郡廩丘東有鄆城即西鄆張氏曰後漢志屬廩丘今濟南府鄆城縣杜氏曰公欲叛晉故城而為備鄭伯伐許左傳曰鄭公孫申帥師疆許田許人敗諸展陂鄭伯伐許取鉏任冷敦之田程子曰稱鄭伯見其不復為喪以吉禮從戎也經書月二書日二大衍厯正月丁未大戊申冬至二月丁丑小三月丙午大壬申二十七日四月丙子大五月丙午小經四月甲寅在此月六月乙亥大七月乙巳小八月甲戌大九月甲辰小十月癸酉大十一月癸卯小十二月壬申大長厯是年閏七月三月壬申在二月二十六日甲寅四月九日五年乙亥定王二十二年崩晉霸景十四蔡景六曹宣九衛定三鄭悼公費元年陳成十三杞桓五十一宋共三齊頃十三秦桓十九楚共五春王正月杞叔姬來歸出而來歸也此叔姬蓋僖公之女文公之姊妹宣公之姑成公之祖姑也僖三十二年杞伯姬來求婦而僖公以叔姬歸杞為伯姬之婦桓公之夫人僖三十一年至今四十四年叔姬年蓋六十餘矣被出而歸杞桓公年亦七十餘矣始出其夫人仲孫蔑如宋報華元也夏叔孫僑如㑹晉荀首于穀首公作秀左𫝊曰晉荀首如齊逆女故宣伯餫諸穀梁山崩公羊傳曰河上之山也梁山崩壅河三日不流外異而書者為天下記異也張氏曰梁山見詩韓奕篇同州韓城縣有禹貢梁山胡氏曰梁山屬韓國詩謂之韓奕者言奕然高大為韓國之鎮也後為晉所滅而晉大夫韓氏以為邑高氏曰先王之制名山大川不以封梁山雖屬於韓而非諸侯正受封之地故春秋書梁山崩而不繫之國者為天下記異也是以不書晉夫國主山川豈特晉國當之哉秋大水高氏曰此亦非特魯國之災也皆當時人事之所召冬十有一月己酉天王崩定王也在位二十一年子夷嗣是為簡王不書葬者罪諸侯之不赴也十有二月己丑公㑹晉侯齊侯宋公衛侯鄭伯曹伯邾子把伯同盟于蟲牢左傳曰許靈公訴鄭伯于楚鄭悼公如楚訟不勝楚人執皇戍及子國故鄭伯歸使公子偃請成于晉鄭伯及晉趙同盟于垂棘同盟于蟲牢鄭服也高氏曰鄭數伐許許人訴于楚楚人不直鄭鄭伯遂復棄楚而請盟于晉晉侯於是會諸侯而為此盟也經書月三書日二大衍厯正月壬寅小癸丑冬至二月辛未大三月辛丑小四月庚午大五月庚子小六月己巳大七月己亥大八月己巳小九月戊戌大十月戊辰小十一月丁酉大己酉十三日十二月丁卯小己丑二十三日長厯己酉十一月十四日己丑十二月二十四日六年丙子簡王元年晉霸景十五蔡景七曹宣十衛定四鄭悼二卒陳成十四杞桓五十二宋共四齊頃十四秦桓二十楚共六吳子壽夢乘元年春王正月公至自㑹二月辛巳立武宫左傳曰季文子以鞍之功立武宫非禮也澄曰魯諸侯也周公為太廟居中不毁昭廟二居左穆廟二居右皆親盡則毁成王賜魯於太廟祀周公以天子之禮而伯禽受之賜者受者皆非矣因此之故伯禽既薨魯人以為始封之君欲使其廟雖至親盡亦不毁而同於太廟僣比周文王之廟至成公之世武公之廟毁已久矣又再立武宫僣比周武王之廟高氏曰武公敖在宣王時南征北伐佐王師有功而諡曰武至成公時季孫行父因鞍之戰自多其功崇尚武事一旦特出其意再為立宫同於世室合伯禽為二宗蓋僣用周天子之禮若文武之二宗也故明堂位曰魯公之廟文世室也武公之廟武世室也聖人於此特書立武宫以著季氏僣亂妄作之由張氏曰明堂位之言其為俗儒之論明矣甚哉其亂聖制而誤後學也武公名敖周公九世孫成公之十一世祖也取鄟鄟音專又市臠切杜氏曰附庸國也胡氏曰鄟微國也書取者滅之也滅而書取為君隱也項亦國也其書滅者以僖公在㑹季孫所為故直書其事而不隱孫氏曰宣九年取根牟此年取鄟襄十三年取邿皆微國也衛孫良夫帥師侵宋左傳曰諸侯謀復㑹宋公使向為人辭以子靈之難晉伯宗夏陽說衛孫良夫寧相鄭人伊洛之戎陸渾蠻氏侵宋以其辭㑹也蘇氏曰晉將復㑹諸侯宋人辭以難故使衛與魯更侵之夏六月邾子來朝公孫嬰齊如晉左傳曰命伐宋壬申鄭伯費卒費音祕悼公也在位二年弟睔立是為成公不書葬者當晉楚爭伐之際臣子不得盡禮於大事也秋仲孫蔑叔孫僑如帥師侵宋左傳曰晉命也高氏曰晉復使魯伐宋故二卿同帥師而出也使魯伐宋者雖晉之命而魯不以大義諭之遽為之興師則罪專在魯矣責與衛良夫同故書曰侵楚公子嬰齊帥師伐鄭左傳曰鄭從晉故也許氏翰曰至是書楚卿帥師者霸統幾亡也高氏曰鄭棄楚復從晉受盟于蟲牢故楚乘其喪而伐之冬季孫行父如晉左傳曰晉遷于新田季文子如晉賀遷也晉欒書帥師救鄭救公作侵左傳曰與楚師遇於繞角楚師還高氏曰楚伐鄭喪而悼公不葬晉救雖至已苦兵矣然而不背蟲牢之盟是以善其救也經書月三書日二大衍厯正月丙申大己未冬至二月丙寅小辛巳十六日三月乙未大四月乙丑小五月甲午大六月甲子小壬申九日七月癸巳大辛酉夏至閏月癸亥小八月壬辰大九月壬戌小十月辛卯大十一月辛酉大十二月辛卯小長厯辛巳二月十七日七年丁丑簡王二年晉霸景十六蔡景八曹宣十一衛定五鄭成公睔元年陳成十五杞桓五十三宋共五齊頃十五秦桓二十一楚共七吳壽夢二春王正月鼷鼠食郊牛角改卜牛鼷鼠又食其角乃免牛鼷音兮穀梁傳曰免牲不曰不郊免牛亦然寧氏曰言免牲則不郊顯矣言免牛亦不郊而經不書不郊者蓋為三望起爾杜氏曰稱牛未卜日免放也澄曰書郊牛之變義同宣三年孔氏曰李巡云鼯一名鼯鼠孫炎云有螫毒如鼠狼吳伐郯左傳曰吳伐郯郯成季文子曰中國不振旅蠻夷入伐而莫之或恤無弔者也夫襄陵許氏曰吳自夀夢得申公巫臣而為楚患吳楚相攻不志也伐郯之役名連上國於是始見於春秋志入州來著十五年之所以㑹鍾離杜氏曰吳國吳郡也張氏曰今按吳郡是為平江府郯巳姓國秦有郯郡漢屬東海郡故城今在淮陽軍下郎縣北夏五月曹伯來朝曹宣公也不郊猶三望襄陵許氏曰用是知魯郊或以五月非特定公也高氏曰免牛則不郊矣復書不郊者以吳曹事隔其文故為三望起也夫三望因郊而設不郊則望祭之禮不備矣正祭巳廢而舉其從事此僖公之舉也祭從先祖蓋有惑焉秋楚公子嬰齊帥師伐鄭左傳曰鄭子良相成公如晉見且拜師楚子重伐鄭師于汜高氏曰去冬欒書救鄭而楚師還未得志于鄭故復伐之公㑹晉侯齊侯宋公衛侯曹伯莒子邾子杞伯救鄭左傳曰諸侯救鄭鄭共仲侯羽軍楚師囚鄖公鍾儀獻諸晉胡氏曰楚人軍旅數起頻年伐鄭晉合八國之君親往救鄭則恤鄰患安中國之師也故書救以著其善八月戊辰同盟于馬陵左傳曰尋蟲牢之盟且莒服故也公至自㑹諸侯㑹而楚師退故不以救鄭至吳入州來左傳曰楚申公巫臣與子重子反有怨及共王即位使巫臣聘于齊及鄭而奔晉晉人使為邢大夫子重子反殺巫臣之族而分其室巫臣自晉請使于吳晉侯許之吳子壽夢說之乃通吳于晉以兩之一卒適吳舍偏兩之一焉與其射御教吳乘車教之戰陳教之叛楚置其子狐庸焉使為行人於吳吳始伐楚伐巢伐徐馬陵之㑹吳入州來子重子反於是乎一嵗七奔命蠻夷屬於楚者吳盡取之始大通吳於上國孫氏曰州來微國吳乘楚伐鄭故入州來杜氏曰州來楚邑淮南下蔡縣是也高氏曰吳楚爭彊始見於此州來屬楚吳以兵入之者楚雖恃彊而吳敢與之敵也冬大雩高氏曰冬非旱時曰大雩者志其旱且僣也衛孫林父出奔晉左傳曰衛定公惡孫林父林父奔晉衛侯如晉晉反戚焉杜氏曰林父良夫之子也戚林父邑林父出奔戚隨屬晉高氏曰衛定公惡林父故逐之林父亡七年而恃晉反衛復責用事又十九年遂逐其君卒以邑叛則定公可謂知所惡矣經書月三書日一大衍厯正月庚申大甲子冬至二月庚寅小三月巳未大四月巳丑小五月戊午大六月戊子小七月丁巳大八月丁亥小九月丙辰大經八月戊辰在此月十月丙戌小十一月乙卯大十二月乙酉小長厯是年閏八月戊辰八月十三日八年戊寅簡王三年晉霸景十七蔡景九曹宣十二衛定六鄭成二陳成十六杞桓五十四宋共六齊頃十六秦桓二十二楚共八吳壽夢三春晉侯使韓穿來言汶陽之田歸之于齊左傳曰季文子餞之私焉曰大國制義以為盟主是以諸侯懷德畏討無有二心謂汶陽之田敝邑之舊也而用師于齊使歸敝邑今有二命曰歸諸齊信以行義義以成命小國所望而懷也信不可知義無所立四方諸侯其誰不解體詩曰女也不爽士二其行士也罔極二三其德七年之中一豫一奪二三孰甚焉士之二三猶喪妃偶而况霸主霸主將德是以而二三之其何以長有諸侯乎詩曰猶之未逺是用大簡行父懼晉之不逺猶而失諸侯也是以敢私言之高氏曰齊不㑹晉晉侯患之幸於鞍之戰盟于袁婁又盟于蟲牢又盟于馬陵今俾我歸田焉所以堅齊也夫汶陽田者魯國之舊嘗為齊所取矣鞍之戰齊請盟晉命齊反魯衛侵地故我得復而取之亦可謂義也今齊事晉晉乃使韓穿來命魯歸之則非義矣何則魯國之分地乃先君受之於天子晉不當為齊請於魯齊不當求之於晉韓穿為晉卿不當為齊言於魯魯不當以晉侯之故遂以先君之分地與齊然而曰來言則晉非必令魯歸之也言之而已曰歸之于者彊歸之辭蓋以明晉之失言也夫汶陽魯田自齊歸魯曰歸可也自魯之齊安得謂之歸唯晉不察此故使韓穿來言也季文子之言盡矣晉欒書帥師侵蔡左傳曰晉欒書侵蔡遂侵楚獲申驪是行也鄭伯將㑹晉師門於許東門大獲焉襄陵許氏曰侵蔡報伐鄭也大國爭衡而小國受敗春秋矜焉高氏曰晉得齊之後冀盡得夫諸侯也蔡則畏楚終不與晉自文十五年晉卻缺入蔡之後蔡侯不與中國盟㑹者又幾三十年至是欒書復加兵以侵之又非執辭討罪之舉故書侵公孫嬰齊如莒左傳曰聲伯如莒逆也高氏曰因馬陵之盟始復與莒通嬰齊因聘而自逆婦澄曰魯臣託聘之名而自逆婦者多矣非禮也宋公使華元來聘左傳曰聘共姬也高氏曰凡諸侯相聘必有事焉非專行聘禮也華元之來蓋圖昏爾夏宋公使公孫壽來納幣杜氏曰宋公無主昏者自命之故稱使也趙氏曰禮不當使公孫也若合禮則常事不書杜氏諤曰昏禮納幣使大夫常事不書春秋書之見於經者二文二年公子遂如齊納幣此年公孫壽是也公子公孫同族兄弟而為君納幣非所以遠嫌也故趙氏以不當使言之晉殺其大夫趙同趙括左傳曰晉趙嬰通於趙莊姬原屏放諸齊嬰曰我在故欒氏不作我亡吾二昆其憂哉趙莊姬為趙嬰之亡故譛之于晉侯曰原屏將為亂晉討趙同趙括高氏曰趙朔者晉侯之壻妻曰莊姬其季父嬰通乎莊姬而同括其兄也莊姬譛同括晉侯乃追論趙氏殺君之事而殺之劉氏曰趙同趙括內不正其親外專戮以于其君足以殺其身而巳矣胡氏曰同括無罪為莊姬所譛而欒郤害之也稱國以殺見晉之失政刑矣秋七月天子使召伯來錫公命錫左穀作賜啖氏曰稱天子蓋誤錫命義見前冬十月癸卯杞叔姬卒陸氏曰凡內女為諸侯之夫人則書卒以公為之服也嫁為諸侯夫人而不書卒時魯公非其兄弟及兄弟之子也諸侯無大功以下之服故杞叔姬雖出猶書者為喪歸杞故也高氏曰叔姬為杞所出與杞絶矣不當係之杞今猶稱杞而日其卒者魯人將脅杞而歸之未許其絶也未許其絶故自以為杞夫人之喪而不以吾女卒之晉侯使士燮來聘左傳曰晉士燮來聘言伐郯也以其事吳故公賂之請緩師燮不可曰君命無二失信不立禮無加貨事無二成叔孫僑如會晉士燮齊人邾人伐郯左傳曰季孫使宣伯㑹伐郯高氏曰七年吳伐郯諸侯莫之救者於是與吳成而士燮遂摟諸侯以伐之薛氏曰吳伐郯而不能救服吳則伐之諸侯無所措手足矣衛人來媵杜氏曰古者諸侯取適夫人及左右媵各有姪娣國三人凡九女所以廣繼嗣也魯將嫁伯姬於宋故衛來媵之杜氏諤曰諸侯一娶三國九女今魯將嫁伯姬而晉衛齊三國來媵僣矣不得不詳録之經書月二書日一大衍厯正月甲寅大己巳冬至二月甲申小三月癸丑大四月癸未大五月癸丑小六月壬午大七月壬子小八月辛巳大九月辛亥小十月庚辰大癸卯二十四日十一月庚戌小十二月己卯大長厯癸卯十月二十五日九年己卯簡王四年晉霸景十八蔡景十曹宣十三衛定七鄭成三陳成十七杞桓五十五宋共七齊頃十七卒秦桓二十三楚共九吳壽夢四春王正月杞伯來逆叔姬之喪以歸公羊傳曰脅而歸之也胡氏曰杞伯初來朝魯然後出之卒而復逆其喪以歸者豈非叔姬本不應出故魯人得以義責之使復歸葬乎澄曰僖三十一年杞伯姬來求婦而叔姬歸為杞桓公之夫人至成公四年為夫婦四十四年矣年皆巳老乃出而歸莫考其由或止是以無子而出也胡氏言姬本不應出故魯人得以義責之其說蓋是公㑹晉侯齊侯宋公衛侯鄭伯曹伯莒子杞伯同盟于蒲左傳曰為汶陽之田故諸侯二于晉晉人懼㑹于蒲以尋馬陵之盟季文子謂范文子曰德則不競尋盟何為是行也將始㑹吳吳人不至杜氏曰蒲衛地張氏曰今開封府長垣縣古蒲邑晉因諸侯之二不自反其失信及汶陽之非而復假同盟之禮以威制約束之然自此鄭魯俱有叛晉之心執鄭盟魯紛紛甚矣治人不治反其智同盟豈所以一諸侯哉高氏曰晉不足以宗諸侯既為此盟而諸侯皆二於是鄭叛不服莒潰莫救公至自㑹高氏曰伯姬將以二月歸宋而公以正月出㑹而遽歸者晉以汶陽之田故諸侯皆有二心焉亦足以見蒲盟之不信也二月伯姬歸于宋高氏曰內女歸不書此書者譏宋公之不親逆也昏禮之大者在親迎今伯姬之歸孑然如匹婦之行此豈國君娶夫人之禮哉夏季孫行父如宋致女左傳曰季文子如宋致女復命公享之賦韓奕之五章穆姜出于房再拜曰大夫勤辱不忘先君以及嗣君施及未亡人先君猶有望也敢拜大夫之重勤又賦緣衣之卒章而入何氏曰婦人三月而廟見稱婦擇日而祭於禰成婦之義也父母使人操禮致之孫氏曰致女使卿非禮也張氏曰納幣致女皆過乎厚觀左傳載穆姜之辭則前後越禮皆穆姜之意也澄曰伯姬宣公女也晉人來媵伯姬巳嫁而晉始來媵蓋譏其不及事且為齊媵起也秋七月丙子齊侯無野卒頃公也在位十七年其子環嗣是為靈公晉人執鄭伯左傳曰楚人以重賂求鄭鄭伯㑹楚公子成于鄧鄭伯如晉晉人討其二于楚也執諸銅鞮高氏曰鄭伯雖與楚㑹旋即悔過而躬朝于晉是巳知前日之失而自服其罪矣晉人當捨其前失而待之以禮可也乃因其來朝而執之豈有以禮來朝而反䝉執辱者哉襄陵許氏曰向使晉能制楚使之不能危鄭討鄭可也今楚潰莒入鄆晉不能救而禁鄭之二於楚鄭獨能無懲於牽羊銜璧之禍乎故晉景之執鄭伯愧於漢武之遣樓蘭也晉欒書帥師伐鄭左傳曰欒書伐鄭鄭人使伯蠲行成晉人殺之高氏曰中國失道荆楚抗衡自文宣以來晉楚爭盟而伐鄭鄭從楚則晉師至從晉則楚師至然而自邲之戰鄭之從楚者十年其後晉侯伐鄭更蟲牢馬陵之㑹然後鄭伯受盟及蒲之㑹所以尋前日之盟也而晉人乃執辱鄭伯又使欒書伐之明年又使衛侵鄭又㑹諸侯伐鄭方是時楚適備吳未暇爭鄭故鄭之在晉者亦五年及是一求成于鄭而鄭伯甘心為楚者蓋追念晉之不德弗恤小國之難而輕辱其君故與楚伐許侵宋同撓中國凡二十年間諸侯之師侵伐盟㑹曽無虛嵗鰓鰓然常以失鄭為憂是禍也實晉有以啓之蓋以不信蒲之盟故爾冬十有一月葬齊頃公楚公子嬰齊帥師伐莒庚申莒潰左傳曰晉侯使申公巫臣如吳假道于莒與渠丘公立于池上曰城巳惡莒子曰僻陋在夷其孰以我為虞對曰夫狡焉思啓封疆以利社稷者何國蔑有唯然故多大國矣唯或思或縱也勇夫重閉况國乎楚子重侵陳以救鄭自陳伐莒圍渠丘渠丘城惡衆潰奔莒楚入渠丘莒人囚楚公子平楚人曰勿殺吾歸而俘莒人殺之楚師圍莒莒城亦惡莒潰高氏曰晉人不恤同盟之急是又自背蒲之盟也楚人入鄆杜氏曰楚以偏師入鄆故稱人鄆莒别邑也高氏曰鄆本莒也魯嘗取而城之經不書遂而再舉楚人則知鄆今屬魯邑楚人非有意伐我特以鄆本莒邑莒潰而遂以兵入之直以為一事而已任公輔曰東鄆也秦人白狄伐晉左傳曰諸侯二故也胡氏曰晉嘗與白狄伐秦秦亦與白狄伐晉高氏曰晉為盟主既執鄭伯又不救莒故諸侯擕二而秦人連白狄以伐之見景公不能霸矣鄭人圍許左傳曰示晉不急君也是則公孫申謀之曰我出師以圍許為將改立君者而紓晉使晉必歸君高氏曰鄭以晉人執其君故追咎於許而圍之張氏曰君在外而興師以復怨大臣之罪也城中城杜氏曰中城魯邑在東海廩丘縣西南高氏曰蓋以莒無備而潰楚人入鄆懼而城之也經書月四書日二大衍厯正月己酉小甲戌冬至二月戊寅大三月戊申小四月丁丑大閏月丁未小五月丙子大六月丙午大七月丙子小丙子一日八月乙巳大九月乙亥小十月甲辰大經十一月庚申在此月十一月甲戌小十二月癸卯大長厯是年閏十一月七月乙巳朔無丙子庚申十一月十八日十年庚辰簡王五年晉霸景十九卒蔡景十一曹宣十四衛定八鄭成四陳成十八杞桓五十六宋共八齊靈公環元年秦桓二十四楚共十吳壽夢五春衛侯之弟黑背帥師侵鄭左傳曰晉命也澄曰晉既執鄭伯矣又命欒書伐鄭矣今又使衛侵之伯國之所為如此其何以服鄭之心乎黑背非卿大夫特以為時君之弟故命之帥師高氏曰受大國之命而輕用其師者皆書侵與六年侵宋同黑背者公孫剽之父也衛侯愛其弟授以兵柄終至篡國之禍夏四月五卜郊不從乃不郊二月下旬初卜二月上旬再卜三月中旬三卜不從則當止而不郊矣乃於三月下旬四卜又於四月上旬五卜五卜不從而後不郊瀆神甚矣高氏曰魯不當郊也今之不郊非據禮也五卜不從乃不郊爾師氏曰魯僣天子之事以卜郊其言三卜者一襄之七年是也四卜者二僖二十二年與襄十一年是也五卜者一成之十年是也五月公㑹晉侯齊侯宋公衛侯曹伯伐鄭左傳曰鄭公子班聞叔申之謀子如立公子繻鄭人殺繻立髠頑子如奔許欒武子曰鄭人立君我執一人焉何益不如伐鄭而歸其君以求成焉晉侯有疾立太子州蒲為君㑹諸侯伐鄭鄭子罕賂以襄鐘子然盟于修澤子駟為質鄭伯歸高氏曰鄭巳立君故晉㑹諸侯伐鄭而歸鄭伯因與之成焉晉既敗人之國使其君臣變亂而後伐之而歸其君春秋惡其首亂不以舍服與之也是時晉侯以病以左氏考之厲公實代父出㑹而經不書者諸侯各以兵㑹伐不行相㑹之禮故春秋亦略之而不辨杜氏曰晉侯立子州蒲為君此父不父子不子劉氏曰經但言晉侯也無明其是州蒲若欲貶書其名乃可明爾此晉大事也仲尼豈忘之哉齊人來媵公羊傳曰三國來媵非禮也趙氏曰齊人來媵先書晉衛二國者九女既足而又來媵所以為失禮胡氏曰諸侯有三婦適夫人行則以姪娣從二國來媵亦以姪娣從凡一娶九女所以廣繼嗣三國來媵則是一娶十有二女備書以明逾制也何氏曰唯天子娶十二女高氏曰伯姬嫁已久而猶來媵之諸侯夫人唯有二媵今晉衛己備其數豈可復加乎蓋齊人欲復修魯好以是先之爾丙子晉侯獳卒獳乃侯切景公也在位十九年子州蒲嗣是為厲公秋七月公如晉左傳曰晉人止公使送葬高氏曰公昔不奔天王之喪今乃奔晉侯之喪又為晉人所執使之送葬冬十月公脫冬十月三字左傳曰冬葬晉景公公送葬諸侯莫在魯人辱之故不書胡氏曰假令諸侯皆在魯人不以為辱其可書乎劉氏曰曷為不書葬晉景公天子之喪動天下屬諸侯公之送晉侯非禮也以為唯天子之事可也高氏曰按傳冬當書葬晉景公而不書者以前有公如晉後有公至自晉故難之若一時無事然也經書月四書日一大衍厯正月癸酉小庚辰冬至二月壬寅大三月壬申小四月辛丑大五月辛未小六月庚子大丙午七日經有日無月七月庚午小八月己亥大九月己巳小十月戊戌大十一月戌辰大十二月戊戌小十有一年辛巳簡王六年晉霸厲公州蒲元年蔡景十二曹宣十五衛定九鄭成五陳成十九杞桓五十七宋共九齊靈二秦桓二十五楚共十一吳壽夢六春王三月公至自晉左傳曰晉人以公為二於楚故止公公請受盟而後使歸孫氏曰公留於晉九月晉侯使郤犫來聘犫尺由切公作州按晉景公卒成公旋往奔喪可謂謹於事大矣而晉不禮之止之使送葬已大辱矣送葬畢又不使歸公遂請受盟以明其非二故於三月而後得歸才及國而卻犫已至豈誠心行聘禮也哉直欲迫公使速盟爾己丑及郤犫盟張氏曰成公自汶陽復歸于齊欲二晉而不果然嫌隙竟張無以自明晉因公之朝而止之數月請受盟而後使歸又使郤犫來盟高氏曰公留於晉者九月晉侯不與公盟乃及公於國而使大夫盟之見晉侯無禮於公甚矣夏季孫行父如晉郤犫既歸而行父遄往報聘畏晉故爾左氏以為且涖盟盟與不盟未可知也秋叔孫僑如如齊高氏曰自鞍之役而齊魯絶交至是乃復通蓋謝其來媵因修好焉張氏曰僑如之聘蓋謝戰鞍之私捐歸汶陽之忿而行之迫於晉之辱而不得巳也襄陵許氏曰魯蓋激晉之德禮不施將二于齊而未能者歟冬十月經書月二書日一大衍厯正月丁卯大乙酉冬至二月丁酉小三月丙寅大己丑二十四日四月丙申小五月乙丑大六月乙未小七月甲子大八月甲午小九月癸亥大十月癸巳小十一月壬戌大十二月壬辰小十有二年壬午簡王七年晉霸厲二蔡景十三曹宣十六衛定十鄭成六陳成二十杞桓五十八宋共十齊靈三秦桓二十六楚共十二吳壽夢七春周公出奔晉左傳曰周公楚惡惠襄之逼也且與伯與爭政不勝怒而出及陽樊王使劉子復之盟于鄄而入三日復出奔晉澄曰周公畿內受封之三公今奔就畿外諸侯之國出在王畿千里之外故書出三傳皆謂自周無出蓋見王子瑕王子朝不言出也夫子瑕子朝皆為逆亂無所容其身而奔他國出對入而言瑕朝之奔不可以再入故不書若周公則天子之三公可復入也故言出夏公㑹晉侯衛侯于瑣澤瑣素果切公作沙左傳曰楚子重伐鄭師于汜諸侯救鄭鄭共仲侯羽軍楚師囚鄖公鍾儀獻諸晉晉人以鍾儀歸囚諸軍府晉侯觀于軍府見鍾儀問之曰南冠而縶者誰也有司對曰鄭人所獻楚囚也使稅之召而弔之再拜稽首問其族對曰伶人也公曰能樂乎對曰先父之職官也敢有二事使豫之琴操南音公曰君王何如對曰非小人所得知也固問之對曰其為太子也師保奉之以朝于嬰齊而夕于側也不知其它公語范文子文子曰楚囚君子也君盍歸之使合晉楚之成公從之重為之禮使歸求成楚子使公子辰如晉報鍾儀之使請修好結成晉侯使糴筏如楚報太宰子商之使也宋華元善於令尹子重又善於欒武子聞楚人既許晉糴筏成而使歸復命矣華元如楚遂如晉克合晉楚之成晉士燮㑹楚公子罷許偃盟于宋西門之外曰凡晉楚無相加戎好惡同之同恤災危備救凶患若有害楚則晉伐之在晉楚亦如之交贄往來道路無壅謀其不協而討不庭有渝此盟明神殛之俾隊其師無克胙國鄭伯如晉聽成㑹于瑣澤高氏曰考傳事實與經不合殆其不然夫晉厲之㑹實始乎此略諸國而致魯衛則以見厲公之德不能謹始諸侯多解體矣秋晉人敗狄于交剛左傳曰狄人間宋之盟以侵晉而不設備晉人敗狄于交剛高氏曰此狄蓋白狄也何以知其白狄九年秦人白狄伐晉此先敗狄而後伐秦是知報九年之役也前書白狄者罪欲明也此祗書狄者敗狄而已不必辨其狄之氏族也冬十月經書月一書日無大衍厯正月辛酉大庚寅冬至閏月辛卯小二月庚申大三月庚寅大四月庚申小五月己丑大六月己未小七月戊子大八月戊午小九月丁亥大十月丁巳小十一月丙戌大十二月丙辰小十有三年癸未簡王八年晉霸厲三蔡景十四曹宣十七卒衛定十一鄭成七陳成二十一杞桓五十九宋共十一齊靈四秦桓二十七楚共十三吳壽夢八春晉侯使郤錡來乞師錡魚綺切左傳曰十一年秦晉為成將㑹于令狐晉侯先至焉秦伯不肯涉河使史顆盟晉侯于河東晉郤犫盟秦伯于河西秦伯歸而背晉成晉侯使來乞師張氏曰自齊桓以來召兵侵伐雖不出於王命然救亂討罪為中國舉猶足以令諸侯也今晉以私怨報秦則其義不足以令諸侯矣故懼其不從而卑辭以乞之聖人直書以見其舉事不公自貶霸體也三月公如京師春秋二百四十二年之間魯君未嘗一朝京師因㑹晉伐秦道過京師則不得不朝王也劉氏曰何以書譏何譏爾公非如京師也為伐秦故如京師也夏五月公自京師遂㑹晉侯齊侯宋公衛侯鄭伯曹伯邾人滕人伐秦左傳曰公及諸侯朝王遂從劉康公成肅公㑹晉侯伐秦秦桓公既與晉厲公為令狐之盟而又召狄與楚欲道以伐晉諸侯是以睦於晉晉欒書將中軍士燮將上軍韓厥將下軍趙旃將新軍郤毅御戎欒針為右晉師以諸侯之師戰于麻隧秦師敗績澄按公之此行本為㑹晉伐秦爾必先書如京師而此書自京師遂㑹伐者所以見遂事之為正事而如京師者非誠也曹伯廬卒于師廬公穀作盧左傳曰曹宣公卒于師曹人使公子負芻守使公子欣時逆曹伯之喪負芻殺其太子而自立也諸侯乃請討之晉人以其役之勞請俟他年澄曰廬宣公也在位十七年弟負芻篡立是為成公秋七月公至自伐秦孫氏曰不以京師至者明本非朝京師張氏曰以伐秦至者明諸侯以伐秦為重也冬葬曹宣公左傳曰宣公既葬子臧將亡國人皆將從之成公乃懼告罪且請焉乃反而致其邑經書月三書日無大衍厯正月乙酉大乙未冬至二月乙卯小三月甲申大四月甲寅大五月甲申小六月癸丑大七月癸未小八月壬子大九月壬午小十月辛亥大十一月辛巳小十二月庚戌大十有四年甲申簡王九年晉霸厲四蔡景十五曹成公負芻元年衛定十二卒鄭成八陳成二十二杞桓六十宋共十二齊靈五秦桓二十八楚共十四吳壽夢九春王正月莒子朱卒杜氏曰季他也何氏曰莒大於邾至此始卒徐氏曰葬稱諡莒棄周禮君終無諡故不書葬夏衛孫林父自晉歸于衛左傳曰衛侯如晉晉侯彊見孫林父焉定公不可衛侯既歸晉侯使郤犫送孫林父而見之衛侯欲辭定姜曰不可是先君宗卿之嗣也大國又以為請不許將亡雖惡之不猶愈於亡乎君其忍之安民而宥宗卿不亦可乎衛侯見而復之孫氏曰林父七年奔晉其言自晉歸于衛者由晉侯而得歸也衛大夫由晉侯而得歸衛國之事可知矣襄陵許氏曰人臣不唯義之即安而介恃大國使之反己此能為逐君之惡者也唯其辨之不早是以衛獻至於出奔禍兆此矣歸易詞也自晉奉之故也秋叔孫僑如如齊逆女為成公逆夫人也高氏曰公即位十有四年矣國家無事迄今始娶又親逆而使同姓之卿逆之援公子遂之例也故書以為戒此春秋防微杜漸之意鄭公子喜帥師伐許左傳曰鄭子罕伐許敗焉鄭伯復伐許入其郛許人平以叔申之封襄陵許氏曰鄭逼許楚困鄭以國大小兵力彊弱更相吞噬內外同貫而人理盡矣高氏曰此著許之所以遷亦見晉厲之不霸矣夫許鄭之怨久矣三年再伐四年伐九年圍之而今又伐焉使厲公而霸則鄭人者怒鄰兼弱且如是乎明年遷于葉辟鄭以依楚明晉不足恃也而襄三年晉荀罃帥師伐許者猶討與楚也夫九月僑如以夫人婦姜氏至自齊張氏曰僑如不氏一事再見也稱婦宣公夫人穆姜尚存故也澄按趙氏以此氏字為傳寫誤增冬十月庚寅衛侯臧卒左傳曰衛侯有疾立敬姒之子衎為太子定公卒夫人姜氏既哭而息見太子之不哀不內酌飲曰是夫也將不唯衛國之敗其必始於未亡人嗚呼天禍衛國也夫吾不獲鱄也使主社稷大夫聞之無不聳懼孫文子自是不敢舍其重器於衛盡置諸戚而甚善晉大夫澄曰臧定公也在位十二年子衎嗣是為獻公秦伯卒桓公也在位二十七年子景公卒史皆失其名經書月三書日一大衍厯正月庚辰小辛丑冬至二月己酉大三月己卯小四月戊申大五月戊寅小六月丁未大七月丁丑小八月丙午大九月丙子小十月乙巳大閏月乙亥大經十月庚寅在此月十一月乙巳小十二月甲戌大長厯是年閏七月庚寅十月十六日十有五年乙酉簡王十年晉霸厲五蔡景十六曹成二衛獻公衎元年鄭成九陳成二十三杞桓六十一宋共十三卒齊靈六秦景公后元年楚共十五吳壽夢十春王二月葬衛定公三月乙巳仲嬰齊卒公羊傳曰此公孫嬰齊也謂之仲嬰齊為兄後也杜氏曰襄仲子公孫歸父弟也宣十八年逐東門氏既而又使嬰齊紹仲後曰仲氏高氏曰歸父既奔齊魯人徐傷其無後使嬰齊紹之為卿故前不經見而特卒之者譏世卿且著其亂昭穆之序失父子之親以後歸父則弟不可為兄嗣以後襄仲則子不可以父之字為氏也啖氏曰二傳不知有叔盻子公孫嬰齊此稱仲以别之之義故妄說爾癸丑公㑹晉侯衛侯鄭伯曹伯宋世子成齊國佐邾人同盟于戚左傳曰討曹成公也晉侯執曹伯歸之于京師左穀無之字公羊傳曰伯討也蘇氏曰稱侯以執執有罪也歸于京師禮也春秋執諸侯多矣唯是為得禮張氏曰厲公此舉善矣而春秋猶不以伯討掩其與盟之罪蓋以為先執曹伯以令諸侯而盟之然後盡善也觀曹人請君于晉曰若有罪則君列諸㑹矣由一舉措之失遂開釋姦之門豈小失哉澄按僖二十八年執衛侯歸不有之字蓋二傳脫字爾當從公羊夏六月宋公固卒共公也在位十三年子成嗣是為平公楚子伐鄭左傳曰楚將北師子囊曰新與晉盟而背之無乃不可乎子反曰敵利則進何盟之有申叔時聞之曰子反必不免信以守禮禮以庇身信禮之亡欲免得乎楚子侵鄭及暴隧遂侵衛及首止鄭子罕侵楚取新石欒武子欲報楚韓獻子曰無庸使重其罪民將叛之無民孰戰秋八月庚辰葬宋共公共音恭葬三月而宋華元出奔晉左傳曰宋華元為右師魚石為左師蕩澤為司馬華喜為司徒公孫師為司城向為人為大司寇鱗朱為少司冦向帶為太宰魚府為少宰蕩澤弱公室殺公子肥華元曰我為右師君臣之訓師所司也今公室卑而不能正吾罪大矣不能治官敢賴寵乎乃出奔晉宋華元自晉歸于宋左傳曰二華戴族也司城莊族也六官者皆桓族也魚石將止華元魚府曰右師反必討是無桓氏也魚石曰右師苟獲反雖許之討必不敢且多大功國人與之不反懼桓氏之無祀於宋也右師討猶有戍在桓氏雖亡必偏魚石自止華元于河上請討許之乃反陸氏曰經云自晉歸而傳云魚石自止華元于河上殊相違矣張氏曰襄三十年良霄之奔其奔而歸也逆順與華元不同而書法亦異良霄之入不再序而曰入逆也華元再序又書曰歸則或出或處之正從可知矣高氏曰再書華元者善華元也與鄭良霄異矣蓋華元之志非奔也欲挾晉自重以攻蕩氏之黨爾然迹其所為又與衛孫林父亦何以異故其所書之辭亦同宋殺其大夫山左傳曰使華喜公孫師帥國人攻蕩氏殺子山高氏曰先書華元自晉歸于宋而繼書此則知其為華元所殺矣蘇氏曰元將討山而知力之不能故奔奔而國人許之討故歸而討山也雖其族人莫敢救之者使元懷祿顧寵重於出奔則不能討山矣鄭子産為政豐卷將祭請田弗許卷退而徵役子産奔晉子皮止之歸而逐卷亦猶是也宋魚石出奔楚左傳曰魚石向為人鱗朱向帶魚府出舍于睢上華元使止之不可華元自止之不可乃反魚府曰今不從不得入矣右師視速而言疾有異志焉若不我納今將馳矣登丘而望之則馳騁而從之則決睢澨閉門登陴矣左師二司冦二宰遂出奔楚華元使向戌為左師老佐為司馬樂裔為司冦以靖國人杜氏曰五大夫畏同族罪及故出奔高氏曰五大夫皆出奔獨魚石書者五大夫皆蕩族華元已誅其罪首餘奔者皆不足書唯魚石奔逃于荆楚遂為中國之害故為十八年復入彭城書也春秋有事在後而先書其始者此其例也趙氏曰按傳魚石自請討蕩澤則是處無過之地矣既討之後何事魚石又奔假如魚石為與蕩氏同族慙而自去則是知恥之人後不應却入彭城為亂考之魚石直與蕩澤同惡爾國亂用兵相攻則仇敵也如何自止之乎冬十有一月叔孫僑如㑹晉士燮齊高無咎宋華元衛孫林父鄭公子鰌邾人㑹吳于鍾離左傳曰始通吳也公羊傳曰曷為殊㑹外吳也穀梁傳曰㑹又㑹外之也程子曰吳益彊大求㑹于諸侯諸侯往從之故書諸國往與之㑹見吳日盛而中國衰也時中國病楚故與吳親襄十年柤之㑹十四年向之㑹與此同啖氏曰既㑹士燮同往㑹吳孫氏曰諸侯大夫不敢致吳子也吳子在鍾離故相與㑹吳子于鍾離爾杜氏曰鍾離楚邑淮南縣張氏曰今濠州城下縣故鍾離國嬴姓後為楚邊邑胡氏曰殊㑹有二義㑹王世子于首止意在尊王室㑹吳于鍾離于柤于向意在惡僭亂夫以泰伯至德周之伯父也至其後世僭竊稱王不能居中國之爵號成襄之間中國無霸齊晉大國亦皆俯首東向而親吳聖人蓋傷之許遷于葉葉舒涉切左傳曰許靈公畏逼于鄭請遷于楚楚公子申遷許于葉張氏曰葉今汝州葉縣也髙氏曰許微弱之國鄰于鄭鄭亟加兵三年棄疾伐許四年鄭伯伐許九年鄭人圍許十四年公子喜時伐許今遂遷焉蓋畏鄭而南依楚故以自遷為文胡氏曰遷之者雖楚人而欲遷者許意也經書月五書日三大衍厯正月甲辰小丙午冬至二月癸酉大三月癸卯小乙巳三日癸丑十一日四月壬申大五月壬寅小六月辛未大七月辛丑小八月庚午大庚辰十一日九月庚子小十月己巳大十一月己亥小十二月戊辰大長厯己巳三月四日癸丑十二日十有六年丙戌簡王十一年晉霸厲六蔡景十七曹成三衛獻二鄭成十陳成二十四杞桓六十二宋平公成元年齊靈七秦景二楚共十六吳壽夢十一春王正月雨木氷雨如字公羊穀梁傳曰雨而木氷也髙氏曰雨著木而成氷上溫而下寒也與隕霜不殺菽相反劉向謂木者少陽貴臣卿大夫之象是年叔孫僑如出奔公子偃誅死後世雨木氷多應在大臣天人之應或可推也漢儒之學豈無所受但不當每事求合爾夏四月辛未滕子卒文公也高氏曰滕入春秋至今三書其卒皆不名至是日之矣鄭公子喜帥師侵宋左傳曰楚子自武城使公子成以汝隂之田求成於鄭鄭叛晉子駟從楚子盟于武城鄭子罕伐宋宋將鉏樂懼敗諸汋陂退舍于夫渠不警鄭人覆之敗諸汋陵獲將鉏樂懼高氏曰鄭服中國五年矣至是始叛晉附楚為楚加兵于吾中國自是與楚同害中國諸侯之兵無寧嵗矣六月丙寅朔日有食之晉侯使欒黶來乞師黶於斬切左傳曰晉侯將伐鄭卻犫如衛遂如齊皆乞師焉欒黶來乞師孟獻子曰有勝矣高氏曰晉失霸主之義不足以令諸侯恐諸侯厭惡伐鄭之役特使卿來乞師實欲公親行爾程子曰時穆姜叔孫僑如將作難故出師後期甲午晦晉侯及楚子鄭伯戰于鄢陵楚子鄭師敗績鄢謁逺切左傳曰鄭人聞有晉師使告于楚楚子救鄭司馬將中軍令尹將左右尹子辛將右晉師濟河聞楚師將至范文子欲反曰我僞逃楚可以紓憂夫合諸侯非吾所能也以遺能者我若羣臣輯睦以事君多矣武子曰不可晉楚遇于鄢陵范文子不欲戰卻至曰韓之戰惠公不振旅箕之役先軫不反命邲之師荀伯不復從皆晉之恥也今我辟楚又益恥也文子曰吾先君之亟戰也有故秦狄齊楚皆强不盡力子孫將弱今三强服矣敵楚而已唯聖人能內外無患自非聖人外寧必有內憂盍釋楚以為外懼乎楚晨壓晉軍而陳欒書曰楚師輕窕固壘而待之三日必退退而擊之必獲勝焉郤至曰楚有六間不可失也其二卿相惡王卒以舊鄭陳而不整蠻軍而不陳陳不違晦在陳而囂我必克之苗賁皇言於晉侯曰楚之良在其中軍王族而已請分良以擊其左右而三軍萃於王卒必大敗之步毅御晉厲公欒針為右彭名御楚共王潘黨為右石首御鄭成公唐苟為右及戰吕錡射共王中目王召養由基與之兩矢使射吕錡中項伏韜以一矢復命郤至三遇楚子之卒見楚子必下免胄而趨風楚子使工尹襄問之以弓郤至見客免胄承命唐苟謂石首曰子在君側敗者一大我不如子子以君免我請止乃死楚師薄於險養由基射再發盡殪叔山冉搏人以投中車折軾晉師乃止囚楚公子茷旦而戰見星未已子反命軍吏察夷傷補卒乘繕甲兵展車馬雞鳴而食唯命是聽晉人患之苗賁皇徇曰搜乘補卒秣馬厲兵修陳固列蓐食申禱明日復戰乃逸楚囚王聞之召子反謀子反醉而不能見王曰天敗楚也夫余不可以待乃宵遁晉入楚軍三日榖范文子立於戎馬之前曰君幼諸臣不佞何以及此君其戒之書曰惟命不于常有德之謂胡氏曰是時兩軍相見未有勝負晉之捷也亦幸焉爾楚雖敗而勢益張晉遂怠而國大亂高氏曰晉將伐鄭鄭告於楚楚子遽引師而來於是晉不暇俟諸侯之兵先與之合戰而大敗之我既未致伐于彼彼志非來伐于我故直言戰而已杜氏曰楚師未大奔楚子傷目而退故曰楚子敗績鄢陵鄭地張子曰後漢郡國志潁川鄢陵晉敗楚之地今東京開封府鄢陵縣楚殺其大夫公子側左傳曰楚師還及瑕王使謂子反曰先大夫之覆師徒者君不在子無以為過不穀之罪也子反再拜稽首曰君賜臣死死且不朽臣之卒實奔臣之罪也子重使謂子反曰初隕師徒者而亦聞之矣盍圖之對曰雖微先大夫有之大夫命側側敢不義側亡君師敢忘其死王使止之弗及而卒高氏曰凡楚師之敗必行兵法於主將而死之春秋之世楚實强於天下其所以能强者兵强也兵所以能强者將帥之力也將帥之所以力者賞罰行也二百四十二年之間敗績者凡十有六而楚居三焉城濮之敗殺得臣鄢陵之敗殺公子側柏舉之敗囊瓦逃刑而奔鄭至於中國之敗績凡十有三不聞加兵法於一主將者國勢寖弱遂成姑息漢魏而下率皆踵之端可為鑑秋公㑹晉侯齊侯衛侯宋華元邾人于沙隨不見公左傳曰戰之日齊國佐高無咎至于師衛侯出于衛公出于壞隤宣伯通于穆姜欲去季孟而取其室將行穆姜送公而使逐二子公以晉難告曰請反而聽命姜怒公子偃公子鉏趨過指之曰女不可是皆君也公待于壞隤申宫警備設守而後行是以後使孟獻子守于公宫㑹于沙隨謀伐鄭也宣伯使告郤犫曰魯侯待于壞隤以待勝者郤犫將新軍且為公族大夫以主東諸侯取貨于宣伯而訴公於晉侯晉侯不見公杜氏曰沙隨宋地梁國寧陵縣北有沙隨亭程子曰晉侯聽譛怒公後期故不見公魯之後期國難故也晉曲我直不足為恥高氏曰此諸侯之兵始至而㑹焉喜敗楚也鄢陵之戰諸侯之師皆未至非特魯而已晉乃聽僑如之譛獨不見公夫聖人於魯事凡有可恥者必微其辭而不敢斥若我無失道為橫逆所加則直書其事昭十年公不與盟義亦同此公至自㑹石氏曰公之此行內有僑如之患而外不為諸侯所禮故危而致之公㑹尹子晉侯齊國佐邾人伐鄭左傳曰公㑹尹武公及諸侯伐鄭將行姜又命公如初公又申守而行諸侯之師次于鄭西我師次于督揚不敢過鄭子叔聲伯使叔孫豹請逆于晉師為食于鄭郊師逆以至聲伯四日不食以待之食狡者而後食諸侯遷于制田知武子佐下軍以諸侯之師侵陳至于嗚鹿遂侵蔡未反諸侯遷于潁上鄭子罕宵軍之宋齊衛皆失軍高氏曰楚師既敗而鄭猶不服見晉政之斁于人矣晉為曹伯請于天子因假王命以再伐鄭故以尹子主㑹也宋衛以後至不書是役也晉尚以僑如之譛不使公與其事曹伯歸自京師左傳曰曹人請于晉曰我先君宣公即世國人曰若之何憂猶未弭而又討我寡君以亡曹國社稷之鎮公子是大泯曹也先君無乃有罪乎若有罪則君列諸㑹矣君唯不遺德刑以伯諸侯豈獨遺諸敝邑敢私布之復請于晉晉侯謂子臧反吾歸而君子臧反曹伯歸程子曰曹伯不名不稱復歸王未嘗絶其位也自京師王命也陸氏曰曹伯之篡罪莫大焉晉侯討而執之其事當矣王不能定其罪名失政刑也書曰歸自京師而不名曹伯以深譏王也高氏曰諸侯在它國則是失地之君故反國則名之今曹伯在京師而王不黜之是不失國故不名也嗚呼篡逆之人殺君之子而自立既列於諸侯之會又赦於天子之庭是率天下而入于亂也九月晉人執季孫行父舍之于苕丘苕音條公作招左傳曰宣伯使告郤犫曰魯之有季孟猶晉之有欒范也政令於是乎成今其謀曰晉政多門不可從也寧事齊楚有亡而已蔑從晉矣若欲得志于魯請止行父而殺之我斃蔑也而事晉蔑有二矣魯不二小國必睦不然歸必叛矣晉人執季文子于苕丘冬十月乙亥叔孫僑如出奔齊左傳曰公還待于鄆使子叔聲伯請季孫于晉郤犫曰苟去仲孫蔑而止季孫行父吾與子國親于公室對曰僑如之情子必聞之矣若去蔑與行父是大棄魯國而罪寡君也若猶不棄而惠徼周公之福使寡君得事晉君則夫二人者魯國社稷之臣也若朝亡之魯必夕亡以魯之密邇仇讎亡而為讎治之何及郤犫曰吾為子請邑對曰嬰齊魯之常𨽻也敢介大國以求厚焉承寡君之命以請若得所請吾子之賜多矣又何求范文子謂欒武子曰季孫於魯相二君矣妾不衣帛馬不食粟可不謂忠乎信讒慝而棄忠良若諸侯何子叔嬰齊奉君命無私謀國家不二圖其身不忘其君若虛其請是棄善人也子其圖之乃許魯平赦季孫高氏曰季孫得釋將與公偕歸僑如聞之遂出奔齊魯人立其弟豹以為叔孫後是為穆叔十有二月乙丑季孫行父及郤犫盟于扈高氏曰晉釋行父行父自苕丘與郤犫為此盟也公至自㑹高氏曰大夫執則至行父不至者公待行父偕歸焉舉公為重也然公未嘗為㑹而曰至自㑹者有託焉爾夫沙隨之㑹既不見公伐鄭之㑹又不得與而國之宗卿於是見執公倣徨于外以求自明于晉僅能使僑如見逐季孫受盟而公免于難焉方秋而出盡冬而歸始以伐鄭出㑹而不得與乎其事君辱臣執亦國之深恥也及公之歸不可以伐鄭至故託曰至自㑹以見公之不與於伐鄭也乙酉刺公子偃陸氏曰直書刺者有罪也晉伐衛買不卒戍明不勝而還非其罪也高氏曰公之將行穆姜指偃與鉏曰皆可為君鉏尚幼則姜之意在偃也公以是歸而刺之然僖二十八年公子買戍衛不卒戍刺之明言其罪也此直云刺公子偃則若無罪焉何哉曰言其罪者著其事實以明非其罪也不言其罪者刺得其罪也澄曰昔象與父母同謀殺舜焚廩掩井必欲置舜于死地象謂舜已死而入其宫見舜猶生則僞為鬱陶思君之言以欺其兄舜乃誠信而喜之使之分治臣庶及為天子則封之為有庳之君舜豈不知象之謀殺己哉故孟子以為仁人之於弟也不藏怒焉不宿怨焉親之愛之而貴之富之此舜所以盡為兄之道而為人倫之至也偃雖為穆姜所指然不過脅公使從己爾未見姜真有廢立之謀而偃實有今將之心也今僑如既逐成公當修身齊家以感化其母威權在己則偃雖真有邪謀亦焉所施乃不能制其母而怒其弟竟殺之其視舜之所以處象者為何如也公子者非親也屬也言先公之子也而可殺乎陸高等所見知有世俗利害之私而已不知有人倫天理之正者也經書月六書日六大衍厯正月戊戌大辛亥冬至二月丁卯大三月丁酉大四月丁卯小辛未五日五月丙申大六月丙寅小朔日食甲午晦七月乙未大八月乙丑小九月甲午大十月甲子小乙亥十二日十一月癸巳大十二月癸亥小乙丑三日乙酉二十三日長厯辛未四月六日十有七年丁亥簡王十二年晉霸厲七蔡景十八曹成四衛獻三鄭成十一陳成二十五把桓六十三宋平二齊靈八秦景三楚共十七吳壽夢十二春衛北宫括帥師侵鄭括公作結左傳曰鄭子駟侵晉虛滑衛北宫括救晉侵鄭至于高氏高氏曰晉命也凡為他人興師者皆書侵以譏之據左氏鄭侵晉衛救晉侵鄭夫鄭雖背晉猶畏晉之彊豈敢興師自與晉抗乎此必不然雖楚來入中國亦不過侵伐宋衛而已觀經之所書事實可見夏公㑹尹子單子晉侯齊侯宋公衛侯曹伯邾人伐鄭左傳曰鄭太子髠頑侯獳為質于楚楚公子成公子寅戍鄭公㑹尹武公單襄公及諸侯伐鄭自戲童至于曲洧杜氏曰晉未能服鄭故假天子威周使二卿㑹之高氏曰晉假王命討鄭重以王之兩大夫晉主兵先尹單重王命夫晉厲之失道也而能數合諸侯力捍彊楚者由假王靈扶義以合天下也伐秦之役劉康公成肅公在焉而不書者以受命京師為重矣六月乙酉同盟于柯陵左傳曰尋戚之盟也杜氏曰柯陵鄭西地陸氏曰不重言諸侯譏尹子單子與盟蘇氏曰齊晉之盛天子之大夫㑹而不盟尊周也柯陵之㑹尹單始與諸侯之盟自是習以為常非禮也秋公至自㑹左傳曰楚子重救鄭師于首止諸侯還澄按諸侯之師至曲洧遄為柯陵之盟方欲聲鄭之罪以致伐而楚救己至諸侯畏楚之彊而還未嘗得致伐也故公不以伐鄭至而以㑹至齊高無咎出奔莒左傳曰齊慶克通于聲孟子與婦人蒙衣乘輦而入于閎鮑牽見之以告國武子武子召慶克而謂之慶克久不出而告夫人曰國子謫我夫人怒國子相靈公以㑹高鮑處守及還將至閉門而索客孟子訴之曰高鮑將不納君而立公子角國子知之刖鮑牽而逐高無咎無咎奔莒高弱以盧叛襄陵許氏曰靈公不公其聽自沈帷牆奔其世官以長禍亂悲夫九月辛丑用郊九月夏之七月非郊之時故特書用孫氏曰九月用郊瀆亂尤甚晉侯使荀罃來乞師余氏曰晉侯再伐鄭恐公不出師故遣荀罃來乞之師氏曰請王命以討有罪宜糾合諸侯以遵王命奉辭以往無敢或後可也乃使大夫乞師於魯邪以盟主而乞師已為卑辱况以王之卿士主兵乃言乞師其卑王室以誤寵諸侯也甚矣夫欲仗天子之威以討叛伐二而乃先為此卑辱欲望鄭畏威得乎哉冬公㑹單子晉侯宋公衛侯曹伯齊人邾人伐鄭杜氏曰前夏未得志故孫氏曰鄭與楚比周晉侯再假王命三合諸侯伐之不能服中國不振可知也十有一月公至自伐鄭左傳曰諸侯圍鄭楚公子申救鄭師于汝上諸侯還杜氏曰不書圍畏楚救不成圍而還壬申公孫嬰齊卒于貍脤貍力之切脤市軫切公作軫穀作蜃左傳曰聲伯還自鄭至貍脤而卒澄按此叔肹之子聲伯也子叔老嗣是為聲子陸氏曰大夫卒於它國即書國卒於魯地即書地仲遂公孫嬰齊是也十有二月丁巳朔日有食之邾子貜且卒貜但縳切且子餘切在位四十年子宣公牼嗣晉殺其大夫郤錡郤犫郤至犫公作州左傳曰晉厲公侈多外嬖反自鄢陵欲盡去羣大夫而立其左右胥童以胥克之廢也怨郤氏而嬖於厲公郤錡奪夷陽五田郤犫與長魚矯爭田執而梏之五與矯亦嬖於厲公欒書怨郤至以其不從己而敗楚師也欲廢之使楚公子茷告公曰此戰也郤至實召寡君以東師之未至也與軍帥之不具也曰此必敗吾因奉孫周以事君公告欒書書曰其有焉不然豈其死之不恤而受敵使乎君盍嘗使諸周而察之郤至聘于周欒書使孫周見之公使覘之信遂怨郤至厲公田與婦人先殺而飲酒後使大夫殺郤至奉豕寺人孟張奪之郤至射而殺之公曰季子欺余厲公將作難胥童曰必先三郤族大多怨去大族不逼敵多怨有庸公曰然郤氏聞之郤錡欲攻公曰雖死君必危郤至曰人所以立信知勇也信不叛君知不害民勇不作亂失兹三者其誰與我死而多怨將安用之君實有臣而殺之其謂君何我之有罪吾死後矣若殺不辜將失其民欲安得乎待命而已受君之祿是以聚黨有黨而爭命罪孰大焉胥童夷陽五帥甲八百將攻郤氏長魚矯請無用衆公使清沸魋助之抽戈結衽而僞訟者三郤將謀於榭矯以戈殺駒伯苦成叔於其位溫季曰逃威也遂趨矯及諸其車以戈殺之皆尸諸朝張氏曰郤氏雖多怨既為大夫則君之股肱也厲公不正其有罪無罪而用嬖幸胥童長魚矯之計一朝殺三卿又劫欒書中行偃能無及乎楚人滅舒庸左傳曰舒庸人以楚師之敗也道吳人伐巢伐駕圍釐虺遂恃吳而不設備楚公子槖師襲舒庸滅之任公輔曰舒庸東夷偃姓之國張氏曰地譜廬州城下舒城高氏曰楚既摧敗而其餘烈猶足以滅國於要荒使其得志於鄢陵則毒被華夏豈勝道哉宣十二年楚入陳圍鄭之後書晉師敗績楚子滅蕭是也此書滅舒庸著中國能折其鋒使不得為我患者晉厲之成勞也蓋晉厲公有宏才而無令德是以威震於外而亂生於內身雖不終功亦足録經書月四書日四大衍厯正月壬辰大丙辰冬至二月壬戌小三月辛卯大四月辛酉小五月庚寅大六月庚申大乙酉二十六日閏月庚寅小七月己未大八月己丑小經九月辛丑在此月九月戊午大十月戊子小十一月丁巳大壬申十六日經書十二月丁巳朔日食在此月朔置閏不同故日食朔不差而月差也十二月丁亥小長厯是年閏十二月辛丑九月十四日壬申在十月五日十有八年戊子簡王十三年晉霸厲八弒蔡景十九曹成五衛獻四鄭成十二陳成二十六杞桓六十四宋平三齊靈九秦景四楚共十八吳壽夢十三春王正月晉殺其大夫胥童左傳曰胥童以甲劫欒書中行偃於朝矯曰不殺二子憂必及君公曰一朝而尸三卿余不忍益也對曰人將忍君臣聞亂在外為姦在內為軌御姦以德御軌以刑不施而殺不可謂德臣逼而不討不可謂刑德刑不立姦軌並至臣請行遂出奔狄公使辭於二子曰寡人有討於郤氏郤氏既伏其辜矣大夫無辱其復職位皆再拜稽首曰君討有罪而免臣於死君之惠也二臣雖死敢忘君德乃皆歸公使胥童為卿公遊於匠麗氏欒書中行偃遂執公焉欒書中行偃遂殺胥童高氏曰胥童者胥甲之孫胥克之子謀殺三郤而晉國遂亂於是欒書中行偃先殺胥童襄陵許氏曰殺胥童者欒書中行偃也而稱國者二人執君而當國也澄曰左傳所載殺胥童者偃也而書國殺蓋二子當國而以國法殺之庚申晉弒其君州蒲左傳曰欒書中行偃使程滑弒厲公葬之於翼東門之外以車一乘胡氏曰弒君天下之大罪討賊天下之大刑春秋合於人心而定罪聖人順於天理而用刑固不以大霈釋當討之賊亦不以大刑加不弒之人然趙盾書弒許世子書弒楚公子比書弒齊陳乞書弒欒書身為元帥親執厲公於匠麗氏使程滑弒公而春秋書國以弒不書欒書之名氏何哉仲尼無私與天為一奚獨嚴於趙盾許世子輩而於欒武子闊略如此乎學者深求聖人誅亂臣賊子之㫖而後可與言春秋矣朱子曰胡氏此傳不明言其意嘗問其說於文定公之甥范伯達伯達曰公之意蓋以為厲公之無道當廢而不當弒欒書廢之則得世臣之義矣至於殺之則罪也故稱國弒以兩見其意焉張氏曰稱國以弒者衆弒其君之辭也孟子論貴戚之卿曰君有大過則諫反覆之而不聽則易位厲公之過大矣昵用小人殺戮無罪舉朝諸卿不保首領書偃晉之世臣以社稷為心可以行易位之權而程滑遽弒之稱國以弒而不言二臣弒之分其惡於衆也悼公逐不臣者七人而不誅書偃非里克寧喜之比故也澄按春秋之作正為誅亂臣賊子也趙穿弒靈公傳不言盾使而經書趙盾弒君程滑殺厲公傳以為欒書中行偃使之而經止書國弒何也曰此春秋之所以别嫌明微也蓋靈公之不君其惡未加於一國欲殺趙盾而趙穿為盾殺之實盾之所欲弒也故春秋誅盾為首惡厲公之無道遍得罪於一國欒書中行偃執公而殺其輔君為惡之嬖臣蓋將以匡晉國而未有弒君之心也程滑因國人之所共怒而弒公蓋非書偃之專謀也故書國弒若獨書書偃則罪歸於二卿而一國之人得免於弒君之惡矣曰二卿執公可乎曰孟子云諸侯危社稷則變置欒書當國之卿厲公既誅三卿矣不可諌也必將大亂晉國坐視社稷之隕則亦何以為國卿乎故將廢置而更立焉國人遽弒其若聖人不以首惡加二子非縱之也蓋辨是非定邪正以示萬世左氏使程滑之言非經意也齊殺其大夫國佐左傳曰齊侯使崔杼為大夫使慶克佐之帥師圍盧國佐從諸侯圍鄭以難請而歸遂如盧師殺慶克以穀叛齊侯與之盟於徐關而復之盧降使國勝告難於晉待命于清齊為慶氏之難故齊侯使士華免以戈殺國佐于內宫之朝師逃于夫人之宫使清人殺國勝國弱來奔王湫奔萊慶封為大夫慶佐為司冦既齊侯反國弱使嗣國氏襄陵許氏曰慶克作慝濁亂中閨譛害大臣不誅不詰使國佐無所發其忠憤起而殺之顧為俱靡而已於是因以為國佐罪張氏曰無咎奔於去年之秋而鮑牽刖齊靈可以省母言之是非矣國佐叛而後復之意靈公非不知國佐之直與慶克等之內亂宫闈也卒殺國佐則靈公之知又下魯成公數等矣保姦如此因慶克以成慶封黨賊之禍慶封逐而政卒歸於陳氏皆靈公蔽塞聰明唯婦言是用所致也國佐不能見幾而去以邑叛君又仕危亂之朝身死於宫闈非不幸矣公如晉左傳曰晉使荀罃士魴逆周子于京師而立之生十四年矣大夫逆于清原盟而入館于伯子同氏朝于武宫即位于朝公如晉朝嗣君也夏楚子鄭伯伐宋左傳曰鄭伯㑹楚子伐宋取朝郟宋魚石復入于彭城左傳曰楚子辛鄭皇辰侵城郜取幽丘同伐彭城納宋魚石向為人鱗朱向帶魚府焉以三百乘戍之而還杜氏曰彭城宋邑張氏曰今徐州彭城縣蘇氏曰公孫寧儀行父言納而魚石不言納蓋楚莊誅陳罪人疑若無罪故書納以正其罪魚石之書復入而先言楚鄭之伐以著其納亂臣也故不言自楚而特書復入然不書叛者復入而將以亂國非直叛君而已故魚石欒盈之罪重於趙鞅宋辰也高氏曰此楚鄭間晉之變孫氏曰伐宋取彭城與魚石守之以逼宋也其曰宋魚石復入于彭城者不與楚鄭伐宋取邑以與宋叛臣也故以魚石自入犯君為文公至自晉晉侯使士丐來聘左傳曰拜朝也襄陵許氏曰公朝始至而聘使紹至晉悼之下諸侯肅矣此列國之所以睦而叛國之所以服也高氏曰書晉侯與宣公十年書齊侯同義秋杞伯來朝左傳曰勞公且問晉故公以晉君語之杞伯於是驟朝于晉而請為昏八月邾子來朝左傳曰即位而來見也築鹿囿杜氏曰築牆為鹿苑高郵孫氏曰春秋興作皆書雖城池之固門廄之急無遺焉重民力也况耳目之玩一身之娛哉高氏曰成公之季大國來聘小國來朝國家閒暇矣不務修其刑政而築鹿囿前此未有書築囿者自此之後昭九年築郎囿定十三年築蛇淵囿人君之示子孫也其可不戒哉己丑公薨于路寢冬楚人鄭人侵宋左傳曰宋老佐華喜圍彭城老佐卒焉楚子重救彭城伐宋宋華元如晉告急韓獻子為政曰欲求得人必先勤之成霸安疆自宋始矣晉侯師于台谷以救宋遇楚師于靡角之谷楚師還晉侯使士魴來乞師魴音房公作彭左傳曰晉士魴來乞師季文子問師數于臧武仲對曰伐鄭之役知伯實來下軍之佐也今彘季亦佐下軍如伐鄭可也事大國無失班爵而加敬焉禮也從之襄陵許氏曰悼公之時霸業復興而乞師以救宋猶遵厲公故事元年而後遂無乞師則召兵而已矣十有二月仲孫蔑㑹晉侯宋公衛侯邾子齊崔杼同盟于虛朾虛起居切朾它丁切左傳曰謀救宋也宋人辭諸侯而請師以圍彭城杜氏曰虛朾宋地髙氏曰諸侯師至而楚鄭之師以退故宋人辭諸侯而請其師以圍彭城而先為此盟也丁未葬我君成公經書月三書日三大衍厯正月丙辰大辛酉冬至庚申五日二月丙戌小三月乙卯大四月乙酉小五月甲寅大六月甲申小七月癸丑大八月癸未小已丑七日九月壬子大十月壬午大十一月壬子小十二月辛巳大丁未二十七日春秋纂言卷八
