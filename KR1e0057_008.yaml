body:
  text: 春秋纂言卷一元吳澄撰春秋杜氏曰春秋者魯史記之名史之所記必表年以首事年有四時故錯舉以為所記之名也孔氏曰不可遍舉四時為書號言春足兼夏言秋足見冬故錯互舉春秋二字名雖春秋實包冬夏永嘉陳氏曰謂之春秋者其書法以四時冠月也澄按春秋之立名由魯厯遞遷四時之序以春為一歲之始以秋為中歲之始史記記一歲四時之事故舉四時之二始以名之也古者天子之太史掌記事掌治厯一官而兼二職厯以協天序於當時事以傳人治於後世諸侯雖有史掌記事而已厯則天子所頒也晉楚最為大國各有史記一名乘一名檮杌不聞二國有厯也惟魯之史記名春秋而周厯之外别有魯厯亦名春秋厯至漢猶存是魯國之史不止記事又作厯矣記事宜也作厯僭也僭則天子何以不禁曰魯厯雖僭然奉周正朔但移春於歲首之為非耳夫移春於歲首則一歲之時自春始夏次秋次而冬終焉四時之序甚順而以為非何也曰在夏則可在周則不可其不可者何也周之歲首乃仲冬季冬不可以為春仲夏季夏不可以為秋也移夏之四時加於周之十二月此魯厯之非於天時雖不合於王正則不戾是以莫之禁也夫子修經因其名據其實而書之以著其非抑使後世知建子之正不如建寅之正於天時之序為順也其答顔淵為邦之問所以曰行夏之時隱公名息姑惠公夫人孟子之娣聲子所生長子也在位十一年元年公羊氏傳曰君之始年也澄曰謂第一年也不稱一年而稱元年何也一乃數之始莫之或先然但謂之一則不見其有異尊其在始特立殊稱以一年為諸年之首故變一稱元元者首也是年己未周平王四十九年蔡宣公考父二十八年曹桓公終生三十五年衛桓公完十三年晉鄂侯郤二年曲沃莊伯鮮十一年鄭莊公寤生二十二年陳桓公鮑二十三年杞武公二十九年宋穆公和七年齊僖公祿父九年秦文公四十四年楚武王熊通十九年春公羊傳曰春嵗之始也澄曰經所書春蓋斗柄建子建丑建寅之月前兩月未是春惟三月建寅乃夏時之孟春也按一嵗十二月天氣雖肇始于子而人事則肇功于寅故唐虞夏之敬授人時皆以建寅之月為嵗首商代夏周代殷改正朔以新天下子之耳目而一其心故商之嵗首建丑周之嵗首建漢書律厯志記商周事有殷厯周厯為據而又參月之以四分三統二厯于成湯之十三年曰商十二乙丑朔旦冬至又曰後九十五嵗十二月甲申朔旦冬至冬至在商之十二月是商厯改夏之十二月為正月也于武王克商之嵗曰是嵗大寒中在周二月己丑晦閏月庚寅朔三月二日庚申驚蟄驚蟄夏正月之中氣也又曰周公攝政五年正月丁巳朔旦冬至而左氏傳僖公五年正月辛亥朔昭公二十年正月己丑朔皆日南至禮記記孟獻子之言亦曰正月日至可以有事于上帝冬至在周之正月大寒在二月驚蟄在三月是周厯改夏之十一月為正月也商周雖改月數天之四時則不可改故商之正月猶為冬二月三月四月乃為春也周之正月二月猶為冬三月四月五月乃為春也前代厯書至漢猶存者凡六黃帝厯顓頊厯夏厯殷厯周厯魯厯是也以非儒家書故得免於秦火周既有厯而魯自造厯魯厯雖從周王正朔然以春為一嵗之始於是改建子丑寅之月為春建卯辰巳之月為夏建午未申之月為秋建酉戌亥之月為冬此魯厯之變常也夫用夏正則春為嵗始用周正則嵗始非春也魯以周之嵗始為春而遞遷一嵗十二月之時則四時紊矣夫子因而書之譏也後漢陳寵云建寅月人正夏以為春建丑月地正商以為春建子月天正周以為春考之未詳者也商周改十二月十一月為正月而已曷嘗以之為春哉周官謂建子之月為正月建寅之月為正嵗而其間所謂春夏秋冬及孟仲季月一循夏時之舊月改時不改也豈非以月為王之正朔可隨世代更新時乃天之氣序一定有常而不可變易也歟尚書多方召誥多士顧命等篇所紀之月皆周月也而不記時蓋以天時一定未嘗變易有月則時可知也漢後史文月數一是夏正書正二三月則知其為春書四五六月則知其為夏七八九月之為秋十與十一十二月之為冬亦然不待表其時也非若魯厯紊天時之定序而月非其時故春秋必以魯所改之時加於月上以著其時之失正司馬遷史記凡書月則月上不言時書時則時下不言月合於尚書之書法王正月公羊傳曰先王而後正月王正月也左氏傳曰正周正月榖梁氏傳曰元年雖無事必舉正月謹始也薛氏曰舊史之制月不繫時言月則時可知也春秋月必繫時而加王於春之首月明王正反天時也春非夏時月數猶遵乎王正也周正建子以建寅為正嵗時猶用夏也魯變四時之序加春於建子舍周之舊也春秋常事不書書變常也永嘉陳氏曰周史言時皆夏時也言月皆周月也時皆夏時於周官見之月皆周月於書見之以夏時冠周月則魯史也非周之舊也夫子修春秋每孟月書時以見魯史每正月書王以存周正也項氏曰春非春也正月非正月也澄曰元年春謂魯公元年私改之春非天時一定之春也王正月謂周王天正建子之正月非正嵗建寅之正月也王者時王謂周也故左氏以周釋王既以見所書之正月為時王之所改又以見侯國之史記奉王朝之正朔也書一王字該此二義正月嵗之第一月也正猶長也以一月為諸月之長故變一稱正與元年變一稱元之義同按桓文宣成襄昭哀七公皆以元年正月即位隱莊閔僖四公雖不行即位禮其日亦見羣臣是為新君嵗首見羣臣之始故雖無事必存其首月不與常年同也若常年之首月有事則書無事則不書非元年之比也唯定公元年無正月者定未即位魯國無君故也三月公及邾儀父盟于蔑凡書邾小邾公羊並作邾婁後不重出蔑毋結切公羊穀梁作昧公羊傳曰及者與也㑹及暨皆與也及我欲之暨不得已也穀梁傳曰不言邾子未爵命也左傳曰公攝位而欲求好於邾故為蔑之盟髙氏曰隱自謂為桓而立內懼諸大夫之不已恱外慮諸屬國之不已從而邾以附庸有不相得於是首與邾盟杜氏曰邾今魯國鄒縣蔑姑蔑魯國卞縣南有姑城趙氏曰儀父名也魯季孫行父晉荀林父等以父為名澄曰宋公兹父齊侯祿父蔡侯考父皆名也附庸之君未爵命例書名如郳犂來介葛盧是也其後莊十六年經書邾子克卒蓋王命以子爵改名克如楚圍既為君而改名䖍棄疾既為君而改名居也凡盟例皆書日此不日者史文闕下及宋盟宿同盟謂以要約之辭質於神以明其信也周官有司盟之職邦國有疑則㑹同而盟孔氏曰盟者殺牲㰱血告誓於神若有背違令神加殃如此牲也先鑿地為方坎殺牲於坎上割牲取左耳盛以珠盤又取血盛以玉敦用血為盟書成乃㰱血讀書鄭氏曰盟辭書於䇿讀其書以告神坎其牲加書於上而埋之程子曰盟誓以結信出於人情先王所不禁後世諸侯交相盟誓亂世之事也張氏曰司盟之設聖人蓋為諸侯之仇怨不釋者設耳殆衰世之意聖人立法常關盛衰故不得已而建此官以待之也屢盟之長亂自幽厲以來惡之矣况春秋諸侯之紛紛乎陵陽李氏曰先儒謂魯侯爵而其君稱公此臣子之辭春秋從周之文而不革者按聘禮大射儀燕禮五等諸侯皆稱公而公食大夫禮又以名篇則謂君為公禮之正也夏此所謂夏蓋建卯建辰建巳之月前二月未是夏唯六月建巳乃夏時之孟夏也五月鄭伯克段于鄢克公作尅鄢音偃趙以鄢為塢左傳曰鄭武公娶於申曰武姜生莊公及段莊公寤生惡之愛段欲立之亟請於武公弗許及莊公即位為之請制公曰制巖邑也他邑唯命請京使居之謂之京城太叔既而太叔命西鄙北鄙二於己又收二以為已邑至於廩延完聚繕甲兵具卒乘將襲鄭公聞其期命子封帥車二百乘伐京京叛段入于鄢公伐諸鄢出奔共穀梁傳曰克者何見段之有徒衆也殺世子母弟目君目君甚鄭伯之處心積慮成於殺也趙氏曰克者能勝之名非命卿例不書公子非獨段也鄢當作塢鄭地也在緱氏縣西南十一年王取塢劉蒍邘之田于鄭乃屬周傳寫誤為鄢字京至塢非逺又是鄭地段有徒衆故曰克鄢今潁川鄢陵若逺走至鄢即已出境無復兵衆何得言克傳又曰自鄢出奔共自塢過河向共城為便路若已南行至鄢陵不當奔共也胡氏曰姜氏當武公存之時嘗欲立段矣及公既殁姜以國君嫡母主乎內段以寵弟多才居乎外恐其將為後患也故授之大邑縱使失道以至於亂然後以叛逆討之則國人不敢從姜氏不敢主而太叔屬籍當絶不可復居父母之邦此鄭伯之志也秋此所謂秋蓋建午建未建申之月前二月未是秋唯九月建申乃夏時之孟秋也七月天王使宰咺來歸惠公仲子之賵咺况阮切賵芳仲切音諷公羊傳曰惠公隱之考也仲子桓之母也喪事有賵車馬曰賵貨財曰賻衣被曰襚隱為桓立故以桓母之喪告于諸侯言惠公仲子兼之也榖梁傳曰其志不及事也澄曰王之上加天者儀禮傳云臣之所天者君也周王為衆侯國之君侯國以王為天也若王朝之史記則但稱王故尚書王不稱天此侯國之史記故稱王曰天王也宰氏咺名天子之上士三命稱氏稱名如叔服劉夏與石尚趙氏曰宰咺是氏名如宰豫之類王士來魯例書氏名石尚是也孫氏曰天王賵惠公則可兼仲子則不可文九年秦人來歸僖公成風之襚與此義同譏其不及事而又兼之也張氏曰啖趙劉程諸說以惠公仲子為妾繫君僖公成風為妾繫子今按惠公以去年薨而仲子之卒經無明文則亦卒于去年也何以獨歸仲子而不歸惠公乎公羊之說得之九月及宋人盟于宿左傳曰惠公之季年敗宋師于黃公立而求成焉公羊傳曰孰及之內之微者也穀梁傳曰宋人外卑者也劉氏曰盟者國之大事豈微者所尸乎苟有兩微者盟春秋固不書之趙氏曰凡盟不目內皆指公也吕氏曰隱公以諸侯之尊而下與他國之臣盟苟徇目前之利無恥也髙氏曰桓宋出也公懼宋故與宋合杜氏曰宋今梁國睢陽縣澄曰宋人宋臣之一命者蓋士也宿小國風姓東平無鹽縣也杜氏謂盟以國地者國亦與盟竊謂宿微國宋之附庸猶宋邑也魯求成于宋故往就宋之境內而盟于宿爾微國非能有所利害魯宋何為使之與盟乎冬此所謂冬蓋建酉建戌建亥之月前二月未是冬唯十二月建亥乃夏時之孟冬也十有二月祭伯來祭側界切左傳曰非王命也榖梁傳曰寰內諸侯非有天子之命不得出㑹諸侯不外交也澄曰祭畿內邑伯爵天子六命之卿稱邑爵王臣出使侯國當有王命其來必有其事祭伯上不言天王使來下不言為何事是無王命而私行也公子益師卒公子氏益師名二命之卿魯孝公之子不曰史失之海陵胡氏曰益師字衆父衆仲其後春秋於外諸侯書卒書葬與魯君夫人同於內大夫書卒而不書葬詳略之差等也君之卿佐是謂股肱故問其疾弔其喪賵其葬必厚其送終之恩此春秋書大夫卒之㫖也髙郵孫氏曰內大夫見於經者四十有七卒者三十不書卒者十有七或弒賊或出奔或君不親臨或賻贈不加恩不及則不卒或卒於春秋之後也經書月六書日無據唐開元大衍厯追算正月辛亥朔大庚申冬至二月辛巳小三月庚戌大四月庚申小五月乙酉大六月己卯小傳五月辛丑在六月七月戊申大八月戊寅大九月戊申小十月丁丑大十一月丁未小傳十月庚申在十一月十一月丙子大程氏公說曰自三統至欽天正月朔或辛亥或庚戌壬子視大衍前後差一日以傳五月辛丑十月庚申考之則正月朔非辛亥故杜預遷就以辛巳為朔若從辛巳則冬至不在正月周厯雖差不如是之甚意者差閏只在今年而杜考之不詳爾周厯惟閏法多差在當時左氏已屢譏其失閏則後世自難考正今止以大衍立法經傳日月合者標其日於月下不合者則注其差云澄按杜預作長厯以追合經傳日月多是遷就故程氏作春秋分記用大衍厯今從之附注氣朔於各年之後雖多不合然姑存大槩俟後世通厯者考焉二年庚申平王五十年蔡宣二十九曹桓三十六衛桓十四晉鄂三鄭莊二十三陳桓二十四把武三十宋穆八齊僖十秦文四十五楚武二十春例不書月者但書時公㑹戎于潛左傳曰修惠公之好也戎請盟公辭漢孔氏曰此戎蓋帝王所羈縻居九州之內胡氏曰費氏稱淮夷徐戎蓋徐州之戎在魯之東郊趙氏曰以國舉不書爵號君臣同詞劉氏曰戎者戎之君也不以君稱之外之也張氏曰書戎以外之㑹狄㑹吳放此夏五月莒人入向向舒亮切左傳曰莒子娶于向向姜不安莒而歸莒人入向以姜氏還澄曰莒子爵已姓今密州莒縣人謂莒大夫小國之大夫一命稱人入謂攻破其城矣入其國也有兵既入而遂滅其國者有兵雖入而不滅其國者向小國姜姓炎帝之後杜氏曰龍亢縣東南有向城張氏曰漢志向屬沛郡寰宇記屬應天府穀孰縣孫氏曰隱桓之際國無大小用師皆專行無駭帥師入極駭吁楷切榖作賅後同無駭魯再命之大夫凡再命則稱名三命則書氏書名帥師用大衆也極附庸小國張氏曰擅興大衆陵暴小國義與入向同秋八月庚辰公及戎盟于唐左傳曰戎請盟復修戎好也杜氏曰唐魯地髙平方與縣北有武唐亭張氏曰今單州魚臺縣也諸侯㑹盟皆期約行禮之日然㑹未有書其日者至於盟必詳其月與日以其相與約信或尋或寒皆考于此有國者之所謹也前此蔑宿之盟不書日久逺失之爾程子曰戎猾夏而與之盟非義也九月紀裂繻來逆女裂公穀並作履繻音須杜氏曰紀國在東莞劇縣張氏曰漢屬北海郡今屬青州壽光縣澄曰裂繻紀卿紀雖侯爵其國削弱同於小國其卿再命稱名女在父母之國故稱女諸侯娶妻皆當親迎裂繻卿也而代為君逆非禮也公穀並云譏不親迎是也郯氏曰諸侯親迎常事不書左氏以卿逆為合禮誤矣髙氏曰詩稱大姒之家在渭之涘文王娶之親迎于渭蹶父之女嫁于韓侯韓侯迎之于蹶之里魯哀公問于孔子曰冕而親迎不已重乎孔子對曰合二姓之好繼先聖之後為天地社稷宗廟之主君曷謂已重乎諸侯親迎自古而然唯天子之尊使三公逆也冬十月伯姬歸于紀伯者長女也蓋惠公之女即裂繻所逆者婦人內夫家故以出嫁為歸啖氏曰內女嫁歸為夫人則書陸氏曰以尊卑敵公為之服故書其歸紀子伯莒子盟于密伯左作帛孫氏曰紀本侯爵此稱子伯闕文也程子曰當作紀侯某伯莒子澄按子伯二字或是侯字之誤蓋離盟非參盟也杜氏曰密莒邑城陽淳于縣東北有密鄉十有二月乙卯夫人子氏薨穀梁傳曰夫人者隱之妻也卒而不書葬夫人之義從君者也張氏曰婦人從君故君存則葬禮未備待君薨而合袝也澄按子姓宋女也薨者上墜之聲鄭人伐衛左傳曰鄭共叔之亂公孫滑出奔衛衛人為之伐鄭取廩延鄭人伐衛討公孫滑之亂也杜氏曰衛國在汲郡朝歌縣張氏曰今濬州黎陽縣澄曰衛侯爵鄭雖伯爵次國同於大國稱人者蓋其一命之士伐者聲其罪而興師也經書月五書日二大衍厯正月丙午朔小乙丑冬至二月乙亥大三月乙巳小四月甲戌大五月甲辰小六月癸酉大七月癸卯小八月壬申大初九日庚辰九月壬寅小十月辛未大十一月辛丑大三十日庚午霜降閏月辛未小十五日乙丑立冬十二月庚子大旦日小雪十六日乙卯長厯八月壬寅朔無庚辰三年辛酉平王五十一年崩蔡宣三十曹桓三十七衛桓十五晉鄂四鄭莊二十四陳桓二十五杞武三十一宋穆九卒齊僖十一秦文四十六楚武二十一春王二月每嵗春字之下書月必加王字以見此月數乃時王之所改定程子曰月王月也事在二月則書王二月在三月則書王三月無事則書時書首月存天時正王朔也己巳日有食之穀梁傳曰言日不言朔食晦日也公羊傳曰日食曷為或日或不日或言朔或不言朔或朔在前或朔在後也孫氏曰凡日食言日言朔食正朔也言日不言朔失其朔也言朔不言日失其日也不言日不言朔日朔俱失也劉氏曰或不日或不言朔史之記失也若非史之記失則日食不得其正也朱子曰晦朔日月合同度同道則月掩日而日為之食王者修德行政用賢去姦能使陽盛足以勝隂則雖或當食而不食也三月庚戌天王崩平王也在位五十一年世子泄父蚤死泄父之子林立是為桓王程子曰崩上墜之形海內皆當奔赴魯不往罪不書自見也髙郵孫氏曰春秋之王十有三崩葬皆書者五周告崩魯㑹葬也崩而不葬者四周告之而魯不㑹也崩葬不見者三周不告魯不㑹也其一則崩在春秋之後夏四月辛卯尹氏卒尹左作君公羊傳曰尹氏天子之大夫也其稱氏何譏世卿外大夫不卒此何以卒天王崩諸侯之主也澄按天子之公卿大夫士其生也不外交諸侯故其死也亦不赴告春秋二百四十二年間惟劉卷王子虎以常同㑹盟而來赴尹氏以王崩為諸侯之主而來赴皆非禮也故書以示譏然劉卷六命之卿有邑有爵但書邑書名王子虎一命之下士其屬為王子但書屬名尹氏當從劉卷之例今書不書邑書名而書邑書氏者著其世世為卿也秋武氏子來求賻賻音附公羊傳曰喪事無求穀梁傳曰歸之正也求之非也周雖不求魯不可以不歸魯雖不歸周不可以求之求之為言得不得未可知之辭也交譏之澄曰武亦王卿之采邑稱氏義與尹氏同子者父老而以子攝行卿之事賻者以貨財助喪之禮也時周室微弱諸侯不天程子曰天王崩諸侯不供其喪故武氏子徵求于四國八月庚辰宋公和卒左傳曰宋穆公疾召大司馬孔父曰先君舍與夷而立寡人寡人弗敢忘若以大夫之靈得保首領以殁先君若問與夷其將何辭以對請子奉之以主社稷對曰羣臣願奉馮也公曰不可先君以寡人為賢使主社稷若棄德不讓是廢先君之舉也豈曰能賢光昭先君之令德可不務乎吾子其無廢先君之功使公子馮出居於鄭澄曰初宋宣公卒不傳其子與夷而傳其弟和和穆公也在位十一年宣公之子與夷立是為殤公凡諸侯之薨與魯交者來赴不書薨而書卒者逺之不以之同於我君而以之下同于內大夫也冬十有二月齊侯鄭伯盟于石門永嘉陳氏曰特相盟不書必關於天下之故而後書莒紀無足道也齊鄭合天下始多故矣天下之無王鄭為之也天下之無伯齊為之也是故書齊鄭盟于石門以志諸侯之合定七年書齊鄭盟于鹹以志諸侯之散春秋之終始也春秋于隱桓莊之際惟鄭多特筆于襄昭定哀之際惟齊多特筆焉張氏曰齊國名侯爵今青州臨淄縣石門齊地在濟南府臨邑縣隱十一年之間盟而不食言者唯此石門之盟二君終身未嘗相伐蓋齊方盛彊而鄭莊姦猾鄭仇專在于宋故鄭莊恃齊以敵之雖齊間與宋盟好而左右離間必使唯已之從是以石門之盟不寒而宋與許杞諸國交受入伐鄭莊多詐齊僖不義而彊二國相與之固列國並受其禍也癸未葬宋穆公穆公穀並作繆魯往㑹葬故書髙氏曰經書諸侯之卒者百二十有二而書葬者八十有八蓋魯往㑹則書天王崩魯不㑹葬而葬宋穆公諸侯壤地相比王事相從必有聘問和好之事至于告終易代豈無弔恤賻葬之禮春秋之時徒以國勢之强弱私情之疏密而為之禮爾胡氏曰卒而或葬或不葬者何有怠于禮而不葬者有弱其君而不葬者有討其賊而不葬者有諱其辱而不葬者有治其罪而不葬者有避其號而不葬者宋殤齊昭告亂書弒矣而經不書葬是討其賊而不葬者也晉主夏盟在景公時告喪書日矣而經不書葬是諱其辱而不葬者也魯宋盟㑹未嘗不同而三世不葬是治其罪而不葬者也吳楚之君書卒者十亦有親送於西門之外者矣而經不書葬是避其號而不葬者也怠于禮而不往弱其君而不㑹無其事闕其文魯史之舊也討其賊諱其辱治其罪避其號而不葬聖人所削也經書月五書日五大衍厯正月庚午小辛未冬至二月己亥大三月己巳小經二月日蝕在三月朔四月戊戌大經三月庚戌傳三月壬戌皆在四月五月戊辰小經四月辛卯在五月六月丁酉大七月丁卯小八月丙申大九月丙寅小經八月庚辰在九月十月乙未大傳冬庚戌十五日十一月乙丑小十二月甲午大經癸未在明年正月長歷己巳二月朔庚戌三月十二日辛卯四月二十四日庚辰八月十五日癸未十二月二十日四年壬戌桓王元年蔡宣三十一曹桓三十八衛桓十六弒晉鄂五鄭莊二十五陳桓二十六把武三十二宋殤公與夷元年齊僖十二秦文四十七楚武二十二春王二月莒人伐把取牟婁穀梁傳曰諸侯相伐取地於是始啖氏曰先書伐國後言取邑者取其國之邑也澄曰取者奪而有之也把夏后氏之後杜氏曰把國本都陳留雍丘縣桓六年淳于公亡國把始并之遷都淳于僖十四年又遷緣陵襄二十九年晉人城把之淳于把又遷鄀牟婁把邑城陽諸縣東北有婁鄉戊申衛州吁弒其君完州榖作祝後州吁同弒榖作殺後凡弒君並同不重出左傳曰衛莊公娶于齊曰莊姜無子又娶于陳曰厲媯其娣戴媯生桓公莊姜以為已子州吁嬖人之子也有寵而好兵公弗禁莊姜惡之石碏諌弗聽其子厚與州吁游禁之不可桓公立乃老澄按史記表年周平王三十七年丁未為衛桓公元年在位十六年州吁弒之而自立州吁不稱公子非命卿也國君之子尊與再命之大夫同故稱名下殺上曰弒完桓公名劉氏曰州吁不稱公子公子雖貴非三命不氏張氏曰衛國之禍始于莊公之寵州吁縱其好兵而不知禁公存之時妾上僣夫人失位亂根之萌久矣君臣父子夫婦之分一失其正則亂之所從生衛莊溺私愛而使內寵僣嫡嬖子害正石碏之諌足以悟矣愎而弗圖貽禍後嗣董氏云為人君父而不通于春秋之義者必蒙首惡之名莊公之謂也夏公及宋公遇于清左傳曰公與宋公為㑹將尋宿之盟未及期衛人來告亂張氏曰乃行遇禮而還薛氏曰殺禮而野合將以伐鄭也杜氏曰清衛邑濟北東阿縣有清亭程氏曰諸侯相見而不行朝㑹之禮如道路之相遇非周禮冬見曰遇之遇也趙氏曰簡禮而㑹曰遇啖氏曰遇禮忽有邂逅相遇簡略而行故與㑹禮不同時雖非相遇而從省易以遇禮相見襄陵許氏曰隱莊之間凡六書遇自閔以後有㑹無遇宋公陳侯蔡人衛人伐鄭左傳曰宋殤公之即位也公子馮出奔鄭鄭人欲納之及衛州吁立將修先君之怨於鄭而求寵于諸侯使告于宋曰君若伐鄭以除君害君為主敝邑以賦與陳蔡從則衛國之願也宋人許之於是陳蔡方睦於衛故宋陳蔡衛伐鄭張氏曰宋自殤公立公子馮出居鄭之後馮以穆公不立已為恨有反取其國之心鄭莊又從而佐之于是宋鄭為仇及是衛州吁欲定其位告宋求伐鄭以除子馮之害故四國伐鄭宋為主而陳蔡同役宋殤受國于穆公而馮有爭位之心正當修德和民外好鄰國則其位自定而馮無所伺其隙矣况州吁弒逆之賊內懷見討之懼而欲納交殤公苟名其為賊告于王而討之則一舉而君臣父子之倫定今乃怵于州吁之邪說合陳蔡以助逆賊而宋國之人不復知君臣順逆之正理弒逆之事卒及其身皆殤公不能早辨于此之役也陳今陳州宛丘縣蔡今蔡州上蔡縣澄曰蔡衛稱人蓋陳宋二國君在則雖三命二命之大夫亦降稱人衛人蓋公孫文仲也襄陵許氏曰擊鼓詩序以為公孫文仲將而平陳與宋秋翬帥師㑹宋公陳侯蔡人衛人伐鄭翬音輝左傳曰宋公使來乞師公辭之羽父請以師㑹之公弗許固請而行薛氏曰師興而後翬㑹之也程子曰左氏以為再伐妄也再叙四國重言其罪永嘉吕氏曰州吁弒君之賊未能定其位而求寵于諸侯使宋公如夫子沐浴之意率諸侯以討罪人可也如其不能則不徇其一時之邪說以聽天下有能治之者亦可也今也徇逆賊之謀修一已之怨合四國以伐鄭四國之兵方合而翬又帥師㑹之亂臣賊子之勢益張故書翬帥師而再序四國聖人之筆嚴矣單伯㑹伐宋不再序諸國以彼無大惡也澄曰翬魯再命之大夫其後翬弒隱公而桓公立乃進為三命始書氏九月衛人殺州吁于濮濮音卜左傳曰州吁未能和其民厚問定君于石子石子曰王覲為可曰何以得覲曰陳有寵于王陳衛方睦若朝陳使請必可得也厚從州吁如陳石碏使告于陳曰衛國褊小老夫耄矣無能為也此二人者實弒寡君敢即圖之陳人執之而請涖于衛衛使右宰醜涖殺州吁于濮石碏使其宰獳羊肩殺石厚于陳公羊傳曰稱人討賊之辭也程子曰衛人衆辭舉國殺之也陸氏曰凡作亂自立為君而國人殺之者皆稱人以殺言衆所共棄不君之也張氏曰濮水名在曹衛之間受河汴二水東北至灕派分為二俱東北至巨野入濟冬十有二月衛人立晉左傳曰衛人逆公子晉于邢宣公即位穀梁傳曰衛人者衆辭也立者不宜立也髙氏曰晉乃桓公之弟莊公之子于次當立又國人之所同欲而謂之不宜何也彼曰我君之子也國我之國我宜立國人亦曰彼吾君之子也國乃其國彼當立是諸侯之子不必命于天子特以公子之親衆人宜之而自立也如此則千乘之國皆可擅置其君而邦君之子皆可專有其國矣孫氏曰諸侯受國于天子非國人可得立也髙郵孫氏曰晉以國人衆立宜有得立之禮聖人特于疑似之間而明不當立之義澄曰春秋常事不書若所宜立則以常事經不書矣篡賊既討衛國無君衆人同心擇所宜立者立之疑于不害義矣聖筆别嫌眀微特書于經穀梁之傳得其㫖矣哉沙隨程氏曰尹氏立王子朝一族之私也衛人立晉一國之公也立晉者著晉無干位之嫌也時王政不及于諸侯若平世須王命而後可經書月三書日一大衍厯正月甲子大丙子冬至二月甲午小戊申十五日三月癸亥大四月癸巳小五月壬戌大六月壬辰小七月辛酉大八月辛卯小九月庚申大十月庚寅小十一月己未大十二月己丑小長厯戊申在三月十七日五年癸亥桓王二年蔡宣三十二曹桓三十九衛宣公晉元年晉鄂六鄭莊二十六陳桓二十七杞武三十三宋殤二齊僖十三秦文四十八楚武二十三春公觀魚于棠左觀作矢左傳曰公將如棠觀魚者臧僖伯諫曰凡物不足以講大事其材不足以備器用則君不舉焉山林川澤之實器用之資皂𨽻之事官司之守非君所及也公曰吾將略地焉遂往陳魚而觀之公羊傳曰棠濟上邑杜氏曰髙平方與縣北有武唐亭張氏曰今單州魚臺縣有魯侯觀魚臺澄曰古者天子季冬之月命漁師始漁先薦寢廟隱公蓋非為宗廟嘗魚而往棠乃逺地漁師取魚而公往觀之特為游觀之樂耳夏四月葬衛桓公左傳曰衛亂是以緩張氏曰桓弒十四月賊討而後葬桓公名完而諡桓古不諱嫌名也陵陽李氏曰先儒以為衛侯爵而稱公蓋罪其臣子不請於王而私自諡按齊魯侯爵而自丁公魯公以來皆號為公則其來已久非昉于東遷之後矣周公制禮五等諸侯子曰公子孫曰公孫宫曰公宫門曰公門未聞邾莒之邦子稱子子許宿之國孫稱男孫者也而何獨靳于諡哉故諸侯之諡例稱公其常也先儒執于秦漢以後尊君卑臣之文而不考之禮故一眀之以破後世諂諛之習秋衛師入郕郕公作盛後同郕音成左傳曰衛之亂也郕人侵衛故衛師入郕公羊傳曰將卑師衆稱師將卑師少稱人將尊師少稱將將尊師衆稱某帥師君將不言率師書其重者也杜氏曰東平剛父縣有郕鄉張氏曰今之單州任城縣也澄曰郕國名伯爵衛與郕皆文王之子郕乘亂侵衛已非禮衛又報復而入其國莒入向魯入極且不可况以師而入兄弟之國乎九月考仲子之宫初獻六羽左傳曰考仲子之宫將萬焉公問羽數于衆仲對曰天子用八諸侯用六于是初獻六羽始用六佾也程子曰考始成而祀也仲子不得為夫人故别宫以祀之成王賜魯用天子禮樂祀周公後世遂羣廟皆用仲子别宫故不敢同羣廟而用六羽也書初獻見前此用八之僣也沙隨程氏曰夫人已配先公之廟故妾母别立宫然隱公預為桓公考仲子之宫是以妾僣妾母也婦人無武事故有羽而無干獻六羽是以妾僣夫人也邾人鄭人伐宋左傳曰宋人取邾田邾人告于鄭曰請君釋憾于宋敝邑為道鄭人以王師㑹之伐宋入其郛杜氏曰邾主兵故序鄭上螟螟音𡨕蟲食苗心曰螟為災故書冬十有二月辛巳公子彄卒彄苦侯切書氏書名三命之大夫彄臧僖伯也宋人伐鄭圍長葛左傳曰報入郛之役趙氏曰伐國而圍邑皆書之不可偏遺也蘇氏曰伐其國又圍其邑也張氏曰長葛鄭邑今潁昌府長葛縣宋殤公以邾鄭伐已之故報怨于鄭聲其罪而圍其邑澄曰前書莒人伐杞取牟婁一加兵即取其邑取之易也宋雖加兵于鄭之邑而取之難故圍之經年乃能取經書月三書日一大衍厯正月戊午大辛巳冬至二月戊子小辛亥大寒三月丁巳大壬午雨水四月丁亥小壬子春分五月丙辰大癸未穀雨六月丙戌大癸丑小滿七月丙辰小甲申夏至八月乙酉大甲寅大暑閏月己卯小九月甲申大十月甲寅小十一月癸未大十二月癸丑小辛巳二十九日長厯是年閏十二月六年甲子桓王三年蔡宣三十三曹桓四十衛宣二晉哀侯光元年鄭莊二十七陳桓二十八杞武三十四宋殤三齊僖十四秦文四十九楚武二十四春鄭人來輸平輸左作渝來者彼來求我非我往求彼也輸謂輸寫其情平謂兩國昔有忿怨如地之不平今悉剗削而使之平也輸平猶曰納欵也上年魯嘗同宋衛伐鄭今鄭釋其怨而求和於魯故曰來輸平沙隨程氏曰輸如吕刑輸而孚之輸我無欲平之意而鄭輸其平于我孫氏曰鄭來輸成平四年翬㑹諸侯伐鄭之怨也胡氏曰輸者納也平者成也公之未立與鄭戰于狐壤元年及宋盟于宿四年遇宋于清其秋㑹師伐鄭宋魯為黨與鄭有舊怨眀矣鄭來納成解仇釋怨以利相結離宋魯之黨也永嘉陳氏謂春秋之初宋魯陳衛為一黨齊鄭為一黨今鄭先來與魯平就合齊魯之交自此以後魯合于齊鄭而離宋魯之交矣張氏曰鄭莊之納平為合黨敵宋許繼以納祊而未即求許所以為敗宋入許之權輿魯隱入于其術中也夏五月辛酉公㑹齊侯盟于艾左傳曰始平于齊也杜氏曰春秋魯與齊不平艾泰山牟縣有艾前山張氏曰今之襲慶府奉符縣也澄曰前此魯未嘗與齊交因鄭人來輸平之後鄭遂合齊魯之交而公始與齊盟蓋皆鄭莊謀也秋七月公羊傳曰此無事何以書四時具然後為年程子曰無事書首月天時王月備而後成嵗也冬宋人取長葛張氏曰宋自去冬圍長葛經年不解志在必取鄭莊不求保其土地人民反結交于魯以為後日報復之計而與長葛于宋宋殤雖若得志而後日終受鄭莊報復蹙國喪師以及其身經書月二書日一大衍厯正月壬午大丙戌冬至二月壬子小三月辛巳大四月辛亥小五月庚辰大六月庚戌小經傳五月庚申辛酉在六月七月己卯大八月己酉小九月戊寅大十月戊申大十一月戊寅小十二月丁未大長厯辛酉五月十二日七年乙丑桓王四年蔡宣三十四曺桓四十一衛宣三晉哀二曲沃武公稱元年鄭莊二十八陳桓二十九杞武三十五宋殤四齊僖十五秦文五十楚武二十五春王三月叔姬歸于紀薛氏曰叔姬者何紀伯姬之妹也媵不從乎嫡盛禮而歸之非禮也何氏曰叔姬者伯姬之媵至是乃歸者待年父母國也澄曰伯姬叔姬蓋皆惠公之女伯姬隱二年歸為紀夫人叔姬不同歸者年小而待年於國既長則歸從其嫡常事爾不當書隱公欲厚于先公之女而如歸嫡之禮以歸于紀故書之以著其非禮或謂嘉其賢或謂閔其無終故書者皆非也聖人筆削有定法豈逆計其他日之事而預書之也哉滕侯卒左傳曰不名未同盟也公羊傳曰不名微國也程子曰不名史闕也趙氏曰凡諸侯同盟名于載書朝㑹名于要約聘告名于簡牘故于卒赴可知而紀也非此則否示詳慎也左氏云同盟薨則赴以名于理不安豈有臣子正當創巨痛深之日乃忍稱君之名禮篇所録云寡君不祿而已春秋諸侯卒不同盟者凡五十二人九人不書名餘並書名澄按微國亦有書名者唯無可考證則舊魯史不載其名而夫子因之也杜氏曰滕國在沛丘縣東南張氏曰今徐州滕縣也夏城中丘杜氏曰中丘在琅邪臨沂縣東北張氏曰今沂州臨沂縣魯無敵國外患之警盛夏興工築非人君重民力之意程子曰凡用民力興作不時害義固為罪雖時且義必書見勞民為重事也書城者完舊也書築者創始也杜氏諤曰春秋書城邑二十四城中丘為之始齊侯使其弟年來聘左傳曰夷仲年來聘結艾之盟也澄曰年非卿非大夫特以國君之弟其尊同于再命之大夫故名而不氏著其弟二字于上以見其屬之貴而齊侯寵用之與命卿大夫同也年若為三命之卿則書公子年若再命之大夫則但書年今于年之上加其弟字以見其非三命亦非再命也聘者諸侯遣大夫通好與國齊魯初通好而為艾之盟至此齊遣人來聘以繼前好也秋公伐邾左傳曰為宋討也杜氏曰公拒宋而與鄭平欲以鄭為援今鄭復與宋盟故懼而伐邾欲以求宋故曰為宋討胡氏曰奉詞致討曰伐宋先取邾田故邾入其郛魯與邾儀父元年盟于蔑矣邾何罪可聲髙氏曰著公背元年之盟也蓋宋之伐鄭公實與謀而邾乃魯之附庸宋取邾田邾不告魯而以告鄭至是公因為宋伐之自背其盟為人伐人非義之甚冬天王使凡伯來聘杜氏曰凡伯周卿士凡國伯爵也汲郡供縣東南有凡城張氏曰今濬州黎陽縣之境澄曰凡蓋周公之後封於凡入為王朝六命之卿加一命而爵為七命之伯也程子曰周禮時聘以結諸侯之好諸侯不修臣職而聘之非王體也永嘉吕氏曰隱公即位已七年其臣未有一如京師而天子乃遣使以聘之何哉十二公之中魯之臣如京師者六王之臣來聘者八然止于宣公自宣十年定王使王季子來聘之後魯立五公周更四王皆無來聘之文蓋周室之衰尤甚于前禮文不足以結諸侯矣書來求者三則止于文公書來錫者三則止于成公戎伐凡伯于楚丘以歸杜氏曰楚丘衛地在濟隂城武縣西南張氏曰戎見隱二年或云此戎乃已氏之戎本昆吾氏之别種周衰入居中國者也楚丘今拱州之楚丘縣漢為梁國已氏縣非衛之楚丘杜注衛地非也髙氏曰此執凡伯也而曰伐者初戎朝于周發幣于公卿凡伯弗賓故戎執之夫戎慕夏禮而發幣凡伯乃弗賓至是見執故書戎伐見戎執詞且有兵衆也經書月一書日無大衍歷正月丁丑小壬辰冬至二月丙午大三月丙子小四月乙巳大五月乙亥小六月甲辰大七月甲戌小八月癸卯大傳七月庚申在八月九月癸酉小十月壬寅大十一月壬申小十二月辛丑大長歷是年閏十二月八年丙寅桓王五年蔡宣三十五卒曺桓四十二衛宣四晉哀三鄭莊二十九陳桓三十杞武三十六宋殤五齊僖十六秦寧公元年楚武二十六春宋公衛侯遇于垂杜氏曰垂衛地濟隂句陽縣東北有垂亭張氏曰垂近魯地宋殤衛宣簡禮相見以謀事也左氏以為齊欲平宋衛于鄭宋衛本無隙而與鄭為仇必無齊欲平宋衛于鄭之事蓋欲求成于齊故相見以謀之爾此遇止是二君素相與者而瓦屋之盟齊方與焉則平齊可知也髙氏曰殤公嘗從州吁之請伐鄭以圖馮矣州吁誅宣公立馮不可不終圖而未知宣公之從否故宋衛相見于垂以謀鄭十年宋衛入鄭蓋垂之謀也謀人之國不以禮見而陽若相遇春秋因實書之而貶寓焉三月鄭伯使宛來歸祊祊音崩公穀作邴左傳曰鄭請以泰山之祊易許田杜氏曰鄭桓公周宣王母弟封鄭有助祭泰山湯沐之邑在祊祊在琅邪費縣東南成王營王城賜周公許田以為魯國朝宿之邑鄭欲以祊易許田各從本國所近之宜永嘉吕氏曰祊者鄭之邑而近于魯許田者魯之邑而近于鄭左氏言鄭以祊易許田經有來歸祊之文未見其有易許田之事也桓公即位而後鄭伯以璧假許田則假許田在桓公之世而不在隱公之世矣左氏以其事比言而謂之易也是時鄭將以結魯而非魯結鄭前年來輸平則約之以言今年來歸祊則啖之以利致惠以結魯好將為糾合之地爾雖然其歸祊也固已覬覦許田矣特以方求結于魯故姑緩之既而桓公篡立于是要其許田始取償于魯歸字有二義有以還其所有謂之歸有以易而言歸來歸祊是鄭以歸于魯非魯取于鄭也髙氏曰鄭人來輸平然名輸而實不至于是歸祊急于欲得魯援先儒以為易許田非也桓二年鄭伯以璧假許田是隱公之時實未嘗易張氏曰祊在今沂州之屬縣魯鄭各以其所近之邑相易此謀始于輸平之時先以祊歸魯以固魯之好而隱公未許其易許田也鄭莊不憚委先祖所受王邑於人所謂將欲取之必固與之者卒使魯隱間齊于宋以成敗宋入許之計又終得許田于魯見鄭莊為小人之雄也澄曰宛鄭大夫再命者庚寅我入祊張氏曰此因鄭之歸我使吏治其故地而主有之也既不以力得則當如齊人歸我濟西田不必書入祊可也入者難辭義不當受而據有之永嘉吕氏曰來歸鄆歡龜隂田不言入蓋鄆歡龜隂我故物也此言入則非我故物也髙氏曰鄆歡龜隂本我之邑歸則有之矣此特書入者以其非我之有不當入者孟子謂子噲不得與人燕子之不得受燕于子噲鄭之歸魯之入其罪均也夏六月己亥蔡侯考父卒考父宣公也宣公以周平王二十二年壬辰為元年在位三十五年子封人嗣是為桓侯辛亥宿男卒不名義同滕侯秋七月庚午宋公齊侯衛侯盟于瓦屋榖梁傳曰諸侯之參盟于是始永嘉陳氏曰有參盟然後有主盟矣春秋之初宋魯衛陳蔡一黨也齊鄭一黨也鄭有志于叛王而合諸侯于是輸平于魯齊亦為艾之盟以平魯為瓦屋之盟以平宋衛東諸侯之交盛矣張氏曰瓦屋周地此宋衛欲成平于齊齊從其請而與之盟也春秋之初皆離㑹之盟至此而三君合以要言正可因此以講信修睦而眀年齊魯㑹防又明年齊魯鄭伐宋視今日誓盟之言不復顧世變之甚可勝言哉八月葬蔡宣公春秋書宣公而史記世家稱宣侯蓋蔡國之史記代代皆以侯配諡乃其國之私稱而史遷因之以禮之正當從春秋書公者為是九月辛卯公及莒人盟于浮來浮來公穀浮作包杜氏曰浮來紀邑東莞縣北有邳鄉邳鄉西有公來山張氏曰浮來莒地今沂州沂水縣有浮來山以國君之貴下比小國之大夫非莒人之敢敵諸侯公自失人君之體也澄曰莒小國其卿再命書名其大夫一命書人疑此是莒當國之卿再命當稱名者以國君與大夫盟故降稱人以厭之凡國君下同大夫例皆若是其大夫氏名不可沒者則不稱公也陸氏曰凡公與外大夫盟例不書公及齊髙徯晉處父盟是也莒小國也非大夫敢盟公公自欲與之盟爾特書公以明非大夫之罪也髙氏曰莒雖小國入向伐紀其力猶能及他人故公結此盟以求援螟為災故書髙氏曰春秋書螟者三隱二莊一螽者十有一桓一餘皆僖公之後螟食苗心螽無所不食其為災也螟輕而螽重冬十有二月無駭卒此公子展之孫夷伯展禽其後也生未三命故不氏卒乃賜氏曰展以王父之字為氏也經書月六書日五大衍歷正月辛未大丁酉冬至二月辛丑小丁卯大寒三月庚午大經庚寅二十一日戊戌雨水四月庚子小戊辰春分閏月己巳大五月己亥小己亥榖雨經六月己亥辛亥在此月六月戊辰大經七月庚午在此月七月戊戌小八月丁卯大經九月辛卯在此月九月丁酉小十月丙寅大十一月丙申小十二月乙丑大長歷庚寅三月二十二日己亥六月二日辛亥十四日庚午七月四日辛卯九月二十六日九年丁卯桓王六年蔡桓侯封人元年曺桓四十三衛宣五晉哀四鄭莊三十陳桓三十一杞武三十七宋殤六齊僖十七秦寧二楚武二十七春天王使南季來聘榖梁傳曰南氏也季字也澄曰天子之大夫四命稱氏稱字程子曰王法之行時加聘問以懷撫諸侯常禮也春秋諸侯不修朝覲之禮王反聘之又不見答張氏曰隱公十年之間宰咺凡伯南季三至魯庭隱公朝聘之禮不行于王室春秋詳王使之來魯讀者自知隱公之罪胡氏曰經書公如京師者一朝于王所者二卿大夫如京師者五舉魯一國則天下諸侯怠慢不臣可知矣書天王來聘者七錫命者三賵葬者四則問于他邦及齊晉秦楚之大國又可知矣王之不王諸侯之不臣如此君臣上下之分易矣三月癸酉大雨震電庚辰大雨雪雨于付切榖梁傳曰震雷也電霆也隂陽錯行八日之間再有大變髙氏曰大者非常之辭大雨震電者大雨而又震電也建寅之月而震電八日之間復大雨雪雨自上下者震電者陽精之發雨雪者隂氣之凝杜氏曰三月今正月夏之正月微陽始出未可以震電既震電又不當大雨雪挾卒挾音叶公榖作俠挾魯大夫之再命者再命例書名不氏義同無駭夏城郎杜氏曰郎魯邑髙平方與縣東南有郎亭襄陵許氏曰七年城中丘而後伐邾今城郎而後伐宋髙氏曰魯自受祊之後將為鄭伐宋又恐他國之有議其後者故城郎以備之秋七月冬公㑹齊侯于防防公作邴左傳曰謀伐宋也杜氏曰防魯城在琅邪華縣東南張氏曰今密州諸城縣有防城魯隱六年受輸平八年歸祊入祊志于昵鄭而仇宋于是為防之㑹俾齊僖背瓦屋之盟此謀為明年伐宋之地也髙氏曰此齊背瓦屋之盟與公連謀為鄭伐宋也隱公得利則合鄭既歸祊與齊鄭併力齊之强大可以為助可以伐人故諸侯爭與之盟宋既與之謀鄭而魯鄭又與之謀宋也經書月二書日二大衍厯正月乙未小壬寅冬至二月甲子大三月甲午小四月癸亥大經三月癸酉庚辰在此月五月癸巳大六月癸亥小七月壬辰大八月壬戌小九月辛卯大十月辛酉小十一月庚寅大傳甲寅二十五日十二月庚申小長厯是年閏十月癸酉三月十一日庚辰十八日十年戊辰桓王七年蔡桓二曺桓四十四衛宣六晉哀五鄭莊三十一陳桓三十二杞武三十八宋殤七齊僖十八秦寧三楚武二十八春王二月公㑹齊侯鄭伯于中丘左傳曰為師期髙氏曰將伐宋二國相㑹為師期七年城中丘蓋為此㑹爾夏翬帥師㑹齊人鄭人伐宋髙氏曰公元年及宋盟宿四年又遇于清和好非一日矣今一旦以兵加之始為宋謀鄭既得鄭利今為鄭謀宋又欲得宋利也唯知貪利不復顧義也程子曰三國先遣將致伐齊鄭稱人非卿也六月壬戌公敗宋師于菅菅音奸杜氏曰齊鄭後期故公獨敗宋師書敗宋未陳也菅宋地劉氏曰皆陳曰戰詐戰曰敗辛未取郜郜音告辛巳取防左傳曰鄭入郜入防歸于我杜氏曰濟隂城武縣東南有郜城髙平昌邑縣西南有西防城公獨敗宋師鄭伯後至頻獨進兵以入郜防得二邑歸于魯張氏曰鄭莊以齊之背宋從已魯之力也故得二邑而不取俾魯取之春秋書取著其無名而擅取之也劉氏曰經書公敗宋師取郜取防豈得如傳言哉薛氏曰乘菅之勝十日而攘二邑書取我奪之于宋也取非其有者也髙氏曰公以祊故翬先㑹伐而自將悉力以敗宋師浹旬之間取其二邑魯受人不義之惠遂興兵伐同盟無罪之國以報私惠是以春秋書法如此秋宋人衛人入鄭左傳曰鄭師入郊猶在郊宋衛入鄭程子曰鄭勞民以務外而不知守其國故二國入之髙氏曰宋又連衛以報鄭鄭幸菅之敗而不備故師還及郊宋衛已乘其虛而入之矣春秋雖無義戰未有奇譎輕疾如宋衛之入鄭者宋人蔡人衛人伐戴鄭伯伐取之戴公榖作載左傳曰宋衛既入鄭而以伐戴召蔡人蔡人從之伐戴鄭伯圍戴克之取三師焉澄曰取猶哀九年宋皇瑗取鄭師于雍丘哀十二年鄭罕達取宋師于嵒之取謂敗其兵而悉俘其衆也程子曰戴鄭所與故鄭戴合攻盡取三國之衆髙氏曰宋既連兵入鄭又乘勝召蔡人伐戴戴鄭所與之微國伐之所以報鄭也鄭又伺三國之便伐而取之盡得三師之輜重焉是宋衛雖能入鄭不能弱鄭也杜氏曰三國之君在戴故鄭伯合圍之陳留外黃縣東南有戴城張氏曰戴國舊城在今開封府考城縣冬十月壬午齊人鄭人入郕髙氏曰戴鄭所與也而三國伐之郕衛所與也而齊鄭入之薛氏曰於此郕再入矣諸侯專兵而小國無以措其手足澄曰蓋自五年衛師入郕之後郕遂服屬于衛故為衛之與經書月三書日四大衍歷正月己丑大丁未冬至傳癸丑二十五日二月己未小三月戊子大四月戊午小五月丁亥大六月丁巳小經壬戌六日辛未十五日辛巳二十五日七月丙戌大傳庚寅五日八月丙辰小傳壬戌七日九月乙酉大十月乙卯大經壬午二十八日十一月乙酉小十二月甲寅大二十九日壬午小雪長厯壬戌六月七日辛未十六日辛巳二十六日壬午十月二十九日十有一年己巳桓王八年蔡桓三曺桓四十五衛宣七晉哀六鄭莊三十二陳桓三十三杞武三十九宋殤八齊僖十九秦寧四楚武二十九春滕侯薛侯來朝榖梁傳曰諸侯來朝犆言同時也纍數皆至也范氏曰犆言謂别言同時來不俱至若穀伯綏來朝鄧侯吾離來朝也纍數總言之同時俱至若滕侯薛侯來朝也張氏曰薛夏奚仲之後國都在魯國薛縣劉氏曰王者之制諸侯嵗相問殷相聘世相朝兼言之何譏旅見也非天子不旅見諸侯諸侯相旅見非禮也澄曰大戴記朝事篇載諸侯相朝之禮相朝者兩君以禮相見論語所謂兩君之好是也惟諸侯朝天子可以旅見諸侯相朝但書時見今滕薛二國同日行禮後書邾牟葛三國來朝亦然俱為非禮孫氏曰齊晉宋衛未嘗朝魯而滕薛邾杞來朝齊晉盛也宋衛敵也滕薛邾杞土地狹陋兵衆寡弱不能與魯伉也夏五月左無此二字公㑹鄭伯于時來時來公作祁黎左傳曰謀伐許也杜氏曰時來鄭地滎陽縣東有釐城張氏曰今屬鄭州髙氏曰公既得宋地又㑹鄭謀許貪欲無厭也澄曰鄭莊以小利餌魯隱既與之伐宋為鄭報怨矣又將與之同伐許為鄭益地許與鄭接壤鄭之所利齊魯無與焉者也鄭伯以計鈎致齊魯之君而借其兵力吞併小國以利益於已甚哉鄭之不仁而齊魯之不知也秋七月壬午公及齊侯鄭伯入許左傳曰伐許傳于許瑕叔盈取鄭伯之旗蝥􅋃以先登鄭師畢登遂入許許莊公奔衛齊侯以許讓公公曰君謂許不共故從君討之許既伏其罪矣雖君有命寡人不敢與聞乃與鄭人鄭伯使許大夫奉許叔居許東偏使公孫獲處許西偏張氏曰許今潁昌府長杜縣髙氏曰魯既為鄭敗宋師今又為鄭入許蓋由歸祊之故也澄按欲得許地者鄭之本謀遂破許國者鄭之專功特以借齊魯兵力以同伐齊以國大爵尊為主兵既入許鄭莊陽不有其功而讓于齊齊侯以克許非已功而不敢受乃以讓魯魯又以克許非已功而不敢受乃以與鄭鄭即受之而不辭竟得遂其貪土地之志齊魯二君墮鄭之術中而為之出力也書入不書滅者許君既奔他國鄭雖專有其地而使許君之弟奉其宗廟不絶其祀也入者亡國之善辭何善也以為猶愈于取其土地而并絶其宗祀者爾冬十有一月壬辰公薨左傳曰羽父請殺桓公將以求太宰公曰為其少故也吾將授之矣使營菟裘吾將老焉羽父懼反譖公于桓公而請弒之公祭鍾巫齊于社圃館于蒍氏羽父使賊弒公立桓公而討蒍氏不書葬不成喪也公羊傳曰公薨不地不忍言也君弒賊不討不書葬以為無臣子也澄曰君薨必詳其地以示正終不地者不暇辨其正不正而有不忍言者蓋弒也君弒臣子當戮力討賊以復讐故賊未討則不敢葬其不知討賊而遂葬者臣子之不忠孝而忘君父之讐也經書月三書日二大衍厯正月甲申小閏月癸丑大二月癸未小三月壬子大四月壬午小五月辛亥大六月辛巳小傳五月甲辰在此月七月庚戌大八月庚辰小經七月壬午在此月九月己酉大十月己卯小十一月戊申大傳十月壬戌在此月十二月戊寅大經十一月壬辰在此月長歷壬午七月三日壬辰十一月十五日春秋纂言卷一
