陽齊為邑黃縣越在衛為地在東為國巢在南為國在曹為邑蜀在魯屬泰山在西為國濮在吳越為夷國在東蔡為地名鄢一在鄭一在楚密在莒屬淳于在魯屬費縣楚丘戎巳氏邑在宋魯間一衛所遷防一在齊一在魯蒲在晉屬平陽在衛屬陳留虛一在宋一在晉穀在齊屬穀城在楚屬南郡柯在齊為祝柯在衛為內黃洮一在曹一在魯夷儀一屬邢一屬齊鹹一在魯一在衛孟宋屬順昌晉屬太原鄆一魯東姑幕一魯西廩丘平陽魯平陽縣晉平陽府辰陵一在陳一在鄭鄢陵莒屬邑穆伯所奔鄭穎川晉楚所戰重丘一屬齊一屬曹紅一魯宋界上一楚以封子南里一在宋一在鄭王城馮翊武鄉有王城河陽郟鄏亦王城鄧在南為國在魯為地在鄭為邑或云蔡地州一在晉州縣一在杞淳于一在楚華容陽一國名界齊魯一楚邑一在燕中山唐一在魯一在晉一在楚清在衛為邑晉為地齊為邑棠魯濟上邑又齊即墨楚六合櫟一在鄭一在晉一在楚莘一在蔡一在虢一在衛夷一在齊即墨一在陳城父一為周來地新城鄭新密晉蒲屈宋穀熟皆名棘一在齊西安一在魯濟國一在燕譙北以上國名地名有名同而地在兩處三處者重纂于此其考訂未及該載未盡者不能悉備也鄭伯使宛來歸祊我入祊隱八鄭伯以璧假許田桓元取濟西田僖二十一齊人取濟西田宣元齊人歸我濟西田宣十取汶陽田成二晉侯使韓穿來言汶陽之田歸之于齊成八齊人來歸鄆歡龜陰田定十齊人取歡及闡哀八齊人歸歡及闡同上叔弓帥師疆鄆田昭元莒牟夷以牟婁及防兹來奔昭五取邾田自漷水襄十九邾庶其以漆閭丘來奔襄二十一黑肱以濫來奔昭三十一取漷東田及沂西田哀二諸侯各有分地受之天子傳之先君或以已便私易或以兵力彊取或以霸令奪彼與此或以盜臣竊邑適他皆紊王制也其餘滅國取邑見後軍禮篇爵周公周在岐山之陽即太王所都之地為文王子旦之采邑武王既克商封旦於魯旦為三公留王朝不之國其子孫在王朝者世襲公爵稱為周公僖九年㑹葵丘之宰名孔僖三十年來聘之宰名閲成十二年出奔晉者名楚桓十八年傳所云周公黑肩者孔之兄也祭公周公之𦙍祭在開封長垣縣隱元年書伯桓八年書公蓋由伯爵進公爵也或云公蓋伯之子也王朝三公八命有封國則從九命之爵稱公經所書皆以爵配國邑伯與子亦如之祭伯隱元詳見祭公下凡伯凡亦周公之𦙍國在衛州共城縣隱七渠伯桓四年書宰渠伯糾來聘渠亦當是采邑之名而伯爵者也杜注左傳以渠為氏者非毛伯文王之子康王時以公爵兼冬官卿蓋其子孫之爵為伯文元年來錫命九年來求金者名衛昭十八年傳云毛得殺毛伯過昭二十六年以子朝奔楚者毛得也召伯召奭之采邑在扶風雍縣東南武王既克商封奭於燕留王朝不之國其子孫在王朝者襲爵稱召伯平王東遷周召采地皆入於秦孔穎達謂東周别賜采邑而存周召之本名文五年來㑹葬者召昭公也宣十五年王札子所殺者召戴公也成八年來錫命者召桓公也昭二十二年黨子朝者召莊公奐也王朝六卿六命有封國則從七命之爵稱伯尹子蓋尹吉甫之後詩所刺太師尹氏也魯隱三年書卒昭三十三年立王子朝二十六年以王子朝奔楚單子成元年傳云如晉拜成十七年經兩書㑹伐鄭者單襄公也襄三年盟雞澤者單頃公也昭二十二年以王猛入二十六年逐子朝者單穆公也劉子魯隱十一年王取劉於鄭後為王季子之采邑宣十年書王季子來聘即劉康公也意其時未食于劉成十三年㑹伐秦書劉子襄十五年逆王后者定公夏也昭十三年㑹平丘者獻公摯也昭二十二年以王猛入二十六年遂子朝者劉蚠也定四年㑹召陵書卒者文公卷也王朝中下大夫四命有封邑則從五命之爵稱子凡諸侯國在畿外者其爵五等王朝之臣國在畿內者爵止三等無侯爵男爵字南季隱九仍叔桓五家父桓八五桓十榮叔莊元文五祭叔莊二十三祭三見經初書伯繼書公此又以邑為氏而書字豈公之後不世爵而為四命之大夫與王朝中下大夫四命無封邑者經所書以字配氏宋孔父魯單伯陳女叔鄭蔡仲大國卿之上有孤亦四命經所書以字配氏與王朝大夫同宋上公之國自應有孤魯有單伯則以周公之國故也陳有女叔則以虞帝之後故也鄭有蔡仲宣王寵其弟故得如大國之有孤然非禮也氏宰咺隱元叔服文元劉夏襄十五石尚定十四王朝上士三命經所書以氏配名公子益師公子彄臧孫辰臧孫許臧孫紇公子慶父公孫敖仲孫蔑仲孫速仲孫羯仲孫貜仲孫何忌公子牙公孫兹叔孫得臣叔孫僑如叔孫豹叔孫婼叔孫不敢叔孫州仇公子友季孫行父季孫宿季孫意如季孫斯公子結公子遂公孫歸父仲嬰齊叔仲彭生公孫嬰齊叔老叔弓叔輒叔鞅叔詣叔還公子憗此魯卿也大國之卿三命書氏名與王朝上士同凡爵稱公侯地方百里為大國伯爵子爵之國不應有三命之卿其有之者僣踰亂制也宋公子地公孫夀仇牧子哀華元華弱華閲華臣華定華合比華害向戌向寧向巢樂大心樂祁犂樂髠仲幾仲他魚石石彄皇瑗晉里克㔻鄭父陽處父狐射姑箕鄭父荀息荀林父荀庚荀首荀瑩荀偃荀吳荀盈荀躒荀寅士穀士燮士丐士魴士鞅士吉射趙盾趙穿趙同趙括趙武趙鞅郤缺郤克郤犨郤錡郤至韓穿韓厥韓起韓不信先蔑先都先縠欒書欒黶欒盈胥甲父胥童魏曼多齊髙傒髙固髙無咎髙厚髙止髙偃髙發髙張國歸父國佐國弱國夏國書崔杼慶封欒施陳乞陳公子招公子留公子過公孫寧公孫他人轅濤塗轅僑轅頗泄冶夏徵舒夏齧夏區夫慶虎慶寅儀行父針宜咎孔奐干徵師衛公子瑕公孫剽元咺寧速寧俞寧殖寧喜孫免孫良夫孫林父北宫括北宫他北宫喜北宫結孔達孔圉石買石惡石曼姑世叔儀世叔申世叔齊公孟彄公叔戌趙陽蔡公子燮公子履公子駟公子歸生公孫姓公孫獵公孫辰公孫霍朝吳鄭公子歸生公子去疾公子喜公子鰌公子發公子騑公子嘉公孫輒公孫舍之公孫蠆公孫夏公孫段公孫黑良霄罕虎罕達游吉遊速國參駟𢎞曹公子首公孫㑹楚公子嬰齊公子側公子壬夫公子貞公子午公子追舒公子圍公子比公子棄疾公子結公子申屈完屈建屈申薳罷成熊郤宛囊瓦三命之卿經書其氏名者魯之外有九國名實王朝中士再命經書名無駭挾翬柔溺此魯大夫之再命者也鄭段宛詹申侯紀裂繻衛州吁宋督萬陳他齊無知莒慶拿牟夷楚宜申得臣椒秦術邾庶其快畀我吳札再命者書名宋督為太宰止是再命之大夫蓋未三命則未賜氏也若段若州吁若他若無知雖非再命之大夫然其屬為公子公孫故亦得稱名同於再命者人王人王朝下士一命經書王人宋人晉人齊人陳人蔡人衛人秦人鄭人曹人薛人燕人荆人楚人吳人莒人邾人小邾人徐人許人牟人葛人江人黃人介人巴人越人狄人上國之士一命者其次國之大夫小國之卿亦皆稱人亦有外裔之君稱人者亦有國君厭於王國卿厭於君而降稱人者詳見經注盜盜竊寶玉大弓定八盜謂陽虎盜殺蔡侯申哀四盜謂公孫翩盜殺衛侯之兄縶昭二十盜謂齊豹楮師圃公子朝盜殺鄭公子騑公子發公孫輒襄十盜謂尉止司臣侯晉堵女父子師僕盜殺陳夏區夫哀十三凡經書人者雖賤亦是一命或士或大夫或卿陽虎季氏家臣不命者也公孫翩齊豹尉止輩蓋皆不命之人主謀非一羣不逞共成其事不可專指為誰不命則雖食祿與庶人同爾以庶人而竊物出境以庶人而聚衆殺人均之為盜也兄弟天王弟佞夫襄三十公弟叔肸宣十七齊侯弟年隱七桓九鄭伯弟語桓十四宋公弟辰定十一秦伯弟針昭元陳侯弟黃襄二十二十三陳侯弟招昭八衛侯弟黑肩成十衛侯弟鱄襄二十七衛侯兄縶昭二十三命書氏名再命書名雖王公之子亦然王子公子未再命得書名與再命同者以其屬之貴也故特表其屬曰某公某侯之弟若兄見其非再命之卿大夫也陳公子招既為三命之卿書氏名矣又書陳侯弟招者欲見其為世子偃師之叔父非以命卿殺世子也許叔桓十五蔡叔桓十一蔡季桓十七紀季莊三蕭叔莊二十二凡諸侯之弟二君而非君者稱字鄭入許許莊公奔衛許無君矣鄭使許叔奉其祀後值鄭亂乃入于許而為君蔡叔蔡季皆蔡桓侯弟桓侯無子卒之時蔡叔想已不在故召蔡季于陳而立之書季者明其以君之二而得及也齊將滅紀紀侯命其弟分紀之半入於齊為附庸以存先祀蕭宋附庸之小國也使其弟代君而朝魯已非禮矣魯又受其朝于野益非禮也世子世子來朝一曹射姑桓九世子㑹諸侯十宋成一成十五齊光八襄三五再九十再十一再宋佐一昭四世子復歸一鄭忽桓十五世子出奔一衛蒯聵定十四納世子一衛蒯聵哀二殺世子三晉申生僖五宋痤襄二十六陳偃師昭八執世子一蔡有昭十一世子弒君三楚商臣文九蔡般襄三十許止昭十九諸侯世子書于經者二十一代君行朝禮與㑹盟與伐國皆非世子之所宜也命數經書爵字氏名及人並準命數即位王正月公即位七桓文宣成襄昭哀元年六月戊辰公即位一定元年不書即位四隱莊僖閔啖氏曰天子諸侯崩薨既殯而嗣子為君未就阼階之位來年正月朔乃就位南面而稱元年凡先君正終則嗣子踰年行即位禮文成襄昭哀五公是也先君遇弒則嗣子廢即位禮不忍行也莊僖二公是也繼弒君而行即位禮則是與聞乎弒也桓宣二公是也澄按隱公之不即位三傳皆謂隱欲讓桓以桓尚少而暫攝君事故不行即位禮閔之不即位說者以為子般被弒欲以同於繼弒君不即位之例然般之卒霸主及魯臣皆無討賊者則胡孫程髙氏謂非弒者近是蓋般卒後慶父欲干其位慶父如齊而魯人立閔閔之立非慶父意也時慶父擅國權欲不以閔公行即位禮此其無君之心不待弒閔而後見也立衛人立晉隱四尹氏立王子朝昭二十三立者非前傳後承之正故傳云立者不宜立也所立雖是亦非正禮也歸蔡季自陳歸于蔡桓十七蔡侯盧歸于蔡昭十三陳侯吳歸于陳同上此歸而得國者也突歸于鄭桓十一赤歸于曹莊二十四此歸而篡國者也突赤不繫國不當有國也衛侯鄭歸于衛僖三十曹伯歸自京師成十六歸邾子益于邾哀八此君之去國而歸者也鄭世子忽復歸于鄭桓十五曹伯襄復歸于曹僖二十八衛侯衎復歸于衛襄二十六衛侯鄭自楚復歸于衛僖二十八此亦君之去國而歸者書曰復歸歸之善也復者還反其舊之謂國本其所有不幸失國而去今得復其國而歸也衛成公懼晉之辱不得已奔楚復歸曰自楚喜其去楚而即夏也衛元咺自晉復歸于衛僖二十八此臣之去國而歸者書曰復歸歸之惡也復歸之辭在君為善在臣為惡臣從君者也得歸幸矣奚復之云君去臣復亢君不順也晉趙鞅歸于晉定十三衛孫林父自晉歸于衛成十四宋華元自晉歸于宋成十五陳侯之弟黃自楚歸于陳襄二十二楚公子比自晉歸于楚昭十三衛公孟彄自齊歸于衛哀十季子來歸閔元此亦臣之去國而歸者入劉子單子以王猛入于王城昭二十二天王入于成周昭二十六悼王居于皇自皇而入于城也敬王居于狄泉自狄泉而入成周也入者難辭有子朝之難故難也許叔入于許桓十五齊小白入于齊莊九齊陽生入于齊哀六莒去疾自齊入于莒昭元此入而得國者也或歸而得國或入而得國歸易入難也小白陽生去疾以名繫國者雖未入國之先國人已欲君之矣鄭伯突入于櫟桓十五衛侯朔入于衛莊六衛侯入于夷儀襄二十五此君之去國而入者也于櫟于夷儀未能入其國也衛孫林父入于戚以叛襄二十六晉趙鞅入于晉陽以叛定十三晉荀寅士吉射入于朝歌以叛同上宋華亥向寧華定自陳入于宋南里以叛昭二十一宋公之弟辰及仲他石彄公子地自陳入于蕭以叛定十一鄭良霄自許入于鄭襄三十宋樂大心自曹入于蕭定十一宋魚石復入于彭城成十八晉欒盈復入于晉入于曲沃襄二十一此臣之去國而入以叛君者也復入者自外還反而入于其國之邑也臣之復歸已惡况復入乎陸德明音復入之復扶又切非是宜依復歸例音服紀季以􅈶入于齊莊五此雖以地入于他國而非叛者也納公伐齊納糾莊九晉人納捷菑于邾弗克納文十四晉趙鞅帥師納衛世子蒯瞶于戚哀二楚人圍陳納頓子于頓僖二十五齊髙偃帥師納北燕伯于陽昭十三楚子入陳納公孫寧儀行父于陳定十一入則難於歸然入者其自入也納者內弗受而外人欲以力彊入之也居天王出居于鄭僖二十四劉子單子以王猛居于皇昭二十二天王居于狄泉昭二十三公至自齊居于鄆昭二十六再二十七再二十九一天王居畿內則不書出居畿外則書出居者非其所宜居也在公在楚襄二十九公在乾侯昭三十三十一三十二公居雖非所宜居然猶吾土也曰在者非吾土也孫公孫于齊昭二十五夫人孫于齊莊元夫人姜氏孫于邾閔二魯君魯夫人出奔書孫者諱國惡謂若孫讓而去也奔周公出奔晉成十二王臣出奔者一王臣之言出不言出與天王同一例鄭伯突出奔蔡桓十五衛侯朔出奔齊桓十六衛侯出奔楚僖二十八衛侯衎出奔齊襄十四北燕伯欵出奔齊昭三蔡侯朱出奔楚昭二十一以上諸侯出奔者六啖氏曰凡君奔例書名言其失地非復諸侯也衛侯出奔楚不名者令叔武攝位而去未嘗失地也鄭忽出奔衛桓十一曹羈出奔陳莊二十四莒展輿出奔吳昭元以上未成君之諸侯出奔者三趙氏曰未踰年之君出奔書名不書爵不能嗣先君也展輿雖踰年猶不書爵衛世子蒯瞶出奔宋定十四陳侯之弟黃出奔楚襄二十衛侯之弟鱄出奔晉襄二十七秦伯之弟針出奔晉昭元宋公之弟底暨仲他石彄出奔陳宣十以上諸侯之世子與弟出奔者五公子慶父出奔莒閔二叔孫僑如出奔齊莊十六臧孫紇出奔邾宣十公子憗出奔齊昭十二以上魯臣出奔者四齊崔氏出奔衛宣十宋萬出奔陳莊十二衛元咺出奔晉僖二十八晉狐射姑出奔狄文六衛孫林父出奔晉成七宋華元出奔晉成十五宋魚石出奔楚同上齊髙無咎出奔莒成十七宋華臣出奔陳襄十七蔡公子履出奔楚襄二十晉欒盈出奔楚襄二十一陳針宜臼出奔楚襄二十四衛石惡出奔晉襄二十八齊髙止出奔北燕襄二十九鄭良霄出奔許襄三十楚公子比出奔晉昭元宋華合比出奔衛昭六陳公子留出奔鄭昭八蔡朝吳出奔鄭昭十五曹公孫㑹自鄸出奔宋昭二十宋華亥向寧華定出奔陳同上宋華亥向寧華定自宋南里出奔楚昭二十二楚囊瓦出奔鄭定四宋樂大心出奔曹定十宋公子地出奔陳同上衛趙陽出奔宋定十四衛公孟彄出奔陳同上蔡公孫展出奔吳哀四陳轅頗出奔鄭哀十一衛世叔齊出奔宋同上以上諸侯之臣出奔者三十郕伯來奔文十一莒子庚輿來奔昭二十二邾子益來奔哀十宋公之弟辰自蕭來奔定十四以上諸侯與諸侯之弟來奔者四郕伯不名蓋小國不知其君之名也宋司城來奔文八宋子哀來奔文十四宋華弱來奔哀六邾畀我來奔襄二十三齊慶封來奔襄二十八齊欒施來奔昭十邾快來奔昭二十七衛公叔戍來奔定十四衛北宫結來奔同上齊國夏及髙張來奔哀六以上諸侯之臣來奔者十宋司城嘗官而不名見經注邾庶其以漆閭丘來奔襄二十二莒牟夷以牟妻及防兹來奔昭五邾黑肱以濫來奔昭三十一以上諸侯之臣以地來奔者三齊師滅談談子奔莒莊十楚人滅弦弦子奔黃僖五狄滅溫溫子奔衛僖卜吳滅徐徐子章羽奔楚昭三十王子瑕奔晉襄三十尹氏召伯毛伯以王子朝奔楚昭二十六晉人及秦人戰于河曲晉先蔑奔秦文七公孫敖如京師不至而復丙戌奔莒哀八歸父還自晉至笙遂奔齊以上奔不書出者九蓋出者對入而言談弦溫徐之君國已滅矣無復有可入之國王子瑖王子朝亂臣也其奔逃死而已無後有可入之時故不書出其不名者小國不知其名也晉先蔑魯公孫敖公孫歸父皆在道而奔非自中國而出故亦不書出曹公孫㑹之自鄸宋華亥向寧華定之自南里則自宋國之地而出他國故書出也去紀侯大去其國莊四去其國者不奔他國為寓公也逃鄭伯逃歸僖五陳侯逃歸襄六鄭詹自齊逃來莊十七趙氏曰凡言逃者義當留而竊去也故穀梁云逃義曰逃君臣同辭逃者匹夫之事也弒戕楚世子商臣弒其君頵文元蔡世子般弒其君固襄十許世子止弒其君買昭十六齊公子商人弒其君舍文十四鄭公子歸生弒其君夷宣四楚公子比弒其君䖍于乾溪昭十三衛州吁弒其君完隱四齊無知弒其君諸兒莊八晉里克弒其君卓僖十晉趙盾弒其君夷臯宣二陳夏徴舒弒其君平國宣十齊崔杼弒其君光襄二十五衛寧喜弒其君剽襄二十六齊陳乞弒其君荼襄六宋督弒其君與夷桓二宋萬弒其君捷莊十二宋人弒其君杵臼文十六齊人弒其君商人六十八莒人弒其君密州襄三十一莒弒其君庶其文十八晉弒其君州蒲成十八吳弒其君僚昭二十二薛弒其君比定十三閽弒吳子餘祭襄二十九盜殺蔡侯申哀四十二國弒君凡二十五賊子弒其父者三貴戚三命之卿弒其君者三貴戚不為卿者二異姓三命之卿弒其君者六異姓未三命者二人弒者三一命之臣也國弒者四一國臣民之衆所同弒也閽者越俘本非吳臣故不稱其君然亦在官故書弒盜者衆賊不得君其君視如路人又非閽人之比故書殺不書弒噫夫子作春秋以誅亂臣賊子使春秋不作則許悼之弒人必曰藥所誤也鄭靈之弒人必曰公子宋也楚靈之弒人必曰縊于申亥之家也晉靈之弒人必曰趙穿攻之於桃園也齊孺子之弒人必曰朱毛殺之於野幕也今夫子正名定罪曰止弒買歸生弒夷比弒䖍盾弒夷臯乞弒荼誅其意而弒君之罪無所逃亂臣賊子之所以懼也晉里克殺其君之子奚齊僖九齊人取子糾殺之莊九以上殺未成君者二奚齊雖已君黑克不君也糾魯所立齊人不君之故但書殺而不曰弒也楚子䖍誘蔡侯般殺之于申昭十一楚子誘戎蠻子殺之昭十六蔡公孫姓帥師滅沈以沈子嘉歸殺之定四邾人執甑子用之僖十九邾人戕鄫子于鄫宣十八以上殺他國君者五雖非本國之人所弒然亦國君之不得命終者故附于弒君例之後蔡般嘗弒父矣而楚子殺之非討賊也故不得與楚人殺陳夏徵舒同齊商人亦嘗弒君矣而齊人殺之非討賊也故不得與齊人殺無知同殺刺衛人殺州吁于濮隱四齊人殺無知莊九蔡人殺陳他桓六楚人殺陳夏徵舒宣十一晉殺其大夫里克僖十衛殺其大夫寧喜襄二十七楚公子棄疾殺公子比昭十三以上殺篡弒賊者上衛齊能自討賊陳之賊獨待蔡人楚人討之無臣子矣晉惠因里克弒君而得國衛獻因寧喜弒君而復國利其所為容之為大夫既而殺之非討賊也故以國殺大夫為文楚公子棄疾誘公子比以為君之利而俾當弒君之名既而殺之直欲奪其位耳非討賊也故以兩下相殺為文鄭殺其大夫申侯僖七晉殺其大夫㔻鄭父僖十二楚殺其大夫得臣僖二十八衛殺其大夫元咺及公子瑕僖三十晉殺其大夫陽處父文六楚殺其大夫宜申文十陳殺其大夫泄冶宣九晉殺其大夫先縠宣十二衛殺其大夫孔達宣十四晉殺其大夫趙同趙括成八宋殺其大夫山成十五楚殺其大夫公子側成十六晉殺其大夫郤錡郤犨郤至成十七晉殺其大夫胥童成十八齊殺其大夫國佐同上楚殺其大夫公子申襄二楚殺其大夫公子壬夫襄五齊殺其大夫髙厚襄十九鄭殺其大夫公子嘉同上蔡殺其大夫公子燮襄二十楚殺其大夫公子追舒襄二十二陳殺其大夫慶虎及慶寅襄二十三鄭殺其大夫公孫黑昭二楚殺其大夫屈申昭五楚殺其大夫成熊昭十三楚殺其大夫郤宛昭二十七蔡殺其大夫公子駟哀二蔡殺其大夫公孫姓公孫霍哀四以上國殺大夫者二十八并後無氏名者凡三十鄭申侯楚得臣宜申宋山再命故有名無氏其餘書氏名者皆三命大夫也曹殺其大夫莊二十六宋殺其大夫僖二十五宋人殺其大夫文七宋人殺其大夫司馬文八以上殺大夫不稱氏名者四蓋被殺者無罪故也其稱官者官名遵舊典未嘗改易故特書之晉人殺其大夫先都文九晉人殺其大夫士縠及箕鄭父同上陳人殺其大夫公子過昭八以上人殺大夫者三通前無氏名者凡五國殺者出於君人殺者國亂無政而衆殺之也晉人殺欒盈襄二十三鄭人殺良霄襄三十以上殺已出大夫者二陳人殺其公子御冦莊二十二莒殺其公子意恢昭十四公子買戍衛不卒戍刺之僖二十八刺公子偃成十六以上殺公子不為大夫者四御冦意恢若是三命則公子之上應有大夫字若是再命則應有大夫字無公子字今無大夫字有公子字公子者其屬也非氏也殺其公之子名某者爾魯之刺買刺偃公子亦非氏也以公子之貴而稱名與再命之大夫同也天王殺其弟佞夫襄二十六晉侯殺其世子申生僖五宋公殺其世子痤襄二十六陳侯之弟招殺陳世子偃師成八以上殺母弟世子者四王札子殺召伯毛伯宣十五兩下相殺者一楚師滅陳殺陳孔奐昭八殺他國臣者三楚殺陳于師殺齊慶封見後執例下盜殺者三殺衛侯兄鄭陳大夫已見前盜例下殺君及其大夫者三宋督弒君及大夫孔父宋萬弒君及大夫仇牧晉里克弒君及大夫荀息執晉侯執曹伯歸之于京師成十五晉人執衛侯歸之于京師僖二十八晉人執戎蠻子赤歸于楚哀四晉侯入曹執曹伯畀宋人僖二十八宋公楚子陳蔡鄭許曹㑹于盂執宋公以伐宋僖二十一晉人執虞公僖五晉人執鄭伯成九晉人執莒子邾子以歸襄十六晉人執邾子襄十九楚人執徐子昭四宋人執小邾子襄四宋人執滕子嬰齊僖十九邾人執鄫子用之同上楚師滅蔡執蔡世子有以歸用之昭十一以上執國君與世子者十四楚師滅陳執陳公子招放之于越昭八楚子伐吳執齊慶封殺之昭四宋人執鄭祭仲桓十一齊人執鄭詹莊十七齊人執陳轅濤塗僖四晉人執衛寧喜襄二十六晉人執宋仲幾于京師定元楚人執鄭行人良霄襄十一楚人執鄭行人干徴師殺之昭八齊人執衛行人北宫結以侵衛定七晉人執衛行人石買襄十八晉人執宋行人樂祁犂定六以上執諸國臣者十二晉人執我行人叔孫婼昭二十二晉人執季孫意如以歸昭十三晉人執季孫行父舍之于苕丘成十六齊人執單伯文十四齊人執子叔姬同上以上執魯臣與魯女者五放晉放其大夫胥甲父于衛宣元蔡人放其大夫公孫獵于吳哀三楚執陳公子招放之于越見前執例下春秋纂言總例卷二
