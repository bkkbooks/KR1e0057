body:
  text: 春秋纂言總例卷二元吳澄撰人紀王周姬姓其先帝嚳之𦙍名棄在唐虞時為稷官封於邰子不窋失官竄戎狄其孫公劉國於邠太王亶父去邠居岐周文王昌自岐周徙豐武王發伐商有天下都鎬傳成王誦康王釗昭王瑕穆王滿共王伊扈懿王囏孝王辟方夷王燮厲王胡宣王靖幽王宫涅十二世至平王宜臼幽王太子也幽王嬖褒姒欲立其子伯服廢申后及太子太子奔申申侯與犬戎弒幽王太子嗣立遷洛都王城四十九年為魯隱公元年春秋之始在位五十一年隱三年崩太子泄父早卒孫桓王林繼元年為魯隱公四年在位二十三年桓十五年崩子莊王他嗣元年為魯桓公十六年在位十五年莊十二年崩經不書子僖王胡齊嗣元年為魯莊公十三年在位五年莊十七年崩經不書子惠王䦘嗣元年為魯莊公十八年在位二十六年僖八年崩子襄王鄭嗣元年為魯僖公九年在位三十三年文八年崩子頃王王臣嗣元年為魯文公九年在位六年文十四年崩經不書子匡王班嗣元年為魯文公十五年在位六年宣二年崩弟定王瑜立元年為魯宣公三年在位二十一年成五年崩子簡王夷嗣元年為魯成公六年在位十四年襄元年崩子靈王泄心嗣元年為魯襄公二年在位二十七年襄二十八年崩子景王貴嗣元年為魯襄公二十九年在位二十五年昭二十二年崩景王太子夀早卒立王子猛未踰年卒猛之弟敬王丐立元年為魯昭公二十三年四年徙都洛之成周三十九年為魯哀公十四年春秋之終在位四十四年哀十九年崩其後又有元王仁七年貞王介二十八年考王嵬十五年威烈王午二十四年安王驕二十六年烈王喜七年顯王扁四十八年慎靚王定六年赧王延自成周遷王城五十九年周亡周有天下八百餘年約計四百年在春秋前二百四十二年在春秋中二百二十五年在春秋後天王三十闕天字三誤王字為子一歸物三隱元歸賵文五歸含賵闕天定十四歸脤聘七隱七九桓四五八僖三十宣十錫命三莊元闕天文元成八誤王為子來一桓十五㑹葬二文元五闕天居二僖二十四昭二十三入一昭二十六狩一僖二十八殺一襄三十崩九隱三桓十五僖八文八宣二成五襄元二十八昭二十二王月百三十三闕王十三不與從王一桓五王所二僖二十八再王室一昭二十二王師一成元王后二桓八襄十五王世子一僖五王子周自平王始入春秋為一世生太子泄父王子狐為二世狐無後泄父早卒生桓王為三世桓王生莊王王子克為四世克無後莊王生僖王王子虎王子頽為五世虎見經别為王叔氏諡文公王叔桓公王叔陳生其後也頽無後僖王生惠王為六世惠王生襄王王子帶為七世帶别為甘氏諡昭公八世成公九世景公十世簡公悼公過平公鰌十一世桓公襄王生頃王為八世頃王生匡王定王王札子王季子為九世札子季子見經札子無後季子别為劉氏諡康公十世定公夏十一世獻公十二世文公卷十三世桓公定王生簡王為十世簡王生靈王儋季為十一世儋季别為儋氏十二世括十三世翩靈王生景王王子佞夫為十二世佞夫見經無後景王生王子夀王子猛敬王王子朝為十三世子猛子朝見經王姬五莊元逆築館歸於齊歸齊襄公也莊二卒莊十一歸於齊歸齊桓公也公宋公爵子姓商之後周武王伐商封紂庶兄微子啓于宋以奉湯祀國在商丘後為亳州應天府傳微仲衍公稽丁公申閔公共煬公熙厲公鮮僖公舉惠公覸哀公戴公武公司空宣公力穆公和七年入春秋魯隱二年卒殤公與夷立魯桓二年弒莊公馮立魯莊二年卒閔公捷嗣魯莊十二年弒桓公御說立魯僖九年卒襄公兹父嗣魯僖二十三年卒成公王臣嗣魯文七年卒昭公杵臼嗣魯文十八年弒文公鮑立魯成二年卒共公瑕嗣魯成十五年卒平公成嗣魯昭十年卒元公佐嗣魯昭二十五年卒景公頭曼嗣二十六年春秋終在位六十四年卒又有昭公特悼公購由休公田公辟兵公剔成公偃至周赦王二十九年齊魏楚滅之宋亡凡畿外諸侯必王者之後乃爵為公所謂上公九命之國地方百里經所書公爵惟此一國州郭虞則畿內之公也州公爵姜姓寰內諸侯在王畿之內蘇忿生采地十二邑之一也後為州公食邑在今孟州溫縣左氏誤以淳于公為州公淳于蓋杞之邑在密州髙密縣非州國也郭公爵姬姓郭虢二字蓋通用傳記皆作虢唯春秋經書郭公文王二弟虢仲虢叔武王克商封仲及叔謂之二虢仲所封在陜州陜縣叔所封在鳯翔府虢縣皆王畿采邑虞公爵姬姓太王第二子仲虢生季簡季簡生叔達叔達生周章虞仲及武王克商求大伯仲雍之後得周章已為吳君乃别封其弟虞仲於周之北故夏墟為西吳後世謂之虞公自虞仲至虞公十二世侯晉侯爵姬姓周武王之子成王之弟虞封於唐故唐城在絳州翼城縣西二十里堯之苖裔所封成王時國亂滅之而封虞唐叔子燮徙居晉水旁在并州晉城縣北二里改唐為晉傳武侯寧族成侯服人厲侯福靖侯宜臼僖侯司徒獻侯籍穆侯費王殤叔文侯仇昭侯伯封文侯弟成師為曲沃桓叔其邑大於晉國傳莊伯鮮十一年入春秋魯隱七年卒武公稱嗣晉昭侯傳孝侯平鄂侯鄀二年入春秋魯隱五年卒哀侯光嗣魯桓二年曲沃武公虜哀侯小子侯立魯桓七年曲沃武公弒之哀侯弟緡立魯莊十六年曲沃武公弒緡周僖王命武公為晉侯魯莊十七年卒獻公詭諸嗣魯僖九年卒奚齊立弒卓子立魯僖公十年弒惠公夷吾立魯僖二十四年卒文公重耳立魯僖三十二年卒襄公歡嗣魯文六年卒靈公夷臯嗣魯宣二年弒成公黑臀立魯宣九年卒景公獳嗣魯成十年卒厲公州蒲立魯成十八年弒襄公孫悼公周立魯襄十五年卒平公彪嗣魯昭十年卒昭公夷嗣魯昭十六年卒頃公去疾嗣魯昭三十年卒定公午嗣三十一年春秋終三十七年卒後有出公鑿哀公驕幽公栁烈公止十九年周威烈王命魏趙韓三卿為侯三十七年卒至孝公頎靜公俱酒二年三侯滅晉分其地晉祀絶齊侯爵姜姓周西伯文王得太公吕尚為師後相武王伐紂封於齊傳丁公仡乙公得癸公慈母哀公不辰胡公靜獻公山武公夀厲公無忌文公赤成公脫莊公購僖公祿父九年入春秋魯桓十四年卒襄公諸兒嗣魯莊八年弒桓公小白立魯僖十七年卒第三子孝公昭嗣魯僖二十七年卒桓公第四子昭公潘立魯文十四年卒子舍嗣桓八第五子懿公商人弒之而立魯文十八年弒桓公第二子惠公元立魯宣十年卒頃公無野嗣魯成九年卒靈公環嗣魯襄十九年卒莊公光嗣魯襄二十五年弒景公杵臼嗣魯哀五年卒孺子荼嗣魯哀六年弒悼公陽生立魯哀十年卒簡公壬嗣魯哀十四年弒又有平公驁宣公積康公貸十九年周王命田和為齊侯二十六年卒吕氏絶祀蔡侯爵姬姓文王子度初食邑於蔡武王分紂都之南國之於鄘後被紂子武庚誘之以畔而放成王復封其子胡於蔡傳侯荒宫侯厲侯武侯夷侯僖侯所事共侯興戴侯宣公考父二十八年入春秋魯隱八年卒桓公封人嗣魯桓十七年卒哀侯獻舞立魯莊十九年卒于楚穆侯肸嗣魯僖十四年卒莊公甲午嗣魯文十五年卒文公申嗣魯宣十七年卒景公固嗣魯襄三十年弒靈公般立魯昭十一年楚子殺之國滅魯昭十五年平公廬歸國魯昭二十年卒悼公東國立魯昭二十三年卒于楚昭公申立魯哀四年盜殺之成公朔嗣十年春秋終魯哀二十三年卒後有聲公産元公侯齊歷三十四年楚惠王滅之蔡絶祀衛侯爵姬姓文王子封初食邑於康武王分紂都之東國之于衛傳康伯牟考伯嗣伯庭伯靖伯貞伯頃侯僖侯羡武公和莊公楊桓公完十二年入春秋魯隱四年弒宣公晉立魯桓十二年卒惠公朔立魯莊二十五年卒懿公赤嗣魯閔二年為狄所殺戴公申立卒文公燬立魯僖二十五年卒成公鄭嗣魯宣九年卒穆公遫嗣魯成二年卒定公臧嗣魯成十四年卒獻公衎嗣魯襄十四年奔齊定公弟殤公剽立魯襄二十年弒獻公衎復歸魯襄二十九年卒襄公惡嗣魯昭七年卒靈公元立魯哀二年卒出公輒立莊公蒯瞶入于戚魯哀十二年入國出公出春秋後魯哀十七年莊公出魯哀十八年出公復入在位共二十五年卒于越後有悼公黔敬公弗昭公糾懷公亹慎公頽聲公訓成侯速平侯嗣君懷君元君君角二十二年秦二世廢之為庶人衛絶祀陳侯爵媯姓舜之後虞閼父為周陶正武王封其子胡公滿于陳傳申公犀侯相公臯羊孝公突慎公圉戎幽公寧僖公孝武公震夷公恱平公燮文公圉桓公鮑二十三年入春秋魯桓五年卒弟他殺太子免代立桓六年蔡人殺他立厲公躍魯桓十二年卒宣公杵臼立魯僖十三年卒穆公欵嗣魯僖二十八年卒共公朔嗣魯文十三年卒靈公平國嗣魯宣十年弒次年楚立成公午魯襄四年卒哀公溺嗣魯昭八年卒弟招殺太子偃師楚滅陳魯昭十三年偃師之子惠公吳歸國魯定公四年卒懷公栁嗣魯定八年卒閔公越嗣二十一年春秋終魯哀十七年楚滅陳凡畿外大國皆爵為侯七命地方百里經所書此五國有初大而後漸降於次國者有中微而後浸踰於大國者滕侯爵姬姓文王子叔繡武王封之於滕國在徐州滕縣繡至宣公十七世魯隱七年卒書侯者不知名諡蓋宣公之父若祖魯隱十一年來朝書侯自後降為子終春秋之世魯僖十九年嬰齊為宋所執傳云滕宣公宣公之孫昭公魯宣元年卒文公嗣立魯成十六年卒子成公嗣立魯昭三年卒悼公寧嗣立魯昭二十八年卒頃公結網立魯哀四年卒隱公虞公嗣立魯哀十一年卒薛侯爵任姓夏封黃帝之後奚仲為薛侯後遷于邳仲虺居薛為湯左相周武王復以其胄為薛侯杜預云國在魯國薛縣春秋魯隱十一年來朝書侯魯莊三十一年卒書伯不知名諡自此以後終春秋皆書伯獻公穀魯昭三十二年卒襄公定魯定十二年卒伯比魯定十三年弒惠公夷魯哀十年卒紀侯爵姜姓國在臨朐縣東夀光縣西鄧侯爵曼姓國在襄陽府鄧城縣魯桓七年吾離來朝書侯邢侯爵姬姓周公之𦙍國在信德府魯僖十六年㑹于淮書侯隨侯爵姬姓國在隨州隨縣魯哀元年經始書侯滕薛紀鄧邢隨其初均是七命百里之侯後浸削小僅可比於小國故滕自侯降為子薛自侯降為伯紀鄧邢未降爵國先亡隨雖未亡為楚私屬不列於諸侯至哀十年經始書隨侯蓋楚昭王德之而俾列於諸侯也伯秦伯爵嬴姓周孝王封柏翳之後非子為附庸邑于秦傳秦侯公伯秦仲莊公襄公文公春秋魯隱公元年為文公四十四年五十年卒寧公十二年出子六年武公二十年德公二年宣公十二年成公四年穆公任好三十九年康公罃嗣魯文十八年經始書卒共公稻嗣魯宣四年卒桓公榮嗣魯定十四年卒景公厚嗣魯昭五年卒哀公嗣魯定九年卒惠公立魯哀三年卒僖公嗣春秋後魯哀十八年卒又有厲共公躁公懷公靈公簡公惠公出子獻公孝公惠文王武王昭襄王孝文王莊襄王始皇帝并天下鄭伯爵姬姓周宣王封弟友于鄭縣是為桓公後并東虢及檜遷焉犬戎殺之武公掘突嗣莊公寤生嗣二十二年入春秋魯桓十一年卒厲公突篡立魯桓十五年出昭公忽復歸十七年弒立子亹魯桓十八年被殺立子儀魯莊十四年被殺厲公歸國莊二十一年卒文公捷嗣魯僖二十二年卒穆公蘭嗣魯宣三年卒靈公夷嗣魯宣四年弒襄公堅立魯成四年卒悼公費立魯成六年卒成公㫻立魯襄二年卒僖公髠頑嗣魯襄七年卒簡公嘉嗣魯昭十二年卒定公寧嗣魯昭二十八年卒獻公蠆嗣魯定九年卒聲公勝嗣在位三十年春秋後卒又有哀公易共公丑幽公已繻公駘君乙在位二十一年韓滅鄭曹伯爵姬姓武王