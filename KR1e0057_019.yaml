body:
  text: 春秋纂言卷十二元吳澄撰哀公名蔣定公子母定姒在位二十七年其十四年春春秋絶筆元年丁未敬王二十六年晉霸定十八年蔡昭二十五年曹陽八年衛靈四十一年鄭聲七年陳閔八年杞僖十二年宋景二十三年齊景五十四年秦惠七年楚昭二十二年吳夫差二年春王正月公即位楚子陳侯隨侯許男圍蔡左傳曰楚子圍蔡報柏舉也蔡人男女以辨使疆於江汝之間而還蔡於是乎請遷于吳胡氏曰蔡嘗以吳師入郢壞宗廟徙陳器撻平王之墓矣至是楚國復寧帥師圍蔡降其衆遷其國楚子復讐也襄陵許氏曰蔡侯怨楚不思本務修德俟時而輕謀兵革以得志於大國是益禍也故蔡昭之智愧於勾踐矣杜氏曰隨世服於楚不通中國吳之入楚昭王奔隨隨人免之卒復楚國楚人德之使列於諸侯故得見經定六年鄭滅許此復見者蓋楚封之鼷鼠食郊牛改卜牛牛下公有角字杜氏曰不言所食所食非一處胡氏曰改卜牛不敬也夏四月辛巳郊榖梁傳曰四月郊不時也范氏曰春秋書郊終於此髙氏曰雖改卜牛猶非郊時况公斬然在衰絰之中輒行天子之禮以見上帝可乎胡氏曰天子祭天地諸侯祭社稷大夫祭五祀庶人祭其祖此定理也成王退念周公有大勳勞於天下而欲尊魯故賜以重祭得郊禘大雩魯郊常事不書聖人因其失禮之中又有失焉因事而書為後世戒其垂訓之義大矣秋齊侯衛侯伐晉左傳曰齊侯衛侯會于乾侯救范氏也師及齊師衛孔圉鮮虞人伐晉取棘蒲襄陵許氏曰楚得專封王道盡矣晉受衆伐霸統亡矣春秋之變至此而窮髙氏曰五氏垂葭之役聖人書次以存晉晉至是而益衰聖人不復以盟主待之矣書齊侯衛侯伐晉見霸統之絶而受諸侯之伐也以傳考之魯及鮮虞之師在焉春秋以齊衛首惡故沒魯而略鮮虞也夫范中行氏者晉之卿也卿叛而不能制又豈能主諸侯乎無惑乎齊侯衛侯之見伐也蓋晉定公召陵之役不能得楚而蔡昭公以吳子勝於是齊鄭衛背之已而我睦齊鄭宋人效之俱叛晉者也文公之業掃地盡矣又十有三年吳人爭長於黃池雖欲為成景悼厲之世且不可得矣悲夫冬仲孫何忌帥師伐邾觀定公之末邾之事魯至矣去嵗邾子來奔喪今逾年而遽伐之蓋魯人謀邾久矣利取其田不復知有禮義也經書月二書日一大衍厯正月戊申小丙辰冬至二月丁丑大三月丁未小四月丙子大辛巳六日五月丙午小六月乙亥大七月乙巳小八月甲戌大九月甲辰小十月癸酉大十一月癸卯小十二月壬申大二年戊申敬王二十七年晉霸定十九蔡昭二十六曹陽九衛靈四十二卒鄭聲八陳閔九杞僖十三宋景二十四齊景五十五秦惠八楚昭二十三吳夫差三春王二月季孫斯叔孫州仇仲孫何忌帥師伐邾取漷東田及沂西田漷火虢切左傳曰伐邾將伐絞邾人愛其土故賂以漷沂之田而受盟髙氏曰定公之薨邾子來奔喪非能行禮也知三家者欲并其地故事魯不敢不恭然卒不免故元年伐邾至是三卿同伐而取漷沂之田入春秋未有伐國取田者也師氏曰前此嘗伐邾取其田自漷水矣今又取其漷東之田猶以為未足故又取沂西之田則其貪欲無厭必至於盡取而後已可知也以區區之邾國而魯兩納其叛人之邑三取其田時無王霸強凌弱之亂至於如此癸巳叔孫州仇仲孫何忌及邾子盟于句繹句古侯切杜氏曰句繹邾地劉氏曰曷為三人伐而二人􅉀季孫臨之叔仲成之季孫之汰也蓋自謂猶君矣夏四月丙子衛侯元卒左傳曰初衛侯逰於郊子南僕公曰余無子將立女不對它日又謂之對曰郢不足以辱社稷君其改圖君夫人在堂三揖在下君命祇辱靈公卒夫人曰命公子郢為太子君命也對曰郢異於他子且君沒於吾手若有之郢必聞之且亡人之子輒在乃立輒澄按靈公在位四十二年滕子來朝公新立故晉趙鞅帥師納衛世子蒯聵于戚公羊傳曰戚者衛之邑也左傳曰使太子絻八人衰絰偽自衛逆者告於門哭而入遂居之榖梁傳曰帥師而納者有伐也以輒不受也胡氏曰凡公子出奔後而得國者順且易則曰歸有奉焉則曰自其難也則曰入不稱納况世子哉世子國之儲副位其所固有國其所宜君無所事乎納矣今趙鞅帥師以蒯聵復國而書納者衛人拒之不受也髙氏曰靈公卒衛人以世子在外遂立其子輒使輒知己之得立者以父為世子故因逆其父而還以位則子道得而亂息矣奈何他人納其父而反拒之邪凡奔者在外非有國逆不可入故趙鞅帥師納之其言納衛世子者名所納者正異乎趙盾納檚災于邾也其言于戚者見蒯聵為輒所拒而不得入于衛也張氏曰蒯聵無弒母之事二劉氏嘗辨之於定十四年出奔宋之傳矣春秋再以世子書之則知蒯聵無罪故春秋正其名而謂之世子也陸氏曰蒯聵雖奔而靈公未嘗廢之秋八月甲戌晉趙鞅帥師及鄭罕達帥師戰于鐵鄭師敗績鐵公作栗又作秩左傳曰齊人輸范氏栗鄭子姚子般送之士吉射逆之趙鞅禦之遇於戚郵無恤御簡子衛太子為右登鐵上鄭人擊簡子中肩斃於車中獲其蜂旗太子救之以戈鄭師北獲溫大夫趙羅太子復伐之鄭師大敗獲齊粟千車杜氏曰鐵衛地在戚城南冬十月葬衛靈公七月而葬父子爭國故也十有一月蔡遷于州來髙氏曰吳滅州來今夀春府下蔡縣是其地也初武王封叔度於汝南上蔡蔡叔以叛被誅成王復以封其子仲焉及平侯卒徙于新蔡至昭侯乃徙九江下蔡即州來是也蔡已降于楚復背楚而請遷于吳吳人許之故以自遷為文蔡殺其大夫公子駟左傳曰吳泄庸如蔡納聘而稍納師師畢入衆知之蔡侯告大夫殺公子駟以説杜氏曰元年蔡請遷于吳中悔故因聘襲之殺駟以説吳言不時遷駟之為胡氏曰楚既降蔡矣復背楚請遷于吳而又自悔也蔡介於吳楚二大國之間背楚誑吳及其事急又委罪於執政駟其以請遷為非者乎而委之罪誰復敢有盡忠謀國者哉經書月五書日三大衍厯正月壬寅大辛酉冬至二月壬申小癸巳二十二日三月辛丑大四月辛未小丙子六日五月庚子大六月庚午小七月己亥大八月己巳小甲戌六日九月戊戌大十月戊辰小十一月丁酉大十二月丁卯小長厯是年閏十一月三年己酉敬王二十八年晉霸定二十蔡昭二十七曹陽十衛出公輒元年鄭聲九陳閔十杞僖十四宋景二十五齊景五十六秦惠九楚昭二十四吳夫差四春齊國夏衛石曼姑帥師圍戚左傳曰齊衛圍戚求援於中山髙氏曰曼姑以臣圍君為子圍父逆亂人倫莫甚於此齊國夏帥師助之故為惡首齊與晉為仇若蒯聵入則衛從晉矣此齊所以助輒也襄陵許氏曰晉以君臣稱兵而齊為臣伐君衛以父子爭國而齊助子圍父以是令於諸侯君子是以知齊之將亂也胡氏曰為輒者奈何宜辭於國曰若以父為有罪將從王父之命則有社稷之鎮公子在我焉得為君以為無罪則國乃世子之所有也天下豈有無父之國哉夏四月甲午地震五月辛卯桓宫僖宫災左傳曰司繹火火踰公宫桓僖災孔子在陳聞火曰其桓僖乎杜氏曰桓僖親盡而廟不毁宜為天所災劉氏曰桓僖久矣其宫曷為不毁三家者出於桓立於僖以是為恱者也髙郵孫氏曰桓公者哀公之十世祖也僖公者哀公之七世祖也諸侯五廟而十世七世之廟存焉非禮矣髙氏曰諸侯五廟親盡則毁桓僖不毁三家者存之僣天子也聖人因其災而并録之君子於是乎知有天道也季孫斯叔孫州仇帥師城啓陽啓公作開杜氏曰魯黨范氏故懼晉比年四城啓陽今琅琊開陽縣襄陵許氏曰所城近敵故帥師焉地震廟災變異弗圖而取田城邑兵役相繼可謂不畏天命矣中失而外鍵本亡而末務此魯之季世也宋樂髠帥師伐曹髙氏曰曹本屬宋既而叛之襄陵許氏曰宋始窺曹曹不量力而姦強國不修德而圖大功則適足以取亡而已秋七月丙子季孫斯卒此意如之子季桓子也廣子肥嗣是曰康子蔡人放其大夫公孫獵于吳杜氏曰公子駟之黨高氏曰放大夫者國也而稱人衆人逐之也其放之于吳召亂之道也厥後蔡亂以公孫氏豈獵之黨歟冬十月癸卯秦伯卒惠公也子悼公嗣叔孫州仇仲孫何忌帥師圍邾髙氏曰邾子已受盟于句繹今二卿踰年而圍之是自敗其􅉀也雖邾政不修有以致冦然魯之棄信亦已甚矣自是􅉀不足恃春秋弗志也經書月四書日四大衍厯正月丙寅小旦日冬至二月乙未大三月乙丑小四月甲午大甲午旦日五月甲子大辛卯二十八日六月甲午小七月癸亥大丙子十四日八月癸巳小九月壬戌大十月壬辰小癸卯十二日十一月辛酉大十二月辛卯小四年庚戌敬王二十九年晉霸定二十一蔡昭二十八殺曹陽十一衛出二鄭聲十陳閔十一把僖十五宋景二十六齊景五十七秦悼公元年楚昭二十五吳夫差五春王二月庚戌盜殺蔡侯申左傳曰蔡昭侯將如吳諸大夫恐其又遷也公孫翩逐而射之入於家人而卒杜氏曰賤者故稱盜不言弒賤盜也孔氏曰公孫辰公孫姓公孫霍雖並是弒君之黨而非弒君之首首是公孫翩翩賤故稱盜盜賤不得有其君故不言弒其君宣十七年蔡侯申卒是文侯也世家文侯申生景侯固固生靈侯般般生隱太子今昭侯申隱太子之子是文侯玄孫與髙祖同名周人以諱事神二申未知孰誤澄按昭公在位二十八年子朔嗣是為成公蔡公孫辰出奔吳左傳曰公孫翩以兩矢門之衆莫敢進文之鍇執弓而先翩射之中肘鍇遂殺之故逐公孫辰而殺公孫姓公孫旴葬秦惠公宋人執小邾子襄陵許氏曰天下無霸故宋人得以執小邾子伐鄭入曹而無所忌夏蔡殺其大夫公孫姓公孫霍胡氏曰姓與霍皆翩之黨稱國以殺者二公孫蓋嘗謀國不使其君至於是而弗見庸者也晉人執戎蠻子赤歸于楚左傳曰楚人既克夷虎乃謀北方左司馬販申公夀餘葉公諸梁致蔡於負函致方城之外於繒關襲梁及霍單浮餘圍蠻氏蠻氏潰蠻子赤奔晉隂地司馬起豐析與狄戎以臨上雒左師軍于莬和右師軍于倉野使謂隂地之命大夫士蔑曰晉楚有􅉀好惡同之若將不廢寡君之願也不然將通於少習以聽命士蔑請諸趙孟趙孟曰晉國未寧安能惡於楚必速與之士蔑乃致九州之戎將裂田以與蠻子而城之且將為之卜蠻子聽卜遂執之與其五大夫以畀楚師于三户司馬致邑立宗焉以誘其遺民而盡俘以歸吕氏曰昭十六年楚子誘戎蠻子殺之戎蠻近楚之地故晉人執其君而歸于楚畏楚之強也髙氏曰諸侯有罪方伯請命於天子問罪然後執而歸于京師正也不請王命而執之歸于京師若晉人執衛侯歸于京師罪尚可容若晉侯入曹執曹伯畀宋人執諸侯畀諸侯其罪尤重今晉為中國􅉀主而執戎蠻子歸于楚以君臣言則楚為君矣以強弱言則楚為霸矣胡氏曰云歸于楚者猶曰京師楚也晉主夏盟為日久矣不競至此春秋所惡城西郛杜氏曰備晉也六月辛丑亳社災亳公作蒲孔氏曰殷有天下作都于亳亳社殷社也蓋武王伐紂使諸侯各立其社以戒亡國其社有屋故火得焚之災天火也秋八月甲寅滕子結卒頃公也在位二十三年子虞母嗣是為隱公冬十有二月葬蔡昭公髙氏曰國亂故緩春秋於定哀之際録昭公尤詳者哀其不幸也當齊桓晉文之隆蔡猶不能自拔於楚凌遲至於標季而昭公乃鋭然合中國以興召陵之會卒能以吳破楚入郢此其志力有過人者遭晉德之不競而不能逺撫使之卒陷于吳楚之禍君子是以哀昭公之不幸而為之數見於經也使昭公出於晉悼之世其功烈當何如哉葬滕頃公經書月四書日三大衍厯正月庚申大壬申冬至二月庚寅小庚戌二十一日三月己未大四月己丑小五月戊午大六月戊子小辛丑十四日七月丁巳大八月丁亥小甲寅二十八日九月丙辰大十月丙戌大十一月丙辰小十二月乙酉大五年辛亥敬王三十年晉霸定二十二蔡成侯朔元年曹陽十二衛出三鄭聲十一陳閔十二杞僖十六宋景二十七齊景五十八卒秦悼二楚昭二十六吳夫差六春城毗毗頻夷切公作比杜氏曰備晉也夏齊侯伐宋髙氏曰伐宋者以求宋也晉侯失霸宋人之齊人爭之是以伐而求之得宋則霸可圖矣晉趙鞅帥師伐衛髙氏曰衛不受蒯瞶且受范中行氏故也秋九月癸酉齊侯杵臼卒杵公作處左傳曰齊燕姬生子不成而死諸子鬻姒之子荼嬖諸大夫恐其為太子也言於公曰君之齒長矣未有太子若之何公曰二三子間於憂虞則有疾疢亦姑謀樂何憂於無君公疾使國惠子髙昭子立荼置羣公子於萊公子嘉公子駒公子黔奔衛公子鉏公子陽生來奔澄按景公在位五十八年冬叔還如齊髙氏曰使卿吊且會葬也閏月葬齊景公公羊傳曰閏不書此何以書喪以閏數也喪以閏數喪事略也張氏曰景公五十八年前有晏嬰後有孔子晏嬰告之以陳氏將竊其國孔子告以君君臣臣父父子子公亦知説而從之矣而卒不能用及大臣以未有太子告之反使之姑謀樂而勿憂無君卒致身死肉未寒子死國亂曽未十年陳恆弒簡公而移其社稷景公之卒葬書于春秋豈不為享國日久而曽無逺慮者之戒經書月二書日一大衍厯正月乙卯小丁丑冬至二月甲申大三月甲寅小四月癸未大五月癸丑小六月壬午大七月壬子小八月辛巳大閏月辛亥小經九月癸酉今在閏月九月庚辰大十月庚戌小十一月己卯大十二月己酉大長厯是年閏十月癸酉九月二十一日六年壬子敬王三十一年晉霸定二十三蔡成二曹陽十三衛出四鄭聲十二陳閔十三杞僖十七宋景二十八齊安孺子荼元年秦悼三楚昭二十七卒吳夫差七春城邾瑕瑕音遐公作葭杜氏曰任城亢父縣北有邾婁城髙氏曰瑕邾邑魯未嘗取於邾而遽城之見魯之迫邾也是年冬伐邾明年遂入邾邾益微弱魯以不義強城之也聖人因其城而繫之邾者不與魯之擅并人土地也晉趙鞅帥師伐鮮虞左傳曰治范氏之亂也杜氏曰四年鮮虞納荀寅於柏人吳伐陳髙氏曰陳楚與也吳之入楚使召陳侯陳侯不來吳人怨之元年侵陳今復伐陳修怨也陳自是與吳成夏齊國夏及髙張來奔左傳曰齊陳乞偽事髙國者又謂諸大夫曰二子恃得君而欲謀二三子盍及其未作也先諸大夫從之陳乞鮑牧及諸大夫以甲入于公宫昭子聞之與惠子乘如公戰于莊敗國人追之國夏奔莒遂及髙張晏圉弦施來奔蘇氏曰陳乞將立陽生乃先逐國髙襄陵許氏曰髙國奔而後陳乞弒君之謀得肆叔還會吳于柤柤莊加切襄陵許氏曰叔還以吳在柤故往會之始結吳好也以魯政之不修務與吳親以資其力君子知魯之將有吳患矣秋七月庚寅楚子軫卒左傳曰楚子在城父將救陳卜戰不吉卜退不吉王曰然則死也再敗楚師不如死棄􅉀逃讐亦不如死命公子申為王不可則命公子結亦不可則命公子啓五辭而後許將戰王有疾攻大冥卒于城父子閭退曰君王舍其子而讓羣臣敢忘君乎從君之命順也立君之子亦順也與子西子期謀潛師閉塗逆越女之子章立之而後還髙氏曰昭王委政囊瓦寵費無極使賢人誅戮諸侯怨叛入郢之禍宫汙冡發幾不免其身迄得反國而卒於位者國有一申包胥也齊陽生入于齊左傳曰陳僖子使召公子陽生夜至於齊僖子使子士之母養之與饋者皆入立之使胡姬以安孺子如賴去鬻姒殺王甲拘江説囚王豹于句竇之丘髙氏曰係陽生于齊者與小白同義不書自魯者魯無助也齊陳乞弒其君荼荼音舒公作舍左傳曰公使朱毛告於陳子曰微子則不及此然君異於器不可以二器二不匱君二多難敢布諸大夫僖子不對而泣曰君舉不信羣臣乎以齊國之困困又有憂少君不可以訪是以求長君庶亦能容羣臣乎不然夫孺子何罪毛復命公悔之毛曰君大訪於陳子而圖其小可也使毛遷孺子於駘不至殺諸野幕之下葬諸殳冒淳杜氏曰弒荼者朱毛陽生也而書陳乞以明乞立陽生而荼見弒則禍由乞始也髙氏曰春秋書弒君之賊雖其人不自為必以禍所從發為主所以誅其意也冬仲孫何忌帥師伐邾髙氏曰魯人必欲滅邾而後已自公即位以來四書邾役積明年入邾之亂宋向巢帥師伐曹髙氏曰樂髠伐之猶未服且為入曹起也經書月一書日一大衍厯正月己卯小壬午冬至二月戊申大三月戊寅小四月丁未大五月丁丑小六月丙午大七月丙子小庚寅十五日八月乙巳大九月乙亥小十月甲辰大十一月甲戌小十二月癸卯大七年癸丑敬王三十二年晉霸定二十四蔡成三曹陽十四衛出五鄭聲十三陳閔十四杞僖十八宋景二十九齊悼公陽生元年秦悼四楚惠王章元年吳夫差八春宋皇瑗帥師侵鄭左傳曰鄭叛晉故也髙氏曰晉衰齊亂故宋公窺霸也不務德而加兵於人非霸主之義故書侵張氏曰宋鄭始因隙地以起兵爭卒致各取其師以逞其殺人之志所以詳其交爭之實也襄陵許氏曰定十五年老丘之役鄭宋始搆怨至是復侵九年取鄭師于雍丘十三年取宋師于嵒晉魏曼多帥師侵衛左傳曰衛不服也杜氏曰五年晉伐衛至今未服髙氏曰衛侯棄其父至今六年矣猶未納也晉不以此致討而以范中行氏加兵于衛故書侵夏公會吳于鄫左傳曰吳來徵百牢子服景伯對曰先王未之有也吳人弗聽乃與之反自鄫以吳為無能為也張氏曰比年書會吳所以著哀公之失謀於始而遺患於後日也髙氏曰吳欲霸諸侯故魯先往會之杜氏曰鄫今琅琊鄫縣秋公伐邾八月己酉入邾以邾子益來左傳曰季康子欲伐邾乃饗大夫以謀之子服景伯曰小所以事大信也大所以保小仁也背大國不信伐小國不仁孟孫曰二三子以為何如對曰禹合諸侯於塗山執玉帛者萬國今其存者無數十焉唯大不字小小不事大也伐邾及范門茅成子請告於吳不許曰魯擊柝聞於邾吳二千里不三月不至何及於我師遂入邾處其公宫衆師盡掠邾衆保于繹師宵掠以邾子益來獻于亳社囚諸負瑕邾茅夷鴻以束帛乘韋自請救于吳曰魯弱晉而逺吳以陵我小國若夏盟于鄫衍秋而背之四方諸侯其何以事君且魯賦八百乘君之二也邾賦六百乘君之私也以私奉二唯君圖之蘇氏曰魯入邾以邾子益來而不書滅何也邾大夫茅夷鴻保於茅請救於吳明年吳為之伐魯魯復邾子故不言滅也在外曰以歸在內曰以來內外之别也宋人圍曹髙氏曰宋之伐曹數矣今又圍之亦已甚矣冬鄭駟𢎞帥師救曹左傳曰鄭桓子思曰宋人有曹鄭之患也不可以不救髙氏曰鄭與曹疏矣所以救曹者非志於義也欲報皇瑗之師也經書月一書日一大衍厯正月癸酉小丁亥冬至二月壬寅大三月壬申小四月辛丑大五月辛未大六月辛丑小七月庚午大八月庚子小己酉十日九月己巳大十月己亥小十一月戊辰大十二月戊戌小長厯是年閏十二月八年甲寅敬王三十三年晉霸定二十五蔡成四曹陽十五國亡衛出六鄭聲十四陳閔十五把僖十九卒宋景三十齊悼二秦悼五楚惠二吳夫差九春王正月宋公入曹以曹伯陽歸左傳曰曹伯陽即位好田弋曹鄙人公孫強好弋獲白鴈獻之且言田弋之説説之因訪政事有寵使為司城以聽政強言霸説於曹伯從之乃背晉而姦宋宋人伐之晉人不救築五邑於其郊曰黍丘揖丘大城鐘邘宋公伐曹將還褚師子肥殿曹人詬之不行師待之公聞之怒命反之遂滅曹執曹伯及司城強以歸殺之蘇氏曰此滅曹也其不書滅言自滅也猶虞之滅言晉人執虞公而不言滅也吳伐我左傳曰吳為邾故伐我武城克之吳師克東陽而進舍於五梧明日舍於蠶室明日舍於庚宗遂次於泗上吳人行成􅉀而還蘇氏曰不言四鄙而直言伐我兵加于國都也夏齊人取歡及闡闡公作僤程子曰內失邑不書已與之彼以非義而受則書取此與濟西田是也魯入邾而以其君來致齊怒吳伐故賂齊以説之歸邾子益于邾左傳曰齊侯使如吳請師將以伐我乃歸邾子髙氏曰邾嘗屬齊而益又齊之甥也齊如吳請師吳亦受邾之訴公懼吳師復來乃歸邾子以紓國難秋七月冬十有二月癸亥把伯過卒過古禾切僖公也在位十九年其子維嗣是為湣公齊人歸歡及闡孫氏曰公既歸邾子益故齊人歸歡及闡杜氏曰不言來命歸之無官使也經書月三書日一大衍厯正月丁卯大癸巳冬至二月丁酉小三月丙寅大四月丙申小五月乙丑大閏月乙未小六月甲子大七月甲午小八月癸亥大九月癸巳大十月癸亥小十一月壬辰大十二月壬戌小癸亥三日九年乙卯敬王三十四年晉霸定二十六蔡成五衛出七鄭聲十五陳閔十六杞閔公維元年宋景三十一齊悼三秦悼六楚惠三吳夫差十春王二月葬把僖公杜氏曰三月而葬速宋皇瑗帥師取鄭師于雍丘雍於勇切左傳曰鄭圍宋雍丘宋皇瑗圍鄭師每日遷舍壘合鄭師哭子姚救之大敗宋取鄭師使有能者無死以郟張與鄭羅歸孔氏曰覆而敗之曰取謂若羅網之所掩覆一軍皆見禽也杜氏曰雍丘屬陳留張氏曰今屬開封襄陵許氏曰春秋之季日尋干戈鄭以不義深入敵境而圍其邑此固喪師之道也夏楚人伐陳左傳曰陳即吳故也秋宋公伐鄭杜氏曰報雍丘冬十月經書月二書日無大衍厯正月辛卯大戊戌冬至二月辛酉小三月庚寅大四月庚申小五月己丑大六月己未小七月戊子大八月戊午小九月丁亥大十月丁巳小十一月丙戌大十二月丙辰大十年丙辰敬王三十五年晉霸定二十七蔡成六衛出八鄭聲十六陳閔十七把閔二宋景三十二齊悼四卒秦悼七楚惠四吳夫差十一春王二月邾子益來奔左傳曰邾子益無道吳子討而囚之使邾大夫奉太子革以為政邾子來奔齊甥也故遂奔齊髙氏曰先為魯所獲而又來奔其不知恥甚矣公會吳伐齊左傳曰齊侯使辭師于吳吳人曰昔嵗寡人聞命今又革之不知所從將進受命于君吳子使來警師伐齊公會吳子邾子郯子伐齊南鄙師于鄎三月戊戌齊侯陽生卒左傳曰齊人弒悼公赴于師吳子三日哭于軍門之外襄陵許氏曰人事之變有幸不幸而春秋之義裁成天地見正命焉澄曰當時以吳師在齊而公卒遂以為弒爾悼公在位四年子壬嗣是為簡公夏宋人伐鄭襄陵許氏曰春取其師秋又伐之明年夏又伐之惡其修怨不已也晉趙鞅帥師侵齊左傳曰取犂及轅毁髙唐之郭侵及賴而還襄陵許氏曰助吳亂華伐齊之喪具文以見其罪澄曰吳猶遭齊喪而去之晉乃乘齊喪而伐之曾吳之不若也髙氏曰齊率諸侯以二晉可討矣然趙鞅加兵於有喪之國聖人弗與也故書侵異乎士丐矣五月公至自伐齊師氏曰公會吳師以伐強齊吳人之心不可信而強齊之禍不可測其危可知矣髙氏曰齊魯接境而公會吳師伐之既聞其喪則遂班師可也所以久而不歸者公之進退制在吳故也葬齊悼公髙氏曰不及五月而葬簡也衛公孟彄自齊歸于衛髙氏曰公孟彄以蒯瞶之黨見逐晉納蒯瞶齊助出公而反納彄則知逐非其罪矣始彄奔鄭自鄭奔齊至是遂假齊之力以歸焉薛伯夷卒夷公作寅薛惠公也在位十二年秋葬薛惠公冬楚公子結帥師伐陳陳即吳不服楚故再伐之吳救陳左傳曰吳延州來季子救陳謂子期曰二君不務德而力爭諸侯民何罪焉我請退以為子名務德而安民乃還胡氏曰春秋惡首惡善解紛自誅亂臣討賊子之外凡書救者未有不善之也救在王室則罪諸侯子突救衛是也救在逺國則罪四鄰晉陽處父救江是也救在荒裔則罪中國楚公子貞帥師救鄭狄救齊吳救陳是也陳者有虞之後嘗為楚滅而僅存爾今又無故興師侵伐而列國諸侯縱其暴橫不能修方伯連率之職而吳能救之深著楚罪而傷中國之衰也經書月三書日一大衍厯正月丙戌小癸卯冬至二月乙卯大三月乙酉小戊戌十四日四月甲寅大五月甲申小六月癸丑大七月癸未小八月壬子大九月壬午小十月辛亥大十一月辛巳小十二月庚戌大長厯是年閏五月十有一年丁巳敬王三十六年晉霸定二十八蔡成七衛出九鄭聲十七陳閔十八把閔三宋景三十三齊簡公壬元年秦悼八楚惠五吳夫差十二春齊國書帥師伐我左傳曰齊為鄎故國書髙無丕帥師伐我及清季孫謂其宰冉求曰齊師在清必魯故也若之何求曰一子守二子從公禦諸竟季孫曰不能求曰居封疆之間季孫告二子二子不可求曰若不可則君無出一子帥師背城而戰季孫使從於朝俟於黨氏之溝武叔呼而問戰焉對曰君子有逺慮小人何知懿子強問之對曰小人慮材而言量力而共者也武叔曰是謂我不成丈夫也退而搜乘孟孺子泄帥右師顔羽御邴泄為右冉求帥左師管周父御樊遲為右老幼守宫次于雩門之外五日右師從之師及齊師戰于郊師入齊軍右師奔齊人從之陳瓘陳莊涉泗孟之側後入以為殿抽矢䇿其馬曰馬不進也林不狃徐步而死師獲甲首八十齊人不能師宵諜曰齊人遁冉有請從之三季孫弗許公為與其嬖僮汪錡乘皆死冉有用矛於齊師故能入其軍澄按郊之戰孟孺子所帥之右師敗幸而冉求所帥之左師不敗爾故能用矛入齊軍能獲其甲首八十能使齊人不能師皆冉師之勝也傳於冉求之師稱師於孟孺子之師稱右師使冉師亦如孟師魯其殆哉夏陳轅頗出奔鄭轅公作袁頗破可切又平聲左傳曰初轅頗為司徒賦封田以嫁公女有餘以為己大器國人逐之故出道渴其族轅咺進稻醴梁糗腵脯焉喜曰何其給也對曰器成而具曰何不吾諫對曰懼先行五月公會吳伐齊左傳曰為郊戰故會吳子伐齊克博至于嬴澄曰因齊國之見伐乃再會吳伐齊欲以報也甲戌齊國書帥師及吳戰于艾陵齊師敗績獲齊國書左傳曰中軍從王胥門巢將上軍王子姑曹將下軍展如將右軍齊國書將中軍髙無丕將上軍宗樓將下軍桑掩胥御國子戰于艾陵展如敗髙子國子敗胥門巢王卒助之大敗齊師獲國書公孫夏閭丘明陳書東郭書革車八百乘甲首三千以獻于公公使太史固歸國子之元髙氏曰書獲國書與宋華元同然華元生獲而國書死獲劉氏曰吳之無道犯間上國涉數千里之地以伐人之邦國書用齊內不能安其君外不能交鄰國而輕與之戰其不愛百姓也不亦甚乎秋七月辛酉滕子虞母卒隱公也在位六年冬十有一月葬滕隱公衛世叔齊出奔宋世榖作大左傳曰初疾娶于宋子朝其娣嬖子朝出孔文子使疾出其妻而妻之疾使侍人誘其初妻之娣置於犂而為之一宫如二妻文子怒欲攻之仲尼止之遂奪其妻或淫于外州外州人奪之軒以獻恥是二者故出髙氏曰春秋書內外大夫出奔者凡五十有八蓋君之股肱故重而書之然春秋之末何其出奔之多也是時政在大夫各欲自專始則相猜相忌終乃相攻相逐也經書月三書日二大衍厯正月庚辰小戊申冬至閏月己酉大二月己卯小三月戊申大四月戊寅大五月戊申小甲戌二十七日六月丁丑大七月丁未小辛酉十六日八月丙子大九月丙午小十月乙亥大十一月乙巳小十二月甲戌大十有二年戊午敬王三十七年晉霸定二十九蔡成八衛出十鄭聲十八陳閔十九杞閔四宋景三十四齊簡二秦悼九楚惠六吳夫差十三春用田賦左傳曰季孫欲以田賦使冉有訪諸仲尼仲尼不對而私於冉有曰君子之行也度於禮施取其厚事舉其中斂從其薄如是則以丘亦足矣若不度於禮而貪冒無厭則雖以田賦將又不足且子季孫若欲行而法則周公之典在若欲苟而行又何訪焉何氏曰軍賦十井不過一乘哀公外慕強吳空盡國儲故復用田賦田謂一井之田賦者斂取其財物也襄陵許氏曰以丘賦為不足於是更用田賦籍田而取之不待及丘也張氏曰田賦之實不書其詳於傳獨孔子言以丘足矣可見加賦於古合何氏許氏之説觀之可以得春秋之旨澄曰按賦法偹於一成成方十里有田百井內六十四井為一甸計五百七十六夫為一旅之衆當出兵車五乘步卒三百六十人甲士十五人戎馬二十四重車五乘將重車者百二十五人牛六十頭外有三十六井為二丘四井無征作丘甲者一甸之外所餘二丘亦計其夫數為二百八十八夫又出兵車二乘步卒百四十四人甲士六人戎馬八匹重車二乘將重車者五十人牛二十四頭先王之法一成百井惟一甸出賦其二丘不成甸者無賦及作丘甲則丘不成甸者亦賦矣作丘甲之後一成惟餘四井不成丘者無賦今用田賦則井不成丘者亦賦矣家語謂季康子欲以一井田出法賦焉何氏謂田者一井之田許氏謂籍井而取之不待及丘是也四井三十六夫雖不出車甲亦斂取其財物也夏五月甲辰孟子卒左傳曰昭夫人孟子卒昭公娶於吳故不書姓啖氏曰同姓不可書曰夫人姬氏薨而曰孟子卒劉氏曰孟子者昭公之夫人吳女也其稱孟子諱娶同姓也髙氏曰始昭公欲結好強吳以去三家因娶于吳以吳同姓而謂之吳孟子國人不以為非而昭公乃知避其名春秋亦因其實而書之曰孟子卒澄曰固是以同姓而不可書之亦以見魯臣不以夫人之禮喪之也昭公君也尚且逐出之而不得入薨于外而葬不偹禮况其夫人乎一書卒而二義具焉公會吳于橐臯槖章夜切又音橐左傳曰吳子使太宰嚭請尋􅉀公不欲使子貢對曰􅉀所以固信也故心以制之玉帛以奉之言以結之明神以要之寡君以為苟有􅉀焉弗可改也已若猶可改日􅉀何益今吾子曰必尋􅉀若可尋也亦可寒也乃不尋盟杜氏曰橐臯在淮南逡遒縣東南張氏曰地譜云逡遒在今廬州慎縣東南秋公會衛侯宋皇瑗于鄖鄖公作運左傳曰吳徵會于衛衛侯會吳于鄖公及衛侯宋皇瑗􅉀而卒辭吳􅉀吳人藩衛侯之舍子貢見太宰嚭語及衛故太宰嚭曰寡君願事衛君衛君之來也緩寡君懼故將止之子貢曰衛君之來必謀於其衆其衆或欲或否是以緩來其欲來者子之黨也其不欲來者子之讐也若執衛君是墮黨而崇讐也夫墮子者得其志矣且合諸侯而執衛君誰敢不懼墮黨崇讐而懼諸侯或者難以霸乎太宰嚭説乃舍衛侯杜氏曰鄖發陽也廣陵海陵縣東南有發繇亭張氏曰地譜吳地海陵今泰州城下宋向巢帥師伐鄭左傳曰宋鄭之間有隙地焉曰彌作頃丘玉暢嵒戈錫子産與宋人為成曰勿有是及宋平元之族自蕭奔鄭鄭人為之城嵒戈錫宋向巢伐鄭取錫殺元公之孫遂圍嵒鄭罕逺救嵒圍宋師冬十有二月螽左傳曰仲尼曰火伏而後蟄者畢今火猶西流司厯過也杜氏曰周十二月今十月是嵗應置閏而失不置雖書十二月實今之九月司歷誤一月九月之初尚溫故得有螽經書月二書日一大衍厯正月甲辰小癸丑冬至二月癸酉大三月癸卯小四月壬申大五月壬寅小甲辰三日六月辛未大七月辛丑小八月庚午大九月庚子大十月庚午小十一月己亥大十二月己巳小十有三年己未敬王三十八年晉霸定三十蔡成九衛出十一鄭聲十九陳閔二十杞閔五宋景三十五齊簡三秦悼十楚惠七吳夫差十四春鄭罕達帥師取宋師于嵒左傳曰宋向魋救其師鄭子賸使徇曰得桓魋者有賞魋也逃歸遂取宋師于嵒獲成歡郜延以六邑為墟孫氏曰報雍丘之師也二國覆師以相償報其惡如此夏許男成卒成公作成元公也國滅後楚立之去此二十二年子嗣公會晉侯及吳子于黃池公羊傳曰吳稱子吳主會也其言及吳子會兩霸之辭也左傳曰吳晉爭先吳人曰於周室我為長晉人曰於姬姓我為伯司馬寅曰夷德輕不忍久請少待之乃先晉人外傳吳語曰吳王昏秣馬食士夜中命服兵擐甲陳士卒百人以為徹行萬人以為方陳王中陳而立左右軍亦如之為帶甲三萬以勢攻昧明王乃秉桴親鼓三軍皆譁扣以振旅晉師大駭令董褐請事吳王曰天子有命周室卑約貢獻莫入今非王室不平安是憂億負晉衆庶不式諸戎狄楚秦將不長弟以力征一二兄弟之國孤欲守先君之班爵進則不敢退則不可孤之事君不得事君在今日董褐還致命乃告趙鞅曰臣觀吳王之色類有大憂將毒不可與戰主其許之先然不可徒許也趙鞅許諾令褐復命曰君掩王東海以淫名聞于天子則何有於周室夫命圭有命固曰吳伯不曰吳王諸侯是以敢辭夫諸侯無二君周室無二王君若無卑天子以干其不祥而曰吳公孤敢不順君命長弟許諾吳王乃退就幕而會吳公先歃晉侯亞之襄陵許氏曰左氏曰先晉國語曰先吳此二國史籍之異也顧自宋之􅉀晉已為楚所先陵遲至於黃池之時豈能復與吳爭國語信也胡氏曰吳主會其先晉紀常也春秋四夷雖大皆曰子吳僣王矣其稱子正名也先吳則拂經而失序列書則泯實而傳疑以會兩伯之辭而特書曰及順天地之經著􅉀會之實也杜氏曰陳留封丘縣南有黃亭近濟水張氏曰地譜東京開封縣有黃池楚公子申帥師伐陳髙氏曰楚畏吳之強無如之何故乘吳之出會而伐陳也於越入吳左傳曰越子伐吳為二隧疇無餘謳陽自南方先入郊其太子友王子地王孫彌庸夀於姚自泓上觀之彌庸見姑蔑之旗曰吾父之旗也不可以見讐而弗殺也太子曰戰而不克將亡國請待之彌庸不可屬徒五千王子地助之戰彌庸獲疇無餘地獲謳陽越子至王子地守復戰大敗吳師獲太子友王孫彌庸夀於姚入吳孫氏曰吳子方會乘其無偹也胡氏曰吳自柏舉以來憑陵諸夏可謂強矣春秋初書越入吳在柏舉之後再書越入吳在黃池之後皆因事屬辭垂戒後世也吳既勝齊復與晉人爭長自謂莫之敵也而越已入其國都矣卲子曰夫以力勝人者人亦以力勝之吳嘗破越遂有輕楚之心及其破楚又有驕齊之志貪婪攻取不顧德義侵侮齊晉遂為越所滅越又不監之復為楚所滅楚又不監之復為秦所滅秦又不監之復為漢所滅秋公至自會晉魏曼多帥師侵衛魏下公脫曼字襄陵許氏曰晉以范中行之難伐衛伐鮮虞間齊之難而一侵之又再侵衛而諸侯卒莫之宗師雖數出能侵而已髙氏曰蒯瞶在戚十有二年矣晉人不能以此討衛乃以范中行故而數興師故書侵葬許元公九月螽髙氏曰周之九月夏之七月也其為農災又非冬十有二月之比也冬十有一月有星孛于東方公羊傳曰孛于東方見于旦也孫氏曰光芒四出曰孛按文十四年有星孛入于北斗襄十三年有星孛入于北斗昭十七年有星孛入于大辰此不言所在之處者見于旦可知也盜殺陳夏區夫區烏侯切公作彄髙氏曰夏區夫者徴舒之後也徴舒弒君楚子殺之而陳人猶使世執國政故春秋因其為盜所殺而書之與華孫同意凡書盜者以人皆可得而執之也盜殺蔡侯申盜殺陳夏區夫當春秋之季世變之甚至於盜興而專殺國君卿大夫則亂已極矣十有二月螽吕氏曰今年九月螽十二月又螽又比年十二月螽隂陽錯亂甚矣襄陵許氏曰春秋書魯人事至用田賦書魯天災至於二年三螽見其民力已窮天命已去君子之心於魯已矣經書月三書日無大衍歷正月戊戌大己未冬至二月戊辰小三月丁酉大四月丁卯小五月丙申大六月丙寅小七月乙未大八月乙丑小九月甲午大閏月甲子小十月癸巳大十一月癸亥大十二月癸巳小十有四年庚申敬王三十九年晉霸定三十一蔡成十衛出十二鄭聲二十陳閔二十一杞閔六宋景三十六齊簡四秦悼十一楚惠八吳夫差十五春西狩獲麟左傳曰西狩於大野叔孫氏之車子鉏商獲麟以為不祥以賜虞人仲尼觀之曰麟也然後取之杜氏曰麟王者之嘉瑞也今出非其時而失其歸此聖人所以為感也絶筆於獲麟之一句者所感而作固所以為終也大野在魯西故言西冬獵曰狩蓋虞人修常職吕氏曰麟出非其時知聖人之卒不遇也麟不出春秋其不作乎聖人之一動一言未有無因而作者當其可也故河圖出而畫卦洛書出而敘疇獲麟而作春秋其揆一也如是程子曰世衰道微聖人救正之意舊矣但因麟而絶筆耳麟不作亦必作也大衍厯正月壬戌大甲子冬至二月壬辰小三月辛酉大四月辛卯小五月庚申大朔日食闕四度六月庚寅小七月己未大八月己丑小九月戊午大十月戊子小十一月丁巳大十二月丁亥小長厯是年閏二月春秋纂言卷十二
